questions:
  - id: e17-01
    type: multiple-choice
    prompt: '다음 문장에 관한 설명으로 잘못된 것은? `Circle c = new Circle(5);`'
    choices:
      - { id: '1', text: 'c는 참조형 변수이다.' }
      - { id: '2', text: '객체가 사용할 메모리 공간이 할당되었다.' }
      - { id: '3', text: '객체의 초기화 블록이 할당되고 실행된다.' }
      - { id: '4', text: 'Circle 클래스의 생성자가 실행된다.' }
    answers: ['3']
    explanation: |
      선택지 1: c는 Circle 객체를 가리키는 참조 변수라 맞다.
      선택지 2: new는 객체 메모리를 할당하므로 맞다.
      선택지 3: 초기화 블록은 객체마다 반드시 별도로 "할당"되는 요소가 아니므로 잘못된 설명이다.
      선택지 4: new Circle(5)는 인자를 받는 생성자를 호출하므로 맞다.

      핵심 개념:
      Java 객체 생성식은 메모리 할당과 생성자 호출을 포함한다.
      참조 변수는 객체 자체가 아니라 객체의 위치를 참조한다.
      생성자는 객체 초기화를 담당한다.
      초기화 블록은 선언되어 있을 때 초기화 과정에 참여하지만 객체 생성문의 일반 설명으로 보기에는 부정확하다.
    tags: [object, constructor]

  - id: e17-02
    type: multiple-choice
    prompt: 클래스의 데이터 필드나 메소드를 정의할 때 가장 넓은 사용 범위를 제공하는 접근제어자는 무엇인가?
    choices:
      - { id: '1', text: '생략' }
      - { id: '2', text: 'protected' }
      - { id: '3', text: 'private' }
      - { id: '4', text: 'public' }
    answers: ['4']
    explanation: |
      선택지 1: 생략 접근은 같은 패키지 범위다.
      선택지 2: protected는 같은 패키지와 상속 관계에서 접근된다.
      선택지 3: private는 같은 클래스 내부로 제한된다.
      선택지 4: public은 모든 위치에서 접근 가능하므로 가장 넓다.

      핵심 개념:
      Java 접근제어자는 캡슐화 범위를 정한다.
      private, package-private, protected, public 순으로 접근 범위가 넓어진다.
      public은 외부 API로 공개할 멤버에 사용한다.
      불필요하게 넓은 접근 범위는 캡슐화를 약화시킬 수 있다.
    tags: [access-modifier]

  - id: e17-03
    type: multiple-choice
    prompt: 추상 클래스와 인터페이스에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: '인터페이스는 public static final인 데이터 필드만 포함할 수 있다.' }
      - { id: '2', text: '인터페이스에서 default 메소드나 static 메소드는 몸체가 구현되어야 한다.' }
      - { id: '3', text: '추상 클래스를 사용하여 객체를 생성할 수 있다.' }
      - { id: '4', text: '추상 클래스는 몸체가 구현된 메소드를 포함할 수 있다.' }
    answers: ['3']
    explanation: |
      선택지 1: 인터페이스 필드는 암묵적으로 public static final이라 맞다.
      선택지 2: default/static 메소드는 구현 몸체를 가진다.
      선택지 3: 추상 클래스는 직접 인스턴스화할 수 없으므로 잘못됐다.
      선택지 4: 추상 클래스는 일반 메소드도 포함할 수 있다.

      핵심 개념:
      추상 클래스는 미완성 메소드를 포함할 수 있어 직접 객체 생성이 불가능하다.
      인터페이스는 구현해야 할 규약을 정의한다.
      Java 8 이후 인터페이스는 default/static 메소드를 가질 수 있다.
      추상 클래스와 인터페이스는 객체 생성보다 타입 설계에 사용된다.
    tags: [abstract-class, interface]

  - id: e17-04
    type: multiple-choice
    passageRefs: [g17-inheritance-declarations-01]
    prompt: A와 B가 클래스이고 X, Y, Z가 인터페이스라고 가정할 때, 잘못된 것을 모두 고른 것은?
    choices:
      - { id: '1', text: 'd' }
      - { id: '2', text: 'b, c' }
      - { id: '3', text: 'b, d' }
      - { id: '4', text: 'c, d' }
    answers: ['1']
    explanation: |
      선택지 1: `interface X extends A`인 d만 잘못되어 맞는 답이다.
      선택지 2: 클래스는 여러 인터페이스를 implements할 수 있고 인터페이스도 여러 인터페이스를 extends할 수 있어 b, c는 맞다.
      선택지 3: b는 맞는 선언이라 오답이다.
      선택지 4: c는 맞는 선언이라 오답이다.

      핵심 개념:
      클래스는 하나의 클래스를 extends하고 여러 인터페이스를 implements할 수 있다.
      인터페이스는 하나 이상의 인터페이스를 extends할 수 있다.
      인터페이스는 클래스를 extends할 수 없다.
      클래스와 인터페이스의 상속 키워드 사용 위치를 구분해야 한다.
    tags: [inheritance, interface]

  - id: e17-05
    type: multiple-choice
    passageRefs: [g17-anonymous-class-01]
    prompt: 아래 프로그램 조각에서 굵게 표시된 객체 생성 구문의 의미를 바르게 설명한 것은?
    choices:
      - { id: '1', text: 'CSuper 클래스를 정의하며 동시에 객체를 생성한다.' }
      - { id: '2', text: 'CSuper 클래스를 상속받는 익명 클래스를 정의하며 동시에 객체를 생성한다.' }
      - { id: '3', text: 'CSuper 클래스와 익명 클래스로부터 다중 상속받는 객체를 생성한다.' }
      - { id: '4', text: 'CSuper 클래스를 매개변수화하였으며 객체 생성 시 자료형을 제공한다.' }
    answers: ['2']
    explanation: |
      선택지 1: CSuper 자체를 새로 정의하는 것이 아니다.
      선택지 2: CSuper를 상속한 익명 클래스 몸체를 정의하고 즉시 객체를 생성하므로 맞다.
      선택지 3: Java 클래스 다중 상속이 아니다.
      선택지 4: 제네릭 매개변수화와 관련이 없다.

      핵심 개념:
      익명 클래스는 이름 없는 하위 클래스를 즉석에서 정의하는 문법이다.
      `new 부모타입() { ... }` 형태로 생성과 정의가 동시에 일어난다.
      익명 클래스 내부에서 메소드를 재정의하거나 멤버를 추가할 수 있다.
      일회성 구현이나 이벤트 처리에서 자주 쓰인다.
    tags: [anonymous-class]

  - id: e17-06
    type: multiple-choice
    passageRefs: [g17-generics-01]
    prompt: main 함수의 정의를 위해 밑줄 ㄱ에 들어가야 할 내용은 무엇인가?
    choices:
      - { id: '1', text: 'Char[] args' }
      - { id: '2', text: 'String args' }
      - { id: '3', text: 'String[] args' }
      - { id: '4', text: 'String[] args[]' }
    answers: ['3']
    explanation: |
      선택지 1: Java의 표준 main 매개변수는 Char 배열이 아니다.
      선택지 2: 배열이 아니므로 명령행 인자 목록을 받을 수 없다.
      선택지 3: `String[] args`가 표준 main 매개변수 형식이다.
      선택지 4: 2차원 문자열 배열이라 표준 진입점 형식이 아니다.

      핵심 개념:
      Java 애플리케이션의 진입점은 public static void main(String[] args)다.
      args는 명령행 인자를 문자열 배열로 받는다.
      배열 표기는 String args[]도 가능하지만 String[] args가 일반적이다.
      표준 시그니처와 다르면 JVM이 진입점으로 인식하지 못할 수 있다.
    tags: [main-method]

  - id: e17-07
    type: multiple-choice
    passageRefs: [g17-generics-01]
    prompt: 굵게 표시된 네 개의 문장 중에서 명시적 형변환을 하지 않아서 컴파일 오류를 일으키는 문장은 무엇인가?
    choices:
      - { id: '1', text: 'a' }
      - { id: '2', text: 'b' }
      - { id: '3', text: 'c' }
      - { id: '4', text: 'd' }
    answers: ['2']
    explanation: |
      선택지 1: Raw List에 문자열을 추가하는 것은 경고는 가능하지만 컴파일 오류는 아니다.
      선택지 2: Raw List의 get 결과는 Object라 String에 대입하려면 형변환이 필요하다.
      선택지 3: List<String>에 문자열 추가는 맞다.
      선택지 4: List<String>의 get 결과는 String이라 대입 가능하다.

      핵심 개념:
      제네릭을 쓰지 않은 Raw 타입은 원소 타입 정보가 사라진다.
      Raw List에서 get한 값은 Object로 취급된다.
      Object를 String 변수에 대입하려면 명시적 형변환이 필요하다.
      제네릭을 사용하면 컴파일 시점 타입 안정성을 얻는다.
    tags: [generics, raw-type]

  - id: e17-08
    type: multiple-choice
    prompt: try-catch-finally 구문의 실행에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'try 블록 실행 중 예외가 발생하면 try 블록은 즉시 종료된다.' }
      - {
          id: '2',
          text: 'try 블록 실행 중 예외가 발생하지 않으면 어떤 catch 블록도 실행되지 않는다.',
        }
      - { id: '3', text: 'finally 블록은 가장 마지막에 항상 실행된다.' }
      - { id: '4', text: '예외처리 코드를 작성할 때 finally 블록을 생략해서는 안 된다.' }
    answers: ['4']
    explanation: |
      선택지 1: 예외가 발생하면 남은 try 문장은 건너뛰고 처리 흐름이 이동한다.
      선택지 2: 예외가 없으면 catch는 실행되지 않는다.
      선택지 3: 일반적으로 finally는 마지막 정리 코드로 실행된다.
      선택지 4: finally는 필요할 때 쓰는 선택 블록이므로 잘못된 설명이다.

      핵심 개념:
      try는 예외 발생 가능 코드를 감싼다.
      catch는 발생한 예외 타입에 맞을 때 실행된다.
      finally는 자원 해제 같은 정리 작업에 사용된다.
      모든 예외처리에 finally가 필수인 것은 아니다.
    tags: [exception]

  - id: e17-09
    type: multiple-choice
    prompt: String 클래스에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'java.lang 패키지에 존재하며 문자열을 표현하는 클래스이다.' }
      - { id: '2', text: '문자열의 비교, 검색, 추출 등을 위한 메소드를 제공한다.' }
      - { id: '3', text: '객체 생성 이후 문자열을 수정할 수 없는 immutable 클래스이다.' }
      - { id: '4', text: '문자열을 빈번하게 변경하는 프로그램에서 사용하면 실행 효율이 좋아진다.' }
    answers: ['4']
    explanation: |
      선택지 1: String은 java.lang의 문자열 클래스라 맞다.
      선택지 2: 비교, 검색, 부분 문자열 추출 메소드를 제공한다.
      선택지 3: String은 불변 객체라 맞다.
      선택지 4: 빈번한 변경에는 새 객체가 계속 만들어져 효율이 떨어질 수 있다.

      핵심 개념:
      String은 Java의 대표적인 불변 문자열 클래스다.
      문자열 변경처럼 보이는 연산은 새 String 객체를 만든다.
      반복 변경에는 StringBuilder나 StringBuffer가 적합하다.
      불변성은 안정성을 주지만 대량 변경에는 비용이 생긴다.
    tags: [string]

  - id: e17-10
    type: multiple-choice
    prompt: 기본형 데이터 값을 포장 클래스의 객체로 변환하는 박싱(boxing)이 발생하는 것은?
    choices:
      - { id: '1', text: 'String s = Integer.toString(23);' }
      - { id: '2', text: 'int n = Integer.parseInt("34");' }
      - { id: '3', text: 'Integer i = new Integer(10);' }
      - { id: '4', text: 'String s = String.valueOf(34);' }
    answers: ['3']
    explanation: |
      선택지 1: int를 문자열로 변환한다.
      선택지 2: 문자열을 기본형 int로 파싱한다.
      선택지 3: int 값 10을 Integer 포장 객체로 만든다.
      선택지 4: 값을 문자열로 변환한다.

      핵심 개념:
      박싱은 기본형 값을 wrapper 객체로 감싸는 변환이다.
      Integer는 int의 포장 클래스다.
      문자열 변환이나 파싱은 박싱과 다르다.
      최신 Java에서는 자동 박싱을 통해 `Integer i = 10`도 가능하다.
    tags: [boxing, wrapper]

  - id: e17-11
    type: multiple-choice
    prompt: 텍스트 파일을 다루기 위한 기본 스트림 중 하나로서 문자 단위로 파일에 출력할 때 사용해야 하는 클래스는 무엇인가?
    choices:
      - { id: '1', text: 'FileInputStream' }
      - { id: '2', text: 'FileWriter' }
      - { id: '3', text: 'BufferedReader' }
      - { id: '4', text: 'PrintWriter' }
    answers: ['2']
    explanation: |
      선택지 1: 바이트 입력 스트림이다.
      선택지 2: 파일에 문자 단위로 출력하는 기본 Writer 클래스라 맞다.
      선택지 3: 문자 입력을 버퍼링하는 Reader다.
      선택지 4: 편리한 출력 기능을 제공하지만 기본 파일 문자 출력 스트림 자체는 FileWriter다.

      핵심 개념:
      InputStream/OutputStream은 바이트 스트림이다.
      Reader/Writer는 문자 스트림이다.
      FileWriter는 파일 대상 문자 출력에 사용한다.
      BufferedReader는 입력 효율을 높이는 보조 스트림이다.
    tags: [io, writer]

  - id: e17-12
    type: multiple-choice
    prompt: java.nio.file 패키지에 있는 Path 인터페이스에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'java.io.File 클래스를 대체할 수 있다.' }
      - { id: '2', text: '파일시스템에 존재하는 파일이나 디렉터리의 경로를 표현한다.' }
      - { id: '3', text: '경로의 생성, 조작/비교, 경로 요소 조회 기능을 제공한다.' }
      - { id: '4', text: '파일 내용의 읽기와 쓰기 기능을 제공한다.' }
    answers: ['4']
    explanation: |
      선택지 1: Path는 File을 대체/보완하는 경로 API다.
      선택지 2: 파일과 디렉터리 경로를 표현한다.
      선택지 3: 경로 조작과 비교 기능을 제공한다.
      선택지 4: 파일 내용 입출력은 Files나 스트림 API 역할이므로 잘못됐다.

      핵심 개념:
      Path는 파일 내용이 아니라 경로를 표현하는 객체다.
      NIO.2 API는 경로와 파일 작업을 분리한다.
      파일 읽기/쓰기는 Files 클래스나 스트림을 사용한다.
      경로 객체와 입출력 객체의 책임을 구분해야 한다.
    tags: [nio, path]

  - id: e17-13
    type: multiple-choice
    prompt: for-each 구문을 사용하여 컬렉션 객체에 저장된 원소를 차례로 하나씩 다룬다고 할 때 밑줄 부분에 들어갈 내용으로 적당한 것은?
    choices:
      - { id: '1', text: 'list : String element' }
      - { id: '2', text: 'String element : list' }
      - { id: '3', text: 'int element : list' }
      - { id: '4', text: 'int i=0; i<=list.length; i++' }
    answers: ['2']
    explanation: |
      선택지 1: for-each의 좌우 순서가 반대다.
      선택지 2: String 원소를 element로 받아 list를 순회하는 올바른 형식이다.
      선택지 3: 리스트 원소 타입이 String이므로 int는 맞지 않는다.
      선택지 4: 일반 for문 형식이고 컬렉션에는 length가 없다.

      핵심 개념:
      for-each는 `for (원소타입 변수 : 순회대상)` 형식이다.
      순회 대상은 배열이나 Iterable 구현 객체다.
      반복 변수 타입은 원소 타입과 맞아야 한다.
      컬렉션 크기는 length가 아니라 size()로 다룬다.
    tags: [for-each, collection]

  - id: e17-14
    type: multiple-choice
    prompt: 컬렉션 중 하나인 ArrayList 클래스에 관한 설명으로 적당하지 않은 것은?
    choices:
      - { id: '1', text: 'List 인터페이스를 구현한 클래스이다.' }
      - { id: '2', text: '여러 원소를 저장하기 위해 배열을 사용한다.' }
      - { id: '3', text: '원소의 순서가 의미를 가진다.' }
      - { id: '4', text: '같은 자료를 중복으로 저장할 수 없다.' }
    answers: ['4']
    explanation: |
      선택지 1: ArrayList는 List 구현 클래스다.
      선택지 2: 내부적으로 동적 배열 구조를 사용한다.
      선택지 3: 입력 순서와 인덱스가 의미를 가진다.
      선택지 4: List는 중복 원소를 허용하므로 잘못된 설명이다.

      핵심 개념:
      ArrayList는 순서가 있는 List 컬렉션이다.
      인덱스를 통해 원소에 접근할 수 있다.
      같은 값을 중복 저장할 수 있다.
      중복을 막고 싶다면 Set 계열을 고려한다.
    tags: [collection, array-list]

  - id: e17-15
    type: multiple-choice
    prompt: Map 인터페이스에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'Map은 컬렉션을 다루기 위한 인터페이스이다.' }
      - { id: '2', text: 'Map 유형의 컬렉션에서 원소의 형태는 (key, value)이다.' }
      - { id: '3', text: 'LinkedList는 해싱을 이용하여 Map을 구현한 클래스이다.' }
      - { id: '4', text: '컬렉션에 원소를 저장할 때 put(), 조회할 때 get() 메소드를 사용한다.' }
    answers: ['3']
    explanation: |
      선택지 1: Map은 키-값 자료를 다루는 주요 컬렉션 인터페이스다.
      선택지 2: Map 원소는 키와 값의 대응 관계다.
      선택지 3: LinkedList는 List 구현체이며 Map 구현체가 아니므로 잘못됐다.
      선택지 4: Map 저장과 조회에는 put/get을 사용한다.

      핵심 개념:
      Map은 키로 값을 찾는 자료구조 인터페이스다.
      HashMap은 해싱 기반 Map 구현체다.
      LinkedList는 순차 자료를 저장하는 List 구현체다.
      컬렉션 인터페이스별 역할을 구분해야 한다.
    tags: [collection, map]

  - id: e17-16
    type: multiple-choice
    passageRefs: [g17-thread-join-01]
    prompt: 예외의 전파를 위해 밑줄 ㄱ에 들어가야 할 키워드는 무엇인가?
    choices:
      - { id: '1', text: 'throw' }
      - { id: '2', text: 'throws' }
      - { id: '3', text: 'synchronize' }
      - { id: '4', text: 'interrupt' }
    answers: ['2']
    explanation: |
      선택지 1: throw는 예외 객체를 직접 던질 때 사용한다.
      선택지 2: throws는 메소드 선언부에서 예외 전파를 표시하므로 맞다.
      선택지 3: Java 동기화 키워드는 synchronized이며 예외 전파와 무관하다.
      선택지 4: interrupt는 스레드 인터럽트 동작이다.

      핵심 개념:
      checked exception은 처리하거나 전파해야 한다.
      메소드 선언부의 throws는 호출자에게 예외 처리를 넘긴다.
      throw는 실제 예외 객체를 발생시키는 실행문이다.
      join()은 InterruptedException 처리가 필요하다.
    tags: [exception, thread]

  - id: e17-17
    type: multiple-choice
    passageRefs: [g17-thread-join-01]
    prompt: 두 스레드 t1과 t2가 종료될 때까지 main 스레드가 기다리기 위해 밑줄 ㄴ에 들어가야 할 문장은 무엇인가?
    choices:
      - { id: '1', text: 'Thread.sleep();' }
      - { id: '2', text: 'Thread.sleep(t1); Thread.sleep(t2);' }
      - { id: '3', text: 't1.sleep(); t2.sleep();' }
      - { id: '4', text: 't1.join(); t2.join();' }
    answers: ['4']
    explanation: |
      선택지 1: sleep은 단순 시간 지연이며 인자도 필요하다.
      선택지 2: sleep은 Thread 객체를 인자로 받지 않는다.
      선택지 3: sleep은 정적 메소드이고 종료 대기 의미가 아니다.
      선택지 4: join은 해당 스레드가 끝날 때까지 기다리므로 맞다.

      핵심 개념:
      join()은 다른 스레드의 종료를 기다리는 동기화 수단이다.
      sleep()은 현재 스레드를 일정 시간 멈출 뿐이다.
      스레드 완료 후 결과를 사용하려면 join이 필요하다.
      멀티스레드 실행 순서는 명시적 대기가 없으면 예측하기 어렵다.
    tags: [thread, join]

  - id: e17-18
    type: multiple-choice
    passageRefs: [g17-thread-join-01]
    prompt: 스레드 생성을 위해 MyThread1 클래스를 정의하였다. 밑줄 ㄷ에 들어갈 단어는 무엇일까?
    choices:
      - { id: '1', text: 'Object' }
      - { id: '2', text: 'Thread' }
      - { id: '3', text: 'Process' }
      - { id: '4', text: 'Runnable' }
    answers: ['2']
    explanation: |
      선택지 1: Object를 상속해도 스레드 실행 클래스가 되지 않는다.
      선택지 2: Thread를 상속하고 run()을 재정의하는 방식이 맞다.
      선택지 3: Process는 Java 스레드 생성 부모 클래스가 아니다.
      선택지 4: Runnable은 인터페이스라 extends가 아니라 implements 대상이다.

      핵심 개념:
      Java 스레드는 Thread 상속 또는 Runnable 구현으로 만들 수 있다.
      Thread를 상속하면 run() 메소드가 스레드 실행 본문이 된다.
      start()를 호출해야 새 스레드에서 run()이 실행된다.
      클래스 상속과 인터페이스 구현 키워드를 구분해야 한다.
    tags: [thread]

  - id: e17-19
    type: multiple-choice
    passageRefs: [g17-thread-join-01]
    prompt: run() 메소드를 보면 Thread.yield()를 실행한다. 이것의 의미를 정확히 설명한 것은?
    choices:
      - { id: '1', text: '현재 스레드의 우선 순위를 변경시킨다.' }
      - { id: '2', text: '실행을 잠시 멈추고 다른 스레드에게 CPU를 양보한다.' }
      - { id: '3', text: '공유 자원에 배타적으로 접근할 수 있게 요청한다.' }
      - { id: '4', text: '중단되었던 다른 스레드를 깨워 실행가능 상태로 만든다.' }
    answers: ['2']
    explanation: |
      선택지 1: yield는 우선순위를 변경하지 않는다.
      선택지 2: 현재 스레드가 실행 기회를 양보하는 의미라 맞다.
      선택지 3: 배타 접근은 synchronized 같은 동기화가 담당한다.
      선택지 4: 다른 스레드를 깨우는 기능은 notify/interrupt 등과 관련된다.

      핵심 개념:
      yield()는 현재 실행 중인 스레드가 CPU 사용을 양보하겠다는 힌트다.
      실제 스케줄링 결과는 JVM과 OS에 따라 달라질 수 있다.
      yield는 동기화나 대기 해제 기능이 아니다.
      스레드 제어 메소드들의 역할을 구분해야 한다.
    tags: [thread, yield]

  - id: e17-20
    type: multiple-choice
    prompt: GUI 컴포넌트의 클래스 계층 구조에서 Container 클래스의 자식 클래스가 아닌 것은?
    choices:
      - { id: '1', text: 'Frame' }
      - { id: '2', text: 'Panel' }
      - { id: '3', text: 'Window' }
      - { id: '4', text: 'List' }
    answers: ['4']
    explanation: |
      선택지 1: Frame은 Window를 거쳐 Container 계층에 속한다.
      선택지 2: Panel은 Container의 대표 하위 클래스다.
      선택지 3: Window도 Container 하위 계층이다.
      선택지 4: List는 항목 목록 컴포넌트이며 Container 자식 클래스가 아니다.

      핵심 개념:
      AWT 컴포넌트 계층에서 Container는 다른 컴포넌트를 담을 수 있는 컴포넌트다.
      Frame, Window, Panel은 컨테이너 역할을 할 수 있다.
      List는 사용자에게 목록을 보여주는 일반 컴포넌트다.
      GUI 클래스 계층은 배치와 포함 가능성을 이해하는 데 중요하다.
    tags: [awt, container]

  - id: e17-21
    type: multiple-choice
    passageRefs: [g17-checkbox-flow-01]
    prompt: 다음 결과를 보고 판단할 때, 프로그램에서 사용된 배치관리자는 무엇이라고 생각되는가?
    choices:
      - { id: '1', text: 'GridLayout' }
      - { id: '2', text: 'FlowLayout' }
      - { id: '3', text: 'BorderLayout' }
      - { id: '4', text: 'SpringLayout' }
    answers: ['2']
    explanation: |
      선택지 1: GridLayout은 격자형 배치라 그림과 다르다.
      선택지 2: 컴포넌트들이 왼쪽에서 오른쪽으로 흐르듯 배치되어 FlowLayout이 맞다.
      선택지 3: BorderLayout의 5개 영역 배치가 아니다.
      선택지 4: 제약 기반 배치로 이 단순 흐름 화면과 거리가 있다.

      핵심 개념:
      FlowLayout은 컴포넌트를 한 줄에 순서대로 배치한다.
      공간이 부족하면 다음 줄로 넘어간다.
      GridLayout은 동일 크기 격자 배치다.
      BorderLayout은 방향 영역 중심의 배치관리자다.
    tags: [awt, layout]

  - id: e17-22
    type: multiple-choice
    prompt: 이벤트 처리에 관한 설명으로 잘못된 것은 무엇인가?
    choices:
      - { id: '1', text: '이벤트 처리를 위해서는 이벤트 소스에 리스너 객체를 등록해야 한다.' }
      - { id: '2', text: '하나의 이벤트 소스에는 하나의 이벤트 처리만 등록할 수 있다.' }
      - { id: '3', text: '이벤트 클래스에 대응되는 리스너 인터페이스가 존재한다.' }
      - {
          id: '4',
          text: '2개 이상의 추상 메소드를 가지는 리스너 인터페이스를 위해 어댑터 클래스가 존재한다.',
        }
    answers: ['2']
    explanation: |
      선택지 1: 이벤트 소스에 리스너를 등록해야 콜백이 호출된다.
      선택지 2: 하나의 이벤트 소스에도 여러 리스너를 등록할 수 있으므로 잘못됐다.
      선택지 3: 이벤트 종류별 리스너 인터페이스가 있다.
      선택지 4: 여러 메소드를 가진 리스너 구현을 돕기 위해 어댑터 클래스가 제공된다.

      핵심 개념:
      AWT 이벤트 모델은 이벤트 소스, 이벤트 객체, 리스너로 구성된다.
      소스 객체에 리스너를 등록하면 이벤트 발생 시 리스너 메소드가 호출된다.
      하나의 소스에 여러 리스너 등록이 가능하다.
      어댑터 클래스는 필요한 메소드만 재정의하도록 돕는다.
    tags: [awt, event]

  - id: e17-23
    type: multiple-choice
    prompt: 버튼 컴포넌트(aButton)에 ActionEvent를 등록하는 문장 `aButton.addActionListener(new A());`에서 클래스 A가 구현해야 하는 인터페이스는 무엇인가?
    choices:
      - { id: '1', text: 'Action' }
      - { id: '2', text: 'ActionEvent' }
      - { id: '3', text: 'ActionAdapter' }
      - { id: '4', text: 'ActionListener' }
    answers: ['4']
    explanation: |
      선택지 1: Action은 이 문맥의 리스너 인터페이스가 아니다.
      선택지 2: ActionEvent는 이벤트 객체 클래스다.
      선택지 3: ActionAdapter는 표준 핵심 선택지가 아니다.
      선택지 4: addActionListener에는 ActionListener 구현 객체가 필요하다.

      핵심 개념:
      버튼 클릭은 ActionEvent로 표현된다.
      ActionEvent를 처리하는 리스너는 ActionListener다.
      addActionListener는 ActionListener 타입 객체를 인자로 받는다.
      이벤트 객체와 리스너 인터페이스를 구분해야 한다.
    tags: [awt, event]

  - id: e17-24
    type: multiple-choice
    passageRefs: [g17-jdbc-01]
    prompt: 밑줄 ㄱ, ㄴ, ㄷ에 들어갈 단어를 순서대로 정확하게 나열한 것은?
    choices:
      - { id: '1', text: 'Connection, Statement, ResultSet' }
      - { id: '2', text: 'Connection, PreparedStatement, ResultSet' }
      - { id: '3', text: 'ConnectionEvent, Statement, ResultStore' }
      - { id: '4', text: 'ConnectionPool, PreparedStatement, ResultStore' }
    answers: ['1']
    explanation: |
      선택지 1: DB 연결, SQL 실행 객체, 조회 결과 집합 순서라 코드와 맞다.
      선택지 2: 코드는 createStatement()를 사용하므로 Statement가 맞다.
      선택지 3: ConnectionEvent와 ResultStore는 이 코드의 JDBC 기본 타입이 아니다.
      선택지 4: ConnectionPool과 ResultStore가 맞지 않는다.

      핵심 개념:
      JDBC의 Connection은 데이터베이스 연결을 나타낸다.
      Statement는 정적 SQL 실행에 사용된다.
      ResultSet은 SELECT 결과 행들을 순회하는 객체다.
      PreparedStatement는 매개변수 SQL에 주로 사용된다.
    tags: [jdbc]

  - id: e17-25
    type: multiple-choice
    passageRefs: [g17-jdbc-01]
    prompt: 밑줄 ㄹ에 들어갈 메소드의 이름은 무엇인가?
    choices:
      - { id: '1', text: 'execute' }
      - { id: '2', text: 'executeQuery' }
      - { id: '3', text: 'executeUpdate' }
      - { id: '4', text: 'executeSql' }
    answers: ['2']
    explanation: |
      선택지 1: execute는 일반 실행 메소드지만 ResultSet을 바로 받는 SELECT 문맥의 대표 답은 아니다.
      선택지 2: SELECT 결과를 ResultSet으로 받을 때 executeQuery를 사용하므로 맞다.
      선택지 3: INSERT/UPDATE/DELETE처럼 갱신 행 수를 받을 때 사용한다.
      선택지 4: 표준 JDBC 메소드가 아니다.

      핵심 개념:
      SELECT 문은 조회 결과를 ResultSet으로 반환한다.
      Statement.executeQuery(sql)는 질의 결과를 반환하는 SQL에 사용한다.
      executeUpdate는 데이터 변경 SQL에 사용한다.
      SQL 종류에 따라 JDBC 실행 메소드를 구분해야 한다.
    tags: [jdbc, execute-query]
