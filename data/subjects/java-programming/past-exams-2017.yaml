  - id: g17-generics-01
    type: code
    language: java
    highlights:
      - 'list1.add("Hello");'
      - 'String s1 = list1.get(0);'
      - 'list2.add("Java");'
      - 'String s2 = list2.get(0);'
    body: |
      import java.util.*;
      class ArrayList<E> implements List<E> {
        boolean add(E e) { ... }
        E get(int index) { ... }
        E remove(int index) { ... }
      }

      public class GenericTest {
        public static void main(/* ㄱ */ __________) {
          List list1 = new ArrayList();
          list1.add("Hello");        // a
          String s1 = list1.get(0);  // b

          List<String> list2 = new ArrayList<String>();
          list2.add("Java");         // c
          String s2 = list2.get(0);  // d
        }
      }

  - id: g17-thread-join-01
    type: code
    language: java
    highlights: ['Thread.yield();']
    body: |
      public class JoinTest {
        public static void main(...) /* ㄱ */ ______ InterruptedException {
          Thread t1 = new MyThread1(); t1.start();
          Thread t2 = new MyThread1(); t2.start();

          /* ㄴ */ ______________________
          System.out.println("main");
        }
      }

      class MyThread1 extends /* ㄷ */ ______ {
        public void run() {
          for (int i = 0; i < 1000; i++) {
            System.out.println(getName());
            Thread.yield();
          }
        }
      }

