subjectId: java-programming
sourceId: workbook
title: Java프로그래밍 워크북
kind: workbook

questions:
  - id: b01-05
    type: multiple-choice
    prompt: 다음 중 Java 애플리케이션을 실행하기 위해 필요한 main() 함수의 형식은 무엇인가?
    choices:
      - { id: '1', text: 'public void main(String args[ ])' }
      - { id: '2', text: 'static void main(String args[ ])' }
      - { id: '3', text: 'public static void main(String args)' }
      - { id: '4', text: 'public static void main(String args[ ])' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): `static`이 없어 Java 애플리케이션의 시작점으로 사용할 수 없다.
      선택지 2 (오답): `public`이 없어 표준 main 메서드 형식과 다르다.
      선택지 3 (오답): 매개변수가 `String[]` 배열이 아니다.
      선택지 4 (정답): Java 애플리케이션의 실행 시작점으로 사용할 수 있는 표준 main 메서드 형식이다.

      핵심 개념:
      Java 애플리케이션은 `main` 메서드에서 실행을 시작한다.
      표준 형식은 `public static void main(String[] args)`이다.
      `String args[]`와 `String[] args`는 배열 선언 위치만 다르고 같은 의미로 사용할 수 있다.
      `public`은 외부 실행 환경에서 접근할 수 있게 하고, `static`은 객체 생성 없이 호출되게 한다.
    tags: [chapter:01, main-method]

  - id: b02-01
    type: multiple-choice
    prompt: 다음 중 잘못된 주석은 무엇인가?
    choices:
      - { id: '1', text: '/** comment */' }
      - { id: '2', text: '/* comment */' }
      - { id: '3', text: '/* comment' }
      - { id: '4', text: '// comment' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): `/** ... */` 형식은 문서화 주석으로 올바른 주석이다.
      선택지 2 (오답): `/* ... */` 형식은 여러 줄 주석으로 올바른 주석이다.
      선택지 3 (정답): `/*`로 시작한 주석이 `*/`로 닫히지 않았으므로 잘못된 주석이다.
      선택지 4 (오답): `//` 뒤의 내용은 한 줄 주석으로 처리된다.

      핵심 개념:
      Java 주석은 프로그램 실행에 영향을 주지 않는 설명문이다.
      한 줄 주석은 `//`로 시작해 줄 끝까지 적용된다.
      여러 줄 주석은 `/*`로 시작하고 `*/`로 끝나야 한다.
      문서화 주석은 `/** ... */` 형식을 사용한다.
    tags: [chapter:02, comment]

  - id: b02-02
    type: multi-answer
    allowMultiple: true
    prompt: 다음 중 식별자로 사용할 수 있는 것을 모두 고르시오.
    choices:
      - { id: '1', text: '_12' }
      - { id: '2', text: 'my#class' }
      - { id: '3', text: '5myClass' }
      - { id: '4', text: 'My$Class' }
    answers: ['1', '4']
    explanation: |
      선택지 1 (정답): 밑줄(`_`)로 시작할 수 있으므로 식별자로 사용할 수 있다.
      선택지 2 (오답): `#` 문자는 Java 식별자에 사용할 수 없다.
      선택지 3 (오답): 식별자의 첫 문자는 숫자가 될 수 없다.
      선택지 4 (정답): `$` 문자는 Java 식별자에 사용할 수 있다.

      핵심 개념:
      Java 식별자는 변수, 클래스, 메서드 등의 이름이다.
      식별자는 영문자, 한글, 숫자, 밑줄, 달러 기호를 사용할 수 있다.
      첫 문자는 숫자가 될 수 없다.
      `#` 같은 특수 문자는 식별자에 사용할 수 없다.
    tags: [chapter:02, identifier]

  - id: b02-04
    type: multi-answer
    allowMultiple: true
    prompt: 다음 네 종류의 변수 가운데 필드에 해당하는 것을 모두 고르시오.
    choices:
      - { id: '1', text: '인스턴스 변수' }
      - { id: '2', text: '클래스 변수' }
      - { id: '3', text: '파라미터' }
      - { id: '4', text: '지역 변수' }
    answers: ['1', '2']
    explanation: |
      선택지 1 (정답): 클래스에 선언되는 인스턴스 변수는 필드에 해당한다.
      선택지 2 (정답): 클래스에 선언되는 정적 변수인 클래스 변수도 필드에 해당한다.
      선택지 3 (오답): 파라미터는 메서드 호출 시 전달되는 값을 받는 변수이다.
      선택지 4 (오답): 지역 변수는 메서드나 블록 내부에서 선언되는 변수이다.

      핵심 개념:
      필드는 클래스에 선언되는 변수이다.
      인스턴스 변수는 객체마다 별도의 값을 가진다.
      클래스 변수는 `static`으로 선언되어 클래스 단위로 공유된다.
      파라미터와 지역 변수는 필드가 아니라 메서드 실행 범위에서 사용된다.
    tags: [chapter:02, variable, field]

  - id: b02-05
    type: multi-answer
    allowMultiple: true
    prompt: 다음 중 문제가 있는 것을 모두 고르시오.
    choices:
      - { id: '1', text: 'int i = 0x1111;' }
      - { id: '2', text: 'int j = 12.34L;' }
      - { id: '3', text: 'float f = 5.5;' }
      - { id: '4', text: "int c = '0';" }
    answers: ['2', '3']
    explanation: |
      선택지 1 (오답): `0x1111`은 16진수 정수 리터럴이며 `int`에 저장할 수 있다.
      선택지 2 (정답): `L`은 정수형 `long` 리터럴에 붙는 접미사인데, `12.34`는 실수이므로 잘못되었다.
      선택지 3 (정답): `5.5`는 기본적으로 `double` 리터럴이므로 `float`에 대입하려면 `5.5F`처럼 써야 한다.
      선택지 4 (오답): 문자 리터럴 `'0'`은 정수형과 호환되어 `int`에 저장할 수 있다.

      핵심 개념:
      Java 리터럴은 값의 종류와 접미사에 따라 타입이 결정된다.
      `L`은 `long` 정수 리터럴에 사용한다.
      소수점이 있는 실수 리터럴은 기본적으로 `double`이다.
      문자형 `char`는 정수형과 호환될 수 있다.
    tags: [chapter:02, literal, type]

  - id: b02-09
    type: multiple-choice
    prompt: 다음 중 이차원 배열의 선언으로 잘못된 것은 무엇인가?
    choices:
      - { id: '1', text: 'int[][] multiArray;' }
      - { id: '2', text: 'int[] multiArray[];' }
      - { id: '3', text: 'int multiArray[][];' }
      - { id: '4', text: 'int[10,10] multiArray;' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): Java에서 이차원 배열을 선언하는 올바른 형식이다.
      선택지 2 (오답): 배열 대괄호를 변수명 앞뒤에 나누어 쓰는 것도 문법적으로 허용된다.
      선택지 3 (오답): C 스타일에 가까운 배열 선언도 Java에서 허용된다.
      선택지 4 (정답): Java에서는 배열 크기를 선언부의 대괄호 안에 `10,10`처럼 쓰지 않는다.

      핵심 개념:
      Java 배열 변수 선언에서는 차원만 표시하고 크기는 배열 생성 시 지정한다.
      `int[][] a`, `int[] a[]`, `int a[][]`는 모두 이차원 배열 선언이 가능하다.
      배열 크기는 `new int[10][10]`처럼 생성식에서 지정한다.
      대괄호 안에 쉼표로 크기를 나열하는 문법은 Java 배열 선언이 아니다.
    tags: [chapter:02, array]

  - id: b02-13
    type: multiple-choice
    prompt: |
      다음은 for문을 이용하여 배열의 원소들을 출력하고 있다. 동일한 기능을 향상된 for문을 사용하여 작성할 때 올바른 것은?

      ```java
      String[] names = {"Kim", "Lee", "Park", "Na"};
      for (int i = 0; i < names.length; i++)
          System.out.print(names[i] + " ");
      ```
    choices:
      - { id: '1', text: 'for(int item: names) System.out.print(item + " ");' }
      - { id: '2', text: 'for(int item: names) System.out.print(names[i] + " ");' }
      - { id: '3', text: 'for(String item: names) System.out.print(item + " ");' }
      - { id: '4', text: 'for(String item: names) System.out.print(names[i] + " ");' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): `names` 배열의 원소 타입은 `String`이므로 반복 변수 타입을 `int`로 둘 수 없다.
      선택지 2 (오답): 반복 변수 타입이 잘못되었고, 향상된 for문 안에서 인덱스 `i`도 선언되어 있지 않다.
      선택지 3 (정답): `String` 원소를 `item`으로 받아 그대로 출력하므로 올바르다.
      선택지 4 (오답): 반복 변수 타입은 맞지만 인덱스 `i`가 선언되어 있지 않다.

      핵심 개념:
      향상된 for문은 배열이나 컬렉션의 원소를 순서대로 꺼내 반복 변수에 대입한다.
      반복 변수의 타입은 배열 원소 타입과 호환되어야 한다.
      인덱스가 필요 없을 때 향상된 for문을 사용하면 코드가 간결해진다.
      인덱스 변수를 직접 선언하지 않았으면 `names[i]`처럼 사용할 수 없다.
    tags: [chapter:02, array, enhanced-for]

  - id: b02-14
    type: multiple-choice
    prompt: 다음 중 나머지 셋과 다른 하나는 무엇인가? ('A'의 아스키 코드값은 십진수로 65이다.)
    choices:
      - { id: '1', text: "char c = 'A';" }
      - { id: '2', text: 'char c = 65;' }
      - { id: '3', text: "char c = '\\u0065';" }
      - { id: '4', text: 'char c = 0x41;' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 문자 `'A'`를 직접 저장한다.
      선택지 2 (오답): 십진수 65는 문자 `'A'`의 코드값이다.
      선택지 3 (정답): 유니코드 `\u0065`는 문자 `'e'`에 해당하므로 나머지와 다르다.
      선택지 4 (오답): 16진수 `0x41`은 십진수 65이므로 문자 `'A'`와 같다.

      핵심 개념:
      `char`는 문자 코드값을 저장하는 정수형과 호환되는 타입이다.
      문자 리터럴, 십진수 코드값, 16진수 코드값으로 같은 문자를 표현할 수 있다.
      유니코드 이스케이프는 `\u` 뒤의 16진수 코드값으로 문자를 표현한다.
      `0x41`과 65는 `'A'`이지만 `\u0065`는 `'e'`이다.
    tags: [chapter:02, char, unicode]

  - id: b03-01
    type: multiple-choice
    prompt: 다음 중 추상화에 관한 정확한 설명은 무엇인가?
    choices:
      - { id: '1', text: '비밀스러운 데이터의 직접 접근을 막는 것' }
      - { id: '2', text: '데이터와 메소드를 하나의 틀에 담는 것' }
      - { id: '3', text: '기존 대상을 재사용하되 새로운 특성을 추가하여 새로 만드는 것' }
      - { id: '4', text: '본질적이고 전형적인 부분만을 간추려 대상을 표현하는 것' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 데이터 직접 접근을 막는 것은 정보 은닉 또는 캡슐화와 관련된다.
      선택지 2 (오답): 데이터와 메소드를 하나로 묶는 것은 캡슐화에 해당한다.
      선택지 3 (오답): 기존 대상을 재사용해 새 특성을 추가하는 것은 상속과 관련된다.
      선택지 4 (정답): 추상화는 복잡한 실체에서 본질적이고 전형적인 부분만 간추려 표현하는 것이다.

      핵심 개념:
      추상화는 복잡한 대상을 필요한 관점에서 단순화하는 과정이다.
      객체지향에서는 대상의 중요한 속성과 동작을 골라 클래스로 표현한다.
      불필요한 세부 구현을 감추면 문제를 더 쉽게 모델링할 수 있다.
      캡슐화, 상속과 구별되는 객체지향의 핵심 개념이다.
    tags: [chapter:03, abstraction]

  - id: b03-02
    type: multiple-choice
    prompt: 다음 중 클래스의 정의에 포함될 수 없는 것은?
    choices:
      - { id: '1', text: '인스턴스 필드' }
      - { id: '2', text: '정적 필드' }
      - { id: '3', text: '전역 변수' }
      - { id: '4', text: '인스턴스 메소드' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 인스턴스 필드는 클래스에 포함될 수 있다.
      선택지 2 (오답): 정적 필드도 클래스에 포함될 수 있다.
      선택지 3 (정답): Java 프로그램에는 전역 변수가 존재하지 않는다.
      선택지 4 (오답): 인스턴스 메소드는 클래스에 포함될 수 있다.

      핵심 개념:
      Java의 데이터와 동작은 클래스 안에 정의된다.
      필드는 인스턴스 필드와 정적 필드로 나눌 수 있다.
      메소드도 인스턴스 메소드와 정적 메소드로 나눌 수 있다.
      C와 달리 Java에는 클래스 밖에 선언되는 전역 변수가 없다.
    tags: [chapter:03, class, field]

  - id: b03-03
    type: multiple-choice
    prompt: 다음 중 나머지 셋과 다른 의미를 가지는 용어는 무엇인가?
    choices:
      - { id: '1', text: '정적 메소드' }
      - { id: '2', text: 'static 메소드' }
      - { id: '3', text: '클래스 메소드' }
      - { id: '4', text: '추상 메소드' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 정적 메소드는 static 메소드와 같은 의미이다.
      선택지 2 (오답): static 메소드는 클래스 메소드라고도 부른다.
      선택지 3 (오답): 클래스 메소드는 정적 메소드와 같은 의미이다.
      선택지 4 (정답): 추상 메소드는 구현부가 없는 메소드로 정적 메소드와 다른 개념이다.

      핵심 개념:
      정적 메소드는 객체 생성 없이 클래스 이름으로 호출할 수 있다.
      static 메소드와 클래스 메소드는 같은 의미로 사용된다.
      추상 메소드는 선언만 있고 구현은 하위 클래스에서 제공한다.
      이름이 비슷해도 정적성과 추상성은 서로 다른 개념이다.
    tags: [chapter:03, static-method, abstract-method]

  - id: b03-06
    type: multiple-choice
    prompt: 다음 네 가지 접근 제어자 가운데 두 번째로 넓은 사용 범위를 제공하는 것은?
    choices:
      - { id: '1', text: 'public' }
      - { id: '2', text: '생략' }
      - { id: '3', text: 'protected' }
      - { id: '4', text: 'private' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): `public`은 가장 넓은 접근 범위를 제공한다.
      선택지 2 (오답): 접근 제어자를 생략하면 같은 패키지에서만 접근할 수 있다.
      선택지 3 (정답): `protected`는 같은 패키지와 서브 클래스에서 접근할 수 있어 두 번째로 넓다.
      선택지 4 (오답): `private`은 같은 클래스 내부에서만 접근할 수 있어 가장 좁다.

      핵심 개념:
      Java 접근 범위는 일반적으로 `public`, `protected`, package-private, `private` 순으로 넓다.
      `public`은 어디서나 접근 가능하다.
      `protected`는 같은 패키지와 상속 관계의 서브 클래스에서 접근 가능하다.
      접근 제어자를 생략하면 package-private 접근이 된다.
    tags: [chapter:03, access-modifier]

