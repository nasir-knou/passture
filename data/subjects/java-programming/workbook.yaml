      - { id: '4', text: '사용된 리소스가 여럿이면 선언된 순서와 같은 순서로 반환된다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): try-with-resources는 `AutoCloseable` 리소스를 자동으로 닫는 구문이다.
      선택지 2 (오답): try-with-resources는 Java 7에서 도입되었다.
      선택지 3 (오답): 리소스가 닫힌 뒤 `catch` 또는 `finally` 블록이 실행된다.
      선택지 4 (정답): 리소스가 여러 개이면 선언된 순서의 역순으로 닫힌다.

      핵심 개념:
      try-with-resources는 리소스 해제를 자동화한다.
      괄호 안에서 선언한 리소스는 블록 종료 시 자동으로 `close`된다.
      여러 리소스는 나중에 선언된 것부터 역순으로 닫힌다.
      파일, 스트림 같은 리소스 처리에서 누수를 줄이는 데 유용하다.
    tags: [chapter:06, try-with-resources, exception]

