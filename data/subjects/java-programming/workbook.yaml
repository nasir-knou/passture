      선택지 1 (오답): 여러 스레드가 실행되는 것은 멀티스레딩의 일반적 상황이다.
      선택지 2 (오답): 공유 자원이 있을 수는 있지만 동기화의 핵심 설명으로는 부족하다.
      선택지 3 (오답): 동시 접근 상황 자체를 말할 뿐 상호 배제를 설명하지 않는다.
      선택지 4 (정답): 동기화는 공유 자원 접근에서 한 순간 하나의 스레드만 접근하도록 보장하는 것이다.

      핵심 개념:
      동기화는 여러 스레드가 공유 자원을 사용할 때 필요한 제어 방식이다.
      상호 배제는 동시에 하나의 스레드만 임계 영역에 들어가게 한다.
      동기화가 없으면 경쟁 상태가 발생할 수 있다.
      Java에서는 `synchronized` 키워드로 메소드나 블록을 동기화할 수 있다.
    tags: [chapter:12, thread, synchronization]

  - id: b12-09
    type: multiple-choice
    prompt: 이 경우 공유 자원에 대한 스레드 동기화가 필요한데, 프로그램에서 공유 자원에 해당하는 것은 무엇인가?
    choices:
      - { id: '1', text: 'total 변수' }
      - { id: '2', text: 'Thread 객체' }
      - { id: '3', text: 'account 객체' }
      - { id: '4', text: 'Customer 객체' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): `total`은 공유 객체 내부의 필드이지만, 동기화 대상 관점에서는 객체 전체를 보호한다.
      선택지 2 (오답): 스레드 객체 자체가 입금 상태를 공유하는 핵심 자원이 아니다.
      선택지 3 (정답): 여러 Customer 스레드가 동일한 Account 객체를 사용하므로 공유 자원이다.
      선택지 4 (오답): Customer 객체는 각 스레드별로 생성된다.

      핵심 개념:
      공유 자원은 여러 스레드가 동시에 접근하는 데이터나 객체이다.
      동일 객체의 상태를 여러 스레드가 수정하면 경쟁 상태가 발생할 수 있다.
      동기화는 공유 객체의 임계 영역을 보호하는 방식으로 적용한다.
      예제에서는 세 스레드가 같은 `Account` 객체에 입금한다.
    tags: [chapter:12, thread, shared-resource]

  - id: b12-10
    type: multiple-choice
    prompt: 스레드 동기화를 위해 프로그램에서 어디를 어떻게 수정해야 하는가? 맞는 것을 고르시오.
    choices:
      - { id: '1', text: '1번 라인을 `synchronized class Account {`로 수정한다.' }
      - { id: '2', text: '3번 라인을 `void deposit(int amount) throws IOException {`로 수정한다.' }
      - { id: '3', text: '3번 라인을 `synchronized void deposit(int amount) {`로 수정한다.' }
      - { id: '4', text: '10번 라인을 `synchronized class Customer extends Thread {`로 수정한다.' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 클래스 선언에 `synchronized`를 붙일 수 없다.
      선택지 2 (오답): 예외 선언은 동기화를 제공하지 않는다.
      선택지 3 (정답): 공유 자원을 변경하는 `deposit` 메소드를 `synchronized`로 선언하면 상호 배제를 보장할 수 있다.
      선택지 4 (오답): 스레드 클래스 선언에 `synchronized`를 붙이는 방식은 올바르지 않다.

      핵심 개념:
      동기화는 공유 상태를 변경하는 코드에 적용해야 한다.
      Java에서는 메소드 선언에 `synchronized`를 붙일 수 있다.
      인스턴스 synchronized 메소드는 같은 객체에 대해 한 번에 하나의 스레드만 실행된다.
      공유 객체의 상태 변경 메소드가 임계 영역이 된다.
    tags: [chapter:12, synchronized]

  - id: b12-11
    type: multiple-choice
    prompt: 모든 송금을 마친 후 은행계좌의 최종 잔액을 출력하려 한다. main() 메소드에서 밑줄이 있는 24번 줄에 어떤 문장을 삽입해야 하는가?
    choices:
      - { id: '1', text: 't1.wait(); t2.wait(); t3.wait();' }
      - { id: '2', text: 't1.notify(); t2.notify(); t3.notify();' }
      - { id: '3', text: 't1.sleep(); t2.sleep(); t3.sleep();' }
      - { id: '4', text: 't1.join(); t2.join(); t3.join();' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): `wait()`는 모니터 소유와 예외 처리 조건이 필요하며 스레드 종료 대기 용도가 아니다.
      선택지 2 (오답): `notify()`는 대기 중인 스레드를 깨우는 기능이다.
      선택지 3 (오답): `sleep()`은 현재 스레드를 잠시 멈추는 기능이지 대상 스레드 종료 대기가 아니다.
      선택지 4 (정답): `join()`은 대상 스레드가 종료될 때까지 현재 스레드를 기다리게 한다.

      핵심 개념:
      `join()`은 다른 스레드의 종료를 기다릴 때 사용한다.
      최종 결과를 출력하기 전에 작업 스레드들이 모두 끝났는지 보장해야 한다.
      `wait`/`notify`는 객체 모니터 기반 협력 제어에 사용된다.
      `sleep`은 현재 실행 중인 스레드를 일정 시간 멈춘다.
    tags: [chapter:12, thread, join]

  - id: b12-12
    type: multiple-choice
    prompt: '[문제 11]에서 join() 메소드를 호출하려면 이것 역시 예외처리 또는 예외 전파가 필요하다. 다음 중 가장 적당한 것은?'
    choices:
      - {
          id: '1',
          text: '17번 라인을 `class TVContribution throws InterruptedException {`로 수정한다.',
        }
      - {
          id: '2',
          text: '18번 라인을 `public static void main(String args[]) catch InterruptedException {`로 수정한다.',
        }
      - {
          id: '3',
          text: '18번 라인을 `public static void main(String args[]) throws InterruptedException {`로 수정한다.',
        }
      - { id: '4', text: '24번 라인을 `try { ________ }`로 수정한다.' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 클래스 선언부에 이런 방식으로 예외를 전파하지 않는다.
      선택지 2 (오답): 메소드 선언부에 `catch`를 붙이는 문법은 없다.
      선택지 3 (정답): 메소드 선언부에 `throws InterruptedException`을 붙여 예외를 전파할 수 있다.
      선택지 4 (오답): `try`만으로는 충분하지 않고 `catch` 또는 `finally` 등 완전한 예외 처리 구문이 필요하다.

      핵심 개념:
      `join()`은 `InterruptedException` 처리가 필요한 메소드이다.
      checked 예외는 `try-catch`로 처리하거나 `throws`로 전파해야 한다.
      예외 전파는 메소드 선언부의 `throws` 절에 작성한다.
      `catch`는 메소드 선언부가 아니라 `try` 블록 뒤에 작성한다.
    tags: [chapter:12, exception, thread]

  - id: b13-03
    type: multiple-choice
    prompt: DBMS와 연동하여 SQL 질의를 실행하는 프로그램을 작성하려고 한다. 다음 중 올바른 절차는?
    choices:
      - {
          id: '1',
          text: 'DBMS와 연결 → SQL 질의 실행 → Statement 객체 생성 → ResultSet 객체 처리 → 연결 종료',
        }
      - {
          id: '2',
          text: 'DBMS와 연결 → Statement 객체 생성 → SQL 질의 실행 → ResultSet 객체 처리 → 연결 종료',
        }
      - {
          id: '3',
          text: 'DBMS와 연결 → ResultSet 객체 처리 → Statement 객체 생성 → SQL 질의 실행 → 연결 종료',
        }
      - {
          id: '4',
          text: 'DBMS와 연결 → Statement 객체 생성 → ResultSet 객체 처리 → SQL 질의 실행 → 연결 종료',
        }
    answers: ['2']
    explanation: |
      선택지 1 (오답): SQL 실행 전에 `Statement` 객체를 먼저 생성해야 한다.
      선택지 2 (정답): 연결을 얻고, `Statement`를 생성한 뒤 SQL을 실행하고 결과를 처리한 후 연결을 종료한다.
      선택지 3 (오답): `ResultSet`은 SQL 실행 결과이므로 실행 전에 처리할 수 없다.
      선택지 4 (오답): 결과 집합은 SQL 실행 후에 얻어진다.

      핵심 개념:
      JDBC는 데이터베이스 연결, 명령 객체 생성, SQL 실행, 결과 처리 순서로 사용한다.
      `Connection`은 DBMS와의 연결을 나타낸다.
      `Statement` 또는 `PreparedStatement`로 SQL을 실행한다.
      `ResultSet`은 select 질의의 결과를 표현한다.
    tags: [chapter:13, jdbc]

  - id: b13-08
    type: multiple-choice
    prompt: Statement 또는 PreparedStatement 객체를 통해 executeQuery()를 호출할 때 리턴되는 객체는 다음 중 무엇인가?
    choices:
      - { id: '1', text: 'Connection 객체' }
      - { id: '2', text: 'ResultSet 객체' }
      - { id: '3', text: 'Statement 객체' }
      - { id: '4', text: 'PreparedStatement 객체' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): `Connection`은 데이터베이스 연결 객체이다.
      선택지 2 (정답): `executeQuery()`는 select 결과를 담은 `ResultSet`을 반환한다.
      선택지 3 (오답): `Statement`는 SQL 실행을 위한 객체이다.
      선택지 4 (오답): `PreparedStatement`는 미리 컴파일된 SQL 실행 객체이다.

      핵심 개념:
      `executeQuery()`는 조회 질의에 사용한다.
      조회 결과는 행과 열을 가진 `ResultSet`으로 표현된다.
      데이터 변경 질의에는 보통 `executeUpdate()`를 사용한다.
      SQL 실행 객체와 결과 객체의 역할을 구분해야 한다.
    tags: [chapter:13, jdbc, result-set]

  - id: b13-10
    type: multiple-choice
    prompt: 다음 중 select 구문을 실행하기 위해 밑줄 ㉠에 들어가야 할 메소드는 무엇인가?
    choices:
      - { id: '1', text: 'executeUpdate' }
      - { id: '2', text: 'executeQuery' }
      - { id: '3', text: 'prepareUpdate' }
      - { id: '4', text: 'prepareQuery' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): `executeUpdate`는 insert, update, delete 같은 변경 질의에 주로 사용한다.
      선택지 2 (정답): select 구문을 실행하고 `ResultSet`을 반환하려면 `executeQuery()`를 사용한다.
      선택지 3 (오답): JDBC 표준 메소드가 아니다.
      선택지 4 (오답): JDBC 표준 메소드가 아니다.

      핵심 개념:
      select 질의는 결과 집합을 반환한다.
      `executeQuery()`는 조회 결과를 `ResultSet`으로 돌려준다.
      변경 질의에는 `executeUpdate()`가 적합하다.
      메소드 이름과 SQL 질의 종류를 맞춰 사용해야 한다.
    tags: [chapter:13, jdbc, execute-query]

  - id: b13-11
    type: multiple-choice
    prompt: 위 프로그램에서 객체 rs는 select 구문의 실행 결과를 가진다. 이것의 유형으로 적당한 것은 다음 중 무엇인가?
    choices:
      - { id: '1', text: 'Connection' }
      - { id: '2', text: 'Statement' }
      - { id: '3', text: 'ResultSet' }
      - { id: '4', text: 'PreparedStatement' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): `Connection`은 데이터베이스 연결 객체이다.
      선택지 2 (오답): `Statement`는 SQL을 실행하는 객체이다.
      선택지 3 (정답): select 실행 결과 테이블은 `ResultSet` 객체로 다룬다.
      선택지 4 (오답): `PreparedStatement`는 SQL 실행을 위한 객체이다.

      핵심 개념:
      JDBC에서 조회 결과는 `ResultSet`에 담긴다.
      `ResultSet`은 커서를 이동하며 행 단위로 값을 읽는다.
      각 열 값은 `getString`, `getInt` 같은 메소드로 가져온다.
      연결, 실행 객체, 결과 객체의 역할이 서로 다르다.
    tags: [chapter:13, jdbc, result-set]

