      선택지 4 (오답): `collect()`도 종료 연산이지만 원본 문제의 정답 기준은 `forEach()`이다.

      핵심 개념:
      스트림 연산은 중간 연산과 종료 연산으로 나뉜다.
      중간 연산은 새 스트림을 반환하며 지연 실행된다.
      종료 연산은 스트림 파이프라인을 실제로 실행한다.
