      핵심 개념:
      `String`의 `equals`는 문자열 내용을 비교한다.
      `==`는 두 참조가 같은 객체를 가리키는지 비교한다.
      문자열 리터럴은 문자열 풀에서 공유될 수 있다.
      `new String(...)`은 같은 내용을 가져도 별도 객체를 생성한다.
