      - { id: '4', text: 'final이면서 abstract 메소드' }
    answers: ['1', '2', '4']
    explanation: |
      선택지 1 (정답): `final` 클래스는 상속될 수 없고 `abstract` 클래스는 상속되어 구현되어야 하므로 함께 사용할 수 없다.
      선택지 2 (정답): Java에는 `abstract` 필드라는 개념이 없으므로 잘못되었다.
      선택지 3 (오답): `public synchronized` 메소드는 사용할 수 있다.
      선택지 4 (정답): `final` 메소드는 재정의할 수 없고 `abstract` 메소드는 하위 클래스에서 구현되어야 하므로 함께 사용할 수 없다.

      핵심 개념:
      `final`은 상속이나 재정의를 막는 성격을 가진다.
      `abstract`는 하위 클래스에서 구현이 필요하다는 뜻이다.
      두 성격은 클래스나 메소드에서 충돌할 수 있다.
      필드는 메소드처럼 `abstract`로 선언할 수 없다.
