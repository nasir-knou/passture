  - id: b03-12
    type: multiple-choice
    prompt: |
      다음 코드를 보면 People 객체를 생성한 후, 메소드 체이닝 기법으로 3개 필드에 값을 연속적으로 설정하였다. People 클래스에서 setAge() 메소드의 정의로 적당한 것은?

