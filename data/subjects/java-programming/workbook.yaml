      선택지 2 (정답): `NullPointerException`은 `RuntimeException` 계열로 반드시 처리하지 않아도 된다.
      선택지 3 (정답): `IndexOutOfBoundsException`도 `RuntimeException` 계열이다.
      선택지 4 (오답): `IOException`은 checked 예외이므로 처리하거나 전파해야 한다.

      핵심 개념:
      Java 예외는 checked 예외와 unchecked 예외로 나눌 수 있다.
      checked 예외는 컴파일러가 처리 여부를 검사한다.
      `RuntimeException`의 하위 예외는 보통 반드시 처리하지 않아도 된다.
      입출력 관련 `IOException`은 대표적인 checked 예외이다.
