      People p = new People();
      p.setName("홍길동").setAge(30).setAddress("서울");
      ```
    choices:
      - { id: '1', text: 'public void setAge(int age) { this.age = age; }' }
      - { id: '2', text: 'public int setAge(int age) { this.age = age; return age; }' }
      - { id: '3', text: 'public People setAge(int age) { age = age; return this; }' }
      - { id: '4', text: 'public People setAge(int age) { this.age = age; return this; }' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 반환 타입이 `void`라 다음 메소드를 이어서 호출할 수 없다.
      선택지 2 (오답): `int`를 반환하면 `setAddress`를 이어 호출할 수 없다.
      선택지 3 (오답): `return this`는 맞지만 `this.age`가 아니라 매개변수 `age` 자신에 대입하고 있다.
      선택지 4 (정답): 필드 값을 설정하고 현재 객체 `this`를 반환하므로 메소드 체이닝이 가능하다.

      핵심 개념:
      메소드 체이닝은 메소드 호출 결과로 다시 객체를 반환해 연속 호출하는 방식이다.
      같은 객체에서 다음 메소드를 호출하려면 `this`를 반환하면 된다.
      필드와 매개변수 이름이 같을 때는 `this.field`로 필드를 명확히 지정한다.
      `void`나 기본형 값을 반환하면 같은 객체의 다음 메소드를 체이닝할 수 없다.
    tags: [chapter:03, method-chaining, this]

  - id: b04-01
