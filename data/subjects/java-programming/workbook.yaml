      ```java
      module mymodule {
          requires ________;
          exports com.example.mypackage;
      }
      ```
    choices:
      - { id: '1', text: '의존하고 있는 다른 모듈의 이름' }
      - { id: '2', text: '의존하고 있는 다른 패키지의 이름' }
      - { id: '3', text: '외부 클라이언트에게 제공할 모듈의 이름' }
      - { id: '4', text: '외부 클라이언트에게 제공할 패키지의 이름' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): `requires` 뒤에는 현재 모듈이 의존하는 다른 모듈의 이름이 온다.
      선택지 2 (오답): `requires`는 패키지가 아니라 모듈 의존성을 선언한다.
      선택지 3 (오답): 외부에 제공할 모듈 이름을 쓰는 구문이 아니다.
      선택지 4 (오답): 외부에 공개할 패키지는 `exports` 뒤에 작성한다.

      핵심 개념:
      Java 모듈은 `module-info.java` 파일에서 정의한다.
      `requires`는 필요한 다른 모듈을 선언한다.
      `exports`는 외부에서 접근 가능한 패키지를 선언한다.
      `java.base` 모듈은 기본으로 의존하므로 명시하지 않아도 된다.
    tags: [chapter:14, module]
