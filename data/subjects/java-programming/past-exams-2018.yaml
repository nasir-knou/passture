questions:
  - id: e18-01
    type: multiple-choice
    prompt: Java 프로그램을 실습하기 위해 필요한 것이 아닌 것은?
    choices:
      - { id: '1', text: 'Java Platform' }
      - { id: '2', text: 'Java VM' }
      - { id: '3', text: 'JDK' }
      - { id: '4', text: 'Eclipse for JavaScript' }
    answers: ['4']
    explanation: |
      선택지 1: Java 실행 환경과 API가 포함되는 플랫폼이므로 필요하다.
      선택지 2: Java 바이트코드 실행에는 JVM이 필요하다.
      선택지 3: 컴파일과 개발에는 JDK가 필요하다.
      선택지 4: JavaScript용 Eclipse는 Java 실습 필수 도구가 아니다.

      핵심 개념:
      Java 개발에는 JDK와 실행 환경이 필요하다.
      JVM은 플랫폼 독립적인 실행을 담당한다.
      IDE는 선택 도구지만 Java용 환경이어야 한다.
      Java와 JavaScript는 이름이 비슷하지만 서로 다른 언어다.
    tags: [java-platform]

  - id: e18-02
    type: multiple-choice
    prompt: 배열을 사용하는 다음 문장 중 잘못된 것은?
    choices:
      - { id: '1', text: 'int[] a = new int[10];' }
      - { id: '2', text: 'int b[] = {1, 2, 3, 4};' }
      - { id: '3', text: 'int[] c; c = {1, 2, 3, 4};' }
      - { id: '4', text: 'int[][] d = new int[10][];' }
    answers: ['3']
    explanation: |
      선택지 1: 1차원 int 배열 생성으로 올바르다.
      선택지 2: 선언과 동시에 초기화하므로 올바르다.
      선택지 3: 배열 초기화 축약형은 선언과 동시에만 사용할 수 있어 잘못됐다.
      선택지 4: 2차원 가변 배열의 첫 차원 생성으로 올바르다.

      핵심 개념:
      배열 초기화 목록은 선언문과 함께 사용할 때 가장 간단하다.
      이미 선언된 배열 변수에는 new int[]{...} 형태가 필요하다.
      Java의 2차원 배열은 배열의 배열이다.
      일부 차원만 먼저 생성하는 것도 가능하다.
    tags: [array]

  - id: e18-03
    type: multiple-choice
    prompt: int형 변수 i와 j 값을 각각 출력하기 위해 적당한 출력문은 무엇인가?
    choices:
      - { id: '1', text: 'System.out.println(i + j);' }
      - { id: '2', text: 'System.out.println(i + " " + j);' }
      - { id: '3', text: 'System.out.println(i, j);' }
      - { id: '4', text: 'System.out.println(i, "=", j);' }
    answers: ['2']
    explanation: |
      선택지 1: 두 정수를 더한 합만 출력한다.
      선택지 2: 문자열 연결을 이용해 두 값을 구분해 출력하므로 맞다.
      선택지 3: println은 이런 형태의 두 인자 호출을 제공하지 않는다.
      선택지 4: println은 여러 인자를 쉼표로 받을 수 없다.

      핵심 개념:
      println은 기본적으로 하나의 인자를 출력한다.
      여러 값을 한 줄에 출력하려면 문자열 연결을 사용한다.
      정수끼리의 +는 산술 덧셈이다.
      문자열이 포함된 +는 문자열 연결로 평가된다.
    tags: [output, expression]

  - id: e18-04
    type: multiple-choice
    passageRefs: [g18-inheritance-options-01]
    prompt: B와 C가 클래스이고 Y와 Z가 인터페이스라고 가정할 때, 올바른 것을 모두 고른 것은?
    choices:
      - { id: '1', text: 'a, b' }
      - { id: '2', text: 'a, d' }
      - { id: '3', text: 'c' }
      - { id: '4', text: 'c, d' }
    answers: ['4']
    explanation: |
      선택지 1: 클래스 다중 상속 a와 클래스 뒤 인터페이스를 extends한 b는 잘못됐다.
      선택지 2: a가 잘못됐다.
      선택지 3: c는 맞지만 d도 맞다.
      선택지 4: 클래스가 인터페이스 Y, Z를 implements하는 c와 인터페이스가 Y, Z를 extends하는 d가 모두 맞다.

      핵심 개념:
      Java 클래스는 하나의 클래스만 extends할 수 있다.
      클래스는 여러 인터페이스를 implements할 수 있다.
      인터페이스는 여러 인터페이스를 extends할 수 있다.
      클래스와 인터페이스가 섞일 때 키워드 선택이 중요하다.
    tags: [inheritance, interface]

  - id: e18-05
    type: multiple-choice
    passageRefs: [g18-overriding-options-01]
    prompt: 부모 클래스의 `protected double compute(int x, int y)`를 서브 클래스에서 재정의하기 위한 메소드 형식으로 적합한 것을 모두 고른 것은?
    choices:
      - { id: '1', text: 'a' }
      - { id: '2', text: 'a, b' }
      - { id: '3', text: 'a, b, c' }
      - { id: '4', text: 'c, d' }
    answers: ['2']
    explanation: |
      선택지 1: a는 접근 수준, 반환형, 매개변수가 모두 같아 재정의 가능하지만 b도 가능하다.
      선택지 2: b는 public으로 접근 범위를 넓힌 재정의라 가능하므로 맞다.
      선택지 3: c는 반환형이 int로 달라 불가능하다.
      선택지 4: c는 반환형 오류, d는 private이고 매개변수도 달라 오버라이딩이 아니다.

      핵심 개념:
      오버라이딩은 메소드 이름과 매개변수 목록이 같아야 한다.
      반환형은 같거나 공변 반환형이어야 한다.
      접근 범위는 부모보다 좁아질 수 없다.
      매개변수가 달라지면 오버로딩이지 오버라이딩이 아니다.
    tags: [overriding]

  - id: e18-06
    type: multiple-choice
    passageRefs: [g18-anonymous-class-01]
    prompt: 굵게 표시된 객체 생성 구문의 의미를 바르게 설명한 것은?
    choices:
      - { id: '1', text: 'CSuper 클래스를 정의하며 동시에 객체를 생성한다.' }
      - {
          id: '2',
          text: 'CSuper 인터페이스를 구현하는 익명 클래스를 정의하며 동시에 객체를 생성한다.',
        }
      - { id: '3', text: 'CSuper 클래스를 상속받는 익명 클래스를 정의하며 동시에 객체를 생성한다.' }
      - { id: '4', text: 'CSuper 클래스를 매개변수화하였으며 객체 생성 시 자료형을 제공한다.' }
    answers: ['3']
    explanation: |
      선택지 1: 기존 CSuper 클래스를 다시 정의하는 것이 아니다.
      선택지 2: CSuper는 인터페이스가 아니라 클래스다.
      선택지 3: CSuper를 상속한 익명 클래스를 만들고 즉시 객체를 생성하므로 맞다.
      선택지 4: 제네릭 매개변수화와 관련 없다.

      핵심 개념:
      익명 클래스는 이름 없이 즉석에서 하위 타입을 정의한다.
      `new CSuper() { ... }`는 CSuper의 익명 하위 클래스를 만든다.
      익명 클래스도 메소드 재정의와 멤버 추가가 가능하다.
      제네릭 타입 매개변수와 익명 클래스 문법은 다른 개념이다.
    tags: [anonymous-class]

  - id: e18-07
    type: multiple-choice
    passageRefs: [g18-anonymous-class-01]
    prompt: AnonymousTest.java를 컴파일하면 몇 개의 클래스 파일이 생성되는가?
    choices:
      - { id: '1', text: '1개' }
      - { id: '2', text: '2개' }
      - { id: '3', text: '3개' }
      - { id: '4', text: '4개' }
    answers: ['3']
    explanation: |
      선택지 1: public 클래스 외에 CSuper와 익명 클래스가 있어 부족하다.
      선택지 2: 익명 클래스 파일을 빠뜨렸다.
      선택지 3: CSuper, AnonymousTest, 익명 클래스 파일이 생성되어 맞다.
      선택지 4: 별도 네 번째 클래스는 없다.

      핵심 개념:
      하나의 소스 파일에 여러 클래스가 있으면 각 클래스별 .class 파일이 생성된다.
      익명 클래스도 컴파일 시 별도 클래스 파일로 만들어진다.
      public 클래스 이름은 소스 파일 이름과 일치해야 한다.
      익명 클래스 파일은 보통 바깥클래스$1.class 형식이다.
    tags: [compile, anonymous-class]

  - id: e18-08
    type: multiple-choice
    prompt: 추상 클래스 또는 인터페이스에 관한 일반적 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: '의미적으로 유사한 클래스를 묶고자 할 때 추상 클래스를 사용한다.' }
      - { id: '2', text: '인터페이스와 다르게 추상 클래스는 인스턴스를 생성시킬 수 있다.' }
      - { id: '3', text: '인터페이스는 public static final인 데이터 필드만 포함할 수 있다.' }
      - { id: '4', text: '추상 클래스나 인터페이스는 자식 클래스로 상속되어 사용된다.' }
    answers: ['2']
    explanation: |
      선택지 1: 추상 클래스는 공통 성격을 묶는 부모 타입으로 쓸 수 있다.
      선택지 2: 추상 클래스도 직접 인스턴스화할 수 없으므로 잘못됐다.
      선택지 3: 인터페이스 필드는 암묵적으로 public static final이다.
      선택지 4: 추상 클래스는 상속, 인터페이스는 구현을 통해 사용된다.

      핵심 개념:
      추상 클래스와 인터페이스는 직접 객체 생성보다 타입 설계에 사용된다.
      추상 클래스는 일반 필드와 구현 메소드를 가질 수 있다.
      인터페이스는 구현 클래스가 지켜야 할 규약을 정의한다.
      둘 다 하위 타입을 통해 실제 객체가 만들어진다.
    tags: [abstract-class, interface]

  - id: e18-09
    type: multiple-choice
    prompt: '`Data`가 제네릭 클래스일 때 `Data<int> d = new Data<>();` 문장의 문제점을 바르게 설명한 것은?'
    choices:
      - { id: '1', text: '제네릭 클래스의 타입 매개변수로 기본 자료형을 사용할 수 없다.' }
      - { id: '2', text: '대입 연산자의 우측에 있는 <>를 <int>로 바꾸어야 한다.' }
      - { id: '3', text: 'Raw 타입을 사용하는 경우 타입 매개변수는 Object이어야 한다.' }
      - { id: '4', text: '문제가 없다.' }
    answers: ['1']
    explanation: |
      선택지 1: 제네릭 타입 인자에는 참조형만 올 수 있으므로 int는 사용할 수 없다.
      선택지 2: 오른쪽 diamond 문제가 아니라 왼쪽의 기본형 타입 인자가 문제다.
      선택지 3: Raw 타입 설명과 맞지 않는다.
      선택지 4: 컴파일 문제가 있으므로 틀렸다.

      핵심 개념:
      Java 제네릭 타입 인자는 참조형이어야 한다.
      기본형 int 대신 Integer 같은 wrapper 타입을 사용한다.
      diamond 연산자는 왼쪽 타입 인자를 추론한다.
      Raw 타입은 타입 인자를 생략한 오래된 방식이다.
    tags: [generics]

  - id: e18-10
    type: multiple-choice
    passageRefs: [g18-string-identity-01]
    prompt: 보기의 내용이 밑줄 부분에 들어간다고 할 때, 결과가 다른 하나는 무엇인가?
    choices:
      - { id: '1', text: 'str1==str2' }
      - { id: '2', text: 'str2==str3' }
      - { id: '3', text: 'str1.equals(str2)' }
      - { id: '4', text: 'str2.equals(str3)' }
    answers: ['2']
    explanation: |
      선택지 1: str2는 str1을 대입받아 같은 객체를 참조하므로 true다.
      선택지 2: str3은 같은 문자열 내용이지만 new로 만든 별도 객체라 == 결과가 false다.
      선택지 3: 같은 객체의 내용 비교라 true다.
      선택지 4: 내용이 Java로 같아 equals는 true다.

      핵심 개념:
      `==`는 참조 타입에서 같은 객체인지 비교한다.
      equals는 보통 객체의 의미상 내용을 비교한다.
      new String은 같은 내용이라도 별도 객체를 만든다.
      문자열 내용 비교에는 equals를 사용해야 한다.
    tags: [string, equality]

  - id: e18-11
    type: multiple-choice
    prompt: String과 StringBuffer 클래스에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'String 클래스는 문자열의 비교, 검색, 추출 메소드를 제공한다.' }
      - {
          id: '2',
          text: '문자열을 빈번하게 변경하는 프로그램에서는 String 클래스를 사용하는 것이 좋다.',
        }
      - { id: '3', text: 'StringBuffer 클래스는 문자열의 삽입, 삭제, 대체 메소드를 제공한다.' }
      - { id: '4', text: 'StringBuffer 객체는 내부적으로 문자열 저장을 위한 버퍼를 가진다.' }
    answers: ['2']
    explanation: |
      선택지 1: String은 다양한 문자열 처리 메소드를 제공한다.
      선택지 2: String은 불변이라 빈번한 변경에는 부적합하므로 잘못됐다.
      선택지 3: StringBuffer는 가변 문자열 조작 메소드를 제공한다.
      선택지 4: 내부 버퍼를 이용해 문자열을 변경한다.

      핵심 개념:
      String은 불변 문자열 클래스다.
      StringBuffer는 가변 문자열 버퍼를 제공한다.
      삽입, 삭제, 대체가 많으면 가변 문자열 클래스가 효율적이다.
      불변성과 가변성은 성능과 사용 방식에 영향을 준다.
    tags: [string, string-buffer]

  - id: e18-12
    type: multiple-choice
    prompt: 파일을 데이터 소스로 하여 바이트 단위 입력을 수행할 때 필요한 클래스는 무엇인가?
    choices:
      - { id: '1', text: 'FileReader' }
      - { id: '2', text: 'FileInputStream' }
      - { id: '3', text: 'File' }
      - { id: '4', text: 'Path' }
    answers: ['2']
    explanation: |
      선택지 1: FileReader는 문자 입력 스트림이다.
      선택지 2: FileInputStream은 파일에서 바이트 단위로 읽으므로 맞다.
      선택지 3: File은 파일 경로/메타데이터 객체에 가깝다.
      선택지 4: Path는 경로 표현 객체다.

      핵심 개념:
      바이트 입력은 InputStream 계열을 사용한다.
      문자 입력은 Reader 계열을 사용한다.
      FileInputStream은 파일을 바이트 데이터 소스로 다룬다.
      File과 Path는 입출력 스트림 자체가 아니다.
    tags: [io, input-stream]

  - id: e18-13
    type: multiple-choice
    passageRefs: [g18-file-channel-01]
    prompt: 아래 프로그램 조각에서 명시적으로 나타나 있지 않은 내용은 무엇인가?
    choices:
      - { id: '1', text: 'charset에 지정된 문자 세트로 문자열을 인코딩한다.' }
      - { id: '2', text: '인코딩된 문자열을 buffer에 저장한다.' }
      - { id: '3', text: 'buffer에 저장된 데이터를 파일에 기록한다.' }
      - { id: '4', text: '파일에 있는 데이터를 읽어 buffer에 기록한다.' }
    answers: ['4']
    explanation: |
      선택지 1: charset.encode(data[i])가 명시되어 있다.
      선택지 2: encode 결과를 buffer에 대입한다.
      선택지 3: fileChannel.write(buffer)가 버퍼 내용을 기록한다.
      선택지 4: 파일에서 읽는 read 동작은 보이지 않는다.

      핵심 개념:
      Charset은 문자열을 바이트 버퍼로 인코딩할 수 있다.
      ByteBuffer는 채널 입출력의 데이터 단위로 쓰인다.
      FileChannel.write는 버퍼 내용을 파일 채널에 쓴다.
      읽기와 쓰기는 메소드와 데이터 흐름이 다르다.
    tags: [nio, file-channel]

  - id: e18-14
    type: multiple-choice
    prompt: 수학에서 집합의 의미와 같이 자료의 순서는 의미가 없으며 중복을 허용하지 않는 자료를 관리하기 위한 컬렉션 인터페이스는 무엇인가?
    choices:
      - { id: '1', text: 'Set' }
      - { id: '2', text: 'List' }
      - { id: '3', text: 'Queue' }
      - { id: '4', text: 'Map' }
    answers: ['1']
    explanation: |
      선택지 1: Set은 중복을 허용하지 않는 집합형 컬렉션이라 맞다.
      선택지 2: List는 순서가 있고 중복을 허용한다.
      선택지 3: Queue는 대기열 처리에 사용한다.
      선택지 4: Map은 키-값 쌍을 저장한다.

      핵심 개념:
      Set은 수학적 집합에 가까운 컬렉션이다.
      중복 원소를 저장하지 않는다.
      List는 순서와 인덱스가 중요하다.
      Map은 Collection 하위는 아니지만 키 기반 자료구조로 함께 다뤄진다.
    tags: [collection, set]

  - id: e18-15
    type: multiple-choice
    prompt: 컬렉션 인터페이스 또는 클래스의 사용 예를 보여주는 보기 중 잘못된 것은?
    choices:
      - { id: '1', text: 'Set<Integer> set = new HashSet<>();' }
      - { id: '2', text: 'List<Integer> set = new ArrayList<Integer>();' }
      - { id: '3', text: 'Queue<Integer> set = new LinkedList<>();' }
      - { id: '4', text: 'Map<String> set = new HashMap<>();' }
    answers: ['4']
    explanation: |
      선택지 1: HashSet은 Set 구현체라 맞다.
      선택지 2: 변수명은 set이지만 타입과 구현체 조합은 가능하다.
      선택지 3: LinkedList는 Queue 구현체로도 사용할 수 있다.
      선택지 4: Map은 키와 값 두 타입 인자가 필요하므로 Map<String>은 잘못됐다.

      핵심 개념:
      제네릭 컬렉션은 인터페이스 타입 변수에 구현 객체를 대입할 수 있다.
      Set, List, Queue는 원소 타입 하나를 받는다.
      Map은 키 타입과 값 타입 두 개가 필요하다.
      변수명보다 선언 타입과 생성 타입의 호환성이 중요하다.
    tags: [collection, generics]

  - id: e18-16
    type: multiple-choice
    passageRefs: [g18-thread-join-01]
    prompt: 굵은 글씨로 표시된 Thread.yield()의 기능을 바르게 설명한 것은?
    choices:
      - { id: '1', text: '현재 스레드의 우선 순위를 낮추어 이름을 교대로 출력시킨다.' }
      - { id: '2', text: '현재 스레드가 잠시 CPU를 양보함으로써 이름을 교대로 출력시킨다.' }
      - {
          id: '3',
          text: '한 스레드가 이름을 10회 모두 출력시킨 후, 다음 스레드가 이름을 출력하게 한다.',
        }
      - { id: '4', text: '문자열 "finished"를 가장 마지막에 출력시킨다.' }
    answers: ['2']
    explanation: |
      선택지 1: yield는 우선순위 변경 메소드가 아니다.
      선택지 2: 현재 스레드가 실행 기회를 양보한다는 설명이 가장 적절하다.
      선택지 3: 이런 순차 완료는 yield가 보장하지 않는다.
      선택지 4: finished의 마지막 출력은 join이 담당한다.

      핵심 개념:
      yield는 현재 스레드가 CPU를 양보하겠다는 힌트다.
      스케줄러가 반드시 교대로 실행하게 보장하지는 않는다.
      우선순위 변경과 yield는 다르다.
      작업 완료 대기는 join으로 처리한다.
    tags: [thread, yield]

  - id: e18-17
    type: multiple-choice
    passageRefs: [g18-thread-join-01]
    prompt: 굵은 글씨로 표시된 my_thread1.join()과 my_thread2.join()의 기능을 바르게 설명한 것은?
    choices:
      - {
          id: '1',
          text: '중단되었던 메인 스레드를 깨워 실행 가능한 상태로 만듦으로써 "finished"를 가장 처음에 출력시킨다.',
        }
      - {
          id: '2',
          text: '두 스레드가 자발적으로 CPU를 양보함으로써 "finished"를 마지막에 출력시킨다.',
        }
      - {
          id: '3',
          text: '두 스레드가 종료될 때까지 기다린 후, 메인 스레드가 "finished"를 마지막에 출력시킨다.',
        }
      - { id: '4', text: '두 스레드가 공유하는 자원에의 배타적 접근을 보장한다.' }
    answers: ['3']
    explanation: |
      선택지 1: join은 메인 스레드를 깨우는 기능이 아니다.
      선택지 2: CPU 양보는 yield 설명이다.
      선택지 3: join은 대상 스레드 종료까지 기다리므로 맞다.
      선택지 4: 배타 접근 보장은 synchronized의 역할이다.

      핵심 개념:
      join은 특정 스레드가 끝날 때까지 현재 스레드를 대기시킨다.
      메인 스레드는 두 작업 스레드 종료 후 다음 문장을 실행한다.
      yield와 join은 목적이 다르다.
      join은 완료 순서 제어이지 공유 자원 동기화가 아니다.
    tags: [thread, join]

  - id: e18-18
    type: multiple-choice
    passageRefs: [g18-thread-join-01]
    prompt: 예외의 전파를 위해 밑줄 친 부분에 들어가야 할 내용으로 적당한 것은?
    choices:
      - { id: '1', text: 'throws' }
      - { id: '2', text: 'extends' }
      - { id: '3', text: 'throws ArithmeticException' }
      - { id: '4', text: 'throws InterruptedException' }
    answers: ['4']
    explanation: |
      선택지 1: throws 뒤에 예외 타입이 빠져 있다.
      선택지 2: extends는 상속 키워드다.
      선택지 3: join이 요구하는 예외 타입이 아니다.
      선택지 4: join은 InterruptedException 처리가 필요하므로 맞다.

      핵심 개념:
      checked exception은 catch하거나 throws로 전파해야 한다.
      Thread.join()은 InterruptedException을 발생시킬 수 있다.
      throws 절에는 구체적인 예외 타입을 적는다.
      상속 키워드와 예외 전파 키워드를 구분해야 한다.
    tags: [exception, thread]

  - id: e18-19
    type: multiple-choice
    passageRefs: [g18-awt-list-01]
    prompt: 다음 그림이 보여주는 AWT 컨트롤 클래스는 무엇인가?
    choices:
      - { id: '1', text: 'Button' }
      - { id: '2', text: 'Canvas' }
      - { id: '3', text: 'Choices' }
      - { id: '4', text: 'List' }
    answers: ['4']
    explanation: |
      선택지 1: Button은 누르는 단일 버튼이다.
      선택지 2: Canvas는 직접 그리기 영역이다.
      선택지 3: Choice는 드롭다운 선택 컨트롤에 가깝다.
      선택지 4: 여러 항목을 목록으로 보여주는 List 컨트롤이 맞다.

      핵심 개념:
      AWT List는 여러 항목을 세로 목록으로 표시한다.
      스크롤과 선택 기능을 제공할 수 있다.
      Choice는 펼침 목록 형태다.
      컴포넌트의 외형과 기능으로 클래스를 구분할 수 있다.
    tags: [awt, list]

  - id: e18-20
    type: multiple-choice
    passageRefs: [g18-awt-list-01]
    prompt: 위 문제의 그림에 나타나는 항목을 마우스로 선택(싱글 클릭)할 때와 더블 클릭할 때 발생하는 이벤트는 각각 무엇인가?
    choices:
      - { id: '1', text: 'ActionEvent, ItemEvent' }
      - { id: '2', text: 'ItemEvent, ActionEvent' }
      - { id: '3', text: 'KeyEvent, ActionEvent' }
      - { id: '4', text: 'ItemEvent, WindowEvent' }
    answers: ['2']
    explanation: |
      선택지 1: 싱글 선택과 더블 클릭 이벤트 순서가 반대다.
      선택지 2: List 항목 선택은 ItemEvent, 더블 클릭 액션은 ActionEvent로 볼 수 있어 맞다.
      선택지 3: 키 입력 이벤트가 아니다.
      선택지 4: 더블 클릭은 창 이벤트가 아니다.

      핵심 개념:
      AWT List에서 항목 선택 변화는 ItemEvent와 관련된다.
      항목 더블 클릭 같은 액션은 ActionEvent로 처리된다.
      KeyEvent는 키보드 입력 이벤트다.
      WindowEvent는 창 열기/닫기 같은 창 상태 변화 이벤트다.
    tags: [awt, event]

  - id: e18-21
    type: multiple-choice
    passageRefs: [g18-awt-gridlayout-01]
    prompt: 다음 그림을 보고 판단할 때, 프로그램에서 사용된 배치관리자는 무엇이라 생각되는가?
    choices:
      - { id: '1', text: 'GridLayout' }
      - { id: '2', text: 'FlowLayout' }
      - { id: '3', text: 'BorderLayout' }
      - { id: '4', text: 'ButtonAreaLayout' }
    answers: ['1']
    explanation: |
      선택지 1: 컴포넌트들이 행과 열의 격자 형태로 배치되어 GridLayout이 가장 적절하다.
      선택지 2: FlowLayout처럼 단순 한 줄 흐름이 아니다.
      선택지 3: BorderLayout의 5개 영역 구조가 아니다.
      선택지 4: 표준 AWT 배치관리자가 아니다.

      핵심 개념:
      GridLayout은 컨테이너를 행과 열의 동일한 셀로 나눈다.
      각 컴포넌트는 셀에 차례대로 배치된다.
      FlowLayout은 자연 흐름 배치다.
      BorderLayout은 방향 영역 중심 배치다.
    tags: [awt, layout]

  - id: e18-22
    type: multiple-choice
    passageRefs: [g18-window-event-01]
    prompt: 프레임 윈도우 우측 모서리에 있는 닫기 버튼을 눌렀을 때 윈도우를 종료시키려면 먼저 해당 리스너를 처리하는 클래스가 필요하다. 밑줄 ㄱ에 들어갈 내용으로 적당한 것은?
    choices:
      - { id: '1', text: 'implements WindowListener' }
      - { id: '2', text: 'implements WindowAdapter' }
      - { id: '3', text: 'extends WindowListener' }
      - { id: '4', text: 'extends WindowAdapter' }
    answers: ['4']
    explanation: |
      선택지 1: `implements WindowListener`는 인터페이스를 직접 구현하므로 원칙적으로 가능하지만, 이 코드처럼 `windowClosing`만 작성하면 WindowListener의 나머지 메소드도 모두 구현해야 해서 현재 코드 조각과 맞지 않는다.
      선택지 2: `WindowAdapter`는 클래스이므로 `implements` 대상이 아니다.
      선택지 3: `WindowListener`는 인터페이스이므로 `extends`로 상속할 수 없다.
      선택지 4: `WindowAdapter`를 상속하면 필요한 이벤트 메소드만 재정의할 수 있으므로 `windowClosing`만 둔 원문 코드와 맞다.

      핵심 개념:
      `WindowListener`는 여러 윈도우 이벤트 메소드를 가진 인터페이스이다.
      `WindowAdapter`는 그 메소드들을 빈 구현으로 제공하는 어댑터 클래스이다.
      필요한 이벤트 하나만 처리하려면 어댑터 클래스를 상속하고 해당 메소드만 오버라이딩하는 방식이 간단하다.
      원문 정답표도 57번의 정답을 4번으로 제시한다.
    tags: [awt, window-event]

  - id: e18-23
    type: multiple-choice
    passageRefs: [g18-window-event-01]
    prompt: 이벤트 등록을 위해 밑줄 ㄴ에 들어갈 내용은?
    choices:
      - { id: '1', text: 'addWindowListener(new MyListener())' }
      - { id: '2', text: 'addWindowListener(new MyFrame())' }
      - { id: '3', text: 'addWindowAdapter(new MyListener())' }
      - { id: '4', text: 'addWindowAdapter(new MyFrame())' }
    answers: ['1']
    explanation: |
      선택지 1: 프레임에 WindowListener 구현 객체를 등록하는 올바른 호출이다.
      선택지 2: MyFrame은 리스너 객체가 아니다.
      선택지 3: addWindowAdapter라는 등록 메소드는 표준 메소드가 아니다.
      선택지 4: 메소드와 인자 모두 맞지 않는다.

      핵심 개념:
      윈도우 이벤트 리스너 등록에는 addWindowListener를 사용한다.
      인자로는 WindowListener 구현 객체가 필요하다.
      이벤트 소스는 Frame 같은 윈도우 컴포넌트다.
      어댑터는 리스너 구현을 돕는 클래스이지 등록 메소드 이름이 아니다.
    tags: [awt, window-event]

  - id: e18-24
    type: multiple-choice
    passageRefs: [g18-jdbc-01]
    prompt: 위에서 굵은 글씨로 나타난 3개 문장의 의미를 순서대로 설명한 것은?
    choices:
      - { id: '1', text: 'Connection 객체 생성, Statement 객체 생성, DBMS와 연결' }
      - { id: '2', text: 'DBMS와 연결, SQL 질의 실행, SQL 결과 처리' }
      - { id: '3', text: 'DBMS와 연결, Statement 객체 생성, SQL 질의 실행' }
      - { id: '4', text: 'DBMS와 연결 종료, Statement 객체 생성, SQL 질의 실행' }
    answers: ['3']
    explanation: |
      선택지 1: getConnection은 DBMS 연결이지 단순 객체 생성만이 아니며 순서도 다르다.
      선택지 2: createStatement 단계를 빠뜨렸다.
      선택지 3: 연결, Statement 생성, 질의 실행 순서와 일치한다.
      선택지 4: 연결 종료가 아니라 연결 생성이다.

      핵심 개념:
      JDBC 작업은 연결 생성, 명령 객체 생성, SQL 실행 흐름으로 진행된다.
      DriverManager.getConnection은 DBMS 연결을 얻는다.
      Connection.createStatement는 SQL 실행용 Statement를 만든다.
      Statement.executeQuery는 SELECT 질의를 실행한다.
    tags: [jdbc]

  - id: e18-25
    type: multiple-choice
    passageRefs: [g18-jdbc-01]
    prompt: 마지막 문장에서 executeQuery()는 질의의 결과를 의미하는 테이블을 리턴한다. 리턴되는 객체의 유형은 무엇인가?
    choices:
      - { id: '1', text: 'ResultSet' }
      - { id: '2', text: 'ResultTable' }
      - { id: '3', text: 'Statement' }
      - { id: '4', text: 'StatementTable' }
    answers: ['1']
    explanation: |
      선택지 1: executeQuery는 SELECT 결과를 ResultSet으로 반환하므로 맞다.
      선택지 2: ResultTable은 표준 JDBC 타입이 아니다.
      선택지 3: Statement는 SQL 실행 객체다.
      선택지 4: StatementTable도 표준 타입이 아니다.

      핵심 개념:
      JDBC에서 SELECT 결과는 ResultSet으로 표현된다.
      ResultSet은 행 단위로 이동하며 컬럼 값을 읽는다.
      Statement는 SQL 실행을 담당한다.
      질의 실행 객체와 결과 객체를 구분해야 한다.
    tags: [jdbc, result-set]
