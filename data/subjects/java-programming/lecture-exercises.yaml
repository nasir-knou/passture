subjectId: java-programming
sourceId: lecture-exercises
title: Java프로그래밍 강의 연습문제
kind: lecture

passages:
  - id: g01-bytecode-platform
    type: text
    body: |
      똑같은 바이트코드가 Java 플랫폼이 설치된 다양한 하드웨어와 운영체제에서 수정 없이 실행될 수 있다.

  - id: g01-classes-source
    type: code
    language: java
    body: |
      public class A { }
      class B { }

  - id: g03-package-relation
    type: diagram
    diagram:
      type: simple-graph
      width: 480
      height: 230
      nodes:
        - { id: one-alpha, label: 'package one / Alpha', x: 120, y: 70 }
        - { id: one-beta, label: 'package one / Beta', x: 120, y: 160 }
        - { id: two-alphasub, label: 'package two / AlphaSub', x: 350, y: 70 }
        - { id: two-gamma, label: 'package two / Gamma', x: 350, y: 160 }
      edges:
        - { from: two-alphasub, to: one-alpha, label: '상속 관계', directed: true }

  - id: g04-circle-code
    type: code
    language: java
    body: |
      class Circle {
          ㉠
          private double radius;
          public Circle(double radius) {
              ㉡
          }
          public double getArea() {
              return radius * radius * PI;
          }
      }

  - id: g05-polymorph-code
    type: code
    language: java
    body: |
      class A {
          public void func() { System.out.print("A"); }
      }
      class B extends A {
          public void func() { System.out.print("B"); }
      }
      class C extends B {
      }
      public class PolymorphTest {
          public static void main(String args[]) {
              A a = new C();
              a.func();
          }
      }

  - id: g05-interface-code
    type: code
    language: java
    body: |
      interface Able { }
      interface B ㉠ Able { }
      class C ㉡ Able { }

  - id: g06-generic-data
    type: code
    language: java
    body: |
      class Data<T> {
          private T t;
          public void set(T t) { this.t = t; }
          public T get() { return t; }
      }

  - id: g06-lambda-interface
    type: code
    language: java
    body: |
      interface Addable {
          int add(int a, int b);
      }

  - id: g07-throws-code
    type: code
    language: java
    body: |
      public char getInput() ________ {
          int nInput = System.in.read();
          return (char)nInput;
      }

  - id: g08-string-code
    type: code
    language: java
    body: |
      public class Main {
          public static void main(String args[]) {
              String s = new String("Jovo");
              s.replace('o', 'a');
              s.concat("Exam");
              System.out.println(s);
          }
      }

  - id: g12-intstream-code
    type: code
    language: java
    body: |
      int[] numbers = {1, 2, 3, 4, 5};
      IntStream numberStream = ________________;

  - id: g12-stream-pipeline
    type: code
    language: java
    body: |
      List<String> words = Arrays.asList("banana", "orange", "grape", "strawberry", "kiwi");
      List<String> result = words.stream()
          ._____ (word -> word.length() >= 5)
          .map(str -> str.toUpperCase())
          .sorted()
          .collect(Collectors.toList());

      System.out.println(result);

questions:
  - id: l01-01
    type: multiple-choice
    prompt: Java 언어의 특징 중 다음 내용이 의미하는 것은?
    passageRefs: [g01-bytecode-platform]
    choices:
      - { id: '1', text: '엄격한 자료형의 검사' }
      - { id: '2', text: '플랫폼에 독립적' }
      - { id: '3', text: '예외처리 기능의 지원' }
      - { id: '4', text: '멀티 스레딩의 지원' }
    answers: ['2']
    explanation: |
      선택지 1: 엄격한 자료형 검사는 Java의 특징이지만 동일 바이트코드가 여러 환경에서 실행된다는 설명과 직접 대응하지 않는다.
      선택지 2: Java 바이트코드는 JVM 위에서 실행되므로 하드웨어와 운영체제 차이에 덜 의존한다.
      선택지 3: 예외처리는 오류 상황을 처리하는 기능으로, 실행 플랫폼 독립성과는 다른 특징이다.
      선택지 4: 멀티 스레딩은 동시 실행 기능을 뜻하며 바이트코드 이식성 설명이 아니다.

      핵심 개념:
      Java의 플랫폼 독립성은 소스 코드가 아니라 컴파일된 바이트코드와 JVM 실행 모델에서 나온다.
    tags: [chapter:01, java-platform, bytecode]

  - id: l01-02
    type: multiple-choice
    prompt: 다음 파일의 이름은 A.java이다. 이 파일을 컴파일할 때 결과로 만들어지는 것을 정확히 설명한 것은?
    passageRefs: [g01-classes-source]
    choices:
      - { id: '1', text: 'A.class만 생성된다.' }
      - { id: '2', text: 'B.class만 생성된다.' }
      - { id: '3', text: 'A.class와 B.class가 생성된다.' }
      - { id: '4', text: '오류가 있어 컴파일되지 않는다.' }
    answers: ['3']
    explanation: |
      선택지 1: public 클래스 A뿐 아니라 같은 파일의 package-private 클래스 B도 별도 class 파일로 컴파일된다.
      선택지 2: B만 생성되는 것이 아니라 A도 생성된다.
      선택지 3: 하나의 소스 파일에 있는 두 클래스는 각각 A.class와 B.class로 컴파일된다.
      선택지 4: public 클래스 이름과 파일 이름이 A로 일치하므로 컴파일 오류가 아니다.

      핵심 개념:
      Java 소스 파일에는 public 클래스가 하나만 있을 수 있고, public 클래스 이름은 파일명과 같아야 한다.
    tags: [chapter:01, class-file, compilation]

  - id: l02-01
    type: multiple-choice
    prompt: 다음 중 클래스 이름에 해당하지 않는 것은?
    choices:
      - { id: '1', text: 'Integer' }
      - { id: '2', text: 'String' }
      - { id: '3', text: 'System' }
      - { id: '4', text: 'boolean' }
    answers: ['4']
    explanation: |
      선택지 1: Integer는 기본형 int의 래퍼 클래스다.
      선택지 2: String은 문자열을 표현하는 클래스다.
      선택지 3: System은 표준 입출력 등 시스템 관련 멤버를 제공하는 클래스다.
      선택지 4: boolean은 클래스가 아니라 Java의 기본 자료형이다.

      핵심 개념:
      Java는 기본형과 참조형을 구분하며, 클래스 이름은 참조형 타입으로 사용된다.
    tags: [chapter:02, type, class]

  - id: l02-02
    type: multiple-choice
    prompt: 다음 정수 리터럴 중 값이 다른 하나는 무엇인가?
    choices:
      - { id: '1', text: '10' }
      - { id: '2', text: '00001010' }
      - { id: '3', text: '0x0A' }
      - { id: '4', text: '0b0000_1010' }
    answers: ['2']
    explanation: |
      선택지 1: 10은 십진수 10이다.
      선택지 2: 0으로 시작하는 정수 리터럴은 8진수이므로 00001010은 십진수 520이다.
      선택지 3: 0x0A는 16진수 A, 즉 십진수 10이다.
      선택지 4: 0b0000_1010은 이진수 1010, 즉 십진수 10이다.

      핵심 개념:
      Java 정수 리터럴은 접두사에 따라 10진수, 8진수, 16진수, 2진수로 해석된다.
    tags: [chapter:02, literal, integer]

  - id: l03-01
    type: multiple-choice
    prompt: 다음 중 문법적으로 올바른 문장은 무엇인가?
    choices:
      - { id: '1', text: 'int a[10] = new int[];' }
      - { id: '2', text: 'int b[] = new int(10);' }
      - { id: '3', text: 'int[][] c = new int[5][];' }
      - { id: '4', text: 'int[5] d = {1, 2, 3, 4, 5};' }
    answers: ['3']
    explanation: |
      선택지 1: Java 배열 변수 선언에서 변수명 뒤에 크기를 둘 수 없고, new int[]에는 초기값이나 크기가 필요하다.
      선택지 2: 배열 생성은 new int[10]처럼 대괄호를 사용한다.
      선택지 3: 2차원 배열의 첫 번째 차원만 지정하는 가변 배열 생성 문법으로 올바르다.
      선택지 4: 타입의 대괄호 안에 크기를 쓰는 C식 선언은 Java 문법이 아니다.

      핵심 개념:
      Java 배열은 선언 시 타입 또는 변수명에 []를 붙이고, 생성 시 new 타입[크기] 형식을 사용한다.
    tags: [chapter:03, array, syntax]

  - id: l03-02
    type: multiple-choice
    prompt: int형 변수 i와 j의 값을 각각 출력하기 위해 적당한 출력문은 무엇인가?
    choices:
      - { id: '1', text: 'System.out.println(i, j);' }
      - { id: '2', text: 'System.out.println(i + " " + j);' }
      - { id: '3', text: 'System.out.println(i + j);' }
      - { id: '4', text: 'System.out.println(i + ‘=’ + j);' }
    answers: ['2']
    explanation: |
      선택지 1: println은 두 개의 int 인자를 받는 오버로드가 없다.
      선택지 2: 문자열 공백을 사이에 두고 i와 j를 각각 문자열로 연결해 출력한다.
      선택지 3: 두 정수의 합을 출력하므로 각각의 값을 구분해 출력하지 않는다.
      선택지 4: 문자 '='와 정수의 산술 연산이 먼저 일어날 수 있어 원하는 형식의 별도 출력으로 적절하지 않다.

      핵심 개념:
      Java에서 + 연산은 피연산자 중 문자열이 있으면 문자열 연결로 동작한다.
    tags: [chapter:03, output, string-concat]

  - id: l03-03
    type: multiple-choice
    prompt: 퍼블릭 Alpha 클래스에서 protected 데이터 필드가 정의되었다고 가정할 때, 아래 4개의 클래스 중에서 이 데이터 필드를 사용할 수 없는 클래스는 무엇인가?
    passageRefs: [g03-package-relation]
    choices:
      - { id: '1', text: 'Alpha' }
      - { id: '2', text: 'AlphaSub' }
      - { id: '3', text: 'Beta' }
      - { id: '4', text: 'Gamma' }
    answers: ['4']
    explanation: |
      선택지 1: Alpha 자신은 자신의 protected 필드에 접근할 수 있다.
      선택지 2: AlphaSub는 다른 패키지에 있어도 Alpha의 하위 클래스이므로 상속 관계를 통해 접근할 수 있다.
      선택지 3: Beta는 Alpha와 같은 package one에 있으므로 protected 멤버에 접근할 수 있다.
      선택지 4: Gamma는 다른 패키지에 있고 Alpha의 하위 클래스도 아니므로 protected 필드를 사용할 수 없다.

      핵심 개념:
      protected 멤버는 같은 패키지 내부 또는 다른 패키지의 하위 클래스에서 접근할 수 있다.
    tags: [chapter:03, access-modifier, protected]

  - id: l04-01
    type: multiple-choice
    prompt: 키워드 final에 관한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: 'final 클래스의 자식 클래스를 정의할 수 없다.' }
      - { id: '2', text: '부모 클래스의 final 메소드는 자식 클래스로 상속될 때 재정의될 수 없다.' }
      - { id: '3', text: 'final 변수는 상수로 사용된다.' }
      - { id: '4', text: 'final 클래스의 객체를 생성할 수 없다.' }
    answers: ['4']
    explanation: |
      선택지 1: final 클래스는 상속될 수 없으므로 하위 클래스를 정의할 수 없다.
      선택지 2: final 메소드는 오버라이딩할 수 없다.
      선택지 3: final 변수는 한 번 초기화된 뒤 값을 바꿀 수 없어 상수로 사용된다.
      선택지 4: final 클래스는 상속만 금지할 뿐 객체 생성은 가능하다.

      핵심 개념:
      final은 적용 대상에 따라 변수 재할당, 메소드 재정의, 클래스 상속을 제한한다.
    tags: [chapter:04, final]

  - id: l04-02
    type: multiple-choice
    prompt: Circle 클래스에서 원주율 PI를 상수로 선언하기 위해 ㉠에 들어갈 적당한 내용은 무엇인가?
    passageRefs: [g04-circle-code]
    choices:
      - { id: '1', text: 'double PI = 3.14;' }
      - { id: '2', text: 'final double PI = 3.14;' }
      - { id: '3', text: 'const double PI = 3.14;' }
      - { id: '4', text: 'static final double PI = 3.14;' }
    answers: ['4']
    explanation: |
      선택지 1: 단순 인스턴스 변수라 상수 선언으로 충분하지 않다.
      선택지 2: final만 있으면 인스턴스별 상수가 되며 클래스 상수로 쓰기에는 static이 빠져 있다.
      선택지 3: Java에는 const 키워드를 상수 선언에 사용하지 않는다.
      선택지 4: static final은 클래스 수준의 상수 선언에 적합하다.

      핵심 개념:
      Java의 클래스 상수는 보통 static final로 선언하며, final은 재할당 금지를 의미한다.
    tags: [chapter:04, final, static, constant]

  - id: l05-01
    type: multiple-choice
    prompt: 다음 프로그램을 실행했을 때 예상되는 출력은?
    passageRefs: [g05-polymorph-code]
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: '컴파일 오류' }
      - { id: '4', text: '실행 오류' }
    answers: ['2']
    explanation: |
      선택지 1: 참조 변수 타입은 A이지만 실제 객체는 C이고, C는 B의 func()를 상속받는다.
      선택지 2: 동적 바인딩에 의해 실제 객체의 상속 계층에서 재정의된 B의 func()가 호출되어 B가 출력된다.
      선택지 3: A 타입 참조 변수에 하위 클래스 C 객체를 대입하는 것은 가능하다.
      선택지 4: 실행 시 예외가 발생하는 코드가 아니다.

      핵심 개념:
      오버라이딩된 인스턴스 메소드는 참조 변수 타입이 아니라 실제 객체 타입을 기준으로 동적 바인딩된다.
    tags: [chapter:05, inheritance, polymorphism, overriding]

  - id: l05-02
    type: multiple-choice
    prompt: 밑줄 친 ㉠, ㉡에 들어갈 키워드는 순서대로 무엇인가?
    passageRefs: [g05-interface-code]
    choices:
      - { id: '1', text: 'extends, extends' }
      - { id: '2', text: 'extends, implements' }
      - { id: '3', text: 'implements, implements' }
      - { id: '4', text: 'implements, extends' }
    answers: ['2']
    explanation: |
      선택지 1: 클래스가 인터페이스를 사용할 때는 extends가 아니라 implements를 쓴다.
      선택지 2: 인터페이스 B가 인터페이스 Able을 확장할 때는 extends, 클래스 C가 Able을 구현할 때는 implements를 쓴다.
      선택지 3: 인터페이스가 다른 인터페이스를 상속할 때 implements를 쓰지 않는다.
      선택지 4: 클래스가 인터페이스를 상속할 때 extends를 쓰지 않는다.

      핵심 개념:
      인터페이스 간 상속은 extends, 클래스의 인터페이스 구현은 implements로 표현한다.
    tags: [chapter:05, interface, inheritance]

  - id: l06-01
    type: multiple-choice
    prompt: 다음과 같은 제네릭 클래스가 있다고 가정하자. 보기에서 문법적으로 오류가 있는 것은?
    passageRefs: [g06-generic-data]
    choices:
      - { id: '1', text: 'Data<int> d = new Data<>();' }
      - { id: '2', text: 'Data<Integer> d = new Data<>();' }
      - { id: '3', text: 'Data<String> d = new Data<String>();' }
      - { id: '4', text: 'Data d = new Data();' }
    answers: ['1']
    explanation: |
      선택지 1: 제네릭 타입 인수에는 기본형 int를 사용할 수 없고 Integer 같은 참조형을 사용해야 한다.
      선택지 2: Integer는 참조형 래퍼 클래스이므로 올바르다.
      선택지 3: String은 참조형이므로 올바르다.
      선택지 4: raw type 사용은 권장되지 않지만 문법 오류는 아니다.

      핵심 개념:
      Java 제네릭의 타입 인수는 참조형이어야 하며 기본형은 래퍼 클래스로 사용한다.
    tags: [chapter:06, generics]

  - id: l06-02
    type: multiple-choice
    prompt: 다음과 같은 인터페이스가 있다고 가정할 때, 보기에서 람다식 사용이 잘못된 것은?
    passageRefs: [g06-lambda-interface]
    choices:
      - { id: '1', text: 'Addable ad = (int a, int b) -> { return (a + b); };' }
      - { id: '2', text: 'Addable ad = (int a, int b) -> a + b;' }
      - { id: '3', text: 'Addable ad = (a, b) -> return (a + b);' }
      - { id: '4', text: 'Addable ad = (a, b) -> (a + b);' }
    answers: ['3']
    explanation: |
      선택지 1: 블록 본문에서는 return 문과 세미콜론을 사용할 수 있다.
      선택지 2: 식 본문은 반환값을 직접 표현하므로 올바르다.
      선택지 3: 중괄호 없는 식 본문에서는 return 키워드를 사용할 수 없다.
      선택지 4: 매개변수 타입을 생략하고 식을 반환하는 람다식으로 올바르다.

      핵심 개념:
      람다식에서 return은 중괄호로 감싼 블록 본문에서만 사용한다.
    tags: [chapter:06, lambda, functional-interface]

  - id: l07-01
    type: multiple-choice
    prompt: Client 클래스를 myprogram.game 패키지에 위치시키려고 한다. Client 클래스를 정의하는 소스 파일의 맨 위에 포함시켜야 할 코드는 무엇인가?
    choices:
      - { id: '1', text: 'package myprogram.game;' }
      - { id: '2', text: 'package myprogram.game.Client;' }
      - { id: '3', text: 'import myprogram.game;' }
      - { id: '4', text: 'import myprogram.game.Client;' }
    answers: ['1']
    explanation: |
      선택지 1: 소스 파일이 속할 패키지는 package 문으로 선언한다.
      선택지 2: package 문에는 클래스 이름 Client까지 포함하지 않는다.
      선택지 3: import는 다른 패키지의 타입을 가져올 때 사용하며 현재 파일의 소속 패키지를 정하지 않는다.
      선택지 4: import myprogram.game.Client는 다른 곳에서 Client를 사용할 때의 문장이다.

      핵심 개념:
      Java 소스 파일의 패키지 선언은 파일 맨 앞의 package 패키지명; 형식으로 작성한다.
    tags: [chapter:07, package]

  - id: l07-02
    type: multiple-choice
    prompt: 밑줄 부분에 들어가야 할 내용은 무엇인가?
    passageRefs: [g07-throws-code]
    choices:
      - { id: '1', text: 'throw IOException' }
      - { id: '2', text: 'throws IOException' }
      - { id: '3', text: 'throw FileNotFoundException' }
      - { id: '4', text: 'throws FileNotFoundException' }
    answers: ['2']
    explanation: |
      선택지 1: throw는 예외 객체를 직접 던질 때 쓰며 메소드 선언부의 예외 명시에 사용하지 않는다.
      선택지 2: System.in.read()는 IOException을 발생시킬 수 있으므로 메소드 선언부에 throws IOException을 명시할 수 있다.
      선택지 3: throw는 선언부 키워드가 아니며 FileNotFoundException은 이 코드의 직접적인 예외가 아니다.
      선택지 4: FileNotFoundException은 파일 입력 관련 예외로, System.in.read()의 일반 선언에 맞지 않는다.

      핵심 개념:
      검사 예외를 메소드 밖으로 전달하려면 메소드 선언부에 throws 예외타입을 적는다.
    tags: [chapter:07, exception, throws]

  - id: l08-01
    type: multiple-choice
    prompt: 다음 프로그램의 출력 결과는 무엇인가?
    passageRefs: [g08-string-code]
    choices:
      - { id: '1', text: 'Jovo' }
      - { id: '2', text: 'Java' }
      - { id: '3', text: 'JovoExam' }
      - { id: '4', text: 'JavaExam' }
    answers: ['1']
    explanation: |
      선택지 1: String은 불변 객체이므로 replace와 concat의 반환값을 다시 대입하지 않으면 s는 Jovo 그대로다.
      선택지 2: replace 결과가 s에 저장되지 않는다.
      선택지 3: concat 결과가 s에 저장되지 않는다.
      선택지 4: replace와 concat 모두 반환값을 대입하지 않았으므로 JavaExam이 되지 않는다.

      핵심 개념:
      String 메소드는 기존 문자열을 바꾸지 않고 새 문자열을 반환한다.
    tags: [chapter:08, string, immutable]

  - id: l08-02
    type: multiple-choice
    prompt: Object 클래스와 String 클래스에 대한 설명이다. 잘못된 것은 무엇인가?
    choices:
      - { id: '1', text: '모든 클래스는 묵시적으로 Object 클래스를 상속받는다.' }
      - { id: '2', text: 'Object 클래스에 toString()과 equals() 메소드가 정의되어 있다.' }
      - { id: '3', text: 'String 클래스에 toString()과 equals() 메소드가 재정의되어 있다.' }
      - { id: '4', text: 'String 클래스는 표준 입출력 스트림을 위한 static 필드를 제공한다.' }
    answers: ['4']
    explanation: |
      선택지 1: Java의 모든 클래스는 직접 또는 간접적으로 Object를 상속한다.
      선택지 2: Object에는 toString(), equals() 등 기본 메소드가 정의되어 있다.
      선택지 3: String은 문자열 내용 비교와 문자열 표현을 위해 equals(), toString()을 재정의한다.
      선택지 4: 표준 입출력 스트림 static 필드는 String이 아니라 System 클래스의 in, out, err이다.

      핵심 개념:
      Object는 Java 클래스 계층의 최상위 클래스이고, String은 불변 문자열 클래스다.
    tags: [chapter:08, object, string]

  - id: l09-01
    type: multiple-choice
    prompt: 입력 스트림은 기본 스트림과 보조 스트림으로 나뉜다. 다음 중 기본 스트림에 해당하지 않는 것은?
    choices:
      - { id: '1', text: 'StringReader' }
      - { id: '2', text: 'FileReader' }
      - { id: '3', text: 'ByteArrayInputStream' }
      - { id: '4', text: 'BufferedReader' }
    answers: ['4']
    explanation: |
      선택지 1: StringReader는 문자열을 직접 입력원으로 하는 기본 문자 스트림이다.
      선택지 2: FileReader는 파일을 직접 입력원으로 하는 기본 문자 스트림이다.
      선택지 3: ByteArrayInputStream은 바이트 배열을 직접 입력원으로 하는 기본 바이트 스트림이다.
      선택지 4: BufferedReader는 다른 Reader에 버퍼링 기능을 덧붙이는 보조 스트림이다.

      핵심 개념:
      기본 스트림은 실제 데이터 소스와 직접 연결되고, 보조 스트림은 기존 스트림에 기능을 추가한다.
    tags: [chapter:09, io, stream]

  - id: l09-02
    type: multiple-choice
    prompt: BufferedReader 클래스에 관한 설명으로 틀린 것은 무엇인가?
    choices:
      - { id: '1', text: 'Reader의 자식 클래스이다.' }
      - { id: '2', text: 'read()와 readLine() 등 다양한 입력 메소드를 제공한다.' }
      - { id: '3', text: '바이트 단위의 입력 기능을 제공한다.' }
      - { id: '4', text: '입력 과정에 버퍼링 기능을 제공한다.' }
    answers: ['3']
    explanation: |
      선택지 1: BufferedReader는 Reader 계열의 문자 입력 보조 스트림이다.
      선택지 2: read()와 readLine() 같은 문자 입력 메소드를 제공한다.
      선택지 3: BufferedReader는 바이트가 아니라 문자 단위 입력을 다룬다.
      선택지 4: 내부 버퍼를 사용해 입력 효율을 높인다.

      핵심 개념:
      Reader 계열은 문자 스트림이고 InputStream 계열은 바이트 스트림이다.
    tags: [chapter:09, io, buffered-reader]

  - id: l10-01
    type: multiple-choice
    prompt: Path 인터페이스에 관한 설명이다. 잘못된 것은?
    choices:
      - { id: '1', text: 'java.io.File 클래스를 대체할 수 있다.' }
      - { id: '2', text: '파일시스템에 존재하는 파일 또는 디렉터리의 경로를 표현한다.' }
      - { id: '3', text: '경로의 생성, 경로의 조작/비교, 경로의 요소를 조회하는 기능을 제공한다.' }
      - { id: '4', text: '파일 내용의 읽기와 쓰기 기능을 제공한다.' }
    answers: ['4']
    explanation: |
      선택지 1: Path는 NIO.2에서 기존 File을 대체하거나 보완하는 경로 표현 타입이다.
      선택지 2: Path는 파일 또는 디렉터리의 경로를 객체로 표현한다.
      선택지 3: Path는 경로 생성, 비교, 하위 요소 조회 같은 경로 조작 기능을 제공한다.
      선택지 4: 파일 내용 읽기와 쓰기는 Files, FileChannel 같은 별도 API가 담당한다.

      핵심 개념:
      Path는 파일 내용 자체가 아니라 파일 시스템 경로를 표현하고 조작하는 인터페이스다.
    tags: [chapter:10, nio, path]

  - id: l10-02
    type: multiple-choice
    prompt: FileChannel 클래스에 관한 설명으로 틀린 것은 무엇인가?
    choices:
      - { id: '1', text: 'java.io 패키지의 파일 관련 스트림 클래스를 대체하기 위한 클래스이다.' }
      - { id: '2', text: 'FileChannel.open(path)으로 객체 생성을 하면 해당 파일을 읽기용으로 열게 된다.' }
      - { id: '3', text: '파일 입력을 위해 FileChannelReader, 파일 출력을 위해 FileChannelWriter를 사용한다.' }
      - { id: '4', text: '멀티 스레드 환경에서도 안전하게 사용할 수 있게 설계되었다.' }
    answers: ['3']
    explanation: |
      선택지 1: FileChannel은 NIO에서 파일 입출력을 수행하며 전통적 파일 스트림을 대체할 수 있다.
      선택지 2: open(path)만 사용하면 기본적으로 읽기용 채널이 열린다.
      선택지 3: FileChannelReader와 FileChannelWriter라는 표준 클래스는 사용하지 않는다.
      선택지 4: FileChannel은 여러 스레드에서 사용할 수 있도록 동기화 특성을 가진다.

      핵심 개념:
      FileChannel은 채널 기반 파일 입출력 API이며 Reader/Writer 이름의 별도 FileChannel 클래스쌍으로 나뉘지 않는다.
    tags: [chapter:10, nio, file-channel]

  - id: l11-01
    type: multiple-choice
    prompt: ArrayList 클래스에 관한 설명으로 적당하지 않은 것은?
    choices:
      - { id: '1', text: 'List 인터페이스를 구현한 클래스이다.' }
      - { id: '2', text: '여러 원소를 저장하기 위해 내부적으로 배열을 사용한다.' }
      - { id: '3', text: '원소의 순서가 의미를 가진다.' }
      - { id: '4', text: '같은 자료를 중복으로 저장할 수 없다.' }
    answers: ['4']
    explanation: |
      선택지 1: ArrayList는 List 인터페이스 구현 클래스다.
      선택지 2: ArrayList는 내부 배열을 사용해 원소를 저장하고 필요하면 크기를 늘린다.
      선택지 3: List 계열은 삽입 순서와 인덱스가 의미를 가진다.
      선택지 4: ArrayList는 중복 원소 저장을 허용한다.

      핵심 개념:
      List는 순서와 중복을 허용하고, Set은 일반적으로 중복을 허용하지 않는다.
    tags: [chapter:11, collection, arraylist]

  - id: l11-02
    type: multiple-choice
    prompt: (key, value) 형태의 원소로 구성되는 자료 묶음을 다루기 위한 인터페이스나 클래스가 아닌 것은?
    choices:
      - { id: '1', text: 'HashMap' }
      - { id: '2', text: 'HashSet' }
      - { id: '3', text: 'Hashtable' }
      - { id: '4', text: 'Map' }
    answers: ['2']
    explanation: |
      선택지 1: HashMap은 key-value 쌍을 저장하는 Map 구현 클래스다.
      선택지 2: HashSet은 값의 집합을 저장하며 key-value 쌍 구조가 아니다.
      선택지 3: Hashtable은 key-value 쌍을 저장하는 레거시 Map 계열 클래스다.
      선택지 4: Map은 key-value 매핑을 표현하는 인터페이스다.

      핵심 개념:
      Map 계열은 키와 값의 쌍을 저장하고, Set 계열은 중복 없는 원소 집합을 저장한다.
    tags: [chapter:11, collection, map, set]

  - id: l12-01
    type: multiple-choice
    prompt: 주어진 배열을 스트림으로 만들려고 한다. 밑줄 부분에 들어갈 적당한 내용은?
    passageRefs: [g12-intstream-code]
    choices:
      - { id: '1', text: 'IntStream.range(numbers)' }
      - { id: '2', text: 'Arrays.stream(numbers)' }
      - { id: '3', text: 'numbers.stream()' }
      - { id: '4', text: 'numbers.getStream()' }
    answers: ['2']
    explanation: |
      선택지 1: IntStream.range는 시작값과 끝값을 인자로 받아 범위 스트림을 만든다.
      선택지 2: Arrays.stream(int[])은 int 배열로부터 IntStream을 생성한다.
      선택지 3: 배열에는 stream() 인스턴스 메소드가 없다.
      선택지 4: 배열에는 getStream() 메소드가 없다.

      핵심 개념:
      배열에서 스트림을 만들 때는 Arrays.stream(배열)을 사용한다.
    tags: [chapter:12, stream, array]

  - id: l12-02
    type: multiple-choice
    prompt: 주어진 문자열 배열에서 길이가 6 이상인 단어를 대문자로 변환한 후 정렬하여 출력하려고 한다. 밑줄 부분에 들어갈 메소드는 무엇인가?
    passageRefs: [g12-stream-pipeline]
    choices:
      - { id: '1', text: 'peek' }
      - { id: '2', text: 'map' }
      - { id: '3', text: 'match' }
      - { id: '4', text: 'filter' }
    answers: ['4']
    explanation: |
      선택지 1: peek은 주로 중간 확인용 부수 효과에 사용되며 조건으로 원소를 걸러내지 않는다.
      선택지 2: map은 원소 변환에 사용되며, 코드에서는 대문자 변환 단계에 이미 사용된다.
      선택지 3: match는 allMatch, anyMatch 같은 최종 연산 형태로 사용된다.
      선택지 4: 조건 word.length() >= 5를 만족하는 원소만 통과시키려면 filter를 사용한다.

      핵심 개념:
      Stream의 filter는 조건식이 참인 원소만 남기는 중간 연산이다.
    tags: [chapter:12, stream, filter]

  - id: l13-01
    type: multiple-choice
    prompt: 스레드 동기화와 관련된 다음 설명 중 올바른 것은?
    choices:
      - { id: '1', text: '메소드 interrupt()는 현재 스레드가 인터럽트를 받을 적이 있는지 검사한다.' }
      - { id: '2', text: '메소드 notify()는 현재 실행 중인 스레드를 정해진 시간 동안 중지시킨다.' }
      - { id: '3', text: '메소드 wait()는 대기 상태의 스레드들 가운데 하나를 기다리게 한다.' }
      - { id: '4', text: '메소드 join()은 this 스레드가 종료될 때까지 현재 스레드가 기다린다.' }
    answers: ['4']
    explanation: |
      선택지 1: interrupt()는 대상 스레드에 인터럽트를 요청하며 검사 메소드가 아니다.
      선택지 2: notify()는 대기 중인 스레드 하나를 깨우며 시간 동안 중지시키지 않는다.
      선택지 3: wait()는 현재 스레드가 객체 모니터에서 대기하도록 한다.
      선택지 4: join()은 호출 대상 스레드가 끝날 때까지 현재 스레드를 기다리게 한다.

      핵심 개념:
      wait/notify는 객체 모니터 기반 대기와 통지, join은 스레드 종료 대기에 사용된다.
    tags: [chapter:13, thread, synchronization]

  - id: l13-02
    type: multiple-choice
    prompt: 스레드 동기화의 의미를 가장 잘 설명한 것은?
    choices:
      - { id: '1', text: '메인 스레드가 가장 마지막에 종료되는 것을 보장하는 것' }
      - { id: '2', text: '공유 객체에 여러 스레드들이 동시 접근할 수 있게 하는 것' }
      - { id: '3', text: '한순간에 한 스레드만 공유 객체에 접근할 수 있게 하는 것' }
      - { id: '4', text: '여러 개의 스레드들이 순서대로 하나씩 수행되게 하는 것' }
    answers: ['3']
    explanation: |
      선택지 1: 메인 스레드 종료 순서 보장은 동기화의 본질이 아니다.
      선택지 2: 동기화는 동시 접근을 무제한 허용하는 것이 아니라 경쟁 상태를 막기 위해 제어한다.
      선택지 3: 임계 영역에 한 번에 하나의 스레드만 들어가게 해 공유 객체의 일관성을 지킨다.
      선택지 4: 전체 스레드를 항상 순서대로 실행시키는 것이 아니라 공유 자원 접근을 조정한다.

      핵심 개념:
      스레드 동기화는 공유 자원에 대한 동시 접근을 제어해 데이터 일관성을 유지하는 방법이다.
    tags: [chapter:13, thread, synchronization]

  - id: l14-01
    type: multiple-choice
    prompt: JDBC 프로그래밍에 사용되는 클래스나 인터페이스가 아닌 것은?
    choices:
      - { id: '1', text: 'Connection' }
      - { id: '2', text: 'DriverManager' }
      - { id: '3', text: 'Statement' }
      - { id: '4', text: 'Runnable' }
    answers: ['4']
    explanation: |
      선택지 1: Connection은 데이터베이스 연결을 표현하는 JDBC 인터페이스다.
      선택지 2: DriverManager는 JDBC 드라이버와 연결 생성을 관리한다.
      선택지 3: Statement는 SQL 문 실행에 사용되는 JDBC 인터페이스다.
      선택지 4: Runnable은 스레드 실행 작업을 나타내는 인터페이스로 JDBC 구성 요소가 아니다.

      핵심 개념:
      JDBC의 대표 구성 요소에는 Connection, Statement, ResultSet, DriverManager 등이 있다.
    tags: [chapter:14, jdbc]

  - id: l14-02
    type: multiple-choice
    prompt: PreparedStatement 객체에 대한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 'PreparedStatement는 Statement의 부모 인터페이스이다.' }
      - { id: '2', text: '객체를 생성할 때 SQL 구문을 지정해야 한다.' }
      - { id: '3', text: '같은 SQL 구문을 여러 번 실행할 때 효율적으로 활용될 수 있다.' }
      - { id: '4', text: '매개 변수를 가지는 SQL 구문을 저장할 수 있다.' }
    answers: ['1']
    explanation: |
      선택지 1: PreparedStatement는 Statement를 확장한 하위 인터페이스이지 부모 인터페이스가 아니다.
      선택지 2: PreparedStatement는 생성 시 미리 SQL 문을 전달한다.
      선택지 3: 미리 준비된 SQL을 반복 실행할 때 효율적이다.
      선택지 4: ? 자리표시자를 사용해 매개 변수를 가지는 SQL 문을 처리할 수 있다.

      핵심 개념:
      PreparedStatement는 Statement의 하위 인터페이스로, 미리 컴파일된 매개변수화 SQL 실행에 사용된다.
    tags: [chapter:14, jdbc, preparedstatement]

  - id: l15-01
    type: multiple-choice
    prompt: .jar 파일의 형식으로 배포된 라이브러리를 사용하고자 할 때, 이러한 .jar 파일을 어떤 환경 변수에 추가해야 하는가?
    choices:
      - { id: '1', text: 'Classpath' }
      - { id: '2', text: 'Modulepath' }
      - { id: '3', text: 'Javadoc' }
      - { id: '4', text: 'Jarpath' }
    answers: ['1']
    explanation: |
      선택지 1: 전통적인 Java 라이브러리 JAR는 클래스 검색 경로인 classpath에 추가해 사용한다.
      선택지 2: modulepath는 Java 모듈 시스템에서 모듈을 찾는 경로다.
      선택지 3: Javadoc은 API 문서 생성 도구나 문서를 뜻한다.
      선택지 4: Jarpath라는 표준 환경 변수는 사용하지 않는다.

      핵심 개념:
      Classpath는 JVM과 컴파일러가 클래스와 JAR 라이브러리를 찾는 경로다.
    tags: [chapter:15, jar, classpath]

  - id: l15-02
    type: multiple-choice
    prompt: Java의 표준 모듈 중 requires 키워드로 사용 선언을 하지 않아도 사용이 가능한 모듈은 무엇인가?
    choices:
      - { id: '1', text: 'jdk.base' }
      - { id: '2', text: 'jdk.lang' }
      - { id: '3', text: 'java.lang' }
      - { id: '4', text: 'java.base' }
    answers: ['4']
    explanation: |
      선택지 1: jdk.base는 표준 기본 모듈 이름이 아니다.
      선택지 2: jdk.lang은 표준 모듈 이름이 아니다.
      선택지 3: java.lang은 패키지 이름이며 모듈 이름이 아니다.
      선택지 4: java.base는 모든 모듈이 묵시적으로 의존하는 기본 모듈이다.

      핵심 개념:
      Java 모듈 시스템에서 java.base는 모든 모듈이 자동으로 읽는 필수 기본 모듈이다.
    tags: [chapter:15, module, java-base]
