questions:
  - id: e19-01
    type: multiple-choice
    prompt: 배열을 사용하는 다음 문장 중 올바른 것은?
    choices:
      - { id: '1', text: 'int[] a = new int[10];' }
      - { id: '2', text: 'int b[] = { {1, 2, 3}, {4, 5} };' }
      - { id: '3', text: 'int[] c; c = {1, 2, 3, 4};' }
      - { id: '4', text: 'int[][] d = new int[10];' }
    answers: ['1']
    explanation: |
      선택지 1: int형 1차원 배열 10칸을 생성하는 올바른 선언과 생성식이다.
      선택지 2: 중괄호 안에 배열들이 들어가므로 2차원 배열 초기화 형태인데 변수 타입은 1차원 int[]라 맞지 않는다.
      선택지 3: 배열 초기화 축약형은 선언과 동시에 사용할 때만 허용되며, 이미 선언한 변수에 따로 대입할 수 없다.
      선택지 4: int[][]는 2차원 배열 참조인데 new int[10]은 1차원 배열 생성식이다.

      핵심 개념:
      Java 배열은 타입과 차원이 정확히 일치해야 한다.
      배열 객체는 new로 생성하거나 선언과 동시에 초기화 목록으로 만들 수 있다.
      초기화 축약형은 선언문 안에서만 사용할 수 있다.
      다차원 배열은 배열의 배열이므로 생성식에서도 필요한 차원을 맞춰야 한다.
    tags: [array]

  - id: e19-02
    type: multiple-choice
    prompt: 인터페이스에서 기본 몸체를 가지는 메소드를 넣을 때 밑줄 부분에 들어갈 키워드는?
    choices:
      - { id: '1', text: 'public' }
      - { id: '2', text: 'final' }
      - { id: '3', text: 'abstract' }
      - { id: '4', text: 'default' }
    answers: ['4']
    explanation: |
      선택지 1: public은 접근 지정자이며 인터페이스 메소드의 기본 구현을 의미하지 않는다.
      선택지 2: final 메소드는 재정의를 막는 의미라 인터페이스 기본 구현 키워드가 아니다.
      선택지 3: abstract는 구현 몸체가 없는 추상 메소드에 해당한다.
      선택지 4: default는 인터페이스 안에서 구현 몸체를 가진 기본 메소드를 정의할 때 사용한다.

      핵심 개념:
      Java 8부터 인터페이스는 default 메소드를 가질 수 있다.
      default 메소드는 구현 클래스가 재정의하지 않아도 사용할 수 있는 기본 구현이다.
      abstract 메소드는 몸체가 없고 구현 클래스가 구현해야 한다.
      인터페이스의 기본 메소드와 추상 메소드는 메소드 몸체 유무로 구분된다.
    tags: [interface, default-method]

  - id: e19-03
    type: multiple-choice
    passageRefs: [g19-employee-code-01]
    prompt: 위 프로그램에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: '클래스 간의 상속 관계가 존재한다.' }
      - { id: '2', text: 'Employee 클래스를 이용하여 자식 클래스를 정의하였다.' }
      - { id: '3', text: '부모 클래스가 추상 클래스로 정의되어 있다.' }
      - { id: '4', text: '부모 유형의 변수에 자식 객체가 대입되었다.' }
    answers: ['3']
    explanation: |
      선택지 1: Salesman과 Developer가 Employee를 상속하므로 맞는 설명이다.
      선택지 2: 두 자식 클래스는 Employee를 부모 클래스로 사용해 정의되었다.
      선택지 3: Employee는 abstract 키워드 없이 일반 클래스로 정의되어 있으므로 잘못된 설명이다.
      선택지 4: Employee 타입 변수 emp1, emp2에 자식 객체가 대입되므로 업캐스팅이 일어난다.

      핵심 개념:
      상속은 기존 클래스를 확장해 새로운 클래스를 만드는 방식이다.
      부모 타입 변수는 자식 객체를 참조할 수 있다.
      추상 클래스는 abstract 키워드로 선언해야 한다.
      추상 여부와 상속 가능 여부는 별개의 개념이다.
    tags: [inheritance, polymorphism]

  - id: e19-04
    type: multiple-choice
    passageRefs: [g19-employee-code-01]
    prompt: 위 프로그램을 실행할 때 출력되는 결과는?
    choices:
      - { id: '1', text: "do something\ndo something" }
      - { id: '2', text: "do sales\ndo something" }
      - { id: '3', text: "do something\ndo sales" }
      - { id: '4', text: "do sales\ndo development" }
    answers: ['4']
    explanation: |
      선택지 1: 부모 클래스의 doJob()이 두 번 호출되는 결과라 동적 바인딩을 반영하지 못한다.
      선택지 2: emp2가 Developer 객체이므로 두 번째 출력이 do something이 될 수 없다.
      선택지 3: emp1이 Salesman 객체이므로 첫 번째 출력이 do something이 될 수 없다.
      선택지 4: 실제 객체 타입에 따라 Salesman과 Developer의 재정의 메소드가 차례로 호출된다.

      핵심 개념:
      Java의 인스턴스 메소드는 실행 시점의 실제 객체 타입을 기준으로 동적 바인딩된다.
      부모 타입 참조 변수로 자식 객체를 가리켜도 재정의된 메소드가 실행된다.
      이를 통해 다형성을 구현할 수 있다.
      필드 접근과 달리 오버라이딩된 메소드 호출은 런타임 객체 타입이 중요하다.
    tags: [polymorphism, overriding]

  - id: e19-05
    type: multiple-choice
    passageRefs: [g19-string-code-01]
    prompt: 프로그램에 등장하는 다음 수식 중 결과가 String 유형이 아닌 것은?
    choices:
      - { id: '1', text: '"abcde"' }
      - { id: '2', text: 'new String()' }
      - { id: '3', text: 'i < 1000' }
      - { id: '4', text: 'str + aValue' }
    answers: ['3']
    explanation: |
      선택지 1: 문자열 리터럴이므로 String 객체를 나타낸다.
      선택지 2: 기본 생성자로 빈 String 객체를 생성한다.
      선택지 3: 관계 연산식이므로 결과는 boolean이다.
      선택지 4: 문자열 연결 연산 결과는 새로운 String이다.

      핵심 개념:
      String 리터럴과 new String()은 모두 String 타입 값을 만든다.
      + 연산자는 피연산자 중 문자열이 있으면 문자열 연결로 동작한다.
      비교 연산자 < 의 결과는 참 또는 거짓이다.
      반복문의 조건식에는 boolean 결과가 와야 한다.
    tags: [string, expression]

  - id: e19-06
    type: multiple-choice
    passageRefs: [g19-string-code-01]
    prompt: 위 프로그램에 관한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: '컴파일 또는 실행 오류는 발생하지 않는다.' }
      - { id: '2', text: 'for문을 수행할 때마다 새로운 String 객체가 생성된다.' }
      - { id: '3', text: 'immutable 클래스인 String을 사용하여 메모리 낭비가 심하다.' }
      - { id: '4', text: '반복횟수가 커질수록 평균 실행 속도는 점점 빨라진다.' }
    answers: ['4']
    explanation: |
      선택지 1: 문법적으로 올바른 프로그램이므로 컴파일과 실행이 가능하다.
      선택지 2: String은 불변 객체라 연결 결과가 새 문자열 객체로 만들어진다.
      선택지 3: 반복적인 문자열 연결은 중간 객체를 많이 만들어 메모리를 낭비할 수 있다.
      선택지 4: 문자열 길이가 길어질수록 복사 비용이 커지므로 평균 실행 속도가 빨라진다고 보기 어렵다.

      핵심 개념:
      String은 immutable 객체라 한 번 만든 내용이 바뀌지 않는다.
      문자열 연결은 기존 객체를 수정하는 것이 아니라 새 문자열을 만든다.
      많은 반복 연결에는 StringBuilder 같은 가변 버퍼가 적합하다.
      반복 횟수와 문자열 길이가 커질수록 시간과 메모리 비용이 증가한다.
    tags: [string, performance]

  - id: e19-07
    type: multiple-choice
    passageRefs: [g19-copy-file-code-01]
    prompt: 파일로부터 2바이트 문자 단위로 데이터를 읽은 후 파일에 출력할 때, 밑줄 ㄱ과 ㄴ에 들어갈 입출력 스트림 클래스는 순서대로 무엇인가?
    choices:
      - { id: '1', text: 'FileInputStream, FileOutputStream' }
      - { id: '2', text: 'FileOutputStream, FileInputStream' }
      - { id: '3', text: 'FileReader, FileWriter' }
      - { id: '4', text: 'FileWriter, FileReader' }
    answers: ['3']
    explanation: |
      선택지 1: FileInputStream과 FileOutputStream은 바이트 스트림이라 문자 단위 처리 설명과 맞지 않는다.
      선택지 2: 입출력 순서가 반대이고 바이트 스트림이다.
      선택지 3: FileReader는 문자 입력, FileWriter는 문자 출력 스트림이므로 조건에 맞는다.
      선택지 4: 입력과 출력 클래스의 위치가 반대이다.

      핵심 개념:
      Java I/O는 바이트 스트림과 문자 스트림으로 나뉜다.
      InputStream/OutputStream 계열은 바이트 단위 처리에 사용한다.
      Reader/Writer 계열은 문자 단위 처리에 사용한다.
      파일 문자 입출력에는 FileReader와 FileWriter를 사용할 수 있다.
    tags: [io, reader-writer]

  - id: e19-08
    type: multiple-choice
    passageRefs: [g19-copy-file-code-01]
    prompt: 예외처리를 위해 밑줄 친 부분에 들어갈 적당한 내용은?
    choices:
      - { id: '1', text: 'catch ( java.io.IOException )' }
      - { id: '2', text: 'catch ( java.io.IOException e )' }
      - { id: '3', text: 'catch ( java.io.IOException ex )' }
      - { id: '4', text: 'finally' }
    answers: ['2']
    explanation: |
      선택지 1: catch 매개변수에는 예외 타입뿐 아니라 변수명이 필요하다.
      선택지 2: IOException 타입의 예외 객체를 e로 받아 아래의 System.out.println(e)와도 일치한다.
      선택지 3: catch 문 자체는 가능하지만 본문에서 e를 출력하므로 변수명 ex와 맞지 않는다.
      선택지 4: finally는 예외 객체를 받지 않으며 catch 블록을 대체하지 않는다.

      핵심 개념:
      catch 절은 catch (예외타입 변수명) 형식으로 예외 객체를 받는다.
      블록 내부에서 사용할 변수명은 catch 매개변수명과 일치해야 한다.
      finally는 예외 발생 여부와 관계없이 정리 코드를 실행하는 블록이다.
      파일 입출력에서는 IOException 처리가 자주 필요하다.
    tags: [exception, io]

  - id: e19-09
    type: multiple-choice
    prompt: 다음이 설명하는 인터페이스 또는 클래스의 이름은 무엇인가?
    choices:
      - { id: '1', text: 'Buffer' }
      - { id: '2', text: 'Path' }
      - { id: '3', text: 'FileReader' }
      - { id: '4', text: 'FileChannel' }
    answers: ['2']
    explanation: |
      선택지 1: Buffer는 데이터를 임시 저장하는 버퍼 개념이며 파일 경로 표현 객체가 아니다.
      선택지 2: Path는 java.nio.file 패키지에서 파일이나 디렉터리 경로를 표현하고 조작한다.
      선택지 3: FileReader는 문자 입력 스트림이다.
      선택지 4: FileChannel은 파일 입출력을 위한 채널이다.

      핵심 개념:
      java.nio.file.Path는 파일 시스템 경로를 객체로 표현한다.
      Path는 경로 비교, 조작, 요소 조회 등에 사용된다.
      기존 java.io.File을 대체하거나 보완하는 NIO.2 API의 핵심 타입이다.
      파일 내용 입출력 클래스와 경로 표현 클래스는 역할이 다르다.
    tags: [nio, path]

  - id: e19-10
    type: multiple-choice
    passageRefs: [g19-array-list-code-01]
    prompt: 컬렉션 인터페이스나 클래스는 제네릭 타입으로 정의되어 있어서 사용할 때 원소로 사용되는 객체의 타입을 지정하는 것이 좋다. 밑줄 ㄱ에 들어갈 선언으로 적당한 것은?
    choices:
      - { id: '1', text: 'List<> list = new ArrayList<>();' }
      - { id: '2', text: 'List<Integer> list = new ArrayList<Integer>();' }
      - { id: '3', text: 'List<String> list = new ArrayList<String>();' }
      - { id: '4', text: 'ArrayList<String> list = new List<String>();' }
    answers: ['3']
    explanation: |
      선택지 1: 변수 타입의 제네릭 인자가 비어 있어 올바른 선언이 아니다.
      선택지 2: 리스트에 문자열을 추가하므로 Integer 타입과 맞지 않는다.
      선택지 3: 문자열 원소를 저장하는 List<String>과 ArrayList<String> 선언이 적절하다.
      선택지 4: List는 인터페이스라 new List<String>()로 직접 생성할 수 없다.

      핵심 개념:
      제네릭은 컬렉션에 저장할 원소 타입을 명시해 타입 안정성을 높인다.
      List는 인터페이스이고 ArrayList는 그 구현 클래스다.
      변수는 보통 인터페이스 타입으로 선언하고 구현 객체를 대입한다.
      컬렉션에 넣는 값의 타입과 제네릭 타입 인자는 일치해야 한다.
    tags: [collection, generics]

  - id: e19-11
    type: multiple-choice
    passageRefs: [g19-array-list-code-01]
    prompt: for-each 구문을 사용하여 컬렉션에 저장된 원소를 순서대로 출력하려 한다. 밑줄 ㄴ에 들어갈 적당한 내용은 무엇인가?
    choices:
      - { id: '1', text: 'for (s : list) System.out.println(s);' }
      - { id: '2', text: 'for (s : ArrayList list) System.out.println(s);' }
      - { id: '3', text: 'for (String s : list) System.out.println(s);' }
      - { id: '4', text: 'for (String s : ArrayList list) System.out.println(s);' }
    answers: ['3']
    explanation: |
      선택지 1: 반복 변수 s의 타입 선언이 빠져 있다.
      선택지 2: for-each의 오른쪽에는 컬렉션 객체가 와야 하며 반복 변수 타입 선언도 없다.
      선택지 3: List<String>의 각 원소를 String s로 받아 출력하는 올바른 for-each 구문이다.
      선택지 4: 오른쪽 표현식이 컬렉션 객체가 아니라 타입과 변수 선언처럼 되어 있어 잘못되었다.

      핵심 개념:
      향상된 for문은 for (원소타입 변수 : 배열또는Iterable) 형식이다.
      컬렉션 원소 타입에 맞는 반복 변수를 선언해야 한다.
      콜론 오른쪽에는 순회 대상 객체가 와야 한다.
      List<String>을 순회할 때 원소 변수 타입은 String이 자연스럽다.
    tags: [collection, for-each]

  - id: e19-12
    type: multiple-choice
    passageRefs: [g19-array-list-code-01]
    prompt: add(원소)는 리스트의 끝에 원소를 추가하며, add(index, 원소)는 지정된 위치에 추가한다. 위 문제의 출력 결과는 무엇인가?
    choices:
      - { id: '1', text: "one\ntwo\nthree" }
      - { id: '2', text: "one\none\nthree\ntwo" }
      - { id: '3', text: "one\nthree\ntwo\none" }
      - { id: '4', text: '결과를 예측할 수 없다' }
    answers: ['2']
    explanation: |
      선택지 1: add(1, "one")으로 중간 삽입된 원소를 반영하지 않았다.
      선택지 2: one, three, two 순서로 추가한 뒤 인덱스 1에 one을 삽입한 결과와 일치한다.
      선택지 3: 삽입 원소가 끝에 붙은 것으로 본 결과라 잘못되었다.
      선택지 4: ArrayList는 순서를 유지하므로 결과를 예측할 수 있다.

      핵심 개념:
      ArrayList는 삽입 순서를 유지하는 순차 컬렉션이다.
      add(E)는 끝에 추가하고 add(index, E)는 해당 위치에 삽입한다.
      중간 삽입 시 기존 원소들은 뒤로 밀린다.
      for-each는 리스트의 현재 순서대로 원소를 순회한다.
    tags: [collection, array-list]

  - id: e19-13
    type: multiple-choice
    prompt: HashMap 컬렉션 객체에 저장되어 있는 원소를 읽거나, 컬렉션에 원소를 추가할 때 사용되는 메소드는 각각 무엇인가?
    choices:
      - { id: '1', text: 'delete(), insert(원소)' }
      - { id: '2', text: 'pop(), push(원소)' }
      - { id: '3', text: 'remove(키), add(키, 값)' }
      - { id: '4', text: 'get(키), put(키, 값)' }
    answers: ['4']
    explanation: |
      선택지 1: HashMap의 기본 조회/추가 메소드 이름이 아니다.
      선택지 2: pop과 push는 스택 계열 동작에 가깝다.
      선택지 3: remove는 삭제 메소드이고 add는 HashMap의 키-값 추가 메소드가 아니다.
      선택지 4: HashMap은 키로 값을 읽을 때 get, 키-값 쌍을 저장할 때 put을 사용한다.

      핵심 개념:
      HashMap은 키와 값의 쌍을 저장하는 컬렉션이다.
      값을 저장할 때는 put(key, value)를 사용한다.
      저장된 값을 읽을 때는 get(key)를 사용한다.
      키 기반 자료구조는 순서보다 빠른 검색이 핵심이다.
    tags: [collection, hashmap]

  - id: e19-14
    type: multiple-choice
    passageRefs: [g19-counter-code-01]
    prompt: 위에서 공유 자원에 해당하는 것은 무엇인가?
    choices:
      - { id: '1', text: 'Account 객체' }
      - { id: '2', text: 'Counter 객체' }
      - { id: '3', text: 'increment() 메소드' }
      - { id: '4', text: 'getValue() 메소드' }
    answers: ['2']
    explanation: |
      선택지 1: 프로그램에 Account 객체는 등장하지 않는다.
      선택지 2: 두 스레드가 같은 Counter 객체 c를 공유하며 increment()를 호출한다.
      선택지 3: 메소드는 공유 객체의 상태를 변경하는 코드이지 공유되는 자원 객체 자체는 아니다.
      선택지 4: getValue()는 값을 읽는 메소드이며 공유 자원 자체가 아니다.

      핵심 개념:
      멀티스레드 프로그램에서 공유 자원은 여러 스레드가 함께 접근하는 객체나 데이터다.
      같은 Counter 객체가 두 MyThread에 전달되므로 내부 필드 c가 경쟁 대상이 된다.
      공유 상태를 변경하는 메소드는 동기화가 필요할 수 있다.
      객체와 메소드의 역할을 구분해야 한다.
    tags: [thread, synchronization]

  - id: e19-15
    type: multiple-choice
    passageRefs: [g19-counter-code-01]
    prompt: Thread의 서브 클래스를 정의하기 위해 밑줄 ㄱ에 들어갈 키워드는 무엇인가?
    choices:
      - { id: '1', text: 'Runnable' }
      - { id: '2', text: 'SubClass' }
      - { id: '3', text: 'extends' }
      - { id: '4', text: 'implements' }
    answers: ['3']
    explanation: |
      선택지 1: Runnable은 인터페이스 이름이며 클래스 상속 키워드가 아니다.
      선택지 2: Java 키워드가 아니다.
      선택지 3: Thread 클래스를 상속해 서브 클래스를 만들 때 extends를 사용한다.
      선택지 4: implements는 인터페이스 구현에 사용한다.

      핵심 개념:
      Java에서 클래스 상속은 extends 키워드를 사용한다.
      인터페이스 구현은 implements 키워드를 사용한다.
      Thread를 상속하면 run() 메소드를 재정의해 스레드 실행 코드를 작성한다.
      Runnable 방식과 Thread 상속 방식은 스레드 생성의 대표적인 두 방법이다.
    tags: [thread, inheritance]

  - id: e19-16
    type: multiple-choice
    passageRefs: [g19-counter-code-01]
    prompt: 공유 자원을 쓰는 스레드 간에 동기화가 필요하므로 increment() 메소드를 다시 정의해야 한다. 잘못된 것은?
    choices:
      - { id: '1', text: 'public void increment() { synchronized(this) { c++; } }' }
      - { id: '2', text: 'synchronized public void increment() { c++; }' }
      - { id: '3', text: 'public synchronized void increment() { c++; }' }
      - { id: '4', text: 'public void synchronized increment() { c++; }' }
    answers: ['4']
    explanation: |
      선택지 1: synchronized 블록으로 this 객체의 모니터를 잡고 임계영역을 보호하므로 올바르다.
      선택지 2: 메소드 지정자 순서는 바뀔 수 있으므로 synchronized public도 허용된다.
      선택지 3: public synchronized void 형식은 동기화 메소드 선언으로 올바르다.
      선택지 4: synchronized는 메소드 지정자이므로 반환 타입 void 뒤에 올 수 없다.

      핵심 개념:
      synchronized는 블록이나 메소드에 적용해 임계영역을 보호한다.
      메소드 지정자는 반환 타입 앞에 위치한다.
      여러 지정자의 순서는 대체로 자유롭지만 반환 타입 뒤로 갈 수는 없다.
      공유 카운터 증가처럼 읽기-수정-쓰기 작업은 동기화가 필요하다.
    tags: [thread, synchronization]

  - id: e19-17
    type: multiple-choice
    passageRefs: [g19-counter-code-01]
    prompt: increment()를 호출하는 모든 스레드의 실행이 종료된 후에 최종적으로 20000이 출력되는가를 확인하려고 한다. 이러한 스레드 제어를 위해 밑줄 ㄷ에 들어갈 내용은 무엇인가?
    choices:
      - { id: '1', text: 't1.join(); t2.join();' }
      - { id: '2', text: 't1.notify(); t2.notify();' }
      - { id: '3', text: 't1.sleep(); t2.sleep();' }
      - { id: '4', text: 'Thread.yield();' }
    answers: ['1']
    explanation: |
      선택지 1: join()은 대상 스레드가 종료될 때까지 현재 스레드를 기다리게 한다.
      선택지 2: notify()는 대기 중인 스레드 하나를 깨우는 메소드이며 종료 대기에 쓰지 않는다.
      선택지 3: sleep()은 일정 시간 쉬는 동작이지 스레드 종료 보장이 아니다.
      선택지 4: yield()는 실행 기회를 양보할 뿐 종료 대기를 보장하지 않는다.

      핵심 개념:
      스레드 결과를 확인하려면 작업 스레드가 끝난 뒤 값을 읽어야 한다.
      join()은 다른 스레드의 종료를 기다리는 대표 메소드다.
      sleep()과 yield()는 스케줄링 힌트 또는 지연일 뿐 완료 동기화가 아니다.
      notify()는 wait/notify 동기화 패턴에서 사용된다.
    tags: [thread, join]

  - id: e19-18
    type: multiple-choice
    passageRefs: [g19-counter-code-01]
    prompt: 앞 문제에서 필요한 메소드를 호출하려면 예외처리 또는 예외 전파가 필요하다. 밑줄 ㄴ에 들어갈 키워드는 무엇인가?
    choices:
      - { id: '1', text: 'throw' }
      - { id: '2', text: 'throws' }
      - { id: '3', text: 'synchronize' }
      - { id: '4', text: 'interrupt' }
    answers: ['2']
    explanation: |
      선택지 1: throw는 예외 객체를 직접 던질 때 사용한다.
      선택지 2: throws는 메소드 선언부에서 발생 가능한 예외를 호출자에게 전파할 때 사용한다.
      선택지 3: synchronize는 Java 키워드가 아니며 동기화 키워드는 synchronized이다.
      선택지 4: interrupt는 스레드 인터럽트 메소드 이름이지 예외 전파 키워드가 아니다.

      핵심 개념:
      Thread.join()은 InterruptedException 처리가 필요하다.
      예외는 try-catch로 처리하거나 메소드 선언부에 throws로 전파할 수 있다.
      throw와 throws는 용도가 다르다.
      throw는 실행문, throws는 메소드 선언에 사용된다.
    tags: [exception, thread]

  - id: e19-19
    type: multiple-choice
    prompt: 다음 그림이 보여주는 AWT 컨트롤에 관한 설명으로 잘못된 것은 무엇인가?
    images:
      - path: images/subjects/java-programming/past-exams/2019/e19-listbox.png
        alt: 2019년 Java프로그래밍 기출 54번 AWT 리스트 컨트롤
    choices:
      - { id: '1', text: '리스트박스라고도 하며 스크롤이 가능하다.' }
      - { id: '2', text: '목록에 있는 항목 중 다중 선택이 가능하다.' }
      - { id: '3', text: '항목을 선택하거나 더블클릭할 때 이벤트가 발생한다.' }
      - { id: '4', text: '항목을 불러올 때 사용하는 모달 대화상자이다.' }
    answers: ['4']
    explanation: |
      선택지 1: 그림은 여러 항목을 목록으로 보여주는 List 컨트롤이며 스크롤이 가능하다.
      선택지 2: AWT List는 생성 옵션에 따라 다중 선택을 지원할 수 있다.
      선택지 3: 항목 선택이나 더블클릭 같은 사용자 조작에서 이벤트가 발생한다.
      선택지 4: List는 목록 컨트롤이지 파일이나 항목을 불러오는 모달 대화상자가 아니다.

      핵심 개념:
      AWT List는 여러 문자열 항목을 목록 형태로 보여주는 컴포넌트다.
      항목 수가 표시 영역보다 많으면 스크롤로 탐색할 수 있다.
      옵션에 따라 단일 선택 또는 다중 선택이 가능하다.
      모달 대화상자는 Dialog/FileDialog 같은 별도 컴포넌트의 역할이다.
    tags: [awt, list]

  - id: e19-20
    type: multiple-choice
    passageRefs: [g19-button-code-01]
    prompt: 첫 번째와 두 번째 라인에 나오는 import 구문의 의미를 잘 설명한 것은?
    choices:
      - {
          id: '1',
          text: '아래 나오는 클래스 정의에서 다른 패키지에 존재하는 클래스나 인터페이스를 사용하려는 것이다.',
        }
      - { id: '2', text: '아래 나오는 두 개의 클래스 정의가 위치할 패키지를 결정하는 것이다.' }
      - { id: '3', text: '패키지 두 개를 새롭게 정의하는 것이다.' }
      - { id: '4', text: '기존 패키지를 상속받아 새로운 패키지를 정의하는 것이다.' }
    answers: ['1']
    explanation: |
      선택지 1: import는 다른 패키지의 클래스나 인터페이스 이름을 코드에서 쉽게 쓰기 위한 선언이다.
      선택지 2: 클래스가 속할 패키지는 package 선언으로 정한다.
      선택지 3: import는 패키지를 새로 정의하지 않는다.
      선택지 4: 패키지는 상속 대상이 아니며 import와 상속은 관련이 없다.

      핵심 개념:
      import 문은 외부 패키지의 타입을 현재 소스에서 사용할 수 있게 한다.
      package 문은 현재 클래스가 속한 패키지를 선언한다.
      import java.awt.*는 AWT 컴포넌트 타입 사용을 돕는다.
      import java.awt.event.*는 이벤트 처리 타입 사용을 돕는다.
    tags: [package, import]

  - id: e19-21
    type: multiple-choice
    passageRefs: [g19-button-code-01]
    prompt: ActionEvent를 등록하려면 해당 이벤트의 리스너를 구현하는 클래스를 먼저 정의해야 한다. 밑줄 ㄱ에 들어갈 내용은?
    choices:
      - { id: '1', text: 'implements ActionListener' }
      - { id: '2', text: 'extends ActionListener' }
      - { id: '3', text: 'implements ActionAdapter' }
      - { id: '4', text: 'extends ActionAdapter' }
    answers: ['1']
    explanation: |
      선택지 1: ActionListener는 인터페이스이므로 implements로 구현해야 한다.
      선택지 2: 인터페이스는 extends가 아니라 implements로 구현한다.
      선택지 3: ActionAdapter라는 표준 AWT 이벤트 어댑터는 이 문맥에 맞지 않는다.
      선택지 4: ActionListener를 처리하려면 ActionListener 구현이 필요하다.

      핵심 개념:
      AWT 이벤트 처리는 리스너 인터페이스 구현으로 이루어진다.
      ActionEvent는 ActionListener의 actionPerformed 메소드로 처리한다.
      인터페이스 구현에는 implements를 사용한다.
      버튼 클릭 이벤트를 처리하려면 버튼에 ActionListener를 등록해야 한다.
    tags: [awt, event]

  - id: e19-22
    type: multiple-choice
    passageRefs: [g19-button-code-01]
    prompt: 다음 그림은 위 프로그램을 실행한 결과이다. 배치관리자를 의미하는 것으로 밑줄 ㄴ에 들어갈 내용은 무엇이라 생각하는가?
    images:
      - path: images/subjects/java-programming/past-exams/2019/e19-flow-layout.png
        alt: 2019년 Java프로그래밍 기출 57번 FlowLayout 실행 화면
    choices:
      - { id: '1', text: 'GridLayout' }
      - { id: '2', text: 'FlowLayout' }
      - { id: '3', text: 'BorderLayout' }
      - { id: '4', text: 'ButtonAreaLayout' }
    answers: ['2']
    explanation: |
      선택지 1: GridLayout은 행과 열 격자에 컴포넌트를 같은 크기로 배치한다.
      선택지 2: FlowLayout은 컴포넌트를 왼쪽에서 오른쪽으로 흐르듯 배치하며 그림과 일치한다.
      선택지 3: BorderLayout은 North, South, East, West, Center 영역에 배치한다.
      선택지 4: ButtonAreaLayout은 표준 AWT 배치관리자가 아니다.

      핵심 개념:
      AWT 컨테이너는 배치관리자를 통해 컴포넌트 위치를 정한다.
      FlowLayout은 컴포넌트를 한 줄에 순서대로 배치하고 공간이 부족하면 다음 줄로 넘긴다.
      GridLayout과 BorderLayout은 배치 방식이 다르다.
      화면 결과를 보면 배치관리자의 종류를 추론할 수 있다.
    tags: [awt, layout]

  - id: e19-23
    type: multiple-choice
    passageRefs: [g19-button-code-01]
    prompt: 첫 번째 버튼 b1에 ActionEvent를 등록하려고 한다. 밑줄 ㄷ에 들어갈 적당한 내용은?
    choices:
      - { id: '1', text: 'addWindowListener()' }
      - { id: '2', text: 'addWindowListener(new MyFrame())' }
      - { id: '3', text: 'addActionListener()' }
      - { id: '4', text: 'addActionListener(new MyListener())' }
    answers: ['4']
    explanation: |
      선택지 1: 창 이벤트 등록 메소드이며 버튼 액션 리스너 객체도 없다.
      선택지 2: WindowListener 등록 형태라 버튼 클릭 ActionEvent 처리와 맞지 않는다.
      선택지 3: 메소드 이름은 맞지만 등록할 리스너 인자가 빠져 있다.
      선택지 4: b1에 MyListener 객체를 ActionListener로 등록하는 올바른 코드다.

      핵심 개념:
      Button의 클릭 같은 액션 이벤트는 ActionListener로 처리한다.
      이벤트 소스 객체에 addActionListener(listener)를 호출해 리스너를 등록한다.
      WindowListener는 창 닫기 같은 윈도우 이벤트에 사용한다.
      리스너 등록에는 실제 리스너 객체가 필요하다.
    tags: [awt, event]

  - id: e19-24
    type: multiple-choice
    passageRefs: [g19-jdbc-code-01]
    prompt: 매개변수를 가지는 SQL 구문을 표현하는 객체를 생성하기 위해 밑줄 ㄱ에 들어갈 적당한 메소드는?
    choices:
      - { id: '1', text: 'prepare' }
      - { id: '2', text: 'create' }
      - { id: '3', text: 'prepareStatement' }
      - { id: '4', text: 'createStatement' }
    answers: ['3']
    explanation: |
      선택지 1: Connection의 표준 메소드명이 아니다.
      선택지 2: 매개변수 SQL용 PreparedStatement 생성 메소드가 아니다.
      선택지 3: prepareStatement(query)는 매개변수 자리표시자를 가진 SQL을 실행할 PreparedStatement를 만든다.
      선택지 4: createStatement()는 일반 Statement 생성에 사용하며 매개변수 바인딩 목적과 다르다.

      핵심 개념:
      JDBC에서 PreparedStatement는 ? 자리표시자를 가진 SQL을 준비한다.
      Connection.prepareStatement(sql)로 PreparedStatement 객체를 생성한다.
      setString, setInt 같은 메소드로 매개변수 값을 바인딩한다.
      PreparedStatement는 반복 실행과 SQL 인젝션 완화에 유리하다.
    tags: [jdbc, prepared-statement]

  - id: e19-25
    type: multiple-choice
    passageRefs: [g19-jdbc-code-01]
    prompt: 위에서 표현된 SQL 구문을 실행하기 위해 밑줄 ㄴ에 들어갈 적당한 메소드는?
    choices:
      - { id: '1', text: 'getResultSet' }
      - { id: '2', text: 'execute' }
      - { id: '3', text: 'executeQuery' }
      - { id: '4', text: 'executeUpdate' }
    answers: ['4']
    explanation: |
      선택지 1: getResultSet은 이미 실행된 결과 집합을 얻는 메소드이지 SQL 실행 메소드가 아니다.
      선택지 2: execute도 SQL 실행은 가능하지만 이 문맥의 INSERT 영향 행 수를 받는 데 가장 적절한 메소드는 아니다.
      선택지 3: executeQuery는 SELECT처럼 ResultSet을 반환하는 질의에 사용한다.
      선택지 4: executeUpdate는 INSERT, UPDATE, DELETE 실행 후 영향 받은 행 수를 반환하므로 resultCount 대입에 맞다.

      핵심 개념:
      JDBC 실행 메소드는 SQL 종류에 따라 구분해 사용한다.
      SELECT는 보통 executeQuery를 사용해 ResultSet을 얻는다.
      INSERT, UPDATE, DELETE는 executeUpdate를 사용해 반영된 행 수를 얻는다.
      PreparedStatement에 값을 바인딩한 뒤 적절한 실행 메소드를 호출한다.
    tags: [jdbc, execute-update]
