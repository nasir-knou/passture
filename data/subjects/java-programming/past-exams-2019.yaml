  - id: g19-copy-file-code-01
    type: code
    language: java
    body: |
      public class CopyFile {
        public static void main(String args[]) {
          FileReader in = null;
          FileWriter out = null;
          try {
            in = new FileReader("input.txt");
            out = new FileWriter("output.txt");
            int c;
            while ((c = in.read()) != -1) {
              out.write(c);
            }
            in.close();
            out.close();
          } catch (java.io.IOException e) {
            System.out.println(e);
          }
        }
      }

