      선택지 1: 3-주소 명령어는 피연산자와 결과 위치를 명령어 안에 명시한다.
      선택지 2: 2-주소 명령어는 두 주소 필드를 사용하며 한 피연산자 위치가 결과 위치로도 쓰일 수 있다.
      선택지 3: 1-주소 명령어는 누산기와 같은 묵시적 레지스터를 함께 사용하는 형식이다.
      선택지 4: 0-주소 명령어는 피연산자를 스택에서 묵시적으로 가져오고 결과도 스택에 저장하므로 정답이다.

