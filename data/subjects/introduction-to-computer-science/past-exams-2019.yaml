    tags: [variable-lifetime, programming-language]

  - id: e19-32
    type: multiple-choice
    prompt: 컴파일 과정 중에서 프로그램을 구성하는 문자들의 나열로부터 단어(토큰)를 추출해 내는 과정은 무엇인가?
    choices:
      - { id: '1', text: 프로그램 작성 }
      - { id: '2', text: 구문 분석 }
      - { id: '3', text: 어휘 분석 }
      - { id: '4', text: 코드 생성 }
    answers: ['3']
    explanation: |
      선택지 1: 프로그램 작성은 컴파일러가 수행하는 분석 단계가 아니다.
      선택지 2: 구문 분석은 토큰열이 문법 구조에 맞는지 분석하는 단계이다.
      선택지 3: 문자 나열에서 토큰을 추출하는 단계는 어휘 분석이므로 정답이다.
      선택지 4: 코드 생성은 분석 이후 목적 코드나 중간 코드를 생성하는 단계이다.

      핵심 개념:
      컴파일 과정은 보통 어휘 분석, 구문 분석, 의미 분석, 최적화, 코드 생성 등으로 진행된다.
      어휘 분석기는 소스 문자를 읽어 식별자, 키워드, 연산자 같은 토큰을 만든다.
      단어 또는 토큰 추출이라는 단서가 어휘 분석을 의미한다.
    tags: [compiler, lexical-analysis]

  - id: e19-33
    type: multiple-choice
    prompt: 컴퓨터 통신을 위해 통신을 하는 노드 간의 합의된 통신 약속을 무엇이라고 하는가?
    choices:
      - { id: '1', text: 주파수 }
      - { id: '2', text: 채널 }
      - { id: '3', text: 대역폭 }
      - { id: '4', text: 프로토콜 }
    answers: ['4']
    explanation: |
      선택지 1: 주파수는 신호의 진동수와 관련된 물리적 특성이다.
      선택지 2: 채널은 통신 신호가 전달되는 경로나 매체를 의미한다.
      선택지 3: 대역폭은 전송 가능한 주파수 범위 또는 데이터 전송 용량과 관련된다.
      선택지 4: 통신 참여자들이 따르는 규칙과 약속은 프로토콜이므로 정답이다.

      핵심 개념:
      프로토콜은 통신 형식, 순서, 오류 처리, 흐름 제어 등을 정한 규칙이다.
      네트워크 통신에서는 송신자와 수신자가 같은 프로토콜을 따라야 한다.
      합의된 통신 약속이라는 표현이 프로토콜의 정의이다.
    tags: [network, protocol]

  - id: e19-34
    type: multi-answer
    prompt: 두 개의 버스에 동시에 연결된 장비이며, 목적지에 해당하는 버스 방향으로만 브로드캐스트 하는 것은 무엇인가?
    choices:
      - { id: '1', text: 리피터 }
      - { id: '2', text: 브리지 }
      - { id: '3', text: 호스트 }
      - { id: '4', text: 스위치 }
    answers: ['2', '4']
    explanation: |
      선택지 1: 리피터는 신호를 재생해 전달하지만 목적지 방향을 판단해 프레임을 선별 전달하는 장비는 아니다.
      선택지 2: 브리지는 두 LAN 세그먼트를 연결하고 목적지 주소를 기준으로 필요한 방향으로 프레임을 전달하므로 정답이다.
      선택지 3: 호스트는 네트워크를 사용하는 종단 장치이며 두 버스를 연결해 전달을 제어하는 장비가 아니다.
      선택지 4: 스위치는 다중 포트 브리지처럼 동작하며 목적지에 해당하는 포트 방향으로 프레임을 전달하므로 정답이다.

      핵심 개념:
      브리지는 데이터 링크 계층에서 프레임의 목적지 주소를 보고 세그먼트 간 전달 여부를 결정한다.
      스위치는 브리지 기능을 포트 단위로 확장한 장비로 볼 수 있다.
      단순 증폭 장비인 리피터와 주소 기반 전달 장비인 브리지/스위치를 구분해야 한다.
    tags: [network-device, bridge, switch]

  - id: e19-35
    type: multiple-choice
    prompt: 패킷 단위로 전송이 이루어지며, 계층적인 방식으로 주소 지정을 하고, 인터넷의 IP(internet protocol)가 정의되는 계층은 무엇인가?
    choices:
      - { id: '1', text: 네트워크 계층 }
      - { id: '2', text: 데이터 링크 계층 }
      - { id: '3', text: 세션 계층 }
      - { id: '4', text: 물리 계층 }
    answers: ['1']
    explanation: |
      선택지 1: IP는 네트워크 계층 프로토콜이며 계층적 주소 지정과 패킷 전달을 담당하므로 정답이다.
      선택지 2: 데이터 링크 계층은 인접 노드 사이의 프레임 전달을 담당한다.
      선택지 3: 세션 계층은 통신 세션의 설정과 관리에 관련된다.
      선택지 4: 물리 계층은 비트 전송과 물리 매체 특성을 다룬다.

      핵심 개념:
      OSI 7계층에서 IP는 네트워크 계층에 속한다.
      네트워크 계층은 논리 주소와 라우팅을 통해 패킷을 목적지까지 전달한다.
      계층적 주소 지정과 IP라는 단서가 네트워크 계층을 가리킨다.
    tags: [osi-model, network-layer, ip]
