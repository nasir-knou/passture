  - id: e19-29
    type: multiple-choice
    prompt: 중앙에 있는 컴퓨터가 모든 메시지의 중계자 역할을 수행하고, 모든 메시지는 먼저 중앙의 컴퓨터로 보내진 뒤 목적지 컴퓨터에 전달되는 특징을 가진 LAN의 위상 구조는 무엇인가?
    choices:
      - { id: '1', text: 버스형 }
