  - id: e19-24
    type: multiple-choice
    prompt: 시스템 측면, 즉 개발자 측면에서 제한적인 컴퓨터 자원을 효율적으로 사용하기 위한 컴퓨터 자원 관리의 효율성을 제공하는 것은 무엇인가?
