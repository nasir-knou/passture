    choices:
      - { id: '1', text: 변수의 수명 }
      - { id: '2', text: 변수의 범위 }
      - { id: '3', text: 변수의 주소 }
      - { id: '4', text: 변수의 참조 }
    answers: ['1']
    explanation: |
      선택지 1: 변수가 기억장소를 할당받아 존재하는 기간은 변수의 수명이므로 정답이다.
      선택지 2: 변수의 범위는 프로그램 안에서 변수를 참조할 수 있는 영역을 뜻한다.
      선택지 3: 변수의 주소는 변수가 저장된 기억장소의 위치이다.
      선택지 4: 변수의 참조는 변수의 값을 접근하거나 가리키는 동작 또는 관계와 관련된다.

      핵심 개념:
      변수의 수명은 메모리에 할당되어 존재하는 시간적 개념이다.
      변수의 범위는 이름을 사용할 수 있는 공간적 또는 문맥적 영역이다.
