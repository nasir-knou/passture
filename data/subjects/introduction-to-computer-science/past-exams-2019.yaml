      - { id: '3', text: 일괄처리 기법 }
      - { id: '4', text: 시분할처리 기법 }
    answers: ['2']
    explanation: |
      선택지 1: 가상기억장치는 보조기억장치를 이용해 논리적 기억공간을 확장하는 기법이다.
      선택지 2: 동적 분할은 작업 크기에 맞게 메모리를 나누어 고정 분할의 내부 단편화 문제를 줄이기 위해 사용되므로 정답이다.
      선택지 3: 일괄처리는 작업을 모아 순차적으로 처리하는 운영 방식이다.
      선택지 4: 시분할처리는 CPU 시간을 나누어 여러 사용자나 작업에 제공하는 방식이다.

      핵심 개념:
      고정 분할은 미리 정해진 크기의 분할에 작업을 넣으므로 내부 단편화가 발생하기 쉽다.
      동적 분할은 작업 크기에 따라 분할 크기를 정해 메모리 낭비를 줄인다.
      메모리 관리 기법의 차이를 단편화 유형과 함께 이해해야 한다.
    tags: [memory-management, dynamic-partitioning]

  - id: e19-26
    type: multiple-choice
