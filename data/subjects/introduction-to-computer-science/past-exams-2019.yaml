      선택지 2: 사용자프로그램은 특정 사용자 작업을 수행하는 프로그램이지 전체 자원 관리 주체가 아니다.
      선택지 3: 응용프로그램은 사용자의 목적을 수행하며 시스템 자원 관리는 운영체제에 의존한다.
      선택지 4: 펌웨어는 하드웨어 제어용 소프트웨어로, 일반적인 컴퓨터 자원 관리 효율성의 주체로 보기 어렵다.

      핵심 개념:
      운영체제는 사용자와 하드웨어 사이에서 자원을 관리하고 서비스를 제공한다.
      시스템 관점에서는 자원 관리자 역할이 핵심이다.
      사용자 관점에서는 편리한 실행 환경 제공 역할도 함께 가진다.
