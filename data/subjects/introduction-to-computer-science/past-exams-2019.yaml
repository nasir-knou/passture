      선택지 2: 탐색이진트리는 값의 대소 관계를 기준으로 배치되는 이진 탐색 트리이다.
      선택지 3: 스레드이진트리는 빈 링크를 순회에 활용하도록 만든 트리이다.
      선택지 4: 모든 레벨이 꽉 차 있고 내부 노드가 모두 두 자식을 가지는 트리는 포화이진트리이다.

      핵심 개념:
      포화이진트리는 가능한 모든 노드를 가진 이진트리이다.
      모든 내부 노드가 정확히 두 자식을 가지고 모든 리프의 깊이가 같다.
      완전이진트리와 포화이진트리의 조건 차이를 구분해야 한다.
