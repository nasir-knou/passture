      선택지 2: 인접리스트는 각 정점마다 인접한 정점 목록을 저장하는 방식이다.
      선택지 3: 정점 쌍의 연결 여부를 행렬의 0과 1로 나타내므로 인접행렬이 정답이다.
      선택지 4: 그래프행렬이라는 표현보다 인접행렬이 표준 명칭이다.

      핵심 개념:
      인접행렬은 정점 수가 n일 때 n x n 행렬로 간선 존재 여부를 표현한다.
      무방향 그래프의 인접행렬은 주대각선을 기준으로 대칭이다.
      인접리스트는 연결된 정점 목록으로 저장한다는 점에서 다르다.
