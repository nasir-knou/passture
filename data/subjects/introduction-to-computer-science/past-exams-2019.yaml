    explanation: |
      선택지 1: 왼쪽 서브트리, 오른쪽 서브트리, 루트 순서로 방문하면 H-I-D-J-E-B-F-G-C-A가 되므로 정답이다.
      선택지 2: 루트부터 레벨 순서에 가깝게 나열되어 후위순회가 아니다.
      선택지 3: B의 서브트리에서 D의 방문 위치가 후위순회와 맞지 않는다.
      선택지 4: D를 자식 H, I보다 먼저 방문하므로 후위순회가 아니다.

      핵심 개념:
      후위순회는 각 노드에 대해 왼쪽 자식, 오른쪽 자식, 자기 자신 순서로 방문한다.
      D의 후위순회는 H-I-D이고, E의 후위순회는 J-E이다.
      전체 트리는 왼쪽 B 서브트리, 오른쪽 C 서브트리, 루트 A 순서로 결합한다.
    tags: [tree-traversal, postorder]

