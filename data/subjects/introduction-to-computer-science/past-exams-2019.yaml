      선택지 2: 프레임은 주기억장치를 페이지와 같은 크기로 나눈 물리적 블록이다.
      선택지 3: 세그먼트는 프로그램을 논리적 단위로 나눈 가변 크기 영역이다.
      선택지 4: 보조기억장치에서 주기억장치로 적재되는 고정 크기 논리 블록은 페이지이므로 정답이다.

      핵심 개념:
      페이징에서 프로그램의 논리 주소 공간은 페이지로 나뉜다.
      주기억장치의 물리 블록은 프레임이라고 부른다.
      페이지와 프레임은 같은 크기이며, 페이지가 프레임에 적재된다.
    tags: [paging, memory-management]

  - id: e19-27
    type: multiple-choice
    prompt: 먼저 도착한 디스크 접근 요청이 가장 먼저 서비스를 받는 방식의 디스크 스케줄링 기법은 무엇인가?
    choices:
      - { id: '1', text: FCFS 기법 }
      - { id: '2', text: SSTF 기법 }
      - { id: '3', text: SLTF 기법 }
      - { id: '4', text: SCAN 기법 }
    answers: ['1']
    explanation: |
      선택지 1: FCFS는 First-Come, First-Served의 약자로 먼저 도착한 요청을 먼저 처리하므로 정답이다.
      선택지 2: SSTF는 현재 헤드 위치에서 탐색 시간이 가장 짧은 요청을 먼저 처리한다.
      선택지 3: SLTF는 이 문항의 표준 디스크 스케줄링 명칭으로 적절하지 않다.
      선택지 4: SCAN은 헤드가 한 방향으로 이동하며 요청을 처리하는 엘리베이터 알고리즘이다.

      핵심 개념:
      FCFS는 구현이 단순하고 공평하지만 평균 탐색 시간이 길어질 수 있다.
      SSTF와 SCAN은 헤드 이동 거리를 줄이기 위한 대표 기법이다.
      먼저 도착한 순서라는 단서는 FCFS를 가리킨다.
    tags: [disk-scheduling, fcfs]

