      모든 통신이 중앙 장치를 거치므로 관리가 쉽지만 중앙 장치 장애에 취약하다.
      중앙 중계자라는 표현이 성형 구조의 핵심 단서이다.
    tags: [network-topology, star-topology]

  - id: e19-30
    type: multiple-choice
    prompt: 함수 안에서 선언된 변수에 대한 연산이 형식매개변수에 의해 이루어지고, 프로그램 안에서의 실매개변수의 값에는 아무런 영향을 주지 않는 함수 호출 방식의 매개변수 호출 방법을 무엇이라고 하는가?
    choices:
      - { id: '1', text: 형식 호출 }
      - { id: '2', text: 값 호출 }
      - { id: '3', text: 이름 호출 }
      - { id: '4', text: 참조 호출 }
    answers: ['2']
    explanation: |
      선택지 1: 형식 호출은 표준적인 매개변수 전달 방식 명칭이 아니다.
      선택지 2: 값 호출은 실매개변수의 값을 복사해 형식매개변수에 전달하므로 함수 내부 변경이 원래 값에 영향을 주지 않는다.
      선택지 3: 이름 호출은 매개변수 표현식을 필요할 때마다 평가하는 방식이다.
      선택지 4: 참조 호출은 변수의 참조를 전달하므로 함수 내부 변경이 실매개변수에 영향을 줄 수 있다.

      핵심 개념:
      값 호출은 복사본을 전달하는 방식이다.
      함수 내부에서 형식매개변수를 바꿔도 호출한 쪽의 실제 변수 값은 바뀌지 않는다.
