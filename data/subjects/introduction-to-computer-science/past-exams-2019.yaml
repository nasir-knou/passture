      선택지 2: 조건문, 반복문, 블록 구조, 함수 호출을 바탕으로 제어 흐름을 구성하는 것은 구조적 프로그래밍 언어의 특징이다.
      선택지 3: 스크립트 언어는 실행 방식이나 사용 영역에 따른 분류에 가깝다.
