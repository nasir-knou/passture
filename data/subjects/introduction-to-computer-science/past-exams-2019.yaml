questions:
  - id: e19-01
    type: multiple-choice
    prompt: 폰 노이만의 내장 프로그램(stored program) 방식에 기반을 둔 최초의 컴퓨터는?
    choices:
      - { id: '1', text: EDVAC }
      - { id: '2', text: ENIAC }
      - { id: '3', text: Colossus }
      - { id: '4', text: Difference Engine }
    answers: ['1']
    explanation: |
      선택지 1: EDVAC은 명령어와 데이터를 같은 기억장치에 저장하는 내장 프로그램 방식의 초기 컴퓨터로 정답이다.
      선택지 2: ENIAC은 전자식 범용 컴퓨터였지만 프로그램 변경을 배선과 스위치 조작으로 수행했다.
      선택지 3: Colossus는 암호 해독용 전자식 계산기로, 폰 노이만 구조의 대표 사례가 아니다.
      선택지 4: Difference Engine은 배비지의 기계식 계산 장치 구상으로 내장 프로그램 컴퓨터가 아니다.

      핵심 개념:
      내장 프로그램 방식은 프로그램 명령어를 데이터처럼 기억장치에 저장하고 순차적으로 실행하는 구조이다.
      이 방식은 현대 범용 컴퓨터 구조의 핵심 원리이다.
      EDVAC은 폰 노이만 구조와 관련해 자주 언급되는 초기 컴퓨터이다.
      ENIAC과 구분할 때 프로그램 저장 방식 여부가 핵심 판단 기준이다.
    tags: [von-neumann-architecture, stored-program]

  - id: e19-02
    type: multiple-choice
    prompt: 자료의 양을 나타내는 단위 중에서 MB에 비해 대략 $10^6$배의 더 많은 양을 나타내는 단위는?
    choices:
      - { id: '1', text: GB }
      - { id: '2', text: KB }
      - { id: '3', text: PB }
      - { id: '4', text: TB }
    answers: ['4']
    explanation: |
      선택지 1: GB는 MB보다 대략 $10^3$배 큰 단위이다.
      선택지 2: KB는 MB보다 작은 단위이다.
      선택지 3: PB는 MB보다 대략 $10^9$배 큰 단위로 문제 조건보다 크다.
      선택지 4: TB는 GB보다 다시 $10^3$배 크므로 MB보다 대략 $10^6$배 큰 단위이다.

      핵심 개념:
      저장 용량 단위는 보통 KB, MB, GB, TB, PB 순으로 커진다.
      십진 접두 기준으로 인접한 큰 단위는 약 $10^3$배 차이가 난다.
      MB에서 GB로 $10^3$배, GB에서 TB로 다시 $10^3$배가 된다.
      따라서 MB 대비 $10^6$배는 TB에 해당한다.
    tags: [data-unit, storage-capacity]

  - id: e19-03
    type: multiple-choice
    prompt: 8비트로 표현되는 정수 중에서 가장 큰 양의 정수를 나타낼 수 있는 것은?
    choices:
      - { id: '1', text: 부호화-크기 }
      - { id: '2', text: 부호 없는 정수 }
      - { id: '3', text: 1의 보수 }
      - { id: '4', text: 2의 보수 }
    answers: ['2']
    explanation: |
      선택지 1: 부호화-크기는 1비트를 부호에 사용하므로 양수 크기 표현에 7비트만 쓴다.
      선택지 2: 부호 없는 정수는 8비트 전체를 크기 표현에 사용하므로 가장 큰 양의 정수 $255$까지 나타낼 수 있다.
      선택지 3: 1의 보수도 부호 비트를 사용하므로 양수 범위는 7비트 크기에 제한된다.
      선택지 4: 2의 보수도 최상위 비트를 부호 의미로 사용하므로 최대 양수는 $127$이다.

      핵심 개념:
      같은 비트 수에서 부호 비트를 쓰면 양수 표현 범위가 줄어든다.
      8비트 부호 없는 정수의 범위는 0부터 255까지이다.
      8비트 2의 보수 정수의 양수 최댓값은 127이다.
      따라서 가장 큰 양의 정수를 표현할 수 있는 방식은 부호 없는 정수이다.
    tags: [integer-representation, unsigned-integer]

  - id: e19-04
    type: multiple-choice
    prompt: 2의 보수 방법으로 표현된 8비트 정수 10010011은 10진수로 얼마인가?
    choices:
      - { id: '1', text: '-108' }
      - { id: '2', text: '-109' }
      - { id: '3', text: '-110' }
      - { id: '4', text: '-111' }
    answers: ['2']
    explanation: |
      선택지 1: 보수 변환으로 얻는 절댓값이 108이 아니므로 맞지 않는다.
      선택지 2: 최상위 비트가 1이므로 음수이고, 비트를 반전한 01101100에 1을 더하면 01101101, 즉 109가 되어 값은 -109이다.
      선택지 3: 2의 보수 변환 결과의 절댓값보다 1 크다.
      선택지 4: 주어진 비트열의 2의 보수 해석과 맞지 않는다.

      핵심 개념:
      2의 보수에서 최상위 비트가 1이면 음수이다.
      음수의 절댓값은 비트를 반전하고 1을 더해 구할 수 있다.
      10010011을 반전하면 01101100이고, 1을 더하면 01101101이다.
      01101101은 10진수 109이므로 원래 값은 -109이다.
    tags: [twos-complement, integer-representation]

  - id: e19-05
    type: multiple-choice
    prompt: 이진수 110100.1001을 컴퓨터 내에 표현할 때 지수 부분의 표현으로 올바른 것은? 단, 초과-31을 사용한다.
    choices:
      - { id: '1', text: '011111' }
      - { id: '2', text: '101101' }
      - { id: '3', text: '100100' }
      - { id: '4', text: '011110' }
    answers: ['3']
    explanation: |
      선택지 1: 초과-31의 기준값 31 자체를 나타내는 값으로, 실제 지수 5가 반영되지 않았다.
      선택지 2: 45를 나타내는 값으로, 지수 5에 31을 더한 결과와 다르다.
      선택지 3: $110100.1001_2=1.101001001_2\times2^5$이고 초과-31 표현은 $5+31=36$, 즉 $100100_2$이므로 정답이다.
      선택지 4: 30을 나타내며, 초과-31에서 지수 5를 표현한 값이 아니다.

      핵심 개념:
      부동소수점 표현에서는 이진수를 정규화해 지수를 구한다.
      $110100.1001_2$는 소수점을 왼쪽으로 5칸 옮기면 $1.101001001_2$가 된다.
      초과-31 표현은 실제 지수에 31을 더해 저장한다.
      실제 지수 5는 $5+31=36=100100_2$로 표현된다.
    tags: [floating-point, excess-notation]

  - id: e19-06
    type: multiple-choice
    prompt: 알고리즘이 만족해야 할 조건에 대한 설명으로 적절하지 못한 것은?
    choices:
      - { id: '1', text: 범용성 - 다양한 문제에 폭 넓게 적용될 수 있어야 한다. }
      - { id: '2', text: 유한성 - 한정된 수의 단계를 거친 후에는 종료해야 한다. }
      - { id: '3', text: 유효성 - 모든 명령은 컴퓨터에서 실행 가능해야 한다. }
      - { id: '4', text: 명확성 - 각 명령은 모호하지 않고 단순 명확해야 한다. }
    answers: ['1']
    explanation: |
      선택지 1: 알고리즘은 특정 문제를 해결하기 위한 절차이므로 모든 다양한 문제에 폭넓게 적용되는 범용성이 필수 조건은 아니다.
      선택지 2: 알고리즘은 유한한 단계 후 종료해야 하므로 올바른 설명이다.
      선택지 3: 각 단계는 실제로 수행 가능한 명령이어야 하므로 유효성에 대한 올바른 설명이다.
      선택지 4: 각 명령은 모호하지 않아야 하므로 명확성에 대한 올바른 설명이다.

      핵심 개념:
      알고리즘의 기본 조건에는 입력, 출력, 명확성, 유한성, 유효성 등이 포함된다.
      범용성은 좋은 알고리즘의 확장성 관점에서 말할 수는 있지만 필수 조건으로 보기는 어렵다.
      조건 설명 문제에서는 표준 알고리즘 조건과 다른 항목을 구분해야 한다.
    tags: [algorithm, algorithm-properties]

  - id: e19-07
    type: multiple-choice
    prompt: 알고리즘의 대표적인 설계 기법에 해당하는 것은?
    choices:
      - { id: '1', text: 상각분석법 }
      - { id: '2', text: 분할정복 방법 }
      - { id: '3', text: 회귀분석법 }
      - { id: '4', text: 분기한정 방법 }
    answers: ['2']
    explanation: |
      선택지 1: 상각분석은 여러 연산의 평균 비용을 분석하는 방법으로, 대표적인 설계 기법 자체는 아니다.
      선택지 2: 분할정복은 문제를 더 작은 부분 문제로 나누어 해결한 뒤 결합하는 대표적인 알고리즘 설계 기법이다.
      선택지 3: 회귀분석은 통계 분석 방법으로 알고리즘 설계 기법이 아니다.
      선택지 4: 분기한정은 최적화 문제 풀이 기법으로 쓰이지만, 이 문항에서 묻는 대표적 설계 기법으로는 분할정복이 가장 적절하다.

      핵심 개념:
      분할정복, 동적 계획법, 탐욕 기법, 백트래킹 등은 대표적인 알고리즘 설계 기법이다.
      분석 방법과 설계 기법은 구분해야 한다.
      분할정복은 합병 정렬, 퀵 정렬, 이진 탐색 등에서 사용된다.
    tags: [algorithm-design, divide-and-conquer]

  - id: e19-08
    type: multiple-choice
    prompt: 알고리즘의 시간 복잡도에 대한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: 입력 데이터의 크기의 함수로 표현한다. }
      - { id: '2', text: 일반적으로 최악의 수행 시간을 시간 복잡도의 척도로 사용한다. }
      - { id: '3', text: 알고리즘이 수행하는 기본 연산의 수행 횟수의 합으로 표현한다. }
      - { id: '4', text: 입력 데이터의 상태에 무관하다. }
    answers: ['4']
    explanation: |
      선택지 1: 시간 복잡도는 보통 입력 크기 $n$에 대한 함수로 표현하므로 맞는 설명이다.
      선택지 2: 알고리즘 분석에서는 보장 가능한 상한을 보기 위해 최악의 수행 시간을 자주 사용한다.
      선택지 3: 기본 연산이 수행되는 횟수를 기준으로 시간 복잡도를 계산할 수 있다.
      선택지 4: 같은 크기의 입력이라도 정렬 여부나 값의 배치에 따라 수행 시간이 달라질 수 있으므로 틀린 설명이다.

      핵심 개념:
      시간 복잡도는 입력 크기와 기본 연산 횟수의 증가율을 나타낸다.
      최선, 평균, 최악 수행 시간은 입력 데이터의 상태에 따라 달라질 수 있다.
      따라서 시간 복잡도가 입력 데이터의 상태와 항상 무관하다고 할 수 없다.
    tags: [algorithm-analysis, time-complexity]

  - id: e19-09
    type: multiple-choice
    prompt: 피벗을 기준으로 주어진 입력 리스트의 원소들을 두 개의 서브리스트로 분할하고, 각 서브리스트에 대해서 독립적으로 해당 정렬 알고리즘을 순환적으로 적용하는 방식의 정렬 알고리즘은?
    choices:
      - { id: '1', text: 삽입 정렬 }
      - { id: '2', text: 합병 정렬 }
      - { id: '3', text: 퀵 정렬 }
      - { id: '4', text: 버블 정렬 }
    answers: ['3']
    explanation: |
      선택지 1: 삽입 정렬은 이미 정렬된 부분에 새 원소를 끼워 넣는 방식이다.
      선택지 2: 합병 정렬은 분할 후 정렬된 부분 리스트를 병합하지만 피벗을 기준으로 분할하지 않는다.
      선택지 3: 퀵 정렬은 피벗을 기준으로 원소를 나눈 뒤 각 부분을 재귀적으로 정렬하므로 정답이다.
      선택지 4: 버블 정렬은 인접한 원소를 비교해 교환하는 방식이다.

      핵심 개념:
      퀵 정렬의 핵심은 피벗 선택과 분할 과정이다.
      분할된 두 부분 리스트는 같은 퀵 정렬 절차로 재귀적으로 처리된다.
      피벗이라는 단서가 나오면 퀵 정렬을 먼저 떠올릴 수 있다.
    tags: [sorting, quick-sort]

  - id: e19-10
    type: multiple-choice
    passageRefs: [g19-binary-search-tree-01]
    prompt: 다음과 같은 이진 탐색 트리에서 루트 노드를 삭제하였을 때 삭제된 노드의 위치로 이동하는 노드는?
    choices:
      - { id: '1', text: '7' }
      - { id: '2', text: '40' }
      - { id: '3', text: '22' }
