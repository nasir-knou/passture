      선택지 2: 루트 35를 삭제할 때 오른쪽 서브트리에서 가장 작은 값인 40을 중위 후속자로 사용하면 삭제 위치로 이동하므로 정답이다.
      선택지 3: 22는 왼쪽 서브트리의 노드이며 중위 전임자를 사용할 때도 최댓값이 아니므로 대체 노드가 아니다.
