      - { id: '3', text: 성형 }
      - { id: '4', text: 토큰형 }
    answers: ['3']
    explanation: |
      선택지 1: 버스형은 하나의 공유 전송 매체에 여러 장치가 연결되는 구조이다.
      선택지 2: 환형은 장치들이 고리 형태로 연결되는 구조이다.
      선택지 3: 성형은 중앙 장치를 중심으로 각 노드가 연결되고 중앙 장치가 중계 역할을 하므로 정답이다.
      선택지 4: 토큰형은 매체 접근 방식과 관련된 표현으로 위상 구조 명칭으로는 적절하지 않다.

      핵심 개념:
