    type: text
    body: |
      배낭의 용량은 10이고, 물체를 쪼갤 수 있다.
      - 물체 1: 이익 15, 무게 3
      - 물체 2: 이익 20, 무게 5
      - 물체 3: 이익 9, 무게 3
      - 물체 4: 이익 14, 무게 4
  - id: g17-bst-successor-01
    type: diagram
