      - { id: '2', text: 프로세스에 주기억장치를 할당하고 프로세스로부터 할당된 주기억장치를 회수한다. }
      - { id: '3', text: 시스템의 모든 장치를 가장 효율적으로 관리하고 동작시키며, 프로세스에 할당된 장치를 반환하여 다른 프로세스가 사용할 수 있도록 한다. }
