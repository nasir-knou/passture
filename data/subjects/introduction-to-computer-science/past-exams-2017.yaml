questions:
  - id: e17-01
    type: multiple-choice
    prompt: 컴퓨터에서 처리 가능한 작업 유형과 연산의 집합을 결정하며, 컴퓨터를 다양한 형태의 작업을 수행할 수 있는 범용의 기계로 만들어 주는 역할을 수행하는 것은?
    choices:
      - { id: '1', text: 프로그램 }
      - { id: '2', text: 데이터 }
      - { id: '3', text: 네트워크 }
      - { id: '4', text: 사용자 }
    answers: ['1']
    explanation: |
      프로그램은 컴퓨터가 수행할 명령어의 집합으로, 컴퓨터가 다양한 작업을 처리할 수 있도록 한다.
      데이터는 처리 대상이고, 네트워크와 사용자는 컴퓨터의 작업 유형과 연산 집합을 직접 결정하는 요소가 아니다.
    tags: [program, computer-system]

  - id: e17-02
    type: multiple-choice
    prompt: 현실 세계로부터 관찰이나 측정을 통해 단순히 얻어진 값이나 사실을 무엇이라고 하는가?
    choices:
      - { id: '1', text: 정보(information) }
      - { id: '2', text: 워드(word) }
      - { id: '3', text: 지식(knowledge) }
      - { id: '4', text: 자료(data) }
    answers: ['4']
    explanation: |
      관찰이나 측정을 통해 얻은 가공 전의 값과 사실은 자료(data)이다.
      정보는 자료를 목적에 맞게 처리해 의미를 부여한 결과로 구분한다.
    tags: [data, information]

  - id: e17-03
    type: multiple-choice
    prompt: 2의 보수 방법으로 표현된 8비트 정수 10010010은 십진수로 얼마인가?
    choices:
      - { id: '1', text: '-105' }
      - { id: '2', text: '-110' }
      - { id: '3', text: '-115' }
      - { id: '4', text: '-120' }
    answers: ['2']
    explanation: |
      최상위 비트가 1이므로 음수이다. 10010010을 반전하면 01101101이고 1을 더하면 01101110, 즉 110이다.
      따라서 2의 보수로 표현된 값은 -110이다.
    tags: [twos-complement, integer-representation]

  - id: e17-04
    type: multiple-choice
    prompt: 1001010.111을 부동소수점으로 표현할 때 지수 부분의 8비트 표현으로 올바른 것은? 단, 초과-127을 사용한다.
    choices:
      - { id: '1', text: '10000100' }
      - { id: '2', text: '10000101' }
      - { id: '3', text: '11000100' }
      - { id: '4', text: '11000101' }
    answers: ['2']
    explanation: |
      $1001010.111_2$은 정규화하면 $1.001010111_2 \times 2^6$이다.
      초과-127 표현은 실제 지수 6에 127을 더하므로 $133=10000101_2$이다.
    tags: [floating-point, excess-notation]

  - id: e17-05
    type: multiple-choice
    prompt: 문자 코드 체계 중에서 가장 많은 문자를 표현할 수 있는 것은?
    choices:
      - { id: '1', text: EBCDIC }
      - { id: '2', text: ASCII }
      - { id: '3', text: 유니코드 }
      - { id: '4', text: 확장된 ASCII }
    answers: ['3']
    explanation: |
      유니코드는 여러 언어와 기호를 포괄하도록 설계된 문자 코드 체계로, 제시된 선택지 중 가장 많은 문자를 표현할 수 있다.
      ASCII와 EBCDIC은 상대적으로 제한된 문자 집합을 표현한다.
    tags: [character-encoding, unicode]

  - id: e17-06
    type: multiple-choice
    prompt: 욕심쟁이 방법을 적용하기에 가장 적합한 것은?
    choices:
      - { id: '1', text: 거스름돈 문제 }
      - { id: '2', text: 합병 정렬 }
      - { id: '3', text: 이진 탐색 }
      - { id: '4', text: 퀵 정렬 }
    answers: ['1']
    explanation: |
      거스름돈 문제는 각 단계에서 가장 큰 단위의 동전을 선택하는 방식으로 설명되는 대표적인 욕심쟁이 방법 예시이다.
      합병 정렬, 이진 탐색, 퀵 정렬은 주로 분할정복 관점에서 다룬다.
    tags: [greedy-algorithm]

  - id: e17-07
    type: multiple-choice
    passageRefs: [g17-knapsack-01]
    prompt: 다음과 같은 조건의 배낭 문제를 욕심쟁이 방법으로 해결하려고 한다. 배낭에 가장 먼저 집어넣을 물체는? 단, 물체를 쪼갤 수 있다.
    choices:
      - { id: '1', text: 물체 1 }
      - { id: '2', text: 물체 2 }
      - { id: '3', text: 물체 3 }
      - { id: '4', text: 물체 4 }
    answers: ['1']
    explanation: |
      물체를 쪼갤 수 있는 배낭 문제에서는 단위 무게당 이익이 큰 물체를 먼저 선택한다.
      물체 1의 단위 이익은 15/3=5로 가장 크므로 가장 먼저 선택된다.
    tags: [knapsack, greedy-algorithm]

  - id: e17-08
    type: multiple-choice
    prompt: 빅오 표기 중에서 가장 효율적인 성능을 나타내는 것은?
    choices:
      - { id: '1', text: O(nlogn) }
      - { id: '2', text: O(logn) }
      - { id: '3', text: O(n) }
      - { id: '4', text: O(n^2) }
    answers: ['2']
    explanation: |
      입력 크기가 커질 때 증가율이 가장 작은 것은 $O(\log n)$이다.
      일반적인 증가율 비교에서는 $O(\log n)$, $O(n)$, $O(n\log n)$, $O(n^2)$ 순으로 커진다.
    tags: [time-complexity, big-o]

  - id: e17-09
    type: multiple-choice
    prompt: 퀵 정렬에 대한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 피벗을 사용한다. }
      - { id: '2', text: 최악의 수행 시간은 O(n)이다. }
      - { id: '3', text: 입력 리스트를 두 개의 서브리스트로 나눈다. }
      - { id: '4', text: 분할정복 방법을 적용한 방법이다. }
    answers: ['2']
    explanation: |
      퀵 정렬은 피벗을 기준으로 분할하는 분할정복 정렬 알고리즘이다.
      평균적으로는 효율적이지만 최악의 경우 수행 시간은 $O(n^2)$이므로 $O(n)$이라는 설명은 잘못되었다.
    tags: [quick-sort, time-complexity]

  - id: e17-10
    type: multiple-choice
    passageRefs: [g17-bst-successor-01]
    prompt: 다음과 같은 이진 탐색 트리에서 노드 22의 후속자(successor) 노드는 무엇인가?
    choices:
      - { id: '1', text: '7' }
      - { id: '2', text: '15' }
      - { id: '3', text: '30' }
      - { id: '4', text: '35' }
    answers: ['3']
    explanation: |
      이진 탐색 트리의 후속자는 중위순회 순서에서 해당 노드 다음에 오는 노드이다.
      22 다음으로 방문되는 노드는 30이므로 정답은 30이다.
    tags: [binary-search-tree, successor]

  - id: e17-11
    type: multiple-choice
    prompt: 다음 진리표에 해당하는 논리 게이트는? 입력 A, B에 대해 출력 X가 00에서는 0, 01에서는 1, 10에서는 1, 11에서는 0이다.
    choices:
      - { id: '1', text: OR 게이트 }
      - { id: '2', text: XOR 게이트 }
      - { id: '3', text: NOR 게이트 }
      - { id: '4', text: NAND 게이트 }
    answers: ['2']
    explanation: |
      두 입력이 서로 다를 때만 출력이 1이고 같을 때 0이 되는 논리 게이트는 XOR 게이트이다.
      OR는 11에서도 1이고, NOR는 OR의 반대, NAND는 AND의 반대이다.
    tags: [logic-gate, xor]

  - id: e17-12
    type: multiple-choice
    prompt: 다음 중 플립플롭을 사용하는 논리회로는?
    choices:
      - { id: '1', text: 전가산기 }
      - { id: '2', text: 디코더 }
      - { id: '3', text: 카운터 }
      - { id: '4', text: 멀티플렉서 }
    answers: ['3']
    explanation: |
      플립플롭은 1비트 상태를 저장하는 순차 논리회로의 기본 소자이다.
      카운터는 상태를 순차적으로 저장하고 변화시켜야 하므로 플립플롭을 사용한다.
    tags: [flip-flop, counter]

  - id: e17-13
    type: multiple-choice
    prompt: 명령어의 주소 필드에 실제 데이터가 저장된 주기억장치 주소가 직접 들어 있는 그림에 해당하는 주소지정 방식은?
    choices:
      - { id: '1', text: 직접(direct) 주소지정 방식 }
      - { id: '2', text: 상대(relative) 주소지정 방식 }
      - { id: '3', text: 즉시(immediate) 주소지정 방식 }
      - { id: '4', text: 간접(indirect) 주소지정 방식 }
    answers: ['1']
    explanation: |
      명령어의 주소 필드가 실제 데이터가 저장된 주기억장치 주소를 직접 가리키면 직접 주소지정 방식이다.
      즉시 주소지정은 피연산자 자체가 명령어에 들어 있고, 간접 주소지정은 주소 필드가 다시 유효 주소의 위치를 가리킨다.
    tags: [addressing-mode, direct-addressing]

  - id: e17-14
    type: multiple-choice
    prompt: 제어장치의 명령어 사이클의 순서가 올바른 것은?
    choices:
      - { id: '1', text: 해독 - 인출 - 실행 - 저장 }
      - { id: '2', text: 해독 - 실행 - 인출 - 저장 }
      - { id: '3', text: 인출 - 실행 - 해독 - 저장 }
      - { id: '4', text: 인출 - 해독 - 실행 - 저장 }
    answers: ['4']
    explanation: |
      명령어 사이클은 일반적으로 명령어를 인출하고, 해독한 뒤, 실행하고, 필요한 결과를 저장하는 순서로 진행된다.
      따라서 인출 - 해독 - 실행 - 저장이 올바른 순서이다.
    tags: [instruction-cycle, control-unit]

  - id: e17-15
    type: multiple-choice
    prompt: 다음은 데이터베이스의 정의에 대한 설명이다. 밑줄 친 개념이 잘못 연결된 것은? 데이터베이스는 한 조직의 여러 응용 시스템이 공용하기 위해 중복이 최소화되고 저장된 운영 데이터의 집합이다.
    choices:
      - { id: '1', text: 공용 }
      - { id: '2', text: 중복 }
      - { id: '3', text: 저장 }
      - { id: '4', text: 운영 }
    answers: ['2']
    explanation: |
      데이터베이스는 여러 응용 시스템이 공용하고, 저장되며, 조직 운영에 필요한 운영 데이터의 집합이다.
      또한 데이터의 중복을 최소화한 통합 데이터라는 성격을 가지므로 단순히 중복 데이터라고 연결하는 것은 부적절하다.
    tags: [database, database-definition]

  - id: e17-16
    type: multiple-choice
    prompt: 데이터베이스의 스키마에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: 외부 스키마는 기관의 전체적인 데이터베이스의 구조를 정의한다. }
      - { id: '2', text: 개별 사용자마다 이에 대응하는 내부 스키마가 존재한다. }
      - { id: '3', text: 내부 스키마는 개별 사용자가 관심을 갖는 데이터베이스의 일부분만을 정의한다. }
      - { id: '4', text: 개념 스키마는 오직 하나만 존재한다. }
    answers: ['4']
    explanation: |
      개념 스키마는 데이터베이스 전체의 논리적 구조를 정의하며 일반적으로 하나만 존재한다.
      외부 스키마는 사용자 관점의 부분 구조이고, 내부 스키마는 물리적 저장 구조를 정의한다.
    tags: [database-schema, conceptual-schema]

  - id: e17-17
    type: multiple-choice
    prompt: 관계형 모델에서 하나의 행 또는 레코드를 의미하는 용어는?
    choices:
      - { id: '1', text: 영역 }
      - { id: '2', text: 카디널리티 }
      - { id: '3', text: 투플 }
      - { id: '4', text: 릴레이션 }
    answers: ['3']
    explanation: |
      관계형 모델에서 테이블의 하나의 행은 투플(tuple) 또는 레코드라고 부른다.
      릴레이션은 테이블, 카디널리티는 투플의 수, 영역은 도메인에 해당한다.
    tags: [relational-model, tuple]

  - id: e17-18
    type: multiple-choice
    prompt: SQL에서 데이터를 조작하기 위한 명령어가 아닌 것은?
    choices:
      - { id: '1', text: CREATE문 }
      - { id: '2', text: UPDATE문 }
      - { id: '3', text: SELECT문 }
      - { id: '4', text: DELETE문 }
    answers: ['1']
    explanation: |
      UPDATE, SELECT, DELETE는 데이터 조작어(DML)에 해당한다.
      CREATE는 테이블 같은 데이터베이스 객체를 정의하는 데이터 정의어(DDL)이므로 데이터 조작 명령어가 아니다.
    tags: [sql, ddl, dml]

  - id: e17-19
    type: multiple-choice
    prompt: 배열에 대한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: 배열의 각 원소는 서로 다른 고유의 구조를 갖는다. }
      - { id: '2', text: 동일한 자료형을 갖는다. }
      - { id: '3', text: 같은 종류의 자료형을 저장한다. }
      - { id: '4', text: 인덱스와 값의 쌍으로 이루어진다. }
    answers: ['1']
    explanation: |
      배열은 일반적으로 같은 자료형의 원소들을 인덱스로 접근하는 선형 자료구조이다.
      각 원소가 서로 다른 고유의 구조를 갖는다는 설명은 배열의 특징과 맞지 않는다.
    tags: [array, data-structure]

  - id: e17-20
    type: multiple-choice
    prompt: 원소값이 0인 원소가 그렇지 않은 원소보다 상대적으로 많은 행렬을 무엇이라고 하는가?
    choices:
      - { id: '1', text: 다차 행렬 }
      - { id: '2', text: 희소 행렬 }
      - { id: '3', text: 2차 행렬 }
      - { id: '4', text: 전치 행렬 }
    answers: ['2']
    explanation: |
      대부분의 원소가 0인 행렬은 희소 행렬이라고 한다.
      희소 행렬은 0이 아닌 원소만 효율적으로 저장하는 표현 방법을 사용할 수 있다.
    tags: [sparse-matrix, data-structure]

  - id: e17-21
    type: multiple-choice
    prompt: 다음 중 스택에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: 노드라고 불리는 정보 항목과 노드를 연결하는 가지로 구성된다. }
      - { id: '2', text: 선형 리스트의 한쪽 끝에서는 데이터의 삭제가 이루어지고 다른 한쪽에서는 삽입만 이루어진다. }
      - { id: '3', text: 같은 자료형을 갖는 여러 개의 데이터를 하나의 변수로 묶어 놓은 데이터의 집합체이다. }
      - { id: '4', text: 서브루틴 호출, 인터럽트, 재귀 등에서 유용하게 사용된다. }
