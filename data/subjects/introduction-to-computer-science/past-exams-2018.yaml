  - id: g18-call-by-value-swap-01
    type: code
    language: c
    body: |
      int main(){
        int a=2;
        int b=3;
        swap(a,b);
      }

      void swap(int x, int y){
        int tmp;
        tmp=x;
        x=y;
        y=tmp;
      }

questions:
  - id: e18-01
    type: multiple-choice
    prompt: 컴퓨터과학개론의 교재 및 강의에서 구체적으로 다룬 내용이 아닌 것은?
    choices:
      - { id: '1', text: 운영체제 }
      - { id: '2', text: 자료구조 }
      - { id: '3', text: 알고리즘 }
      - { id: '4', text: 인공지능 }
    answers: ['4']
    explanation: |
      인공지능은 컴퓨터과학의 주요 분야이지만, 해당 교재와 강의에서 구체적으로 다룬 범위의 대표 항목으로 제시된 것은 아니다.
      운영체제, 자료구조, 알고리즘은 컴퓨터과학개론에서 다루는 기본 주제에 해당한다.
    tags: [computer-science-overview]

  - id: e18-02
    type: multiple-choice
    prompt: 컴퓨터와 관련해서 사용되는 시간 단위 중에서 $10^{-9}$초, 즉 10억분의 1초를 나타내는 것은?
    choices:
      - { id: '1', text: ms }
      - { id: '2', text: ns }
      - { id: '3', text: ps }
      - { id: '4', text: μs }
    answers: ['2']
    explanation: |
      ns는 나노초로 $10^{-9}$초를 뜻하므로 정답이다.
      ms는 $10^{-3}$초, μs는 $10^{-6}$초, ps는 $10^{-12}$초이다.
    tags: [time-unit, nanosecond]

  - id: e18-03
    type: multiple-choice
    prompt: 폰 노이만 모델과 관련된 설명 중 적절한 것은?
    choices:
      - { id: '1', text: 데이터만 메모리에 저장되고, 프로그램은 컴퓨터 외부에서 표현된다. }
      - { id: '2', text: 미리 정의된 유한개의 기본 명령어의 조합으로 프로그램을 구성한다. }
      - { id: '3', text: ENIAC은 폰 노이만 개념에 기반을 둔 최초의 컴퓨터이다. }
      - { id: '4', text: 자료의 저장과 표현 형태를 비트의 나열로 정의하고 있다. }
    answers: ['2']
    explanation: |
      폰 노이만 모델은 저장 프로그램 방식과 명령어 집합을 기반으로 프로그램을 구성한다.
      프로그램은 메모리에 저장되며, ENIAC은 저장 프로그램 방식의 대표 최초 사례로 보지 않는다.
    tags: [von-neumann-architecture, instruction-set]

  - id: e18-04
    type: multiple-choice
    prompt: 8비트를 사용해서 2의 보수 방식으로 표현된 정수 10101010은 십진수로 얼마인가?
    choices:
      - { id: '1', text: '-86' }
      - { id: '2', text: '-95' }
      - { id: '3', text: '-100' }
      - { id: '4', text: '-106' }
    answers: ['1']
    explanation: |
      최상위 비트가 1이므로 음수이다. 10101010의 비트를 반전하면 01010101이고 1을 더하면 01010110, 즉 86이다.
      따라서 2의 보수로 표현된 값은 -86이다.
    tags: [twos-complement, integer-representation]

  - id: e18-05
    type: multiple-choice
    prompt: 실수 110101.110101을 부동소수점 방식으로 표현할 때 지수 부분의 표현으로 알맞은 것은? 단, 지수 부분은 초과-15를 사용하여 5비트로 표현한다.
    choices:
      - { id: '1', text: '10100' }
      - { id: '2', text: '01111' }
      - { id: '3', text: '00101' }
      - { id: '4', text: '00110' }
    answers: ['1']
    explanation: |
      $110101.110101_2$를 정규화하면 소수점을 왼쪽으로 5칸 옮겨 $1.10101110101_2 \times 2^5$가 된다.
      초과-15 표현은 실제 지수 5에 15를 더하므로 $20=10100_2$이다.
    tags: [floating-point, excess-notation]

  - id: e18-06
    type: multiple-choice
    prompt: 대표적인 알고리즘 설계 기법에 해당하지 않는 것은?
    choices:
      - { id: '1', text: 요인분석 방법 }
      - { id: '2', text: 동적 프로그래밍 방법 }
      - { id: '3', text: 욕심쟁이 방법 }
      - { id: '4', text: 분할정복 방법 }
    answers: ['1']
    explanation: |
      요인분석은 통계 분석 방법으로, 대표적인 알고리즘 설계 기법이 아니다.
      동적 프로그래밍, 욕심쟁이 방법, 분할정복 방법은 알고리즘 설계에서 널리 쓰이는 기법이다.
    tags: [algorithm-design]

  - id: e18-07
    type: multiple-choice
    prompt: 주어진 데이터에 대해 다음과 같은 처리 과정을 통해 오름차순 정렬을 수행하는 알고리즘은? 정렬되지 않은 부분에서 가장 왼쪽에 있는 원소를 꺼낸 후, 정렬된 부분에서 제자리를 찾아 위치시킨다.
    choices:
      - { id: '1', text: 선택 정렬 }
      - { id: '2', text: 삽입 정렬 }
      - { id: '3', text: 합병 정렬 }
      - { id: '4', text: 버블 정렬 }
    answers: ['2']
    explanation: |
      정렬되지 않은 원소를 하나씩 꺼내 이미 정렬된 부분의 적절한 위치에 끼워 넣는 방식은 삽입 정렬이다.
      선택 정렬은 최솟값을 선택해 교환하고, 합병 정렬은 분할 후 병합하며, 버블 정렬은 인접 원소를 반복 비교한다.
    tags: [sorting, insertion-sort]

  - id: e18-08
    type: multiple-choice
    passageRefs: [g18-bst-insertion-01]
    prompt: 하나의 원소 40으로 구성된 이진 탐색 트리에 키값 30, 50, 35를 차례대로 삽입하였을 때 원소 35가 위치하는 곳은? 단, 그림에서 노드 (a)~(d)는 존재하지 않는 상태에서 삽입을 시작한다.
    choices:
      - { id: '1', text: (a) }
      - { id: '2', text: (b) }
      - { id: '3', text: (c) }
      - { id: '4', text: (d) }
    answers: ['4']
    explanation: |
      30은 40보다 작으므로 왼쪽 자식 (a)에 삽입된다.
      50은 40보다 크므로 오른쪽 자식 (b)에 삽입된다.
      35는 40보다 작아 왼쪽으로 이동한 뒤, 30보다 크므로 30의 오른쪽 자식인 (d)에 위치한다.
    tags: [binary-search-tree, insertion]

  - id: e18-09
    type: multiple-choice
    prompt: 다음 중 해시 함수에 해당하는 것은?
    choices:
      - { id: '1', text: 제산 잔여법 }
      - { id: '2', text: 이중 해싱 }
      - { id: '3', text: 선형 탐사 }
      - { id: '4', text: 연쇄법 }
    answers: ['1']
    explanation: |
      제산 잔여법은 키를 테이블 크기로 나눈 나머지를 주소로 사용하는 대표적인 해시 함수이다.
      이중 해싱, 선형 탐사, 연쇄법은 주로 해시 충돌을 해결하는 방법으로 분류된다.
    tags: [hashing, hash-function]

  - id: e18-10
    type: multiple-choice
    prompt: 시스템 버스의 구성 요소가 아닌 것은?
    choices:
      - { id: '1', text: 연산 버스 }
      - { id: '2', text: 제어 버스 }
      - { id: '3', text: 주소 버스 }
      - { id: '4', text: 데이터 버스 }
    answers: ['1']
    explanation: |
      시스템 버스는 일반적으로 데이터 버스, 주소 버스, 제어 버스로 구성된다.
      연산 버스는 표준적인 시스템 버스 구성 요소가 아니므로 정답이다.
    tags: [system-bus, computer-architecture]

  - id: e18-11
    type: multiple-choice
    prompt: n비트의 이진 코드를 최대 $2^n$개의 서로 다른 정보로 변환하는 기능을 수행하므로, 주소 방식으로 주어진 입력으로부터 각각의 하드웨어 구성 요소를 개별적으로 구동하기 위해서 주로 사용하는 논리회로는?
    choices:
      - { id: '1', text: 전가산기 }
      - { id: '2', text: 멀티플렉서 }
      - { id: '3', text: 카운터 }
      - { id: '4', text: 디코더 }
    answers: ['4']
    explanation: |
      n비트 입력을 최대 $2^n$개의 출력 중 하나로 해독해 선택 신호를 만드는 회로는 디코더이다.
      멀티플렉서는 여러 입력 중 하나를 선택해 출력하고, 전가산기는 덧셈 회로, 카운터는 상태를 순차적으로 세는 회로이다.
    tags: [decoder, digital-logic]

  - id: e18-12
    type: multiple-choice
    prompt: 수행 중인 명령어와 자주 사용되는 데이터를 저장하였다가 CPU 요청이 있을 경우 즉시 제공하여 CPU와 기억장치 간의 속도 차이를 줄여주는 역할을 수행하는 기억장치는?
    choices:
      - { id: '1', text: 레지스터 }
      - { id: '2', text: 캐시기억장치 }
      - { id: '3', text: DRAM }
      - { id: '4', text: 하드 디스크 }
    answers: ['2']
    explanation: |
      캐시기억장치는 CPU 가까이에 위치해 자주 쓰는 명령어와 데이터를 빠르게 제공한다.
      이를 통해 CPU와 주기억장치 사이의 속도 차이를 줄일 수 있다.
    tags: [cache-memory, memory-hierarchy]

  - id: e18-13
    type: multiple-choice
    prompt: 제어장치의 명령어 사이클에서 인출 단계의 결과가 저장되는 레지스터는?
    choices:
      - { id: '1', text: MBR(memory buffer register) }
      - { id: '2', text: IR(instruction register) }
      - { id: '3', text: CMBR(control memory buffer register) }
      - { id: '4', text: PC(program counter) }
    answers: ['2']
    explanation: |
      인출 단계에서는 주기억장치에서 가져온 명령어가 명령어 레지스터 IR에 저장된다.
      PC는 다음 명령어 주소를 가리키고, MBR은 기억장치와 주고받는 데이터 버퍼 역할을 한다.
    tags: [instruction-cycle, instruction-register]

  - id: e18-14
    type: multiple-choice
    prompt: 다음 설명에 해당하는 개념 또는 기법은? 프로그램에 내재하는 시간적 병렬성을 활용하고, 하나의 연산을 서로 다른 기능을 가진 여러 개의 단계로 분할하여 각 단계가 동시에 서로 다른 데이터를 취급하도록 한다.
    choices:
      - { id: '1', text: 파이프라인 처리기 }
      - { id: '2', text: DMA 방식 }
      - { id: '3', text: GPGPU }
      - { id: '4', text: 멀티코어 구조 }
    answers: ['1']
    explanation: |
      여러 처리 단계를 나누고 각 단계가 동시에 다른 데이터를 처리하도록 하는 방식은 파이프라인 처리이다.
      DMA는 입출력 전송 방식이고, GPGPU와 멀티코어는 병렬 처리 자원의 구성 방식에 가깝다.
    tags: [pipeline, cpu-architecture]

  - id: e18-15
    type: multiple-choice
    prompt: 데이터베이스의 특성에 대한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: 데이터베이스에 수시로 접근하는 사용자의 요구를 즉시 처리하여 응답을 제공할 수 있다. }
      - { id: '2', text: 응용 프로그램과 데이터 사이의 일대일 상호 의존 관계를 통해 효율적인 데이터 관리가 가능하다. }
      - { id: '3', text: 데이터의 참조는 데이터가 저장된 주소가 아닌 데이터의 내용에 따라 이루어진다. }
      - { id: '4', text: 삽입, 삭제 등의 연산을 통해 새로운 데이터로 내용을 지속적으로 변화시켜 현재의 정확한 데이터를 항상 유지할 수 있다. }
    answers: ['2']
    explanation: |
      데이터베이스는 응용 프로그램과 데이터의 독립성을 제공하는 것이 핵심 특성이다.
      응용 프로그램과 데이터가 일대일로 강하게 상호 의존한다는 설명은 데이터베이스의 장점과 반대이므로 틀린 설명이다.
    tags: [database, data-independence]

  - id: e18-16
    type: multiple-choice
    prompt: 응용 프로그램과 데이터 간의 독립성을 제공하기 위해 사용자와 데이터베이스 사이에서 중재자 역할을 하는 데이터베이스 시스템의 구성요소는?
    choices:
      - { id: '1', text: 데이터베이스 관리 시스템 }
      - { id: '2', text: 데이터베이스 컴퓨터 }
      - { id: '3', text: 데이터베이스 언어 }
      - { id: '4', text: 데이터베이스 관리자 }
    answers: ['1']
    explanation: |
      데이터베이스 관리 시스템(DBMS)은 사용자와 응용 프로그램, 데이터베이스 사이에서 데이터 접근과 관리를 중재한다.
      데이터 독립성 제공은 DBMS의 핵심 역할이다.
    tags: [dbms, data-independence]

  - id: e18-17
    type: multiple-choice
    prompt: 데이터베이스 설계 과정 중에서 E-R 모델이 적용되는 단계는?
    choices:
      - { id: '1', text: 요구조건 분석 }
      - { id: '2', text: 논리적 설계 }
      - { id: '3', text: 물리적 설계 }
      - { id: '4', text: 개념적 설계 }
    answers: ['4']
    explanation: |
      E-R 모델은 현실 세계의 개체, 속성, 관계를 추상화해 표현하는 개념적 설계 단계에서 사용된다.
      논리적 설계에서는 관계형 모델 등 특정 데이터 모델로 변환하고, 물리적 설계에서는 저장 구조를 결정한다.
    tags: [database-design, er-model]

  - id: e18-18
    type: multiple-choice
    prompt: SQL 명령어의 사용 형식 중에서 올바른 것은?
    choices:
      - { id: '1', text: "drop\nfrom 테이블\nwhere 조건;" }
      - { id: '2', text: "update 테이블\nfrom 열이름 = 산술식\nwhere 조건;" }
      - { id: '3', text: "select 열이름\nfrom 테이블\nwhere 조건;" }
      - { id: '4', text: "insert 테이블\nfrom 열값리스트\nwhere 조건;" }
    answers: ['3']
    explanation: |
      기본 조회문은 `select 열이름 from 테이블 where 조건;` 형태로 작성한다.
      DROP, UPDATE, INSERT 문은 각각 고유한 문법을 가지며 제시된 다른 선택지 형식은 표준 SQL 문법과 맞지 않는다.
    tags: [sql, select-statement]

  - id: e18-19
    type: multiple-choice
    prompt: 추상화를 통해 자료의 논리적 관계를 구조화한 것을 무엇이라고 하나?
    choices:
      - { id: '1', text: 자료구조 }
      - { id: '2', text: 계층구조 }
      - { id: '3', text: 알고리즘 }
      - { id: '4', text: 프로세스 }
    answers: ['1']
    explanation: |
      자료구조는 자료들 사이의 논리적 관계를 구조화해 표현하고 저장하는 방법이다.
      알고리즘은 문제 해결 절차이고, 프로세스는 실행 중인 프로그램을 의미한다.
    tags: [data-structure, abstraction]

  - id: e18-20
    type: multiple-choice
    prompt: 데이터의 삽입과 삭제가 양쪽 끝에서만 이루어지는 자료구조로서 가장 먼저 입력된 데이터가 가장 먼저 제거되는 선입선출 특징을 가지는 것은 무엇인가?
    choices:
      - { id: '1', text: 배열 }
      - { id: '2', text: 리스트 }
      - { id: '3', text: 인덱스 }
      - { id: '4', text: 큐 }
    answers: ['4']
    explanation: |
      큐는 한쪽 끝에서 삽입하고 다른 쪽 끝에서 삭제하는 FIFO 구조이다.
      가장 먼저 들어온 데이터가 가장 먼저 제거된다는 선입선출 특징이 핵심 단서이다.
    tags: [queue, fifo]

  - id: e18-21
    type: multiple-choice
    prompt: 트리의 최대 레벨이 k일 때, 레벨 k-1까지는 포화 이진트리를 형성하고, 레벨 k에서는 왼쪽부터 오른쪽으로 채워진 트리는 무엇인가?
    choices:
      - { id: '1', text: 불완전 트리 }
      - { id: '2', text: 완전 이진트리 }
      - { id: '3', text: 경사 이진트리 }
      - { id: '4', text: 불포화 이진트리 }
    answers: ['2']
    explanation: |
      마지막 레벨을 제외한 모든 레벨이 채워져 있고 마지막 레벨이 왼쪽부터 채워지는 이진트리는 완전 이진트리이다.
      포화 이진트리는 모든 레벨이 빠짐없이 채워진 더 강한 조건을 가진다.
    tags: [binary-tree, complete-binary-tree]

  - id: e18-22
    type: multiple-choice
    prompt: 가장 마지막으로 삽입된 데이터가 가장 처음으로 삭제되는 구조를 갖고 있기 때문에 후입선출(LIFO, Last-In-First-Out) 구조인 것은 무엇인가?
    choices:
      - { id: '1', text: 스택 }
      - { id: '2', text: 리스트 }
      - { id: '3', text: 트리 }
      - { id: '4', text: 그래프 }
    answers: ['1']
    explanation: |
      스택은 삽입과 삭제가 같은 한쪽 끝에서 이루어지는 LIFO 자료구조이다.
      가장 나중에 들어온 데이터가 가장 먼저 제거된다는 설명이 스택을 가리킨다.
    tags: [stack, lifo]

  - id: e18-23
    type: multiple-choice
    prompt: 운영체제의 역할이 아닌 것은 무엇인가?
    choices:
      - { id: '1', text: 프로세서(중앙처리장치-CPU) 할당 및 관리 }
      - { id: '2', text: 가상 기억장치 관리 }
      - { id: '3', text: 네트워크 파일 전송 }
      - { id: '4', text: 데이터 파일 등의 모든 파일에 대한 읽기와 쓰기 동작 관리 }
    answers: ['3']
    explanation: |
      CPU 관리, 기억장치 관리, 파일 시스템 관리는 운영체제의 대표적인 역할이다.
      네트워크 파일 전송은 특정 응용 서비스나 네트워크 기능의 사용 사례에 가깝고, 운영체제의 기본 역할 항목으로는 적절하지 않다.
    tags: [operating-system]

  - id: e18-24
    type: multiple-choice
    prompt: 준비 큐에 도착한 순서대로 중앙처리장치를 할당받도록 해 주는 중앙처리장치 스케줄링 방법은 무엇인가?
    choices:
      - { id: '1', text: FCFS 스케줄링 }
      - { id: '2', text: SJF(Shortest Job First) 스케줄링 }
      - { id: '3', text: 우선순위 스케줄링 }
      - { id: '4', text: RR(Round Robin) 스케줄링 }
    answers: ['1']
    explanation: |
      FCFS는 준비 큐에 먼저 도착한 프로세스부터 CPU를 할당하는 방식이다.
      SJF는 실행 시간이 짧은 작업, 우선순위 스케줄링은 우선순위가 높은 작업, RR은 시간 할당량을 기준으로 순환 처리한다.
    tags: [cpu-scheduling, fcfs]

  - id: e18-25
    type: multiple-choice
    prompt: CPU를 사용하고 있는 작업 A가 CPU 사용을 멈추고 입출력 장치를 사용하게 되면, 아무도 사용하지 않는 CPU를 다른 작업 B에게 할당한다. 작업 A가 입출력 자원을 사용하는 동안 CPU는 다른 작업에게 할당될 수 있으며 효율적인 컴퓨터 자원의 활용이 가능한 기법은 무엇인가?
    choices:
      - { id: '1', text: 일괄처리 시스템 }
      - { id: '2', text: 다중프로그래밍 시스템 }
      - { id: '3', text: 가상기억처리 시스템 }
      - { id: '4', text: 시분할 처리 시스템 }
    answers: ['2']
    explanation: |
      다중프로그래밍은 한 작업이 입출력을 기다리는 동안 CPU를 다른 작업에 할당해 자원 활용률을 높인다.
      입출력 대기 시간 동안 CPU를 놀리지 않는다는 설명이 다중프로그래밍의 핵심이다.
    tags: [multiprogramming, operating-system]

  - id: e18-26
    type: multiple-choice
    prompt: 프로그래밍 언어의 컴파일 과정으로 옳은 것은 무엇인가?
    choices:
      - { id: '1', text: 프로그램 작성 → 어휘 분석 → 코드 생성 → 구문 분석 → 실행코드 }
      - { id: '2', text: 프로그램 작성 → 구문 분석 → 어휘 분석 → 코드 생성 → 실행코드 }
      - { id: '3', text: 프로그램 작성 → 코드 생성 → 어휘 분석 → 구문 분석 → 실행코드 }
      - { id: '4', text: 프로그램 작성 → 어휘 분석 → 구문 분석 → 코드 생성 → 실행코드 }
    answers: ['4']
    explanation: |
      컴파일 과정은 일반적으로 소스 프로그램 작성 후 어휘 분석, 구문 분석, 코드 생성 단계를 거쳐 실행 가능한 코드로 이어진다.
      토큰을 추출하는 어휘 분석이 문법 구조를 확인하는 구문 분석보다 먼저 수행된다.
    tags: [compiler, compilation-process]

  - id: e18-27
    type: multiple-choice
    prompt: 코드의 실제 실행 환경에 따라 변수의 유효 범위가 결정되는 변수 유효범위 결정 규칙은 무엇인가?
    choices:
      - { id: '1', text: 전역 유효 범위 규칙 }
      - { id: '2', text: 하이브리드 유효 범위 규칙 }
      - { id: '3', text: 정적 유효 범위 규칙 }
      - { id: '4', text: 동적 유효 범위 규칙 }
    answers: ['4']
    explanation: |
      동적 유효 범위 규칙은 프로그램의 실행 흐름과 호출 관계에 따라 이름의 유효 범위가 결정된다.
      정적 유효 범위는 코드의 작성 위치와 블록 구조에 따라 컴파일 시점에 범위가 결정된다.
    tags: [scope, dynamic-scope]

  - id: e18-28
    type: multiple-choice
    prompt: 하나의 비단말 심벌이 어떻게 다른 단말 심벌이나 비단말 심벌을 대체할 수 있는지 정의하는 것은 무엇인가?
    choices:
      - { id: '1', text: 생성 규칙 }
      - { id: '2', text: 시작 심벌 }
      - { id: '3', text: BNF }
      - { id: '4', text: 파싱 트리 }
    answers: ['1']
    explanation: |
      생성 규칙은 문법에서 비단말 심벌이 어떤 심벌열로 치환될 수 있는지를 정의한다.
      BNF는 생성 규칙을 표현하는 표기법이고, 파싱 트리는 문장의 문법 구조를 나타낸 결과이다.
    tags: [formal-grammar, production-rule]

  - id: e18-29
    type: multiple-choice
    prompt: 세그먼트 또는 데이터그램 단위의 메시지가 송신 컴퓨터에서 수신 컴퓨터까지 신뢰성을 보장하며 전달하는 계층은 무엇인가?
    choices:
      - { id: '1', text: 전송 계층(transport layer) }
      - { id: '2', text: 네트워크 계층(network layer) }
      - { id: '3', text: 데이터링크 계층(datalink layer) }
      - { id: '4', text: 물리 계층(physical layer) }
    answers: ['1']
    explanation: |
      전송 계층은 종단 시스템 간 데이터 전달과 신뢰성, 흐름 제어 등을 담당한다.
      네트워크 계층은 패킷 라우팅, 데이터링크 계층은 직접 연결된 노드 간 프레임 전달, 물리 계층은 비트 전송을 담당한다.
    tags: [transport-layer, network]

  - id: e18-30
    type: multiple-choice
    prompt: 모든 통신은 전선, 전화선, 광케이블, 무선 링크 등 통신 매체를 통해서 통신 신호가 전달된다. 통신 신호가 실제로 전달되는 이 통로는 무엇인가?
    choices:
      - { id: '1', text: 프로토콜 }
      - { id: '2', text: 채널 }
      - { id: '3', text: 대역폭 }
      - { id: '4', text: 노드 }
    answers: ['2']
    explanation: |
      통신 신호가 전달되는 물리적 또는 논리적 통로는 채널이다.
      프로토콜은 통신 규칙, 대역폭은 전송 용량이나 주파수 범위, 노드는 통신에 참여하는 장치를 뜻한다.
    tags: [communication-channel, network]

  - id: e18-31
    type: multiple-choice
    prompt: OSI 모델의 데이터링크 계층(datalink layer)에서 직접 연결된 두 컴퓨터나 장비 간에 송수신되는 전송 단위는 무엇인가?
    choices:
      - { id: '1', text: 프레임 }
      - { id: '2', text: 메가바이트 }
      - { id: '3', text: 패킷 }
      - { id: '4', text: 비트 }
    answers: ['1']
    explanation: |
      데이터링크 계층의 전송 단위는 프레임이다.
      패킷은 주로 네트워크 계층, 비트는 물리 계층의 전송 단위로 구분한다.
    tags: [data-link-layer, frame]

  - id: e18-32
    type: multiple-choice
    prompt: 그래프를 컴퓨터 프로그래밍 언어로 구현하기 위해서는 인접행렬이나 인접리스트를 이용한다. 보기 중 그래프를 인접행렬이나 인접리스트로 바르게 표현한 것은 무엇인가?
    choices:
      - { id: '1', text: 자기 자신에 대한 연결까지 1로 표시한 인접행렬 }
      - { id: '2', text: 주어진 그래프와 간선 관계가 다른 인접행렬 }
      - { id: '3', text: 정점 1의 인접 정점이 2, 3, 4이고 정점 2의 인접 정점이 1, 정점 3의 인접 정점이 1, 4, 정점 4의 인접 정점이 1, 3인 인접리스트 }
      - { id: '4', text: 주어진 그래프와 간선 관계가 다른 인접리스트 }
    answers: ['3']
    explanation: |
      제시된 그래프는 정점 1이 2, 3, 4와 연결되고, 정점 3과 4도 연결된 구조이다.
      선택지 3의 인접리스트는 각 정점에 인접한 정점을 정확히 나열하므로 올바른 표현이다.
    tags: [graph, adjacency-list]

  - id: e18-33
    type: multiple-choice
    prompt: 프로그램 코드나 데이터를 일정하지 않은 서로 다른 크기로 분할하여 주기억장치에 적재하여 접근하는 가상기억장치 기법은 무엇인가?
    choices:
      - { id: '1', text: 페이징 기법 }
      - { id: '2', text: 세그먼테이션 기법 }
      - { id: '3', text: 페이지 반입 기법 }
      - { id: '4', text: 배치 기법 }
    answers: ['2']
    explanation: |
      세그먼테이션은 프로그램을 논리적 단위의 가변 크기 세그먼트로 나누어 관리한다.
      페이징은 고정 크기 페이지를 사용한다는 점에서 문제의 설명과 다르다.
    tags: [segmentation, virtual-memory]

  - id: e18-34
    type: multiple-choice
    passageRefs: [g18-call-by-value-swap-01]
    prompt: 다음과 같이 [나]는 x와 y의 값을 교환하는 함수 프로그램이고, [가]와 같은 프로그램에서 호출했다고 하자. 다음 코드에 대한 설명으로 틀린 것은 무엇인가?
    choices:
      - { id: '1', text: "[가], [나]를 C언어로 컴파일해서 수행하면 함수 호출 후 swap 함수 실행에도 불구하고 a와 b의 값의 교환이 이루어지지 않는다." }
      - { id: '2', text: "[가], [나]를 실행하여도 a, b 값 교환이 안 이루어지는 이유는 값호출(call-by-value) 방식으로 전달되기 때문이다." }
      - { id: '3', text: "[나] 프로그램인 swap 함수 내에서도 x와 y의 값이 바뀌지 않았다." }
      - { id: '4', text: "swap 함수의 실행 결과를 실매개변수에 반영하기 위해서는 실매개변수의 주소를 호출 함수의 매개변수로 전달한다." }
    answers: ['3']
    explanation: |
      C언어의 일반적인 값 호출에서는 a와 b의 값이 복사되어 x와 y에 전달되므로 main의 a, b는 바뀌지 않는다.
      그러나 swap 함수 내부의 지역 변수 x와 y는 tmp를 이용한 대입으로 서로 값이 바뀐다.
      따라서 swap 함수 내에서도 x와 y가 바뀌지 않았다는 설명이 틀리다.
    tags: [call-by-value, c-language]

  - id: e18-35
    type: multiple-choice
    prompt: 다음 보기는 컴퓨터 간의 연결 방식 중에서도 메시지 교환 방식에 대한 설명이다. 이 중 옳은 설명인 것은 무엇인가?
    choices:
      - { id: '1', text: 메시지 교환 방식은 컴퓨터 간의 연결 방식 중 컴퓨터 네트워크의 연결 형태에 따른 분류 기준이다. }
      - { id: '2', text: 메시지 교환 방식에서는 대기행렬(queue)을 두어 한 번에 메시지가 몰려와 처리하기 곤란한 상황을 대비한다. }
      - { id: '3', text: 패킷 교환 방식은 여러 개의 스위치를 통해 물리적으로 연결된 임시 전용 회선을 통해 메시지를 주고받는다. }
      - { id: '4', text: 회선 교환과 패킷 교환은 비슷한 구조를 가진다. }
    answers: ['2']
    explanation: |
      메시지 교환 방식은 저장 후 전달 방식으로, 중간 노드가 메시지를 큐에 저장했다가 다음 노드로 전달할 수 있다.
      회선 교환은 전용 회선을 설정하고, 패킷 교환은 메시지를 패킷 단위로 나누어 전달한다는 점에서 서로 다르다.
    tags: [message-switching, network]
