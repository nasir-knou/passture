  - id: l05-10
    type: multiple-choice
    prompt: |
      두 개의 부울행렬 $A=\\begin{bmatrix}1&0&1\\\\0&1&0\\\\0&1&0\\end{bmatrix}$,
      $B=\\begin{bmatrix}1&0&1\\\\1&1&1\\\\0&1&1\\end{bmatrix}$가 다음과 같을 때 $A$와 $B$의 합(join)을 구하면?
    choices:
