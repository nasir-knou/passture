  - id: gl15-permutation-combination-07
    type: text
    body: |
      $1\le r\le n$을 만족하는 정수 $n,r$에 대하여, $n$개의 원소를 갖는 집합에서 $r$개 원소를 순서를 고려하여 뽑는 방법을 (  )이라고 부르고 그 경우의 수는 (  )이며, 순서를 무시하고 뽑는 방법은 (  )이라고 부르고 그 경우의 수는 ${n!\over r!(n-r)!}$이다.
  - id: gl15-gcd-08
    type: text
    body: |
      0이 아닌 두 정수 $a,b$에 대하여 $d\mid a$이고 $d\mid b$인 최대의 양의 정수 $d$를 $a$와 $b$의 (  )라고 부른다.

questions:
  - id: l01-01
    type: multiple-choice
    prompt: 연속에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: 연속이란 중단 또는 급격한 변화가 없는 상태이다. }
      - { id: '2', text: 디지털 컴퓨터가 다루는 데이터는 연속적인 값이다. }
      - { id: '3', text: 연속수학에는 미적분학, 위상수학, 해석학 등이 속한다. }
      - { id: '4', text: 연속적인 성질을 가지는 수학 분야는 연속수학이라 한다. }
    answers: ['2']
    explanation: 디지털 컴퓨터가 처리하는 데이터는 일반적으로 이산적인 값으로 표현된다. 연속은 끊김이나 급격한 변화가 없는 상태를 뜻하며, 미적분학·위상수학·해석학 등은 연속수학의 대표적인 분야이다.
    tags: [continuous, discrete-data]

  - id: l01-02
    type: multiple-choice
    prompt: 축구의 도구로 올바르지 않은 것은?
    choices:
      - { id: '1', text: 골대 }
