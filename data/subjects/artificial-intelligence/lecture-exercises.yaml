    tags: [relation, symmetry, transitive]

  - id: l06-08
    type: multiple-choice
    prompt: |
      집합 $A=\\{1,2,3,4,5,6\\}$와 집합 $B=\\{a,b,c,d\\}$이고
      $A$에서 $B$로의 관계 $R=\\{(1,b),(2,c),(3,d),(4,a)\\}$와
      $B$에서 $A$로의 관계 $S=\\{(a,3),(b,4),(c,5),(d,6)\\}$가 다음과 같을 때,
      합성 관계 $S\\circ R$으로서 옳은 것은?
    choices:
      - { id: '1', text: '$S\\circ R=\\{(1,4),(2,5),(3,6),(4,3)\\}$' }
      - { id: '2', text: '$S\\circ R=\\{(1,b),(2,c),(3,d),(4,a)\\}$' }
      - { id: '3', text: '$S\\circ R=\\{(a,4),(b,1),(c,2),(d,3)\\}$' }
      - { id: '4', text: '$S\\circ R=\\{(a,d),(b,a),(c,b),(d,a)\\}$' }
    answers: ['1']
    explanation: $R$로 $1\\to b$, $2\\to c$, $3\\to d$, $4\\to a$가 되고, 이어 $S$로 $b\\to4$, $c\\to5$, $d\\to6$, $a\\to3$이 된다. 따라서 합성 관계는 선택지 1이다.
    tags: [relation, composition]

  - id: l06-09
