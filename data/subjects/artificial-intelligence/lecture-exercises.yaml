  - id: gl08-boolean-laws-06
    type: text
    body: |
      ① $\overline{\overline X}=X$
      ② $X+X=X$
      ③ $X\cdot\overline X=1$
      ④ $X+YZ=(X+Y)(X+Z)$
  - id: gl08-complement-07
    type: text
    body: |
      부울함수 $F=X\overline{Y}Z+XY\overline{Z}$

      ① $\overline F=XY\overline Z+\overline{XY\overline Z}$
      ② $\overline F=\overline X+\overline Y+Z\cdot X+Y+\overline Z$
      ③ $\overline F=\overline{XY\overline Z}\cdot XY\overline Z$
      ④ $\overline F=(X+Y+\overline Z)\cdot(\overline X+\overline Y+Z)$
  - id: gl08-simplification-09
    type: text
    body: |
      $$
      \begin{aligned}
      F&=(X+\overline Y)(X+Z)\\
       &=XX+XZ+X\overline Y+\overline YZ\\
       &=X+XZ+X\overline Y+\overline YZ\\
       &=X(1+Z+\overline Y)+\overline YZ\\
       &=\Box\\
       &=X+\overline YZ
      \end{aligned}
      $$
  - id: gl08-boolean-expression-10
    type: text
    body: |
      부울대수식 $ABC+A\overline{B}C+AB\overline{C}$

      ① $AB$
      ② $AB+\overline A C$
      ③ $AB+AC$
      ④ $AC$
