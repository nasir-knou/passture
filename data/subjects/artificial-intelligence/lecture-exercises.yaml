  - id: gl10-dijkstra-10
    type: text
    body: |
      가중 그래프의 주요 꼭짓점은 a, b, c, d, e이다.
      간선과 가중치는 a-상단중앙 5, 상단중앙-상단오른쪽 6, a-왼쪽중앙 2,
      왼쪽중앙-왼쪽하단 3, 왼쪽하단-d 9, d-c 5, b-c 5, 상단오른쪽-b 7,
      중앙 e에서 왼쪽중앙 6, 상단중앙 2, b 9, d 3, c 2, 왼쪽하단 1,
      a-e 8, e-상단오른쪽 5이다.
