      - { id: '4', text: '$\\sim p \\vee q$' }
    answers: ['4']
    explanation: 조건명제 $p \\to q$는 $p$가 참이고 $q$가 거짓인 경우에만 거짓이다. 이와 같은 진리값을 갖는 논리식은 $\\sim p \\vee q$이다.
    tags: [propositional-logic]

  - id: l06-02
    type: multiple-choice
    prompt: 다음 중 언언표준형에 해당되는 논리식은? 단, p, q, r, s는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \\wedge q) \\vee (\\sim p \\wedge r)$' }
      - { id: '2', text: '$(\\sim p \\vee q \\vee \\sim r) \\wedge (p \\vee \\sim s)$' }
      - { id: '3', text: '$\\sim(p \\vee q) \\wedge (p \\vee r)$' }
      - { id: '4', text: '$\\sim(p \\vee q \\vee r)$' }
    answers: ['2']
    explanation: 언언표준형은 리터럴들의 논리합으로 이루어진 절들이 논리곱으로 연결된 형태이다. 선택지 2는 각 절이 리터럴의 논리합이고, 절들이 논리곱으로 연결되어 있다.
    tags: [clausal-form]

  - id: l06-03
    type: multiple-choice
    prompt: 다음 중 긍정논법에 의한 추론에 해당되는 것은?
    choices:
      - { id: '1', text: p와 p→q가 참이면 q가 참이다. }
      - { id: '2', text: ~p와 p→q가 참이면 ~q가 참이다. }
      - { id: '3', text: q와 p→q가 참이면 p가 참이다. }
      - { id: '4', text: ~q와 p→q가 참이면 p가 참이다. }
    answers: ['1']
    explanation: 긍정논법은 $p$와 $p\\to q$가 참일 때 $q$를 결론으로 도출하는 추론 규칙이다. 조건문의 전건을 긍정하여 후건을 얻는 방식이다.
    tags: [inference, modus-ponens]

  - id: l06-04
    type: multiple-choice
    prompt: $P(x,y) \\vee \\sim Q(x)$와 $Q(A) \\vee R(B)$로부터 도출되는 결과는 무엇인가? 단, x, y는 객체변수, A, B는 객체상수이다.
    choices:
      - { id: '1', text: '$P(A,y) \\vee R(B)$' }
      - { id: '2', text: '$P(x,y) \\vee \\sim R(B)$' }
      - { id: '3', text: '$P(A,B) \\wedge R(B)$' }
      - { id: '4', text: '$P(x,y) \\vee R(y)$' }
    answers: ['1']
    explanation: $\\sim Q(x)$와 $Q(A)$가 상보 리터럴이 되도록 $x$를 $A$로 단일화한다. 두 리터럴을 제거하고 남은 식을 연결하면 $P(A,y) \\vee R(B)$가 도출된다.
    tags: [resolution, unification]

  - id: l06-05
    type: multiple-choice
