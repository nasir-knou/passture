  - id: l04-05
    type: multiple-choice
    prompt: 집합 $A=\\{a,b,c\\}$의 멱집합의 원소가 아닌 것은?
    choices:
      - { id: '1', text: '$\\{\\}$' }
      - { id: '2', text: '$\\{a\\}$' }
      - { id: '3', text: '$\\{b,c\\}$' }
      - { id: '4', text: '$\\{\\{a,b,c\\}\\}$' }
    answers: ['4']
    explanation: 멱집합의 원소는 원래 집합의 부분집합이다. $\\{a,b,c\\}$ 자체는 부분집합이지만, 그것을 다시 원소로 갖는 집합 $\\{\\{a,b,c\\}\\}$는 $A$의 부분집합이 아니므로 멱집합의 원소가 아니다.
    tags: [set-theory]

  - id: l04-06
    type: multiple-choice
    prompt: '$U=\\{1,2,3,4,5\\}$, $A=\\{1,2,3\\}$, $B=\\{2,3,4\\}$일 때 ① $A\\cup B=\\{1,2,3,4\\}$, ② $A\\cap B=\\{2,3\\}$, ③ $A^c=\\{4,5\\}$, ④ $A\\oplus B=\\{1\\}$ 중 틀린 것은?'
    choices:
      - { id: '1', text: ① 번 }
      - { id: '2', text: ② 번 }
      - { id: '3', text: ③ 번 }
      - { id: '4', text: ④ 번 }
    answers: ['4']
    explanation: 대칭차 $A\\oplus B$는 두 집합 중 한쪽에만 속하는 원소들의 집합이다. 여기서는 $\\{1,4\\}$가 되므로 ④의 $\\{1\\}$은 틀렸다.
    tags: [set-theory]

  - id: l04-07
    type: multiple-choice
    prompt: '$A=\\{1,2,3\\}$일 때 ① $A\\cup\\emptyset=A$, ② $A\\cap\\emptyset=\\emptyset$, ③ $|A\\cup\\emptyset|=0$, ④ $|P(A)|=8$ 중 틀린 것은?'
    choices:
      - { id: '1', text: ① 번 }
      - { id: '2', text: ② 번 }
      - { id: '3', text: ③ 번 }
      - { id: '4', text: ④ 번 }
    answers: ['3']
    explanation: $A\\cup\\emptyset=A$이므로 $|A\\cup\\emptyset|=|A|=3$이다. 따라서 ③은 틀렸고, 원소가 3개인 집합의 멱집합 크기는 $2^3=8$이다.
    tags: [set-theory]

  - id: l04-08
    type: multiple-choice
    prompt: 이산수학을 신청한 학생이 21명이고, 선형대수를 신청한 학생이 10명, 그리고 두 과목 모두 신청한 학생이 8명이었다. 이산수학 또는 선형대수를 신청한 학생은 모두 몇 명인가?
    choices:
      - { id: '1', text: '13' }
      - { id: '2', text: '23' }
      - { id: '3', text: '29' }
      - { id: '4', text: '31' }
    answers: ['2']
    explanation: 포함배제 원리에 따라 $|A\\cup B|=|A|+|B|-|A\\cap B|=21+10-8=23$이다.
    tags: [set-theory, inclusion-exclusion]

  - id: l04-09
    type: multiple-choice
    prompt: '$U$가 전체집합이고 $A,B,C$가 $U$의 부분집합이라고 할 때, ① $A\\cup(A\\cap B)=A$, ② $(A^c)^c=A^c$, ③ $A\\cap A^c=U$, ④ $A\\cup(B\\cap C)=(A\\cup B)\\cap C$ 중 올바른 것은?'
    choices:
      - { id: '1', text: ① 번 }
      - { id: '2', text: ② 번 }
      - { id: '3', text: ③ 번 }
      - { id: '4', text: ④ 번 }
    answers: ['1']
    explanation: 흡수법칙에 의해 $A\\cup(A\\cap B)=A$가 성립한다. 이중여집합은 $(A^c)^c=A$이고, $A\\cap A^c=\\emptyset$이므로 다른 선택지는 성립하지 않는다.
    tags: [set-theory]

  - id: l04-10
    type: multiple-choice
    prompt: '$U$가 전체집합이고 $A\\subseteq B\\subseteq U$일 때, ① $A\\cup B=A$, ② $A\\cap B^c=\\emptyset$, ③ $B^c\\subseteq A^c$, ④ $A-B=\\emptyset$ 중 틀린 것은?'
    choices:
      - { id: '1', text: ① 번 }
      - { id: '2', text: ② 번 }
      - { id: '3', text: ③ 번 }
      - { id: '4', text: ④ 번 }
    answers: ['1']
    explanation: $A\\subseteq B$이면 $A\\cup B=B$이다. 따라서 $A\\cup B=A$는 일반적으로 성립하지 않는다. 나머지는 부분집합 관계에서 성립한다.
    tags: [set-theory]

