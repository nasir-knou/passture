  - id: l03-04
    type: multiple-choice
    prompt: A* 알고리즘에서 OPEN 리스트에 존재하는 노드 n의 평가함수는 어떻게 정의되는가? 단, g(n)은 출발노드로부터 n까지의 경로비용, ĝ(n)은 g(n)의 예측비용, h(n)은 n으로부터 목표노드까지의 경로비용, ĥ(n)은 h(n)의 예측비용이다.
    choices:
      - { id: '1', text: '$g(n)$' }
      - { id: '2', text: '$\\hat{h}(n)$' }
      - { id: '3', text: '$\\hat{g}(n)+h(n)$' }
      - { id: '4', text: '$g(n)+\\hat{h}(n)$' }
    answers: ['4']
    explanation: A*는 시작 노드에서 현재 노드까지의 실제 비용 $g(n)$과 현재 노드에서 목표까지의 추정 비용 $\\hat{h}(n)$을 더한 $f(n)=g(n)+\\hat{h}(n)$으로 노드를 평가한다.
    tags: [a-star]

  - id: l03-05
    type: multiple-choice
    prompt: A* 알고리즘에서 최소비용 경로를 탐색하려면 어느 상태에서든 항상 (  )이 성립하도록 평가함수를 정의한다. 괄호에 넣을 내용은? 단, g(n)은 출발노드로부터 n까지의 경로비용, ĝ(n)은 g(n)의 예측비용, h(n)은 n으로부터 목표노드까지의 경로비용, ĥ(n)은 h(n)의 예측비용이다.
    choices:
      - { id: '1', text: '$\\hat{h}(n) \\le h(n)$' }
      - { id: '2', text: '$\\hat{h}(n) \\ge h(n)$' }
      - { id: '3', text: '$g(n) \\le \\hat{h}(n)$' }
      - { id: '4', text: '$\\hat{g}(n)-0$' }
    answers: ['1']
    explanation: A*가 최적성을 보장하려면 휴리스틱이 실제 남은 비용을 과대평가하지 않아야 한다. 즉 모든 상태에서 $\\hat{h}(n) \\le h(n)$인 허용적 휴리스틱을 사용해야 한다.
    tags: [a-star, admissible-heuristic]

  - id: l04-01
    type: multiple-choice
