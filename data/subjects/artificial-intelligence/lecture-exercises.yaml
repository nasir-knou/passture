      - { id: '3', text: 모든 절들은 리터럴들의 논리곱으로 표현된다. }
      - { id: '4', text: 귀납법을 이용하여 증명한다. }
    answers: ['2']
    explanation: 도출연역은 증명할 명제의 부정을 공리 집합에 추가한 뒤, 도출 규칙을 반복 적용하여 모순을 얻는 반박 증명 방식이다.
    tags: [resolution, theorem-proving]

  - id: l06-06
