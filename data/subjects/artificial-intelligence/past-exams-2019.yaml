    answers: ['1']
    explanation: |
      선택지 1: 자율학습은 라벨이나 목표 출력 없이 입력 데이터의 구조를 찾으므로 정답이다.
      선택지 2: 기대 출력과 비교해 학습하는 것은 지도학습이다.
      선택지 3: 보상을 최대화하는 방식은 강화학습이다.
      선택지 4: 입력과 출력 쌍은 지도학습 데이터의 형태이다.

      핵심 개념:
      자율학습은 정답 라벨 없이 데이터의 숨은 구조를 발견한다.
      대표 예로 군집화, 차원 축소, 밀도 추정이 있다.
      지도학습은 입력과 목표 출력의 쌍을 사용한다.
      강화학습은 행동과 보상을 통해 정책을 학습한다.
