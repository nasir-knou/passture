questions:
  - id: e19-01
    type: multiple-choice
    passageRefs: [g19-minimax-tree-01]
    prompt: 다음 최대최소 탐색트리의 A에서 다음 수로 D를 선택하게 되는 노드 L의 평가함수 값 (ㄱ)과 그 때의 A의 가치 (ㄴ)은? 리프의 값들은 그 노드에 대한 가치를 예측한 평가함수 값이다.
    choices:
      - { id: '1', text: '(ㄱ) 5, (ㄴ) 8' }
      - { id: '2', text: '(ㄱ) 5, (ㄴ) 13' }
      - { id: '3', text: '(ㄱ) 9, (ㄴ) 13' }
      - { id: '4', text: '(ㄱ) 10, (ㄴ) 8' }
    answers: ['4']
    explanation: |
      선택지 4: D가 선택되려면 D의 최소값이 C의 값 7보다 커야 하며, 보기 중 L=10일 때 D의 값은 min(8,13,10)=8이 되어 A의 값도 8이 된다.

      핵심 개념:
      최대 노드는 자식 중 최댓값을, 최소 노드는 자식 중 최솟값을 선택한다.
    tags: [game-tree, minimax]

  - id: e19-02
    type: multiple-choice
    prompt: $\alpha$-$\beta$ 가지치기에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '최대최소 탐색트리에서 탐색이 불필요한 가지를 잘라 낸다.' }
      - { id: '2', text: '최대최소 탐색트리를 확률적으로 탐색한다.' }
      - { id: '3', text: '리프 노드의 평가함수를 계산하는 역할을 한다.' }
      - { id: '4', text: '트리를 최대한 깊이 탐색하여 가치를 평가한다.' }
    answers: ['1']
    explanation: |
      선택지 1: $\alpha$-$\beta$ 가지치기는 최종 minimax 결정에 영향을 주지 않는 하위 가지의 탐색을 생략한다.

      핵심 개념:
      $\alpha$와 $\beta$는 현재까지 보장된 최대/최소 한계를 나타내며, 더 볼 필요가 없는 분기를 제거한다.
    tags: [game-tree, alpha-beta-pruning]

  - id: e19-03
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 네 단계를 순서대로 나열한 것은?
    choices:
      - { id: '1', text: '선택 -> 시뮬레이션 -> 확장 -> 역전파' }
      - { id: '2', text: '선택 -> 확장 -> 시뮬레이션 -> 역전파' }
      - { id: '3', text: '선택 -> 역전파 -> 시뮬레이션 -> 확장' }
      - { id: '4', text: '선택 -> 역전파 -> 확장 -> 시뮬레이션' }
    answers: ['2']
    explanation: |
      선택지 2: MCTS는 선택, 확장, 시뮬레이션, 역전파 순서로 반복된다.

      핵심 개념:
      선택은 유망한 노드를 고르고, 확장은 새 노드를 만들며, 시뮬레이션은 결과를 추정하고, 역전파는 통계를 갱신한다.
    tags: [monte-carlo-tree-search]

  - id: e19-04
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 선택 전략은 탐사와 활용의 균형을 이루도록 설계한다. 이때 활용은 무엇을 의미하는가?
    choices:
      - { id: '1', text: '덜 유망한 것을 선택할 수 있게 한다.' }
      - { id: '2', text: '시뮬레이션 결과에 따라 통계 정보를 업데이트한다.' }
      - { id: '3', text: '선택된 노드로부터 게임이 끝날 때까지 무작위로 수를 선택하여 게임을 진행한다.' }
      - { id: '4', text: '지금까지의 결과 중 가장 우수한 결과를 이끌어 내는 수를 선택한다.' }
    answers: ['4']
    explanation: |
      선택지 4: 활용은 이미 얻은 통계를 바탕으로 현재 가장 좋은 선택을 더 많이 이용하는 것이다.

      핵심 개념:
      탐사는 정보가 부족한 선택지를 시험하는 것이고, 활용은 현재 성능이 좋은 선택지를 선택하는 것이다.
    tags: [monte-carlo-tree-search, exploration-exploitation]

  - id: e19-05
    type: multiple-choice
    prompt: 다음 중 지식기반 시스템의 주요 특징을 설명한 것은?
    choices:
      - { id: '1', text: '알고리즘 형태로 지식이 프로그램에 구현된다.' }
      - { id: '2', text: '현장 전문가는 지식 공학자를 위해 추론기관을 설계한다.' }
      - { id: '3', text: '문제 분야의 지식과 추론기관이 분리되어 있다.' }
      - { id: '4', text: '일반 사용자가 직접 추론기관을 제공한다.' }
    answers: ['3']
    explanation: |
      선택지 3: 지식기반 시스템은 지식베이스와 추론기관을 분리해 지식을 표현하고 추론한다.

      핵심 개념:
      지식기반 시스템은 도메인 지식, 추론기관, 사용자 인터페이스 등으로 구성된다.
    tags: [knowledge-based-system]

  - id: e19-06
    type: multiple-choice
    prompt: 승용차를 표현하기 위한 속성을 ako, 승차인원, 배기량, 트렁크 용량으로 표현하였을 때 특성상속이 이루어지게 하는 속성은?
    choices:
      - { id: '1', text: 'ako' }
      - { id: '2', text: '승차인원' }
      - { id: '3', text: '배기량' }
      - { id: '4', text: '트렁크 용량' }
    answers: ['1']
    explanation: |
      선택지 1: ako는 a-kind-of 관계를 나타내며 상위 개념의 특성을 하위 개념이 상속하게 한다.

      핵심 개념:
      프레임 표현에서 ako, is-a 같은 관계는 계층적 지식과 속성 상속에 사용된다.
    tags: [knowledge-representation, frame]

  - id: e19-07
    type: multiple-choice
    prompt: $\sim p \lor q$가 참인 명제이다. 다음 중 올바른 것은?
    choices:
      - { id: '1', text: '$p$가 참일 경우 $q$도 참이다.' }
      - { id: '2', text: '$p$가 거짓일 경우 $q$는 참이 될 수 없다.' }
      - { id: '3', text: '$q$와 관계없이 $p$는 참이다.' }
      - { id: '4', text: '$q$가 거짓일 경우 $p$는 참이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $\sim p \lor q$는 $p \to q$와 동치이므로 $p$가 참이면 $q$도 참이어야 한다.

      핵심 개념:
      함의 $p \to q$는 $\sim p \lor q$로 바꾸어 표현할 수 있다.
    tags: [logic, implication]

  - id: e19-08
    type: multiple-choice
    prompt: 다음 중 연언 표준형에 해당되는 논리식은? 단, $p, q, r, s$는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \lor q) \land \sim(\sim r \lor s)$' }
      - { id: '2', text: '$(p \land \sim q) \lor (\sim p \land r)$' }
      - { id: '3', text: '$(\sim p \lor q) \land (r \lor s)$' }
      - { id: '4', text: '$\sim\{(p \lor q) \land (\sim q \lor r)\}$' }
    answers: ['3']
    explanation: |
      선택지 3: 리터럴들의 논리합 절들이 논리곱으로 연결된 형태이므로 연언 표준형이다.

      핵심 개념:
      CNF는 절(clause)들의 AND이며, 각 절은 리터럴들의 OR로 구성된다.
    tags: [logic, cnf]

  - id: e19-09
    type: multiple-choice
    prompt: 다음 술어논리식에서 (ㄱ) 부모절의 쌍과 (ㄴ) 도출절이 올바른 것은? 단, $P, Q, R$은 술어, $x$와 $y$는 객체 변수, $A$와 $B$는 객체 상수이다.
    choices:
      - { id: '1', text: '(ㄱ) $P(A)$와 $P(x) \lor Q(x)$, (ㄴ) $Q(A)$' }
      - { id: '2', text: '(ㄱ) $P(A) \lor Q(x,A)$와 $\sim P(B) \lor Q(B,y)$, (ㄴ) $Q(B,A)$' }
      - { id: '3', text: '(ㄱ) $\sim P(A)$와 $P(A)$, (ㄴ) $true$' }
      - { id: '4', text: '(ㄱ) $\sim P(x) \lor Q(x)$와 $\sim Q(A) \lor R(B)$, (ㄴ) $\sim P(A) \lor R(B)$' }
    answers: ['4']
    explanation: |
      선택지 4: $x=A$로 단일화하면 $Q(A)$와 $\sim Q(A)$가 소거되어 $\sim P(A)\lor R(B)$가 도출된다.

      핵심 개념:
      도출은 상보 리터럴을 단일화한 뒤 제거하고 남은 절을 결합한다.
    tags: [predicate-logic, resolution]

  - id: e19-10
    type: multiple-choice
    prompt: 다음 중 퍼지집합에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '각각의 원소의 소속함수 값은 0 또는 1이다.' }
      - { id: '2', text: '드모르간의 법칙이 성립한다.' }
      - { id: '3', text: '퍼지집합에 속한 모든 원소의 소속함수의 합은 1이다.' }
      - { id: '4', text: '두 퍼지집합의 합집합은 각 원소의 소속함수 값의 최솟값으로 정의된다.' }
    answers: ['2']
    explanation: |
      선택지 2: 표준 퍼지 연산에서도 여집합, 합집합, 교집합에 대해 드모르간 법칙이 성립한다.

      핵심 개념:
      퍼지집합의 소속도는 보통 0과 1 사이의 값이며, 합집합은 max, 교집합은 min으로 정의한다.
    tags: [fuzzy-set]

  - id: e19-11
    type: multiple-choice
    prompt: 다음 중 퍼지논리 연산자를 적절히 정의한 것은?
    choices:
      - { id: '1', text: '$a \to b = a - b$' }
      - { id: '2', text: '$a \land b = a + b$' }
      - { id: '3', text: '$a \lor b = \max(a,b)$' }
      - { id: '4', text: '$\sim a = \max(1,a)$' }
    answers: ['3']
    explanation: |
      선택지 3: 표준 퍼지논리에서 OR 연산은 두 소속도 중 큰 값인 $\max(a,b)$로 정의한다.

      핵심 개념:
      표준 퍼지 연산은 $\land=\min$, $\lor=\max$, $\sim a=1-a$로 정의한다.
    tags: [fuzzy-logic]

  - id: e19-12
    type: multiple-choice
    prompt: 다음 중 퍼지규칙 및 퍼지추론, 퍼지제어에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '규칙은 조건부가 정확히 만족할 경우에만 결론을 낸다.' }
      - { id: '2', text: '규칙의 조건부 및 결론부에 언어적 변수를 포함할 수 있다.' }
      - { id: '3', text: '추론의 결과는 참(1) 또는 거짓(0) 중 하나의 값이다.' }
      - { id: '4', text: '퍼지 제어기의 출력을 퍼지화하여 제어 대상을 제어한다.' }
    answers: ['2']
    explanation: |
      선택지 2: 퍼지규칙은 "온도가 높다" 같은 언어적 변수를 조건부와 결론부에 사용할 수 있다.

      핵심 개념:
      퍼지추론은 부분적으로 만족되는 규칙도 정도에 따라 결론에 반영한다.
    tags: [fuzzy-inference, fuzzy-control]

  - id: e19-13
    type: multiple-choice
    prompt: 다음 중 컴퓨터 시각 시스템의 처리 단계를 올바르게 정의한 것은?
    choices:
      - { id: '1', text: '전처리: 영상 내의 처리 대상을 적절한 데이터로 표현한다.' }
      - { id: '2', text: '정규화: 취득한 영상을 처리하기 좋은 형태로 가공한다.' }
      - { id: '3', text: '영상분할: 영상을 몇 개의 의미 있는 영역으로 나눈다.' }
      - { id: '4', text: '영상 표현: 잡음을 제거하여 깨끗한 영상을 얻는다.' }
    answers: ['3']
    explanation: |
      선택지 3: 영상분할은 영상을 의미 있는 영역이나 객체 단위로 나누는 처리 단계이다.

      핵심 개념:
      전처리는 잡음 제거 등 초기 보정이고, 표현은 분할된 대상을 특징이나 구조로 나타내는 단계이다.
    tags: [computer-vision, image-segmentation]

  - id: e19-14
    type: multiple-choice
    prompt: 다음 중 아날로그 신호를 디지털 신호로 변환하여 디지털 영상을 입력하기 위해 거치는 처리에 해당되는 것은?
    choices:
      - { id: '1', text: '표본화와 양자화' }
      - { id: '2', text: '정규화' }
      - { id: '3', text: '분할과 합병' }
      - { id: '4', text: '평활화' }
    answers: ['1']
    explanation: |
      선택지 1: 아날로그 영상을 디지털 영상으로 바꾸려면 공간적으로 표본화하고 밝기 값을 양자화해야 한다.

      핵심 개념:
      표본화는 위치를 이산화하고, 양자화는 픽셀 값을 유한한 단계로 이산화한다.
    tags: [computer-vision, sampling, quantization]

  - id: e19-15
    type: multiple-choice
    prompt: 다음 중 중간값 필터에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '정해진 크기의 영역에 속한 픽셀들의 평균을 구한다.' }
      - { id: '2', text: '점잡음(salt-and-pepper noise)의 제거에 효과적이다.' }
      - { id: '3', text: '2차 미분을 구하여 처리한다.' }
      - { id: '4', text: '영상 내의 급격한 변화가 발생하는 경계를 검출한다.' }
    answers: ['2']
    explanation: |
      선택지 2: 중간값 필터는 주변 픽셀의 중앙값으로 대체하므로 점잡음 제거에 효과적이다.

      핵심 개념:
      평균 필터는 평활화에 쓰이고, 라플라시안 같은 2차 미분은 경계 검출에 쓰인다.
    tags: [computer-vision, median-filter]

  - id: e19-16
    type: multiple-choice
    prompt: 다음 중 소벨 연산자로 구할 수 있는 것은?
    choices:
      - { id: '1', text: '에지의 강도와 방향' }
      - { id: '2', text: '정해진 영역 내의 픽셀 값들의 중간값' }
      - { id: '3', text: '영상의 이진화를 위한 임계치' }
      - { id: '4', text: '픽셀 사이의 연결성' }
    answers: ['1']
    explanation: |
      선택지 1: 소벨 연산자는 수평/수직 방향의 기울기를 계산하여 에지 강도와 방향을 구한다.

      핵심 개념:
      소벨 마스크는 영상의 1차 미분 근사를 통해 경계를 검출하는 데 사용된다.
    tags: [computer-vision, sobel]

  - id: e19-17
    type: multiple-choice
    prompt: 다음 중 주어진 표본 공간을 직교변환을 통해 특징요소 사이의 상관관계를 최소화하는 공간으로 변환한 후 식별에 도움이 되는 성분만으로 표현함으로써 차원 축소를 할 수 있는 기술을 일컫는 것은?
    choices:
      - { id: '1', text: '라플라스 연산자' }
      - { id: '2', text: '패턴의 정규화' }
      - { id: '3', text: '주성분 분석(PCA)' }
      - { id: '4', text: '이진화' }
    answers: ['3']
    explanation: |
      선택지 3: PCA는 직교변환으로 상관된 특징을 분산이 큰 주성분 축으로 변환해 차원을 줄인다.

      핵심 개념:
      PCA는 특징 추출과 차원 축소에 널리 사용된다.
    tags: [pattern-recognition, pca]

  - id: e19-18
    type: multiple-choice
