questions:
  - id: e19-01
    type: multiple-choice
    passageRefs: [g19-minimax-tree-01]
    prompt: 다음 최대최소 탐색트리의 A에서 다음 수로 D를 선택하게 되는 노드 L의 평가함수 값 (ㄱ)과 그 때의 A의 가치 (ㄴ)은? 리프의 값들은 그 노드에 대한 가치를 예측한 평가함수 값이다.
    choices:
      - { id: '1', text: '(ㄱ) 5, (ㄴ) 8' }
      - { id: '2', text: '(ㄱ) 5, (ㄴ) 13' }
      - { id: '3', text: '(ㄱ) 9, (ㄴ) 13' }
      - { id: '4', text: '(ㄱ) 10, (ㄴ) 8' }
    answers: ['4']
    explanation: |
      선택지 1: L=5이면 D의 최소값은 5가 되어 A가 D를 선택하지 않는다.
      선택지 2: L=5이면 D는 5이고, A의 값도 13이 될 수 없다.
      선택지 3: L=9이면 D의 값은 min(8,13,9)=8이므로 (ㄱ)이 맞지 않는다.
      선택지 4: L=10이면 B=4, C=7, D=8이고 A는 max(4,7,8)=8이므로 D를 선택한다.

      핵심 개념:
      최대최소 탐색에서 MAX 노드는 자식 중 큰 값을, MIN 노드는 자식 중 작은 값을 선택한다.
      A가 MAX이고 B, C, D가 MIN이면 각 중간 노드의 값부터 계산한다.
      D가 선택되려면 D의 최소값이 B와 C의 값보다 커야 한다.
      L=10일 때 D의 값은 8이고 A의 최종 가치는 8이다.
    tags: [game-tree, minimax]

  - id: e19-02
    type: multiple-choice
    prompt: '$\alpha$-$\beta$ 가지치기에 대한 설명으로 올바른 것은?'
    choices:
      - { id: '1', text: '최대최소 탐색트리에서 탐색이 불필요한 가지를 잘라 낸다.' }
      - { id: '2', text: '최대최소 탐색트리를 확률적으로 탐색한다.' }
      - { id: '3', text: '리프 노드의 평가함수를 계산하는 역할을 한다.' }
      - { id: '4', text: '트리를 최대한 깊이 탐색하여 가치를 평가한다.' }
    answers: ['1']
    explanation: |
      선택지 1: 알파-베타 가지치기는 결과에 영향을 주지 않는 하위 가지 탐색을 생략하므로 정답이다.
      선택지 2: 확률적 탐색이 아니라 최대최소 탐색의 불필요한 분기를 제거하는 방법이다.
      선택지 3: 평가함수는 리프나 제한 깊이 노드의 가치를 추정하는 별도 함수이다.
      선택지 4: 무조건 깊게 탐색하는 것이 아니라 가능한 탐색량을 줄이는 기법이다.

      핵심 개념:
      알파-베타 가지치기는 minimax와 같은 값을 유지하면서 탐색 노드 수를 줄인다.
      alpha는 MAX가 보장할 수 있는 하한, beta는 MIN이 보장할 수 있는 상한이다.
      alpha가 beta 이상이 되면 더 이상 탐색해도 선택 결과가 바뀌지 않는다.
      좋은 수를 먼저 탐색할수록 가지치기 효과가 커진다.
    tags: [game-tree, alpha-beta-pruning]

  - id: e19-03
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 네 단계를 순서대로 나열한 것은?
    choices:
      - { id: '1', text: '선택 -> 시뮬레이션 -> 확장 -> 역전파' }
      - { id: '2', text: '선택 -> 확장 -> 시뮬레이션 -> 역전파' }
      - { id: '3', text: '선택 -> 역전파 -> 시뮬레이션 -> 확장' }
      - { id: '4', text: '선택 -> 역전파 -> 확장 -> 시뮬레이션' }
    answers: ['2']
    explanation: |
      선택지 1: 확장은 시뮬레이션 전에 수행된다.
      선택지 2: MCTS의 표준 절차는 선택, 확장, 시뮬레이션, 역전파 순서이므로 정답이다.
      선택지 3: 역전파는 시뮬레이션 결과가 나온 뒤 수행된다.
      선택지 4: 역전파와 확장, 시뮬레이션의 순서가 맞지 않는다.

      핵심 개념:
      몬테카를로 트리 탐색은 제한된 탐색 예산에서 좋은 수를 추정하는 게임 탐색 방법이다.
      선택 단계에서는 트리 정책에 따라 탐색할 노드를 고른다.
      확장 후 시뮬레이션으로 결과를 추정하고, 역전파로 방문 수와 보상 통계를 갱신한다.
      탐색과 활용의 균형을 잡는 선택 전략이 성능에 중요하다.
    tags: [monte-carlo-tree-search]

  - id: e19-04
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 선택 전략은 탐사와 활용의 균형을 이루도록 설계한다. 이때 활용은 무엇을 의미하는가?
    choices:
      - { id: '1', text: '덜 유망한 것을 선택할 수 있게 한다.' }
      - { id: '2', text: '시뮬레이션 결과에 따라 통계 정보를 업데이트한다.' }
      - { id: '3', text: '선택된 노드로부터 게임이 끝날 때까지 무작위로 수를 선택하여 게임을 진행한다.' }
      - { id: '4', text: '지금까지의 결과 중 가장 우수한 결과를 이끌어 내는 수를 선택한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 덜 유망한 선택지를 시험하는 것은 탐사에 가깝다.
      선택지 2: 통계 정보 갱신은 역전파 단계의 역할이다.
      선택지 3: 무작위 진행은 시뮬레이션 단계의 설명이다.
      선택지 4: 현재까지 좋은 성과를 낸 선택을 우선하는 것이 활용이므로 정답이다.

      핵심 개념:
      탐사는 아직 충분히 확인하지 않은 선택지를 시험하는 것이다.
      활용은 현재까지 좋은 보상을 보인 선택지를 더 선택하는 것이다.
      MCTS는 두 요소를 함께 고려해 조기 수렴과 과도한 무작위 탐색을 모두 피한다.
      UCB 계열 선택식은 탐사 항과 활용 항을 같이 둔다.
    tags: [monte-carlo-tree-search, exploration-exploitation]

  - id: e19-05
    type: multiple-choice
    prompt: 다음 중 지식기반 시스템의 주요 특징을 설명한 것은?
    choices:
      - { id: '1', text: '알고리즘 형태로 지식이 프로그램에 구현된다.' }
      - { id: '2', text: '현장 전문가는 지식 공학자를 위해 추론기관을 설계한다.' }
      - { id: '3', text: '문제 분야의 지식과 추론기관이 분리되어 있다.' }
      - { id: '4', text: '일반 사용자가 직접 추론기관을 제공한다.' }
    answers: ['3']
    explanation: |
      선택지 1: 지식기반 시스템은 지식을 절차 알고리즘 안에 고정하기보다 지식베이스로 분리한다.
      선택지 2: 전문가는 도메인 지식을 제공하고, 지식 공학자와 시스템 개발자가 이를 구조화한다.
      선택지 3: 지식베이스와 추론기관의 분리가 핵심 특징이므로 정답이다.
      선택지 4: 일반 사용자는 시스템을 사용하는 주체이지 추론기관을 직접 제공하지 않는다.

      핵심 개념:
      지식기반 시스템은 지식베이스와 추론기관으로 구성된다.
      지식베이스에는 문제 영역의 사실과 규칙이 저장된다.
      추론기관은 저장된 지식을 이용해 결론을 도출한다.
      지식과 추론 절차를 분리하면 지식 수정과 재사용이 쉬워진다.
    tags: [knowledge-based-system]

  - id: e19-06
    type: multiple-choice
    prompt: 승용차를 표현하기 위한 속성을 ako, 승차인원, 배기량, 트렁크 용량으로 표현하였을 때 특성상속이 이루어지게 하는 속성은?
    choices:
      - { id: '1', text: 'ako' }
      - { id: '2', text: '승차인원' }
      - { id: '3', text: '배기량' }
      - { id: '4', text: '트렁크 용량' }
    answers: ['1']
    explanation: |
      선택지 1: ako는 a-kind-of 관계를 나타내며 상위 개념의 특성을 하위 개념이 상속하게 하므로 정답이다.
      선택지 2: 승차인원은 승용차의 속성값이지 상속 관계를 표현하지 않는다.
      선택지 3: 배기량도 객체의 일반 속성이다.
      선택지 4: 트렁크 용량은 부분 특성일 뿐 계층 관계를 만들지 않는다.

      핵심 개념:
      의미망이나 프레임 표현에서 ako는 종류 관계를 나타낸다.
      하위 개념은 상위 개념의 속성을 물려받을 수 있다.
      상속 관계는 지식 표현에서 중복 저장을 줄인다.
      일반 속성값과 분류 계층을 나타내는 슬롯을 구분해야 한다.
    tags: [knowledge-representation, inheritance]

  - id: e19-07
    type: multiple-choice
    prompt: '$\sim p \lor q$가 참인 명제이다. 다음 중 올바른 것은?'
    choices:
      - { id: '1', text: '$p$가 참일 경우 $q$도 참이다.' }
      - { id: '2', text: '$p$가 거짓일 경우 $q$는 참이 될 수 없다.' }
      - { id: '3', text: '$q$와 관계없이 $p$는 참이다.' }
      - { id: '4', text: '$q$가 거짓일 경우 $p$는 참이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $\sim p \lor q$는 $p \to q$와 동치이므로 p가 참이면 q도 참이어야 한다.
      선택지 2: p가 거짓이면 $\sim p$가 참이므로 q와 무관하게 전체 명제는 참이다.
      선택지 3: 명제의 참은 p가 항상 참임을 뜻하지 않는다.
      선택지 4: q가 거짓이면 전체 명제가 참이기 위해 p는 거짓이어야 한다.

      핵심 개념:
      조건명제 $p \to q$는 $\sim p \lor q$와 동치이다.
      전건이 참이고 후건이 거짓인 경우에만 조건명제는 거짓이다.
      전건이 거짓이면 조건명제는 참으로 평가된다.
      논리식의 동치 변환을 이용하면 자연어 조건을 정확히 해석할 수 있다.
    tags: [propositional-logic]

  - id: e19-08
    type: multiple-choice
    prompt: 다음 중 연언 표준형에 해당되는 논리식은? 단, $p$, $q$, $r$, $s$는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \lor q) \land \sim(\sim r \lor s)$' }
      - { id: '2', text: '$(p \land \sim q) \lor (\sim p \land r)$' }
      - { id: '3', text: '$(\sim p \lor q) \land (r \lor s)$' }
      - { id: '4', text: '$\sim\{(p \lor q) \land (\sim q \lor r)\}$' }
    answers: ['3']
    explanation: |
      선택지 1: 두 번째 항이 리터럴들의 선언절 형태가 아니라 부정이 절 전체에 붙어 있다.
      선택지 2: 논리곱 항들의 논리합이므로 선언 표준형에 가깝다.
      선택지 3: 리터럴들의 논리합으로 된 절들이 논리곱으로 연결되어 있으므로 연언 표준형이다.
      선택지 4: 전체 부정이 있어 그대로는 연언 표준형이 아니다.

      핵심 개념:
      연언 표준형 CNF는 절들의 AND 형태이다.
      각 절은 리터럴들이 OR로 연결된 식이다.
      부정은 개별 기본명제에만 붙어야 표준형으로 볼 수 있다.
      추론과 SAT 문제에서는 CNF 변환이 자주 사용된다.
    tags: [propositional-logic, cnf]

  - id: e19-09
    type: multiple-choice
    prompt: 다음 술어논리식에서 (ㄱ) 부모절의 쌍과 (ㄴ) 도출절이 올바른 것은? 단, $P$, $Q$, $R$은 술어, $x$와 $y$는 객체 변수, $A$와 $B$는 객체 상수이다.
    choices:
      - { id: '1', text: '(ㄱ) $P(A)$와 $P(x) \lor Q(x)$, (ㄴ) $Q(A)$' }
      - { id: '2', text: '(ㄱ) $P(A) \lor Q(x,A)$와 $\sim P(B) \lor Q(B,y)$, (ㄴ) $Q(B,A)$' }
      - { id: '3', text: '(ㄱ) $\sim P(A)$와 $P(A)$, (ㄴ) $true$' }
      - { id: '4', text: '(ㄱ) $\sim P(x) \lor Q(x)$와 $\sim Q(A) \lor R(B)$, (ㄴ) $\sim P(A) \lor R(B)$' }
    answers: ['4']
    explanation: |
      선택지 1: $P(A)$와 $P(x)$는 상보 리터럴이 아니므로 해소할 수 없다.
      선택지 2: $P(A)$와 $\sim P(B)$는 상수 A와 B가 달라 단일화되지 않는다.
      선택지 3: $\sim P(A)$와 $P(A)$의 해소 결과는 빈 절이며, 일반적으로 모순을 뜻하지 true 도출절로 쓰지 않는다.
      선택지 4: $Q(x)$와 $\sim Q(A)$를 $x=A$로 단일화하면 $\sim P(A) \lor R(B)$가 도출된다.

      핵심 개념:
      해소 원리는 서로 보수인 리터럴을 제거해 새 절을 도출한다.
      술어논리에서는 보수 리터럴이 단일화될 수 있어야 한다.
      변수에는 상수를 대입할 수 있지만 서로 다른 상수는 단일화되지 않는다.
      도출절은 부모절에서 해소된 리터럴을 제외한 나머지 리터럴의 논리합이다.
    tags: [predicate-logic, resolution]

  - id: e19-10
    type: multiple-choice
    prompt: 다음 중 퍼지집합에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '각각의 원소의 소속함수 값은 0 또는 1이다.' }
      - { id: '2', text: '드모르간의 법칙이 성립한다.' }
      - { id: '3', text: '퍼지집합에 속한 모든 원소의 소속함수의 합은 1이다.' }
      - { id: '4', text: '두 퍼지집합의 합집합은 각 원소의 소속함수 값의 최솟값으로 정의된다.' }
    answers: ['2']
    explanation: |
      선택지 1: 퍼지집합의 소속함수 값은 보통 0과 1 사이의 연속값을 가질 수 있다.
      선택지 2: 표준 퍼지 여집합, 합집합, 교집합 정의에서는 드모르간 법칙이 성립한다.
      선택지 3: 소속함수 값의 합이 1이어야 하는 것은 확률분포의 성질에 가깝다.
      선택지 4: 합집합은 보통 최대값, 교집합은 보통 최소값으로 정의된다.

      핵심 개념:
      퍼지집합은 원소가 어느 정도 속하는지를 소속도 값으로 표현한다.
      고전 집합과 달리 소속도가 0 또는 1로만 제한되지 않는다.
      표준 연산에서 합집합은 max, 교집합은 min, 여집합은 1에서 소속도를 뺀 값이다.
      이러한 정의에서는 드모르간 법칙을 유지할 수 있다.
    tags: [fuzzy-set]

  - id: e19-11
    type: multiple-choice
    prompt: 다음 중 퍼지논리 연산자를 적절히 정의한 것은?
    choices:
      - { id: '1', text: '$a \to b = a - b$' }
      - { id: '2', text: '$a \land b = a + b$' }
      - { id: '3', text: '$a \lor b = \max(a,b)$' }
      - { id: '4', text: '$\sim a = \max(1,a)$' }
    answers: ['3']
    explanation: |
      선택지 1: 퍼지 함의는 여러 정의가 있지만 단순한 $a-b$로 일반 정의하지 않는다.
      선택지 2: 표준 퍼지 논리에서 AND는 보통 $\min(a,b)$이다.
      선택지 3: 표준 퍼지 OR는 $\max(a,b)$로 정의하므로 정답이다.
      선택지 4: 표준 부정은 보통 $1-a$이며 $\max(1,a)$는 항상 1이 된다.

      핵심 개념:
      퍼지 논리는 참의 정도를 0부터 1 사이의 값으로 다룬다.
      가장 흔한 표준 연산은 AND=min, OR=max, NOT=1-a이다.
      연산 결과도 0과 1 사이에 있어야 한다.
      퍼지 연산자를 고전 논리의 진리표와 연결해 이해하면 오류를 줄일 수 있다.
    tags: [fuzzy-logic]

  - id: e19-12
    type: multiple-choice
    prompt: 다음 중 퍼지규칙 및 퍼지추론, 퍼지제어에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '규칙은 조건부가 정확히 만족할 경우에만 결론을 낸다.' }
      - { id: '2', text: '규칙의 조건부 및 결론부에 언어적 변수를 포함할 수 있다.' }
      - { id: '3', text: '추론의 결과는 참(1) 또는 거짓(0) 중 하나의 값이다.' }
      - { id: '4', text: '퍼지 제어기의 출력을 퍼지화하여 제어 대상을 제어한다.' }
    answers: ['2']
    explanation: |
      선택지 1: 퍼지 규칙은 조건이 어느 정도 만족되는지를 반영해 부분적으로 활성화될 수 있다.
      선택지 2: 퍼지 규칙은 높다, 낮다 같은 언어적 변수를 조건부와 결론부에 사용할 수 있다.
      선택지 3: 퍼지추론 결과는 0 또는 1 하나로 제한되지 않는다.
      선택지 4: 제어 대상에 실제 값을 보내려면 일반적으로 퍼지 결과를 비퍼지화한다.

      핵심 개념:
      퍼지 규칙은 IF-THEN 형식으로 불확실하고 애매한 지식을 표현한다.
      언어적 변수는 수치 범위를 의미 있는 말로 표현하게 해 준다.
      퍼지 제어는 퍼지화, 규칙 평가, 추론, 비퍼지화 과정을 거친다.
      최종 제어 입력은 실제 시스템에 적용 가능한 명확한 값이어야 한다.
    tags: [fuzzy-inference, fuzzy-control]

  - id: e19-13
    type: multiple-choice
    prompt: 다음 중 컴퓨터 시각 시스템의 처리 단계를 올바르게 정의한 것은?
    choices:
      - { id: '1', text: '전처리: 영상 내의 처리 대상을 적절한 데이터로 표현한다.' }
      - { id: '2', text: '정규화: 취득한 영상을 처리하기 좋은 형태로 가공한다.' }
      - { id: '3', text: '영상분할: 영상을 몇 개의 의미 있는 영역으로 나눈다.' }
      - { id: '4', text: '영상 표현: 잡음을 제거하여 깨끗한 영상을 얻는다.' }
    answers: ['3']
    explanation: |
      선택지 1: 처리 대상을 데이터 구조로 나타내는 것은 표현 단계에 가깝다.
      선택지 2: 영상을 처리하기 좋은 형태로 가공하는 것은 전처리의 일반 설명이다.
      선택지 3: 영상분할은 영상을 의미 있는 영역이나 객체 단위로 나누는 단계이므로 정답이다.
      선택지 4: 잡음 제거는 전처리에 해당한다.

      핵심 개념:
      컴퓨터 시각은 영상 취득 후 전처리, 분할, 표현, 인식 같은 단계를 거친다.
      전처리는 잡음 제거와 품질 개선을 담당한다.
      분할은 관심 객체나 영역을 구분한다.
      표현과 기술 단계는 분할된 대상을 인식에 적합한 특징으로 바꾼다.
    tags: [computer-vision, image-processing]

  - id: e19-14
    type: multiple-choice
    prompt: 다음 중 아날로그 신호를 디지털 신호로 변환하여 디지털 영상을 입력하기 위해 거치는 처리에 해당되는 것은?
    choices:
      - { id: '1', text: '표본화와 양자화' }
      - { id: '2', text: '정규화' }
      - { id: '3', text: '분할과 합병' }
      - { id: '4', text: '평활화' }
    answers: ['1']
    explanation: |
      선택지 1: 아날로그 영상을 디지털 영상으로 바꾸려면 공간 표본화와 밝기 양자화가 필요하다.
      선택지 2: 정규화는 데이터 범위나 형태를 맞추는 후처리 성격의 변환이다.
      선택지 3: 분할과 합병은 영상 영역을 나누거나 합치는 처리이다.
      선택지 4: 평활화는 잡음 감소와 부드럽게 만드는 필터링이다.

      핵심 개념:
      디지털 영상은 공간 좌표와 밝기값이 이산화된 데이터이다.
      표본화는 연속 공간을 픽셀 격자로 나누는 과정이다.
      양자화는 연속 밝기값을 제한된 단계의 디지털 값으로 바꾸는 과정이다.
      두 과정이 있어야 컴퓨터가 영상을 배열 데이터로 처리할 수 있다.
    tags: [digital-image, sampling, quantization]

  - id: e19-15
    type: multiple-choice
    prompt: 다음 중 중간값 필터에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '정해진 크기의 영역에 속한 픽셀들의 평균을 구한다.' }
      - { id: '2', text: '점잡음(salt-and-pepper noise)의 제거에 효과적이다.' }
      - { id: '3', text: '2차 미분을 구하여 처리한다.' }
      - { id: '4', text: '영상 내의 급격한 변화가 발생하는 경계를 검출한다.' }
    answers: ['2']
    explanation: |
      선택지 1: 주변 픽셀 평균을 구하는 것은 평균 필터의 설명이다.
      선택지 2: 중간값 필터는 정렬 후 중앙값을 사용하므로 점잡음 제거에 효과적이다.
      선택지 3: 2차 미분은 라플라시안 계열 경계 검출에 가깝다.
      선택지 4: 급격한 변화 경계 검출은 에지 검출 필터의 설명이다.

      핵심 개념:
      중간값 필터는 윈도우 안 픽셀값을 정렬하고 중앙값으로 대체한다.
      극단적인 밝기값의 영향을 평균보다 덜 받는다.
      그래서 salt-and-pepper 잡음처럼 튀는 픽셀 제거에 적합하다.
      평균 필터보다 경계를 비교적 잘 보존하는 장점도 있다.
    tags: [image-filter, median-filter]

  - id: e19-16
    type: multiple-choice
    prompt: 다음 중 소벨 연산자로 구할 수 있는 것은?
    choices:
