  - id: e19-25
    type: multiple-choice
    prompt: 선형회귀에서 비용함수를 $C$로 정의하였다. 선형가설의 계수를 경사하강법으로 학습할 때 계수를 변화시키는 방법은? 단, $\nabla C$는 비용함수의 미분을 나타내며, 학습률은 작은 크기의 양수이다.
    choices:
      - { id: '1', text: '$C$에 학습률을 곱한 값을 계수에서 뺀다.' }
      - { id: '2', text: '$C$에 학습률을 곱한 값을 계수에 더한다.' }
      - { id: '3', text: '$\nabla C$에 학습률을 곱한 값을 계수에서 뺀다.' }
      - { id: '4', text: '$\nabla C$에 학습률을 곱한 값을 계수에 더한다.' }
    answers: ['3']
    explanation: |
      선택지 1: 비용함수 값 자체가 아니라 기울기를 사용해야 한다.
      선택지 2: 비용함수 값을 더하는 방식은 경사하강법 갱신식이 아니다.
      선택지 3: 경사하강법은 비용이 감소하는 방향인 음의 기울기 방향으로 계수를 갱신하므로 정답이다.
      선택지 4: 기울기 방향으로 더하면 비용이 증가할 수 있다.

      핵심 개념:
      경사하강법은 비용함수의 기울기를 이용해 매개변수를 반복 갱신한다.
      갱신식은 보통 $\theta := \theta - \eta \nabla C$이다.
      학습률 $\eta$는 한 번에 이동하는 크기를 조절한다.
      기울기의 반대 방향으로 움직이면 지역적으로 비용이 감소한다.
    tags: [linear-regression, gradient-descent]

