      선택지 1: 관성항이 단층 퍼셉트론의 표현 한계를 제거하지는 않는다.
      선택지 2: 오차 역전파는 주로 지도학습에서 사용되며 관성항은 자율학습 전환용이 아니다.
      선택지 3: 활성함수를 제거하면 다층망의 비선형 표현력이 사라진다.
      선택지 4: 이전 갱신 방향을 반영해 지역최소치와 고원 구간 문제를 완화하므로 정답이다.

      핵심 개념:
      관성항 또는 모멘텀은 이전 가중치 변화량 일부를 현재 갱신에 더한다.
      진동을 줄이고 일관된 하강 방향으로 더 빠르게 이동하도록 돕는다.
      얕은 지역최소나 평평한 고원에서 학습 정체를 줄일 수 있다.
      학습률과 함께 신경망 최적화의 중요한 하이퍼파라미터이다.
    tags: [backpropagation, momentum]

  - id: e19-32
    type: multiple-choice
    prompt: 다음 중 자기조직화 지도 학습의 $t$번째 단계에서 학습표본 $x_j$에 대한 승자 노드 및 그 이웃집합에 속하는 노드의 가중치벡터 $w_m$을 조정하는 방법은? 단, 적응 이득 $\alpha(t)$는 양수이다.
    choices:
      - { id: '1', text: '$w_m(t+1)=w_m(t)$' }
      - { id: '2', text: '$w_m(t+1)=x_j$' }
      - { id: '3', text: '$w_m(t+1)=w_m(t)+\alpha(t)\{x_j-w_m(t)\}$' }
      - { id: '4', text: '$w_m(t+1)=w_m(t)-\alpha(t)\{x_j-w_m(t)\}$' }
    answers: ['3']
    explanation: |
      선택지 1: 가중치가 변하지 않으면 학습이 일어나지 않는다.
      선택지 2: 가중치를 표본으로 즉시 대체하는 것이 아니라 일정 비율만 이동한다.
      선택지 3: SOM은 승자와 이웃 노드를 입력 표본 방향으로 이동시키므로 정답이다.
      선택지 4: 입력 표본에서 멀어지는 방향이므로 SOM 갱신식과 반대이다.

      핵심 개념:
      자기조직화 지도는 입력과 가장 가까운 승자 노드를 찾고 그 주변 노드를 함께 갱신한다.
      가중치 벡터는 입력 표본 쪽으로 조금씩 이동한다.
      적응 이득과 이웃 반경은 학습이 진행되며 줄어드는 경우가 많다.
      이 과정으로 고차원 데이터의 위상 관계를 저차원 격자에 보존하려 한다.
    tags: [self-organizing-map]

  - id: e19-33
    type: multiple-choice
    prompt: 다음 중 심층 신경망에서 출력층의 오차에 따른 연결가중치의 변화량이 입력층 방향으로 내려갈수록 크게 감소하여 학습이 진행되지 않는 문제를 일컫는 것은?
    choices:
      - { id: '1', text: '지역 최소치 문제' }
      - { id: '2', text: '경사 소멸 문제' }
      - { id: '3', text: '과적합 문제' }
      - { id: '4', text: '능선 문제' }
    answers: ['2']
    explanation: |
      선택지 1: 지역 최소치는 손실 지형에서 전역 최소가 아닌 곳에 머무는 문제이다.
      선택지 2: 역전파되는 기울기가 입력층 쪽으로 갈수록 작아지는 현상이 경사 소멸 문제이다.
      선택지 3: 과적합은 훈련 데이터에 지나치게 맞아 일반화가 나빠지는 문제이다.
      선택지 4: 능선 문제는 손실 표면의 방향별 곡률 차이와 관련된다.

      핵심 개념:
      심층 신경망에서는 오차 기울기가 여러 층을 거치며 곱해진다.
      작은 미분값이 반복 곱해지면 앞쪽 층의 기울기가 거의 0이 될 수 있다.
      이 경우 입력층 가까운 가중치가 잘 학습되지 않는다.
      ReLU 계열 활성함수, 정규화, 잔차 연결 등이 완화에 사용된다.
    tags: [deep-learning, vanishing-gradient]

  - id: e19-34
    type: multiple-choice
    prompt: 제한 볼츠만 머신과 같은 자율학습 신경망을 여러 층 쌓은 모델로, 학습표본 집합의 확률 분포를 학습할 수 있는 확률적 심층 신경망 모델에 해당되는 것은?
    choices:
      - { id: '1', text: '심층 신뢰망(deep belief nets)' }
      - { id: '2', text: 'LVQ(Learning Vector Quantization)' }
      - { id: '3', text: 'ReLU(Rectified Linear Unit)' }
      - { id: '4', text: '볼츠만 머신(Boltzmann machine)' }
    answers: ['1']
    explanation: |
      선택지 1: 심층 신뢰망은 제한 볼츠만 머신을 층층이 쌓은 확률적 생성 모델이므로 정답이다.
      선택지 2: LVQ는 원형 벡터 기반 지도학습 분류 방법이다.
      선택지 3: ReLU는 활성함수이지 확률적 심층 신경망 모델이 아니다.
      선택지 4: 볼츠만 머신은 관련 기반 모델이지만 여러 RBM을 쌓은 심층 구조의 명칭은 심층 신뢰망이다.

      핵심 개념:
      심층 신뢰망은 여러 층의 잠재 변수를 통해 데이터 분포를 모델링한다.
      제한 볼츠만 머신을 계층적으로 학습해 구성할 수 있다.
      생성 모델로서 학습표본의 확률 구조를 포착하려 한다.
      심층학습 초기에는 사전학습 방법으로 중요한 역할을 했다.
    tags: [deep-belief-network, rbm]

  - id: e19-35
    type: multiple-choice
    prompt: CNN 모델에서 필터를 적용함으로써 특징을 검출하는 역할을 하는 층은?
    choices:
      - { id: '1', text: 'ReLU 층' }
      - { id: '2', text: '통합(pooling) 층' }
      - { id: '3', text: '완전연결층' }
      - { id: '4', text: '합성곱(convolution)층' }
    answers: ['4']
    explanation: |
      선택지 1: ReLU 층은 비선형 활성함수를 적용한다.
      선택지 2: 풀링 층은 특징맵을 축소하고 위치 변화에 대한 강인성을 높인다.
      선택지 3: 완전연결층은 추출된 특징을 이용해 분류나 회귀 출력을 만든다.
      선택지 4: 합성곱층은 필터 또는 커널을 적용해 지역 특징을 검출하므로 정답이다.

      핵심 개념:
      CNN의 합성곱층은 작은 필터를 영상 전체에 적용해 특징맵을 만든다.
      필터는 에지, 질감, 부분 패턴 같은 지역 특징을 학습한다.
      같은 필터를 여러 위치에 공유해 파라미터 수를 줄인다.
      이후 활성화, 풀링, 완전연결층 등을 거쳐 최종 예측을 수행한다.
    tags: [cnn, convolution]
