      - { id: '2', text: '정해진 영역 내의 픽셀 값들의 중간값' }
      - { id: '3', text: '영상의 이진화를 위한 임계치' }
      - { id: '4', text: '픽셀 사이의 연결성' }
    answers: ['1']
    explanation: |
      선택지 1: 소벨 연산자는 x, y 방향 기울기를 계산해 에지 강도와 방향을 얻을 수 있다.
      선택지 2: 중간값은 median 필터에서 구한다.
      선택지 3: 이진화 임계치 결정은 thresholding 방법의 영역이다.
      선택지 4: 연결성은 영역 분석이나 라벨링에서 다룬다.

      핵심 개념:
      소벨 연산자는 영상의 밝기 변화량을 근사하는 1차 미분 필터이다.
      수평과 수직 마스크로 기울기 성분을 구한다.
      기울기 크기는 에지 강도, 기울기 방향은 에지 방향 판단에 사용된다.
      에지 검출은 영상 분할과 특징 추출의 기본 처리이다.
    tags: [image-processing, sobel, edge-detection]

  - id: e19-17
    type: multiple-choice
    prompt: 다음 중 주어진 표본 공간을 직교변환을 통해 특징요소 사이의 상관관계를 최소화하는 공간으로 변환한 후 식별에 도움이 되는 성분만으로 표현함으로써 차원 축소를 할 수 있는 기술을 일컫는 것은?
    choices:
      - { id: '1', text: '라플라스 연산자' }
      - { id: '2', text: '패턴의 정규화' }
      - { id: '3', text: '주성분 분석(PCA)' }
      - { id: '4', text: '이진화' }
    answers: ['3']
    explanation: |
      선택지 1: 라플라스 연산자는 영상의 2차 미분 기반 경계 검출에 쓰인다.
      선택지 2: 정규화는 크기나 위치, 범위 등을 맞추는 처리이다.
      선택지 3: PCA는 직교변환으로 상관을 줄이고 주요 성분만 남겨 차원을 축소한다.
      선택지 4: 이진화는 픽셀을 두 값으로 나누는 처리이다.

      핵심 개념:
      주성분 분석은 데이터 분산이 큰 축을 찾아 새 좌표계로 변환한다.
      주성분들은 서로 직교하며 상관이 줄어든 표현을 제공한다.
      큰 고유값에 해당하는 성분만 남기면 정보 손실을 줄이면서 차원을 낮출 수 있다.
      패턴 인식과 영상 특징 추출에서 널리 사용된다.
    tags: [pca, dimensionality-reduction]

  - id: e19-18
    type: multiple-choice
    prompt: 다음 중 군집을 구성하는 표본들의 통계적 분포를 고려한 거리 측정자는?
    choices:
      - { id: '1', text: '유클리드 거리' }
      - { id: '2', text: '해밍 거리' }
      - { id: '3', text: '도시블록 거리' }
      - { id: '4', text: '마할라노비스 거리' }
    answers: ['4']
    explanation: |
      선택지 1: 유클리드 거리는 좌표 차이의 직선 거리이며 분산 구조를 직접 반영하지 않는다.
      선택지 2: 해밍 거리는 서로 다른 위치의 개수를 세는 이산 거리이다.
      선택지 3: 도시블록 거리는 각 좌표 차이의 절댓값 합이다.
      선택지 4: 마할라노비스 거리는 공분산을 반영하므로 표본 분포를 고려한다.

      핵심 개념:
      마할라노비스 거리는 데이터의 분산과 변수 간 상관을 고려한다.
      같은 좌표 차이라도 분산이 큰 방향의 차이는 상대적으로 작게 평가된다.
      공분산 행렬의 역행렬을 사용해 표준화된 거리를 계산한다.
      군집과 분류 문제에서 분포 모양을 반영할 때 유용하다.
    tags: [distance-measure, mahalanobis]

  - id: e19-19
    type: multiple-choice
    prompt: 다음 중 학습표본이 관찰될 가능성이 최대가 될 수 있는 확률밀도함수의 매개변수를 추정하는 방식을 나타내는 것은?
    choices:
      - { id: '1', text: '$k$-근접이웃' }
      - { id: '2', text: '계량공간' }
      - { id: '3', text: '평활화' }
      - { id: '4', text: '최대가능도 추정(MLE)' }
    answers: ['4']
    explanation: |
      선택지 1: k-근접이웃은 주변 표본의 라벨을 이용하는 비모수 분류 방법이다.
      선택지 2: 계량공간은 거리 개념이 정의된 공간이다.
      선택지 3: 평활화는 신호나 영상의 잡음과 변동을 줄이는 처리이다.
      선택지 4: MLE는 관찰 표본의 가능도를 최대화하는 매개변수를 추정하므로 정답이다.

      핵심 개념:
      최대가능도 추정은 관측 데이터가 나올 확률을 가장 크게 만드는 모수를 찾는다.
      확률모형을 가정하고 그 모형의 파라미터를 추정하는 방법이다.
      가능도 함수는 모수를 변수로 보는 관측 데이터의 확률이다.
      통계적 패턴인식과 기계학습의 기본 추정 기법이다.
    tags: [maximum-likelihood-estimation]

  - id: e19-20
    type: multiple-choice
    prompt: 학습표본 집합에서 미지의 패턴과 가장 가까운 10개의 표본을 구했을 때 A클래스가 2개, B클래스가 4개, C클래스가 1개, D클래스가 3개였다면 $k$-근접이웃($k=10$)에서 이 패턴이 어느 클래스에 속하는 것으로 판정하는가?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['2']
    explanation: |
      선택지 1: A는 2개로 최다 빈도 클래스가 아니다.
      선택지 2: B는 4개로 10개 이웃 중 가장 많으므로 정답이다.
      선택지 3: C는 1개뿐이다.
      선택지 4: D는 3개로 B보다 적다.

      핵심 개념:
      k-근접이웃 분류는 가장 가까운 k개 학습표본의 다수 클래스를 선택한다.
      거리 척도와 k 값은 분류 결과에 영향을 준다.
      동률이 없으면 가장 빈도가 높은 클래스로 판정한다.
      단순하지만 데이터 분포와 스케일에 민감한 비모수 방법이다.
    tags: [knn, classification]

  - id: e19-21
    type: multiple-choice
    prompt: 다음 중 자율학습에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: '입력 값만 학습 데이터로 제공되며, 입력에 대한 출력 값은 제공되지 않는다.' }
      - { id: '2', text: '입력에 대한 시스템의 출력이 기대하는 출력과 같아지도록 시스템을 변화시킨다.' }
      - { id: '3', text: '일련의 행동에 따른 보상이 최대화되도록 학습을 진행한다.' }
