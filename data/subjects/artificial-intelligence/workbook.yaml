  - id: gb09-logistic-ensemble-08
    type: text
    body: |
      다항 로지스틱 회귀 구조에서 입력벡터 $\mathbf{x}$가 여러 로지스틱 함수 $H_{l_i}(\mathbf{x})$를 거쳐, 빈칸 (ㄱ)을 통해 $N$차원 출력벡터 $[\hat y_1,\hat y_2,\ldots,\hat y_N]^T$로 변환되고, 마지막에는 $\arg\max_i \hat y_i$로 클래스를 선택한다.
  - id: gb09-kmeans-code-10
    type: text
    body: |
      function kMeansClustering(x, k)
        m[1..k]의 초기위치 선택
        repeat
          mOld = m
          for i=1 to N do
            학습표본 x[i]에 대해 가장 가까운 평균벡터 m[j]를 선택;
            x[i]를 군집 j로 분류함;
          end-for;
          for j=1 to k do
            (가);
          end-for;
        until m == mOld
        return m;
      end-function
  - id: gb11-cnn-output-formula-07
    type: text
    body: |
      합성곱층 출력 크기 공식:
      $$S_{out}=\\left\\lfloor{S_{in}-S_f+2P\\over stride}\\right\\rfloor+1$$

questions:
  - id: b01-01
    type: multiple-choice
    prompt: 물리적 기호 시스템 가설의 의의에 해당되는 것은?
    choices:
      - { id: '1', text: 컴퓨터는 인간보다 계산능력이 우수하다. }
      - {
          id: '2',
          text: 인간이 행하는 지능적 작업을 수행하는 프로그램을 작성할 수 있다는 가능성에 대한 믿음의 근원이다.,
        }
      - { id: '3', text: 컴퓨터는 수치 데이터의 계산만 할 수 있다. }
      - { id: '4', text: 2진수를 이용하여 기호를 표현할 수 있다. }
    answers: ['2']
    explanation: 물리적 기호 시스템 가설은 물리적 기호 시스템이 일반적으로 지능적 행동을 위한 필요충분한 수단을 가진다는 주장으로, 지능적 작업을 수행하는 프로그램을 만들 수 있다는 믿음의 근거가 된다.
    tags: [artificial-intelligence, physical-symbol-system]

  - id: b01-02
    type: multiple-choice
    prompt: 지식을 어떻게 체계화하고 지식 베이스에 축적하며, 축적된 지식을 어떻게 이용하는지에 대해 연구하는 학문을 일컫는 것은?
    choices:
      - { id: '1', text: 지식공학 }
      - { id: '2', text: 논리학 }
      - { id: '3', text: 데이터베이스 }
      - { id: '4', text: 알고리즘 }
    answers: ['1']
    explanation: 지식공학은 지식을 체계적으로 수집하고 지식 베이스를 구축하며, 축적된 지식을 이용한 추론 과정 등을 연구하는 분야이다.
    tags: [knowledge-engineering]

  - id: b01-03
    type: multiple-choice
    prompt: 인공지능을 구현하기 위한 접근 방법 중 사람이나 고등동물의 두뇌를 구성하는 신경 체계에 착안한 신경망 모델을 활용하여 지능적 시스템을 구현하려는 접근 방법을 의미하는 것은?
    choices:
      - { id: '1', text: 기호처리 시스템 접근 방법 }
      - { id: '2', text: 통계적 접근 방법 }
      - { id: '3', text: 연결주의 접근 방법 }
      - { id: '4', text: 머신러닝 접근 방법 }
    answers: ['3']
    explanation: 연결주의 접근 방법은 다수의 단순한 뉴런을 연결한 신경망 모델을 통해 지식을 표현하고 처리하려는 방식이다.
    tags: [connectionism, neural-network]

  - id: b02-01
    type: multiple-choice
    prompt: 문제표현의 요소 중 문제의 상태를 변화시키기 위한 도구를 표현하는 것은?
    choices:
      - { id: '1', text: 상태묘사 }
      - { id: '2', text: 연산자 }
      - { id: '3', text: 상태공간 }
      - { id: '4', text: 객체 }
    answers: ['2']
    explanation: 연산자는 문제의 어떤 상태에서 다른 상태로 변환하기 위한 도구로, 변환 테이블이나 변환 함수 등으로 구현할 수 있다.
    tags: [state-space, operator]

  - id: b02-02
    type: multiple-choice
    prompt: 상태공간에서 문제의 표현을 위해 정의하는 것은?
    choices:
      - { id: '1', text: '초기상태, 목표상태, 메모리 용량' }
      - { id: '2', text: '연산자, 문제풀이 알고리즘' }
      - { id: '3', text: '연산자, 탐색트리, 상태묘사' }
      - { id: '4', text: '상태묘사 및 초기상태, 목표상태, 연산자' }
    answers: ['4']
    explanation: 상태공간에서 문제를 표현하려면 상태를 어떻게 표현할 것인지 정하고, 초기상태와 목표상태 및 상태 변환 도구인 연산자를 정의해야 한다.
    tags: [state-space, problem-representation]

  - id: b02-03
    type: multiple-choice
    prompt: 상태공간의 일반적 표현형태는?
    choices:
      - { id: '1', text: 배열 }
      - { id: '2', text: 스택 }
      - { id: '3', text: 큐 }
      - { id: '4', text: 그래프 }
    answers: ['4']
    explanation: 상태공간은 초기상태에서 적용 가능한 연산자를 적용하여 얻을 수 있는 상태를 노드로, 연산자 적용 관계를 아크로 연결한 그래프 형식으로 표현된다.
    tags: [state-space, graph]

  - id: b02-04
    type: multiple-choice
    prompt: 상태공간 탐색에 의한 문제풀이에 대한 올바른 설명은?
    choices:
      - { id: '1', text: 문제를 여러 개의 부분문제로 분할하여 각각을 풀이하는 방식이다. }
      - { id: '2', text: 알고리즘에 의해 풀이방법을 정의한다. }
      - {
          id: '3',
          text: 초기상태에서 목표상태에 도달하는 일련의 연산자를 찾기 위해 시행착오 방식으로 그래프를 탐색한다.,
        }
      - { id: '4', text: 최대한 탐색범위를 넓히는 것이 유리하다. }
    answers: ['3']
    explanation: 상태공간 탐색은 초기상태에서 시작하여 목표상태에 도달할 수 있는 일련의 연산자를 찾는 과정이며, 상태공간 그래프에서 경로를 탐색하는 방식으로 수행된다.
    tags: [state-space, search]

  - id: b03-01
    type: multiple-choice
    prompt: 상태공간 탐색에 의한 문제풀이에 대한 올바른 설명은?
    choices:
      - { id: '1', text: 문제를 여러 개의 부분문제로 분할하여 각각을 풀이하는 방식이다. }
      - { id: '2', text: 알고리즘에 의해 풀이방법을 정의한다. }
      - {
          id: '3',
          text: 초기상태에서 목표상태에 도달하는 일련의 연산자를 찾기 위해 시행착오 방식으로 그래프를 탐색한다.,
        }
      - { id: '4', text: 최대한 탐색범위를 넓히는 것이 유리하다. }
    answers: ['3']
    explanation: 상태공간 탐색에 의한 문제풀이는 초기상태에서 목표상태에 도달하는 일련의 연산자를 찾는 과정이며, 유용한 지식을 사용하여 탐색범위를 줄이면서 효율적으로 수행할 수 있다.
    tags: [state-space, search]

  - id: b03-02
    type: multiple-choice
    prompt: 깊이우선 탐색과정에서 다음 확장할 노드를 선택하는 기준을 올바르게 설명한 것은?
    choices:
      - { id: '1', text: 목표노드에 가까운 것을 먼저 확장한다. }
      - { id: '2', text: 가장 최근에 생성된 노드를 먼저 확장한다. }
      - { id: '3', text: 가장 오래전에 생성된 노드를 먼저 확장한다. }
      - { id: '4', text: 깊이제한을 넘어선 노드를 먼저 확장한다. }
    answers: ['2']
    explanation: 깊이우선 탐색은 탐색 진행 방향으로 계속 전진하므로 가장 최근에 생성된 노드를 먼저 확장한다. 무한 진행을 방지하기 위해 깊이제한을 둘 수 있다.
    tags: [depth-first-search]

  - id: b03-03
    type: multiple-choice
    prompt: 균일비용 탐색과정에서 탐색트리가 다음 그림과 같을 때 다음 확장할 노드는 무엇인가? 트리의 가지에 표시된 숫자는 두 노드 사이의 경로비용이다.
    passageRefs: [gb03-uniform-cost-tree-03]
    choices:
      - { id: '1', text: '$c$' }
      - { id: '2', text: '$d$' }
      - { id: '3', text: '$f$' }
      - { id: '4', text: '$k$' }
    answers: ['4']
    explanation: 출발노드 a에서 d, e, f, g, i, j, k까지의 경로비용은 각각 11, 13, 10, 13, 11, 11, 9이다. 균일비용 탐색은 경로비용이 가장 작은 노드를 확장하므로 다음 확장 노드는 k이다.
    tags: [uniform-cost-search]

  - id: b03-04
    type: multiple-choice
    prompt: 언덕오르기 탐색에 대한 올바른 설명은?
    choices:
      - { id: '1', text: 최적 경로를 탐색하기 위한 알고리즘이다. }
      - { id: '2', text: 출발노드로부터 목표노드까지의 전체 경로비용을 고려하여 탐색한다. }
      - { id: '3', text: 너비우선 탐색과 유사한 순서로 탐색한다. }
      - { id: '4', text: 현재상태를 확장하여 생성된 후계노드들 중에서 다음 확장할 노드를 선택한다. }
    answers: ['4']
    explanation: 언덕오르기 탐색은 현재상태의 후계노드 중 평가값이 좋은 노드를 다음 확장 노드로 선택한다.
    tags: [hill-climbing]

  - id: b03-05
    type: multiple-choice
    prompt: 평가함수값이 가장 작은 해를 구하기 위한 모의 담금질에 대한 올바른 설명은?
    choices:
      - { id: '1', text: 현재상태에서 후계상태 중 평가함수값이 가장 작은 상태로 이동한다. }
      - { id: '2', text: 해를 매우 빠르게 탐색할 수 있는 알고리즘이다. }
      - {
          id: '3',
          text: 현재상태보다 평가함수값이 더 큰 상태로 이동할 확률은 시간에 따라 감소한다.,
        }
      - { id: '4', text: 초기상태로부터 목표상태에 이르는 가장 최적의 경로를 따라 이동한다. }
    answers: ['3']
    explanation: 모의 담금질은 나쁜 상태로 이동할 확률을 허용하되 시간이 지날수록 그 확률을 낮춰 지역최적해에 갇히는 것을 줄인다.
    tags: [simulated-annealing]

  - id: b03-06
    type: multiple-choice
    prompt: A* 알고리즘에서 OPEN 리스트에 존재하는 노드 $n$의 평가함수는 어떻게 정의되는가? 단, $g(n)$은 출발노드로부터 $n$까지의 경로비용, $\hat g(n)$은 $g(n)$의 예측비용, $h(n)$은 $n$으로부터 목표노드까지의 경로비용, $\hat h(n)$은 $h(n)$의 예측비용이다.
    choices:
      - { id: '1', text: '$g(n)$' }
      - { id: '2', text: '$\hat h(n)$' }
      - { id: '3', text: '$g(n)+h(n)$' }
      - { id: '4', text: '$g(n)+\hat h(n)$' }
    answers: ['4']
    explanation: A*는 현재까지의 실제 경로비용 $g(n)$과 목표까지의 추정 비용 $\hat h(n)$을 합산하여 평가한다.
    tags: [a-star]

  - id: b03-07
    type: multiple-choice
