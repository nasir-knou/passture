questions:
  - id: e17-01
    type: multiple-choice
    prompt: 지식기반 시스템의 주요 특징에 해당되는 것은?
    choices:
      - { id: '1', text: '지식과 이를 이용한 문제풀이 기능이 분리되어 있다.' }
      - { id: '2', text: '외부의 상황에 관계없이 항상 동일한 출력을 제공한다.' }
      - { id: '3', text: '사용자 인터페이스에서 추론을 담당한다.' }
      - { id: '4', text: '문제풀이에 필요한 지식이 문제풀이 알고리즘에 결합되어 있다.' }
    answers: ['1']
    explanation: |
      선택지 1: 지식베이스와 추론기관을 분리하는 것이 지식기반 시스템의 핵심 특징이므로 정답이다.
      선택지 2: 지식과 입력 사실에 따라 추론 결과가 달라질 수 있다.
      선택지 3: 사용자 인터페이스는 사용자와 시스템의 상호작용을 담당할 뿐 추론기관이 아니다.
      선택지 4: 지식이 알고리즘 내부에 고정되는 방식은 지식기반 시스템의 장점을 약화한다.

      핵심 개념:
      지식기반 시스템은 지식을 명시적으로 저장하고 추론기관이 이를 이용해 결론을 도출한다.
      지식과 제어 절차를 분리하면 지식 수정과 유지보수가 쉬워진다.
    tags: [knowledge-based-system]

  - id: e17-02
    type: multiple-choice
    prompt: 다음 중 지식 사이의 관계를 노드와 아크를 이용한 방향성 그래프로 표현한 지식표현 방법은?
    choices:
      - { id: '1', text: '명제논리' }
      - { id: '2', text: '술어논리' }
      - { id: '3', text: '규칙' }
      - { id: '4', text: '시맨틱 네트' }
    answers: ['4']
    explanation: |
      선택지 1: 명제논리는 명제와 논리연산자로 지식을 표현한다.
      선택지 2: 술어논리는 객체, 술어, 변수, 양화사를 사용한다.
      선택지 3: 규칙은 보통 IF-THEN 형태로 지식을 표현한다.
      선택지 4: 시맨틱 네트는 개념을 노드로, 관계를 아크로 표현하는 방향성 그래프이므로 정답이다.

      핵심 개념:
      시맨틱 네트워크는 개념 간 관계를 그래프 구조로 나타내는 지식표현 방법이다.
      노드와 링크를 이용해 is-a, part-of 같은 관계를 표현한다.
    tags: [knowledge-representation, semantic-net]

  - id: e17-03
    type: multiple-choice
    prompt: 상위 개념의 지식을 하위 개념이 공유하는 중앙집중적 방법의 지식 표현을 위해 사용되는 것은?
    choices:
      - { id: '1', text: '부정논법' }
      - { id: '2', text: '특정상속' }
      - { id: '3', text: '인터프리터' }
      - { id: '4', text: '일반문제풀이기' }
    answers: ['2']
    explanation: |
      선택지 1: 부정논법은 추론 규칙이지 지식 공유 구조가 아니다.
      선택지 2: 특정상속은 상위 개념의 속성을 하위 개념이 물려받는 방식이므로 정답이다.
      선택지 3: 인터프리터는 규칙을 해석하고 실행하는 구성요소이다.
      선택지 4: 일반문제풀이기는 문제 해결 절차를 탐색하는 시스템 개념이다.

      핵심 개념:
      상속은 계층적 지식표현에서 중복을 줄이는 방법이다.
      하위 개념은 상위 개념의 일반 속성을 공유하고 필요한 경우 특수 속성을 추가한다.
    tags: [knowledge-representation, inheritance]

  - id: e17-04
    type: multiple-choice
    prompt: 다음 중 주어진 문제 분야에서 인간 전문가의 문제해결 지식, 전략 등을 시뮬레이션함으로써 문제풀이, 의사결정을 지원하는 지식기반 시스템을 의미하는 것은?
    choices:
      - { id: '1', text: '프레임' }
      - { id: '2', text: '전문가 시스템' }
      - { id: '3', text: '일반문제풀이기' }
      - { id: '4', text: '에이전트' }
    answers: ['2']
    explanation: |
      선택지 1: 프레임은 객체나 상황의 속성을 구조화한 지식표현 방법이다.
      선택지 2: 전문가 시스템은 특정 분야 전문가의 지식과 추론 전략으로 의사결정을 지원하므로 정답이다.
      선택지 3: 일반문제풀이기는 범용 문제 해결을 목표로 한 고전 AI 시스템이다.
      선택지 4: 에이전트는 환경을 지각하고 행동하는 자율 시스템이다.

      핵심 개념:
      전문가 시스템은 지식베이스와 추론기관을 이용해 특정 전문 영역의 판단을 모사한다.
      진단, 상담, 의사결정 지원 같은 좁은 영역 문제에 쓰인다.
    tags: [expert-system]

  - id: e17-05
    type: multiple-choice
    prompt: 다음 중 조건명제 $p \rightarrow q$와 동치인 명제는?
    choices:
      - { id: '1', text: '$p \vee q$' }
      - { id: '2', text: '$\sim p \wedge q$' }
      - { id: '3', text: '$\sim p \vee q$' }
      - { id: '4', text: '$p \vee \sim q$' }
    answers: ['3']
    explanation: |
      선택지 1: $p \vee q$는 $p$가 참이고 $q$가 거짓일 때 참이므로 조건명제와 다르다.
      선택지 2: $\sim p \wedge q$는 조건명제의 전체 진리조건을 표현하지 못한다.
      선택지 3: $p \rightarrow q$는 $\sim p \vee q$와 동치이므로 정답이다.
      선택지 4: $p \vee \sim q$는 조건명제의 부정과 관련된 형태이다.

      핵심 개념:
      조건명제 $p \rightarrow q$는 $p$가 참이고 $q$가 거짓인 경우에만 거짓이다.
      이를 논리합으로 바꾸면 $\sim p \vee q$가 된다.
    tags: [logic, implication]

  - id: e17-06
    type: multiple-choice
    prompt: 다음 중 연언표준형에 해당되는 것은? 단, $p,q,r,s$는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \wedge q) \vee (\sim p \wedge r \wedge s)$' }
      - { id: '2', text: '$\sim(p \vee q) \wedge (r \vee \sim s)$' }
      - { id: '3', text: '$\sim(p \vee \sim q \vee r \wedge s)$' }
      - { id: '4', text: '$(\sim p \vee q \vee r) \wedge (\sim q \vee s)$' }
    answers: ['4']
    explanation: |
      선택지 1: 절들의 곱이 아니라 곱항들의 합 형태가 섞여 있다.
      선택지 2: 앞 절에 부정이 괄호 전체에 적용되어 절 형태가 아니다.
      선택지 3: 전체 부정과 내부 연언 때문에 절들의 연언 형태가 아니다.
      선택지 4: 리터럴들의 논리합으로 된 절들을 논리곱으로 연결했으므로 정답이다.

      핵심 개념:
      연언표준형(CNF)은 절들의 논리곱이다.
      각 절은 리터럴들의 논리합으로 구성된다.
    tags: [logic, cnf]

  - id: e17-07
    type: multiple-choice
    prompt: 다음 중 긍정논법(modus ponens)에 해당되는 추론은?
    choices:
      - { id: '1', text: '$p \rightarrow q$이고 $p$가 참이면 $q$가 참이다.' }
      - { id: '2', text: '$p \rightarrow q$이고 $p$가 거짓이면 $q$가 거짓이다.' }
      - { id: '3', text: '$p \rightarrow q$이고 $q$가 참이면 $p$가 참이다.' }
      - { id: '4', text: '$p \rightarrow q$이고 $q$가 거짓이면 $p$가 참이다.' }
    answers: ['1']
    explanation: |
      선택지 1: 전건 $p$가 참이면 결론 $q$를 도출하는 긍정논법이므로 정답이다.
      선택지 2: 전건 부정은 타당한 추론이 아니다.
      선택지 3: 후건 긍정은 타당한 추론이 아니다.
      선택지 4: 후건 부정이면 $p$는 거짓이어야 하므로 설명도 맞지 않는다.

      핵심 개념:
      긍정논법은 $p \rightarrow q$와 $p$에서 $q$를 도출하는 규칙이다.
      조건문의 전건을 확인해 후건을 결론으로 삼는다.
    tags: [logic, inference]

  - id: e17-08
    type: multiple-choice
    passageRefs: [g17-cnf-clauses-08]
    prompt: 부모절이 다음과 같을 때 도출의 결과는 무엇인가?
    choices:
      - { id: '1', text: '$q$' }
      - { id: '2', text: '$\sim p \vee r \vee s$' }
      - { id: '3', text: '$\sim p \vee \sim q \vee r$' }
      - { id: '4', text: '$\sim p \vee q \vee \sim q \vee r \vee s$' }
    answers: ['2']
    explanation: |
      선택지 1: 상보 리터럴을 제거한 뒤 남는 절은 단일 $q$가 아니다.
      선택지 2: $q$와 $\sim q$를 소거하면 $\sim p \vee r \vee s$가 남으므로 정답이다.
      선택지 3: $\sim q$는 소거 대상이므로 결과 절에 남지 않는다.
      선택지 4: 상보 리터럴을 그대로 모두 나열한 것은 도출 결과가 아니다.

      핵심 개념:
      도출(resolution)은 두 절에서 상보 리터럴 한 쌍을 제거하고 나머지를 합친다.
      $\sim p \vee q \vee r$와 $\sim q \vee s$에서는 $q$와 $\sim q$가 소거된다.
    tags: [logic, resolution]

  - id: e17-09
    type: multiple-choice
    prompt: 다음 중 술어논리의 정형식에 해당되는 것은? 단, $P,Q$는 술어기호, $x,y,z$는 객체변수, $A,B$는 객체상수, $f,g$는 함수기호이다.
    choices:
      - { id: '1', text: '$\forall x\{\sim P(x) \vee Q(x)\}$' }
      - { id: '2', text: '$P(A,B) \vee B$' }
      - { id: '3', text: '$\exists f\{f(x,y) \rightarrow g(x,y)\}$' }
      - { id: '4', text: '$\forall x \forall y \forall z f(g(x,y),z)$' }
    answers: ['1']
    explanation: |
      선택지 1: 술어식에 양화사와 논리연산자가 올바르게 적용된 정형식이므로 정답이다.
      선택지 2: 객체상수 $B$만으로는 논리식이 될 수 없다.
      선택지 3: 함수기호 $f$를 객체변수처럼 양화하는 형태는 일반 술어논리 정형식이 아니다.
      선택지 4: 함수항은 술어가 아니므로 그 자체로 진리값을 갖는 식이 아니다.

      핵심 개념:
      술어논리 정형식은 원자식, 논리연산자, 양화사를 문법에 맞게 결합해야 한다.
      함수기호는 항을 만들지만 단독으로 명제가 되지는 않는다.
    tags: [predicate-logic]

  - id: e17-10
    type: multiple-choice
    passageRefs: [g17-predicate-equivalence-10]
    prompt: 다음 술어논리식과 동치인 것은?
    choices:
      - { id: '1', text: '$\forall x\{P(x) \wedge \sim Q(x)\}$' }
      - { id: '2', text: '$\forall x\{P(x) \vee Q(x)\}$' }
      - { id: '3', text: '$\exists x\{P(x) \wedge \sim Q(x)\}$' }
      - { id: '4', text: '$\exists x\{P(x) \vee Q(x)\}$' }
    answers: ['3']
    explanation: |
      선택지 1: 부정된 전칭명제는 존재명제가 되어야 한다.
      선택지 2: 조건명제의 부정이 아니라 단순 논리합이다.
      선택지 3: $\sim \forall x(P(x)\rightarrow Q(x))$는 $\exists x(P(x)\wedge \sim Q(x))$와 동치이므로 정답이다.
      선택지 4: 조건명제의 부정은 $P$와 $\sim Q$의 연언이어야 한다.

      핵심 개념:
      전칭의 부정은 존재이고, 조건명제 $P\rightarrow Q$의 부정은 $P\wedge \sim Q$이다.
      두 변환을 함께 적용해 동치식을 얻는다.
    tags: [predicate-logic, equivalence]

  - id: e17-11
    type: multiple-choice
    prompt: 증명하려는 논리식 $p$를 부정하여 공리 리스트에 넣은 후 도출연역을 수행하는 과정에서 false를 얻었다. 어떤 상황인가?
    choices:
      - { id: '1', text: '아직 증명이 끝난 상태가 아니므로 도출연역을 계속한다.' }
      - { id: '2', text: '더 이상 추론을 진행할 수 없어 증명에 실패하였다.' }
      - { id: '3', text: '$p$가 참임이 증명됐다.' }
      - { id: '4', text: '$p$가 거짓임이 증명됐다.' }
    answers: ['3']
    explanation: |
      선택지 1: false는 모순 도출을 의미하므로 계속할 필요가 없다.
      선택지 2: 모순을 얻은 것은 실패가 아니라 반박 증명의 성공이다.
      선택지 3: $\sim p$를 추가해 모순이 생겼으므로 원래 명제 $p$가 참임이 증명되어 정답이다.
      선택지 4: $\sim p$가 모순을 만든 것이므로 $p$가 거짓이라는 뜻이 아니다.

      핵심 개념:
      반박 증명은 증명할 명제의 부정을 가정하고 모순을 도출한다.
      모순이 도출되면 원래 명제가 참이라고 결론낸다.
    tags: [logic, proof]

  - id: e17-12
    type: multiple-choice
    passageRefs: [g17-resolution-clauses-12]
    prompt: 다음 절들로부터 도출될 수 있는 결론에 해당되는 것은? 단, $P$와 $Q$는 술어기호, $x,y,z$는 객체변수, $A$와 $B$는 객체상수이다.
    choices:
      - { id: '1', text: '$Q(x)$' }
      - { id: '2', text: '$Q(A)$' }
      - { id: '3', text: '$\sim P(B) \vee Q(B)$' }
      - { id: '4', text: '$\sim Q(A)$' }
    answers: ['2']
    explanation: |
      선택지 1: 구체적 사실 $P(A)$와 결합하면 변수식이 아니라 $A$에 대한 결론이 나온다.
      선택지 2: $\sim P(x)\vee Q(x)$와 $P(A)$에서 $Q(A)$를 도출할 수 있으므로 정답이다.
      선택지 3: $B$에 대입한 절은 원래 일반 절의 사례일 뿐 주어진 사실과 도출한 새 결론이 아니다.
      선택지 4: $Q(A)$가 도출되므로 그 부정은 결론이 아니다.

      핵심 개념:
      도출연역에서는 변수 대입으로 상보 리터럴을 맞춘 뒤 소거한다.
      $\sim P(A)\vee Q(A)$와 $P(A)$에서 $Q(A)$가 남는다.
    tags: [predicate-logic, resolution]

  - id: e17-13
    type: multiple-choice
    prompt: 생성 시스템의 구성 요소에 대한 올바른 설명은?
    choices:
      - { id: '1', text: '작업 메모리는 장기 메모리라고도 한다.' }
      - { id: '2', text: '생성 메모리에는 추론에 따른 결론을 저장한다.' }
      - { id: '3', text: '생성 메모리는 현재의 상태를 나타낸다.' }
      - { id: '4', text: '인터프리터는 정합, 충돌해결, 실행 과정을 반복한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 작업 메모리는 현재 사실을 담는 단기적 상태 저장소이다.
      선택지 2: 생성 메모리는 규칙 집합을 저장하며 결론 저장소가 아니다.
      선택지 3: 현재 상태는 작업 메모리에 나타난다.
      선택지 4: 인터프리터가 규칙 정합, 충돌해결, 실행을 반복하므로 정답이다.

      핵심 개념:
      생성 시스템은 규칙 집합, 작업 메모리, 인터프리터로 구성된다.
      인터프리터는 적용 가능한 규칙을 찾고 선택한 규칙을 실행해 상태를 바꾼다.
    tags: [production-system]

  - id: e17-14
    type: multiple-choice
    prompt: 다음 추론방법 중 추론 결과가 항상 참인 것은?
    choices:
      - { id: '1', text: '연역법' }
      - { id: '2', text: '유도법' }
      - { id: '3', text: '귀납법' }
      - { id: '4', text: '유사추론' }
    answers: ['1']
    explanation: |
      선택지 1: 전제가 참이고 추론 규칙이 타당하면 결론이 반드시 참인 연역 추론이므로 정답이다.
      선택지 2: 유도적 추론은 가능한 결론을 제안할 수 있으나 보장되지는 않는다.
      선택지 3: 귀납법은 사례에서 일반화를 하므로 확률적 성격이 있다.
      선택지 4: 유사추론은 유사성에 근거하므로 항상 참을 보장하지 않는다.

      핵심 개념:
      연역 추론은 타당성이 보장되는 형식 논리 추론이다.
      귀납, 유추, 가설적 추론은 결론의 개연성은 줄 수 있지만 필연성은 보장하지 않는다.
    tags: [inference]

  - id: e17-15
    type: multiple-choice
    passageRefs: [g17-production-rules-15]
    prompt: 생성시스템에서 규칙과 현재의 사실이 아래와 같다. 전방향 추론을 할 때 현재 상태에서 실행 가능한 규칙은?
    choices:
      - { id: '1', text: '(ㄱ), (ㄴ)' }
      - { id: '2', text: '(ㄴ), (ㄷ)' }
      - { id: '3', text: '(ㄷ), (ㄹ)' }
      - { id: '4', text: '(ㄱ), (ㄹ)' }
    answers: ['2']
    explanation: |
      선택지 1: (ㄱ)은 $F$와 $B$가 모두 필요하지만 현재 사실에 없다.
      선택지 2: (ㄴ)은 $C,D$가 있고 (ㄷ)은 $A$가 있으므로 둘 다 실행 가능해 정답이다.
      선택지 3: (ㄹ)은 $E$가 없으므로 실행할 수 없다.
      선택지 4: (ㄱ)과 (ㄹ) 모두 현재 조건이 만족되지 않는다.

      핵심 개념:
      전방향 추론은 현재 작업 메모리의 사실과 조건부가 일치하는 규칙을 실행한다.
      규칙의 모든 조건이 현재 사실에 포함되어야 실행 가능하다.
    tags: [production-system, forward-chaining]

  - id: e17-16
    type: multiple-choice
    prompt: 다음 중 퍼지집합에 대한 적절한 설명은?
    choices:
      - { id: '1', text: '퍼지집합의 연산은 결합법칙이 성립하지 않는다.' }
      - { id: '2', text: '원소의 소속이 포함과 불포함의 두 경우만 존재한다.' }
      - { id: '3', text: '원소의 소속함수 값은 음이 될 수 있다.' }
      - { id: '4', text: '각 원소의 소속함수 값은 0부터 1의 범위에 속한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 표준 퍼지집합 연산도 결합법칙 등 여러 대수적 성질을 만족한다.
      선택지 2: 두 경우만 존재하는 것은 고전 집합의 특징이다.
      선택지 3: 소속함수 값은 음수가 될 수 없다.
      선택지 4: 퍼지집합의 소속함수 값은 $[0,1]$ 범위이므로 정답이다.

      핵심 개념:
      퍼지집합은 원소가 집합에 속하는 정도를 0과 1 사이 값으로 표현한다.
      0은 완전 비소속, 1은 완전 소속을 뜻한다.
    tags: [fuzzy-set]

  - id: e17-17
    type: multiple-choice
    passageRefs: [g17-fuzzy-sets-17]
    prompt: 다음 퍼지집합 A와 B의 교집합은?
    choices:
      - { id: '1', text: '$A \cap B=\{(a,0.3),(b,0.5),(c,0.2)\}$' }
      - { id: '2', text: '$A \cap B=\{(a,0.5),(b,0.9),(c,1.0)\}$' }
      - { id: '3', text: '$A \cap B=\{(a,0.3),(b,0.5),(c,0.2),(d,0.7)\}$' }
      - { id: '4', text: '$A \cap B=\{(a,0.5),(b,0.9),(c,1.0),(d,0.7)\}$' }
    answers: ['1']
    explanation: |
      선택지 1: 공통 원소별 최소 소속값을 취한 결과이므로 정답이다.
      선택지 2: 원소별 최대값을 택한 합집합 방식이다.
      선택지 3: $d$는 A에 없으므로 교집합에 포함되지 않는다.
      선택지 4: 최대값을 택하고 $d$까지 포함해 교집합이 아니다.

      핵심 개념:
      표준 퍼지 교집합은 각 원소의 소속도 중 최소값을 취한다.
      한 집합에 없는 원소의 소속도는 0으로 보아 교집합에서는 제외된다.
    tags: [fuzzy-set]

  - id: e17-18
    type: multiple-choice
    prompt: 퍼지 규칙 및 퍼지 추론에 대한 올바른 설명은?
    choices:
      - { id: '1', text: '귀납법에 따라 추론한다.' }
      - { id: '2', text: '규칙의 결론부의 소속함수 값은 1이다.' }
      - { id: '3', text: '조건부의 값을 비퍼지화하여 추론한다.' }
      - {
          id: '4',
          text: '관측된 사실이 규칙의 조건부와 완전히 일치하지 않더라도 부분적 정합을 통해 근사한 결론을 내린다.',
        }
    answers: ['4']
    explanation: |
