subjectId: artificial-intelligence
sourceId: past-exams-2017
title: 인공지능 2017 기말
kind: exam
year: 2017

questions:
  - id: e17-01
    type: multiple-choice
    prompt: 지식기반 시스템의 주요 특징에 해당되는 것은?
    choices:
      - { id: '1', text: '지식과 이를 이용한 문제풀이 기능이 분리되어 있다.' }
      - { id: '2', text: '외부의 상황에 관계없이 항상 동일한 출력을 제공한다.' }
      - { id: '3', text: '사용자 인터페이스에서 추론을 담당한다.' }
      - { id: '4', text: '문제풀이에 필요한 지식이 문제풀이 알고리즘에 결합되어 있다.' }
    answers: ['1']
    explanation: 지식기반 시스템은 지식베이스와 추론/문제풀이 기능을 분리하여 지식을 별도로 표현하고 활용한다.
    tags: [knowledge-based-system]

  - id: e17-02
    type: multiple-choice
    prompt: 다음 중 지식 사이의 관계를 노드와 아크를 이용한 방향성 그래프로 표현한 지식표현 방법은?
    choices:
      - { id: '1', text: '명제논리' }
      - { id: '2', text: '술어논리' }
      - { id: '3', text: '규칙' }
      - { id: '4', text: '시맨틱 네트' }
    answers: ['4']
    explanation: 시맨틱 네트는 개념을 노드로, 개념 사이의 관계를 방향성 아크로 나타내는 지식표현 방식이다.
    tags: [knowledge-representation, semantic-network]

  - id: e17-03
    type: multiple-choice
    prompt: 상위 개념의 지식을 하위 개념이 공유하는 중앙집중적 방법의 지식 표현을 위해 사용되는 것은?
    choices:
      - { id: '1', text: '부정논법' }
      - { id: '2', text: '특성상속' }
      - { id: '3', text: '인터프리터' }
      - { id: '4', text: '일반문제풀이기' }
    answers: ['2']
    explanation: 특성상속은 상위 개념의 속성이나 지식을 하위 개념이 물려받아 공유하는 방식이다.
    tags: [knowledge-representation, inheritance]

  - id: e17-04
    type: multiple-choice
    prompt: 다음 중 주어진 문제 분야에서 인간 전문가의 문제해결 지식, 전략 등을 시뮬레이션함으로써 문제풀이, 의사결정을 지원하는 지식기반 시스템을 의미하는 것은?
    choices:
      - { id: '1', text: '프레임' }
      - { id: '2', text: '전문가 시스템' }
      - { id: '3', text: '일반문제풀이기' }
      - { id: '4', text: '에이전트' }
    answers: ['2']
    explanation: 전문가 시스템은 특정 분야 전문가의 지식과 추론 전략을 이용해 문제 해결과 의사결정을 지원한다.
    tags: [expert-system]

  - id: e17-05
    type: multiple-choice
    prompt: 다음 중 조건명제 p -> q와 동치인 명제는?
    choices:
      - { id: '1', text: 'p ∨ q' }
      - { id: '2', text: '~p ∧ q' }
      - { id: '3', text: '~p ∨ q' }
      - { id: '4', text: 'p ∨ ~q' }
    answers: ['3']
    explanation: 조건명제 p -> q는 부정과 논리합으로 표현하면 ~p ∨ q와 동치이다.
    tags: [logic, proposition]

  - id: e17-06
    type: multiple-choice
    prompt: 다음 중 연언표준형에 해당되는 것은? 단, p, q, r, s는 기본명제이다.
    choices:
      - { id: '1', text: '(p ∧ q) ∨ (~p ∧ r ∧ s)' }
      - { id: '2', text: '~(p ∨ q) ∧ (r ∨ ~s)' }
      - { id: '3', text: '~(p ∨ ~q ∨ r ∧ s)' }
      - { id: '4', text: '(~p ∨ q ∨ r) ∧ (~q ∨ s)' }
    answers: ['4']
    explanation: 연언표준형은 리터럴들의 논리합 절을 논리곱으로 결합한 형태이며 4번이 이에 해당한다.
    tags: [logic, cnf]

  - id: e17-07
    type: multiple-choice
    prompt: 다음 중 긍정논법(modus ponens)에 해당되는 추론은?
    choices:
      - { id: '1', text: 'p -> q이고 p가 참이면 q가 참이다.' }
      - { id: '2', text: 'p -> q이고 p가 거짓이면 q가 거짓이다.' }
      - { id: '3', text: 'p -> q이고 q가 참이면 p가 참이다.' }
      - { id: '4', text: 'p -> q이고 q가 거짓이면 p가 참이다.' }
    answers: ['1']
    explanation: 긍정논법은 p -> q와 p로부터 q를 도출하는 추론 규칙이다.
    tags: [logic, inference]

  - id: e17-08
    type: multiple-choice
    prompt: |
      부모절이 다음과 같을 때 도출의 결과는 무엇인가?

      ~p ∨ q ∨ r,    ~q ∨ s
    choices:
      - { id: '1', text: 'q' }
      - { id: '2', text: '~p ∨ r ∨ s' }
      - { id: '3', text: '~p ∨ ~q ∨ r' }
      - { id: '4', text: '~p ∨ q ∨ ~q ∨ r ∨ s' }
    answers: ['2']
    explanation: q와 ~q를 상보 리터럴로 제거하면 나머지 리터럴인 ~p, r, s가 남아 ~p ∨ r ∨ s가 도출된다.
    tags: [logic, resolution]

  - id: e17-09
    type: multiple-choice
    prompt: 다음 중 술어논리의 정형식에 해당되는 것은? 단, P와 Q는 술어기호, x, y, z는 객체변수, A와 B는 객체상수, f와 g는 함수기호이다.
    choices:
      - { id: '1', text: '∀x{~P(x) ∨ Q(x)}' }
      - { id: '2', text: 'P(A,B) ∨ B' }
      - { id: '3', text: '∃f{f(x,y) -> g(x,y)}' }
      - { id: '4', text: '∀x ∀y ∀z f(g(x,y),z)' }
    answers: ['1']
    explanation: 1번은 변수에 양화사가 적용된 술어식으로 올바른 정형식이다. 나머지는 객체상수나 함수기호 사용이 식의 형태에 맞지 않는다.
    tags: [predicate-logic]

  - id: e17-10
    type: multiple-choice
    prompt: |
      다음 술어논리식과 동치인 것은?

      ~[∀x{P(x) -> Q(x)}]
    choices:
      - { id: '1', text: '∀x{P(x) ∧ ~Q(x)}' }
      - { id: '2', text: '∀x{P(x) ∨ Q(x)}' }
      - { id: '3', text: '∃x{P(x) ∧ ~Q(x)}' }
      - { id: '4', text: '∃x{P(x) ∨ Q(x)}' }
    answers: ['3']
    explanation: P(x) -> Q(x)는 ~P(x) ∨ Q(x)이므로 그 전체 부정은 ∃x{P(x) ∧ ~Q(x)}가 된다.
    tags: [predicate-logic]

  - id: e17-11
    type: multiple-choice
    prompt: 증명하려는 논리식 p를 부정하여 공리 리스트에 넣은 후 도출연역을 수행하는 과정에서 false를 얻었다. 어떤 상황인가?
    choices:
      - { id: '1', text: '아직 증명이 끝난 상태가 아니므로 도출연역을 계속한다.' }
      - { id: '2', text: '더 이상 추론을 진행할 수 없어 증명에 실패하였다.' }
      - { id: '3', text: 'p가 참임이 증명됐다.' }
      - { id: '4', text: 'p가 거짓임이 증명됐다.' }
    answers: ['3']
    explanation: 귀류법/도출연역에서 ~p를 추가한 뒤 모순(false)이 도출되면 원래 명제 p가 참임을 의미한다.
    tags: [logic, proof]

  - id: e17-12
    type: multiple-choice
    prompt: |
      다음 절들로부터 도출될 수 있는 결론에 해당되는 것은? 단, P와 Q는 술어기호, x, y, z는 객체변수, A와 B는 객체상수이다.

      ~P(x) ∨ Q(x),    P(A),    ~P(B)
    choices:
      - { id: '1', text: 'Q(x)' }
      - { id: '2', text: 'Q(A)' }
      - { id: '3', text: '~P(B) ∨ Q(B)' }
      - { id: '4', text: '~Q(A)' }
    answers: ['2']
    explanation: x에 A를 대입하면 ~P(A) ∨ Q(A)가 되고, P(A)와 도출하면 Q(A)가 남는다.
    tags: [predicate-logic, resolution]

  - id: e17-13
    type: multiple-choice
    prompt: 생성 시스템의 구성 요소에 대한 올바른 설명은?
    choices:
      - { id: '1', text: '작업 메모리는 장기 메모리라고도 한다.' }
      - { id: '2', text: '생성 메모리에는 추론에 따른 결론을 저장한다.' }
      - { id: '3', text: '생성 메모리는 현재의 상태를 나타낸다.' }
      - { id: '4', text: '인터프리터는 정합, 충돌해결, 실행 과정을 반복한다.' }
    answers: ['4']
    explanation: 생성 시스템의 인터프리터는 규칙 정합, 충돌해결, 선택된 규칙 실행을 반복한다.
    tags: [production-system]

  - id: e17-14
    type: multiple-choice
    prompt: 다음 추론방법 중 추론 결과가 항상 참인 것은?
    choices:
      - { id: '1', text: '연역법' }
      - { id: '2', text: '유도법' }
      - { id: '3', text: '귀납법' }
      - { id: '4', text: '유사추론' }
    answers: ['1']
    explanation: 전제가 참이고 추론 규칙이 타당하면 연역 추론의 결론은 항상 참이다.
    tags: [inference]

  - id: e17-15
    type: multiple-choice
    prompt: |
      생성시스템에서 규칙과 현재의 사실이 아래와 같다. 전방향 추론을 할 때 현재 상태에서 실행 가능한 규칙은?

      규칙:
      (ㄱ) F ∧ B -> Z
      (ㄴ) C ∧ D -> F
      (ㄷ) A -> D
      (ㄹ) E -> C

      사실: A, C, D
    choices:
      - { id: '1', text: '(ㄱ), (ㄴ)' }
      - { id: '2', text: '(ㄴ), (ㄷ)' }
      - { id: '3', text: '(ㄷ), (ㄹ)' }
      - { id: '4', text: '(ㄱ), (ㄹ)' }
    answers: ['2']
    explanation: 현재 사실 A, C, D로 조건부가 만족되는 규칙은 C ∧ D -> F와 A -> D이다.
    tags: [production-system, forward-chaining]

  - id: e17-16
    type: multiple-choice
    prompt: 다음 중 퍼지집합에 대한 적절한 설명은?
    choices:
      - { id: '1', text: '퍼지집합의 연산은 결합법칙이 성립하지 않는다.' }
      - { id: '2', text: '원소의 소속이 포함과 불포함의 두 경우만 존재한다.' }
      - { id: '3', text: '원소의 소속함수 값은 음이 될 수 있다.' }
      - { id: '4', text: '각 원소의 소속함수 값은 0부터 1의 범위에 속한다.' }
    answers: ['4']
    explanation: 퍼지집합에서 원소의 소속 정도는 소속함수로 표현하며 값은 보통 0 이상 1 이하이다.
    tags: [fuzzy-set]

  - id: e17-17
    type: multiple-choice
    prompt: |
      다음 퍼지집합 A와 B의 교집합은?

      A = {(a, 0.3), (b, 0.5), (c, 1.0)}
      B = {(a, 0.5), (b, 0.9), (c, 0.2), (d, 0.7)}
    choices:
      - { id: '1', text: 'A ∩ B = {(a, 0.3), (b, 0.5), (c, 0.2)}' }
      - { id: '2', text: 'A ∩ B = {(a, 0.5), (b, 0.9), (c, 1.0)}' }
      - { id: '3', text: 'A ∩ B = {(a, 0.3), (b, 0.5), (c, 0.2), (d, 0.7)}' }
      - { id: '4', text: 'A ∩ B = {(a, 0.5), (b, 0.9), (c, 1.0), (d, 0.7)}' }
    answers: ['1']
    explanation: 퍼지집합의 교집합은 공통 원소별 소속함수의 최솟값을 취한다.
    tags: [fuzzy-set]

  - id: e17-18
    type: multiple-choice
    prompt: 퍼지 규칙 및 퍼지 추론에 대한 올바른 설명은?
    choices:
      - { id: '1', text: '귀납법에 따라 추론한다.' }
      - { id: '2', text: '규칙의 결론부의 소속함수 값은 1이다.' }
      - { id: '3', text: '조건부의 값을 비퍼지화하여 추론한다.' }
      - { id: '4', text: '관측된 사실이 규칙의 조건부와 완전히 일치하지 않더라도 부분적 정합을 통해 근사한 결론을 내린다.' }
    answers: ['4']
    explanation: 퍼지 추론은 조건과 사실이 완전히 일치하지 않아도 소속 정도에 따른 부분 정합으로 근사 결론을 얻는다.
    tags: [fuzzy-inference]

  - id: e17-19
    type: multiple-choice
    prompt: |
      다음 중 8-이웃 연결성을 적용하였을 때, p1~p4 중 p로부터 연결되는 경로가 존재하는 픽셀을 모두 나열한 것은?

      원본 그림 기준으로 p는 중앙의 어두운 픽셀에 있고, p1은 좌상단 연결 성분, p2는 좌하단 연결 성분, p3은 우하단 연결 성분, p4는 우상단 연결 성분에 표시되어 있다.
    images:
      - path: images/subjects/artificial-intelligence/past-exams/2017/questions/q19.png
        alt: 2017년 인공지능 기출 19번 8-이웃 연결성 격자
    choices:
      - { id: '1', text: '모두' }
      - { id: '2', text: 'p1, p3' }
      - { id: '3', text: 'p2, p4' }
      - { id: '4', text: 'p1, p2, p3' }
    answers: ['1']
    explanation: 8-이웃 연결성에서는 상하좌우뿐 아니라 대각선 접촉도 연결로 보므로 p에서 p1~p4 모두로 연결 경로가 존재한다.
    tags: [computer-vision, connectivity]

  - id: e17-20
    type: multiple-choice
    prompt: 다음 중 영상의 평활화에 사용될 수 있는 필터 마스크는?
    choices:
      - id: '1'
        text: |
          [-1  0  1
           -2  0  2
           -1  0  1]
      - id: '2'
        text: |
          1/16 [1 2 1
                2 4 2
                1 2 1]
      - id: '3'
        text: |
          [ 1 -2  1
           -2  0 -2
            1 -2  1]
      - id: '4'
        text: |
          [-1 -2 -1
            0  0  0
            1  2  1]
    answers: ['2']
    explanation: 2번은 양의 가중치 평균을 내는 가우시안 형태의 평활화 마스크이다.
    tags: [computer-vision, filtering]

  - id: e17-21
    type: multiple-choice
    prompt: 다음 중 소벨(Sobel) 연산자에 대한 올바른 설명은?
    choices:
      - { id: '1', text: '영상을 평활화하기 위해 사용한다.' }
      - { id: '2', text: '영상의 점잡음을 제거하는데 효과적이다.' }
      - { id: '3', text: '에지의 강도와 방향을 구할 수 있다.' }
      - { id: '4', text: '연산자 적용 결과 0 교차점이 에지에 해당된다.' }
    answers: ['3']
    explanation: 소벨 연산자는 영상의 기울기를 계산하여 에지의 강도와 방향을 구하는 데 사용된다.
    tags: [computer-vision, edge-detection]

  - id: e17-22
    type: multiple-choice
    prompt: 컴퓨터 시각 시스템의 처리 단계 중 유사한 성격을 갖는 영상의 부분은 하나의 영역으로 묶고, 상이한 특성을 갖는 부분은 서로 다른 영역으로 구분하는 단계는?
    choices:
      - { id: '1', text: '표본화' }
      - { id: '2', text: '양자화' }
      - { id: '3', text: '영상분할' }
      - { id: '4', text: '평활화' }
    answers: ['3']
    explanation: 영상분할은 유사한 특성을 가진 화소나 영역을 묶고 다른 특성의 영역과 구분하는 처리 단계이다.
    tags: [computer-vision, segmentation]

  - id: e17-23
    type: multiple-choice
    prompt: 그레이 레벨 히스토그램을 이용하여 영상을 2진화하기 위한 임계치를 구하려고 한다. 히스토그램이 2정점 형태일 때, 적절한 임계치는?
    choices:
      - { id: '1', text: '두 정점 중 작은 정점의 위치에 해당되는 밝기 값' }
      - { id: '2', text: '두 정점 중 큰 정점의 위치에 해당되는 밝기 값' }
      - { id: '3', text: '더 밝은 값에 해당되는 정점의 위치에 해당되는 밝기 값' }
      - { id: '4', text: '두 정점 사이에 존재하는 최소값 부근의 밝기 값' }
    answers: ['4']
