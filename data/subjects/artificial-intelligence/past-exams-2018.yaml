questions:
  - id: e18-01
    type: multiple-choice
    passageRefs: [g18-minimax-tree-01]
    prompt: 다음 최대최소 탐색트리에서 A의 가치와 다음으로 선택할 수는 무엇인가? 단, 하단의 숫자는 해당 노드에서 평가함수를 적용할 경우 계산될 가치이고, 후계노드는 좌측에서 우측의 순서로 처리한다. 깊이는 2까지로 제한한다.
    choices:
      - { id: '1', text: '4, B' }
      - { id: '2', text: '5, C' }
      - { id: '3', text: '9, D' }
      - { id: '4', text: '1, E' }
    answers: ['1']
    explanation: |
      B, C, D, E가 MIN 노드이면 각각의 값은 min(5,6,4,6)=4, min(2,7,5)=2, min(9,3)=3, min(5,1,2)=1이다.
      A는 MAX 노드이므로 가장 큰 4를 선택하고, 다음 수는 B이다.
    tags: [game-tree, minimax]

  - id: e18-02
    type: multiple-choice
    passageRefs: [g18-minimax-tree-01]
    prompt: $\alpha$-$\beta$ 가지치기를 적용하는 과정 중 C에서 $\alpha=4$이고 $\beta=\infty$이다. 노드 J의 가치인 2를 구한 후의 처리에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '노드 K의 가치를 계산하기 위한 처리를 한다.' }
      - { id: '2', text: '노드 J의 가치가 잘못 평가된 것이며, 노드 J를 재평가한다.' }
      - { id: '3', text: '$2 < \alpha$이므로 K, L은 가치를 구할 필요 없이 가지치기한다.' }
      - { id: '4', text: '$2 < \alpha$이므로 노드 D, E는 가지치기한다.' }
    answers: ['3']
    explanation: |
      C는 MIN 노드이므로 첫 자식 J의 값 2를 본 뒤 $\beta=2$가 된다.
      이미 $\beta \le \alpha$가 되어 C의 나머지 자식 K, L은 A의 선택을 바꿀 수 없으므로 가지치기한다.
    tags: [game-tree, alpha-beta-pruning]

  - id: e18-03
    type: multiple-choice
    prompt: 다음 중 몬테카를로 트리 탐색에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '너비우선 탐색의 일종이다.' }
      - { id: '2', text: '시뮬레이션을 위해 UCT 알고리즘을 사용한다.' }
      - { id: '3', text: '시뮬레이션 단계에서는 확장된 노드의 가치를 미리 정한 평가함수를 이용하여 계산한다.' }
      - { id: '4', text: '역전파 단계에서는 시뮬레이션 결과를 확장된 노드로부터 선택 경로를 따라 역전파하여 통계를 업데이트한다.' }
    answers: ['4']
    explanation: |
      MCTS는 선택, 확장, 시뮬레이션, 역전파를 반복한다.
      역전파 단계에서는 시뮬레이션 결과를 선택 경로의 노드들에 반영해 방문 수와 보상 통계를 갱신한다.
    tags: [monte-carlo-tree-search]

  - id: e18-04
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 선택 단계에서 사용하는 전략에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '탐사와 활용 사이의 균형을 이룰 수 있도록 설계한다.' }
      - { id: '2', text: '자식 노드 중에서 무작위로 선택을 한다.' }
      - { id: '3', text: '가치가 가장 작은 노드를 우선 선택한다.' }
      - { id: '4', text: '최대최소 탐색을 수행한다.' }
    answers: ['1']
    explanation: |
      MCTS의 선택 전략은 현재까지 좋은 결과를 보인 선택을 활용하면서도 충분히 탐색되지 않은 선택을 시험해야 한다.
      UCT 같은 정책은 탐사 항과 활용 항을 함께 고려한다.
    tags: [monte-carlo-tree-search, exploration-exploitation]

  - id: e18-05
    type: multiple-choice
    prompt: 다음 중 전문가 시스템에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '문제분야의 전문지식을 메타지식이라고 한다.' }
      - { id: '2', text: '일반문제풀이기(GPS)에 해당된다.' }
      - { id: '3', text: '문제분야의 지식과 추론을 위한 추론기관이 분리되어 있다.' }
      - { id: '4', text: '문제를 해결하기 위한 지식은 지식공학자가 제공한다.' }
    answers: ['3']
    explanation: |
      전문가 시스템은 문제 영역 지식을 담은 지식베이스와 이를 이용해 결론을 도출하는 추론기관을 분리한다.
      지식은 보통 전문가에게서 획득하고 지식공학자가 구조화한다.
    tags: [expert-system, knowledge-based-system]

  - id: e18-06
    type: multiple-choice
    prompt: 다음 중 선언적 지식에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '추론기관이 필요 없는 지식표현 방법이다.' }
      - { id: '2', text: '상호 독립적·단편적 지식을 나열해 놓은 지식표현이다.' }
      - { id: '3', text: '프로그램 자체에 지식이 내재되어 있다.' }
      - { id: '4', text: '지식 획득, 편집 등이 절차적 지식에 비해 어렵다.' }
    answers: ['2']
    explanation: |
      선언적 지식은 사실, 규칙, 관계처럼 무엇이 참인지를 표현한다.
      절차 자체에 지식이 녹아 있는 절차적 지식과 달리 독립적인 지식 단위로 표현하기 쉽다.
    tags: [knowledge-representation, declarative-knowledge]

  - id: e18-07
    type: multiple-choice
    prompt: 다음 중 지식표현 방법에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '시맨틱 네트는 절차적 지식 형태의 지식표현 방법이다.' }
      - { id: '2', text: '규칙은 네트워크 기반 지식표현 방법이다.' }
      - { id: '3', text: '논리는 절차적 지식을 함께 표현할 수 있다.' }
      - { id: '4', text: '프레임은 특성상속을 통해 상위개념의 지식을 하위개념이 공유하는 중앙 집중 방식의 지식 표현을 할 수 있다.' }
    answers: ['4']
    explanation: |
      프레임은 슬롯으로 개념을 표현하고 계층 관계를 통해 상위 개념의 속성을 하위 개념이 상속할 수 있다.
      이는 중복 지식 저장을 줄이는 지식표현 방식이다.
    tags: [knowledge-representation, frame]

  - id: e18-08
    type: multiple-choice
    prompt: 다음 중 연언표준형에 해당되는 논리식은? 단, $p$, $q$, $r$, $s$는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \land q) \lor (\sim r \land s)$' }
      - { id: '2', text: '$(\sim p \lor q) \land (r \lor s \lor p)$' }
      - { id: '3', text: '$\sim(p \lor q) \land (\sim r \lor s)$' }
      - { id: '4', text: '$\sim(p \land q) \lor \sim(\sim r \land s)$' }
    answers: ['2']
    explanation: |
      연언표준형은 리터럴들의 논리합으로 된 절들이 논리곱으로 연결된 형태이다.
      선택지 2는 두 개의 절 $(\sim p \lor q)$, $(r \lor s \lor p)$가 AND로 연결되어 있다.
    tags: [propositional-logic, cnf]

  - id: e18-09
    type: multiple-choice
    prompt: 다음 중 조건명제 $p \to q$가 참일 때 명제 $p$ 또는 $q$의 진위값에 따른 연역추론 결과가 올바른 것은?
    choices:
      - { id: '1', text: '$p$가 참이면 $q$가 거짓이다.' }
      - { id: '2', text: '$p$가 거짓이면 $q$가 참이다.' }
      - { id: '3', text: '$q$가 참이면 $p$가 참이다.' }
      - { id: '4', text: '$q$가 거짓이면 $p$가 거짓이다.' }
    answers: ['4']
    explanation: |
      $p \to q$가 참이고 $q$가 거짓이면 대우에 의해 $p$는 거짓이어야 한다.
      이는 유효추론인 modus tollens에 해당한다.
    tags: [propositional-logic, implication]

  - id: e18-10
    type: multiple-choice
    prompt: 다음 절들로부터 도출될 수 있는 결론은 무엇인가? 단, $P$, $Q$, $R$은 술어기호, $x$와 $y$는 객체변수, $A$, $B$, $C$, $D$는 객체상수이다. $P(x)\lor Q(x,y)$, $Q(A,B)\lor \sim R(A,B)$, $\sim Q(C,D)$, $P(A)$
    choices:
      - { id: '1', text: '$P(C)$' }
      - { id: '2', text: '$Q(A,y)$' }
      - { id: '3', text: '$\sim R(C,D)$' }
      - { id: '4', text: '$R(A,B)$' }
    answers: ['1']
    explanation: |
      $P(x)\lor Q(x,y)$에서 $x=C$, $y=D$로 단일화하면 $P(C)\lor Q(C,D)$가 된다.
      여기에 $\sim Q(C,D)$를 해소하면 $P(C)$가 도출된다.
    tags: [predicate-logic, resolution]

  - id: e18-11
    type: multiple-choice
    prompt: 퍼지집합 $X=\{(a,0.1),(b,0.4),(c,0.8),(d,1.0),(e,1.0)\}$와 $Y=\{(a,0.5),(b,0.7),(c,1.0),(d,0.2)\}$가 다음과 같을 때 퍼지집합 연산이 올바른 것은?
    choices:
      - { id: '1', text: '$X\cup Y=\{(a,0.5),(b,0.7),(c,1.0),(d,1.0)\}$' }
      - { id: '2', text: '$X\cap Y=\{(a,0.1),(b,0.4),(c,0.8),(d,0.2)\}$' }
      - { id: '3', text: '$\overline{X}=\{(a,0.5),(b,0.7),(c,1.0),(d,0.2)\}$' }
      - { id: '4', text: '$\overline{Y}=\{(a,0.5),(b,0.3),(d,0.8)\}$' }
    answers: ['2']
    explanation: |
      표준 퍼지 교집합은 각 원소의 소속도 최솟값으로 계산한다.
      따라서 a, b, c, d의 교집합 소속도는 각각 0.1, 0.4, 0.8, 0.2이다.
    tags: [fuzzy-set]

  - id: e18-12
    type: multiple-choice
    prompt: 다음 퍼지논리의 등식 중 옳은 것은?
    choices:
      - { id: '1', text: '$a \land 1 = 1$' }
      - { id: '2', text: '$a \land a = 0$' }
      - { id: '3', text: '$a \lor 0 = 0$' }
      - { id: '4', text: '$a \lor (b \land c) = (a \lor b)\land(a \lor c)$' }
    answers: ['4']
    explanation: |
      표준 퍼지논리에서 $\land$는 min, $\lor$는 max로 볼 수 있으며 분배법칙이 성립한다.
      $a\land1=a$, $a\land a=a$, $a\lor0=a$이므로 1~3은 틀리다.
    tags: [fuzzy-logic]

  - id: e18-13
    type: multiple-choice
    prompt: 다음 중 퍼지추론에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '조건부의 사실을 비퍼지화한 후 추론에 사용한다.' }
      - { id: '2', text: 'Mamdani는 $a \to b = \max(a,b)$로 구현하였다.' }
      - { id: '3', text: '퍼지규칙의 조건부 및 결론부에 언어적 변수를 포함할 수 있으며, 변수의 값에 언어적 라벨을 부여할 수 있다.' }
      - { id: '4', text: '입력 사실이 퍼지규칙의 조건부와 완전히 일치해야 추론이 이루어진다.' }
    answers: ['3']
    explanation: |
      퍼지규칙은 높다, 낮다 같은 언어적 변수를 조건부와 결론부에 포함할 수 있다.
      입력은 완전 일치가 아니라 소속도에 따라 부분적으로 규칙을 활성화한다.
    tags: [fuzzy-inference]

  - id: e18-14
    type: multiple-choice
    prompt: 다음 중 디지털 영상에서 점잡음을 제거하는 데 효과적인 것은?
    choices:
      - { id: '1', text: '중간값 필터' }
      - { id: '2', text: '소벨 연산자' }
      - { id: '3', text: '라플라스 연산자' }
      - { id: '4', text: '고역통과 필터' }
    answers: ['1']
    explanation: |
      점잡음이나 salt-and-pepper 잡음 제거에는 주변 픽셀의 중간값으로 대체하는 중간값 필터가 효과적이다.
      소벨과 라플라스는 주로 에지 검출에 사용된다.
    tags: [computer-vision, filtering]

  - id: e18-15
    type: multiple-choice
    prompt: 다음 중 영상분할 알고리즘의 바람직한 조건에 해당되는 것은?
    choices:
      - { id: '1', text: '인접한 서로 다른 두 영역의 속성은 매우 유사해야 한다.' }
      - { id: '2', text: '영역 내부는 복잡해야 하며 미세한 구멍이 많아야 한다.' }
      - { id: '3', text: '영역의 경계는 단순하고 부드러워야 하며, 공간적으로 정확한 위치에 존재해야 한다.' }
      - { id: '4', text: '각각의 영역은 각 영역 내에서 밝기나 결 등 정해진 기준에 대해 속성이 다양해야 한다.' }
    answers: ['3']
    explanation: |
      좋은 영상분할은 내부가 균일하고 인접 영역은 구별되며 경계가 단순하고 정확해야 한다.
      선택지 3이 바람직한 경계 조건을 설명한다.
    tags: [computer-vision, segmentation]

  - id: e18-16
    type: multiple-choice
    prompt: 다음 중 1차 미분으로 에지를 검출하는 것은 무엇인가?
    choices:
      - { id: '1', text: '라플라스 연산자' }
      - { id: '2', text: '평균 필터' }
      - { id: '3', text: '가우시안 필터' }
      - { id: '4', text: '소벨 연산자' }
    answers: ['4']
    explanation: |
      소벨 연산자는 영상의 1차 미분 근사를 이용해 에지를 검출한다.
      라플라스 연산자는 2차 미분 기반 연산자이다.
    tags: [computer-vision, edge-detection]

  - id: e18-17
    type: multiple-choice
    prompt: 다음 중 계량공간의 거리측정자 $J$가 만족해야 하는 공리에 해당되는 것은?
    choices:
      - { id: '1', text: '$J(x,y) \ne 0$ iff $x=y$' }
      - { id: '2', text: '$J(x,y) \ge 0$' }
