      학습은 연결가중치를 조정해 입력과 출력의 관계를 표현하는 과정이다.
      지식은 특정 위치 하나가 아니라 가중치 패턴에 분산 저장된다.
      분산성과 병렬성은 신경망의 중요한 특성이다.
    tags: [neural-network]

  - id: e18-28
    type: multiple-choice
    prompt: 다음 중 ReLU 함수에 해당되는 것은?
    choices:
      - { id: '1', text: '$f(x)=\begin{cases}1,&x\ge0\\0,&x<0\end{cases}$' }
      - { id: '2', text: '$f(x)=\frac{1}{1+e^{-x}}$' }
      - { id: '3', text: '$f(x)=\frac{e^x-e^{-x}}{e^x+e^{-x}}$' }
      - { id: '4', text: '$f(x)=\begin{cases}x,&x\ge0\\0,&x<0\end{cases}$' }
    answers: ['4']
    explanation: |
      선택지 1: 이 함수는 계단 함수에 가까우며 ReLU가 아니다.
      선택지 2: 이 함수는 시그모이드 함수이다.
      선택지 3: 이 함수는 쌍곡탄젠트 함수이다.
      선택지 4: 입력이 0 이상이면 x, 음수이면 0을 출력하는 함수가 ReLU이므로 정답이다.

      핵심 개념:
      ReLU는 Rectified Linear Unit의 약자이다.
      정의는 $f(x)=\max(0,x)$이다.
      양수 영역에서는 기울기가 1이라 경사 소멸을 완화하는 데 도움이 된다.
      시그모이드와 tanh도 활성함수이지만 ReLU와 형태가 다르다.
    tags: [neural-network, activation-function]

  - id: e18-29
    type: multiple-choice
    prompt: $x$와 $o$를 식별할 수 있도록 학습하려고 한다. 다음 중 단층 퍼셉트론으로 학습할 수 있는 것은?
    choices:
      - id: '1'
