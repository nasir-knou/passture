  - id: e18-26
    type: multiple-choice
    prompt: $k$-평균 군집화 알고리즘에서 어떠한 표본 부분집합이 특정 평균벡터에 가장 가까운 것으로 분류되었을 때 어떠한 처리를 하는가?
    choices:
      - { id: '1', text: '그 평균벡터의 크기를 확대한다.' }
