      - { id: '4', text: '그 평균벡터를 제거하여 군집의 수를 줄인다.' }
    answers: ['3']
    explanation: |
      선택지 1: 평균벡터의 크기를 단순히 확대하는 것은 k-평균의 중심 갱신 방식이 아니다.
      선택지 2: 표본 자체를 평균벡터 방향으로 이동시키는 것이 아니라 평균벡터를 표본들의 평균으로 갱신한다.
      선택지 3: 특정 평균벡터에 배정된 표본들의 평균으로 그 평균벡터를 업데이트하므로 정답이다.
      선택지 4: 군집 수 k는 알고리즘 진행 중 임의로 제거하지 않는다.

      핵심 개념:
