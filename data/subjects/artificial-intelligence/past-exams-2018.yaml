      - id: '4'
        text: '④'
        image:
          path: images/subjects/artificial-intelligence/past-exams/2018/e18-29-choice-4.png
          alt: 2018년 인공지능 기출 29번 선택지 4 그림
    answers: ['2']
    explanation: |
      선택지 1: 두 클래스가 겹쳐 있으면 하나의 직선으로 완전히 분리하기 어렵다.
      선택지 2: x와 o가 좌우로 나뉘어 하나의 직선으로 분리 가능하므로 단층 퍼셉트론으로 학습할 수 있어 정답이다.
      선택지 3: 중앙과 바깥을 나누는 구조는 비선형 경계가 필요하다.
      선택지 4: 서로 섞인 분포는 선형 분리가 어렵다.

      핵심 개념:
      단층 퍼셉트론은 입력의 가중합과 임계값으로 출력을 결정한다.
      이 모델이 만들 수 있는 결정경계는 선형 초평면이다.
      선형 분리 가능한 데이터는 학습 가능하지만 XOR 같은 비선형 문제는 해결할 수 없다.
      비선형 분리는 은닉층이 있는 다층 퍼셉트론으로 다룰 수 있다.
    tags: [neural-network, perceptron]

  - id: e18-30
    type: multiple-choice
    prompt: 다음 중 은닉층을 포함하는 다층 퍼셉트론 구조를 학습시킬 수 있는 신경망 모델은?
    choices:
      - { id: '1', text: '오차역전파 모델' }
      - { id: '2', text: '$k$-평균 군집화' }
      - { id: '3', text: '최대가능도 추정' }
      - { id: '4', text: 'LVQ' }
    answers: ['1']
    explanation: |
      선택지 1: 오차역전파 모델은 출력층 오차를 은닉층 방향으로 전파해 다층 퍼셉트론의 가중치를 학습시키므로 정답이다.
      선택지 2: k-평균 군집화는 비지도 군집화 알고리즘이지 다층 퍼셉트론 학습법이 아니다.
      선택지 3: 최대가능도 추정은 확률모형의 모수를 추정하는 통계 방법이다.
      선택지 4: LVQ는 원형 벡터 기반 분류 학습 방법으로 다층 퍼셉트론 학습법이 아니다.

      핵심 개념:
      다층 퍼셉트론은 은닉층과 비선형 활성함수를 포함해 복잡한 함수를 표현한다.
      오차역전파는 연쇄법칙으로 손실의 기울기를 각 층의 가중치에 대해 계산한다.
      계산된 기울기는 경사하강법으로 가중치를 갱신하는 데 쓰인다.
      은닉층이 있는 신경망 학습의 대표 방법이다.
    tags: [neural-network, backpropagation]

  - id: e18-31
    type: multiple-choice
    prompt: 다음 중 자기조직화 지도의 학습에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '지도학습 모델이다.' }
      - { id: '2', text: '강화학습 모델이다.' }
      - {
          id: '3',
          text: '학습 벡터에 대한 승자 노드 및 이를 중심으로 정의된 이웃 집합에 속한 노드들의 연결가중치 벡터를 조정한다.',
        }
      - { id: '4', text: '학습 벡터 집합을 표현하는 2차 함수를 학습한다.' }
    answers: ['3']
    explanation: |
      선택지 1: 자기조직화 지도는 대표적인 비지도 또는 자율학습 모델이다.
      선택지 2: 보상으로 정책을 학습하는 강화학습 모델이 아니다.
      선택지 3: 입력 벡터에 대한 승자 노드와 이웃 노드들의 연결가중치 벡터를 조정하므로 정답이다.
      선택지 4: 2차 함수를 학습하는 회귀 모델이 아니다.

      핵심 개념:
      자기조직화 지도는 고차원 데이터를 저차원 격자에 배치하는 신경망 모델이다.
      입력과 가장 가까운 가중치 벡터를 가진 노드가 승자 노드가 된다.
      승자와 그 이웃 노드의 가중치를 입력 방향으로 이동시킨다.
      이웃 반경과 학습률은 학습이 진행되며 줄어드는 경우가 많다.
    tags: [neural-network, self-organizing-map]

  - id: e18-32
    type: multiple-choice
    prompt: LVQ의 $t$번째 학습 과정에서 학습표본 $x_j$와 가장 유사한 연결가중치 벡터 $w_i$를 갖는 출력노드 $c_i$가 승자노드가 되었을 때, $x_j$와 $c_i$의 클래스가 동일할 경우 $w_i$는 어떻게 조정하는가? 단, $\alpha(t)$는 적응 이득이다.
    choices:
      - { id: '1', text: '$w_i(t+1)=w_i(t)+\alpha(t)\{x_j-w_i(t)\}$' }
      - { id: '2', text: '$w_i(t+1)=w_i(t)-\alpha(t)\{x_j-w_i(t)\}$' }
      - { id: '3', text: '$w_i(t+1)=\alpha(t)\{x_j-w_i(t)\}$' }
      - { id: '4', text: '$w_i(t+1)=\alpha(t)\{w_i-x_j(t)\}$' }
    answers: ['1']
    explanation: |
      선택지 1: LVQ에서 승자 노드의 클래스가 입력 표본과 같으면 가중치를 입력 표본 방향으로 이동시키므로 정답이다.
      선택지 2: 빼는 갱신은 입력 표본과 승자 노드의 클래스가 다를 때 멀어지게 하는 경우에 해당한다.
      선택지 3: 기존 가중치 $w_i(t)$가 빠져 있어 누적 갱신식이 아니다.
      선택지 4: 식의 변수와 방향이 올바른 LVQ 갱신식과 맞지 않는다.

      핵심 개념:
      LVQ는 클래스가 있는 원형 벡터를 조정하는 지도학습 기반 분류 방법이다.
      입력 표본과 같은 클래스의 승자 노드는 입력 쪽으로 가까워진다.
      다른 클래스의 승자 노드는 입력에서 멀어지게 조정할 수 있다.
      적응 이득은 한 번에 이동하는 정도를 조절한다.
    tags: [neural-network, lvq]

  - id: e18-33
    type: multiple-choice
    prompt: 학습 과정에서 학습 대상의 일반적 특성에 맞게 적절한 학습을 하지 못하고 특정 학습 데이터 집합에 지나치게 의존적으로 학습되어 성능이 저하되는 문제를 나타내는 것은?
    choices:
      - { id: '1', text: '경사 소멸 문제' }
      - { id: '2', text: '과적합 문제' }
      - { id: '3', text: '자원부족 문제' }
      - { id: '4', text: '계수 초기화 문제' }
    answers: ['2']
    explanation: |
      선택지 1: 경사 소멸은 깊은 신경망에서 앞쪽 층으로 갈수록 기울기가 작아지는 문제이다.
      선택지 2: 특정 학습 데이터에 지나치게 의존해 일반화 성능이 떨어지는 현상이 과적합이므로 정답이다.
      선택지 3: 자원부족 문제는 학습 데이터에 과도하게 맞는 현상을 뜻하는 표준 용어가 아니다.
      선택지 4: 계수 초기화 문제는 초기 가중치 선택과 관련되며 과도한 데이터 의존 현상과 다르다.

      핵심 개념:
      과적합은 모델이 학습 데이터의 잡음이나 특수 패턴까지 외워 일반화가 나빠지는 현상이다.
      훈련 성능은 높지만 검증 또는 테스트 성능이 낮아질 수 있다.
      정규화, 데이터 확대, 조기 종료, 모델 단순화 등이 완화 방법이다.
      일반화 성능을 확인하려면 학습에 쓰지 않은 데이터 평가가 필요하다.
    tags: [machine-learning, overfitting]

  - id: e18-34
    type: multiple-choice
    prompt: 다음 중 심층 신뢰망에 대한 설명으로 옳지 않은 것은?
    choices:
      - { id: '1', text: '제한 볼츠만 머신을 여러 층 쌓은 형태의 모델이다.' }
      - { id: '2', text: '지도학습 방식으로 학습한다.' }
      - { id: '3', text: '심층 신경망의 연결가중치를 합리적인 값으로 초기화할 수 있다.' }
      - { id: '4', text: '학습 결과 학습표본 집합에 대한 특징 추출기의 역할을 할 수 있다.' }
    answers: ['2']
    explanation: |
      선택지 1: 심층 신뢰망은 제한 볼츠만 머신을 여러 층 쌓은 형태로 설명할 수 있으므로 옳다.
      선택지 2: 심층 신뢰망은 주로 비지도 사전학습을 통해 확률적 특징 표현을 학습하므로 지도학습 방식이라고 한 설명이 틀려 정답이다.
      선택지 3: 사전학습은 심층 신경망의 연결가중치를 합리적으로 초기화하는 데 활용될 수 있다.
      선택지 4: 학습된 은닉 표현은 학습표본의 특징 추출기 역할을 할 수 있다.

      핵심 개념:
      심층 신뢰망은 여러 층의 확률적 잠재 변수를 사용하는 생성 모델이다.
      제한 볼츠만 머신을 층별로 쌓아 구성할 수 있다.
      초기 심층학습에서는 비지도 사전학습으로 좋은 가중치 초기값을 얻는 데 쓰였다.
      지도학습만으로 학습된다고 이해하면 핵심 특성을 놓치게 된다.
    tags: [deep-learning, deep-belief-network]

  - id: e18-35
    type: multiple-choice
    prompt: 합성곱 신경망(CNN)에서 이전 단계로부터의 입력을 서브샘플링하여 축소된 규모의 출력을 만드는 단계는?
    choices:
      - { id: '1', text: '합성곱층' }
      - { id: '2', text: 'ReLU층' }
      - { id: '3', text: '완전연결층' }
      - { id: '4', text: '통합층' }
    answers: ['4']
    explanation: |
      선택지 1: 합성곱층은 필터를 적용해 특징맵을 만드는 층이다.
      선택지 2: ReLU층은 비선형 활성함수를 적용하는 층이다.
      선택지 3: 완전연결층은 추출된 특징을 이용해 최종 분류나 회귀 출력을 만든다.
      선택지 4: 입력 특징맵을 서브샘플링해 축소된 출력을 만드는 단계는 풀링층이며 원문 선택지의 통합층에 해당하므로 정답이다.

      핵심 개념:
      CNN은 합성곱층, 활성화층, 풀링층, 완전연결층 등을 조합한다.
      합성곱층은 지역 필터로 특징을 추출한다.
      풀링층은 공간 크기를 줄이고 작은 위치 변화에 대한 강인성을 높인다.
      완전연결층은 추출된 특징을 종합해 최종 판단을 수행한다.
    tags: [deep-learning, cnn]
