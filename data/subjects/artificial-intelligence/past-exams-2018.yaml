questions:
  - id: e18-01
    type: multiple-choice
    passageRefs: [g18-minimax-tree-01]
    prompt: 다음 최대최소 탐색트리에서 A의 가치와 다음으로 선택할 수는 무엇인가? 단, 하단의 숫자는 해당 노드에서 평가함수를 적용할 경우 계산될 가치이고, 후계노드는 좌측에서 우측의 순서로 처리한다. 깊이는 2까지로 제한한다.
    choices:
      - { id: '1', text: '4, B' }
      - { id: '2', text: '5, C' }
      - { id: '3', text: '9, D' }
      - { id: '4', text: '1, E' }
    answers: ['1']
    explanation: |
      선택지 1: B, C, D, E가 MIN 노드이면 각각 4, 2, 3, 1이고 A는 MAX 노드이므로 값 4와 다음 수 B가 정답이다.
      선택지 2: C의 값은 min(2,7,5)=2이므로 A의 가치 5나 선택 C가 될 수 없다.
      선택지 3: D의 값은 min(9,3)=3이므로 A의 가치 9나 선택 D가 될 수 없다.
      선택지 4: E의 값은 min(5,1,2)=1이지만 A는 가장 큰 값을 고르므로 E를 선택하지 않는다.

      핵심 개념:
      최대최소 탐색에서 MAX 노드는 자식 중 최대값을, MIN 노드는 자식 중 최소값을 선택한다.
      깊이 제한이 있는 경우 제한 깊이의 리프 평가값을 위로 전파한다.
      중간 노드 값을 먼저 계산한 뒤 루트의 선택을 결정한다.
      이 트리에서는 B의 최소값 4가 가장 커서 A의 선택은 B이다.
    tags: [game-tree, minimax]

  - id: e18-02
    type: multiple-choice
    passageRefs: [g18-minimax-tree-01]
    prompt: $\alpha$-$\beta$ 가지치기를 적용하는 과정 중 C에서 $\alpha=4$이고 $\beta=\infty$이다. 노드 J의 가치인 2를 구한 후의 처리에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '노드 K의 가치를 계산하기 위한 처리를 한다.' }
      - { id: '2', text: '노드 J의 가치가 잘못 평가된 것이며, 노드 J를 재평가한다.' }
      - { id: '3', text: '$2 < \alpha$이므로 K, L은 가치를 구할 필요 없이 가지치기한다.' }
      - { id: '4', text: '$2 < \alpha$이므로 노드 D, E는 가지치기한다.' }
    answers: ['3']
    explanation: |
      선택지 1: J=2를 본 순간 C의 beta가 2가 되어 이미 가지치기 조건을 만족하므로 K를 계산하지 않는다.
      선택지 2: J의 가치 2는 리프 평가값이므로 재평가할 이유가 없다.
      선택지 3: C는 MIN 노드이고 $\beta=2$가 되어 $\beta \le \alpha(=4)$이므로 K와 L을 가지치기하므로 정답이다.
      선택지 4: C의 하위 가지치기는 C의 남은 자식 K, L에 적용되며 형제 노드 D, E 전체를 잘라내는 설명은 아니다.

      핵심 개념:
      알파-베타 가지치기는 minimax 결과를 바꾸지 않는 범위에서 탐색을 생략한다.
      MAX 관점의 alpha는 현재까지 보장된 하한이고, MIN 관점의 beta는 현재까지의 상한이다.
      MIN 노드에서 beta가 alpha 이하가 되면 그 노드의 남은 자식은 선택 결과를 개선할 수 없다.
      좋은 순서로 자식을 평가할수록 가지치기 효과가 커진다.
    tags: [game-tree, alpha-beta-pruning]

  - id: e18-03
    type: multiple-choice
    prompt: 다음 중 몬테카를로 트리 탐색에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '너비우선 탐색의 일종이다.' }
      - { id: '2', text: '시뮬레이션을 위해 UCT 알고리즘을 사용한다.' }
      - {
          id: '3',
          text: '시뮬레이션 단계에서는 확장된 노드의 가치를 미리 정한 평가함수를 이용하여 계산한다.',
        }
      - {
          id: '4',
          text: '역전파 단계에서는 시뮬레이션 결과를 확장된 노드로부터 선택 경로를 따라 역전파하여 통계를 업데이트한다.',
        }
    answers: ['4']
    explanation: |
      선택지 1: MCTS는 단순 너비우선 탐색이 아니라 선택, 확장, 시뮬레이션, 역전파를 반복하는 확률적 탐색이다.
      선택지 2: UCT는 주로 선택 단계의 트리 정책으로 쓰이며 시뮬레이션 자체를 위한 알고리즘이라고 보기 어렵다.
      선택지 3: 시뮬레이션 단계는 보통 종료 상태까지 rollout을 수행해 결과를 추정하며 정해진 평가함수만 쓰는 단계가 아니다.
      선택지 4: 역전파는 시뮬레이션 결과를 선택 경로의 노드들에 반영해 방문 수와 보상 통계를 갱신하므로 정답이다.

      핵심 개념:
      몬테카를로 트리 탐색은 선택, 확장, 시뮬레이션, 역전파의 네 단계를 반복한다.
      선택은 현재 통계를 바탕으로 탐색할 노드를 고른다.
      시뮬레이션은 가능한 결과를 표본으로 추정한다.
      역전파는 결과 정보를 트리의 상위 노드들에 누적한다.
    tags: [monte-carlo-tree-search]

  - id: e18-04
    type: multiple-choice
    prompt: 몬테카를로 트리 탐색의 선택 단계에서 사용하는 전략에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '탐사와 활용 사이의 균형을 이룰 수 있도록 설계한다.' }
      - { id: '2', text: '자식 노드 중에서 무작위로 선택을 한다.' }
      - { id: '3', text: '가치가 가장 작은 노드를 우선 선택한다.' }
      - { id: '4', text: '최대최소 탐색을 수행한다.' }
    answers: ['1']
    explanation: |
      선택지 1: MCTS의 선택 전략은 좋은 결과를 보인 선택의 활용과 덜 탐색된 선택의 탐사를 균형 있게 고려하므로 정답이다.
      선택지 2: 무작위 선택만 하면 현재까지 얻은 통계를 활용하지 못한다.
      선택지 3: 가치가 가장 작은 노드를 우선 선택하는 규칙은 일반적인 MCTS 선택 전략이 아니다.
      선택지 4: MCTS는 minimax와 결합될 수 있지만 선택 단계 자체가 최대최소 탐색이라고 보기는 어렵다.

      핵심 개념:
      탐사는 아직 충분히 확인하지 않은 선택지를 시험하는 것이다.
      활용은 현재까지 좋은 보상을 보인 선택지를 더 선택하는 것이다.
      MCTS 선택 정책은 두 요소 사이의 균형을 잡아야 한다.
      UCT는 평균 보상과 탐사 보너스를 함께 사용하는 대표 정책이다.
    tags: [monte-carlo-tree-search, exploration-exploitation]

  - id: e18-05
    type: multiple-choice
    prompt: 다음 중 전문가 시스템에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '문제분야의 전문지식을 메타지식이라고 한다.' }
      - { id: '2', text: '일반문제풀이기(GPS)에 해당된다.' }
      - { id: '3', text: '문제분야의 지식과 추론을 위한 추론기관이 분리되어 있다.' }
      - { id: '4', text: '문제를 해결하기 위한 지식은 지식공학자가 제공한다.' }
    answers: ['3']
    explanation: |
      선택지 1: 문제 분야의 전문지식은 지식베이스에 저장되는 도메인 지식이며 메타지식은 지식 사용 방법에 관한 지식이다.
      선택지 2: 전문가 시스템은 특정 분야 전문지식을 활용하는 시스템이고 일반문제풀이기와 동일하지 않다.
      선택지 3: 문제 분야의 지식베이스와 결론을 도출하는 추론기관이 분리되는 것이 전문가 시스템의 핵심이므로 정답이다.
      선택지 4: 지식은 주로 현장 전문가에게서 획득하고 지식공학자가 이를 정리해 시스템에 반영한다.

      핵심 개념:
      전문가 시스템은 특정 문제 영역의 전문지식을 이용해 추론하는 지식기반 시스템이다.
      지식베이스와 추론기관의 분리는 지식 수정과 재사용을 쉽게 한다.
      전문가는 도메인 지식을 제공하고 지식공학자는 이를 표현 형식으로 구조화한다.
      메타지식은 어떤 지식을 언제 사용할지에 관한 지식이다.
    tags: [expert-system, knowledge-based-system]

  - id: e18-06
    type: multiple-choice
    prompt: 다음 중 선언적 지식에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '추론기관이 필요 없는 지식표현 방법이다.' }
      - { id: '2', text: '상호 독립적·단편적 지식을 나열해 놓은 지식표현이다.' }
      - { id: '3', text: '프로그램 자체에 지식이 내재되어 있다.' }
      - { id: '4', text: '지식 획득, 편집 등이 절차적 지식에 비해 어렵다.' }
    answers: ['2']
    explanation: |
      선택지 1: 선언적 지식도 저장된 사실과 규칙을 활용하려면 추론기관이 필요할 수 있다.
      선택지 2: 선언적 지식은 사실이나 관계 같은 독립적이고 단편적인 지식을 명시적으로 표현하므로 정답이다.
      선택지 3: 프로그램 자체에 지식이 내재되는 것은 절차적 지식의 특징에 가깝다.
      선택지 4: 선언적 지식은 절차적 지식보다 지식 획득과 편집이 쉬운 편이다.

      핵심 개념:
      선언적 지식은 무엇이 참인지, 어떤 관계가 있는지를 명시적으로 표현한다.
      절차적 지식은 문제를 어떻게 푸는지의 절차나 알고리즘에 지식이 포함된다.
      선언적 표현은 지식 단위의 추가, 삭제, 수정이 비교적 쉽다.
      지식기반 시스템은 선언적 지식을 추론기관과 결합해 결론을 도출한다.
    tags: [knowledge-representation, declarative-knowledge]

  - id: e18-07
    type: multiple-choice
    prompt: 다음 중 지식표현 방법에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '시맨틱 네트는 절차적 지식 형태의 지식표현 방법이다.' }
      - { id: '2', text: '규칙은 네트워크 기반 지식표현 방법이다.' }
      - { id: '3', text: '논리는 절차적 지식을 함께 표현할 수 있다.' }
      - {
          id: '4',
          text: '프레임은 특성상속을 통해 상위개념의 지식을 하위개념이 공유하는 중앙 집중 방식의 지식 표현을 할 수 있다.',
        }
    answers: ['4']
    explanation: |
      선택지 1: 시맨틱 네트는 개념과 관계를 네트워크로 표현하는 선언적 지식표현에 가깝다.
      선택지 2: 규칙은 IF-THEN 형태의 생산규칙 기반 표현이지 네트워크 기반 표현이 아니다.
      선택지 3: 논리는 주로 선언적 사실과 관계 표현에 쓰이며 절차적 지식을 함께 표현한다는 설명은 부정확하다.
      선택지 4: 프레임은 슬롯과 계층 관계를 통해 상위개념의 속성을 하위개념이 상속하게 할 수 있으므로 정답이다.

      핵심 개념:
      지식표현 방법에는 논리, 규칙, 시맨틱 네트, 프레임 등이 있다.
      프레임은 객체나 개념을 슬롯과 슬롯값으로 구조화한다.
      상속은 상위 프레임의 속성을 하위 프레임이 공유하게 해 중복을 줄인다.
      표현 방식마다 추론 방식과 적합한 지식의 형태가 다르다.
    tags: [knowledge-representation, frame]

  - id: e18-08
    type: multiple-choice
    prompt: 다음 중 연언표준형에 해당되는 논리식은? 단, $p$, $q$, $r$, $s$는 기본명제이다.
    choices:
      - { id: '1', text: '$(p \land q) \lor (\sim r \land s)$' }
      - { id: '2', text: '$(\sim p \lor q) \land (r \lor s \lor p)$' }
      - { id: '3', text: '$\sim(p \lor q) \land (\sim r \lor s)$' }
      - { id: '4', text: '$\sim(p \land q) \lor \sim(\sim r \land s)$' }
    answers: ['2']
    explanation: |
      선택지 1: 논리곱 항들이 OR로 연결되어 있어 연언표준형이 아니라 선언표준형에 가깝다.
      선택지 2: 리터럴들의 논리합인 두 절 $(\sim p \lor q)$, $(r \lor s \lor p)$가 AND로 연결되어 있으므로 정답이다.
      선택지 3: $\sim(p \lor q)$처럼 부정이 절 전체에 붙어 있어 그대로는 연언표준형이 아니다.
      선택지 4: 전체가 OR로 연결된 형태이며 부정도 복합식에 붙어 있어 연언표준형이 아니다.

      핵심 개념:
      연언표준형은 절들의 논리곱 형태이다.
      각 절은 리터럴들이 논리합으로 연결된 식이다.
      표준형에서는 부정이 개별 명제기호에만 붙어야 한다.
      해소 추론과 SAT 처리는 주로 CNF 형태를 사용한다.
    tags: [propositional-logic, cnf]

  - id: e18-09
    type: multiple-choice
    prompt: 다음 중 조건명제 $p \to q$가 참일 때 명제 $p$ 또는 $q$의 진위값에 따른 연역추론 결과가 올바른 것은?
    choices:
      - { id: '1', text: '$p$가 참이면 $q$가 거짓이다.' }
      - { id: '2', text: '$p$가 거짓이면 $q$가 참이다.' }
      - { id: '3', text: '$q$가 참이면 $p$가 참이다.' }
      - { id: '4', text: '$q$가 거짓이면 $p$가 거짓이다.' }
    answers: ['4']
    explanation: |
      선택지 1: $p \to q$가 참이고 $p$가 참이면 $q$도 참이어야 하므로 틀렸다.
      선택지 2: $p$가 거짓이면 조건명제는 $q$의 값과 무관하게 참일 수 있으므로 $q$가 참이라고 단정할 수 없다.
      선택지 3: $q$가 참이라고 해서 $p$가 참이라는 결론은 후건긍정 오류이다.
      선택지 4: $p \to q$가 참이고 $q$가 거짓이면 대우에 의해 $p$는 거짓이므로 정답이다.

      핵심 개념:
      조건명제 $p \to q$는 $\sim p \lor q$와 동치이다.
      전건 긍정과 후건 부정은 유효한 추론이다.
      후건 긍정과 전건 부정은 일반적으로 유효하지 않다.
      $q$가 거짓일 때 조건명제가 참이려면 $p$도 거짓이어야 한다.
    tags: [propositional-logic, implication]

  - id: e18-10
    type: multiple-choice
    passageRefs: [g18-resolution-clauses-10]
    prompt: 다음 절들로부터 도출될 수 있는 결론은 무엇인가? 단, $P$, $Q$, $R$은 술어기호, $x$와 $y$는 객체변수, $A$, $B$, $C$, $D$는 객체상수이다.
    choices:
      - { id: '1', text: '$P(C)$' }
      - { id: '2', text: '$Q(A,y)$' }
      - { id: '3', text: '$\sim R(C,D)$' }
      - { id: '4', text: '$R(A,B)$' }
    answers: ['1']
    explanation: |
      선택지 1: $P(x)\lor Q(x,y)$에 $x=C$, $y=D$를 대입하고 $\sim Q(C,D)$와 해소하면 $P(C)$가 도출되므로 정답이다.
      선택지 2: $Q(A,y)$는 주어진 절과 해소 과정에서 직접 도출되는 결론이 아니다.
      선택지 3: $\sim R(C,D)$를 얻으려면 $Q(C,D)$와 $Q(C,D)\lor \sim R(C,D)$ 형태가 필요하지만 그런 절이 없다.
      선택지 4: $Q(A,B)\lor \sim R(A,B)$만으로는 $R(A,B)$를 도출할 수 없다.

      핵심 개념:
      해소 원리는 서로 보수인 리터럴을 제거해 새 절을 만든다.
      술어논리 해소에서는 변수와 상수를 단일화해 보수 리터럴을 맞춘다.
      $Q(C,D)$와 $\sim Q(C,D)$가 해소되면 나머지 리터럴 $P(C)$가 남는다.
      서로 다른 상수나 보수가 아닌 리터럴은 해소할 수 없다.
    tags: [predicate-logic, resolution]

  - id: e18-11
    type: multiple-choice
    passageRefs: [g18-fuzzy-sets-11]
    prompt: 퍼지집합 $X$와 $Y$가 다음과 같을 때 퍼지집합 연산이 올바른 것은?
    choices:
      - { id: '1', text: '$X\cup Y=\{(a,0.5),(b,0.7),(c,1.0),(d,1.0)\}$' }
      - { id: '2', text: '$X\cap Y=\{(a,0.1),(b,0.4),(c,0.8),(d,0.2)\}$' }
      - { id: '3', text: '$\overline{X}=\{(a,0.5),(b,0.7),(c,1.0),(d,0.2)\}$' }
      - { id: '4', text: '$\overline{Y}=\{(a,0.5),(b,0.3),(d,0.8)\}$' }
    answers: ['2']
    explanation: |
      선택지 1: 합집합은 각 원소의 최댓값이므로 d는 1.0이 맞지만 e도 X에만 1.0으로 존재할 수 있어 제시 집합이 완전하지 않다.
      선택지 2: 교집합은 공통 원소의 소속도 최솟값으로 계산하므로 a=0.1, b=0.4, c=0.8, d=0.2가 되어 정답이다.
      선택지 3: $\overline{X}$는 각 소속도를 1에서 뺀 값이어야 하므로 Y와 같은 값이 아니다.
      선택지 4: $\overline{Y}$에는 Y에 없는 원소의 처리까지 고려해야 하며 제시된 값과 원소 구성이 표준 여집합으로 보기 어렵다.

      핵심 개념:
      표준 퍼지집합 연산에서 합집합은 max, 교집합은 min으로 계산한다.
      여집합은 보통 $1-\mu(x)$로 정의한다.
      두 집합 연산을 할 때는 각 원소별 소속도를 비교한다.
      퍼지집합은 확률분포가 아니므로 소속도의 합이 1일 필요는 없다.
    tags: [fuzzy-set]

  - id: e18-12
    type: multiple-choice
    prompt: 다음 퍼지논리의 등식 중 옳은 것은?
    choices:
      - { id: '1', text: '$a \land 1 = 1$' }
      - { id: '2', text: '$a \land a = 0$' }
      - { id: '3', text: '$a \lor 0 = 0$' }
      - { id: '4', text: '$a \lor (b \land c) = (a \lor b)\land(a \lor c)$' }
    answers: ['4']
    explanation: |
      선택지 1: 표준 퍼지 AND는 min이므로 $a \land 1=a$이지 항상 1이 아니다.
      선택지 2: $a \land a=a$이므로 0이라고 할 수 없다.
      선택지 3: 표준 퍼지 OR는 max이므로 $a \lor 0=a$이지 항상 0이 아니다.
      선택지 4: min과 max 기반 표준 퍼지논리에서는 분배법칙이 성립하므로 정답이다.

      핵심 개념:
      퍼지논리는 참의 정도를 0부터 1 사이 값으로 다룬다.
      표준 연산에서는 AND를 min, OR를 max, NOT을 $1-a$로 정의한다.
      항등법칙과 멱등법칙은 퍼지논리에서도 확인할 수 있다.
      연산 정의를 대입해 등식이 모든 값에서 성립하는지 판단해야 한다.
    tags: [fuzzy-logic]

  - id: e18-13
    type: multiple-choice
    prompt: 다음 중 퍼지추론에 대한 설명으로 옳은 것은?
    choices:
      - { id: '1', text: '조건부의 사실을 비퍼지화한 후 추론에 사용한다.' }
      - { id: '2', text: 'Mamdani는 $a \to b = \max(a,b)$로 구현하였다.' }
      - {
          id: '3',
          text: '퍼지규칙의 조건부 및 결론부에 언어적 변수를 포함할 수 있으며, 변수의 값에 언어적 라벨을 부여할 수 있다.',
        }
      - { id: '4', text: '입력 사실이 퍼지규칙의 조건부와 완전히 일치해야 추론이 이루어진다.' }
    answers: ['3']
    explanation: |
      선택지 1: 퍼지추론에서는 입력 사실을 먼저 퍼지화해 소속도를 계산하는 것이 일반적이다.
      선택지 2: Mamdani 방식은 보통 min 함의와 max 합성을 사용하며 $a \to b=\max(a,b)$로 설명하지 않는다.
      선택지 3: 퍼지규칙은 조건부와 결론부에 언어적 변수와 라벨을 사용할 수 있으므로 정답이다.
      선택지 4: 퍼지규칙은 조건이 완전히 일치하지 않아도 소속도에 따라 부분적으로 활성화될 수 있다.

      핵심 개념:
      퍼지추론은 애매한 언어 규칙을 수치 소속도와 결합해 결론을 도출한다.
      언어적 변수는 낮다, 보통, 높다 같은 라벨로 값을 표현한다.
      퍼지 제어는 퍼지화, 규칙 평가, 추론, 비퍼지화 과정을 거친다.
      완전 일치가 아니라 만족 정도를 반영하는 것이 퍼지추론의 장점이다.
    tags: [fuzzy-inference]

  - id: e18-14
    type: multiple-choice
    prompt: 다음 중 디지털 영상에서 점잡음을 제거하는 데 효과적인 것은?
    choices:
      - { id: '1', text: '중간값 필터' }
      - { id: '2', text: '소벨 연산자' }
      - { id: '3', text: '라플라스 연산자' }
      - { id: '4', text: '고역통과 필터' }
    answers: ['1']
    explanation: |
      선택지 1: 중간값 필터는 주변 픽셀을 정렬해 중앙값으로 대체하므로 점잡음 제거에 효과적이어서 정답이다.
      선택지 2: 소벨 연산자는 1차 미분 기반 에지 검출에 사용된다.
      선택지 3: 라플라스 연산자는 2차 미분 기반 에지 검출에 사용된다.
      선택지 4: 고역통과 필터는 세부 변화와 경계를 강조할 수 있어 점잡음 제거 목적과 다르다.

      핵심 개념:
      점잡음은 일부 픽셀이 극단적으로 튀는 형태의 잡음이다.
      중간값 필터는 극단값의 영향을 평균 필터보다 덜 받는다.
      에지 검출 연산자는 밝기 변화가 큰 경계를 찾는 데 쓰인다.
      잡음 제거와 경계 강조 필터의 목적을 구분해야 한다.
    tags: [computer-vision, filtering]

  - id: e18-15
    type: multiple-choice
    prompt: 다음 중 영상분할 알고리즘의 바람직한 조건에 해당되는 것은?
    choices:
      - { id: '1', text: '인접한 서로 다른 두 영역의 속성은 매우 유사해야 한다.' }
      - { id: '2', text: '영역 내부는 복잡해야 하며 미세한 구멍이 많아야 한다.' }
      - {
          id: '3',
          text: '영역의 경계는 단순하고 부드러워야 하며, 공간적으로 정확한 위치에 존재해야 한다.',
        }
      - {
          id: '4',
          text: '각각의 영역은 각 영역 내에서 밝기나 결 등 정해진 기준에 대해 속성이 다양해야 한다.',
        }
    answers: ['3']
    explanation: |
      선택지 1: 서로 다른 인접 영역은 구별 가능해야 하므로 속성이 매우 유사한 것은 바람직하지 않다.
      선택지 2: 영역 내부는 균일하고 단순해야 하며 구멍이 많으면 좋은 분할로 보기 어렵다.
      선택지 3: 경계가 단순하고 부드러우며 실제 위치에 정확히 존재하는 것은 바람직한 조건이므로 정답이다.
      선택지 4: 각 영역 내부는 정해진 기준에 대해 속성이 다양하기보다 균일해야 한다.

      핵심 개념:
      영상분할은 영상을 의미 있는 영역이나 객체 단위로 나누는 과정이다.
      좋은 분할은 영역 내부의 동질성과 영역 간 차이를 동시에 만족해야 한다.
      경계는 실제 객체 경계를 잘 따라야 하고 지나치게 복잡하지 않아야 한다.
      분할 결과는 이후 특징 추출과 인식 성능에 직접 영향을 준다.
    tags: [computer-vision, segmentation]

  - id: e18-16
    type: multiple-choice
    prompt: 다음 중 1차 미분으로 에지를 검출하는 것은 무엇인가?
    choices:
      - { id: '1', text: '라플라스 연산자' }
      - { id: '2', text: '평균 필터' }
      - { id: '3', text: '가우시안 필터' }
      - { id: '4', text: '소벨 연산자' }
    answers: ['4']
    explanation: |
      선택지 1: 라플라스 연산자는 2차 미분 기반 에지 검출 연산자이다.
      선택지 2: 평균 필터는 주변 픽셀 평균으로 영상을 평활화하는 필터이다.
      선택지 3: 가우시안 필터는 잡음 감소와 평활화에 사용된다.
      선택지 4: 소벨 연산자는 x, y 방향 1차 미분 근사로 에지를 검출하므로 정답이다.

      핵심 개념:
      에지는 영상 밝기값이 급격히 변하는 위치이다.
      1차 미분 기반 연산자는 기울기 크기와 방향으로 에지를 찾는다.
      소벨 연산자는 수평/수직 마스크를 이용해 기울기를 계산한다.
      라플라스는 2차 미분을 이용한다는 점에서 소벨과 다르다.
    tags: [computer-vision, edge-detection]

  - id: e18-17
    type: multiple-choice
    prompt: 다음 중 계량공간의 거리측정자 $J$가 만족해야 하는 공리에 해당되는 것은?
    choices:
      - { id: '1', text: '$J(x,y) \ne 0$ iff $x=y$' }
      - { id: '2', text: '$J(x,y) \ge 0$' }
      - { id: '3', text: '$J(x,y) \ne J(y,x)$' }
      - { id: '4', text: '$J(x,y)+J(y,z) \le J(x,z)$' }
    answers: ['2']
    explanation: |
      선택지 1: 동일성 공리는 $J(x,y)=0$ iff $x=y$가 되어야 하므로 부등호 설명이 틀렸다.
      선택지 2: 거리는 음수가 될 수 없으므로 $J(x,y)\ge0$는 거리 공리에 해당해 정답이다.
      선택지 3: 거리측정자는 대칭성 $J(x,y)=J(y,x)$를 만족해야 하므로 틀렸다.
      선택지 4: 삼각부등식은 $J(x,z)\le J(x,y)+J(y,z)$ 형태이므로 제시 식은 방향이 반대이다.

      핵심 개념:
      계량공간의 거리 함수는 비음수성, 동일성, 대칭성, 삼각부등식을 만족한다.
      비음수성은 어떤 두 점 사이 거리도 0 이상이라는 뜻이다.
      동일성은 거리가 0이면 같은 점이라는 조건이다.
      거리 공리를 만족해야 거리 기반 분류와 군집화에서 일관된 해석이 가능하다.
    tags: [pattern-recognition, metric]

  - id: e18-18
    type: multiple-choice
    prompt: 학습표본 집합으로부터 확률밀도를 매개변수 방식으로 결정하는 방법에 해당되는 것은?
    choices:
      - { id: '1', text: '최대가능도 추정' }
      - { id: '2', text: '$k$-근접이웃' }
      - { id: '3', text: '분할과 합병' }
      - { id: '4', text: '경계면 판별식 학습' }
    answers: ['1']
    explanation: |
      선택지 1: 최대가능도 추정은 확률밀도함수의 모수를 정하고 관측 표본의 가능도를 최대화하므로 정답이다.
      선택지 2: k-근접이웃은 주변 표본을 이용하는 비모수적 분류 방법이다.
      선택지 3: 분할과 합병은 영상분할이나 영역 처리에서 쓰이는 방법이다.
      선택지 4: 경계면 판별식 학습은 클래스 경계를 직접 학습하는 판별적 접근에 가깝다.

      핵심 개념:
      매개변수 방식은 데이터가 특정 확률분포를 따른다고 가정하고 그 분포의 모수를 추정한다.
      최대가능도 추정은 관측 데이터가 나타날 가능도를 가장 크게 하는 모수를 찾는다.
      비모수 방법은 고정된 분포 형태를 강하게 가정하지 않는다.
      확률밀도 추정은 통계적 패턴인식의 기반이 된다.
    tags: [machine-learning, maximum-likelihood]

  - id: e18-19
    type: multiple-choice
    prompt: 베이즈 분류기에서 특징벡터 $x$로 표현되는 패턴이 클래스 $C_1$과 $C_2$ 중 어디에 속하는지 식별하고자 한다. 다음 중 $C_1$으로 식별하는 경우는?
    choices:
      - { id: '1', text: '$p(C_1) \le p(C_2)$' }
      - { id: '2', text: '$p(C_1)p(x) \ge p(C_2)p(x)$' }
      - { id: '3', text: '$p(C_1\mid x) > p(C_2\mid x)$' }
      - { id: '4', text: '$p(x\mid C_1) \le p(x\mid C_2)$' }
    answers: ['3']
    explanation: |
      선택지 1: 사전확률 $p(C_1)$가 작거나 같다는 사실만으로 특징벡터 $x$에 대한 분류를 결정할 수 없다.
      선택지 2: $p(x)$는 두 클래스 비교에서 공통으로 곱해지는 항이며 사후확률 비교를 직접 나타내지 않는다.
      선택지 3: 베이즈 분류기는 사후확률이 큰 클래스를 선택하므로 $p(C_1\mid x)>p(C_2\mid x)$이면 $C_1$이 정답이다.
      선택지 4: 우도 $p(x\mid C_1)$만 작거나 같다는 조건은 $C_1$ 선택 조건이 아니다.

      핵심 개념:
      베이즈 분류기는 관측 특징이 주어졌을 때 사후확률이 가장 큰 클래스를 고른다.
      사후확률은 사전확률과 우도를 결합해 계산한다.
      두 클래스 비교에서는 공통 분모 $p(x)$가 약분될 수 있다.
      사전확률이나 우도 하나만으로는 항상 결정을 내릴 수 없다.
    tags: [machine-learning, bayes-classifier]

  - id: e18-20
