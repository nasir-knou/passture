      - { id: '4', text: '강화학습' }
    answers: ['4']
    explanation: |
      선택지 1: 자율학습은 정답 출력 없이 데이터 구조를 찾는 학습이며 보상 최대화와 다르다.
      선택지 2: 암기식 학습은 주어진 사례를 저장해 활용하는 방식으로 보상 기반 정책 학습이 아니다.
      선택지 3: 비지도학습은 라벨 없는 데이터의 구조를 학습하는 방식이다.
      선택지 4: 상태에서 행동을 선택하고 보상을 받아 누적 보상이 최대가 되도록 정책을 학습하는 것이 강화학습이므로 정답이다.

      핵심 개념:
      강화학습은 에이전트가 환경과 상호작용하며 보상을 통해 학습하는 방법이다.
      목표는 즉시 보상뿐 아니라 장기 누적 보상을 최대화하는 정책을 찾는 것이다.
      지도학습은 정답 출력이 주어지고, 비지도학습은 라벨 없이 구조를 찾는다.
