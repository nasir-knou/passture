subjectId: computer-architecture
sourceId: past-exams-2018
title: 컴퓨터구조 2018 기말
kind: exam
year: 2018

passages:
  - id: g18-accumulator-program-01
    type: code
    language: text
    body: |
      LOAD A ; AC <- M[A]
      SUB B  ; AC <- AC - M[B]
      STORE X; (c)
      LOAD C ; AC <- M[C]
      MUL X  ; AC <- AC x M[X]
      STORE X; (f)
  - id: g18-addressing-context-01
    type: text
    body: |
      어느 순간의 기억장치와 PC, 레지스터 상태는 다음과 같다.

      - PC = 156
      - R1 = 200
      - 156번지: 연산코드, 주소방식
      - 157번지: ADRS, NBR=300
      - 158번지: 다음 명령어
      - 200번지: 500
      - 300번지: 618
      - 456번지: 502
      - 458번지: 700
      - 500번지: 300
      - 618번지: 456
      - 700번지: 458

      PC의 현재 내용은 156이며 156번지의 명령어를 수행한다.
      명령어의 연산코드는 해당 피연산자를 AC에 적재하라는 것이고 주소 필드의 값은 300이다.
      주소지정방식이 레지스터를 사용할 경우 레지스터 R1을 사용한다고 가정한다.
  - id: g18-control-word-fields-01
    type: text
    body: |
      제어단어의 각 필드는 다음과 같이 배치되어 있다.
      - A: 1~3번 비트
      - B: 4~6번 비트
      - D: 7~9번 비트
      - F: 10~13번 비트
      - H: 14~16번 비트
  - id: g18-processing-unit-block-01
    type: text
    body: |
      처리장치 블록도 구성:
      - 레지스터 세트는 출력 선택 C, 도착 레지스터 선택 D, 기능 선택 E와 연결된다.
      - (가)는 레지스터 세트 아래쪽에 있는 상태 관련 레지스터이다.
      - (나)는 레지스터 세트의 출력 쪽에 있는 플래그 레지스터이다.
      - MUX A와 MUX B는 (다) 장치의 입력을 선택한다.
      - (다)는 산술논리연산을 수행하는 장치이다.
      - (라)는 (다)의 결과를 받아 출력 데이터 또는 레지스터 세트 입력 방향으로 전달하는 시프터이다.
      - 제어단어 필드 A, B, D, F, H는 각각 MUX A 선택, MUX B 선택, 도착 레지스터 선택, ALU 연산 선택, 시프터 연산 선택과 관련된다.
  - id: g18-microprogram-controller-01
    type: text
    body: |
      마이크로프로그램 제어기 블록도 구성:
      - MUX1은 내부 주소와 외부 주소 중 하나를 선택해 (가)로 보낸다.
      - (가)는 제어주소 레지스터이며 제어기억장치 ROM의 주소를 지정한다.
      - 제어기억장치 ROM의 전체 워드 폭은 26비트이고 주소 입력은 6비트이다.
      - (나)는 제어기억장치 ROM 내부의 제어단어 또는 마이크로명령어 영역이다.
      - 1~16번 비트는 처리장치를 제어하는 제어단어 영역이다.
      - 17번 비트는 MUX1 선택과 관련되고, 18~20번 비트는 조건 선택과 관련되며, 21~26번 비트는 다음 주소를 나타낸다.
      - MUX2는 상태비트 0, 1, C, C', Z, Z', S, V 중 하나를 선택한다.
      - (다)는 처리장치이며 16비트 입력 데이터를 받아 처리한다.
  - id: g18-control-processing-relation-01
    type: text
    body: |
      컴퓨터의 두 구성요소 사이의 상호관계:
      - (가)는 제어입력을 받아 제어출력을 내보내는 제어장치이다.
      - (나)는 데이터입력을 받아 데이터출력을 내보내는 처리장치이다.
      - (가)에서 (나)로 전달되는 (A)는 제어신호이다.
      - (나)에서 (가)로 되돌아가는 (B)는 상태신호이다.
  - id: g18-memory-descriptions-01
    type: text
    body: |
      여러 기억장치의 설명:
      A. 저장되어 있는 데이터의 내용을 이용하여 원하는 데이터를 검색하여 읽어낼 수 있는 기억장치이다.
      B. 프로그램에서 사용할 수 있게 허용된 주소 공간의 크기보다 주기억장치의 크기가 작아서 보조기억장치의 일부까지 포함하는 기억장치이다.
      C. 주기억장치보다 속도가 빠른 기억소자로 구성되어 중앙처리장치와 주기억장치 간의 속도 차이를 줄여 준다.
      D. 하나의 기억장치 사이클 동안 여러 개의 단어를 읽을 수 있기 때문에 읽어 내는 속도를 향상시킨다.

questions:
  - id: e18-01
    type: multiple-choice
    prompt: 다음 중 컴퓨터 명령어를 구성하는 대표적인 필드가 아닌 것은?
    choices:
      - { id: '1', text: 기억장치주소 혹은 처리장치 레지스터를 선택하기 위한 주소 필드 }
      - { id: '2', text: 주소필드에 대한 해석방법을 지정하는 방식 필드 }
      - { id: '3', text: 수행할 연산을 나타내는 연산코드 필드 }
      - { id: '4', text: 인터럽트 요청을 위한 제어 필드 }
    answers: ['4']
    explanation: |
      컴퓨터 명령어의 대표 필드는 연산코드 필드, 주소 필드, 주소지정 방식 필드 등이다.
      인터럽트 요청을 위한 제어 필드는 일반적인 명령어 구성 필드로 보기 어렵다.
    tags: [instruction-format]

  - id: e18-02
    type: multiple-choice
    prompt: 다음 컴퓨터 명령어 `AND R1, R2, R3`에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 2-주소 컴퓨터 명령어이다. }
      - { id: '2', text: 데이터 전송을 위한 컴퓨터 명령어이다. }
      - { id: '3', text: 컴퓨터의 내부구조로 볼 때 누산기를 이용하는 컴퓨터 명령어이다. }
      - { id: '4', text: 컴퓨터의 내부구조로 볼 때 다중 레지스터를 이용하는 컴퓨터 명령어이다. }
    answers: ['4']
    explanation: |
      `AND R1, R2, R3`는 여러 레지스터를 명시하는 형식으로, 다중 레지스터 구조와 관계가 깊다.
      누산기 기반 명령어는 보통 하나의 명시적 주소와 묵시적 AC를 사용한다.
    tags: [register-instruction, instruction-format]

  - id: e18-03
    type: multiple-choice
    passageRefs: [g18-accumulator-program-01]
    prompt: 위 프로그램은 다음 중 어느 수식을 계산하는 것인가?
    choices:
      - { id: '1', text: X = (A + B) x C }
      - { id: '2', text: X = (A - B) x C }
      - { id: '3', text: AC = (A + B) x C }
      - { id: '4', text: AC = (A - B) x C }
    answers: ['2']
    explanation: |
      먼저 A를 적재하고 B를 빼서 A-B를 만든 뒤 X에 저장한다.
      그 다음 C를 적재하고 X에 저장된 A-B와 곱해 다시 X에 저장하므로 결과 수식은 X=(A-B)xC이다.
    tags: [accumulator, program-trace]

  - id: e18-04
    type: multiple-choice
    passageRefs: [g18-accumulator-program-01]
    prompt: 위 프로그램에서 (f)의 괄호 안에 들어갈 식으로 알맞은 것은?
    choices:
      - { id: '1', text: 'AC <- M[A] - [B]' }
      - { id: '2', text: 'AC <- AC x M[X]' }
      - { id: '3', text: 'AC <- M[X]' }
      - { id: '4', text: 'M[X] <- AC' }
    answers: ['4']
    explanation: |
      `STORE X`는 누산기 AC의 값을 기억장치 주소 X에 저장하는 명령이다.
      따라서 (f)에 들어갈 동작은 M[X] <- AC이다.
    tags: [store-instruction, accumulator]

  - id: e18-05
    type: multiple-choice
    passageRefs: [g18-accumulator-program-01]
    prompt: 위 프로그램의 명령어 형식과 관계가 깊은 컴퓨터 내부구조는?
    choices:
      - { id: '1', text: 누산기를 가진 구조 }
      - { id: '2', text: 다중 레지스터를 가진 구조 }
      - { id: '3', text: 스택을 가진 구조 }
      - { id: '4', text: 프로그램 카운터를 가진 구조 }
    answers: ['1']
    explanation: |
      LOAD, SUB, STORE, MUL 명령이 하나의 주소를 명시하고 AC를 묵시적으로 사용하는 형태이므로 누산기 구조와 관계가 깊다.
      스택 구조는 0-주소 명령어와 더 관련된다.
    tags: [accumulator, one-address-instruction]

  - id: e18-06
    type: multiple-choice
    passageRefs: [g18-addressing-context-01]
    prompt: 즉시 주소지정방식과 직접 주소지정방식을 이용한다면 각각 어떤 값이 AC에 적재될 것인가?
    choices:
      - { id: '1', text: '300, 500' }
      - { id: '2', text: '300, 618' }
      - { id: '3', text: '618, 456' }
      - { id: '4', text: '618, 458' }
    answers: ['2']
    explanation: |
      즉시 주소지정방식에서는 주소 필드의 값 300 자체가 피연산자이므로 AC에는 300이 적재된다.
      직접 주소지정방식에서는 유효주소가 300이고, AC에는 M[300]=618이 적재된다.
    tags: [addressing-mode, immediate-addressing, direct-addressing]

  - id: e18-07
    type: multiple-choice
    passageRefs: [g18-addressing-context-01]
    prompt: 레지스터 주소지정방식과 레지스터 간접 주소지정방식을 이용한다면 각각 어떤 값이 AC에 적재될 것인가?
    choices:
      - { id: '1', text: '200, 500' }
      - { id: '2', text: '500, 300' }
      - { id: '3', text: '500, 618' }
      - { id: '4', text: '618, 300' }
    answers: ['1']
    explanation: |
      레지스터 주소지정방식에서는 R1의 내용인 200이 피연산자로 AC에 적재된다.
      레지스터 간접 주소지정방식에서는 R1이 가리키는 200번지의 내용 M[200]=500이 AC에 적재된다.
    tags: [register-addressing, register-indirect-addressing]

  - id: e18-08
    type: multiple-choice
    passageRefs: [g18-addressing-context-01]
    prompt: 상대 주소지정방식과 인덱스된 주소지정방식을 이용한다면 각각의 유효주소는? 여기서 인덱스 레지스터는 R1이다.
    choices:
      - { id: '1', text: '458, 400' }
      - { id: '2', text: '456, 500' }
      - { id: '3', text: '458, 500' }
      - { id: '4', text: '618, 300' }
    answers: ['3']
    explanation: |
      상대 주소지정방식에서는 다음 명령어 주소 158에 주소 필드 300을 더해 유효주소 458이 된다.
      인덱스된 주소지정방식에서는 주소 필드 300에 R1의 내용 200을 더해 유효주소 500이 된다.
    tags: [relative-addressing, indexed-addressing]

  - id: e18-09
    type: multiple-choice
    prompt: |
      다음 마이크로 연산에 관한 설명으로 올바른 것은?
      $YT_1: R0 \leftarrow R0+R1$
      $\overline{Y}T_1: R0 \leftarrow R0+\overline{R1}+1$
    choices:
      - { id: '1', text: 'Y=1, T1=1일 때, R0에서 R1을 빼어 결과를 R0에 적재' }
      - { id: '2', text: 'Y=0, T1=0일 때, R0와 R1을 더하여 결과를 R0에 적재' }
      - { id: '3', text: 'Y=0, T1=1일 때, R0와 R1을 더하여 결과를 R0에 적재' }
      - { id: '4', text: 'Y=0, T1=1일 때, R0에서 R1을 빼어 결과를 R0에 적재' }
    answers: ['4']
    explanation: |
      $Y=0$이고 $T_1=1$이면 $\overline{Y}T_1$ 조건이 성립하여 $R0 \leftarrow R0+\overline{R1}+1$이 수행된다.
      이는 2의 보수 표현에서 $R0-R1$을 계산하는 마이크로연산이다.
    tags: [microoperation, twos-complement]

  - id: e18-10
    type: multiple-choice
    prompt: 다음 중 내부 버스에 대한 설명으로 올바르지 않은 것은?
    choices:
      - { id: '1', text: 중앙처리장치 내부의 연산장치와 레지스터간의 데이터 전송을 위한 공통 선로의 집합이다. }
      - { id: '2', text: 멀티플렉서와 디코더를 이용해서 구성할 수 있다. }
      - { id: '3', text: 레지스터와 ALU를 이용해서 구성할 수 있다. }
      - { id: '4', text: 중앙처리장치 내부에서 정보를 전달할 수 있는 경로이다. }
    answers: ['3']
    explanation: |
      내부 버스는 CPU 내부 구성요소 사이에서 정보를 전달하는 경로이며, 멀티플렉서나 3상태 버퍼 같은 회로를 이용해 구성할 수 있다.
      레지스터와 ALU 자체만으로 내부 버스를 구성한다고 보는 설명은 적절하지 않다.
    tags: [internal-bus, cpu-datapath]

  - id: e18-11
    type: multiple-choice
    passageRefs: [g18-control-word-fields-01]
    prompt: 다음 그림은 제어단어의 각 필드를 나타내고 있다. 각 필드에 관한 설명 중으로 적절한 것은?
    choices:
      - { id: '1', text: A와 D는 출발 레지스터를 선택하는 필드이다. }
      - { id: '2', text: B는 도착 레지스터를 선택하는 필드이다. }
      - { id: '3', text: F는 상태 레지스터의 상태 값을 선택하는 필드이다. }
      - { id: '4', text: H는 시프터에서 수행되는 연산의 하나를 선택하는 필드이다. }
    answers: ['4']
    explanation: |
      일반적인 처리장치 제어단어에서 A와 B는 출발 레지스터 또는 입력 버스를 선택하고, D는 도착 레지스터를 선택한다.
      F는 ALU 연산 선택, H는 시프터 연산 선택에 대응한다.
    tags: [control-word, datapath-control]

  - id: e18-12
    type: multiple-choice
    passageRefs: [g18-processing-unit-block-01]
    prompt: 위 그림에서 (나)와 (라)에 해당되는 것은 각각 무엇인가?
    choices:
      - { id: '1', text: 'Flag Register, Shifter' }
      - { id: '2', text: 'Decoder, ALU' }
      - { id: '3', text: 'Decoder, Shifter' }
      - { id: '4', text: 'Flag Register, Multiplexer' }
    answers: ['1']
    explanation: |
      (나)는 연산 결과의 상태를 저장하는 플래그 레지스터이고, (라)는 ALU 결과에 대한 시프트 동작을 수행하는 시프터이다.
    tags: [processing-unit, flag-register, shifter]

  - id: e18-13
    type: multiple-choice
    passageRefs: [g18-processing-unit-block-01]
    prompt: 그림의 (다)에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 마이크로프로그램의 조건부 분기를 구현하는데 필요하다. }
      - { id: '2', text: 데이터를 비트단위로 이동시키는 시프트 연산을 수행한다. }
      - { id: '3', text: 산술논리연산을 수행한다. }
      - { id: '4', text: 제어장치에서 처리장치를 제어하기 위해 필요한 정보가 저장되는 장소이다. }
    answers: ['3']
    explanation: |
      (다)는 MUX A와 MUX B의 출력을 입력으로 받아 산술논리연산을 수행하는 ALU에 해당한다.
    tags: [processing-unit, alu]

  - id: e18-14
    type: multiple-choice
    passageRefs: [g18-processing-unit-block-01]
    prompt: 위 그림에서 D에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 마이크로프로그램의 조건부 분기를 구현하는데 필요하다. }
      - { id: '2', text: 데이터를 비트단위로 이동시키는 시프트 연산을 수행한다. }
      - { id: '3', text: 산술논리연산을 수행한다. }
      - { id: '4', text: 도착 레지스터를 결정하는데 필요하다. }
    answers: ['4']
    explanation: |
      제어단어의 D 필드는 연산 결과를 어느 레지스터에 적재할지, 즉 도착 레지스터를 선택하는 데 사용된다.
    tags: [control-word, destination-register]

  - id: e18-15
    type: multiple-choice
    passageRefs: [g18-processing-unit-block-01]
    prompt: 위 그림에서 레지스터 세트에 40개의 레지스터가 있고, (다)는 20개의 연산, (라)는 12개의 연산을 수행한다고 가정했을 때 제어단어는 몇 비트가 되겠는가?
    choices:
