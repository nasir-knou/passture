      - { id: '3', text: '27' }
      - { id: '4', text: '28' }
    answers: ['3']
    explanation: |
      40개 레지스터 선택에는 각 필드마다 6비트가 필요하므로 A, B, D 필드가 18비트를 차지한다.
      20개 ALU 연산 선택에는 5비트, 12개 시프터 연산 선택에는 4비트가 필요하므로 총 27비트이다.
    tags: [control-word, bit-width]

  - id: e18-16
    type: multiple-choice
    prompt: 다음 중 마이크로프로그램에 의한 제어 방식의 설명으로 잘못된 것은?
