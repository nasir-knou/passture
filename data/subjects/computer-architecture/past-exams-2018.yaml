      - { id: '3', text: 장치번호 디코더 }
      - { id: '4', text: 멀티플렉서 }
    answers: ['4']
    explanation: |
      입출력 인터페이스에는 데이터 버퍼, 상태 플래그, 장치번호 디코더 등이 포함된다.
      멀티플렉서는 일반적인 필수 구성요소로 보기 어렵다.
    tags: [io-interface]

  - id: e18-34
    type: multiple-choice
    prompt: 다음 중 DMA 제어에 대한 설명으로 올바른 것은?
    choices:
      - { id: '1', text: 직접 주기억장치에 접근해서 이루어지는 입출력 제어방식 }
      - { id: '2', text: 중앙처리장치 제어를 통한 입출력 제어방식 }
      - { id: '3', text: 입출력 프로세서인 채널을 이용한 제어방식 }
      - { id: '4', text: 프로그램과 인터럽트를 이용하는 입출력 제어방식 }
