      - { id: '3', text: 비교적 복잡한 명령어 집합 컴퓨터에 적합하다. }
      - { id: '4', text: 하드웨어에 의한 방식에 비해 컴퓨터의 처리속도가 향상된다. }
    answers: ['4']
    explanation: |
      마이크로프로그램 제어 방식은 명령어 집합 변경과 복잡한 제어 구현에 유리하지만, 일반적으로 하드와이어드 제어보다 빠르다고 보기 어렵다.
    tags: [microprogrammed-control, control-unit]

  - id: e18-17
    type: multiple-choice
    passageRefs: [g18-microprogram-controller-01]
    prompt: 위의 그림에서 MUX1에 대한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 내부 주소와 외부 주소 중의 하나를 선택하는 장치이다. }
      - { id: '2', text: MUX1의 선택신호로는 1비트가 필요하다. }
      - { id: '3', text: '선택신호로서 (0)₂은 내부주소를, (1)₂은 외부주소를 선택한다.' }
      - { id: '4', text: MUX1의 출력은 디코더와 연결된다. }
    answers: ['4']
    explanation: |
      MUX1의 출력은 다음 마이크로명령어 주소를 저장하거나 전달하는 제어주소 레지스터 쪽으로 연결된다.
      디코더와 직접 연결된다는 설명은 그림의 구조와 맞지 않는다.
    tags: [microprogram-controller, multiplexer]

  - id: e18-18
    type: multiple-choice
    passageRefs: [g18-microprogram-controller-01]
    prompt: 그림에서 만일 MUX1에서 (가)로 입력되는 데이터가 7비트이고 다른 것은 변동이 없다면 (나)는 어떻게 바뀌는가?
    choices:
      - { id: '1', text: '64 x 26' }
      - { id: '2', text: '128 x 27' }
      - { id: '3', text: '256 x 28' }
      - { id: '4', text: '512 x 28' }
    answers: ['2']
    explanation: |
      주소 입력이 7비트이면 제어기억장치의 행 수는 2^7=128개가 된다.
      다음 주소 필드도 7비트가 되어 기존 26비트 워드 폭에서 1비트가 늘어난 27비트가 된다.
    tags: [microprogram-controller, control-memory]

  - id: e18-19
    type: multiple-choice
    passageRefs: [g18-microprogram-controller-01]
    prompt: 그림에서 (다)에 관련된 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 처리장치로서 입력 16비트는 제어단어이다. }
      - { id: '2', text: 인코더로서 입력 16비트를 상태비트로 인코딩한다. }
      - { id: '3', text: 시프터로서 입력 16비트는 시프트 연산의 종류를 결정한다. }
      - { id: '4', text: 산술논리연산장치로서 입력 16비트는 산술논리연산의 종류를 결정한다. }
    answers: ['1']
    explanation: |
      (다)는 제어기억장치에서 나온 16비트 제어단어를 입력으로 받아 동작하는 처리장치 영역이다.
    tags: [microprogram-controller, processing-unit]

  - id: e18-20
    type: multiple-choice
    passageRefs: [g18-microprogram-controller-01]
    prompt: 그림에서 (가)에 들어갈 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 처리장치 }
      - { id: '2', text: 제어장치 }
      - { id: '3', text: 제어주소 레지스터 }
      - { id: '4', text: 산술논리연산장치 }
    answers: ['3']
    explanation: |
      MUX1의 출력은 제어기억장치 ROM을 접근할 주소로 사용되므로 (가)는 제어주소 레지스터에 해당한다.
    tags: [microprogram-controller, control-address-register]

  - id: e18-21
    type: multiple-choice
    passageRefs: [g18-microprogram-controller-01]
    prompt: |
      다음과 같은 연산을 수행하려 할 때 그림에서 제어기억장치의 26개 비트에 대한 설명으로 잘못된 것은?
      $R4 \leftarrow 0,\ if(S=1)\ then(CAR \leftarrow 37)\ else(CAR \leftarrow CAR+1)$
    choices:
      - { id: '1', text: 1번~16번 비트는 마이크로연산 R4←0를 수행한다. }
      - { id: '2', text: '17번 비트는 (1)₂이어야 한다.' }
      - { id: '3', text: 18~20번 비트는 조건문 if(S=1)을 수행한다. }
      - { id: '4', text: 21~26번 비트는 주소 37번지를 나타낸다. }
    answers: ['2']
    explanation: |
      1~16번 비트는 처리장치 제어단어이고, 18~20번 비트는 조건 선택, 21~26번 비트는 분기 주소를 나타낸다.
      조건이 참일 때 내부 주소 37을 선택해야 하므로 17번 비트를 1이라고 단정한 설명이 잘못된 설명이다.
    tags: [microprogram-controller, conditional-branch]

  - id: e18-22
    type: multiple-choice
    passageRefs: [g18-control-processing-relation-01]
    prompt: 아래 그림은 컴퓨터의 두 가지 구성요소 사이의 상호관계를 보여주고 있다. 괄호 (A)와 (B)에 각각 들어갈 용어들을 순서대로 나열한 것은?
    choices:
      - { id: '1', text: 입력 데이터, 출력 데이터 }
      - { id: '2', text: 제어신호, 상태신호 }
      - { id: '3', text: 제어장치, 처리장치 }
      - { id: '4', text: 처리신호, 제어신호 }
    answers: ['2']
    explanation: |
      제어장치는 처리장치에 제어신호를 보내고, 처리장치는 자신의 상태를 상태신호로 제어장치에 되돌려 준다.
    tags: [control-unit, processing-unit, status-signal]

  - id: e18-23
    type: multiple-choice
    prompt: 다음 중 중앙처리장치에서 명령어의 연산 코드(OP code)가 보관되는데 사용되는 레지스터는?
    choices:
      - { id: '1', text: PC }
      - { id: '2', text: AC }
      - { id: '3', text: IR }
      - { id: '4', text: SP }
    answers: ['3']
    explanation: |
      명령어 레지스터(IR)는 가져온 명령어를 보관하며, 그 안에 연산 코드 필드가 포함된다.
    tags: [instruction-register, opcode]

  - id: e18-24
    type: multiple-choice
    prompt: |
      다음과 같은 일련의 마이크로연산은 명령어 사이클 중 어느 사이클인가?
      $T_0: MAR \leftarrow PC$
      $T_1: MBR \leftarrow M[MAR],\ PC \leftarrow PC+1$
      $T_2: IR \leftarrow MBR$
    choices:
      - { id: '1', text: 인출 사이클 }
      - { id: '2', text: 실행 사이클 }
      - { id: '3', text: 간접 사이클 }
      - { id: '4', text: 인터럽트 사이클 }
    answers: ['1']
    explanation: |
      PC가 가리키는 명령어를 기억장치에서 읽어 MBR을 거쳐 IR에 적재하는 과정은 명령어 인출 사이클이다.
    tags: [instruction-cycle, fetch-cycle]

  - id: e18-25
    type: multiple-choice
    prompt: |
      다음과 같은 일련의 마이크로연산은 무엇을 수행하는 것인가?
      $T_0: MAR \leftarrow IR(adrs)$
      $T_1: MBR \leftarrow AC$
      $T_2: M[MAR] \leftarrow MBR$
    choices:
      - { id: '1', text: LOAD 명령어 }
      - { id: '2', text: STORE 명령어 }
      - { id: '3', text: AND 명령어 }
      - { id: '4', text: ADD 명령어 }
    answers: ['2']
    explanation: |
      명령어 주소 필드가 가리키는 기억장소에 AC의 내용을 저장하므로 STORE 명령어의 실행 과정이다.
    tags: [instruction-cycle, store-instruction]

  - id: e18-26
    type: multiple-choice
    prompt: 다음 중 SP(Stack Pointer)의 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 비트 수는 기억장치의 용량에 따라 결정된다. }
      - { id: '2', text: 다음에 수행되어질 명령어가 들어있는 주소를 갖고 있다. }
      - { id: '3', text: PC(Program Counter)와 동일한 비트수를 갖는다. }
      - { id: '4', text: 스택 공간의 최상위 주소를 갖고 있다. }
    answers: ['2']
    explanation: |
      다음에 수행할 명령어의 주소를 보관하는 레지스터는 PC이다.
      SP는 스택의 최상위 위치를 가리키는 포인터이다.
    tags: [stack-pointer, program-counter]

  - id: e18-27
    type: multiple-choice
    prompt: 다음 설명에서 괄호 안에 들어갈 용어로 적절한 것은? 명령어 사이클 중 (가)은 기억장치로부터 명령어를 가져오는 것을 말한다. 이때 가져올 명령어의 주소는 (나)에 들어 있다.
    choices:
      - { id: '1', text: '(가) 제어 사이클, (나) 명령어 레지스터' }
      - { id: '2', text: '(가) 인출 사이클, (나) 데이터 레지스터' }
      - { id: '3', text: '(가) 실행 사이클, (나) 스택 포인터' }
      - { id: '4', text: '(가) 인출 사이클, (나) 프로그램 카운터' }
    answers: ['4']
    explanation: |
      기억장치에서 명령어를 가져오는 단계는 인출 사이클이고, 가져올 명령어의 주소는 프로그램 카운터 PC에 들어 있다.
    tags: [instruction-cycle, fetch-cycle, program-counter]

  - id: e18-28
    type: multiple-choice
    prompt: 다음 중 기억장치와 그 특성을 연결한 것으로 올바른 것은?
    choices:
      - { id: '1', text: 연관기억장치 - memory 공간 확대 }
      - { id: '2', text: 가상기억장치 - memory access 속도 증가 }
      - { id: '3', text: 캐시기억장치 - memory access 속도 증가 }
      - { id: '4', text: 복수모듈기억장치 - memory 공간 확대 }
    answers: ['3']
    explanation: |
      캐시기억장치는 CPU와 주기억장치 사이의 속도 차이를 줄여 평균 기억장치 접근 시간을 낮추는 데 사용된다.
    tags: [cache-memory, memory-hierarchy]

  - id: e18-29
    type: multiple-choice
    prompt: 기억장치에 기억되어 있는 데이터를 이용하여 기억장치에 접근할 수 있기 때문에 내용 주소화 기억장치(CAM; Content Addressable Memory)라고도 불리는 기억장치는?
    choices:
      - { id: '1', text: 연관기억장치 }
      - { id: '2', text: 복수모듈기억장치 }
      - { id: '3', text: 가상기억장치 }
      - { id: '4', text: 캐시기억장치 }
    answers: ['1']
    explanation: |
      CAM은 주소가 아니라 저장된 내용으로 검색하는 기억장치이며, 연관기억장치라고도 한다.
    tags: [associative-memory, cam]

  - id: e18-30
    type: multiple-choice
    passageRefs: [g18-memory-descriptions-01]
    prompt: 위에서 복수모듈기억장치를 설명하고 있는 것은?
    choices:
      - { id: '1', text: A }
      - { id: '2', text: B }
      - { id: '3', text: C }
      - { id: '4', text: D }
    answers: ['4']
    explanation: |
      복수모듈기억장치는 여러 모듈을 이용해 한 기억장치 사이클 동안 여러 단어를 읽을 수 있게 하여 접근 효율을 높인다.
      이 설명은 D에 해당한다.
    tags: [interleaved-memory, memory-module]

  - id: e18-31
    type: multiple-choice
    passageRefs: [g18-memory-descriptions-01]
    prompt: 위에서 캐시기억장치를 설명하고 있는 것은?
    choices:
      - { id: '1', text: A }
      - { id: '2', text: B }
      - { id: '3', text: C }
      - { id: '4', text: D }
    answers: ['3']
    explanation: |
      캐시기억장치는 CPU와 주기억장치 사이의 속도 차이를 줄이기 위해 주기억장치보다 빠른 기억소자로 구성된다.
      이 설명은 C에 해당한다.
    tags: [cache-memory, memory-hierarchy]

  - id: e18-32
    type: multiple-choice
    prompt: 다음 중 버스의 중재에 있어서 우선순위를 정하는 방법으로 외부의 하드웨어 회로를 이용하는 방식은?
    choices:
      - { id: '1', text: 데이지 체인방식 }
      - { id: '2', text: 핸드쉐이킹 방식 }
      - { id: '3', text: 입출력 제어방식 }
      - { id: '4', text: 프로그램 제어방식 }
    answers: ['1']
    explanation: |
      데이지 체인 방식은 하드웨어적으로 연결된 우선순위 체인을 통해 버스 사용권을 중재한다.
    tags: [bus-arbitration, daisy-chain]

  - id: e18-33
    type: multiple-choice
    prompt: 다음 중 입출력장치 인터페이스에 포함되어야 하는 하드웨어가 아닌 것은?
    choices:
      - { id: '1', text: 데이터 버퍼 }
