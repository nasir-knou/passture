subjectId: computer-architecture
sourceId: past-exams-2017
title: 컴퓨터구조 2017 기말
kind: exam
year: 2017

passages:
  - id: g17-accumulator-program-01
    type: code
    language: text
    body: |
      LOAD A ; AC <- M[A]
      ADD B  ; AC <- AC + M[B]
      STORE X; M[X] <- AC
      LOAD C ; AC <- M[C]
      MUL X  ; AC <- AC x M[X]
      STORE X; (f)
  - id: g17-addressing-context-01
    type: text
    body: |
      어느 순간의 기억장치와 PC, 레지스터 상태는 다음과 같다.

      - PC = 256
      - R1 = 400
      - 256번지: 연산코드, 주소방식
      - 257번지: ADRS, NBR=500
      - 258번지: 다음 명령어
      - 400번지: 800
      - 500번지: 818
      - 756번지: 502
      - 757번지: 600
      - 758번지: 700
      - 800번지: 300
      - 818번지: 456
      - 900번지: 458

      PC의 현재 내용은 256이며 256번지에 있는 컴퓨터 명령어를 수행한다.
      명령어의 연산코드는 해당 피연산자를 AC에 적재하라는 것이고 주소 필드의 값은 500이다.
      주소지정방식이 레지스터를 사용할 경우 레지스터 R1을 사용한다고 가정한다.
  - id: g17-control-word-fields-01
    type: text
    body: |
      제어단어의 각 필드는 다음과 같이 배치되어 있다.
      - A: 1~3번 비트
      - B: 4~6번 비트
      - D: 7~9번 비트
      - F: 10~13번 비트
      - H: 14~16번 비트
  - id: g17-processing-unit-block-01
    type: text
    body: |
      처리장치 블록도 구성:
      - 레지스터 세트는 출력 선택 C, 도착 레지스터 선택 D, 기능 선택 E와 연결된다.
      - (가)는 레지스터 세트 출력 쪽에서 내부버스 구성에 쓰이는 장치이다.
      - (나)는 상태비트를 보관하는 장치이다.
      - MUX A와 MUX B는 (다) 장치의 입력을 선택한다.
      - (다)는 산술논리연산을 수행하는 ALU이다.
      - (라)는 (다)의 결과를 받아 출력 데이터 또는 레지스터 세트 입력 방향으로 전달하는 시프터이다.
  - id: g17-microprogram-controller-01
    type: text
    body: |
      마이크로프로그램 제어기 블록도 구성:
      - MUX1은 내부 주소와 외부 주소 중 하나를 선택해 (가)로 보낸다.
      - (가)는 제어주소 레지스터이며 제어기억장치 ROM의 주소를 지정한다.
      - 제어기억장치 ROM의 전체 워드 폭은 27비트이고 주소 입력은 7비트이다.
      - (나)는 제어기억장치 ROM 내부의 제어단어 또는 마이크로명령어 영역이다.
      - 1~16번 비트는 처리장치를 제어하는 제어단어 영역이다.
      - 17번 비트는 MUX1 선택과 관련되고, 18~20번 비트는 조건 선택과 관련되며, 21~27번 비트는 다음 주소를 나타낸다.
      - MUX2는 상태비트 0, 1, C, C', Z, Z', S, V 중 하나를 선택한다.
      - (다)는 처리장치이며 16비트 입력 데이터를 받아 처리한다.
      - (마)는 MUX2의 선택 결과로 만들어지는 제어신호이다.

questions:
  - id: e17-01
    type: multiple-choice
    prompt: 다음 중 컴퓨터 명령어를 구성하는 연산코드 필드(OP code field)에 대한 설명으로 가장 적절한 것은?
    choices:
      - { id: '1', text: 기억장치 주소 혹은 처리장치 레지스터를 선택하기 위한 필드이다. }
      - { id: '2', text: 중앙처리장치에서 수행할 연산을 지정하는 필드이다. }
      - { id: '3', text: 명령어의 주소지정방식을 지정하는 필드이다. }
      - { id: '4', text: 인터럽트 요청을 위한 제어 필드이다. }
    answers: ['2']
    explanation: |
      연산코드 필드는 중앙처리장치가 수행해야 할 연산의 종류를 지정한다.
    tags: [instruction-format, opcode]

  - id: e17-02
    type: multiple-choice
    prompt: 다음 컴퓨터 명령어 `ADD X`에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 2-주소 컴퓨터 명령어이다. }
      - { id: '2', text: 데이터 전송을 위한 컴퓨터 명령어이다. }
      - { id: '3', text: 컴퓨터의 내부구조로 볼 때 누산기를 이용하는 컴퓨터 명령어이다. }
      - { id: '4', text: 컴퓨터의 내부구조로 볼 때 다중 레지스터를 이용하는 컴퓨터 명령어이다. }
    answers: ['3']
    explanation: |
      `ADD X`는 하나의 주소 X를 명시하고 누산기 AC를 묵시적으로 사용하는 1-주소형 명령어로 볼 수 있다.
    tags: [accumulator, instruction-format]

  - id: e17-03
    type: multiple-choice
    passageRefs: [g17-accumulator-program-01]
    prompt: 위의 프로그램은 다음 중 어느 수식을 계산하는 것인가?
    choices:
      - { id: '1', text: X = (A + B) x C }
      - { id: '2', text: X = C x (A x B) }
      - { id: '3', text: X = (A + B) / C }
      - { id: '4', text: X = (A x B) + C }
    answers: ['1']
    explanation: |
      먼저 A+B를 계산해 X에 저장하고, 이후 C와 X를 곱해 다시 X에 저장하므로 X=(A+B)xC가 된다.
    tags: [accumulator, program-trace]

  - id: e17-04
    type: multiple-choice
    passageRefs: [g17-accumulator-program-01]
    prompt: 프로그램에서 (f)의 괄호 안에 들어갈 식으로 알맞은 것은?
    choices:
      - { id: '1', text: 'M[X] <- AC x AC' }
      - { id: '2', text: 'AC <- AC x M[X]' }
      - { id: '3', text: 'AC <- M[X]' }
      - { id: '4', text: 'M[X] <- AC' }
    answers: ['4']
    explanation: |
      `STORE X`는 AC의 값을 기억장치 X에 저장하는 명령이므로 M[X] <- AC가 들어간다.
    tags: [store-instruction, accumulator]

  - id: e17-05
    type: multiple-choice
    prompt: 다음 중 산술연산에서 두수를 가산할 때 결과를 저장할 수 있는 레지스터의 자릿수가 모자라는 경우에 발생하는 에러를 저장하는 상태 레지스터의 플래그(flag)는?
    choices:
      - { id: '1', text: sign bit }
      - { id: '2', text: zero bit }
      - { id: '3', text: overflow bit }
      - { id: '4', text: carry bit }
    answers: ['3']
    explanation: |
      연산 결과가 표현 가능한 자릿수 범위를 넘는 상황은 오버플로우이며 overflow bit로 표시한다.
    tags: [flag-register, overflow-bit]

  - id: e17-06
    type: multiple-choice
    prompt: |
      다음 마이크로 연산에 관한 설명으로 잘못된 것은?
      $T_1+T_2: R0 \leftarrow \overline{R2}+1,\ R3 \leftarrow R4 \wedge R5$
    choices:
      - { id: '1', text: '$T_1+T_2$은 두 변수의 OR 연산이다.' }
      - { id: '2', text: R0에는 R2의 2의 보수가 저장된다. }
      - { id: '3', text: R0에는 R2의 1의 보수가 저장된다. }
      - { id: '4', text: R3에는 R4와 R5의 논리 곱 연산 결과가 저장된다. }
    answers: ['3']
    explanation: |
      $\overline{R2}+1$은 R2의 2의 보수를 의미한다.
      1의 보수만 저장된다고 한 설명이 잘못되었다.
    tags: [microoperation, twos-complement]

  - id: e17-07
    type: multiple-choice
    passageRefs: [g17-addressing-context-01]
    prompt: 즉시 주소지정방식과 직접 주소지정방식을 이용한다면 각각 어떤 값이 AC에 적재될 것인가?
    choices:
      - { id: '1', text: '257, 500' }
      - { id: '2', text: '456, 256' }
      - { id: '3', text: '500, 456' }
      - { id: '4', text: '500, 818' }
    answers: ['4']
    explanation: |
      즉시 주소지정방식에서는 주소 필드 값 500 자체가 적재되고, 직접 주소지정방식에서는 M[500]=818이 적재된다.
    tags: [addressing-mode, immediate-addressing, direct-addressing]

  - id: e17-08
    type: multiple-choice
    passageRefs: [g17-addressing-context-01]
    prompt: 간접 주소지정방식과 상대 주소지정방식을 이용한다면 각각의 유효주소는?
    choices:
      - { id: '1', text: '818, 758' }
      - { id: '2', text: '818, 700' }
      - { id: '3', text: '500, 818' }
      - { id: '4', text: '500, 256' }
    answers: ['1']
    explanation: |
      간접 주소지정방식의 유효주소는 M[500]=818이다.
      상대 주소지정방식은 다음 명령어 주소 258에 주소 필드 500을 더해 유효주소 758을 만든다.
    tags: [indirect-addressing, relative-addressing]

  - id: e17-09
    type: multiple-choice
    passageRefs: [g17-addressing-context-01]
    prompt: 인덱스된 주소지정방식과 레지스터 간접 주소지정방식을 이용한다면 각각의 유효주소는?
    choices:
      - { id: '1', text: '400, 500' }
      - { id: '2', text: '458, 500' }
      - { id: '3', text: '500, 400' }
      - { id: '4', text: '900, 400' }
    answers: ['4']
    explanation: |
      인덱스된 주소지정방식에서는 주소 필드 500에 R1의 내용 400을 더해 유효주소 900이 된다.
      레지스터 간접 주소지정방식의 유효주소는 R1의 내용인 400이다.
    tags: [indexed-addressing, register-indirect-addressing]

  - id: e17-10
    type: multiple-choice
    prompt: 다음 중 내부 버스에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 기억장치와 중앙처리장치 사이의 데이터 전송을 위한 공통 선로의 집합이다. }
      - { id: '2', text: 중앙처리장치 내부에서 정보를 전달할 수 있는 통로이다. }
      - { id: '3', text: 멀티플렉서와 인코더를 이용하여 구성할 수 있다. }
      - { id: '4', text: 입출력장치들을 내부적으로 연결할 수 있는 통로이다. }
    answers: ['2']
    explanation: |
      내부 버스는 중앙처리장치 내부의 레지스터와 연산장치 등 사이에서 정보를 전달하는 통로이다.
    tags: [internal-bus, cpu-datapath]

  - id: e17-11
    type: multiple-choice
    passageRefs: [g17-control-word-fields-01]
    prompt: 각 필드에 관한 설명 중에서 부적절한 것은?
    choices:
      - { id: '1', text: A와 B는 출발 레지스터를 선택하는 필드이다. }
      - { id: '2', text: D는 도착 레지스터를 선택하는 필드이다. }
      - { id: '3', text: F는 ALU에서 수행되는 연산의 하나를 선택하는 필드이다. }
      - { id: '4', text: H는 상태 레지스터의 상태 값을 선택하는 필드이다. }
    answers: ['4']
    explanation: |
      H 필드는 상태 레지스터 값 선택이 아니라 시프터에서 수행할 연산을 선택하는 필드로 쓰인다.
    tags: [control-word, datapath-control]

  - id: e17-12
    type: multiple-choice
    passageRefs: [g17-control-word-fields-01]
    prompt: 위의 제어단어로부터 알 수 있는 사실로서 적절한 것은?
    choices:
      - { id: '1', text: A가 3비트이므로 외부 입력까지 고려한다면 레지스터 세트에는 최대한 8개의 레지스터가 포함될 수 있다. }
      - { id: '2', text: D가 3비트이므로 외부 출력까지 고려한다면 레지스터 세트에는 최대한 7개의 레지스터가 포함될 수 있다. }
      - { id: '3', text: F가 4비트이므로 시프터에서 이루어지는 연산의 종류가 최대한 16개이다. }
      - { id: '4', text: H가 3비트이므로 최대 8개의 상태 값이 존재한다. }
    answers: ['2']
    explanation: |
      D 필드가 3비트이면 8개 선택이 가능하지만, 외부 출력 선택까지 포함하면 레지스터 선택에는 최대 7개를 배정할 수 있다.
    tags: [control-word, bit-width]

  - id: e17-13
    type: multiple-choice
    passageRefs: [g17-processing-unit-block-01]
    prompt: 중앙처리장치에서 내부버스를 구성하는 방법은 멀티플렉서와 (㉠)를 이용한다. 여기서 앞의 괄호 안의 ㉠에 해당되는 장치는 위의 그림에서 어디인가?
    choices:
      - { id: '1', text: 가 }
      - { id: '2', text: 나 }
      - { id: '3', text: 다 }
      - { id: '4', text: 라 }
    answers: ['1']
    explanation: |
      내부버스는 멀티플렉서와 3상태 버퍼 등을 이용해 구성할 수 있으며, 그림에서는 레지스터 출력 쪽의 (가)에 해당한다.
    tags: [internal-bus, tristate-buffer]

  - id: e17-14
    type: multiple-choice
    passageRefs: [g17-processing-unit-block-01]
    prompt: 그림의 (나)에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 출발 레지스터의 내용을 ALU로 보내는데 필요하다. }
      - { id: '2', text: 도착 레지스터를 결정하는데 필요하다. }
      - { id: '3', text: 상태비트를 보관하는데 필요하다. }
      - { id: '4', text: ALU의 결과를 비트 단위의 이동을 위해 필요하다. }
    answers: ['3']
    explanation: |
      (나)는 연산 결과의 상태비트를 보관하는 상태 레지스터 또는 플래그 레지스터에 해당한다.
    tags: [processing-unit, flag-register]

  - id: e17-15
    type: multiple-choice
    passageRefs: [g17-processing-unit-block-01]
    prompt: 위 그림에서 레지스터 세트에 15개의 레지스터가 있고, (다)는 21개의 연산, (라)는 7개의 연산을 수행한다고 가정했을 때 제어단어는 총 몇 비트가 되겠는가?
    choices:
      - { id: '1', text: '20' }
      - { id: '2', text: '22' }
      - { id: '3', text: '23' }
      - { id: '4', text: '24' }
    answers: ['1']
    explanation: |
      15개 레지스터 선택에는 A, B, D 각각 4비트가 필요하므로 12비트이다.
      21개 ALU 연산은 5비트, 7개 시프터 연산은 3비트가 필요하므로 총 20비트이다.
    tags: [control-word, bit-width]

  - id: e17-16
    type: multiple-choice
    prompt: 다음 중 시프트 마이크로연산의 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 레지스터 내의 데이터를 시프트시키는 연산이다. }
      - { id: '2', text: 데이터의 측면이동에 사용된다. }
      - { id: '3', text: 연산의 종류로는 가산 시프트와 감산 시프트가 있다. }
      - { id: '4', text: 왼쪽과 오른쪽 쉬프트에 있어서 입력비트는 0으로 가정한다. }
    answers: ['3']
    explanation: |
      시프트 마이크로연산은 논리 시프트, 순환 시프트, 산술 시프트 등으로 구분한다.
      가산 시프트와 감산 시프트는 일반적인 시프트 연산 종류가 아니다.
    tags: [shift-microoperation]

  - id: e17-17
    type: multiple-choice
    passageRefs: [g17-microprogram-controller-01]
    prompt: 그림에서 (마)에 들어갈 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 상태비트 }
      - { id: '2', text: 제어신호 }
      - { id: '3', text: 제어단어 }
      - { id: '4', text: 선택비트 }
    answers: ['1']
    explanation: |
      MUX2는 여러 상태비트 중 하나를 선택하므로, (마)는 조건 판단에 사용되는 상태비트와 관련된다.
    tags: [microprogram-controller, status-bit]

  - id: e17-18
    type: multiple-choice
    passageRefs: [g17-microprogram-controller-01]
    prompt: 그림에서 만일 MUX1에서 (가)로 입력되는 데이터가 8비트이고 다른 것은 변동이 없다면 (나)는 어떻게 바뀌는가?
    choices:
      - { id: '1', text: '64 x 26' }
      - { id: '2', text: '128 x 27' }
      - { id: '3', text: '256 x 28' }
      - { id: '4', text: '512 x 28' }
    answers: ['3']
    explanation: |
      주소 입력이 8비트이면 제어기억장치의 행 수는 2^8=256개가 된다.
      다음 주소 필드도 8비트가 되어 기존 27비트 워드 폭에서 1비트가 늘어난 28비트가 된다.
    tags: [microprogram-controller, control-memory]

  - id: e17-19
    type: multiple-choice
    passageRefs: [g17-microprogram-controller-01]
    prompt: 그림에서 (가)와 (다)에 들어갈 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 처리장치, 제어장치 }
      - { id: '2', text: 시프터, 제어주소 레지스터 }
      - { id: '3', text: 제어주소 레지스터, 처리장치 }
      - { id: '4', text: 산술논리연산장치, 중앙처리장치 }
    answers: ['3']
    explanation: |
      MUX1 출력이 들어가는 (가)는 제어주소 레지스터이고, 16비트 제어단어를 받는 (다)는 처리장치이다.
    tags: [microprogram-controller, control-address-register, processing-unit]

  - id: e17-20
    type: multiple-choice
    passageRefs: [g17-microprogram-controller-01]
    prompt: |
      다음과 같은 연산을 수행하려 할 때 그림에서 제어기억장치의 27개 비트에 대한 설명으로 잘못된 것은?
      $R5 \leftarrow R6+R3,\ if(C=0)\ then(CAR \leftarrow 62)\ else(CAR \leftarrow CAR+1)$
    choices:
      - { id: '1', text: 1번~16번 비트는 마이크로연산 R5←R6+R3를 수행한다. }
      - { id: '2', text: '17번 비트는 (0)₂이어야 한다.' }
      - { id: '3', text: 18~20번 비트는 캐리의 상태에 따라 결정된다. }
      - { id: '4', text: 21~27번 비트는 조건문 if(C=0)를 수행한다. }
    answers: ['4']
    explanation: |
      21~27번 비트는 분기 주소 62를 나타내는 다음 주소 필드이다.
      조건 선택은 18~20번 비트가 담당하므로 21~27번 비트가 조건문을 수행한다는 설명이 잘못되었다.
    tags: [microprogram-controller, conditional-branch]

  - id: e17-21
    type: multiple-choice
    prompt: 다음 중 마이크로프로그램에 관한 설명으로 부적절한 것은?
    choices:
      - { id: '1', text: 마이크로명령어를 이용해서 작성된 프로그램을 말한다. }
      - { id: '2', text: 펌웨어라고도 한다. }
      - { id: '3', text: 소프트웨어 프로그램을 작성하는 것보다 용이하다. }
      - { id: '4', text: 마이크로프로그램이 하드웨어와 소프트웨어의 중간 정도임을 의미한다. }
    answers: ['3']
    explanation: |
      마이크로프로그램은 하드웨어 제어를 위한 낮은 수준의 프로그램으로, 일반 소프트웨어 작성보다 쉽다고 보기는 어렵다.
    tags: [microprogram, firmware]

  - id: e17-22
    type: multiple-choice
    prompt: 다음 설명에서 괄호 안에 들어갈 용어로 적절한 것은? 명령어 사이클 중 (가)은 기억장치로부터 명령어를 가져오는 것을 말한다. 이때 가져올 명령어의 주소는 (나)에 들어 있다.
    choices:
      - { id: '1', text: '(가) 제어 사이클, (나) 명령어 레지스터' }
      - { id: '2', text: '(가) 인출 사이클, (나) 데이터 레지스터' }
      - { id: '3', text: '(가) 실행 사이클, (나) 스택 포인터' }
      - { id: '4', text: '(가) 인출 사이클, (나) 프로그램 카운터' }
    answers: ['4']
    explanation: |
      기억장치에서 명령어를 가져오는 단계는 인출 사이클이고, 가져올 명령어의 주소는 프로그램 카운터 PC에 들어 있다.
    tags: [instruction-cycle, fetch-cycle, program-counter]

  - id: e17-23
    type: multiple-choice
    prompt: |
      다음과 같은 일련의 마이크로연산은 무엇을 수행하는 것인가?
      $T_0: MAR \leftarrow IR(adrs)$
      $T_1: MBR \leftarrow M[MAR]$
      $T_2: AC \leftarrow AC + MBR$
    choices:
      - { id: '1', text: LOAD 명령어 }
      - { id: '2', text: AND 명령어 }
      - { id: '3', text: STORE 명령어 }
      - { id: '4', text: ADD 명령어 }
    answers: ['4']
    explanation: |
      명령어 주소 필드가 가리키는 기억장치 값을 읽어 AC에 더하므로 ADD 명령어의 실행 과정이다.
    tags: [instruction-cycle, add-instruction]

  - id: e17-24
    type: multiple-choice
    prompt: 다음 중 CPU에 있는 레지스터에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 레지스터는 데이터의 임시 저장장소로서 컴퓨터의 기억장치 중에서 액세스 속도가 가장 빠르다. }
      - { id: '2', text: 다음에 수행해야 할 명령어가 저장된 기억장치주소를 저장하는 레지스터는 누산기이다. }
      - { id: '3', text: 명령어 레지스터는 오퍼랜드나 연산결과를 일시적으로 저장한다. }
      - { id: '4', text: 스택 포인터는 특수 레지스터로서 스택 영역에 들어 있는 데이터를 저장한다. }
    answers: ['1']
    explanation: |
      CPU 레지스터는 CPU 내부의 고속 임시 저장장소이다.
      다음 명령어 주소는 PC가 저장하고, 명령어 레지스터는 명령어 자체를 저장한다.
    tags: [cpu-register]

  - id: e17-25
    type: multiple-choice
    prompt: 다음 중 PC(Program Counter)의 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 다음에 수행되어질 명령어가 들어있는 주소를 갖고 있다. }
      - { id: '2', text: 비트 수는 기억장치의 용량에 따라 결정된다. }
      - { id: '3', text: 현재의 데이터를 인출한 후에는 자동적으로 1 증가한다. }
      - { id: '4', text: 스택 공간의 최상위 주소를 갖고 있다. }
    answers: ['4']
    explanation: |
      스택 공간의 최상위 주소를 가리키는 것은 스택 포인터 SP이다.
      PC는 다음에 인출할 명령어의 주소를 가진다.
    tags: [program-counter, stack-pointer]

  - id: e17-26
    type: multiple-choice
    prompt: 다음 설명에서 괄호 안에 들어갈 용어로서 올바른 것은? 명령어 실행 사이클은 명령어를 실행하는 단계로서 ( )에 실린 명령어를 해독하고, 해독한 명령어에 따라 필요한 연산이 수행되는 과정이다.
    choices:
      - { id: '1', text: 프로그램 카운터 }
      - { id: '2', text: 명령어 레지스터 }
      - { id: '3', text: 메모리 주소 레지스터 }
      - { id: '4', text: 누산기 }
    answers: ['2']
    explanation: |
      실행 사이클에서는 인출되어 명령어 레지스터(IR)에 저장된 명령어를 해독하고 수행한다.
    tags: [instruction-cycle, instruction-register]

  - id: e17-27
    type: multiple-choice
    prompt: 다음의 내용과 관계가 깊은 것은? "어떤 내용을 참조하면, 그 내용에 가까운 곳에 있는 다른 내용을 참조하기 쉽다."
    choices:
      - { id: '1', text: 공간적 지역성 }
      - { id: '2', text: 시간적 지역성 }
      - { id: '3', text: 내부적 참조성 }
      - { id: '4', text: 외부적 참조성 }
    answers: ['1']
    explanation: |
      가까운 주소나 위치의 데이터가 함께 참조되는 경향은 공간적 지역성이다.
    tags: [locality, spatial-locality]

  - id: e17-28
    type: multiple-choice
    prompt: 다음 중 캐시기억장치와 주기억장치 사이의 데이터 교환을 일컫는 용어는?
    choices:
      - { id: '1', text: blocking }
      - { id: '2', text: mapping }
      - { id: '3', text: paging }
      - { id: '4', text: buffering }
    answers: ['2']
    explanation: |
      캐시와 주기억장치 사이에서 어느 블록을 어느 캐시 위치에 대응시킬지를 정하는 것을 매핑이라고 한다.
    tags: [cache-memory, mapping]

  - id: e17-29
    type: multiple-choice
    prompt: 다음의 기억장치를 기억용량의 크기 순서로 나열한 것은?
    choices:
      - { id: '1', text: '보조기억장치 - 주기억장치 - 캐시기억장치 - 레지스터' }
      - { id: '2', text: '보조기억장치 - 캐시기억장치 - 레지스터 - 주기억장치' }
      - { id: '3', text: '주기억장치 - 보조기억장치 - 캐시기억장치 - 레지스터' }
      - { id: '4', text: '레지스터 - 주기억장치 - 캐시기억장치 - 보조기억장치' }
    answers: ['1']
    explanation: |
      일반적인 기억장치 계층에서 용량은 보조기억장치, 주기억장치, 캐시기억장치, 레지스터 순으로 작아진다.
    tags: [memory-hierarchy]

  - id: e17-30
    type: multiple-choice
    prompt: 다음 중 주기억장치의 성능을 평가하는 단위로 사용되지 않는 것은?
    choices:
      - { id: '1', text: 기억 용량 }
      - { id: '2', text: 기억 소자 }
      - { id: '3', text: 사이클 타임 }
      - { id: '4', text: 액세스 타임 }
    answers: ['2']
    explanation: |
      기억 용량, 사이클 타임, 액세스 타임은 주기억장치 성능 평가 지표로 쓰인다.
      기억 소자는 구성 요소이지 성능 평가 단위로 보기 어렵다.
    tags: [main-memory, performance-metric]

  - id: e17-31
    type: multiple-choice
    prompt: 다음의 단어와 가장 관계가 깊은 기억장치는? '물리주소', '희생페이지', '세그먼트', '페이지'
    choices:
      - { id: '1', text: 가상기억장치 }
      - { id: '2', text: 캐시기억장치 }
      - { id: '3', text: 주기억장치 }
      - { id: '4', text: 연관기억장치 }
    answers: ['1']
    explanation: |
      물리주소, 페이지, 세그먼트, 희생페이지는 가상기억장치 관리와 관련된 용어이다.
    tags: [virtual-memory]

  - id: e17-32
    type: multiple-choice
    prompt: 다음 중 컴퓨터 내부장치와 입출력 장치의 차이점이 아닌 것은?
    choices:
      - { id: '1', text: 데이터 전송속도의 차이 }
      - { id: '2', text: 데이터 처리단위의 차이 }
      - { id: '3', text: 에러율의 차이 }
      - { id: '4', text: 데이터 신호 종류의 차이 }
    answers: ['4']
    explanation: |
      내부장치와 입출력장치의 차이로는 전송속도, 처리단위, 에러율 등이 주로 거론된다.
      데이터 신호 종류의 차이는 일반적인 핵심 차이점으로 보기 어렵다.
    tags: [io-system]

  - id: e17-33
    type: multiple-choice
    prompt: 다음 중 입출력시스템에서 버스의 사용을 중재하는 방법이 아닌 것은?
    choices:
      - { id: '1', text: 중앙집중식 병렬중재 방법 }
      - { id: '2', text: 우선순위 인코더 방법 }
      - { id: '3', text: 폴링 중재 방법 }
      - { id: '4', text: 데이지 체인 방법 }
    answers: ['2']
    explanation: |
      중앙집중식 병렬중재, 폴링 중재, 데이지 체인은 버스 중재 방식으로 다룬다.
      우선순위 인코더는 중재 회로의 구성 요소로 볼 수 있지만 독립적인 버스 중재 방법명으로는 부적절하다.
    tags: [bus-arbitration]

  - id: e17-34
    type: multiple-choice
    prompt: 다음 중 중앙처리장치의 개입 없이 주기억장치에 직접 접근하여 입출력을 행하는 방식으로 사이클 요청(memory cycle request) 신호가 사용되는 방식은?
    choices:
      - { id: '1', text: DMA 제어 }
      - { id: '2', text: 핸드쉐이킹 제어 }
      - { id: '3', text: 스트로브 제어 }
      - { id: '4', text: 중앙처리장치 제어 }
    answers: ['1']
    explanation: |
      DMA는 CPU 개입 없이 입출력 장치와 주기억장치 사이의 직접 전송을 수행하며 메모리 사이클 요청 신호를 사용한다.
    tags: [dma, io-control]

  - id: e17-35
    type: multiple-choice
    prompt: 다음 중 병렬처리를 수행하는 시스템이 아닌 것은?
    choices:
      - { id: '1', text: pipeline processor }
      - { id: '2', text: array processor }
      - { id: '3', text: multiple processor }
      - { id: '4', text: I/O processor }
    answers: ['4']
    explanation: |
      파이프라인 처리기, 배열 처리기, 다중 처리기는 병렬처리 구조와 관계가 깊다.
      I/O processor는 입출력 처리를 담당하는 장치로 병렬처리 시스템 분류로 보기 어렵다.
    tags: [parallel-processing, io-processor]
