subjectId: computer-architecture
sourceId: past-exams-2019
title: 컴퓨터구조 2019 기말
kind: exam
year: 2019

passages:
  - id: g19-accumulator-program-01
    type: code
    language: text
    body: |
      LOAD A ; (a)
      SUB B  ; AC <- AC - M[B]
      STORE X; M[X] <- AC
      LOAD C ; (d)
      MUL X  ; AC <- AC x M[X]
      STORE X; M[X] <- AC
  - id: g19-addressing-context-01
    type: text
    body: |
      어느 순간의 기억장치와 PC, 레지스터 상태는 다음과 같다.

      - PC = 256
      - R1 = 400
      - 256번지: 연산코드, 주소방식
      - 257번지: ADRS, NBR=500
      - 258번지: 다음 명령어
      - 400번지: 800
      - 500번지: 818
      - 756번지: 502
      - 758번지: 700
      - 800번지: 300
      - 818번지: 456

      PC의 현재 내용은 256이며, 256번지의 명령어를 수행한다.
      명령어의 연산코드는 해당 피연산자를 AC에 적재하라는 것이고 주소 필드의 값은 500이다.
      주소지정방식이 레지스터를 사용할 경우 레지스터 R1을 사용한다고 가정한다.
  - id: g19-processing-unit-block-01
    type: text
    body: |
      처리장치 블록도 구성:
      - 레지스터 세트는 출력 선택 C, 입력 선택 A, MUX B 선택 B와 연결된다.
      - (가)는 레지스터 세트의 출력 쪽에 있는 장치이다.
      - (나)는 레지스터 세트의 출력 중 하나를 ALU 입력 쪽으로 보내는 경로에 있다.
      - MUX A와 MUX B는 (다) 장치의 입력을 선택한다.
      - (다)는 MUX A, MUX B의 출력을 받아 연산 결과를 만든다.
      - (라)는 (다)의 결과를 받아 출력 데이터 또는 레지스터 세트 입력 방향으로 전달한다.
      - 필드 A, B, D, F, H는 각각 입력 선택, 버스 선택, 도착 레지스터 선택, 연산 선택, 상태/쉬프트 선택과 관련된다.
  - id: g19-microprogram-controller-01
    type: text
    body: |
      마이크로프로그램 제어기 블록도 구성:
      - MUX1은 외부주소와 ROM에서 되돌아오는 선택 주소 중 하나를 선택해 (가)로 보낸다.
      - (가)는 제어주소 레지스터 역할을 하며 제어기억장치 ROM의 주소를 보낸다.
      - 제어기억장치 ROM의 전체 워드 폭은 16비트이고 주소는 7비트이다.
      - (나)는 제어기억장치 ROM 내부의 제어단어 또는 마이크로명령어 영역이다.
      - ROM 출력 일부는 MUX1 선택, 조건 선택, 다음 주소, 입력 데이터 선택으로 되돌아간다.
      - MUX2는 상태비트 0, 1, C, C', Z, Z', S, V 중 하나를 선택한다.
      - (다)는 입력 데이터 레지스터, (라)는 출력 데이터와 연결된 16비트 데이터 경로이다.
      - (마)는 MUX2의 조건 선택 입력과 관련된 제어신호이다.
  - id: g19-memory-descriptions-01
    type: text
    body: |
      여러 기억장치의 설명:
      A. 저장되어 있는 데이터의 내용을 이용하여 원하는 데이터를 검색하여 읽어낼 수 있는 기억장치이다.
      B. 프로그램에서 사용할 수 있게 허용된 주소 공간의 크기보다 주기억장치의 크기가 작아서 보조기억장치의 일부까지 포함하는 기억장치이다.
      C. 주기억장치보다 속도가 빠른 기억소자로 구성되어 중앙처리장치와 주기억장치 간의 속도 차이를 줄여 준다.
      D. 하나의 기억장치 사이클 동안 여러 개의 단어를 읽을 수 있기 때문에 읽어 내는 속도를 향상시킨다.

questions:
  - id: e19-01
    type: multiple-choice
    prompt: 다음 중 컴퓨터 명령어를 구성하는 연산코드 필드(OP code field)에 대한 설명으로 가장 적절한 것은?
    choices:
      - { id: '1', text: 기억장치 주소 혹은 처리장치 레지스터를 선택하기 위한 필드이다. }
      - { id: '2', text: 명령어의 주소지정방식을 지정하는 필드이다. }
      - { id: '3', text: 중앙처리장치에서 수행할 연산을 지정하는 필드이다. }
      - { id: '4', text: 인터럽트 요청을 위한 제어 필드이다. }
    answers: ['3']
    explanation: |
      연산코드 필드는 명령어가 수행할 연산의 종류를 지정한다.
      주소나 레지스터 선택은 주소 필드 또는 피연산자 필드의 역할이고, 주소지정 방식은 별도의 모드 필드로 표현될 수 있다.
    tags: [instruction-format, opcode]

  - id: e19-02
    type: multiple-choice
    prompt: 다음 컴퓨터 명령어 `ADD X`에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 2-주소 컴퓨터 명령어이다. }
      - { id: '2', text: 데이터 전송을 위한 컴퓨터 명령어이다. }
      - { id: '3', text: 컴퓨터의 내부구조로 볼 때 누산기를 이용하는 컴퓨터 명령어이다. }
      - { id: '4', text: 컴퓨터의 내부구조로 볼 때 다중 레지스터를 이용하는 컴퓨터 명령어이다. }
    answers: ['3']
    explanation: |
      `ADD X`처럼 하나의 주소만 명시하는 명령어는 누산기 AC를 묵시적으로 사용하는 1-주소 형식으로 해석된다.
      이 경우 연산 결과도 누산기에 저장된다.
    tags: [accumulator, instruction-format]

  - id: e19-03
    type: multiple-choice
    passageRefs: [g19-accumulator-program-01]
    prompt: 위의 프로그램은 다음 중 어느 수식을 계산하는 것인가?
    choices:
      - { id: '1', text: X = (A + B) x C }
      - { id: '2', text: X = (A - B) x C }
      - { id: '3', text: X = (A + B) / C }
      - { id: '4', text: X = (A - B) + C }
    answers: ['2']
    explanation: |
      먼저 A를 AC에 적재하고 B를 빼서 A-B를 만든 뒤 X에 저장한다.
      이후 C를 AC에 적재하고 저장된 X, 즉 A-B를 곱해 다시 X에 저장하므로 결과는 X=(A-B)xC이다.
    tags: [accumulator, program-trace]

  - id: e19-04
    type: multiple-choice
    passageRefs: [g19-accumulator-program-01]
    prompt: 프로그램에서 (a)의 괄호 안에 들어갈 식으로 알맞은 것은?
    choices:
      - { id: '1', text: 'AC <- AC x M[X]' }
      - { id: '2', text: 'AC <- M[A]' }
      - { id: '3', text: 'AC <- M[X]' }
      - { id: '4', text: 'M[X] <- AC' }
    answers: ['2']
    explanation: |
      `LOAD A`는 기억장치 주소 A의 내용을 누산기 AC로 적재하는 명령이다.
      따라서 (a)에 들어갈 동작은 AC <- M[A]이다.
    tags: [load-instruction, accumulator]

  - id: e19-05
    type: multiple-choice
    passageRefs: [g19-accumulator-program-01]
    prompt: 위의 프로그램과 관계가 깊은 명령어 형식은?
    choices:
      - { id: '1', text: 3-주소 명령어 }
      - { id: '2', text: 2-주소 명령어 }
      - { id: '3', text: 1-주소 명령어 }
      - { id: '4', text: 0-주소 명령어 }
    answers: ['3']
    explanation: |
      각 명령어가 하나의 명시적 주소 A, B, X, C를 사용하고 누산기 AC를 묵시적으로 사용하므로 1-주소 명령어 형식과 관계가 깊다.
      0-주소 명령어는 스택 기반 명령어에 해당한다.
    tags: [one-address-instruction, accumulator]

  - id: e19-06
    type: multiple-choice
    prompt: 다음 중 컴퓨터 명령어와 컴퓨터의 내부구조와의 관계가 적절하게 연결된 것은?
    choices:
      - { id: '1', text: '0-주소 명령: 다중 레지스터를 이용한 구조' }
      - { id: '2', text: '1-주소 명령: 단일 누산기를 이용한 구조' }
      - { id: '3', text: '2-주소 명령: 스택을 이용한 구조' }
      - { id: '4', text: '3-주소 명령: 프로그램 카운터를 이용한 구조' }
    answers: ['2']
    explanation: |
      1-주소 명령어는 하나의 명시적 주소와 묵시적 누산기 AC를 사용하는 구조와 관계가 깊다.
      0-주소 명령어는 스택 구조, 2-주소 또는 3-주소 명령어는 다중 레지스터 구조와 더 관련된다.
    tags: [instruction-format, accumulator]

  - id: e19-07
    type: multiple-choice
    passageRefs: [g19-addressing-context-01]
    prompt: 직접 주소지정방식과 간접 주소지정방식을 이용한다면 각각의 유효주소는?
    choices:
      - { id: '1', text: '500, 400' }
      - { id: '2', text: '500, 818' }
      - { id: '3', text: '818, 456' }
      - { id: '4', text: '818, 900' }
    answers: ['2']
    explanation: |
      직접 주소지정방식에서는 주소 필드의 값 500이 유효주소이다.
      간접 주소지정방식에서는 주소 필드가 가리키는 500번지의 내용 818이 유효주소가 된다.
    tags: [addressing-mode, effective-address]

  - id: e19-08
    type: multiple-choice
    passageRefs: [g19-addressing-context-01]
    prompt: 간접 주소지정방식과 상대 주소지정방식을 이용한다면 각각 어떤 값이 AC에 적재될 것인가?
    choices:
      - { id: '1', text: '456, 502' }
      - { id: '2', text: '456, 700' }
      - { id: '3', text: '500, 818' }
      - { id: '4', text: '818, 456' }
    answers: ['2']
    explanation: |
      간접 주소지정방식의 유효주소는 M[500]=818이고, 따라서 AC에는 M[818]=456이 적재된다.
      상대 주소지정방식은 PC의 다음 주소 258에 주소 필드 500을 더해 유효주소 758을 만들며, AC에는 M[758]=700이 적재된다.
    tags: [addressing-mode, relative-addressing]

  - id: e19-09
    type: multiple-choice
    passageRefs: [g19-addressing-context-01]
    prompt: 인덱스된 주소지정방식과 레지스터 주소지정방식을 이용한다면 각각 어떤 값이 AC에 적재될 것인가?
    choices:
      - { id: '1', text: '458, 400' }
      - { id: '2', text: '500, 818' }
      - { id: '3', text: '800, 818' }
      - { id: '4', text: '900, 800' }
    answers: ['1']
    explanation: |
      인덱스된 주소지정방식에서는 주소 필드 500에 R1의 내용 400을 더해 유효주소 900을 만들고, AC에는 M[900]=458이 적재된다.
      레지스터 주소지정방식에서는 레지스터 R1의 내용 자체가 피연산자이므로 AC에는 400이 적재된다.
    tags: [indexed-addressing, register-addressing]

  - id: e19-10
    type: multiple-choice
    prompt: 아래 그림은 상태 레지스터의 구조를 나타낸 것이다. 그림에서 (가)에 들어갈 상태비트로서 적절한 것은?
    choices:
      - { id: '1', text: 부호 비트 }
      - { id: '2', text: 제로 비트 }
      - { id: '3', text: 캐리 비트 }
      - { id: '4', text: 오버플로우 비트 }
    answers: ['4']
    explanation: |
      상태 레지스터에는 산술논리연산 결과의 부호, 제로 여부, 캐리, 오버플로우와 같은 상태비트가 저장된다.
      그림에서 S와 Z 다음에 배치된 (가)는 연산 결과의 오버플로우 여부를 나타내는 비트이다.
    tags: [flag-register, overflow-bit]

  - id: e19-11
    type: multiple-choice
    prompt: 다음 중 내부 버스에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 중앙처리장치와 레지스터간의 데이터 전송을 위한 공통 선로의 집합이다. }
      - { id: '2', text: 멀티플렉서와 ALU를 이용해서 구성할 수 있다. }
      - { id: '3', text: 레지스터와 ALU를 이용해서 구성할 수 있다. }
      - { id: '4', text: 중앙처리장치 내부에서 정보를 전달할 수 있는 경로이다. }
    answers: ['4']
    explanation: |
      내부 버스는 CPU 내부 구성요소 사이에서 데이터와 제어 정보를 전달하는 경로이다.
      특정 구성요소 조합만을 뜻하기보다는 내부 정보 전달 통로라는 설명이 가장 적절하다.
    tags: [internal-bus, cpu-datapath]

  - id: e19-12
    type: multiple-choice
    prompt: |
      다음 마이크로 연산에 관한 설명으로 적절한 것은?
      $T_1+T_2: R0 \leftarrow R1+\overline{R2}+1,\ R3 \leftarrow R4 \vee R5$
    choices:
      - { id: '1', text: '$T_1+T_2$은 산술 마이크로 연산이다.' }
      - { id: '2', text: '$R0$에는 $R1-R2$의 결과가 저장된다.' }
      - { id: '3', text: 모두 세 가지 마이크로 연산이 수행된다. }
      - { id: '4', text: '$R3$에는 $R4$과 $R5$의 논리 곱 연산 결과가 저장된다.' }
    answers: ['2']
    explanation: |
      2의 보수에서 $R1+\overline{R2}+1$은 $R1-R2$를 의미한다.
      $R4 \vee R5$는 논리합 연산이므로 논리 곱이라고 한 선택지는 맞지 않는다.
    tags: [microoperation, twos-complement]

  - id: e19-13
    type: multiple-choice
    passageRefs: [g19-processing-unit-block-01]
    prompt: 중앙처리장치에서 내부버스를 구성하는 방법은 멀티플렉서와 (㉠)를 이용한다. 여기서 앞의 괄호 안의 ㉠에 해당되는 장치는 위의 그림에서 어디인가?
    choices:
      - { id: '1', text: 가 }
      - { id: '2', text: 나 }
      - { id: '3', text: 다 }
      - { id: '4', text: 라 }
    answers: ['1']
    explanation: |
      내부버스는 멀티플렉서와 3상태 버퍼 등을 이용해 구성할 수 있다.
      그림에서 레지스터 세트 출력 쪽의 (가)가 이 장치에 해당한다.
    tags: [internal-bus, tristate-buffer]

  - id: e19-14
    type: multiple-choice
    passageRefs: [g19-processing-unit-block-01]
    prompt: 위 그림에서 (나)에 관한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: 출발 레지스터의 내용을 ALU로 보내는데 필요하다. }
      - { id: '2', text: 도착 레지스터를 결정하는데 필요하다. }
      - { id: '3', text: 상태비트를 보관하는데 필요하다. }
      - { id: '4', text: ALU의 결과를 비트 단위의 이동을 위해 필요하다. }
    answers: ['3']
    explanation: |
      (나)는 상태 레지스터에 해당하며 연산 결과의 상태비트를 보관한다.
      출발 레지스터 선택, 도착 레지스터 선택, 쉬프트 동작은 각각 다른 경로와 필드의 역할이다.
    tags: [status-register, processing-unit]

  - id: e19-15
    type: multiple-choice
    passageRefs: [g19-processing-unit-block-01]
    prompt: 위 그림에서 레지스터 세트에 15개의 레지스터가 있고, (다)는 32개의 연산, (라)는 7개의 연산을 수행한다고 가정했을 때 제어단어는 총 몇 비트가 되겠는가?
    choices:
      - { id: '1', text: '20' }
      - { id: '2', text: '22' }
      - { id: '3', text: '23' }
      - { id: '4', text: '24' }
    answers: ['1']
    explanation: |
      15개 레지스터 선택에는 각 레지스터 선택 필드마다 4비트가 필요하고, A, B, D 세 필드에 12비트가 필요하다.
      32개 연산 선택에는 5비트, 7개 연산 선택에는 3비트가 필요하므로 총 $12+5+3=20$비트이다.
    tags: [control-word, datapath]

  - id: e19-16
    type: multiple-choice
    prompt: 다음 중 처리장치에 있는 각 구성요소의 선택신호를 설명하는 것으로 잘못된 것은?
    choices:
      - { id: '1', text: 처리장치에서 수행되는 마이크로연산을 선택하는 신호 }
      - { id: '2', text: 처리장치의 각 구성요소를 제어 }
      - { id: '3', text: 선택신호로서 특정 마이크로연산을 선택 }
      - { id: '4', text: 처리장치를 구동하는 클럭 신호 }
    answers: ['4']
    explanation: |
      선택신호는 처리장치의 구성요소나 마이크로연산을 선택하고 제어하는 신호이다.
      클럭 신호는 동기화를 위한 신호로, 특정 구성요소 선택신호에 대한 설명으로는 적절하지 않다.
    tags: [control-signal, datapath]

  - id: e19-17
    type: multiple-choice
    prompt: 다음 그림은 제어단어의 각 필드를 나타내고 있다. 각 필드에 관한 설명 중으로 적절한 것은?
    choices:
      - { id: '1', text: A와 B는 출발 레지스터를 선택하는 필드이다. }
      - { id: '2', text: B는 상태 레지스터의 상태 값을 선택하는 필드이다. }
      - { id: '3', text: F는 쉬프터에서 수행되는 연산의 하나를 선택하는 필드이다. }
      - { id: '4', text: H는 도착 레지스터를 선택하는 필드이다. }
    answers: ['1']
    explanation: |
      A와 B 필드는 ALU 입력으로 보낼 출발 레지스터를 선택하는 필드이다.
      D는 도착 레지스터 선택, F는 ALU 연산 선택, H는 쉬프터 또는 상태 관련 선택 필드로 해석된다.
    tags: [control-word, register-selection]

  - id: e19-18
    type: multiple-choice
    passageRefs: [g19-microprogram-controller-01]
    prompt: 그림에서 (다)에 관련된 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 처리장치로서 입력 16비트는 제어단어이다. }
      - { id: '2', text: 인코더로서 입력 16비트를 상태비트로 인코딩한다. }
      - { id: '3', text: 쉬프터로서 입력 16비트는 쉬프트 연산의 종류를 결정한다. }
      - { id: '4', text: 산술논리연산장치로서 입력 16비트는 산술논리연산의 종류를 결정한다. }
    answers: ['1']
    explanation: |
      (다)는 제어기억장치에서 나온 제어단어가 처리장치 쪽 입력 데이터로 전달되는 블록으로 해석된다.
      그림에서 입력 데이터와 출력 데이터 사이의 처리장치 경로가 16비트로 표시되어 있다.
    tags: [microprogram-control, datapath]

  - id: e19-19
    type: multiple-choice
    passageRefs: [g19-microprogram-controller-01]
    prompt: 그림에서 만일 MUX1에서 (가)로 입력되는 데이터가 6비트이고 다른 것은 변동이 없다면 (나)는 어떻게 바뀌는가?
    choices:
      - { id: '1', text: 64 x 26 }
      - { id: '2', text: 128 x 27 }
      - { id: '3', text: 256 x 27 }
      - { id: '4', text: 256 x 28 }
    answers: ['1']
    explanation: |
      MUX1에서 제어주소 레지스터로 들어가는 주소가 6비트가 되면 제어기억장치의 주소 수는 $2^6=64$개가 된다.
      다른 필드 조건을 유지하면 제어단어 폭은 26비트로 계산되어 (나)는 64 x 26이 된다.
    tags: [control-memory, microprogram-control]

  - id: e19-20
    type: multiple-choice
    passageRefs: [g19-microprogram-controller-01]
    prompt: 그림에서 (가)에 들어갈 내용으로 적절한 것은?
    choices:
      - { id: '1', text: 처리장치 }
      - { id: '2', text: 제어장치 }
      - { id: '3', text: 제어주소 레지스터 }
      - { id: '4', text: 산술논리연산장치 }
    answers: ['3']
    explanation: |
      (가)는 MUX1에서 선택된 주소를 받아 제어기억장치 ROM에 주소를 제공하는 블록이다.
      따라서 제어주소 레지스터가 가장 적절하다.
    tags: [control-address-register, microprogram-control]

  - id: e19-21
    type: multiple-choice
    prompt: 다음과 같은 연산을 수행하려 할 때 그림에서 제어기억장치의 27개 비트에 대한 설명으로 잘못된 것은? $R5 \leftarrow R6+R3,\ if(C=0)\ then\ (CAR \leftarrow 62)\ else\ (CAR \leftarrow CAR+1)$
    choices:
      - { id: '1', text: 1번~16번 비트는 마이크로연산 R5<-R6+R3를 수행한다. }
      - { id: '2', text: 17번 비트는 (0)2이어야 한다. }
      - { id: '3', text: 18~20번 비트는 캐리의 상태에 따라 결정된다. }
      - { id: '4', text: 21~27번 비트는 조건문 if(C=0)를 수행한다. }
    answers: ['4']
    explanation: |
      21~27번 비트는 분기할 제어주소 값 같은 다음 주소 정보를 담는 부분으로, 조건 자체를 수행하는 비트라고 보기 어렵다.
      조건 선택은 별도의 조건 선택 필드에서 이루어진다.
    tags: [microinstruction, control-word]

  - id: e19-22
    type: multiple-choice
    prompt: 다음의 CPU에 있는 특수 레지스터 중에서 데이터를 기억하는 레지스터는?
    choices:
      - { id: '1', text: IR(Instruction Register) }
      - { id: '2', text: SP(Stack Pointer) }
      - { id: '3', text: PC(Program Counter) }
      - { id: '4', text: AC(Accumulator) }
    answers: ['4']
    explanation: |
      AC는 산술논리연산의 피연산자나 결과 데이터를 저장하는 누산기이다.
      IR은 명령어, PC는 다음 명령어 주소, SP는 스택 위치를 저장한다.
    tags: [cpu-register, accumulator]

  - id: e19-23
    type: multiple-choice
    prompt: 다음 중 중앙처리장치에서 명령어의 연산 코드(OP code)가 보관되는데 사용되는 레지스터는?
    choices:
      - { id: '1', text: PC }
      - { id: '2', text: AC }
      - { id: '3', text: IR }
      - { id: '4', text: SP }
    answers: ['3']
    explanation: |
      명령어 레지스터 IR은 현재 수행 중인 명령어를 저장하며, 그 안에 연산 코드 필드가 포함된다.
      PC는 명령어 주소를 저장하고 AC는 연산 데이터를 저장한다.
    tags: [instruction-register, opcode]

  - id: e19-24
    type: multiple-choice
    prompt: 다음 중 명령어 수행 사이클에 해당되지 않는 것은?
    choices:
      - { id: '1', text: 인출 사이클 }
      - { id: '2', text: 저장 사이클 }
      - { id: '3', text: 인터럽트 사이클 }
      - { id: '4', text: 실행 사이클 }
    answers: ['2']
    explanation: |
      명령어 사이클은 보통 인출, 실행, 간접, 인터럽트 사이클 등으로 설명된다.
      저장 사이클은 이 분류에서 독립적인 명령어 수행 사이클 명칭으로 보지 않는다.
    tags: [instruction-cycle]

  - id: e19-25
    type: multiple-choice
    prompt: |
      다음과 같은 일련의 마이크로연산은 무엇을 수행하는 것인가?
      $T_0: MAR \leftarrow IR(adrs)$, $T_1: MBR \leftarrow M[MAR]$, $T_2: AC \leftarrow MBR$
    choices:
      - { id: '1', text: LOAD 명령어 }
      - { id: '2', text: STORE 명령어 }
      - { id: '3', text: AND 명령어 }
      - { id: '4', text: ADD 명령어 }
    answers: ['1']
    explanation: |
      주소 필드가 가리키는 기억장치 내용을 MBR로 읽어온 뒤 AC에 적재하고 있으므로 LOAD 명령어의 동작이다.
      STORE는 AC의 내용을 기억장치로 저장하는 방향이다.
    tags: [load-instruction, microoperation]

  - id: e19-26
    type: multiple-choice
    prompt: 다음 중 CPU에 있는 레지스터에 대한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 레지스터는 데이터의 임시 저장장소로서 컴퓨터의 기억장치 중에서 액세스 속도가 가장 빠르다. }
      - { id: '2', text: 명령어 레지스터(IR)는 현재 수행되는 명령어를 갖고 있다. }
      - { id: '3', text: 프로그램 카운터(PC)는 다음에 수행되어질 명령어가 들어있는 주소를 갖고 있다. }
      - { id: '4', text: 스택 포인터(SP)는 특수 레지스터로서 스택에 있는 데이터를 갖고 있다. }
    answers: ['4']
    explanation: |
      스택 포인터는 스택의 top 위치나 주소를 가리키는 특수 레지스터이다.
      스택에 있는 데이터 자체를 갖고 있다는 설명은 잘못되었다.
    tags: [cpu-register, stack-pointer]

  - id: e19-27
    type: multiple-choice
    prompt: 명령어 수행 사이클에서 명령어 인출이란 기억장치로부터 명령어를 가져오는 것을 말한다. 인출될 명령어의 주소는 (가)에 들어 있고, 인출된 명령어는 (나)로 옮겨진다. 괄호 안에 들어갈 용어로 알맞은 것은?
    choices:
      - { id: '1', text: '가: 스택 포인터, 나: 프로그램 카운터' }
      - { id: '2', text: '가: 프로그램 카운터, 나: 제어주소 레지스터' }
      - { id: '3', text: '가: 프로그램 카운터, 나: 명령어 레지스터' }
      - { id: '4', text: '가: 명령어 버퍼 레지스터, 나: 누산기' }
    answers: ['3']
    explanation: |
      인출될 명령어의 주소는 PC가 보관하고, 기억장치에서 읽어온 명령어는 IR에 저장된다.
      따라서 (가)는 프로그램 카운터, (나)는 명령어 레지스터이다.
    tags: [instruction-fetch, program-counter, instruction-register]

  - id: e19-28
    type: multiple-choice
    prompt: 다음 중 기억장치의 성능평가에 사용되는 요인으로서 기억장치에서 데이터를 판독하거나 기록하는 데 걸리는 시간을 나타내는 것은?
    choices:
      - { id: '1', text: access time }
      - { id: '2', text: cycle time }
      - { id: '3', text: transfer time }
      - { id: '4', text: hit time }
    answers: ['1']
    explanation: |
      액세스 시간은 기억장치에서 데이터를 읽거나 쓰기 위해 접근하는 데 걸리는 시간이다.
      사이클 시간은 연속 접근 사이에 필요한 전체 주기, 전송 시간은 데이터 이동 시간과 관련된다.
    tags: [memory-performance, access-time]

  - id: e19-29
    type: multiple-choice
    prompt: 다음 중 기억장치와 그 특성을 연결한 것으로 적절한 것은?
    choices:
      - { id: '1', text: 연관기억장치 - memory 공간 확대 }
      - { id: '2', text: 가상 기억장치 - memory access 속도 증가 }
      - { id: '3', text: 캐시 기억장치 - memory access 속도 증가 }
      - { id: '4', text: 복수 모듈 기억장치 - memory 공간 확대 }
    answers: ['3']
    explanation: |
      캐시 기억장치는 CPU와 주기억장치 사이에 위치해 평균 메모리 접근 시간을 줄인다.
      가상기억장치는 논리적 기억공간 확장, 연관기억장치는 내용 기반 검색, 복수 모듈 기억장치는 병렬 접근 성능 개선과 관련된다.
    tags: [cache-memory, memory-hierarchy]

  - id: e19-30
    type: multiple-choice
    passageRefs: [g19-memory-descriptions-01]
    prompt: 위에서 기억장치 접근의 지역성(locality)을 충분히 이용하는 기억장치 두개를 고르면?
    choices:
      - { id: '1', text: 'A, B' }
      - { id: '2', text: 'B, C' }
      - { id: '3', text: 'C, D' }
      - { id: '4', text: 'A, D' }
    answers: ['2']
    explanation: |
      B는 가상기억장치, C는 캐시 기억장치에 해당한다.
      가상기억장치와 캐시 기억장치는 프로그램의 시간적, 공간적 지역성을 이용해 동작한다.
    tags: [locality, virtual-memory, cache-memory]

  - id: e19-31
    type: multiple-choice
    passageRefs: [g19-memory-descriptions-01]
    prompt: 위에서 연관기억장치를 설명하고 있는 것은?
    choices:
      - { id: '1', text: A }
      - { id: '2', text: B }
      - { id: '3', text: C }
      - { id: '4', text: D }
    answers: ['1']
    explanation: |
      A는 저장된 데이터의 내용을 이용해 검색할 수 있는 기억장치로, 내용 주소화 기억장치인 연관기억장치의 설명이다.
      주소가 아니라 내용으로 검색한다는 점이 핵심이다.
    tags: [associative-memory, content-addressable-memory]

  - id: e19-32
    type: multiple-choice
    passageRefs: [g19-memory-descriptions-01]
    prompt: 위에서 B에 대한 설명으로 적합한 기억장치는?
    choices:
      - { id: '1', text: 복수모듈 기억장치 }
      - { id: '2', text: 캐시 기억장치 }
      - { id: '3', text: 가상 기억장치 }
      - { id: '4', text: 보조 기억장치 }
    answers: ['3']
    explanation: |
      B는 프로그램이 사용할 수 있는 주소 공간이 주기억장치보다 클 때 보조기억장치 일부를 포함해 사용하는 방식이다.
      이는 가상 기억장치의 설명이다.
    tags: [virtual-memory]

  - id: e19-33
    type: multiple-choice
    prompt: 중앙처리장치의 개입 없이 직접 주기억장치로 접근하여 데이터의 입출력을 수행하기 위해 주기억장치와 입출력장치 사이에 위치하는 장치를 무엇이라고 하는가?
    choices:
      - { id: '1', text: 캐시 }
      - { id: '2', text: DMA }
      - { id: '3', text: 연관 메모리 }
      - { id: '4', text: 가상 메모리 }
    answers: ['2']
    explanation: |
      DMA는 Direct Memory Access의 약자로, CPU의 지속적인 개입 없이 입출력장치와 주기억장치 사이의 데이터 전송을 수행한다.
      대량 입출력 전송에서 CPU 부담을 줄이는 데 사용된다.
    tags: [dma, input-output]

  - id: e19-34
    type: multiple-choice
    prompt: 버스 중재에 있어서 중재기에서 가까운 순으로 우선순위가 주어지는 방법은?
    choices:
      - { id: '1', text: 중앙집중식 병렬중재 방법 }
      - { id: '2', text: 우선순위 인코더 방법 }
      - { id: '3', text: 폴링 중재 방법 }
      - { id: '4', text: 데이지 체인 중재 방법 }
    answers: ['4']
    explanation: |
      데이지 체인 중재 방식은 중재기에 가까운 장치부터 우선권이 전달되는 직렬 우선순위 구조이다.
      연결 순서가 우선순위를 결정한다.
    tags: [bus-arbitration, daisy-chain]

  - id: e19-35
    type: multiple-choice
    prompt: 다음 중 병렬처리기를 처리기의 상호연결망 구조에 따라 분류한 것으로 옳은 것은?
    choices:
      - { id: '1', text: SISD, SIMD, MISD, MIMD }
