passages:
  - id: g18-proof-42
    type: text
    body: |
      "어떤 수 $x$에 $x$를 더한 것이 다시 $x$이면 $x$는 0이다."를 증명한다.

      가설은 $x + x = x$이고, 결론은 $x = 0$이다. 증명을 위하여 $x + x = x$이고 $x \ne 0$이라고 가정하자. 그러면 $2x = x$이고 $x \ne 0$이다. $x \ne 0$이므로 $2x = x$의 양변을 나누면 $2 = 1$이라는 그릇된 결과를 얻는다. 따라서 $(x + x = x) \Rightarrow (x = 0)$이다.

