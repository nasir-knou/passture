      선택지 2: $(가)$는 $T \lor T$이므로 $T$인데, 선택지 2는 $F$로 두었다.
      선택지 3: $(다)$는 $\sim F$이므로 $T$인데, 선택지 3은 $F$로 두었다.
      선택지 4: $(가)$와 $(나)$가 각각 $T$, $F$이어야 하므로 선택지 4와 다르다.

      핵심 개념:
      논리합, 논리곱, 부정, 배타적 논리합은 각 행의 $p$, $q$ 값을 기준으로 독립적으로 계산한다.
