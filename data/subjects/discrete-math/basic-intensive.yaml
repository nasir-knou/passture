    choices:
      - id: '1'
        text: R={(2,3), (2,4), (2,5)}
      - id: '2'
        text: R={(1,6), (2,5), (3,4), (4,3)}
      - id: '3'
        text: R={(4,3), (3,4), (2,5)}
      - id: '4'
        text: R={(1,3), (2,4), (3,5), (4,3)}
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      선택지 1: $(2,3)$은 $2+3=5$이고 $(2,4)$는 $6$이므로 관계 조건을 만족하지 않는다.
      선택지 2: $(1,6)$은 두 번째 성분 6이 $B$에 속하지 않는다.
      선택지 3: $(4,3)$, $(3,4)$, $(2,5)$는 모두 $a+b=7$이고 $a \in A$, $b \in B$를 만족한다.
      선택지 4: $(1,3)$, $(2,4)$, $(3,5)$는 합이 7이 아니므로 조건에 맞지 않는다.

      핵심 개념:
      $A$에서 $B$로의 관계는 순서쌍의 첫 성분이 $A$, 둘째 성분이 $B$에 속해야 한다.
