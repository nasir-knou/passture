        text: T, T
    answers:
      - '2'
    answerKey: '2'
    explanation: |
      선택지 1: $\forall xP(x)$와 $\exists xP(x)$가 모두 거짓이라는 뜻인데, $x=2,3,4$에서는 $x>1$이 참이므로 존재명제는 참이다.
      선택지 2: 정의역에 $x=1$이 있어 $\forall xP(x)$는 거짓이고, $x=2$처럼 참인 값이 있으므로 $\exists xP(x)$는 참이다.
      선택지 3: 전체명제가 참이고 존재명제가 거짓이라는 조합은 이 상황에서 성립하지 않는다.
