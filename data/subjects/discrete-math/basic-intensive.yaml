  - id: i02-45
    type: multiple-choice
    prompt: 다음 중 유효추론이 아닌 것은?
    choices:
      - id: '1'
        text: $p$이면 $p \lor q$이다.
      - id: '2'
        text: $p$이면 $p \land q$이다.
      - id: '3'
        text: $p$이고 $p \to q$이면 $q$이다.
      - id: '4'
        text: $p \to q$이고 $q \to r$이고 $p \to r$이다.
    answers:
      - '2'
    answerKey: '2'
    explanation: |
      선택지 1: $p$가 참이면 $p \lor q$는 항상 참이므로 유효추론이다.
      선택지 2: $p$가 참이어도 $q$가 거짓이면 $p \land q$는 거짓이므로 유효추론이 아니다.
      선택지 3: $p$와 $p \to q$에서 $q$를 이끌어 내는 긍정논법이므로 유효하다.
      선택지 4: $p \to q$, $q \to r$이면 $p \to r$이 성립하는 삼단논법이므로 유효하다.

      핵심 개념:
      유효추론은 전제가 참일 때 결론이 반드시 참이어야 한다.
      $p$만으로는 $q$의 참을 보장할 수 없으므로 $p \land q$를 결론낼 수 없다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-46
    type: multiple-choice
    prompt: 다음 중 유효추론인 것은?
    choices:
      - id: '1'
        text: $p$이면 $p \land q$이다.
      - id: '2'
        text: $p \lor q$이면 $p$이다.
      - id: '3'
        text: $p$이고 $p \to q$이면 $q$이다.
      - id: '4'
        text: $\sim p$이고 $p \to q$이면 $\sim q$이다.
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      선택지 1: $p$가 참이어도 $q$가 거짓이면 $p \land q$는 거짓이므로 유효하지 않다.
      선택지 2: $p \lor q$가 참이어도 $p$가 반드시 참인 것은 아니다. $q$만 참일 수 있다.
      선택지 3: $p$와 $p \to q$에서 $q$를 결론내는 긍정논법이므로 유효추론이다.
      선택지 4: $\sim p$와 $p \to q$만으로 $\sim q$를 결론낼 수 없다. 이는 전건부정의 오류이다.

      핵심 개념:
      긍정논법은 $p$, $p \to q$로부터 $q$를 도출하는 유효추론이다.
      전건부정이나 선언지 긍정처럼 결론이 보장되지 않는 형식은 유효하지 않다.
    tags:
      - chapter:02
      - basic-intensive
