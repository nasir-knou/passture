    prompt: 배타적 논리합 $p \oplus q$와 동치인 합성 명제는?
    choices:
      - id: '1'
        text: $(p \vee \sim q) \wedge (\sim p \wedge q)$
      - id: '2'
        text: $(p \vee \sim q) \wedge (\sim p \vee q)$
      - id: '3'
        text: $(p \vee \sim q) \vee (\sim p \wedge q)$
      - id: '4'
        text: $(p \wedge \sim q) \vee (\sim p \wedge q)$
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: $(p \vee \sim q)$가 참이어도 $(\sim p \wedge q)$와 함께 참이어야 하므로 $p \oplus q$와 동치가 아니다.
      선택지 2: $(p \vee \sim q) \wedge (\sim p \vee q)$는 $p \leftrightarrow q$와 동치인 형태이다.
      선택지 3: 논리합으로 너무 넓게 참이 되어 $p \oplus q$와 다르다.
      선택지 4: $(p \land \sim q) \vee (\sim p \land q)$는 정확히 둘 중 하나만 참인 경우를 나타내므로 $p \oplus q$와 동치이다.

      핵심 개념:
      배타적 논리합 $p \oplus q$는 두 명제의 진리값이 서로 다를 때 참이다.
      식으로는 $(p \land \sim q) \vee (\sim p \land q)$로 표현할 수 있다.
