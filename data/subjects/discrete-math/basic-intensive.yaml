  - id: gi07-25
    type: text
    body: |-
      집합 $A=\{1,2,3\}$에서 집합 $B=\{2,4,8\}$으로의 관계들이 다음과 같다.

      $R=\{(1,2),(2,4),(2,8)\}$, $S=\{(1,2),(1,4),(2,4)\}$

      $T=\{(1,8),(2,2),(3,4)\}$, $U=\{(1,2),(2,4),(3,4)\}$
questions:
  - id: i02-01
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 국어책을 읽으세요.
      - id: '2'
        text: 시험을 보겠습니다.
      - id: '3'
        text: 달에는 나무가 없다.
      - id: '4'
        text: X+ 2=3
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      선택지 1: 명령문이므로 참과 거짓을 판정할 수 없다.
      선택지 2: 의지나 예정의 표현으로, 현재 참/거짓이 확정되는 문장이 아니다.
      선택지 3: "달에는 나무가 없다"는 사실 여부가 참 또는 거짓으로 정해지는 평서문이므로 명제이다.
      선택지 4: $X+2=3$은 변수 $X$의 값이 정해지지 않아 그 자체로는 명제가 아니다.

      핵심 개념:
      명제는 참 또는 거짓 중 하나의 진리값을 갖는 문장이다.
      명령문, 의문문, 감탄문, 변수값이 정해지지 않은 열린 문장은 명제가 아니다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-02
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 웃으며 살아요.
      - id: '2'
        text: 꽃보다 새가 좋아요.
      - id: '3'
        text: 하루는 25시간입니다.
      - id: '4'
        text: 지금 기분이 어떠하신지요?
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      선택지 1: 권유문이므로 진리값을 판정할 수 없다.
      선택지 2: 개인의 선호를 나타내는 표현으로 객관적인 참/거짓 판정 대상이 아니다.
      선택지 3: "하루는 25시간입니다"는 거짓이지만 진리값이 정해지는 평서문이므로 명제이다.
      선택지 4: 의문문이므로 명제가 아니다.

      핵심 개념:
      명제는 반드시 참일 필요는 없고, 거짓이어도 진리값이 확정되면 명제이다.
      질문, 권유, 취향 표현은 명제로 보지 않는다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-03
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 이제부터 이산수학 시험을 보겠습니다.
      - id: '2'
        text: 오! 이 시험을 잘 치루게 해주세요.
      - id: '3'
        text: 시험이 끝나면 며칠 쉬려고 합니다.
      - id: '4'
        text: 이산수학은 수학이 아닙니다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: 앞으로 할 일을 말하는 선언/예정 표현으로 현재 진리값을 판정하기 어렵다.
      선택지 2: 감탄과 기원을 나타내므로 참/거짓을 판정할 수 없다.
      선택지 3: 계획이나 의도를 나타내는 문장으로 명제가 아니다.
      선택지 4: "이산수학은 수학이 아닙니다"는 거짓인 평서문이지만 진리값이 있으므로 명제이다.

      핵심 개념:
      거짓인 문장도 진리값이 정해지면 명제이다.
      바람, 명령, 계획, 감탄은 진리값의 대상이 아니므로 명제가 아니다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-04
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: x+ 3=0
      - id: '2'
        text: 석이는 공부를 잘 한다.
      - id: '3'
        text: 인생은 짧고 예술은 길다.
      - id: '4'
        text: 영이는 소담이보다 나이가 많다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: 변수 $x$의 값이 주어지지 않은 식이므로 명제가 아니다.
      선택지 2: "공부를 잘 한다"는 기준이 모호해 진리값이 명확하지 않다.
      선택지 3: 비유적 표현에 가까워 수학적 명제로 다루기 어렵다.
      선택지 4: 두 사람의 나이 관계는 객관적으로 참 또는 거짓이 정해지므로 명제이다.

      핵심 개념:
      변수값이 정해지지 않은 방정식은 열린 문장이다.
      명제는 판단 기준이 분명해 참/거짓이 결정되어야 한다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-05
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 국어책을 읽으세요.
      - id: '2'
        text: 달에는 나무가 없다.
      - id: '3'
        text: 시험을 잘 보겠습니다.
      - id: '4'
        text: x + 5 = 20
    answers:
      - '2'
    answerKey: '2'
    explanation: |
      선택지 1: 명령문이므로 명제가 아니다.
      선택지 2: "달에는 나무가 없다"는 참/거짓을 판정할 수 있는 평서문이므로 명제이다.
      선택지 3: 의지 표현이므로 진리값이 확정되는 문장이 아니다.
      선택지 4: 변수 $x$가 정해지지 않아 열린 문장이다.

      핵심 개념:
      명제 여부는 문장의 실제 참/거짓보다 진리값을 가질 수 있는지로 판단한다.
      명령문과 변수식은 보통 명제가 아니다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-06
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 국어책을 읽으세요.
      - id: '2'
        text: 시험을 보겠습니다.
      - id: '3'
        text: $x^2+2x+1=16$
      - id: '4'
        text: 달에는 나무가 있다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: 명령문이므로 참/거짓을 판정할 수 없다.
      선택지 2: 의지 표현이므로 명제가 아니다.
      선택지 3: $x$의 값이 정해지지 않은 방정식이므로 열린 문장이다.
      선택지 4: "달에는 나무가 있다"는 거짓으로 판정되는 평서문이므로 명제이다.

      핵심 개념:
      변수식은 변수의 값이나 정의역이 지정되어야 명제가 된다.
      명제는 참인 문장뿐 아니라 거짓인 문장도 포함한다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-07
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: $2x-6=0$
      - id: '2'
        text: 석이는 공부를 잘 한다.
      - id: '3'
        text: 수학 공부를 더 많이 하세요.
      - id: '4'
        text: 영이는 소담이보다 나이가 많다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: $x$의 값이 정해지지 않은 열린 문장이다.
      선택지 2: "공부를 잘 한다"는 기준이 모호해 명확한 진리값을 갖기 어렵다.
      선택지 3: 명령문이므로 명제가 아니다.
      선택지 4: 두 사람의 나이 비교는 객관적으로 참 또는 거짓이 정해지므로 명제이다.

      핵심 개념:
      명제는 판단 기준과 대상이 분명해야 한다.
      변수식, 명령문, 모호한 평가는 명제가 아니다.
    tags:
      - chapter:02
      - basic-intensive
  - id: i02-08
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - id: '1'
        text: 시험을 잘 보세요.
      - id: '2'
        text: 사과가 제일 맛있어요.
      - id: '3'
        text: 10은 홀수입니다.
      - id: '4'
        text: 3x + 8 = 20
    answers:
      - '3'
    answerKey: '3'
