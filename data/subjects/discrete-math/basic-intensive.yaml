    answerKey: '2'
    explanation: |
      단사함수는 서로 다른 정의역 원소가 서로 다른 함숫값을 갖는 함수이다. 2번은 $1,2,3$이 각각 $b,c,a$에 대응하므로 함수이고 함숫값도 모두 다르다.

      1번은 1과 3이 모두 $a$에 대응하여 단사가 아니다. 3번과 4번은 한 원소가 둘 이상의 값에 대응하므로 함수가 아니다.

      핵심 개념: 단사성은 함수임을 먼저 확인한 뒤, 서로 다른 입력의 출력이 겹치는지 확인한다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-18
    type: multiple-choice
    prompt: |-
      A={1,2,3,4}일 때, A에서의 관계 R이 역함수를 가지는 함수인 경우는 다음 중
      어느 것인가?
    choices:
      - id: '1'
        text: R={(1,2), (2,1), (2,2), (3,4), (4,3)}
      - id: '2'
        text: R={(1,2), (2,1), (3,3), (4,4)}
      - id: '3'
        text: R={(1,2), (2,1), (3,2), (4,3)}
      - id: '4'
        text: R={(1,1), (2,2), (3,3)}
    answers:
      - '2'
    answerKey: '2'
    explanation: |
      역함수를 가지려면 $A$에서 $A$로의 전단사함수여야 한다. 2번은 $1\mapsto2$, $2\mapsto1$, $3\mapsto3$, $4\mapsto4$로 각 원소가 정확히 하나의 값에 대응하고, 출력값도 $1,2,3,4$가 모두 한 번씩 나타난다.

      1번은 2가 두 값에 대응하므로 함수가 아니다. 3번은 1과 3이 모두 2로 가므로 단사가 아니고, 4번은 4의 대응값이 없어 함수가 아니다.

      핵심 개념: 역함수가 존재하는 함수는 일대일 대응, 즉 전단사함수이다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-19
    type: multiple-choice
    prompt: |-
      A={1,2,3}, B={a,b,c}일 때, A에서 B로의 관계 R={(1,a), (2,a), (3,b)}에 관한
      설명으로 옳은 것은?
    choices:
      - id: '1'
        text: R은 A에서 B로의 단사함수이다.
      - id: '2'
        text: R은 A에서 B로의 전사함수이다.
      - id: '3'
        text: R은 A에서 B로의 전단사함수이다.
      - id: '4'
        text: R은 A에서 B로의 상수함수가 아니다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      $R=\{(1,a),(2,a),(3,b)\}$는 $A$의 각 원소가 하나씩 대응하므로 함수이다. 하지만 1과 2가 모두 $a$로 가므로 단사함수가 아니고, 공역 원소 $c$가 치역에 없으므로 전사함수도 아니다.

      따라서 전단사함수도 아니며, 모든 원소가 같은 값으로 가는 상수함수도 아니다. 옳은 설명은 4번이다.

      핵심 개념: 상수함수는 모든 입력의 출력이 하나의 같은 값이어야 한다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-20
    type: multiple-choice
    prompt: |-
      집합 X={1,2,3,4}와 Y={a,b,c}가 주어졌을 때, X에서 Y로의 관계
      f={(1,a), (2,b), (3,c), (4,a)}에 대한 다음 서술 중 부적절한 것은?
    choices:
      - id: '1'
        text: 관계 f는 함수로서 f의 정의역은 {1,2,3,4}이다.
      - id: '2'
        text: 관계 f는 전사함수이다.
      - id: '3'
        text: 관계 f는 단사함수이다.
      - id: '4'
        text: $f(X)=Y$가 성립한다.
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      $f=\{(1,a),(2,b),(3,c),(4,a)\}$는 정의역 $X$의 모든 원소에 대해 하나씩 대응하므로 함수이다. 치역은 $\{a,b,c\}=Y$이므로 전사함수이고 $f(X)=Y$도 성립한다.

      그러나 1과 4가 모두 $a$에 대응하므로 단사함수는 아니다. 따라서 부적절한 서술은 3번이다.

      핵심 개념: 단사함수는 서로 다른 입력이 같은 출력으로 가면 안 된다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-23
    type: multiple-choice
    passageRefs:
      - gi07-23
    prompt: 다음 서술 중 부적절한 것은?
    choices:
      - id: '1'
        text: 관계 f는 함수이다.
      - id: '2'
        text: f의 정의역은 X이다.
      - id: '3'
        text: f의 공역은 Y이다.
      - id: '4'
        text: $f(X)=X$가 성립한다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      $f=\{(1,a),(2,b),(3,a)\}$는 $X$의 각 원소가 하나씩 대응하므로 함수이고, 정의역은 $X$, 공역은 $Y$이다. 치역 $f(X)$는 $\{a,b\}$이다.

      따라서 $f(X)=X$라는 4번은 부적절하다. $f(X)$는 출력값의 집합이므로 $X=\{1,2,3\}$가 아니라 $Y$의 부분집합이어야 한다.

      핵심 개념: $f(X)$는 정의역 전체의 상, 즉 치역을 뜻한다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-24
    type: multiple-choice
    passageRefs:
      - gi07-23
    prompt: 다음 서술 중 적절한 것은?
    choices:
      - id: '1'
        text: 관계 f는 전사함수이다.
      - id: '2'
        text: 관계 f는 단사함수이다.
      - id: '3'
        text: 관계 f는 전단사함수이다.
      - id: '4'
        text: 관계 $f$는 역함수 $f^{-1}$가 존재한다.
    answers:
      - '1'
    answerKey: '1'
    explanation: |
      $f(X)=\{a,b\}=Y$이므로 관계 $f$는 전사함수이다.

      1과 3이 모두 $a$에 대응하므로 단사함수는 아니고, 따라서 전단사함수도 아니다. 전단사가 아니므로 역함수 $f^{-1}$도 함수로 존재하지 않는다.

      핵심 개념: 전사성은 공역의 모든 원소가 실제 출력으로 나타나는지로 판단한다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-25
    type: multiple-choice
    passageRefs:
      - gi07-25
    prompt: 함수인 것만 모두 고른 것은?
    choices:
      - id: '1'
        text: R, S, T, U
      - id: '2'
        text: S, T, U
      - id: '3'
        text: R, S
      - id: '4'
        text: T, U
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      $R$은 2가 두 값에 대응하고 3의 대응값이 없어 함수가 아니다. $S$는 1이 두 값에 대응하고 3의 대응값이 없어 함수가 아니다. $T$와 $U$는 1,2,3이 각각 정확히 하나의 값에 대응하므로 함수이다.

      따라서 함수인 것만 모두 고르면 4번 $T,U$이다.

      핵심 개념: 관계가 함수인지 볼 때는 정의역의 각 원소가 정확히 하나의 순서쌍 첫째 성분으로 등장해야 한다.
    tags:
      - chapter:07
      - basic-intensive
  - id: i07-26
    type: multiple-choice
    passageRefs:
      - gi07-25
    prompt: 단사함수, 전사함수, 전단사함수 순으로 각각 하나씩 열거한 것은?
    choices:
      - id: '1'
        text: T, T, T
      - id: '2'
        text: R, S, T
      - id: '3'
        text: S, T, S
      - id: '4'
        text: T, U, T
    answers:
      - '1'
    answerKey: '1'
    explanation: |
      $T=\{(1,8),(2,2),(3,4)\}$는 $A$의 세 원소가 $B$의 세 원소에 각각 한 번씩 대응하므로 단사함수이면서 전사함수이고 전단사함수이다.

      $U=\{(1,2),(2,4),(3,4)\}$는 함수이지만 2와 3이 모두 4에 대응하고 8이 치역에 없으므로 단사도 전사도 아니다. $R,S$는 함수가 아니므로 해당 성질을 가질 수 없다.

      따라서 단사함수, 전사함수, 전단사함수 순으로 모두 $T$를 고른 1번이 옳다.

      핵심 개념: 전단사함수는 단사성과 전사성을 동시에 만족하는 함수이다.
    tags:
      - chapter:07
      - basic-intensive
