        text: '(가) : T, (나) : F, (다) : T, (라) : F'
      - id: '2'
        text: '(가) : F, (나) : F, (다) : T, (라) : T'
      - id: '3'
        text: '(가) : T, (나) : T, (다) : T, (라) : T'
      - id: '4'
        text: '(가) : F, (나) : F, (다) : F, (라) : F'
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: $(나)$는 $F \land T$이므로 $F$인데, 선택지 1은 $(나)=F$만 맞고 나머지가 모두 맞지는 않는다.
      선택지 2: $(다)$는 $\sim T$이므로 $F$인데, 선택지 2는 $(다)=T$로 잘못 두었다.
      선택지 3: $(가)$는 $F \lor F$이므로 $F$인데, 선택지 3은 $(가)=T$로 잘못 두었다.
      선택지 4: $(가)=F$, $(나)=F$, $(다)=F$, $(라)=F$로 모두 맞다.

      핵심 개념:
      $p \lor q$는 둘 중 하나라도 참이면 참이다.
      $p \land q$는 둘 다 참일 때만 참이다.
      $\sim p$는 $p$의 진리값을 반대로 바꾼다.
      $p \oplus q$는 두 진리값이 서로 다를 때만 참이다.
