      선택지 2: $p$를 참으로 두어 잘못이다. 홀수와 홀수의 곱은 홀수이다.
      선택지 3: $p \land q$는 두 명제가 모두 참일 때만 참이므로 $F \land T$는 $F$이다.
      선택지 4: $p$와 $q$의 진리값을 모두 반대로 판단했다.

      핵심 개념:
