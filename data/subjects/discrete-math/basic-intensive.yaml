  - id: i06-02
    type: multiple-choice
    prompt: |-
      집합 $A=\{1,2,3,4\}$, $B=\{3,4\}$일 때, $A$에서 $B$로의 관계 $R=\{(a,b)\mid a+b=5\}$에
      관한 서술 중 옳은 것은?
    choices:
      - id: '1'
        text: 3R2이 성립한다.
      - id: '2'
        text: 4R4이 성립한다.
      - id: '3'
        text: 2R3이 성립하지 않는다.
      - id: '4'
        text: 1R4이 성립한다.
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: $3R2$는 $(3,2)$를 뜻하지만 $2 \notin B$이므로 성립하지 않는다.
      선택지 2: $4R4$는 $4+4=8$이라 조건 $a+b=5$를 만족하지 않는다.
      선택지 3: $2R3$은 $2+3=5$이므로 실제로 성립한다. "성립하지 않는다"는 틀리다.
      선택지 4: $1R4$는 $1+4=5$이고 $1 \in A$, $4 \in B$이므로 성립한다.

      핵심 개념:
      $aRb$는 순서쌍 $(a,b)$가 관계 $R$에 속한다는 뜻이다.
      관계의 성립 여부는 원소 소속과 관계 조건을 함께 확인한다.
