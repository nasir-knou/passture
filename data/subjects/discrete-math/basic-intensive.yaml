      따라서 3번이 옳다. 1번과 2번은 소수 부분을 단순히 비교한 값이고, 4번은 첫 번째 항이나 두 번째 항을 잘못 계산한 결과이다.

      핵심 개념: 바닥 함수와 천장 함수는 소수를 그대로 계산하지 않고 먼저 정수값으로 바꾼 뒤 연산한다.
