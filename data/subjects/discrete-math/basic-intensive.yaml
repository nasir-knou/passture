    answerKey: '4'
    explanation: |
      $30 \bmod 5=0$이다. 선택지 4는 $\frac{6!}{5!}=6$이므로 $6 \bmod 6=0$이다.

      따라서 4번이 옳다. 1번은 $\lceil 7.1 \rceil \bmod 3=8 \bmod 3=2$, 2번은 $\lfloor 10.5 \rfloor \bmod 4=10 \bmod 4=2$, 3번은 $3! \bmod 4=6 \bmod 4=2$이다.

      핵심 개념: 복합식은 계승과 바닥·천장 함수를 먼저 계산한 뒤 나머지를 구한다.
