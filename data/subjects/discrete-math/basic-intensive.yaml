  - id: i06-03
    type: multiple-choice
    prompt: 다음 중 $A=\{1,2\}$, $B=\{1,2,3,4\}$일 때, A에서 B로 가는 관계 $R=\{(a,b)\mid a^2=b\}$을 부울행렬로 바르게 나타낸 것은?
    choices:
      - id: '1'
        text: $M_R=\begin{pmatrix}1&0&0&0\\0&1&0&0\end{pmatrix}$
      - id: '2'
        text: $M_R=\begin{pmatrix}0&1&1&0\\0&0&0&0\end{pmatrix}$
      - id: '3'
        text: $M_R=\begin{pmatrix}0&1&0&0\\0&0&0&1\end{pmatrix}$
      - id: '4'
        text: $M_R=\begin{pmatrix}1&0&0&0\\0&0&0&1\end{pmatrix}$
    answers:
      - '4'
    answerKey: '4'
    explanation: |
      선택지 1: $a=2$일 때 $b=4$가 되어야 하는데 둘째 행의 4열이 0이다.
      선택지 2: $a=1$에서 $b=1$이어야 하는데 1열이 0이고, 불필요한 2열과 3열이 1이다.
      선택지 3: $a=1$에서 $b=1$이어야 하는데 2열이 1로 표시되어 있다.
      선택지 4: $1^2=1$, $2^2=4$이므로 1행 1열과 2행 4열만 1인 부울행렬이 맞다.

      핵심 개념:
      관계의 부울행렬은 행을 $A$의 원소, 열을 $B$의 원소에 대응시킨다.
      $(a,b)\in R$이면 해당 위치를 1, 아니면 0으로 표시한다.
