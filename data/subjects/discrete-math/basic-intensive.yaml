      - id: '2'
        text: ''
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'F']
            - ['T', 'F', 'F']
            - ['T', 'T', 'T']
      - id: '3'
        text: ''
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'T']
            - ['T', 'F', 'T']
            - ['T', 'T', 'F']
      - id: '4'
        text: ''
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'T']
            - ['F', 'T', 'F']
            - ['T', 'F', 'F']
            - ['T', 'T', 'T']
    answers:
      - '3'
    answerKey: '3'
    explanation: |
      선택지 1: $p=T$, $q=T$일 때 $p \oplus q$는 $F$이어야 하는데 $T$로 표시되어 있다.
      선택지 2: $F,T$와 $T,F$에서 배타적 논리합이 참이어야 하는데 모두 $F$로 표시되어 있다.
      선택지 3: 서로 다를 때만 $T$, 서로 같을 때 $F$이므로 배타적 논리합의 진리표가 맞다.
