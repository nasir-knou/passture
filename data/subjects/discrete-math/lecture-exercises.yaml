      - { id: '2', text: 'R={(1,b),(2,c),(3,d),(3,e)}' }
      - { id: '3', text: 'R={(1,c),(2,b),(2,c),(3,e)}' }
      - { id: '4', text: 'R={(1,a),(2,b),(3,c)}' }
    answers: ['4']
    explanation: |
      선택지 1: 1과 3이 각각 두 원소에 대응하므로 함수가 아니다.
      선택지 2: 3이 d와 e 두 원소에 대응하므로 함수가 아니다.
      선택지 3: 2가 b와 c 두 원소에 대응하므로 함수가 아니다.
      선택지 4: A의 각 원소 1, 2, 3이 정확히 하나의 B 원소에 대응하므로 함수이다.

      핵심 개념:
      A에서 B로의 함수는 정의역 A의 모든 원소가 공역 B의 원소 하나에만 대응해야 한다.
    tags: [function]

  - id: l07-02
    type: multiple-choice
    prompt: $A=\{1,2,3\}$, $B=\{4,5,6\}$일 때, A에서 B로의 함수 $R=\{(1,5),(2,4),(3,6)\}$에 대해 다음 설명 중 옳은 것은?
    choices:
      - { id: '1', text: 'R의 정의역은 {4,5,6}이다.' }
      - { id: '2', text: R의 공역과 치역은 같다. }
      - { id: '3', text: 원소 1의 상은 4이다. }
      - { id: '4', text: 'R의 치역은 {1,2,3}이다.' }
    answers: ['2']
    explanation: |
      선택지 1: 정의역은 첫 번째 성분들의 집합인 {1,2,3}이다.
      선택지 2: 치역은 {5,4,6}으로 공역 {4,5,6}과 같으므로 옳다.
      선택지 3: 원소 1의 상은 순서쌍 (1,5)에 의해 5이다.
      선택지 4: {1,2,3}은 정의역이지 치역이 아니다.

      핵심 개념:
      함수의 정의역은 입력 원소의 집합, 공역은 도착 집합, 치역은 실제로 대응된 값들의 집합이다.
    tags: [function]

  - id: l07-03
    type: multiple-choice
    prompt: $A=\{1,2,3,4\}$일 때, 다음 관계 중에서 역함수를 가지는 함수는 어느 것인가?
    choices:
      - { id: '1', text: 'R={(1,2),(2,1),(3,4),(4,3)}' }
      - { id: '2', text: 'R={(1,2),(2,1),(3,3),(3,4)}' }
      - { id: '3', text: 'R={(1,1),(2,2),(3,3)}' }
      - { id: '4', text: 'R={(2,1),(1,2),(3,4)}' }
    answers: ['1']
    explanation: |
      선택지 1: A의 모든 원소가 정확히 하나씩 대응하고 값도 모두 달라 전단사 함수이므로 역함수를 가진다.
      선택지 2: 입력 3이 두 값 3과 4에 대응하므로 함수가 아니다.
      선택지 3: 정의역 A의 원소 4에 대한 대응이 없어 A에서 A로의 함수가 아니다.
      선택지 4: 정의역 A의 원소 4에 대한 대응이 없어 역함수를 가질 수 없다.

      핵심 개념:
      역함수가 존재하려면 함수가 일대일 대응, 즉 전단사이어야 한다.
    tags: [inverse-function]
  - id: l08-01
    type: multiple-choice
    prompt: 다음 진리표에 해당되는 논리게이트로 옳은 것은?
    passageRefs: [g08-01-nor-truth-table]
    choices:
      - { id: '1', text: 'NAND 게이트' }
      - { id: '2', text: 'NOR 게이트' }
      - { id: '3', text: 'XOR 게이트' }
      - { id: '4', text: 'XNOR 게이트' }
    answers: ['2']
    explanation: |
      선택지 1: NAND는 두 입력이 모두 1일 때만 0이고 나머지는 1이므로 제시 진리표와 다르다.
      선택지 2: NOR는 OR의 부정으로, 두 입력이 모두 0일 때만 출력이 1이므로 제시 진리표와 일치한다.
      선택지 3: XOR는 두 입력이 서로 다를 때 1을 출력하므로 다르다.
      선택지 4: XNOR는 두 입력이 같을 때 1을 출력하므로 다르다.

      핵심 개념:
      NOR 게이트는 $x+y$를 부정한 출력으로, 두 입력이 모두 0일 때만 1이 된다.
    tags: [logic-gate]

  - id: l08-02
    type: multiple-choice
    prompt: 다음 설명에 해당되는 논리게이트로 옳은 것은?
    passageRefs: [g08-02-gate-description]
    choices:
