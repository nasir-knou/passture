      선택지 4: $b/c$가 정수라는 보장이 없고, 정수여도 항상 $a$로 나누어진다고 할 수 없으므로 옳지 않다.

      핵심 개념:
      정수의 나누어떨어짐은 덧셈, 뺄셈, 정수배에 대해 닫혀 있지만 일반적인 나눗셈에는 그대로 적용되지 않는다.
