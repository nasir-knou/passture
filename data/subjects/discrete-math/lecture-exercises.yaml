      선택지 2: 원래 관계의 각 순서쌍 $(1,b),(3,c),(4,d),(3,d),(2,a)$를 모두 뒤집은 결과이다.
      선택지 3: 원래 관계와 같은 방향의 순서쌍이 섞여 있어 역관계가 아니다.
      선택지 4: 원래 관계와 같은 방향의 순서쌍을 순서만 바꿔 나열한 형태이므로 역관계가 아니다.

      핵심 개념:
      역관계 $R^{-1}$은 $R$의 모든 순서쌍 $(a,b)$를 $(b,a)$로 바꾼 관계이다.
