      - { id: '2', text: 'R={(1,3),(2,4),(3,5)}' }
      - { id: '3', text: 'R={(2,5),(3,4),(4,3)}' }
      - { id: '4', text: 'R={(1,3),(1,4),(1,5)}' }
    answers: ['3']
    explanation: |
      선택지 1: (2,3), (2,4)는 합이 7이 아니므로 관계에 포함되지 않는다.
      선택지 2: (1,3), (2,4)는 합이 7이 아니므로 틀렸다.
      선택지 3: $2+5=7$, $3+4=7$, $4+3=7$이므로 조건을 만족하는 순서쌍이다.
      선택지 4: (1,3), (1,4), (1,5)는 모두 합이 7이 아니므로 틀렸다.

      핵심 개념:
      A에서 B로의 관계는 첫 원소가 A, 둘째 원소가 B에 속해야 하며 제시 조건을 만족해야 한다.
    tags: [relation]

