  - id: l13-02
    type: multiple-choice
    prompt: 유클리드 호제법을 이용하여 gcd(210, 770)을 구하면?
    choices:
      - { id: '1', text: '15' }
      - { id: '2', text: '30' }
      - { id: '3', text: '70' }
      - { id: '4', text: '105' }
    answers: ['3']
    explanation: |
      선택지 1: 15는 210과 770의 공약수도 아니므로 틀렸다.
      선택지 2: 30은 770을 나누지 못한다.
      선택지 3: $770=3\cdot210+140$, $210=1\cdot140+70$, $140=2\cdot70$이므로 최대공약수는 70이다.
      선택지 4: 105는 770을 나누지 못한다.

      핵심 개념:
      유클리드 호제법은 나눗셈의 나머지를 반복해 마지막 0이 아닌 나머지를 최대공약수로 구한다.
