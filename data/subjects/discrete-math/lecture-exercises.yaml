      선택지 2: 자연수를 양의 정수로 보면 $x+y+z=5$의 해 수는 별과 막대 방법으로 $\binom{4}{2}=6$이다.
      선택지 3: 8은 양의 정수해 개수와 맞지 않는다.
      선택지 4: 10은 음이 아닌 정수해 개수 $\binom{7}{2}$도 아니므로 맞지 않는다.

      핵심 개념:
      양의 정수해 $x_1+\cdots+x_k=n$의 개수는 $\binom{n-1}{k-1}$이다.
