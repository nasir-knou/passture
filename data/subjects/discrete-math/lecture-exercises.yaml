      선택지 2: 두 꼭지점을 연결하는 변이 두 개 이상이면 그 변들을 병렬 변이라 하므로 옳다.
      선택지 3: 변이 없는 그래프는 영그래프 또는 공변 그래프에 가깝고, 무향 그래프는 변에 방향이 없는 그래프이다.
      선택지 4: 루프나 병렬 변이 없는 무향 그래프는 단순 그래프이며, 완전 그래프는 모든 서로 다른 꼭지점 쌍이 인접한 그래프이다.

      핵심 개념:
      그래프 용어에서 루프, 병렬 변, 단순 그래프, 완전 그래프의 정의를 구분해야 한다.
    tags: [graph]

  - id: l09-02
    type: multiple-choice
    prompt: 다음 그래프에 대한 설명으로 옳은 것은?
    passageRefs: [g09-02-multigraph]
    choices:
      - { id: '1', text: '고립된 꼭지점은 $v_1$이다.' }
      - { id: '2', text: '꼭지점 $v_3$와 인접한 꼭지점은 $v_1$, $v_2$이다.' }
      - { id: '3', text: '변 $e_1$은 병렬 변이다.' }
      - { id: '4', text: '꼭지점 $v_1$은 루프를 가지고 있다.' }
    answers: ['4']
    explanation: |
      선택지 1: $v_1$은 $v_2$와 연결되고 루프도 있으므로 고립된 꼭지점이 아니다.
      선택지 2: $v_3$는 $v_2$와 병렬 변으로 연결되어 있지만 $v_1$과는 직접 인접하지 않는다.
      선택지 3: $e_1$은 $v_1$과 $v_2$를 잇는 단일 변이므로 병렬 변이 아니다.
      선택지 4: $v_1$에는 자기 자신으로 되돌아오는 변 $e_4$가 있으므로 루프를 가지고 있다.

      핵심 개념:
      루프는 한 꼭지점에서 자기 자신으로 연결되는 변이고, 병렬 변은 같은 두 꼭지점을 잇는 둘 이상의 변이다.
    tags: [graph]

  - id: l09-03
