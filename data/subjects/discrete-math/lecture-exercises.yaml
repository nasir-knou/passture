      - { id: '2', text: '$R^{-1}=\{(b,1),(c,3),(d,4),(d,3),(a,2)\}$' }
      - { id: '3', text: '$R^{-1}=\{(a,1),(b,2),(c,3),(d,3),(d,4)\}$' }
