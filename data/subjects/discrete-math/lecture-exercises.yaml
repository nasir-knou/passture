      - { id: '2', text: NOR }
      - { id: '3', text: 버퍼 }
      - { id: '4', text: NAND }
    answers: ['4']
    explanation: |
      선택지 1: XOR는 두 입력이 서로 다를 때만 1을 출력한다.
      선택지 2: NOR는 두 입력이 모두 0일 때만 1을 출력한다.
      선택지 3: 버퍼는 입력을 그대로 출력하는 단일 입력 게이트이다.
      선택지 4: NAND는 두 입력이 모두 1인 경우만 0이고 나머지는 1이므로 설명과 일치한다.

      핵심 개념:
      NAND는 AND의 부정이며, $xy$가 참인 경우를 제외하고 출력이 1이다.
    tags: [logic-gate]

  - id: l08-03
    type: multiple-choice
    prompt: 부울식에 대한 설명으로 옳지 않은 것은?
    choices:
      - { id: '1', text: 상수 0, 1은 부울식이다. }
      - { id: '2', text: 부울변수는 부울식이다. }
      - { id: '3', text: X, Y가 부울식일 때, X+Y도 부울식이다. }
      - { id: '4', text: X, Y가 부울식일 때, 2X+3Y도 부울식이다. }
    answers: ['4']
    explanation: |
      선택지 1: 상수 0과 1은 부울대수의 기본 상수이므로 부울식이다.
      선택지 2: 부울변수는 0 또는 1의 값을 갖는 부울식이다.
      선택지 3: X와 Y가 부울식이면 부울합 X+Y도 부울식이다.
      선택지 4: 2X+3Y처럼 일반 산술계수 2와 3을 붙인 식은 부울대수의 기본 부울식 구성 규칙에 맞지 않는다.

      핵심 개념:
      부울식은 부울상수, 부울변수, 부울연산 합/곱/보수로 구성된다.
    tags: [boolean-algebra]

  - id: l08-04
    type: multiple-choice
    prompt: 부울대수의 기본 정리 중에서 올바른 것은?
    choices:
      - { id: '1', text: $X \cdot 1 = X$ }
      - { id: '2', text: $X + 1 = X$ }
      - { id: '3', text: $X \cdot 0 = X$ }
      - { id: '4', text: $X \cdot X = 2X$ }
    answers: ['1']
    explanation: |
      선택지 1: 부울곱에서 1은 항등원이므로 $X \cdot 1=X$가 성립한다.
      선택지 2: $X+1=1$이므로 $X$가 아니다.
      선택지 3: $X \cdot 0=0$이므로 $X$가 아니다.
      선택지 4: 부울대수에서 $X \cdot X=X$이며 2X 같은 산술식으로 표현하지 않는다.

      핵심 개념:
      부울대수의 항등법칙, 지배법칙, 멱등법칙은 일반 산술과 다른 형태로 적용된다.
    tags: [boolean-algebra]

  - id: l08-05
    type: multiple-choice
    prompt: 부울대수의 기본 정리 중에서 올바른 것은?
    choices:
      - { id: '1', text: '$X+Y=Y+X$: 교환법칙' }
      - { id: '2', text: '$X+X \cdot Y=X$: 드 모르간 정리' }
      - { id: '3', text: '$X \cdot (X+Y'')=X$: 결합법칙' }
      - { id: '4', text: '$XY=YX$: 분배법칙' }
    answers: ['1']
    explanation: |
      선택지 1: $X+Y=Y+X$는 부울합의 교환법칙이므로 법칙 이름이 맞다.
      선택지 2: $X+XY=X$는 흡수법칙이지 드 모르간 정리가 아니다.
      선택지 3: $X(X+Y')=X$는 흡수법칙의 형태이지 결합법칙이 아니다.
      선택지 4: $XY=YX$는 부울곱의 교환법칙이지 분배법칙이 아니다.

      핵심 개념:
      부울대수 법칙은 식의 성립 여부뿐 아니라 해당 법칙의 이름까지 구분해야 한다.
    tags: [boolean-algebra]

  - id: l09-01
    type: multiple-choice
    prompt: 그래프에 관련된 용어에 대한 설명으로 옳은 것은?
    choices:
