      - { id: '2', text: abba }
      - { id: '3', text: aabb }
      - { id: '4', text: baba }
    answers: ['2']
    explanation: |
      선택지 1: 첫 입력 0의 출력은 $a$이지만, 두 번째 입력 0에서 $s_1$에 머물며 $b$를 출력하므로 두 번째 문자가 $b$여야 한다.
      선택지 2: $s_0$에서 0을 읽어 $a$, $s_1$에서 0을 읽어 $b$, $s_1$에서 1을 읽어 $b$, $s_0$에서 1을 읽어 $a$를 출력하므로 $abba$가 맞다.
      선택지 3: 두 번째 입력 0의 출력은 $b$이므로 $aabb$는 맞지 않는다.
      선택지 4: 첫 입력 0의 출력이 $a$이므로 $baba$는 시작부터 맞지 않는다.

      핵심 개념:
      출력이 있는 유한 오토마타에서는 입력을 한 글자씩 읽으며 전이를 따라가고, 각 전이에 붙은 출력을 순서대로 이어 붙인다.
