      핵심 개념:
      그래프 동형은 꼭지점의 위치나 이름이 아니라 인접 관계와 차수 구조가 보존되는지를 본다.
    tags: [graph-isomorphism]

  - id: l09-04
    type: multiple-choice
    prompt: 다음 그래프에 대한 설명으로 옳은 것은?
    passageRefs: [g09-04-directed-graph]
    choices:
      - { id: '1', text: '$v_1$의 진출 차수는 2이다.' }
      - { id: '2', text: '$v_2$의 진입 차수는 2이다.' }
      - { id: '3', text: '$v_3$의 진입 차수는 3이다.' }
      - { id: '4', text: '$v_4$의 진출 차수는 0이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $v_1$에서 $v_2$와 $v_3$으로 나가는 변이 있어 진출 차수는 2이다.
      선택지 2: $v_2$로 들어오는 변은 $v_1 \to v_2$ 하나이므로 진입 차수는 1이다.
      선택지 3: $v_3$으로 들어오는 변은 $v_2 \to v_3$, $v_1 \to v_3$ 두 개이므로 진입 차수는 2이다.
      선택지 4: $v_4$에서 $v_1$로 나가는 변이 있으므로 진출 차수는 0이 아니다.

      핵심 개념:
      방향 그래프에서 진출 차수는 꼭지점에서 나가는 화살표 수, 진입 차수는 들어오는 화살표 수이다.
    tags: [directed-graph]

  - id: l09-05
    type: multiple-choice
    prompt: 다음 그래프에서 차수가 3인 꼭지점들을 모두 고른 것은?
