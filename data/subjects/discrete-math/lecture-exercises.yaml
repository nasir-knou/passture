      선택지 3: 시작 111은 32개, 끝 111도 32개이고 둘 다 해당하는 4개를 한 번 빼면 60개이다.
      선택지 4: 88은 두 집합의 중복을 고려한 포함배제 계산과 맞지 않는다.

      핵심 개념:
      두 조건 중 하나 이상을 만족하는 경우의 수는 포함배제 원리 $|A\cup B|=|A|+|B|-|A\cap B|$로 계산한다.
