      - {
          id: '2',
          text: 두 꼭지점을 연결하는 변이 두 개 이상 있을 때 이러한 변들을 병렬 변이라 한다.,
        }
      - { id: '3', text: 어떠한 변도 연결되지 않은 그래프를 무향 그래프라 한다. }
      - { id: '4', text: 어떤 루프나 어떤 병렬 변을 가지지 않는 무향 그래프를 완전 그래프라 한다. }
    answers: ['2']
