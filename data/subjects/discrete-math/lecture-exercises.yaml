    answers: ['3']
    explanation: |
      선택지 1: $v_1$은 네 변과 연결되어 차수가 4이다.
      선택지 2: $v_2$는 $v_1$, $v_5$와만 연결되어 차수가 2이고, $v_3$은 차수가 3이다.
      선택지 3: $v_3$과 $v_4$는 각각 세 변과 연결되어 차수가 3이다.
      선택지 4: $v_5$는 네 변과 연결되어 차수가 4이므로 포함되면 안 된다.

      핵심 개념:
      무향 그래프에서 꼭지점의 차수는 그 꼭지점에 연결된 변의 수이며, 루프가 있으면 보통 2로 센다.
    tags: [degree]
  - id: l10-01
    type: multiple-choice
    prompt: 다음 보기 중 평면 그래프가 아닌 것은?
    choices:
      - {
          id: '1',
          text: '① 바깥 삼각형과 중앙 꼭짓점을 세 바깥 꼭짓점에 연결한 $K_4$ 형태의 그래프',
        }
      - { id: '2', text: '② 네 꼭짓점이 모두 서로 연결된 완전 그래프 $K_4$' }
      - { id: '3', text: '③ 오각형에 일부 대각선을 더한 그래프' }
      - {
          id: '4',
          text: '④ 위쪽 세 꼭짓점과 아래쪽 세 꼭짓점 사이를 모두 연결한 완전 이분 그래프 $K_{3,3}$',
        }
    answers: ['4']
    explanation: |
      선택지 1: 교차 없이 평면에 다시 그릴 수 있는 구조이므로 평면 그래프이다.
      선택지 2: $K_4$는 평면 그래프로 그릴 수 있으므로 평면 그래프가 아닌 보기가 아니다.
      선택지 3: 그림상 교차가 있어도 평면 그래프 여부는 다시 그릴 수 있는지로 판단하며, 평면 그래프로 볼 수 있다.
      선택지 4: $K_{3,3}$ 형태의 완전 이분 그래프는 평면 그래프가 아니므로 정답이다.

      핵심 개념:
      평면 그래프는 변이 꼭지점 이외에서 교차하지 않도록 그릴 수 있는 그래프이며, $K_5$와 $K_{3,3}$는 대표적인 비평면 그래프이다.
    tags: [planar-graph]

  - id: l10-02
    type: multiple-choice
    prompt: 어떤 연결된 평면 그래프가 꼭지점이 5개, 변이 6개가 있을 때 면의 수는 몇 개인가?
    choices:
      - { id: '1', text: 3개 }
      - { id: '2', text: 4개 }
      - { id: '3', text: 5개 }
      - { id: '4', text: 6개 }
    answers: ['1']
    explanation: |
      선택지 1: 오일러 공식 $v-e+f=2$에 $v=5$, $e=6$을 대입하면 $5-6+f=2$이므로 $f=3$이다.
      선택지 2: $f=4$이면 $5-6+4=3$이라 오일러 공식과 맞지 않는다.
      선택지 3: $f=5$이면 좌변이 4가 되어 틀리다.
      선택지 4: $f=6$이면 좌변이 5가 되어 틀리다.

      핵심 개념:
      연결된 평면 그래프에서는 꼭지점 수 $v$, 변 수 $e$, 면 수 $f$가 $v-e+f=2$를 만족한다.
    tags: [planar-graph]

  - id: l10-03
    type: multiple-choice
    prompt: 오일러 투어에 대한 설명으로 옳은 것은?
    choices:
