          시작점과 종점이 동일하면 오일러 투어라 한다.,
        }
      - {
          id: '3',
          text: 주어진 그래프가 연결 그래프이고 모든 꼭지점의 차수가 홀수라면,
          해당 그래프는 오일러 투어를 가진다.,
        }
      - {
          id: '4',
          text: 오일러 트레일은 오일러 투어이지만,
          오일러 투어라고 해서 반드시 오일러 트레일이 되는 것은 아니다.,
        }
    answers: ['2']
    explanation: |
      선택지 1: 오일러 투어가 존재하려면 연결 그래프의 모든 꼭지점 차수가 짝수여야 하므로 홀수라는 설명은 틀렸다.
      선택지 2: 모든 변을 정확히 한 번씩 지나고 시작점과 종점이 같으면 오일러 투어이므로 옳다.
      선택지 3: 모든 꼭지점의 차수가 홀수이면 오일러 투어 조건을 만족하지 않는다.
      선택지 4: 오일러 투어는 시작점과 끝점이 같은 오일러 트레일의 특수한 경우이므로 설명의 포함 관계가 틀렸다.

      핵심 개념:
      오일러 투어는 그래프의 모든 변을 한 번씩 사용하는 닫힌 경로이며, 연결 그래프에서는 모든 꼭지점의 차수가 짝수여야 한다.
    tags: [euler-tour]

  - id: l10-04
    type: multiple-choice
    prompt: 그래프에서 해밀턴 경로와 해밀턴 사이클에 대한 설명으로 잘못된 것은?
    choices:
      - { id: '1', text: 모든 꼭지점을 한 번씩만 지나는 경로를 해밀턴 경로라 한다. }
      - { id: '2', text: 시작점과 종점이 같은 해밀턴 경로를 해밀턴 사이클이라고 한다. }
      - { id: '3', text: 해밀턴 경로가 존재하면, 해밀턴 사이클이 존재한다. }
      - { id: '4', text: 해밀턴 사이클이 존재하면, 해밀턴 경로가 존재한다. }
    answers: ['3']
    explanation: |
      선택지 1: 모든 꼭지점을 정확히 한 번씩 지나는 경로는 해밀턴 경로이므로 맞다.
      선택지 2: 시작점과 종점이 같아 닫힌 형태가 되면 해밀턴 사이클이라고 한다.
      선택지 3: 해밀턴 경로가 존재해도 마지막 꼭지점에서 시작 꼭지점으로 돌아오는 변이 없을 수 있으므로 해밀턴 사이클이 항상 존재하지는 않는다.
      선택지 4: 해밀턴 사이클에서 한 변을 제거하면 모든 꼭지점을 지나는 해밀턴 경로를 얻을 수 있으므로 맞다.

      핵심 개념:
      해밀턴 경로는 모든 꼭지점을 한 번씩 방문하고, 해밀턴 사이클은 시작점으로 되돌아오는 닫힌 해밀턴 경로이다.
    tags: [hamiltonian]

  - id: l11-01
    type: multiple-choice
    prompt: 다음 중 트리가 아닌 것은?
    choices:
      - { id: '1', text: '① 꼭짓점 두 개와 그 사이의 변 하나로 이루어진 그래프' }
      - { id: '2', text: '② 세 꼭짓점이 서로 연결되어 삼각형 사이클을 이루는 그래프' }
      - { id: '3', text: '③ 한 꼭짓점에서 세 잎으로 뻗는 별 모양 그래프' }
      - { id: '4', text: '④ 루트에서 두 갈래로 뻗고 각 가지가 다시 잎으로 이어지는 계층형 그래프' }
    answers: ['2']
    explanation: |
      선택지 1: 두 꼭지점과 한 변으로 이루어진 연결 비순환 그래프이므로 트리이다.
      선택지 2: 세 꼭지점이 서로 연결되어 사이클을 이루므로 트리가 아니다.
      선택지 3: 한 루트에서 세 잎으로 뻗는 연결 비순환 그래프이므로 트리이다.
      선택지 4: 계층 구조를 이루며 사이클이 없으므로 트리이다.

      핵심 개념:
      트리는 연결되어 있고 사이클이 없는 단순 그래프이다.
    tags: [tree]

  - id: l11-02
    type: multiple-choice
    prompt: 트리에 대한 설명으로 옳지 않은 것은?
    choices:
      - { id: '1', text: 사이클이 없는 단순 연결 그래프를 트리라 한다. }
