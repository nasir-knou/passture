    explanation: |
      선택지 1: 가장 큰 정사각형 한 변은 $\gcd(30,36)=6$이고 필요한 개수는 $(30/6)(36/6)=5\cdot6=30$이다.
      선택지 2: 36은 한 변 6m 정사각형을 사용할 때의 개수와 맞지 않는다.
