      - { id: '4', text: '0100' }
    answers: ['4']
    explanation: |
      선택지 1: $s_0 \xrightarrow{0} s_1 \xrightarrow{0} s_2 \xrightarrow{1} s_0 \xrightarrow{1} s_0$이므로 비수락 상태에서 끝난다.
      선택지 2: $s_0 \xrightarrow{0} s_1 \xrightarrow{1} s_0 \xrightarrow{0} s_1 \xrightarrow{1} s_0$이므로 수락되지 않는다.
      선택지 3: $s_0 \xrightarrow{0} s_1 \xrightarrow{0} s_2 \xrightarrow{0} s_2 \xrightarrow{1} s_0$이므로 마지막 상태가 $s_2$가 아니다.
      선택지 4: $s_0 \xrightarrow{0} s_1 \xrightarrow{1} s_0 \xrightarrow{0} s_1 \xrightarrow{0} s_2$가 되어 수락 상태에서 끝난다.

      핵심 개념:
      결정적 유한 오토마타는 입력 문자열을 모두 읽은 뒤 도달한 상태가 수락 상태이면 그 문자열을 수락한다.
