      - { id: '3', text: 행렬과 행렬의 곱연산은 교환법칙과 결합법칙이 성립한다. }
      - { id: '4', text: 행렬의 모든 원소가 부울값으로만 구성된 행렬을 부울행렬이라고 한다. }
    answers: ['3']
    explanation: |
      선택지 1: 모든 원소가 0인 행렬은 영행렬이므로 적절하다.
      선택지 2: 행의 수와 열의 수가 같은 행렬은 정방행렬이므로 적절하다.
      선택지 3: 행렬곱은 결합법칙은 성립하지만 일반적으로 교환법칙은 성립하지 않으므로 부적절하다.
      선택지 4: 원소가 0 또는 1 같은 부울값으로 구성된 행렬은 부울행렬이므로 적절하다.

      핵심 개념:
      행렬곱은 일반적으로 $AB \ne BA$이므로 교환법칙을 함부로 적용할 수 없다.
    tags: [matrix]

  - id: l06-01
    type: multiple-choice
    prompt: 집합 A={1,2,3,4}, B={3,4}일 때, R={(a,b)|a+b=5}로 옳은 것은?
    choices:
      - { id: '1', text: 3 R 3이 성립한다. }
      - { id: '2', text: 4 R 4이 성립한다. }
      - { id: '3', text: 2 R 3이 성립하지 않는다. }
      - { id: '4', text: 1 R 4이 성립한다. }
    answers: ['4']
    explanation: |
      선택지 1: $3+3=6$이므로 3 R 3은 성립하지 않는다.
      선택지 2: $4+4=8$이므로 4 R 4는 성립하지 않는다.
      선택지 3: $2+3=5$이므로 2 R 3은 성립한다. 따라서 "성립하지 않는다"는 틀렸다.
      선택지 4: $1+4=5$이므로 1 R 4가 성립한다.

      핵심 개념:
      관계 $R=\{(a,b)\mid 조건\}$에서는 각 순서쌍이 조건을 만족하는지 직접 대입해 확인한다.
    tags: [relation]

  - id: l06-02
    type: multiple-choice
    prompt: 집합 A={1,2,3,4,5}, B={3,4,5}일 때, R={(a,b)|a+b=7}로 옳은 것은?
    choices:
