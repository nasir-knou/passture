        }
      - {
          id: '3',
          text: '모든 $a,b,c \in A$에 대해 $(aRb \wedge bRc) \to aRc$가 성립하면 관계 R은 추이적이라고 한다.',
        }
      - {
          id: '4',
          text: '모든 $a,b,c \in A$에 대해 $(aRb \vee bRc) \to aRc$가 성립하면 관계 R은 반사적이라 한다.',
        }
    answers: ['4']
    explanation: |
