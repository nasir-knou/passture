      선택지 2: $aRb$이면 $bRa$가 성립하는 성질은 대칭성이므로 맞다.
      선택지 3: $aRb$와 $bRc$에서 $aRc$가 따라오면 추이성이므로 맞다.
      선택지 4: 반사성은 $aRa$ 조건인데, 제시된 식은 반사성의 정의가 아니므로 잘못된 설명이다.

      핵심 개념:
      관계의 반사성, 대칭성, 추이성은 각각 자기 자신과의 관계, 순서쌍의 뒤집힘, 관계의 연결성을 나타낸다.
    tags: [relation]

  - id: l06-05
    type: multiple-choice
    prompt: A에서 B로의 관계일 때, R의 역관계 $R^{-1}$으로 옳은 것은?
    choices:
