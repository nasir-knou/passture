  - id: g15-05-graph-terms
    type: text
    body: |
      꼭짓점의 집합 $V$와 변의 집합 $E$를 가지는 그래프 $G$는 $G=(V,E)$와 같이 표현한다.

      (     )은 두 꼭짓점을 연결하는 역할을 수행하는데 연결된 두 꼭짓점은 서로 (     )하다고 한다.
      동일한 꼭짓점을 연결하는 변은 특별히 (     )이라고 하고, 동일한 두 꼭짓점을 연결하는 여러 개의 변은 (     ) 변이라 한다.

questions:
  - id: l01-03
    type: multiple-choice
    prompt: 위 의사코드에서 주요하게 사용된 구조는?
    passageRefs: [g01-03-pseudocode]
    choices:
      - { id: '1', text: 순차구조 }
      - { id: '2', text: 선택구조 }
      - { id: '3', text: 반복구조 }
      - { id: '4', text: 조건구조 }
    answers: ['3']
    explanation: |
      선택지 1: 순차구조는 명령을 한 번씩 차례대로 실행하는 구조이지만, 지문은 for 반복문이 핵심이다.
      선택지 2: 선택구조는 조건에 따라 실행 경로가 갈라지는 구조인데, 지문에는 분기 조건문이 없다.
      선택지 3: 바깥쪽 for와 안쪽 for가 반복을 수행하므로 주요하게 사용된 구조는 반복구조이다.
      선택지 4: 조건구조는 선택구조와 같은 맥락의 분기 구조로, 지문의 핵심 구조가 아니다.

      핵심 개념:
      알고리즘의 기본 제어 구조는 순차, 선택, 반복이며 for 문은 대표적인 반복구조이다.
    tags: [algorithm]

  - id: l01-04
    type: multiple-choice
    prompt: 다음 중 추상화에 관하여 부적절한 서술은?
    choices:
      - { id: '1', text: 추상화란 문제와 관련된 핵심내용을 제외한 것을 제거하는 것이다. }
      - { id: '2', text: 논리회로는 변형시키거나 단순화 할 수 없다. }
      - { id: '3', text: 수학적 추상모델은 문제 해결을 위해 다른 모델로 변형되기도 한다. }
      - { id: '4', text: 컴퓨터 과학에서는 정보 모델링을 통해서 다양한 문제를 해결한다. }
    answers: ['2']
    explanation: |
      선택지 1: 추상화는 문제 해결에 필요한 핵심만 남기고 부차적인 세부사항을 제거하는 과정이므로 적절하다.
      선택지 2: 논리회로는 부울대수, 카르노 맵, 논리식 변환 등을 통해 단순화할 수 있으므로 부적절한 서술이다.
      선택지 3: 수학적 추상모델은 문제 해결 과정에서 동치인 다른 표현이나 모델로 변형될 수 있으므로 적절하다.
      선택지 4: 컴퓨터 과학에서 정보 모델링은 현실 문제를 추상화해 다루는 대표적 방법이므로 적절하다.

      핵심 개념:
      추상화는 복잡한 대상을 핵심 구조로 표현하는 과정이며, 모델은 필요에 따라 변형하거나 단순화할 수 있다.
    tags: [abstraction]

  - id: l01-05
    type: multiple-choice
    prompt: 알고리즘 표현 방법 중 틀린 것은?
    choices:
      - { id: '1', text: 컴퓨터 프로그래밍 언어 }
      - { id: '2', text: 자연언어 }
      - { id: '3', text: 순서도 }
      - { id: '4', text: 의사코드 }
    answers: ['2']
    explanation: |
      선택지 1: 컴퓨터 프로그래밍 언어는 알고리즘을 실행 가능한 형태로 표현하는 방법이다.
      선택지 2: 자연언어는 설명에 활용될 수는 있지만 모호성이 커서 엄밀한 알고리즘 표현 방법으로 보기 어렵다.
      선택지 3: 순서도는 알고리즘의 흐름을 도식으로 나타내는 표현 방법이다.
      선택지 4: 의사코드는 프로그래밍 언어와 자연언어의 중간 형태로 알고리즘을 표현한다.

      핵심 개념:
      알고리즘 표현은 모호성을 줄이고 실행 순서와 제어 구조를 명확히 드러내야 한다.
    tags: [algorithm]

  - id: l02-01
    type: multiple-choice
    prompt: 다음 중 명제인 것은?
    choices:
      - { id: '1', text: 이번 시험 잘 보자 }
      - { id: '2', text: 해는 동쪽에서 떠서 서쪽으로 진다 }
      - { id: '3', text: 아 이것 참 아름답다 }
      - { id: '4', text: 지금 기분이 어때? }
    answers: ['2']
    explanation: |
      선택지 1: 권유문은 참과 거짓을 판정할 수 없으므로 명제가 아니다.
      선택지 2: 해가 동쪽에서 떠서 서쪽으로 진다는 평서문은 참 또는 거짓을 판정할 수 있으므로 명제이다.
      선택지 3: 감탄문은 주관적 표현이라 참과 거짓을 판정하기 어렵다.
      선택지 4: 의문문은 질문이므로 참 또는 거짓의 진리값을 갖는 명제가 아니다.

      핵심 개념:
      명제는 참 또는 거짓 중 하나의 진리값을 명확히 갖는 문장이다.
    tags: [proposition]

  - id: l02-02
    type: multiple-choice
    prompt: 위 지문에서 명제 p, q에 대한 배타적 논리합 $p \oplus q$의 진리표는?
    choices:
      - id: '1'
        text: ①번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'F']
            - ['T', 'F', 'T']
            - ['T', 'T', 'T']
      - id: '2'
        text: ②번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'F']
            - ['T', 'F', 'T']
            - ['T', 'T', 'T']
      - id: '3'
        text: ③번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'T']
            - ['T', 'F', 'T']
            - ['T', 'T', 'F']
      - id: '4'
        text: ④번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \oplus q$']
          rows:
            - ['F', 'F', 'T']
            - ['F', 'T', 'F']
            - ['T', 'F', 'F']
            - ['T', 'T', 'T']
    answers: ['3']
    explanation: |
      선택지 1: $p=F, q=T$일 때 배타적 논리합은 T이어야 하는데 F로 되어 있어 틀렸다.
      선택지 2: 원문 보기 ②도 $p=F, q=T$ 행이 F로 되어 있어 배타적 논리합의 정의와 맞지 않는다.
      선택지 3: $p$와 $q$의 진리값이 서로 다를 때만 T이고 같을 때 F이므로 올바른 표이다.
      선택지 4: $p$와 $q$가 같은 두 경우가 T로 되어 있어 배타적 논리합이 아니라 동치에 가까운 형태이다.

      핵심 개념:
      배타적 논리합 $p \oplus q$는 두 명제의 진리값이 서로 다를 때만 참이다.
    tags: [truth-table]

  - id: l02-03
    type: multiple-choice
    prompt: 위 지문에서 명제 p, q에 대한 합성명제 $r=(p \vee q)\oplus(p \wedge q)$의 진리표는?
    choices:
      - id: '1'
        text: ①번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$r$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'F']
            - ['T', 'F', 'T']
            - ['T', 'T', 'T']
      - id: '2'
        text: ②번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$r$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'F']
            - ['T', 'F', 'T']
            - ['T', 'T', 'T']
      - id: '3'
        text: ③번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$r$']
          rows:
            - ['F', 'F', 'F']
            - ['F', 'T', 'T']
            - ['T', 'F', 'T']
            - ['T', 'T', 'F']
      - id: '4'
        text: ④번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$r$']
          rows:
            - ['F', 'F', 'T']
            - ['F', 'T', 'F']
            - ['T', 'F', 'F']
            - ['T', 'T', 'T']
    answers: ['3']
    explanation: |
      선택지 1: $p=F, q=T$이면 $p \vee q=T$, $p \wedge q=F$이므로 $r=T$이어야 하는데 F이다.
      선택지 2: 원문 보기 ②도 결과열이 F, F, T, T라서 $r$의 값과 맞지 않는다.
      선택지 3: $(p \vee q)\oplus(p \wedge q)$는 정확히 하나만 참인 경우 T가 되어 결과열 F, T, T, F와 일치한다.
      선택지 4: 두 값이 모두 거짓이거나 모두 참인 경우를 T로 두어 $r$의 정의와 반대이다.

      핵심 개념:
      합성명제는 안쪽 연산의 진리값을 먼저 구한 뒤 바깥 논리연산을 적용해 행별로 계산한다.
    tags: [truth-table]

  - id: l02-04
    type: multiple-choice
    prompt: 위 지문에서 조건명제 $p \to q$와 쌍조건명제 $p \leftrightarrow q$의 진리표로 옳은 것은?
    choices:
      - id: '1'
        text: ①번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \to q$', '$p \leftrightarrow q$']
          rows:
            - ['T', 'T', 'T', 'F']
            - ['T', 'F', 'F', 'T']
            - ['F', 'T', 'T', 'F']
            - ['F', 'F', 'T', 'F']
      - id: '2'
        text: ②번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \to q$', '$p \leftrightarrow q$']
          rows:
            - ['T', 'T', 'T', 'F']
            - ['T', 'F', 'F', 'T']
            - ['F', 'T', 'F', 'T']
            - ['F', 'F', 'T', 'F']
      - id: '3'
        text: ③번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \to q$', '$p \leftrightarrow q$']
          rows:
            - ['T', 'T', 'T', 'T']
            - ['T', 'F', 'F', 'F']
            - ['F', 'T', 'F', 'T']
            - ['F', 'F', 'T', 'T']
      - id: '4'
        text: ④번
        diagram:
          type: data-table
          columns: ['$p$', '$q$', '$p \to q$', '$p \leftrightarrow q$']
          rows:
            - ['T', 'T', 'T', 'T']
            - ['T', 'F', 'F', 'F']
            - ['F', 'T', 'T', 'F']
            - ['F', 'F', 'T', 'T']
    answers: ['4']
    explanation: |
      선택지 1: $p$와 $q$가 모두 참이면 쌍조건명제도 참이어야 하는데 F로 되어 있다.
      선택지 2: $p=F, q=T$이면 조건명제 $p \to q$는 참이어야 하는데 F로 되어 있다.
      선택지 3: $p=F, q=T$에서 조건명제는 참이고 쌍조건명제는 거짓이어야 하는데 둘 다 반대로 되어 있다.
      선택지 4: $p \to q$는 T,F일 때만 F이고, $p \leftrightarrow q$는 두 진리값이 같을 때만 T이므로 올바르다.

      핵심 개념:
      조건명제는 전건이 참이고 후건이 거짓일 때만 거짓이며, 쌍조건명제는 양쪽 진리값이 같을 때 참이다.
    tags: [truth-table]

  - id: l02-05
    type: multiple-choice
    prompt: 다음 중 거짓인 명제는?
    choices:
      - { id: '1', text: 한국의 수도가 서울이라면, 영국의 수도는 파리이다. }
      - { id: '2', text: 물의 분자식이 H₂O₂ 이라면, 지구는 달을 공전한다. }
      - { id: '3', text: 지구가 달을 공전한다. ↔ 물의 분자식이 H₂O₂ 이다. }
      - { id: '4', text: 1+2=5 ↔ 3+7=8 }
    answers: ['1']
    explanation: |
      선택지 1: 한국의 수도가 서울이라는 전건은 참이고 영국의 수도가 파리라는 후건은 거짓이므로 조건명제가 거짓이다.
      선택지 2: 물의 분자식이 H₂O₂라는 전건이 거짓이므로 조건명제 전체는 참이다.
      선택지 3: 지구가 달을 공전한다는 명제와 물의 분자식이 H₂O₂라는 명제는 둘 다 거짓이므로 쌍조건명제는 참이다.
      선택지 4: 1+2=5와 3+7=8은 둘 다 거짓이므로 쌍조건명제는 참이다.

      핵심 개념:
      조건명제 $p \to q$는 $p$가 참이고 $q$가 거짓일 때만 거짓이며, 쌍조건명제는 두 진리값이 같으면 참이다.
    tags: [conditional]

  - id: l02-06
    type: multiple-choice
    prompt: 조건 명제 “한국의 수도가 서울이라면, 영국의 수도는 파리이다”에 관련된 서술로서 옳은 것은?
    choices:
      - { id: '1', text: 역은 “영국의 수도가 파리이면, 한국의 수도는 서울이다”가 된다. }
      - { id: '2', text: 이는 “영국의 수도는 파리가 아니라면 한국의 수도가 서울이 아니다.”가 된다. }
      - {
          id: '3',
          text: 대우는 “한국의 수도가 서울이 아니라면 영국의 수도는 파리가 아니다”가 된다.,
        }
      - { id: '4', text: 주어진 조건 명제의 진리값과 역의 진리값은 동일하다. }
    answers: ['1']
    explanation: |
      선택지 1: 조건명제 $p \to q$의 역은 $q \to p$이므로 "영국의 수도가 파리이면, 한국의 수도는 서울이다"가 맞다.
      선택지 2: "영국의 수도는 파리가 아니라면 한국의 수도가 서울이 아니다"는 대우 $\sim q \to \sim p$에 해당한다.
      선택지 3: 대우는 $\sim q \to \sim p$이므로 제시된 문장은 대우가 아니라 이의 역 방향이다.
      선택지 4: 조건명제와 항상 같은 진리값을 갖는 것은 역이 아니라 대우이다.

      핵심 개념:
      $p \to q$의 역은 $q \to p$, 이는 $\sim p \to \sim q$, 대우는 $\sim q \to \sim p$이다.
    tags: [conditional]

  - id: l03-01
    type: multiple-choice
    prompt: 다음 설명 중 바르지 않은 것은?
    choices:
      - { id: '1', text: 공리란 별도의 증명 없이 참으로 이용되는 명제이다. }
      - { id: '2', text: 정의란 공리와 정의를 통해 참으로 확인된 명제이다. }
      - { id: '3', text: 증명이란 하나의 명제가 참임을 확인하는 과정이다. }
      - { id: '4', text: 정리에는 피타고라스의 정리, 이항정리, 나머지 정리 등이 있다. }
    answers: ['2']
    explanation: |
      선택지 1: 공리는 별도의 증명 없이 참으로 받아들이는 기본 명제이므로 바른 설명이다.
      선택지 2: 공리와 정의 등을 이용해 참으로 확인된 명제는 정의가 아니라 정리이므로 바르지 않다.
      선택지 3: 증명은 명제가 참임을 논리적으로 확인하는 과정이므로 바른 설명이다.
      선택지 4: 피타고라스의 정리, 이항정리, 나머지 정리는 정리의 예이므로 바른 설명이다.

      핵심 개념:
      공리, 정의, 정리, 증명은 수학적 논증에서 서로 다른 역할을 하므로 용어를 구분해야 한다.
    tags: [proof]
  - id: l03-02
    type: multiple-choice
    prompt: 증명방법에 해당하지 않는 것은?
    choices:
      - { id: '1', text: 직접증명법 }
      - { id: '2', text: 수학적 귀납법 }
      - { id: '3', text: 간접증명법 }
      - { id: '4', text: 귀납가정법 }
    answers: ['4']
    explanation: |
      선택지 1: 직접증명법은 가정에서 결론을 바로 이끌어 내는 대표적인 증명방법이다.
      선택지 2: 수학적 귀납법은 자연수 명제를 증명하는 표준 증명방법이다.
      선택지 3: 간접증명법은 대우, 모순 등을 이용해 결론을 보이는 증명방법이다.
      선택지 4: 귀납가정은 수학적 귀납법의 한 단계이지 독립된 증명방법명이 아니다.

      핵심 개념:
      증명방법과 증명 절차 안의 구성요소를 구분해야 한다.
    tags: [proof]

  - id: l03-03
    type: multiple-choice
    prompt: 모든 실수 x, y에 대해 $x>y$이면 $x^2>y^2$에 대한 반례로 올바른 것은?
    choices:
      - { id: '1', text: $x=0, y=1$ }
      - { id: '2', text: $x=0, y=-1$ }
      - { id: '3', text: $x=-1, y=1$ }
      - { id: '4', text: $x=1, y=0$ }
    answers: ['2']
    explanation: |
      선택지 1: $0>1$이 거짓이므로 주어진 조건 $x>y$를 만족하지 않는다.
      선택지 2: $0>-1$은 참이지만 $0^2=0$은 $(-1)^2=1$보다 크지 않으므로 반례이다.
      선택지 3: $-1>1$이 거짓이므로 반례가 아니다.
      선택지 4: $1>0$이고 $1^2>0^2$도 참이므로 반례가 아니다.

      핵심 개념:
      전칭명제를 반박하려면 가정은 참이지만 결론은 거짓이 되는 하나의 반례를 찾으면 된다.
    tags: [counterexample]

  - id: l03-04
    type: multiple-choice
    prompt: 수학적 귀납법의 과정 중 순서가 알맞은 것은?
    choices:
      - { id: '1', text: 기본단계→귀납단계→귀납가정 }
      - { id: '2', text: 귀납단계→귀납가정→기본단계 }
      - { id: '3', text: 귀납가정→기본단계→귀납단계 }
      - { id: '4', text: 기본단계→귀납가정→귀납단계 }
    answers: ['4']
    explanation: |
      선택지 1: 귀납가정은 귀납단계를 증명하기 전에 두어야 하므로 순서가 맞지 않는다.
      선택지 2: 기본단계가 먼저 확인되지 않아 수학적 귀납법의 순서가 아니다.
      선택지 3: 귀납가정은 기본단계 확인 뒤 귀납단계 안에서 사용되므로 처음에 오지 않는다.
      선택지 4: 기본단계를 보인 뒤 귀납가정을 두고 귀납단계를 증명하는 순서가 맞다.

      핵심 개념:
      수학적 귀납법은 기본단계와 귀납단계를 모두 증명해야 자연수 전체에 대한 명제를 보일 수 있다.
    tags: [induction]

  - id: l03-05
    type: multiple-choice
    prompt: 위 지문의 증명에서 사용된 증명 방법은 무엇인가?
    passageRefs: [g03-05-contradiction-proof]
    choices:
      - { id: '1', text: 반증법 }
      - { id: '2', text: 수학적 귀납법 }
      - { id: '3', text: 모순 증명법 }
      - { id: '4', text: 직접 증명법 }
    answers: ['3']
    explanation: |
      선택지 1: 반증법이라고 넓게 부를 수 있지만, 원문은 결론의 부정을 가정해 $2=1$이라는 모순을 얻는 방식이므로 더 정확한 명칭은 모순 증명법이다.
      선택지 2: 자연수에 대한 기본단계와 귀납단계를 보이지 않으므로 수학적 귀납법이 아니다.
      선택지 3: $x \ne 0$을 가정한 뒤 거짓 결론 $2=1$을 이끌어 내므로 모순 증명법이다.
      선택지 4: 가정에서 결론을 바로 유도하지 않고 결론의 부정을 가정하므로 직접 증명법이 아니다.

      핵심 개념:
      모순 증명법은 증명하려는 결론의 부정을 가정하고 불가능한 결과를 도출해 원래 결론을 참으로 보인다.
    tags: [contradiction]

  - id: l04-01
    type: multiple-choice
    prompt: 다음 중 집합인 것은?
    choices:
      - { id: '1', text: '1, 2, 3' }
      - { id: '2', text: '{이산수학, 선형대수, 컴퓨터구조}' }
      - { id: '3', text: '{서울, 대전, 서울, 대구, 광주}' }
      - { id: '4', text: '{1, 2, 3, 2, 3, 4}' }
    answers: ['2']
    explanation: |
      선택지 1: 중괄호 없이 원소만 나열되어 있어 집합 표기라고 보기 어렵다.
      선택지 2: 중괄호 안에 서로 다른 대상이 명확히 제시되어 있으므로 집합이다.
      선택지 3: 서울이 중복되어 있어 집합의 원소 중복 배제 원칙에 맞지 않는 보기이다.
      선택지 4: 2와 3이 중복되어 있어 원문이 의도한 집합 표기로 적절하지 않다.

      핵심 개념:
      집합은 명확히 구분되는 원소들의 모임이며, 같은 원소는 한 번만 포함된 것으로 본다.
    tags: [set]

  - id: l04-02
    type: multiple-choice
    prompt: 집합 $A=\{1,2,3\}$과 동일한 것은?
    choices:
      - { id: '1', text: '$\{x \mid x$는 실수, $0<x<4\}$' }
      - { id: '2', text: '$\{x \mid x$는 정수, $0 \le x \le 4\}$' }
      - { id: '3', text: '$\{x \mid x$는 자연수, $0<x<4\}$' }
      - { id: '4', text: '$\{x \mid x$는 자연수, $0 \le x \le 4\}$' }
    answers: ['3']
    explanation: |
      선택지 1: 실수 조건이면 1, 2, 3뿐 아니라 1.5 같은 무수히 많은 원소가 포함된다.
      선택지 2: 정수 조건에 $0 \le x \le 4$이므로 0과 4까지 포함되어 $A$와 다르다.
      선택지 3: 자연수 중 $0<x<4$를 만족하는 값은 1, 2, 3뿐이므로 $A$와 동일하다.
      선택지 4: 자연수 조건에서 $0 \le x \le 4$이면 보통 1, 2, 3, 4가 포함되어 $A$와 다르다.

      핵심 개념:
      조건제시법에서는 원소의 범위와 자료형 조건을 모두 확인해야 같은 집합인지 판단할 수 있다.
    tags: [set]

  - id: l04-03
    type: multiple-choice
    prompt: 다음과 같은 조건에서 올바른 서술은?
    passageRefs: [g04-03-set-condition]
    choices:
      - { id: '1', text: '$A_1$과 $A_2$는 서로소이다.' }
      - { id: '2', text: '$A_1$과 $A_3$는 서로소이다.' }
      - { id: '3', text: '$A_2$와 $A_4$는 서로소이다.' }
      - { id: '4', text: '$\{A_2, A_4\}$는 $A$의 분할이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $A_1=\{a,b,c,d\}$와 $A_2=\{e,f,g\}$는 공통 원소가 없으므로 서로소이다.
      선택지 2: $A_1$과 $A_3$는 a, c를 공통으로 가지므로 서로소가 아니다.
      선택지 3: $A_2$와 $A_4$는 f를 공통으로 가지므로 서로소가 아니다.
      선택지 4: $A_2$와 $A_4$는 f가 중복되고 a, c가 빠지므로 $A$의 분할이 아니다.

      핵심 개념:
      서로소는 공통 원소가 없는 관계이고, 분할은 공집합이 아닌 서로소 부분집합들이 전체 집합을 빠짐없이 덮어야 한다.
    tags: [set]

  - id: l04-04
    type: multiple-choice
    prompt: 집합 $A=\{a,b,c\}$의 분할로서 부적절한 것은?
    choices:
      - { id: '1', text: '{{a},{b},{c}}' }
      - { id: '2', text: '{{a},{b,c}}' }
      - { id: '3', text: '{{a,b},{b,c}}' }
      - { id: '4', text: '{{a,b,c}}' }
    answers: ['3']
    explanation: |
      선택지 1: 각 원소를 하나씩 나눈 부분집합들은 서로소이고 합집합이 $A$이므로 분할이다.
      선택지 2: $\{a\}$와 $\{b,c\}$는 서로소이고 합집합이 $A$이므로 분할이다.
      선택지 3: $\{a,b\}$와 $\{b,c\}$가 b를 공통으로 가지므로 분할이 아니다.
      선택지 4: 전체 집합 하나만으로 이루어진 모음도 공집합이 아니고 합집합이 $A$이므로 분할이다.

      핵심 개념:
      분할은 서로 겹치지 않는 부분집합들의 모음이어야 하며 모든 원소를 빠짐없이 포함해야 한다.
    tags: [partition]

  - id: l05-01
    type: multiple-choice
    prompt: 위 지문에서 값이 올바른 것은?
    passageRefs: [g05-01-matrix-a]
    choices:
      - { id: '1', text: '[1 1 0 0], 1' }
      - { id: '2', text: '[0 1 1 0], 0' }
      - { id: '3', text: '[0 1 1 0], 1' }
      - { id: '4', text: '[0 0 1 1], 0' }
    answers: ['3']
    explanation: |
      선택지 1: 첫 번째 값은 첫 번째 행이고, 문제에서 묻는 두 번째 행이 아니다.
      선택지 2: 두 번째 행은 맞지만 $a_{33}$은 세 번째 행 세 번째 열의 값 1이므로 0이 아니다.
      선택지 3: 두 번째 행은 [0 1 1 0]이고 $a_{33}=1$이므로 올바르다.
      선택지 4: [0 0 1 1]은 세 번째 행이며 $a_{33}$ 값도 1이다.

      핵심 개념:
      행렬 원소 $a_{ij}$는 i번째 행, j번째 열의 원소를 뜻한다.
    tags: [matrix]

  - id: l05-02
    type: multiple-choice
    prompt: 행렬 A가 다음과 같을 때, 올바르지 않은 것은?
    passageRefs: [g05-02-matrix-a]
    choices:
      - { id: '1', text: 'A의 첫 번째 행은 [1 0 1 1]이다.' }
      - { id: '2', text: 'A의 두 번째 행은 [1 1 1 0]이다.' }
      - { id: '3', text: 'A의 세 번째 열은 [0 1 1]^T이다.' }
      - { id: '4', text: 'A의 네 번째 열은 [1 0 1]^T이다.' }
    answers: ['1']
    explanation: |
      선택지 1: A의 첫 번째 행은 [1 0 0 1]이므로 [1 0 1 1]이라는 설명은 올바르지 않다.
      선택지 2: 두 번째 행은 [1 1 1 0]이므로 올바르다.
      선택지 3: 세 번째 열은 위에서부터 0, 1, 1이므로 올바르다.
      선택지 4: 네 번째 열은 위에서부터 1, 0, 1이므로 올바르다.

      핵심 개념:
      행은 가로 방향, 열은 세로 방향으로 읽으며 행렬의 위치 표기는 행 번호를 먼저 쓴다.
    tags: [matrix]
  - id: l05-03
    type: multiple-choice
    prompt: 행렬 A와 B가 다음과 같을 때 $2B-A$를 구하면?
    passageRefs: [g05-03-matrices-ab]
    choices:
      - { id: '1', text: '[[3,0,3,2],[1,3,4,7],[1,2,1,4]]' }
      - { id: '2', text: '[[3,0,2,0],[2,3,4,7],[4,4,1,4]]' }
      - { id: '3', text: '[[1,2,3,2],[2,0,1,2],[4,4,1,4]]' }
      - { id: '4', text: '[[3,0,3,0],[2,3,2,5],[4,1,3,0]]' }
    answers: ['4']
    explanation: |
      선택지 1: 2행 1열은 $2\cdot1-0=2$인데 1로 되어 있어 틀렸다.
      선택지 2: 1행 3열은 $2\cdot2-1=3$인데 2로 되어 있어 틀렸다.
      선택지 3: 1행 1열은 $2\cdot2-1=3$인데 1로 되어 있어 틀렸다.
      선택지 4: 각 원소별로 $2B-A$를 계산하면 [[3,0,3,0],[2,3,2,5],[4,1,3,0]]이 된다.

      핵심 개념:
      행렬의 상수배와 뺄셈은 같은 위치의 원소끼리 계산한다.
    tags: [matrix]

  - id: l05-04
    type: multiple-choice
    prompt: 행렬에 대한 다음 서술 중 부적절한 것은?
    choices:
