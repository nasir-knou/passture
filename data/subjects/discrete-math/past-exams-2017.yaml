      선택지 3: 5를 루트로 삽입한 뒤 3은 왼쪽, 7은 오른쪽, 4는 3의 오른쪽 자식이 되어 그림과 일치한다.
      선택지 4: 첫 입력이 4라면 루트가 4가 되므로 그림과 다르다.

