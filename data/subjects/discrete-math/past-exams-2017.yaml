passages:
  - id: g17-matrix-ab-01
    type: text
    body: |
      행렬 $A$와 $B$가 아래와 같을 때 물음에 답하시오.

      $$
      A=
      \begin{pmatrix}
      1 & 2\\
      3 & 4
      \end{pmatrix}
      \qquad
      B=
      \begin{pmatrix}
      1 & 1\\
      0 & 1
      \end{pmatrix}
      $$

  - id: g17-anti-diagonal-matrix-01
    type: text
    body: |
      다음 행렬 $A$를 나타내는 용어로서 적절한 것은?

      $$
      A=
      \begin{pmatrix}
      0 & 0 & 1\\
      0 & 1 & 0\\
      1 & 0 & 0
      \end{pmatrix}
      $$

  - id: g17-boolean-matrices-01
    type: text
    body: |
      다음 행렬들에 대한 물음에 답하시오.

      $$
      A=
      \begin{pmatrix}
      1 & 1\\
      0 & 1
      \end{pmatrix}
      \qquad
      B=
      \begin{pmatrix}
      1 & 0\\
      1 & 0
      \end{pmatrix}
      \qquad
      C=
      \begin{pmatrix}
      1 & 0\\
      1 & 1
      \end{pmatrix}
      \qquad
      D=
      \begin{pmatrix}
      1 & 0\\
      0 & 0
      \end{pmatrix}
      $$

