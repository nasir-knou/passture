  - id: e17-24
    type: multiple-choice
    passageRefs: [g17-grid-network-01]
    prompt: 다음과 같은 컴퓨터 네트워크가 있다고 하였을 때, $A$에서 $B$까지 최단 거리로 가는 방법은 몇 가지인가?
    choices:
      - { id: '1', text: '12' }
      - { id: '2', text: '20' }
      - { id: '3', text: '24' }
      - { id: '4', text: '35' }
    answers: ['4']
    explanation: |
      선택지 1: 오른쪽 이동과 위쪽 이동의 배열 수를 과소 계산한 값이다.
      선택지 2: 필요한 이동 수의 조합을 모두 세지 못했다.
      선택지 3: 최단 경로의 전체 순서 배치 수와 맞지 않는다.
      선택지 4: 오른쪽 4번, 위쪽 3번의 순서를 배열하므로 $\binom{7}{3}=35$가지이다.

      핵심 개념:
      격자 그래프에서 최단 경로는 목적지에 가까워지는 방향의 이동만 사용한다.
      필요한 오른쪽 이동 수와 위쪽 이동 수를 합친 뒤, 그 순서를 배열하는 조합 문제로 바꿀 수 있다.
      총 7번 이동 중 위쪽 이동 3번의 위치를 고르면 되므로 $\binom{7}{3}=35$이다.
