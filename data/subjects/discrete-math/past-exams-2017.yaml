    answers: ['2']
    explanation: |
      선택지 1: 세 번째 입력 0을 $s_1$에서 처리할 때 출력은 b이므로 ababa가 아니다.
      선택지 2: $s_0$에서 0/a로 $s_1$, 0/b로 $s_1$, 0/b로 $s_1$, 1/b로 $s_0$, 1/a로 $s_0$가 되어 출력은 abbba이다.
      선택지 3: 두 번째 입력부터 $s_1$의 0/b 루프를 따라야 하므로 aaabb가 아니다.
