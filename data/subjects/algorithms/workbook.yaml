  - id: b02-22
    type: multiple-choice
    prompt: '힙을 1차원 배열 `99 88 66 85 77 15 44 55 22 33 50 7 11 30 1 40`으로 구현한 상태이다. 원소 77의 오른쪽 자식 노드의 값은? 단, 배열의 인덱스는 0부터 시작한다.'
    choices:
      - { id: '1', text: '33' }
      - { id: '2', text: '50' }
      - { id: '3', text: '7' }
      - { id: '4', text: '11' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 33은 77의 왼쪽 자식 위치에 있다.
      선택지 2 (정답): 77은 인덱스 4이고 오른쪽 자식 인덱스는 2*4+2=10이므로 값은 50이다.
      선택지 3 (오답): 7은 다른 부모의 자식 위치에 있다.
      선택지 4 (오답): 11도 77의 자식이 아니다.

      핵심 개념:
      0부터 시작하는 배열 힙에서 인덱스 i의 왼쪽 자식은 2i+1이다.
      오른쪽 자식은 2i+2이다.
      부모 인덱스는 floor((i-1)/2)로 계산할 수 있다.
      배열 표현은 완전 이진 트리의 레벨 순서 저장이다.
