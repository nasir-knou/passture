  - id: b02-05
    type: multiple-choice
    prompt: |
      다음 알고리즘에 대한 설명으로 올바른 것은?

      ```c
      WhatSort(A[], n) {
        for (i = 0; i < n - 1; i++)
          for (j = 0; j < n - 1; j++)
            if (A[j] > A[j + 1])
              A[j]와 A[j + 1]의 위치 교환;
        return A;
      }
      ```
    choices:
      - { id: '1', text: 모든 데이터는 많아야 두 번의 위치 교환이 발생한다. }
      - { id: '2', text: 시간 복잡도는 $O(n\\log n)$이다. }
      - { id: '3', text: 제자리 정렬 알고리즘이 아니다. }
      - { id: '4', text: 같은 값을 갖는 데이터에 대한 정렬 전후의 상대적인 순서가 그대로 유지된다. }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 버블 정렬에서는 한 원소가 여러 번 교환될 수 있다.
      선택지 2 (오답): 제시된 중첩 반복 구조의 시간 복잡도는 Θ(n^2)이다.
      선택지 3 (오답): 인접 원소를 입력 배열 안에서 교환하므로 제자리 정렬이다.
      선택지 4 (정답): A[j] > A[j+1]일 때만 교환하므로 같은 값의 상대 순서가 유지된다.

      핵심 개념:
      버블 정렬은 인접한 두 원소를 비교해 역순이면 교환한다.
      큰 값이 반복적으로 뒤쪽으로 밀려나는 형태로 정렬된다.
      추가 배열 없이 정렬하므로 제자리 정렬이다.
      같은 값은 교환하지 않으면 안정성이 유지된다.
    tags: [chapter:02, sorting, bubble-sort, stability]

