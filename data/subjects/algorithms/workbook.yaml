      핵심 개념:
      KMP는 불일치가 발생하면 텍스트 위치는 유지하고 패턴 위치만 조정한다.
      패턴 위치는 전처리 배열 F를 이용해 이동한다.
      이미 일치한 접두부/접미부 정보를 재사용한다.
      이 때문에 매칭 전체가 O(n)에 수행된다.
