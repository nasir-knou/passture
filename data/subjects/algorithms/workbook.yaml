      선택지 3 (오답): F[7] 값에 머무르지 않고 새 문자 c까지 일치가 확장된다.
      선택지 4 (정답): F[7]=1에서 다음 문자 c가 접두부의 c와 일치하므로 F[8]=2이다.

      핵심 개념:
      KMP 전처리 배열은 패턴 각 위치까지의 최대 접두부/접미부 일치 정보를 담는다.
      새 문자가 기존 접두부 다음 문자와 일치하면 값이 1 증가한다.
      불일치하면 이전 F 값을 따라가며 가능한 접두부 길이를 찾는다.
      전처리 결과는 매칭 중 불필요한 중복 비교를 줄인다.
