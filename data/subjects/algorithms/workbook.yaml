      선택지 2 (오답): 2에서 1로 가는 최단 경로에 중간 정점 5가 포함된다.
      선택지 3 (정답): P[3][1]=2, P[2][1]=5, P[5][1]=0이므로 경로는 3-2-5-1이다.
      선택지 4 (오답): 정점 4를 경유하지 않는다.

      핵심 개념:
      P 테이블은 최단 경로의 중간 정점을 저장한다.
      P[i][j]=0이면 i에서 j로 직접 이동하는 구간이다.
      P[i][j]=k이면 i에서 k, k에서 j로 나누어 재귀적으로 복원한다.
      최단 거리 행렬과 경로 복원 테이블은 서로 다른 정보를 담는다.
    tags: [chapter:04, graph, floyd-warshall, path-reconstruction]

  - id: b04-24
    type: multiple-choice
    prompt: '각 정점을 출발점으로 하는 데이크스트라 알고리즘을 반복적으로 적용하여 모든 쌍 최단 경로 문제를 해결할 경우의 시간 복잡도는? 단, 그래프는 인접 행렬로 표현하고 정점의 개수는 n이다.'
    choices:
      - { id: '1', text: '$O(n\\log n)$' }
      - { id: '2', text: '$O(n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 한 번의 힙 기반 데이크스트라 수준의 표현과 혼동한 값이다.
      선택지 2 (오답): 모든 쌍 최단 경로를 선형 시간에 구할 수 없다.
      선택지 3 (오답): 인접 행렬 데이크스트라 한 번의 시간에 해당한다.
      선택지 4 (정답): 인접 행렬 데이크스트라 O(n^2)을 n개 출발점에 대해 반복하므로 O(n^3)이다.

      핵심 개념:
      인접 행렬 기반 데이크스트라 알고리즘은 한 출발점에 대해 O(|V|^2)이다.
      모든 정점을 출발점으로 삼으면 이를 |V|번 반복한다.
      따라서 전체 시간은 O(|V|^3)이 된다.
      플로이드 알고리즘도 O(n^3)이지만 구현은 더 단순하다.
    tags: [chapter:04, graph, dijkstra, all-pairs-shortest-path]

