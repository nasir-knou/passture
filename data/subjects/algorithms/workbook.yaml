      선택지 2 (정답): 이미 선택된 정점 집합 S와 선택되지 않은 정점 집합 V-S를 잇는 간선 중 최소 가중치 간선을 고른다.
      선택지 3 (오답): S 내부 간선은 새 정점을 추가하지 못한다.
      선택지 4 (오답): V-S 내부 간선은 현재 트리와 연결되지 않는다.

      핵심 개념:
      프림 알고리즘은 하나의 시작 정점에서 트리를 확장한다.
      매 단계에서 현재 트리와 바깥 정점을 잇는 최소 가중치 간선을 선택한다.
      선택된 간선의 바깥쪽 정점이 S에 추가된다.
