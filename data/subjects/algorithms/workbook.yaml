      핵심 개념:
      변환은 한 문제의 입력과 출력을 다른 문제의 입력과 출력 형태로 바꾸는 것이다.
      문제 A를 푸는 알고리즘으로 문제 Q를 풀 수 있으면 Q를 A로 변환한 것이다.
      다항 시간 변환은 변환 자체가 다항 시간에 수행되어야 한다.
      NP-완전성 증명에서 다항 시간 변환이 핵심 도구이다.
