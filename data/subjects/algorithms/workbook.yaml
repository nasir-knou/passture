      - { id: '3', text: 입력 데이터의 자릿수가 상수이면 $O(n)$에 동작한다. }
      - { id: '4', text: 입력 배열 이외에 추가적으로 필요한 저장 공간이 상수 개를 넘지 않는다. }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 기수 정렬은 각 자릿수 정렬에 안정적인 정렬을 사용해야 한다.
      선택지 2 (오답): d번의 자릿수 정렬이 필요하므로 보통 O(dn) 또는 기수 범위를 포함해 표현한다.
      선택지 3 (정답): d가 입력 크기 n보다 매우 작거나 상수이면 전체 수행시간을 O(n)으로 볼 수 있다.
      선택지 4 (오답): 기수 정렬은 보조 배열 등을 사용하므로 제자리 정렬이 아니다.

      핵심 개념:
      기수 정렬은 값을 자릿수별로 나누어 안정적인 정렬을 반복 적용한다.
      LSD 방식은 낮은 자릿수부터, MSD 방식은 높은 자릿수부터 진행한다.
      자릿수 d가 상수이면 n개 데이터에 대해 선형 시간 성능을 기대할 수 있다.
      안정적인 내부 정렬이 자릿수 처리 결과를 유지하는 데 중요하다.
    tags: [chapter:02, sorting, radix-sort]

