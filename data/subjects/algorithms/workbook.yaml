    prompt: 노드의 개수가 n인 레드-블랙 트리의 평균 탐색 시간과 평균 삽입 시간은?
    choices:
      - { id: '1', text: '탐색 $O(\\log n)$, 삽입 $O(\\log n)$' }
      - { id: '2', text: '탐색 $O(\\log n)$, 삽입 $O(n)$' }
      - { id: '3', text: '탐색 $O(n)$, 삽입 $O(\\log n)$' }
      - { id: '4', text: '탐색 $O(n)$, 삽입 $O(n)$' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 레드-블랙 트리는 높이가 O(log n)이므로 탐색과 삽입 모두 O(log n)이다.
      선택지 2 (오답): 삽입 후 조정도 트리 높이를 따라 수행되므로 O(n)이 아니다.
      선택지 3 (오답): 탐색도 균형 높이에 비례해 O(log n)이다.
      선택지 4 (오답): 레드-블랙 트리는 선형 높이로 치우치지 않도록 제한한다.

      핵심 개념:
      레드-블랙 트리는 균형 이진 탐색 트리이다.
      색 규칙은 트리 높이가 로그 차수를 넘지 않도록 제한한다.
      탐색은 루트에서 리프 방향으로 한 경로만 따라간다.
      삽입은 탐색 후 회전과 색 변경을 하며 O(log n) 안에 끝난다.
    tags: [chapter:03, tree, red-black-tree]

  - id: b03-19
    type: multiple-choice
    prompt: '다음 트리가 B-트리의 성질을 만족시키기 위한 t의 값으로 바른 것은? 구조: 루트 [7], 왼쪽 자식 [1 3 5], 오른쪽 자식 [9 11 13 15 17 19 21].'
    choices:
      - { id: '1', text: '2' }
      - { id: '2', text: '3' }
      - { id: '3', text: '4' }
      - { id: '4', text: '5' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): t=2이면 루트가 아닌 노드는 최대 3개 키만 가질 수 있어 오른쪽 자식이 위반한다.
      선택지 2 (오답): t=3이면 최대 5개 키만 허용되어 오른쪽 자식의 7개 키를 담을 수 없다.
      선택지 3 (정답): t=4이면 루트가 아닌 노드는 3개 이상 7개 이하의 키를 가질 수 있어 두 자식이 모두 가능하다.
      선택지 4 (오답): t=5이면 루트가 아닌 노드는 최소 4개 키가 필요해 왼쪽 자식 [1 3 5]가 위반한다.

      핵심 개념:
      B-트리에서 루트가 아닌 노드는 최소 t-1개, 최대 2t-1개의 키를 가진다.
      문제의 왼쪽 자식은 3개, 오른쪽 자식은 7개의 키를 가진다.
      따라서 t-1 <= 3이고 7 <= 2t-1을 동시에 만족해야 한다.
      이를 만족하는 보기의 값은 t=4이다.
    tags: [chapter:03, tree, b-tree]

