      선택지 1 (정답): C[2][4]=min(0+6+3*2*1, 18+0+3*3*1)=min(12,27)=12이다.
      선택지 2 (오답): C[2][3] 값이며 전체 구간 C[2][4]의 최소값이 아니다.
      선택지 3 (오답): 다른 부분 구간 계산값과 혼동한 값이다.
      선택지 4 (오답): 최소 곱셈 횟수보다 크다.

      핵심 개념:
      행렬 연쇄 곱셈은 가능한 분할 위치 k를 모두 검토한다.
      C[i][j]는 Mi부터 Mj까지 곱하는 최소 기본 곱셈 횟수이다.
      점화식은 C[i][j]=min(C[i][k]+C[k+1][j]+d_{i-1}d_kd_j)이다.
      작은 구간 값부터 큰 구간 값으로 테이블을 채운다.
    tags: [chapter:05, matrix-chain-multiplication]

  - id: b05-07
    type: multiple-choice
    prompt: 행렬의 연쇄적 곱셈 알고리즘에서 구한 배열 P[1][4]=2라는 사실로부터 얻어지는 최적의 곱셈 순서는?
    choices:
      - { id: '1', text: '(M1 M2 M3 M4)' }
      - { id: '2', text: 'M1 (M2 M3 M4)' }
      - { id: '3', text: '(M1 M2 M3) M4' }
      - { id: '4', text: '(M1 M2)(M3 M4)' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 괄호 분할 위치가 드러나지 않는다.
      선택지 2 (오답): 분할 위치 k=1에 해당한다.
      선택지 3 (오답): 분할 위치 k=3에 해당한다.
      선택지 4 (정답): P[1][4]=2는 M1..M4를 M1M2와 M3M4로 나누는 것이 최적임을 뜻한다.

      핵심 개념:
      P[i][j]는 C[i][j]를 최소로 만드는 분할 위치 k를 저장한다.
      P[1][4]=2이면 구간 1..4를 1..2와 3..4로 나눈다.
      각 하위 구간도 P 테이블을 이용해 재귀적으로 괄호를 복원한다.
      C 테이블은 비용, P 테이블은 곱셈 순서를 제공한다.
    tags: [chapter:05, matrix-chain-multiplication]

  - id: b05-08
    type: multiple-choice
    prompt: n개 행렬의 연쇄적 곱셈 문제를 해결하는 동적 프로그래밍 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(n)$' }
      - { id: '2', text: '$O(n\\log n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 모든 구간과 분할 위치를 검토해야 하므로 선형이 아니다.
      선택지 2 (오답): 정렬류 알고리즘의 시간과 혼동한 값이다.
      선택지 3 (오답): 구간 수만 고려하고 각 구간의 분할 위치 검토를 빠뜨린 값이다.
      선택지 4 (정답): 구간 i,j와 분할 위치 k를 검토하는 3중 반복 구조로 O(n^3)이다.

      핵심 개념:
      행렬 연쇄 곱셈 DP는 모든 부분 구간의 최소 비용을 계산한다.
      각 구간마다 가능한 분할 위치를 모두 시험한다.
      테이블 C와 P를 채우는 데 O(n^3)이 필요하다.
      이후 P를 이용한 순서 복원은 O(n)에 가능하다.
    tags: [chapter:05, matrix-chain-multiplication]

  - id: b05-09
    type: multiple-choice
    prompt: 'n개 행렬의 연쇄적 곱셈 문제에서 동적 프로그래밍으로 얻은 테이블 P[1..n][1..n]으로부터 행렬의 곱셈 순서를 직접 구하는 알고리즘의 시간 복잡도는?'
    choices:
