      - { id: '4', text: 입력값의 범위가 입력 데이터의 개수보다 작거나 비례할 때 }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 입력 순서는 삽입 정렬이나 퀵 정렬의 성능과 관련될 수 있지만 계수 정렬의 핵심 조건은 아니다.
      선택지 2 (오답): 균등 분포는 버킷 정렬의 조건이다.
      선택지 3 (오답): 자릿수가 상수인 조건은 기수 정렬과 관련된다.
      선택지 4 (정답): 계수 배열의 크기가 입력 개수에 비례해야 전체 수행시간을 선형으로 볼 수 있다.

      핵심 개념:
      계수 정렬은 각 값의 출현 횟수를 세어 정렬 위치를 계산한다.
      수행시간은 입력 개수 n과 값의 범위 k에 의존한다.
      k가 n보다 작거나 n에 비례하면 O(n+k)를 O(n)으로 볼 수 있다.
      값의 범위가 지나치게 크면 공간과 시간이 비효율적이다.
    tags: [chapter:02, sorting, counting-sort]

  - id: b02-30
