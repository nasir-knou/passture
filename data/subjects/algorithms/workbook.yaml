      선택지 2 (오답): 공통 부분 수열 길이는 1보다 길다.
      선택지 3 (정답): X의 세 번째 문자와 Y의 두 번째 문자가 모두 o이므로 LCS[3][2]=LCS[2][1]+1=2이다.
      선택지 4 (오답): 해당 접두부에서 길이 3의 공통 부분 수열은 만들 수 없다.

      핵심 개념:
      LCS 테이블의 LCS[i][j]는 X의 길이 i 접두부와 Y의 길이 j 접두부의 LCS 길이이다.
      두 문자가 같으면 대각선 값에 1을 더한다.
      good와 god의 접두부 goo와 go의 LCS 길이는 2이다.
      테이블 인덱스와 실제 문자의 위치를 정확히 맞춰야 한다.
    tags: [chapter:05, dynamic-programming, lcs]

