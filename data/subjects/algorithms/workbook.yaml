    prompt: '레드-블랙 트리에 25를 삽입한 후의 트리 모양을 올바르게 표현한 것은? 초기 구조는 루트 30(검정), 왼쪽 10(검정), 오른쪽 60(검정), 10의 오른쪽 20(빨강), 60의 자식 40(빨강), 70(빨강)이다.'
