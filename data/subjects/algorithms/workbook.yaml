      선택, 버블, 삽입, 셸, 퀵, 병합, 힙 정렬은 원소 간 비교를 기반으로 한다.
      계수, 기수, 버킷 정렬은 데이터의 범위나 구조를 활용한다.
      비교 기반 정렬은 일반적으로 Ω(n log n)의 하한을 갖는다.
      비비교 정렬은 조건이 맞으면 선형 시간에 가까운 성능도 가능하다.
    tags: [chapter:02, sorting, counting-sort]

  - id: b02-03
    type: multiple-choice
    prompt: '입력 크기 n인 배열에서 i=0부터 n-2까지 반복하며, 매 단계마다 미정렬 부분 A[i..n-1]의 최솟값을 찾아 A[i]와 위치를 교환하는 정렬 알고리즘에 대한 설명으로 올바른 것은?'
    choices:
      - { id: '1', text: 안정적인 정렬 알고리즘이다. }
      - { id: '2', text: 버블 정렬의 처리 과정을 나타낸다. }
      - { id: '3', text: 최악의 수행시간은 $O(n\\log n)$이다. }
      - { id: '4', text: 언제나 동일한 시간 복잡도를 갖는다. }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 선택 정렬은 교환 과정에서 같은 값의 상대 순서가 바뀔 수 있어 일반적으로 안정적이지 않다.
      선택지 2 (오답): 버블 정렬은 인접 원소를 반복 비교하고 교환한다.
      선택지 3 (오답): 선택 정렬의 최악 수행시간은 Θ(n^2)이다.
      선택지 4 (정답): 선택 정렬은 입력 상태와 무관하게 매 단계 최솟값 탐색을 수행하므로 비교 횟수의 차수가 동일하다.

      핵심 개념:
      선택 정렬은 미정렬 구간에서 최솟값을 선택해 앞쪽에 배치한다.
      각 단계에서 남은 구간 전체를 비교해 최솟값을 찾아야 한다.
      이미 정렬된 입력이어도 비교 횟수는 줄어들지 않는다.
      제자리 정렬이지만 안정적인 정렬은 아니다.
