  - id: b02-12
    type: multiple-choice
    prompt: 입력 데이터가 제 순서로 정렬된 상태로 주어졌을 때 퀵 정렬의 수행시간에 해당하는 점화식은? 단, 피벗은 배열의 첫 번째 원소로 지정한다.
    choices:
      - { id: '1', text: '$T(n)=T(n-1)+\\Theta(n),\\ T(1)=\\Theta(1)$' }
