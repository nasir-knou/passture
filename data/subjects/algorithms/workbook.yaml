      각 삭제/재조정은 O(log n), 이를 n번 반복해 O(n log n)이 된다.
      퀵 정렬은 평균 O(n log n)이지만 최악은 O(n^2)이다.
      정렬 알고리즘 비교에서는 최선, 평균, 최악 시간을 구분해야 한다.
