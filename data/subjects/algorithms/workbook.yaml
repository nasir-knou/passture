      접미부는 문자열의 끝에서 끝나는 부분 문자열이다.
      KMP는 접두부와 접미부의 최대 일치 정보를 이용한다.
      전체 문자열 자체는 보통 최대 일치 접두부/접미부 계산에서 제외한다.
