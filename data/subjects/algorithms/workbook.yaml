    type: multiple-choice
    prompt: 'KMP 알고리즘에서 길이 10인 패턴 P=abcd...bce를 전처리하는 중이다. F[0]=-1부터 시작하여 현재 F[7]=1까지 구한 경우, F[8]은?'
    choices:
