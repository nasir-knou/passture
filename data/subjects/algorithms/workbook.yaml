      선택지 4 (오답): 폐쇄형은 Θ(n)이다.

      핵심 개념:
      점화식은 재귀 알고리즘의 수행시간을 표현한다.
      T(n)=T(n-1)+Θ(n)은 1부터 n까지 선형 비용이 누적된다.
      T(n)=T(n/2)+Θ(1)은 로그 단계만 필요하다.
      폐쇄형 차수를 비교하면 알고리즘 효율을 비교할 수 있다.
    tags: [chapter:01, recurrence]

  - id: b02-01
    type: multiple-choice
