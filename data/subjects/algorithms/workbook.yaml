      - { id: '3', text: '$T(n)=2T(n/2)+\\Theta(n),\\ T(1)=\\Theta(1)$' }
      - { id: '4', text: '$T(n)=2T(n/2)+\\Theta(1),\\ T(1)=\\Theta(1)$' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 첫 원소를 피벗으로 쓰면 정렬된 입력에서 한쪽 부분배열만 n-1 크기로 남는다.
      선택지 2 (오답): 하위 문제가 절반 하나로 줄어드는 구조가 아니다.
      선택지 3 (오답): 균등하게 두 부분으로 나뉘는 최선의 퀵 정렬 점화식이다.
      선택지 4 (오답): 분할 비용이 상수도 아니고 두 하위 문제가 균등하지도 않다.

      핵심 개념:
      퀵 정렬의 성능은 피벗이 배열을 얼마나 균등하게 나누는지에 좌우된다.
      첫 원소 피벗에서 이미 정렬된 입력은 피벗이 항상 최솟값 또는 최댓값이 된다.
      이 경우 한쪽 부분배열이 비어 있고 다른 쪽은 n-1개가 된다.
      분할은 Θ(n)이므로 점화식은 T(n)=T(n-1)+Θ(n)이다.
    tags: [chapter:02, sorting, quick-sort]

