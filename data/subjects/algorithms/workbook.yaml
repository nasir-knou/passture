      패턴 첫 문자와 텍스트 문자가 자주 다르면 비교 횟수가 줄어든다.
      패턴 앞부분이 길게 일치할수록 비교 횟수가 증가한다.
      텍스트와 패턴의 문자 분포가 실제 비교 횟수에 영향을 준다.
    tags: [chapter:06, string-matching, brute-force]

