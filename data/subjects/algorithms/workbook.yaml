      - { id: '4', text: 셸 정렬 }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 버블 정렬은 인접 교환으로 한 패스마다 큰 값이 뒤쪽으로 이동하는 흐름이 두드러진다.
      선택지 2 (정답): 각 단계에서 미정렬 부분의 최솟값을 찾아 앞쪽 위치와 교환하므로 선택 정렬이다.
      선택지 3 (오답): 삽입 정렬은 앞쪽의 정렬된 부분에 새 원소를 삽입해 나간다.
      선택지 4 (오답): 셸 정렬은 일정 간격의 부분배열에 삽입 정렬을 적용한다.

      핵심 개념:
      선택 정렬은 i번째 단계에서 i번째 위치에 들어갈 최솟값을 찾는다.
      최솟값이 이미 제자리에 있으면 배열 변화가 없을 수 있다.
      단계별로 앞쪽부터 정렬 영역이 확정된다.
