      - { id: '3', text: '$T(n)=T(\\frac{n}{2})+\\Theta(1),\\ T(1)=\\Theta(1)$' }
      - { id: '4', text: '$T(n)=T(\\frac{n}{2})+\\Theta(n),\\ T(1)=\\Theta(1)$' }
    answers: ['3']
