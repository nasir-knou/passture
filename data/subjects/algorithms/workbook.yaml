      선택지 3 (정답): 이중 해싱은 탐사 간격에 다른 해시 함수를 사용해 두 클러스터링 문제를 모두 줄인다.
      선택지 4 (오답): 중간 제곱법은 충돌 해결 방법이 아니라 해시 함수 구성 방법이다.

      핵심 개념:
