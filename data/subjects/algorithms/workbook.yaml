  - id: b02-07
    type: multiple-choice
    prompt: |
      다음 버블 정렬 알고리즘으로 입력 배열 `A[]={60,20,30,40,50}`을 오름차순 정렬할 때, if문에서 수행되는 데이터 간 총 비교 횟수는?

      ```c
      BubbleSort(A[], n) {
        for (i = 0; i < n - 1; i++) {
          Sorted = TRUE;
          for (j = 0; j < (n - 1) - i; j++)
            if (A[j] > A[j + 1]) {
              A[j]와 A[j + 1]의 위치 교환;
              Sorted = FALSE;
            }
          if (Sorted == TRUE) break;
        }
        return A;
      }
      ```
    choices:
      - { id: '1', text: '5' }
      - { id: '2', text: '7' }
      - { id: '3', text: '9' }
      - { id: '4', text: '11' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 첫 번째 패스 4회에 두 번째 패스 비교까지 포함해야 한다.
      선택지 2 (정답): 첫 번째 패스 4회, 두 번째 패스 3회 비교 후 교환이 없어 종료되므로 총 7회이다.
