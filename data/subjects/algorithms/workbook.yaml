      선택지 4 (오답): 이는 버킷 정렬에서 좋은 성능을 기대하기 위한 분포 조건이다.

      핵심 개념:
      제자리 정렬은 보조 공간 사용량이 입력 크기 n에 비례하지 않는 정렬을 말한다.
      안정성은 같은 키를 가진 데이터의 상대 순서를 유지하는 성질이다.
      제자리성과 안정성은 서로 다른 기준이다.
      정렬 알고리즘을 비교할 때 시간 복잡도와 함께 공간 사용량도 살펴야 한다.
    tags: [chapter:02, sorting, in-place]

  - id: b02-02
    type: multiple-choice
    prompt: 다음 중 정렬 방식이 나머지 셋과 다른 하나는?
    choices:
      - { id: '1', text: 힙 정렬 }
      - { id: '2', text: 퀵 정렬 }
