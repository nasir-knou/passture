      - { id: '3', text: 탐색, 삽입, 삭제에 $O(\\log n)$ 시간이 필요하다. }
      - { id: '4', text: 키값을 활용하여 해시 테이블의 주소를 직접 계산한다. }
    answers: ['4']
    explanation: |
