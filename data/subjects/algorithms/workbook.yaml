      선택지 2 (오답): 로그 탐색 구조가 아니다.
      선택지 3 (오답): 패턴 길이에 대한 로그 비용이 발생하지 않는다.
      선택지 4 (정답): 텍스트의 각 위치에서 최대 m개 문자를 비교하므로 O(mn)이다.

      핵심 개념:
