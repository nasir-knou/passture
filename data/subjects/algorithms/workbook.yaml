      - { id: '3', text: '20이 30의 왼쪽 자식이 되고 10과 25가 20의 자식인 상태' }
      - {
          id: '4',
          text: '20이 30의 왼쪽 자식이 되고 10과 25가 20의 자식이며, 20은 검정, 10과 25는 빨강인 상태',
        }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 새 빨강 노드 25가 빨강 부모 20 아래에 있으면 성질을 위반한다.
      선택지 2 (오답): 회전 없이 색만 바꾸는 경우가 아니다.
      선택지 3 (오답): 구조는 맞지만 색 조정까지 반영되어야 한다.
      선택지 4 (정답): 25 삽입 후 회전과 색 변경을 통해 20이 검정 부모가 되고 10과 25가 빨강 자식이 된다.

      핵심 개념:
      레드-블랙 트리 삽입은 새 노드를 빨강으로 넣고 성질 위반을 조정한다.
      부모와 새 노드가 모두 빨강이면 회전과 색 변경이 필요할 수 있다.
      부모의 형제 노드 색과 삽입 방향에 따라 처리 방식이 달라진다.
      최종 트리는 이진 탐색 트리 순서와 레드-블랙 색 조건을 모두 만족해야 한다.
    tags: [chapter:03, tree, red-black-tree, insertion]

  - id: b03-18
