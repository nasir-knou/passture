      - {
          id: '2',
          text: 동일한 값을 갖는 데이터들의 정렬 전의 상대적인 순서가 정렬 후에도 그대로 유지된다.,
        }
      - { id: '3', text: 입력값의 범위가 입력 데이터의 개수에 비례한다. }
      - { id: '4', text: 데이터의 값이 주어진 범위 내에서 확률적으로 균등하게 분포한다. }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 제자리 정렬은 입력 배열 외에 필요한 추가 저장 공간이 상수 개를 넘지 않는 정렬이다.
      선택지 2 (오답): 이는 안정적인 정렬의 설명이다.
