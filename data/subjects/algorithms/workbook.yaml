      선택지 2 (오답): 해시 테이블은 배열처럼 주소가 부여된 저장 공간의 개념과 가깝다.
      선택지 3 (오답): 이상적인 해싱의 탐색, 삽입, 삭제는 평균 상수 시간이다.
      선택지 4 (정답): 해싱은 키값으로 해시 테이블의 저장 위치를 직접 계산한다.

      핵심 개념:
      해싱은 키를 해시 함수에 넣어 테이블 주소를 계산한다.
      적절한 해시 함수는 빠르게 계산되고 충돌을 적게 만들어야 한다.
      충돌이 적으면 평균 탐색, 삽입, 삭제가 O(1)에 가깝다.
      충돌 해결 방법에 따라 실제 성능이 달라진다.
