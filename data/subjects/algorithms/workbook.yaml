      선택지 2 (오답): 로그 구조의 반복이 아니다.
      선택지 3 (오답): 전체 테이블을 다시 모두 순회할 필요가 없다.
      선택지 4 (오답): C와 P를 계산하는 시간 복잡도와 혼동한 값이다.

      핵심 개념:
      P 테이블은 최적 분할 위치를 저장한다.
      최적 곱셈 순서는 P 값을 재귀적으로 따라가며 복원한다.
      n개 행렬의 최종 괄호 구조에는 n-1개의 분할이 있다.
      비용 계산과 순서 복원의 시간 복잡도는 서로 다르다.
    tags: [chapter:05, matrix-chain-multiplication]

  - id: b05-10
    type: multiple-choice
    prompt: LCS 길이를 구하는 점화식으로 바른 것은?
    choices:
      - {
          id: '1',
          text: '기저값 0, 문자가 같으면 LCS(i-1,j-1)+1, 다르면 min(LCS(i,j-1), LCS(i-1,j))',
        }
      - {
          id: '2',
          text: '기저값 0, 문자가 같으면 LCS(i-1,j-1)+1, 다르면 max(LCS(i,j-1), LCS(i-1,j))',
        }
      - {
          id: '3',
          text: '기저값 1, 문자가 같으면 LCS(i-1,j-1)+1, 다르면 max(LCS(i,j-1), LCS(i-1,j))',
        }
      - {
          id: '4',
          text: '기저값 0, 문자가 다르면 LCS(i-1,j-1)+1, 같으면 max(LCS(i,j-1), LCS(i-1,j))',
        }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 문자가 다를 때는 더 긴 부분 수열을 선택해야 하므로 min이 아니라 max이다.
      선택지 2 (정답): LCS 길이 점화식은 기저값 0, 일치 시 대각선+1, 불일치 시 위/왼쪽의 최댓값이다.
      선택지 3 (오답): 빈 문자열과의 LCS 길이는 0이다.
      선택지 4 (오답): 문자 일치와 불일치 조건이 바뀌었다.

      핵심 개념:
      LCS는 두 문자열의 공통 부분 수열 중 가장 긴 것의 길이를 구한다.
      한 문자열 길이가 0이면 LCS 길이는 0이다.
      마지막 문자가 같으면 그 문자를 LCS에 포함하고 대각선 값에 1을 더한다.
      마지막 문자가 다르면 둘 중 하나를 제외한 경우의 최댓값을 사용한다.
    tags: [chapter:05, dynamic-programming, lcs]

  - id: b05-11
