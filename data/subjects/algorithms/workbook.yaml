    explanation: |
      선택지 1 (오답): 첫 원소 피벗의 퀵 정렬은 내림차순 입력에서 O(n^2)의 최악 수행시간이 된다.
      선택지 2 (정답): 합병 정렬은 입력 상태와 무관하게 O(n log n)의 수행시간을 보장한다.
      선택지 3 (오답): 삽입 정렬은 내림차순 입력에서 O(n^2)이 된다.
      선택지 4 (오답): 셸 정렬도 일반적으로 최악 O(n^2)로 설명된다.

      핵심 개념:
      합병 정렬은 항상 배열을 거의 반으로 나누고 선형 시간에 합병한다.
      따라서 최선, 평균, 최악 모두 O(n log n)이다.
      퀵 정렬은 피벗 선택이 나쁘면 O(n^2)이 될 수 있다.
      입력 상태가 주어졌을 때 알고리즘별 최악 성능을 비교해야 한다.
    tags: [chapter:02, sorting, merge-sort, quick-sort]

  - id: b02-19
    type: multiple-choice
    prompt: 퀵 정렬의 분할 함수 Partition()과 합병 정렬의 합병 함수 Merge()의 수행시간을 바르게 나열한 것은?
    choices:
      - { id: '1', text: '$O(n),\\ O(n)$' }
      - { id: '2', text: '$O(n),\\ O(n\\log n)$' }
      - { id: '3', text: '$O(n\\log n),\\ O(n)$' }
      - { id: '4', text: '$O(n\\log n),\\ O(n\\log n)$' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): Partition()과 Merge()는 각각 주어진 구간을 한 번 훑는 선형 시간 함수이다.
      선택지 2 (오답): Merge() 자체는 정렬 전체가 아니라 한 번의 합병이므로 O(n)이다.
      선택지 3 (오답): Partition()도 한 번의 분할에서는 O(n)이다.
      선택지 4 (오답): 두 함수 모두 단일 호출 기준으로 O(n log n)이 아니다.

      핵심 개념:
      Partition()은 피벗과 나머지 원소를 비교하며 좌우 부분배열로 나눈다.
      Merge()는 정렬된 두 부분배열을 하나의 정렬 배열로 합친다.
      두 함수 모두 처리 대상 원소 수에 비례하는 시간이 든다.
      정렬 전체 시간과 내부 함수 한 번의 시간을 구분해야 한다.
    tags: [chapter:02, sorting, quick-sort, merge-sort]

