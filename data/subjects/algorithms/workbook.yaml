      선택지 2 (오답): d가 일치하므로 위로 이동하지 않는다.
      선택지 3 (오답): 마지막 문자가 일치하는 상황을 반영하지 않는다.
      선택지 4 (정답): LCS[4][3]에서 d 일치로 대각선, o 일치로 대각선, 같은 값 중 하나를 거쳐 g 일치로 대각선 이동한다.

      핵심 개념:
