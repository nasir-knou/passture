  - id: b03-22
    type: multiple-choice
    prompt: '키값 K에 대한 해시 함수를 $h(K)=K \\bmod M$으로 정의하는 방법은? 단, M은 해시 테이블의 크기이다.'
    choices:
      - { id: '1', text: 비닝 }
      - { id: '2', text: 가중 합 }
      - { id: '3', text: 제산 잔여법 }
      - { id: '4', text: 중간 제곱법 }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 비닝은 키 집합을 구간으로 나누어 슬롯에 대응시키는 방법이다.
      선택지 2 (오답): 가중 합은 문자열 등의 각 위치에 가중치를 곱해 합산한다.
      선택지 3 (정답): 키를 테이블 크기 M으로 나눈 나머지를 주소로 쓰는 방법은 제산 잔여법이다.
      선택지 4 (오답): 중간 제곱법은 키를 제곱한 뒤 중간 비트를 주소로 사용한다.

      핵심 개념:
      제산 잔여법은 구현이 간단한 대표적 해시 함수이다.
      테이블 크기 M의 선택이 충돌 빈도에 영향을 준다.
      문자열 키에는 비닝, 단순 합, 가중 합 같은 방식도 사용된다.
      해시 함수는 빠른 계산과 균등 분포가 중요하다.
    tags: [chapter:03, hashing, hash-function]

  - id: b03-23
    type: multiple-choice
    prompt: 해시 테이블에서 개방 해싱과 폐쇄 해싱에 대한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: 키값을 해시 테이블의 주소로 변환하는 함수들의 종류이다. }
      - {
          id: '2',
          text: 개방 해싱은 동일한 주소로 해시되는 모든 원소를 연결 리스트 형태로 저장하는 방법이다.,
        }
      - { id: '3', text: 폐쇄 해싱에는 선형 탐사, 이차 탐사, 이중 해싱 등이 있다. }
      - { id: '4', text: $x \\ne y$인 두 키값에 대하여 $h(x)=h(y)$인 경우에 사용하는 방법이다. }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 개방 해싱과 폐쇄 해싱은 해시 함수 종류가 아니라 충돌 해결 방법이다.
      선택지 2 (오답): 개방 해싱은 체이닝 방식으로 충돌 원소를 연결 리스트에 저장한다.
      선택지 3 (오답): 폐쇄 해싱은 테이블 내부 다른 슬롯을 찾으며 선형 탐사, 이차 탐사, 이중 해싱 등을 사용한다.
      선택지 4 (오답): 두 키가 같은 해시 주소로 가는 충돌 상황에서 사용하는 방법이다.

      핵심 개념:
      충돌은 서로 다른 키가 같은 해시 주소를 갖는 경우이다.
      개방 해싱은 테이블 밖 별도 구조에 충돌 데이터를 연결한다.
      폐쇄 해싱은 테이블 내부의 다른 슬롯을 탐사한다.
      해시 함수와 충돌 해결 방법은 구분해야 한다.
    tags: [chapter:03, hashing, collision-resolution]

