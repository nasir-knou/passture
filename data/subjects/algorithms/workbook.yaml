      불일치 문자 규칙과 일치 접미부 규칙의 이동 폭이 성능에 영향을 준다.
    tags: [chapter:06, string-matching, boyer-moore]

  - id: b06-16
    type: multiple-choice
    prompt: 데이터 압축에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: 동일한 저장 공간에 더 많은 파일을 저장할 수 있다. }
      - { id: '2', text: 동일한 대역폭의 네트워크로 더 많은 데이터를 전송할 수 없다. }
      - { id: '3', text: 원래의 데이터를 압축된 데이터로 변환하는 것을 디코딩이라고 한다. }
      - { id: '4', text: 모든 압축 알고리즘은 압축 후 원래의 데이터를 완벽하게 복원할 수 있다. }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 압축은 데이터를 더 적은 공간으로 표현하므로 같은 저장 공간에 더 많이 저장할 수 있다.
      선택지 2 (오답): 압축하면 같은 대역폭으로 더 많은 원본 데이터를 전송할 수 있다.
      선택지 3 (오답): 원본을 압축 데이터로 바꾸는 과정은 인코딩이다.
      선택지 4 (오답): 손실 압축은 원본을 완벽히 복원할 수 없다.

      핵심 개념:
      데이터 압축은 저장 공간과 전송량을 줄이기 위한 표현 방법이다.
      인코딩은 원본을 압축 데이터로 바꾸는 과정이다.
      디코딩은 압축 데이터를 복원하는 과정이다.
      압축은 무손실 압축과 손실 압축으로 나눌 수 있다.
    tags: [chapter:06, compression]

  - id: b06-17
    type: multiple-choice
    prompt: RLE 알고리즘으로 가장 많이 압축되는 스트링은?
    choices:
      - { id: '1', text: '0000000000' }
      - { id: '2', text: '0000000001' }
      - { id: '3', text: '0000011111' }
      - { id: '4', text: '0101010101' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 동일 문자 0이 10번 연속되어 하나의 run으로 표현된다.
      선택지 2 (오답): 0의 run과 1의 run 두 개가 필요하다.
      선택지 3 (오답): 0과 1의 run 두 개가 필요하다.
      선택지 4 (오답): 문자가 매번 바뀌어 압축 효과가 거의 없다.

      핵심 개념:
      RLE는 같은 문자가 연속해서 나타나는 run을 문자와 반복 횟수로 표현한다.
      긴 run이 많을수록 압축률이 높다.
      문자 변화가 잦으면 run이 짧아져 압축 효과가 떨어진다.
      단순하지만 특정 데이터에서는 매우 효과적이다.
    tags: [chapter:06, compression, rle]

  - id: b06-18
    type: multiple-choice
    prompt: 'RLE 알고리즘으로 압축된 `(g,1) (o,2) (d,1) (!,5)`를 디코딩하면?'
    choices:
      - { id: '1', text: 'g1o2d1!5' }
      - { id: '2', text: 'god!' }
      - { id: '3', text: 'good!5' }
      - { id: '4', text: 'good!!!!!' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 반복 횟수를 문자 그대로 출력한 형태이다.
      선택지 2 (오답): 반복 횟수를 반영하지 않았다.
      선택지 3 (오답): 느낌표 반복 횟수 5를 문자로 남겼다.
      선택지 4 (정답): g 1번, o 2번, d 1번, ! 5번을 출력하면 good!!!!!가 된다.

      핵심 개념:
      RLE 디코딩은 각 쌍의 문자를 지정된 횟수만큼 반복한다.
      (문자, 반복 횟수) 형태가 압축 표현이다.
      반복 횟수 자체는 출력 문자열의 일부가 아니다.
      긴 연속 반복을 짧게 저장할 때 유용하다.
    tags: [chapter:06, compression, rle]

  - id: b06-19
    type: multiple-choice
    prompt: 허프만 코딩에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: 허프만 코드는 최적 코드이다. }
      - { id: '2', text: 허프만 코드는 접두부 코드이다. }
      - { id: '3', text: 허프만 트리는 전 이진 트리이다. }
      - { id: '4', text: 허프만 코딩에서는 각 문자에 부여되는 코드의 길이가 모두 서로 다르다. }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 허프만 코드는 빈도 기반 최적 접두부 코드이다.
      선택지 2 (오답): 어떤 코드도 다른 코드의 접두부가 되지 않는다.
      선택지 3 (오답): 허프만 트리는 모든 내부 노드가 두 자식을 갖는 전 이진 트리이다.
      선택지 4 (정답): 코드 길이는 빈도에 따라 달라질 수 있지만 모든 문자의 코드 길이가 반드시 서로 달라야 하는 것은 아니다.

      핵심 개념:
      허프만 코딩은 빈도가 큰 문자에 짧은 코드를 부여한다.
      허프만 코드는 접두부 코드라 즉시 복호화가 가능하다.
      가장 작은 빈도의 두 트리를 반복해서 합쳐 트리를 만든다.
      빈도 구조에 따라 여러 문자가 같은 길이의 코드를 가질 수 있다.
    tags: [chapter:06, compression, huffman-coding]

  - id: b06-20
    type: multiple-choice
    prompt: '허프만 트리를 구하는 과정의 한 단계이다. 현재 트리의 루트 레이블이 (1)=5, (2)=4, (3)=3, (4)=6일 때 다음 단계에서 해야 할 것은?'
    choices:
      - { id: '1', text: '(1)과 (2)를 하나의 트리로 합친다.' }
      - { id: '2', text: '(1)과 (3)을 하나의 트리로 합친다.' }
      - { id: '3', text: '(1)과 (4)를 하나의 트리로 합친다.' }
      - { id: '4', text: '(2)와 (3)을 하나의 트리로 합친다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 5와 4보다 더 작은 3이 있다.
      선택지 2 (오답): 5와 3은 두 최솟값 조합이 아니다.
      선택지 3 (오답): 6은 현재 가장 큰 값이다.
      선택지 4 (정답): 가장 작은 두 트리의 레이블은 3과 4이므로 (2)와 (3)을 합친다.

      핵심 개념:
      허프만 트리는 빈도수가 가장 작은 두 트리를 반복해서 합친다.
      새 내부 노드의 레이블은 두 자식 레이블의 합이다.
      합쳐진 트리는 다시 후보 집합에 들어간다.
      이 과정을 하나의 트리가 남을 때까지 반복한다.
    tags: [chapter:06, compression, huffman-coding]

  - id: b06-21
    type: multiple-choice
    prompt: 스트링 ATATCCGAAA에 대해 허프만 코드를 구했을 때, 가장 짧은 코드가 부여되는 문자는 무엇인가?
    choices:
      - { id: '1', text: A }
      - { id: '2', text: C }
      - { id: '3', text: G }
      - { id: '4', text: T }
    answers: ['1']
    explanation: |
      선택지 1 (정답): A는 5회로 가장 자주 나타나 가장 짧은 코드가 부여된다.
      선택지 2 (오답): C는 2회 등장한다.
      선택지 3 (오답): G는 1회 등장해 긴 코드가 부여된다.
      선택지 4 (오답): T는 2회 등장한다.

      핵심 개념:
      허프만 코딩은 빈도가 높은 문자에 짧은 코드를 부여한다.
      ATATCCGAAA에서 빈도는 A=5, C=2, G=1, T=2이다.
      가장 빈도가 큰 A의 코드 길이가 가장 짧다.
      빈도가 낮은 문자는 상대적으로 긴 코드를 갖는다.
    tags: [chapter:06, compression, huffman-coding]

  - id: b06-22
    type: multiple-choice
    prompt: '허프만 코딩으로 압축된 스트링의 앞부분이 110100111000이고, 코드가 A=0, T=10, G=110, C=111일 때 이를 디코딩한 스트링은?'
    choices:
      - { id: '1', text: GTATTA }
      - { id: '2', text: GTACAA }
      - { id: '3', text: CATCGA }
      - { id: '4', text: CAGACA }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 두 번째 이후 코드 분할이 맞지 않는다.
      선택지 2 (정답): 110/10/0/111/0/0으로 나누면 G T A C A A가 된다.
      선택지 3 (오답): 첫 코드 110을 C로 해석했다.
      선택지 4 (오답): 코드 분할과 문자 대응이 맞지 않는다.

      핵심 개념:
      허프만 코드는 접두부 코드라 왼쪽부터 유일하게 디코딩할 수 있다.
      루트에서 비트를 따라 리프에 도달하면 문자를 출력한다.
      출력 후 다시 루트에서 다음 비트를 읽는다.
      코드 표를 기준으로 비트열을 끊어 읽어야 한다.
    tags: [chapter:06, compression, huffman-coding]

  - id: b06-23
    type: multiple-choice
    prompt: '스트링 ATATCCGAAA는 고정 길이 코드로 표현하면 20비트가 필요하다. 허프만 코드가 A=0, C=111, G=110, T=10일 때 압축한 스트링은 몇 비트인가?'
    choices:
      - { id: '1', text: '16' }
      - { id: '2', text: '18' }
      - { id: '3', text: '20' }
      - { id: '4', text: '22' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 각 문자 빈도와 코드 길이의 곱을 적게 계산했다.
      선택지 2 (정답): A 5회*1 + C 2회*3 + G 1회*3 + T 2회*2 = 18비트이다.
      선택지 3 (오답): 고정 길이 코드의 비트 수이다.
      선택지 4 (오답): 압축 후 비트 수보다 크다.

      핵심 개념:
      허프만 압축 길이는 각 문자 빈도와 코드 길이의 곱을 합해 계산한다.
      자주 나오는 문자는 짧은 코드가 부여되어 전체 길이를 줄인다.
      고정 길이 코드와 가변 길이 코드를 비교하면 압축 효과를 볼 수 있다.
      접두부 코드라 구분 기호 없이도 디코딩 가능하다.
    tags: [chapter:06, compression, huffman-coding]

  - id: b06-24
    type: multiple-choice
    prompt: '슬라이딩 윈도우에서 LL=cabr, LS=abfdab일 때 LZ77 알고리즘으로 현재 상태를 인코딩한 결과로 올바른 것은?'
    choices:
      - { id: '1', text: '(3,2,f)' }
      - { id: '2', text: '(2,3,f)' }
      - { id: '3', text: '(4,3,r)' }
      - { id: '4', text: '(3,4,r)' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): LL의 cabr에서 LS 시작 abfdab와 최대로 맞는 ab의 시작 거리는 3, 길이는 2, 다음 문자는 f이다.
      선택지 2 (오답): 일치 길이를 3으로 볼 수 없다.
      선택지 3 (오답): 일치 문자열과 다음 문자가 맞지 않는다.
      선택지 4 (오답): 길이와 다음 문자 모두 맞지 않는다.

      핵심 개념:
      LZ77은 앞서 나온 문자열과의 거리, 일치 길이, 다음 문자를 저장한다.
      슬라이딩 윈도우의 과거 영역에서 현재 lookahead와 가장 긴 일치를 찾는다.
      일치 길이 뒤의 첫 문자가 세 번째 값으로 들어간다.
      반복 문자열이 많을수록 압축 효과가 커진다.
    tags: [chapter:06, compression, lz77]

  - id: b06-25
    type: multiple-choice
    prompt: '슬라이딩 윈도우에서 LL=gtcgatga, LS=tgatgc일 때 LZ77 알고리즘으로 현재 상태를 인코딩한 결과로 올바른 것은?'
    choices:
      - { id: '1', text: '(0,0,t)' }
      - { id: '2', text: '(3,3,t)' }
      - { id: '3', text: '(3,5,c)' }
      - { id: '4', text: '(7,1,g)' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 과거 영역에 일치 문자열이 존재한다.
      선택지 2 (오답): 일치 길이를 3으로 줄여 잡은 값이다.
      선택지 3 (정답): gtcgatga의 tgatg가 LS의 앞부분과 최대로 일치하고 다음 문자는 c이므로 (3,5,c)이다.
      선택지 4 (오답): 가장 긴 일치를 사용하지 않았다.

      핵심 개념:
      LZ77은 lookahead 문자열과 과거 윈도우의 가장 긴 일치를 찾는다.
      결과는 거리, 일치 길이, 다음 문자로 표현된다.
      가능한 일치 중 가장 긴 것을 선택한다.
      일치 다음 문자는 압축 튜플의 세 번째 항목이다.
    tags: [chapter:06, compression, lz77]

  - id: b06-26
    type: multiple-choice
    prompt: 'LZ77 알고리즘으로 압축된 스트링을 디코딩하고 있다. 현재까지 디코딩된 결과가 zo일 때, 나머지 (1,1,z)(3,2,)까지 디코딩한 결과는?'
    choices:
      - { id: '1', text: zoz }
      - { id: '2', text: zooz }
      - { id: '3', text: zoozoo }
      - { id: '4', text: zoozooz }
    answers: ['3']
    explanation: |
