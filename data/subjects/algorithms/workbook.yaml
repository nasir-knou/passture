subjectId: algorithms
sourceId: workbook
title: 알고리즘 워크북 문제
kind: workbook

questions:
  - id: b01-01
    type: multiple-choice
    prompt: 알고리즘이 만족해야 할 조건에 대한 설명으로 적절하지 않은 것은?
    choices:
      - { id: '1', text: '한정된 수의 단계 후에는 반드시 종료해야 한다.' }
      - { id: '2', text: '모든 명령은 컴퓨터에서 실행 가능해야 한다.' }
      - { id: '3', text: '각 명령은 모호하지 않아야 한다.' }
      - { id: '4', text: '0개 이상의 입력과 출력이 각각 있어야 한다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 유한성은 알고리즘의 필수 조건이다.
      선택지 2 (오답): 효과성에 따라 각 명령은 실제로 수행 가능해야 한다.
      선택지 3 (오답): 명확성에 따라 각 명령은 모호하지 않아야 한다.
      선택지 4 (정답): 알고리즘은 0개 이상의 입력과 하나 이상의 출력을 가져야 하므로 출력이 0개여도 된다는 설명은 부적절하다.

      핵심 개념:
      알고리즘의 이론적 조건은 입출력, 명확성, 유한성, 유효성이다.
      입력은 없을 수도 있지만 출력은 하나 이상 있어야 한다.
      각 단계는 명확하고 실행 가능해야 한다.
      실용적 관점에서는 효율성도 중요한 평가 기준이다.
    tags: [chapter:01, algorithm]

  - id: b01-02
    type: multiple-choice
    prompt: 현실적인 시간 내에 원하는 결과를 얻어야 한다는 측면에서 알고리즘이 갖추어야 할 조건은?
    choices:
      - { id: '1', text: '함축성' }
      - { id: '2', text: '효율성' }
      - { id: '3', text: '무한성' }
      - { id: '4', text: '긴급성' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 함축성은 알고리즘 조건으로 쓰이지 않는다.
      선택지 2 (정답): 현실적인 시간과 자원 안에서 결과를 얻는 성질은 효율성이다.
      선택지 3 (오답): 알고리즘은 유한한 단계 후 종료해야 한다.
      선택지 4 (오답): 긴급성은 알고리즘의 표준 조건이 아니다.

      핵심 개념:
      효율성은 실용적 관점에서 알고리즘을 평가하는 조건이다.
      같은 문제를 풀더라도 시간과 메모리 사용량은 알고리즘마다 다르다.
      현실적인 시간 안에 해를 구할 수 있어야 실제로 사용할 수 있다.
      시간 복잡도와 공간 복잡도는 효율성 분석의 핵심 척도이다.
    tags: [chapter:01, algorithm, efficiency]

  - id: b01-03
    type: multiple-choice
    prompt: 입력의 선택 과정을 거쳐 해를 찾을 때, 각 단계에서 정해진 기준에 따라 자신에게 가장 좋아 보이는 국부적 최적해를 선택해 전체 최적해를 구하는 설계기법은?
    choices:
      - { id: '1', text: '분할정복 방법' }
      - { id: '2', text: '욕심쟁이 방법' }
      - { id: '3', text: '상각분석 방법' }
      - { id: '4', text: '동적 프로그래밍 방법' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 분할정복은 문제를 독립적인 부분 문제로 나누어 해결한다.
      선택지 2 (정답): 욕심쟁이 방법은 매 단계에서 국부적으로 가장 좋아 보이는 선택을 한다.
      선택지 3 (오답): 상각분석은 연산들의 평균적 비용을 분석하는 방법이다.
      선택지 4 (오답): 동적 프로그래밍은 부분 문제의 해를 저장해 재사용한다.

      핵심 개념:
      욕심쟁이 방법은 단계별 최선 선택을 누적한다.
      항상 최적해를 보장하지는 않지만 조건이 맞으면 효율적이다.
      탐욕적 선택 속성과 최적 부분 구조가 중요하다.
      최소 신장 트리, 분할 가능 배낭 문제 등에 적용된다.
    tags: [chapter:01, greedy]

  - id: b01-04
    type: multiple-choice
    prompt: 분할정복 방법에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: '상향적인 문제 해결 방법이다.' }
      - { id: '2', text: '최적화 문제 해결에 주로 사용된다.' }
      - { id: '3', text: '분할된 작은 문제는 서로 독립적이다.' }
      - { id: '4', text: '작은 문제의 해를 테이블에 저장하고 이를 이용하여 문제를 해결한다.' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 분할정복은 큰 문제를 작은 문제로 나누는 하향식 성격이 강하다.
      선택지 2 (오답): 최적화 문제에는 욕심쟁이 방법과 동적 프로그래밍이 주로 쓰이는 경우가 많다.
      선택지 3 (정답): 분할정복에서 나뉜 부분 문제는 서로 독립적으로 해결될 수 있어야 한다.
      선택지 4 (오답): 테이블에 저장해 재사용하는 방식은 동적 프로그래밍이다.

      핵심 개념:
      분할정복은 분할, 정복, 결합 단계로 문제를 해결한다.
      부분 문제는 원래 문제와 같은 형태이며 독립적이어야 한다.
      이진 탐색, 퀵 정렬, 합병 정렬이 대표 예이다.
      중복 부분 문제가 많으면 동적 프로그래밍이 더 적합할 수 있다.
    tags: [chapter:01, divide-and-conquer]

  - id: b01-05
    type: multiple-choice
    prompt: 욕심쟁이 방법이 효율적으로 적용될 수 있는 것은?
    choices:
      - { id: '1', text: '거스름돈 문제' }
      - { id: '2', text: '이진 탐색' }
      - { id: '3', text: '플로이드 알고리즘' }
      - { id: '4', text: '모든 쌍 최단 경로 문제' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 일반적인 동전 체계의 거스름돈 문제는 큰 단위부터 선택하는 욕심쟁이 방법으로 효율적으로 해결할 수 있다.
      선택지 2 (오답): 이진 탐색은 분할정복 방법이다.
      선택지 3 (오답): 플로이드 알고리즘은 동적 프로그래밍을 사용한다.
      선택지 4 (오답): 모든 쌍 최단 경로 문제는 플로이드 알고리즘 같은 동적 프로그래밍으로 다룬다.

      핵심 개념:
      욕심쟁이 방법은 각 단계에서 가장 좋아 보이는 선택을 한다.
      거스름돈, 분할 가능 배낭, 최소 신장 트리 문제 등에 적용될 수 있다.
      모든 문제에서 최적해를 보장하지는 않는다.
      문제의 구조가 탐욕적 선택을 허용하는지 확인해야 한다.
    tags: [chapter:01, greedy]

  - id: b01-06
    type: multiple-choice
    prompt: '쪼갤 수 있는 배낭 문제에서 M=10, 이익 (18, 20, 9, 20), 무게 (3, 5, 3, 4)일 때 욕심쟁이 방법으로 얻을 수 있는 최대 이익은?'
    choices:
      - { id: '1', text: '47' }
      - { id: '2', text: '49' }
      - { id: '3', text: '50' }
      - { id: '4', text: '58' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 단위 무게당 이익 순서대로 분할 선택한 최대값보다 작다.
      선택지 2 (오답): 부분 물체 선택량 계산이 맞지 않는다.
      선택지 3 (정답): 단위 이익은 6,4,3,5이므로 물체 1, 4를 담고 물체 2를 3/5만 담아 18+20+20*(3/5)=50이다.
      선택지 4 (오답): 배낭 용량 10을 초과해 전부 담은 값이다.

      핵심 개념:
      분할 가능 배낭 문제는 물체를 일부만 담을 수 있다.
      단위 무게당 이익이 큰 물체부터 선택하는 욕심쟁이 방법이 최적이다.
      용량이 남으면 다음 물체를 가능한 만큼만 잘라 담는다.
      0/1 배낭 문제와 달리 동적 프로그래밍이 필수는 아니다.
    tags: [chapter:01, greedy, knapsack]

  - id: b01-07
    type: multiple-choice
    prompt: 배열 A=[10, 15, 20, 25, 30, 35, 40, 45, 50]에 대한 이진 탐색 과정에서 가장 적은 횟수의 비교가 필요한 데이터는?
    choices:
      - { id: '1', text: '10' }
      - { id: '2', text: '15' }
      - { id: '3', text: '25' }
      - { id: '4', text: '30' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 30과 비교한 뒤 왼쪽에서 다시 여러 번 비교해야 한다.
      선택지 2 (오답): 중간값 30 이후 왼쪽 부분에서 추가 비교가 필요하다.
      선택지 3 (오답): 30 이후 왼쪽 부분을 거쳐 비교가 필요하다.
      선택지 4 (정답): 배열의 중간값이 30이므로 첫 비교에서 바로 찾는다.

      핵심 개념:
      이진 탐색은 정렬 배열의 중간 원소와 먼저 비교한다.
      목표가 중간값이면 한 번의 비교로 탐색이 끝난다.
      목표가 한쪽 부분 배열에 있으면 탐색 범위를 절반으로 줄인다.
      비교 횟수는 목표 위치에 따라 달라질 수 있다.
    tags: [chapter:01, binary-search]

  - id: b01-08
    type: multiple-choice
    prompt: 다음 설명 중에서 적절한 것은?
    choices:
      - { id: '1', text: '시간 복잡도는 특정한 값으로 고정된 입력 크기를 기준으로 계산한다.' }
      - {
          id: '2',
          text: '입력 데이터의 모든 상태를 고려한 평균 수행시간을 성능 평가의 척도로 사용한다.',
        }
      - { id: '3', text: '시간 복잡도는 알고리즘에서 단위 연산이 수행되는 횟수의 합으로 정의한다.' }
      - {
          id: '4',
          text: '공간 복잡도는 알고리즘 수행에 필요한 주기억장치와 보조기억장치 용량의 합으로 표현한다.',
        }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 시간 복잡도는 입력 크기 n의 함수로 표현한다.
      선택지 2 (오답): 일반적으로 최악 수행시간을 성능 평가 척도로 많이 사용한다.
      선택지 3 (정답): 시간 복잡도는 단위 연산 수행 횟수의 합을 입력 크기의 함수로 나타낸다.
      선택지 4 (오답): 공간 복잡도는 알고리즘 수행에 필요한 메모리 양이며 정적/동적 공간의 합으로 본다.

      핵심 개념:
      알고리즘 분석은 정확성과 효율성을 평가한다.
      시간 복잡도는 수행시간을 단위 연산 횟수로 추상화한다.
      공간 복잡도는 실행에 필요한 메모리 양을 나타낸다.
      복잡도는 입력 크기와 입력 상태에 따라 달라질 수 있다.
    tags: [chapter:01, complexity]

  - id: b01-09
    type: multiple-choice
    prompt: 접근성능에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: '입력 데이터의 상태가 최악인 경우를 가정한 알고리즘의 성능을 의미한다.' }
      - { id: '2', text: '알고리즘의 수행시간을 가장 정확히 표현하는 방법이다.' }
      - { id: '3', text: '수행시간의 다항식 함수에서 계수와 최고 차수의 항을 이용해서 표현한다.' }
      - { id: '4', text: '입력 크기의 증가에 따른 수행시간이 증가하는 경향을 파악하기 쉽다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 최악 입력 성능만을 뜻하는 것은 아니다.
      선택지 2 (오답): 계수와 하위항을 생략하므로 정확한 실행시간 표현은 아니다.
      선택지 3 (오답): 보통 계수는 무시하고 최고차항 중심으로 표현한다.
      선택지 4 (정답): 점근성능은 입력 크기가 커질 때 수행시간 증가 추세를 비교하기 쉽게 한다.

      핵심 개념:
      점근성능은 입력 크기가 충분히 커질 때의 증가율을 본다.
      최고차항 중심으로 단순화해 알고리즘 간 우열을 비교한다.
      실제 시간의 정확한 수치보다 성장 추세를 나타낸다.
      O, Ω, Θ 표기법이 대표적인 점근 표기법이다.
    tags: [chapter:01, asymptotic-notation]

  - id: b01-10
    type: multiple-choice
    prompt: 빅오 표기법에서 f(n)=O(g(n))이 되기 위한 조건으로 알맞은 수식은?
    choices:
      - { id: '1', text: '$g(n) \\le c \\cdot f(n)$' }
      - { id: '2', text: '$g(n) \\ge c \\cdot f(n)$' }
      - { id: '3', text: '$f(n) \\le c \\cdot g(n)$' }
      - { id: '4', text: '$f(n) \\ge c \\cdot g(n)$' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 이는 g가 f의 상수배 이하라는 형태로 방향이 다르다.
      선택지 2 (오답): f의 상한을 직접 나타내지 않는다.
      선택지 3 (정답): 충분히 큰 n에 대해 f(n)이 c*g(n) 이하이면 f(n)=O(g(n))이다.
      선택지 4 (오답): 이는 f가 g의 상수배 이상이라는 하한 형태이다.

      핵심 개념:
      O 표기법은 점근적 상한을 나타낸다.
      양의 상수 c와 n0가 존재해 모든 n >= n0에서 f(n) <= c g(n)이면 된다.
      계수와 낮은 차수 항은 충분히 큰 입력에서 상수배에 흡수된다.
      Ω는 하한, Θ는 상한과 하한을 동시에 나타낸다.
    tags: [chapter:01, asymptotic-notation, big-o]

  - id: b01-11
    type: multiple-choice
    prompt: 일반적으로 '알고리즘의 수행시간이 O(n log n)이다'라는 표현이 의미하는 것은?
    choices:
      - { id: '1', text: '최악의 수행시간이 $O(n\\log n)$이다.' }
      - { id: '2', text: '최선의 수행시간이 $O(n\\log n)$이다.' }
      - { id: '3', text: '평균 수행시간이 $O(n\\log n)$이다.' }
      - { id: '4', text: '최악 및 최선 모두 $O(n\\log n)$이다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): O 표기법은 점근적 상한이므로 일반적으로 최악 수행시간의 상한으로 해석한다.
      선택지 2 (오답): 최선 수행시간은 보통 Ω 표기와 연결해 설명한다.
      선택지 3 (오답): 평균 시간은 별도로 명시해야 한다.
      선택지 4 (오답): O 표기가 최선과 최악이 모두 같다는 뜻은 아니다.

      핵심 개념:
      O 표기법은 함수의 점근적 상한을 나타낸다.
      알고리즘 분석에서 별도 언급이 없으면 최악 수행시간의 상한으로 많이 사용한다.
      Ω는 하한, Θ는 정확한 차수에 가깝다.
      평균 시간은 입력 분포 가정이 필요하다.
    tags: [chapter:01, asymptotic-notation, big-o]

  - id: b01-12
    type: multiple-choice
    prompt: 최선의 수행시간과 최악의 수행시간이 같아서 보다 정확한 성능을 표현할 수 있는 점근성능 표기법은?
    choices:
      - { id: '1', text: '$f(n)=O(g(n))$' }
      - { id: '2', text: '$f(n)=\\Omega(g(n))$' }
      - { id: '3', text: '$f(n)=\\Theta(g(n))$' }
      - { id: '4', text: '$f(n)=\\Phi(g(n))$' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): O는 상한만 나타낸다.
      선택지 2 (오답): Ω는 하한만 나타낸다.
      선택지 3 (정답): Θ는 상한과 하한이 동시에 성립할 때 사용하는 점근 표기이다.
      선택지 4 (오답): Φ는 표준 점근성능 표기법이 아니다.

      핵심 개념:
      Θ 표기법은 함수가 위와 아래에서 같은 차수로 묶일 때 사용한다.
      최선과 최악이 같은 차수이면 Θ로 더 정확한 성능을 나타낼 수 있다.
      O는 너무 느슨한 상한일 수 있다.
      Ω는 최소한 어느 정도 이상 걸린다는 하한 표현이다.
    tags: [chapter:01, asymptotic-notation, theta]

  - id: b01-13
    type: multiple-choice
    prompt: 다음 중 Ω-표기를 나타내는 그래프 설명은?
    choices:
      - { id: '1', text: 'f(n)과 c*g(n)이 교차하며 상하 관계가 고정되지 않는다.' }
      - { id: '2', text: 'f(n)이 c1*g(n)과 c2*g(n) 사이에 놓인다.' }
      - { id: '3', text: 'f(n)이 c*g(n) 이하에 놓인다.' }
      - { id: '4', text: 'f(n)이 c*g(n) 이상에 놓인다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 충분히 큰 n 이후의 하한 관계가 고정되지 않는다.
      선택지 2 (오답): 이는 Θ 표기의 설명이다.
      선택지 3 (오답): 이는 O 표기의 설명이다.
      선택지 4 (정답): Ω 표기는 충분히 큰 n에서 f(n)이 c*g(n) 이상인 점근적 하한을 나타낸다.

      핵심 개념:
      Ω 표기법은 점근적 하한을 나타낸다.
      충분히 큰 입력에서 f(n)이 g(n)의 상수배보다 작아지지 않음을 의미한다.
      O는 상한, Θ는 상한과 하한을 동시에 나타낸다.
      그래프 해석에서는 n0 이후의 관계가 중요하다.
    tags: [chapter:01, asymptotic-notation, omega]

  - id: b01-14
    type: multiple-choice
    prompt: 알고리즘의 성능을 나타내는 빅오 함수 중에서 가장 효율적인 것은?
    choices:
      - { id: '1', text: '$O(n\\log n)$' }
      - { id: '2', text: '$O(\\log n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(2^n)$' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): n log n은 log n보다 빠르게 증가한다.
      선택지 2 (정답): 보기 중 O(log n)이 입력 증가에 따른 증가율이 가장 작아 가장 효율적이다.
      선택지 3 (오답): n^2은 다항 시간 중에서도 증가율이 더 크다.
      선택지 4 (오답): 2^n은 지수 시간으로 매우 빠르게 증가한다.

      핵심 개념:
      빅오 함수는 왼쪽에 위치할수록 보통 더 효율적이다.
      일반적인 증가 순서는 O(1), O(log n), O(n), O(n log n), O(n^2), O(2^n)이다.
      입력 크기가 커질수록 성장률 차이가 중요해진다.
      알고리즘 선택 시 점근 증가율은 핵심 판단 기준이다.
    tags: [chapter:01, complexity-order]

  - id: b01-16
    type: multiple-choice
    prompt: 주어진 점화식의 폐쇄형을 기준으로 비교할 때 가장 비효율적인 것은?
    choices:
      - { id: '1', text: '$T(n)=T(n-1)+\\Theta(n),\\ T(1)=\\Theta(1)$' }
      - { id: '2', text: '$T(n)=T(\\frac{n}{2})+\\Theta(1),\\ T(1)=\\Theta(1)$' }
      - { id: '3', text: '$T(n)=2T(\\frac{n}{2})+\\Theta(n),\\ T(1)=\\Theta(1)$' }
      - { id: '4', text: '$T(n)=2T(\\frac{n}{2})+\\Theta(1),\\ T(1)=\\Theta(1)$' }
    answers: ['1']
    explanation: |
