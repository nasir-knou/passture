      선택지 2 (정답): 트리는 사이클이 없지만 정점이 n개이면 간선은 n-1개이므로 n=m이 아니다.
      선택지 3 (오답): 트리의 임의 간선을 제거하면 연결성이 깨진다.
      선택지 4 (오답): 일반적인 트리는 연결된 무사이클 무방향 그래프이다.

