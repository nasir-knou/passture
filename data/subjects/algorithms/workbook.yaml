      선택지 3 (오답): 퀵 정렬의 최악 수행시간은 피벗이 치우치면 O(n^2)이다.
      선택지 4 (오답): 기수 정렬은 비교 기반 O(n log n) 분류가 아니라 자릿수 조건에 따른 선형 시간 정렬이다.

