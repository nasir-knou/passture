  - id: b04-03
    type: multiple-choice
    prompt: '주어진 무방향 그래프에서 정점 1을 시작 정점으로 깊이 우선 탐색을 수행했을 때 정점 방문 순서에 해당하는 것은? 간선은 (1,2), (1,3), (1,4), (1,7), (2,3), (2,5), (3,6), (6,7)이며, 최근 주변 정점을 우선 방문하는 방식이다.'
    choices:
      - { id: '1', text: '1, 2, 3, 4, 5, 6, 7' }
      - { id: '2', text: '1, 4, 2, 3, 5, 6, 7' }
      - { id: '3', text: '1, 4, 2, 5, 3, 6, 7' }
      - { id: '4', text: '1, 4, 7, 3, 2, 5, 6' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 정점 번호가 작은 순서 기준의 DFS 결과에 가깝다.
      선택지 2 (오답): 2에서 5를 먼저 방문하는 조건이 반영되지 않았다.
      선택지 3 (정답): 1에서 4를 먼저 방문한 뒤 되돌아와 2, 5, 3, 6, 7 순으로 방문한다.
      선택지 4 (오답): 7을 4 직후 방문하는 경로는 주어진 방식의 방문 순서와 맞지 않는다.

      핵심 개념:
      DFS는 한 정점에서 아직 방문하지 않은 인접 정점으로 깊게 내려간다.
      더 갈 곳이 없으면 직전 정점으로 되돌아간다.
      인접 정점을 어떤 순서로 선택하는지에 따라 방문 순서가 달라질 수 있다.
      문제에서 지정한 선택 기준을 방문 순서에 반영해야 한다.
    tags: [chapter:04, graph, dfs]

  - id: b04-04
    type: multiple-choice
    prompt: '주어진 무방향 그래프에서 정점 1을 시작 정점으로 너비 우선 탐색을 수행했을 때 정점 방문 순서에 해당하는 것은? 간선은 (1,2), (1,3), (1,4), (1,7), (2,3), (2,5), (3,6), (6,7)이다.'
    choices:
      - { id: '1', text: '1, 2, 3, 4, 5, 6, 7' }
      - { id: '2', text: '1, 4, 2, 5, 3, 6, 7' }
      - { id: '3', text: '1, 2, 3, 7, 4, 5, 6' }
      - { id: '4', text: '1, 2, 3, 5, 6, 7, 4' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 같은 레벨의 정점 선택 순서가 문제 조건의 결과와 맞지 않는다.
      선택지 2 (오답): 너비 우선 탐색이라기보다 일부 깊이 우선 흐름이 섞여 있다.
      선택지 3 (정답): 큐를 사용해 가까운 주변 정점부터 방문하면 1, 2, 3, 7, 4, 5, 6 순서가 가능하다.
      선택지 4 (오답): 5와 6이 7, 4보다 먼저 방문되는 순서가 맞지 않는다.

      핵심 개념:
      BFS는 시작 정점에서 가까운 정점부터 레벨 순서로 방문한다.
      주변 정점은 큐에 저장해 먼저 들어온 정점부터 처리한다.
      같은 레벨 안에서는 인접 정점 삽입 순서에 따라 결과가 달라질 수 있다.
      DFS와 달리 한 경로를 깊게 내려가지 않는다.
    tags: [chapter:04, graph, bfs]

