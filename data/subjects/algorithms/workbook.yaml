      선택지 2 (정답): JPEG 압축 과정의 순서는 블록화 -> DCT -> 양자화 -> 엔트로피 코딩이다.
      선택지 3 (오답): 동영상 압축은 시간적으로 연속된 프레임의 유사성을 활용한다.
