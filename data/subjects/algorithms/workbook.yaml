      선택지 2 (오답): 두 번째 튜플의 길이 2 복사가 빠졌다.
      선택지 3 (정답): (1,1,z)로 zooz가 되고, (3,2,)로 oo가 복사되어 zoozoo가 된다.
      선택지 4 (오답): 추가 문자를 하나 더 붙인 값이다.

      핵심 개념:
      LZ77 디코딩은 이미 출력한 문자열에서 거리와 길이만큼 복사한다.
      이후 튜플의 다음 문자가 있으면 이어 붙인다.
      복사 대상은 디코딩 중 확장되는 문자열을 참조할 수 있다.
      거리와 길이 해석을 순서대로 적용해야 한다.
    tags: [chapter:06, compression, lz77]

  - id: b06-27
    type: multiple-choice
    prompt: 영상 압축에 대한 설명으로 올바르지 않은 것은?
