  - id: e19-09
    type: multiple-choice
    passageRefs: [g19-quick-partition-data-01]
    prompt: '다음과 같은 데이터에 대해서 퀵 정렬의 분할 함수 Partition()을 한 번 적용한 후 왼쪽 부분배열에 존재하는 데이터의 개수는? (단, 피벗은 맨 왼쪽 원소이고, 오름차순으로 정렬한다.)'
    choices:
      - { id: '1', text: '2' }
      - { id: '2', text: '4' }
      - { id: '3', text: '6' }
      - { id: '4', text: '8' }
    answers: ['2']
    explanation: |
