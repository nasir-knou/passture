      - { id: '2', text: '이진 탐색' }
      - { id: '3', text: '배낭 문제' }
      - { id: '4', text: '합병 정렬' }
    answers: ['2']
    explanation: |
      선택지 1: 퀵 정렬: 분할정복의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 2: 이진 탐색: 분할정복의 정의와 적용 조건에 맞으므로 정답이다.
      선택지 3: 배낭 문제: 분할정복의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 4: 합병 정렬: 분할정복의 정의나 적용 조건과 다르므로 정답이 아니다.

      핵심 개념:
      분할정복은 문제를 독립적인 작은 문제로 나누고, 각 소문제를 해결한 뒤 결과를 결합한다.
      대표 단계는 분할, 정복, 결합이며 정렬 자체는 모든 순환 호출의 공통 단계가 아니다.
    tags: [divide-and-conquer]

