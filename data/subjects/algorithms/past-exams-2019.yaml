          text: '무순서 데이터에 비해 정렬된 데이터에 대해 보다 효과적인 탐색이 가능하다.',
        }
      - { id: '2', text: '모든 데이터 리스트에 적용 가능하다.' }
      - { id: '3', text: 'n개의 데이터에 대한 최대 비교 횟수는 n번이다.' }
      - { id: '4', text: '데이터가 많은 경우에는 적합하지 못한 방법이다.' }
    answers: ['1']
    explanation: |
      선택지 1: 순차 탐색은 처음부터 차례로 비교하는 방법이므로 정렬 여부만으로 이진 탐색처럼 탐색 범위를 절반씩 줄이지 못한다. 따라서 정렬된 데이터에서 특별히 효과적인 탐색이라는 설명은 틀린 설명이다.
      선택지 2: 순차 탐색은 배열, 연결 리스트 등 대부분의 리스트 구조에서 처음부터 끝까지 훑는 방식으로 적용할 수 있다.
      선택지 3: 찾는 값이 없거나 마지막에 있으면 $n$개의 데이터를 모두 비교하므로 최대 비교 횟수는 $n$번이다.
      선택지 4: 데이터가 많으면 최악 $O(n)$ 비교가 필요하므로 효율적인 탐색 방법으로 보기 어렵다.

      핵심 개념:
      순차 탐색은 리스트의 처음부터 목표 값을 찾을 때까지 차례로 비교한다.
      정렬되지 않은 데이터에도 적용할 수 있지만 최악의 경우 n번 비교한다.
    tags: [sequential-search]

  - id: e19-30
    type: multiple-choice
    prompt: '이진 탐색에 대한 설명으로 적절하지 못한 것은?'
    choices:
      - { id: '1', text: '최악의 경우의 탐색 성능은 O(logn)이다.' }
      - { id: '2', text: '정렬된 리스트에 대해서만 적용 가능하다.' }
      - { id: '3', text: '삽입과 삭제가 빈번한 경우에는 적합하지 않다.' }
      - { id: '4', text: '연결 리스트로 구현하면 보다 효율적인 탐색이 가능하다.' }
    answers: ['4']
    explanation: |
      선택지 1: 이진 탐색은 매 비교마다 후보 구간을 절반으로 줄이므로 최악의 경우에도 $O(\log n)$이다.
      선택지 2: 중간값과 비교해 왼쪽 또는 오른쪽을 버리려면 데이터가 정렬되어 있어야 한다.
      선택지 3: 배열 기반 정렬 리스트에서 삽입과 삭제가 잦으면 원소 이동 비용이 커지므로 이진 탐색 구조만으로는 적합하지 않다.
      선택지 4: 연결 리스트는 중간 원소에 바로 접근할 수 없어 이진 탐색의 장점이 사라지므로 더 효율적이라는 설명이 틀렸다.

      핵심 개념:
      이진 탐색은 정렬된 순차 접근 구조에서 중간 원소와 비교하며 탐색 범위를 절반씩 줄인다.
      연결 리스트는 중간 노드 접근이 순차적이므로 이진 탐색 구현에 적합하지 않다.
    tags: [binary-search]

  - id: e19-31
    type: multiple-choice
    prompt: '흑적 트리에 대한 설명으로 적절한 것은?'
    choices:
      - { id: '1', text: '루트 노드는 흑색이거나 적색이다.' }
      - {
          id: '2',
          text: '임의의 노드로부터 리프 노드까지의 경로 상에는 동일한 개수의 적색 노드가 존재한다.',
        }
      - { id: '3', text: '흑색 노드가 연달아 나타날 수 없다.' }
      - { id: '4', text: '이진 탐색 트리의 형태를 갖는 균형 탐색 트리이다.' }
    answers: ['4']
    explanation: |
      선택지 1: 흑적 트리의 루트는 보통 흑색이어야 하므로 “흑색이거나 적색”이라는 설명은 규칙을 느슨하게 표현한 오답이다.
      선택지 2: 모든 경로에서 동일해야 하는 것은 적색 노드 수가 아니라 흑색 노드 수이다.
      선택지 3: 연속해서 나타날 수 없는 것은 적색 노드이다. 흑색 노드는 연달아 나타날 수 있다.
      선택지 4: 흑적 트리는 이진 탐색 트리 형태를 유지하면서 색 규칙으로 높이를 제한하는 균형 탐색 트리이므로 정답이다.

      핵심 개념:
      흑적 트리는 이진 탐색 트리에 색 규칙을 더해 높이를 O(log n)으로 유지하는 균형 탐색 트리다.
      적색 노드의 자식은 흑색이어야 하며, 모든 루트-리프 경로의 흑색 노드 수가 같다.
    tags: [red-black-tree]

  - id: e19-32
    type: multiple-choice
    prompt: '모든 리프 노드의 레벨이 동일한 트리는?'
    choices:
      - { id: '1', text: '흑적 트리' }
      - { id: '2', text: '이진 탐색 트리' }
      - { id: '3', text: '완전 이진 트리' }
      - { id: '4', text: 'B-트리' }
    answers: ['4']
    explanation: |
      선택지 1: 흑적 트리는 균형 탐색 트리지만 모든 리프 노드의 레벨이 동일하다는 조건으로 정의되지는 않는다.
      선택지 2: 일반 이진 탐색 트리는 삽입 순서에 따라 한쪽으로 치우칠 수 있어 리프 레벨이 달라질 수 있다.
      선택지 3: 완전 이진 트리는 마지막 레벨을 왼쪽부터 채우는 형태이지, 모든 리프가 반드시 같은 레벨이라는 뜻은 아니다.
      선택지 4: B-트리는 모든 리프 노드가 같은 레벨에 있도록 유지되는 다방향 균형 탐색 트리이므로 정답이다.

      핵심 개념:
      B-트리는 다방향 균형 탐색 트리이며 모든 리프 노드가 같은 레벨에 있다.
      가득 찬 노드를 분할할 때 가운데 키를 부모로 올리고 좌우 키를 두 노드로 나눈다.
      계산형 문항은 최종 정답만 보지 말고 피벗, 테이블, 방문 순서, 교환 횟수처럼 중간 상태를 기준으로 검산한다.
    tags: [b-tree]

  - id: e19-33
    type: multiple-choice
    prompt: '탐색 방법 중 최악의 경우의 성능이 나머지와 다른 하나는?'
    choices:
      - { id: '1', text: '이진 탐색' }
      - { id: '2', text: '흑적 트리' }
      - { id: '3', text: '이진 탐색 트리' }
      - { id: '4', text: 'B-트리' }
    answers: ['3']
    explanation: |
      선택지 1: 정렬 배열에서의 이진 탐색은 최악에도 탐색 범위를 절반씩 줄여 $O(\log n)$이다.
      선택지 2: 흑적 트리는 색 규칙으로 균형을 유지하므로 최악 탐색 성능이 $O(\log n)$이다.
      선택지 3: 일반 이진 탐색 트리는 균형을 보장하지 않아 한쪽으로 치우치면 최악 성능이 $O(n)$이므로 다른 선택지와 다르다.
      선택지 4: B-트리는 모든 리프가 같은 레벨인 균형 다방향 탐색 트리라 최악 탐색 성능이 로그 수준이다.

      핵심 개념:
      이진 탐색, 흑적 트리, B-트리는 균형 또는 배열 접근 조건에서 최악 O(log n)을 보장한다.
      일반 이진 탐색 트리는 삽입 순서에 따라 높이가 n이 될 수 있어 최악 O(n)이다.
    tags: [search-tree]

  - id: e19-34
    type: multiple-choice
    prompt: '연속된 위치를 점유하는 클러스터로 인해 평균 탐색 시간이 증가하는 충돌 해결 방법은?'
    choices:
      - { id: '1', text: '선형 탐사' }
      - { id: '2', text: '이중 해싱' }
      - { id: '3', text: '이차 탐사' }
      - { id: '4', text: '연쇄법' }
    answers: ['1']
    explanation: |
      선택지 1: 선형 탐사는 충돌 시 바로 다음 칸을 차례로 조사하므로 연속된 점유 구간인 기본 클러스터가 커지기 쉽다.
      선택지 2: 이중 해싱은 두 번째 해시 함수로 다음 조사 간격을 정해 선형 탐사의 기본 클러스터링을 줄이는 방법이다.
      선택지 3: 이차 탐사는 조사 위치를 제곱 간격으로 벌려 선형 탐사보다 기본 클러스터링을 완화한다.
      선택지 4: 연쇄법은 같은 주소의 원소를 별도 리스트에 연결하므로 테이블의 연속 위치 클러스터 문제와는 다르다.

      핵심 개념:
      해싱의 충돌 해결은 서로 다른 키가 같은 주소를 가질 때 저장 위치를 정하는 방법이다.
      선형 탐사는 연속된 위치를 차례로 찾기 때문에 기본 클러스터링이 생기기 쉽다.
    tags: [hashing]

  - id: e19-35
    type: multiple-choice
    passageRefs: [g19-approximation-algorithm-01]
    prompt: '다음은 NP-완전 문제의 근사 알고리즘이다. 이를 통해 해결할 수 있는 문제는?'
    choices:
      - { id: '1', text: '버텍스 커버 문제' }
      - { id: '2', text: '외판원 문제' }
      - { id: '3', text: 'CNF-만족성 문제' }
      - { id: '4', text: '클리크 판정 문제' }
    answers: ['2']
    explanation: |
      선택지 1: 버텍스 커버 문제: 최소 신장 트리와 깊이 우선 탐색 순회로 해를 구성하는 대표 문제는 아니므로 정답이 아니다.
      선택지 2: 외판원 문제: MST를 만든 뒤 DFS 방문 순서로 순회 경로를 구성하고 시작 정점으로 돌아오는 방식은 외판원 문제의 근사 알고리즘이므로 정답이다.
      선택지 3: CNF-만족성 문제: 논리식의 만족 가능성을 판정하는 문제로, MST 순회 알고리즘과 맞지 않는다.
      선택지 4: 클리크 판정 문제: 그래프에서 완전 부분그래프의 존재를 판정하는 문제로, 제시된 순회 경로 구성과 다르다.

      핵심 개념:
      근사 알고리즘은 NP-난해 최적화 문제에서 최적해에 가까운 해를 다항 시간에 구하는 방법이다.
      MST 기반 TSP 근사 알고리즘은 최소 신장 트리의 DFS 순회 순서를 이용해 해밀턴 순회에 가까운 경로를 만든다.
      지문에 “최소 신장 트리”, “깊이 우선 탐색”, “마지막에 첫 정점 추가”가 함께 나오면 외판원 문제를 떠올린다.
    tags: [approximation-algorithm]
