      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1: $O(n)$: 분할 구간과 분할점을 모두 비교해야 하므로 선형 시간이 아니다.
      선택지 2: $O(n\log n)$: 정렬형 분할정복 복잡도가 아니라 DP 테이블을 채우는 문제다.
      선택지 3: $O(n^2)$: 부분문제 수는 $O(n^2)$이지만 각 부분문제마다 분할점 $k$를 비교해야 한다.
      선택지 4: $O(n^3)$: $O(n^2)$개의 부분문제마다 최대 $O(n)$개의 분할점을 비교하므로 정답이다.

      핵심 개념:
      연쇄 행렬 곱셈은 괄호 배치에 따라 달라지는 스칼라 곱셈 횟수를 최소화한다.
      $m[i][j]$를 구할 때 가능한 분할점 $k$를 모두 비교하므로 전체 시간 복잡도는 $O(n^3)$이다.
