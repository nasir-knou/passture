  - id: g19-approximation-algorithm-01
    type: text
    body: |
      - 주어진 그래프의 최소 신장 트리를 구한다.
      - 임의의 정점 하나를 루트 노드로 지정해서 최소 신장 트리를 깊이 우선 탐색 순서대로 정점을 나열하고 마지막에 첫 정점을 한 번 더 추가한다.

questions:
  - id: e19-01
    type: multiple-choice
    prompt: '이론적으로 문제 해결이라는 관점에서 반드시 만족하지 않아도 되는 알고리즘의 조건은?'
    choices:
      - { id: '1', text: '유효성' }
      - { id: '2', text: '명확성' }
      - { id: '3', text: '효율성' }
      - { id: '4', text: '유한성' }
    answers: ['3']
    explanation: |
      선택지 1: 유효성: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 2: 명확성: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 3: 효율성: 알고리즘의 정의의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.
      선택지 4: 유한성: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.

      핵심 개념:
      알고리즘은 명확한 명령, 수행 가능성, 유한한 종료, 입력과 출력 조건을 갖춘 문제 해결 절차다.
      효율성은 좋은 알고리즘을 비교하는 평가 기준이지만 알고리즘 성립 자체의 필수 조건과는 구분한다.
    tags: [algorithm-definition]

  - id: e19-02
    type: multiple-choice
    prompt: '연결 리스트의 특정 노드에서 선행 노드와 후행 노드에 대한 접근이 모두 가능한 것은?'
    choices:
      - { id: '1', text: '단일 원형 연결 리스트' }
      - { id: '2', text: '이중 연결 리스트' }
      - { id: '3', text: '단일 연결 리스트' }
      - { id: '4', text: '순차 연결 리스트' }
    answers: ['2']
    explanation: |
      선택지 1: 단일 원형 연결 리스트는 각 노드가 다음 노드 링크만 가지며, 원형 구조 덕분에 전체 순회는 가능하지만 특정 노드에서 선행 노드로 바로 이동하는 링크는 없다.
      선택지 2: 이중 연결 리스트는 각 노드가 선행 노드 링크와 후행 노드 링크를 모두 가지므로 특정 노드에서 양쪽 방향 접근이 가능해 정답이다.
      선택지 3: 단일 연결 리스트는 한 방향 링크만 사용하므로 후행 노드 접근은 가능하지만 선행 노드 접근은 직접 지원하지 않는다.
      선택지 4: 순차 연결 리스트는 배열 같은 순차 저장 구조에서 링크를 흉내 내는 방식으로, 노드 자체가 양방향 링크를 갖는 이중 연결 리스트와 다르다.

      핵심 개념:
      이중 연결 리스트는 각 노드가 이전 노드 링크와 다음 노드 링크를 함께 가진다.
      단일 연결 리스트는 보통 한 방향 링크만 가지므로 선행 노드 접근이 직접적이지 않다.
      원형성은 마지막 노드와 첫 노드를 연결한다는 의미이고, 양방향 접근 가능성과는 별도의 성질이다.
    tags: [linked-list]

  - id: e19-03
    type: multiple-choice
    passageRefs: [g19-graph-path-definition-01]
    prompt: '다음 빈 칸에 알맞은 용어는?'
    choices:
      - { id: '1', text: '경로' }
      - { id: '2', text: '차수' }
      - { id: '3', text: '연결' }
      - { id: '4', text: '사이클' }
    answers: ['1']
    explanation: |
      선택지 1: 경로: 정점들이 간선의 연속으로 이어진 순서 리스트를 뜻하므로 정답이다.
      선택지 2: 차수: 한 정점에 접속한 간선의 수를 뜻하므로 정답이 아니다.
      선택지 3: 연결: 두 정점 사이에 경로가 존재하는 성질을 뜻하므로 정답이 아니다.
      선택지 4: 사이클: 시작 정점과 끝 정점이 같은 경로를 뜻하므로 정답이 아니다.

      핵심 개념:
      경로는 간선으로 연속해서 연결된 정점들의 순서열이다.
      차수, 연결성, 사이클은 각각 다른 그래프 용어이므로 정의를 구분해야 한다.
      빈칸형 용어 문제는 지문 속 정의가 설명하는 대상이 무엇인지 먼저 확인한다.
    tags: [graph]

  - id: e19-04
    type: multiple-choice
    prompt: '알고리즘의 대표적인 설계 기법으로 거리가 먼 것은?'
    choices:
      - { id: '1', text: '동적 프로그래밍 방법' }
      - { id: '2', text: '욕심쟁이 방법' }
      - { id: '3', text: '상각분석 방법' }
      - { id: '4', text: '분할정복 방법' }
    answers: ['3']
    explanation: |
      선택지 1: 동적 프로그래밍 방법: 알고리즘 설계 기법의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 2: 욕심쟁이 방법: 알고리즘 설계 기법의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 3: 상각분석 방법: 알고리즘 설계 기법의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.
      선택지 4: 분할정복 방법: 알고리즘 설계 기법의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.

      핵심 개념:
      대표 설계 기법에는 분할정복, 동적 프로그래밍, 욕심쟁이 방법, 백트래킹 등이 있다.
      상각분석은 여러 연산의 평균 비용을 분석하는 기법이지 알고리즘 설계 전략 자체는 아니다.
    tags: [algorithm-design]

  - id: e19-05
    type: multiple-choice
    prompt: '수행시간 $f(n)=5n^3+10n^2+8n+200$의 점근 성능은?'
    choices:
      - { id: '1', text: '$O(1)$' }
      - { id: '2', text: '$O(n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1: $O(1)$: $f(n)$의 최고차항이 $n^3$이므로 상수 시간으로 볼 수 없다.
      선택지 2: $O(n)$: 선형항보다 $5n^3$ 항이 더 빠르게 증가하므로 정답이 아니다.
      선택지 3: $O(n^2)$: 이차항보다 $5n^3$ 항이 더 빠르게 증가하므로 정답이 아니다.
      선택지 4: $O(n^3)$: 최고차항 $5n^3$이 지배하므로 점근 성능은 $O(n^3)$이다.

      핵심 개념:
      Big-O 표기에서는 입력 크기 $n$이 커질 때 지배적인 최고차항만 남긴다.
      상수 계수와 낮은 차수 항은 점근적 상한을 정할 때 제거한다.
    tags: [big-o]

  - id: e19-06
    type: multiple-choice
    prompt: '단위 연산의 수행시간이 $1\mathrm{ns}$($10^{-9}$초)인 컴퓨터에서 $10^9$개의 데이터를 처리하는 데 가장 오랜 시간이 걸리는 알고리즘의 성능을 나타내는 점화식은?'
    choices:
      - { id: '1', text: '$T(n)=2T(n/2)+\Theta(n),\ T(1)=\Theta(1)$' }
      - { id: '2', text: '$T(n)=T(n-1)+\Theta(1),\ T(1)=\Theta(1)$' }
      - { id: '3', text: '$T(n)=T(n/2)+\Theta(1),\ T(1)=\Theta(1)$' }
      - { id: '4', text: '$T(n)=T(n-1)+\Theta(n),\ T(1)=\Theta(1)$' }
    answers: ['4']
    explanation: |
      선택지 1: $T(n)=2T(n/2)+\Theta(n),\ T(1)=\Theta(1)$: 마스터 정리에 따라 $\Theta(n\log n)$이므로 가장 오래 걸리지 않는다.
      선택지 2: $T(n)=T(n-1)+\Theta(1),\ T(1)=\Theta(1)$: 한 단계씩 줄며 상수 비용을 더하므로 $\Theta(n)$이다.
      선택지 3: $T(n)=T(n/2)+\Theta(1),\ T(1)=\Theta(1)$: 입력 크기를 절반씩 줄이므로 $\Theta(\log n)$이다.
      선택지 4: $T(n)=T(n-1)+\Theta(n),\ T(1)=\Theta(1)$: $n+(n-1)+\cdots+1$ 형태로 누적되어 $\Theta(n^2)$이므로 가장 오래 걸린다.

      핵심 개념:
      단위 연산 시간이 같다면 실제 시간 비교는 점화식을 푼 점근적 증가율 비교로 귀결된다.
      $T(n)=T(n-1)+\Theta(n)$은 1부터 $n$까지의 합이 되어 $\Theta(n^2)$로 커진다.
      점화식 비교는 재귀 호출 크기와 각 단계의 추가 비용을 함께 전개해서 판단한다.
    tags: [recurrence]

  - id: e19-07
    type: multiple-choice
    prompt: '분할정복 방법을 적용한 알고리즘 중 입력 크기 n에 대한 성능이 가장 우수한 것은?'
    choices:
