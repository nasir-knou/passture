      - { id: '2', text: '입력 원소 값의 자릿수 $d$가 상수일 때 유용하다.' }
      - { id: '3', text: '제자리 정렬 알고리즘이다.' }
      - { id: '4', text: '시간 복잡도 $O(n^2)$을 갖는다.' }
    answers: ['2']
    explanation: |
      선택지 1: 비교 기반의 정렬 알고리즘이다: 기수 정렬의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 2: 입력 원소 값의 자릿수 $d$가 상수일 때 유용하다: 기수 정렬의 정의와 적용 조건에 맞으므로 정답이다.
      선택지 3: 제자리 정렬 알고리즘이다: 기수 정렬의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 4: 시간 복잡도 $O(n^2)$을 갖는다: 기수 정렬의 정의나 적용 조건과 다르므로 정답이 아니다.

      핵심 개념:
      기수 정렬은 원소의 각 자릿수를 기준으로 안정 정렬을 반복하는 비비교 기반 정렬이다.
      자릿수 $d$가 상수이고 각 단계가 선형이면 전체 시간은 $O(d(n+k))$로 선형에 가깝다.
    tags: [radix-sort]

  - id: e19-29
    type: multiple-choice
    prompt: '순차 탐색에 대한 설명으로 틀린 것은?'
    choices:
