  - id: g19-floyd-code-01
    type: code
    language: text
    body: |
      Floyd(G=(V,E)) { // |V|=n
        D[][] <- 입력 간선의 인접 행렬로 초기화
        for (k=1부터 n까지)
          for (i=1부터 n까지)
            for (j=1부터 n까지)
              if (D[i][j] > D[i][k] + D[k][j])
                D[i][j] = D[i][k] + D[k][j];
        return D[][];
      }

