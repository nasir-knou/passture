  - id: e19-15
    type: multiple-choice
    passageRefs: [g19-floyd-code-01]
    prompt: '제시된 플로이드 알고리즘의 성능 표현으로 올바른 것은?'
    choices:
      - { id: '1', text: '$O(n)$' }
      - { id: '2', text: '$O(n\log n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1: $O(n)$: 세 중첩 반복문을 모두 고려하지 않은 표현이므로 정답이 아니다.
      선택지 2: $O(n\log n)$: 정렬이나 이진 분할 구조가 아니라 모든 정점 쌍을 반복 갱신하는 알고리즘이다.
      선택지 3: $O(n^2)$: $(i,j)$ 정점 쌍만 보면 $O(n^2)$이지만, 중간 정점 $k$ 반복이 추가된다.
      선택지 4: $O(n^3)$: $k$, $i$, $j$가 각각 1부터 $n$까지 반복되므로 정답이다.

      핵심 개념:
      플로이드-워셜은 모든 정점 쌍 최단 거리를 동적 프로그래밍으로 구한다.
      $D[i][j]=\min(D[i][j], D[i][k]+D[k][j])$로 중간 정점 $k$를 하나씩 허용하며 갱신한다.
      코드의 반복문 깊이와 각 반복 범위를 세면 시간 복잡도를 판단할 수 있다.
    tags: [floyd-warshall]

