      선택지 2: $t_4$: 종료 시간이 6이므로 가장 먼저 끝나는 작업이 아니다.
      선택지 3: $t_6$: 종료 시간이 3으로 가장 빠르므로 욕심쟁이 방법에서 가장 먼저 할당된다.
      선택지 4: $t_7$: 종료 시간이 8이므로 가장 먼저 끝나는 작업이 아니다.

      핵심 개념:
      작업 선택 문제는 서로 겹치지 않는 작업을 최대한 많이 선택하는 대표적인 욕심쟁이 문제다.
      기본 알고리즘은 종료 시간이 가장 빠른 작업부터 선택해 남은 선택 가능 구간을 줄인다.
      첫 선택은 시작 시간이 아니라 종료 시간이 가장 빠른 작업을 기준으로 판단한다.
    tags: [activity-selection]

  - id: e19-20
    type: multiple-choice
    prompt: '정렬 방식의 관점에서 나머지와 다른 하나의 정렬 알고리즘은?'
    choices:
      - { id: '1', text: '버블 정렬' }
      - { id: '2', text: '셸 정렬' }
      - { id: '3', text: '힙 정렬' }
      - { id: '4', text: '계수 정렬' }
    answers: ['4']
    explanation: |
      선택지 1: 버블 정렬은 인접 원소를 비교하고 교환하는 비교 기반 정렬이다.
      선택지 2: 셸 정렬은 간격을 둔 부분 삽입 정렬을 반복하지만 원소 비교로 순서를 결정하므로 비교 기반 정렬이다.
      선택지 3: 힙 정렬은 힙에서 부모와 자식의 대소 관계를 비교하며 정렬하므로 비교 기반 정렬이다.
      선택지 4: 계수 정렬은 원소끼리 비교하지 않고 키의 출현 횟수와 누적 개수를 이용하므로 다른 세 선택지와 정렬 방식이 달라 정답이다.

      핵심 개념:
      정렬 알고리즘은 비교 기반 정렬과 비비교 기반 정렬로 나눌 수 있다.
      버블, 선택, 삽입, 셸, 합병, 퀵, 힙은 비교 기반이고 계수·기수 정렬은 값의 범위나 자릿수를 이용한다.
    tags: [sorting]

  - id: e19-21
    type: multiple-choice
    prompt: '안정적인 정렬 알고리즘은?'
    choices:
      - { id: '1', text: '버블 정렬' }
      - { id: '2', text: '힙 정렬' }
      - { id: '3', text: '퀵 정렬' }
      - { id: '4', text: '셸 정렬' }
    answers: ['1']
    explanation: |
      선택지 1: 버블 정렬: 정렬 안정성의 정의와 적용 조건에 맞으므로 정답이다.
      선택지 2: 힙 정렬: 정렬 안정성의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 3: 퀵 정렬: 정렬 안정성의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 4: 셸 정렬: 정렬 안정성의 정의나 적용 조건과 다르므로 정답이 아니다.

      핵심 개념:
      안정 정렬은 같은 키를 가진 원소들의 입력 순서를 정렬 후에도 유지한다.
      버블 정렬과 삽입 정렬은 일반적으로 안정 정렬이고 퀵·힙·셸 정렬은 보통 안정적이지 않다.
    tags: [sorting-stability]

  - id: e19-22
    type: multiple-choice
    passageRefs: [g19-bubble-sort-data-01]
    prompt: '주어진 데이터에 대해 버블 정렬을 적용하여 오름차순으로 정렬할 때 인접한 두 데이터 간의 자리바꿈이 발생하는 총 횟수는?'
    choices:
      - { id: '1', text: '8' }
      - { id: '2', text: '10' }
      - { id: '3', text: '12' }
      - { id: '4', text: '15' }
    answers: ['2']
    explanation: |
      선택지 1: 8: 역순 배열의 전체 인접 교환 횟수보다 작으므로 정답이 아니다.
      선택지 2: 10: $50,40,30,20,10$은 완전 역순이므로 모든 원소 쌍이 한 번씩 교환되어 $\binom{5}{2}=10$번 자리바꿈이 발생한다.
      선택지 3: 12: 원소 5개의 역순 배열에서 가능한 역전 쌍 수를 초과하므로 정답이 아니다.
      선택지 4: 15: 원소 6개의 완전 역순 배열에서 나오는 값이며, 이 문항의 데이터 개수와 맞지 않는다.

      핵심 개념:
      버블 정렬은 인접한 두 원소를 비교해 순서가 틀리면 교환한다.
      버블 정렬의 총 교환 횟수는 입력 배열의 역전(inversion) 쌍 개수와 같다.
      길이 $n$인 완전 역순 배열의 역전 쌍 수는 $n(n-1)/2$이다.
    tags: [bubble-sort]

  - id: e19-23
    type: multiple-choice
    prompt: '정렬되지 않은 데이터 중 가장 작은 값을 골라 미정렬 부분의 첫 번째 원소와 교환하는 정렬 알고리즘은?'
    choices:
      - { id: '1', text: '삽입 정렬' }
      - { id: '2', text: '셸 정렬' }
      - { id: '3', text: '선택 정렬' }
      - { id: '4', text: '버블 정렬' }
    answers: ['3']
    explanation: |
      선택지 1: 삽입 정렬은 미정렬 원소를 앞쪽 정렬 구간의 알맞은 위치에 끼워 넣는 방식이다.
      선택지 2: 셸 정렬은 삽입 정렬을 개선한 방식으로, 간격을 둔 원소들을 먼저 정렬한다.
      선택지 3: 선택 정렬은 미정렬 구간에서 최솟값을 선택해 미정렬 구간의 첫 원소와 교환하므로 정답이다.
      선택지 4: 버블 정렬은 인접한 두 원소를 비교해 큰 값을 뒤로 밀어내는 방식이다.

      핵심 개념:
      선택 정렬은 매 단계 미정렬 구간에서 최솟값을 찾아 미정렬 구간의 첫 원소와 교환한다.
      비교 횟수는 입력 상태와 거의 무관하며 일반적인 선택 정렬은 제자리 정렬이지만 안정 정렬은 아니다.
      계산형 문항은 최종 정답만 보지 말고 피벗, 테이블, 방문 순서, 교환 횟수처럼 중간 상태를 기준으로 검산한다.
    tags: [selection-sort]

  - id: e19-24
    type: multiple-choice
    prompt: '삽입 정렬에 대한 설명으로 적절하지 못한 것은?'
    choices:
      - { id: '1', text: '입력이 거의 정렬된 경우 빠른 수행 시간 $O(n)$을 갖는다.' }
      - { id: '2', text: '안정적인 정렬 알고리즘이다.' }
      - { id: '3', text: '셸 정렬의 단점을 보완한 방법이다.' }
      - { id: '4', text: '제자리 정렬 알고리즘이다.' }
    answers: ['3']
    explanation: |
      선택지 1: 입력이 거의 정렬된 경우 빠른 수행 시간 $O(n)$을 갖는다: 삽입 정렬의 올바른 성질이므로 문항이 찾는 부적절한 설명이 아니다.
      선택지 2: 삽입 정렬은 같은 키의 상대적 순서를 유지할 수 있는 안정 정렬이므로 부적절한 설명이 아니다.
      선택지 3: 실제로는 셸 정렬이 삽입 정렬의 멀리 떨어진 원소 이동 문제를 보완한 방법이므로, 삽입 정렬이 셸 정렬을 보완한다는 설명은 반대라 정답이다.
      선택지 4: 삽입 정렬은 입력 배열 안에서 원소를 이동시키며 정렬할 수 있는 제자리 정렬이므로 부적절한 설명이 아니다.

      핵심 개념:
      삽입 정렬은 앞쪽의 정렬된 부분에 다음 원소를 적절한 위치로 삽입한다.
      셸 정렬은 삽입 정렬의 멀리 떨어진 원소 이동 문제를 보완한 방법이다.
      계산형 문항은 최종 정답만 보지 말고 피벗, 테이블, 방문 순서, 교환 횟수처럼 중간 상태를 기준으로 검산한다.
    tags: [insertion-sort]

  - id: e19-25
    type: multiple-choice
    prompt: '수행시간이 $O(n\log n)$이지만 제자리 정렬 알고리즘이 아닌 것은?'
    choices:
      - { id: '1', text: '셸 정렬' }
      - { id: '2', text: '합병 정렬' }
      - { id: '3', text: '퀵 정렬' }
      - { id: '4', text: '힙 정렬' }
    answers: ['2']
    explanation: |
      선택지 1: 셸 정렬: 합병 정렬의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 2: 합병 정렬: 합병 정렬의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.
      선택지 3: 퀵 정렬: 합병 정렬의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 4: 힙 정렬: 합병 정렬의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.

      핵심 개념:
      합병 정렬은 배열을 반씩 나누고 정렬된 두 부분배열을 합병하는 분할정복 정렬이다.
      평균과 최악 모두 $O(n\log n)$이며 안정 정렬로 구현하기 쉽지만 추가 저장 공간이 필요하다.
    tags: [merge-sort]

  - id: e19-26
    type: multiple-choice
    prompt: '합병 정렬과 퀵 정렬에 대한 공통적인 설명으로 올바른 것은?'
    choices:
      - { id: '1', text: '평균 $O(n\log n)$, 최악 $O(n^2)$의 성능을 갖는다.' }
      - { id: '2', text: '데이터의 상대적 순서가 정렬 후에도 그대로 유지된다.' }
      - { id: '3', text: '상수 개를 초과하는 추가 저장 공간이 필요하다.' }
      - { id: '4', text: '분할정복 방법이 적용되었다.' }
    answers: ['4']
    explanation: |
      선택지 1: 평균 $O(n\log n)$, 최악 $O(n^2)$의 성능을 갖는다: 퀵 정렬에는 해당하지만 합병 정렬의 최악 성능은 $O(n\log n)$이므로 공통 설명이 아니다.
      선택지 2: 상대적 순서 유지는 안정 정렬의 성질이다. 합병 정렬은 안정적으로 구현하기 쉽지만 일반적인 퀵 정렬은 안정 정렬이 아니므로 공통 설명이 아니다.
      선택지 3: 합병 정렬은 보조 배열이 필요하지만 퀵 정렬은 보통 재귀 스택 외에는 제자리 정렬에 가깝게 구현되므로 공통 설명이 아니다.
      선택지 4: 합병 정렬과 퀵 정렬은 모두 배열을 부분 문제로 나누어 처리하는 분할정복 방법을 사용하므로 정답이다.

      핵심 개념:
      분할정복은 문제를 독립적인 작은 문제로 나누고, 각 소문제를 해결한 뒤 결과를 결합한다.
      대표 단계는 분할, 정복, 결합이며 정렬 자체는 모든 순환 호출의 공통 단계가 아니다.
      계산형 문항은 최종 정답만 보지 말고 피벗, 테이블, 방문 순서, 교환 횟수처럼 중간 상태를 기준으로 검산한다.
    tags: [divide-and-conquer]

  - id: e19-27
    type: multiple-choice
    passageRefs: [g19-heap-sort-data-01]
    prompt: '주어진 데이터를 오름차순으로 힙 정렬하기 위해 초기 힙을 구성하였다. 이때 루트 노드에 존재하는 데이터는?'
    choices:
      - { id: '1', text: '7' }
      - { id: '2', text: '15' }
      - { id: '3', text: '40' }
      - { id: '4', text: '88' }
    answers: ['4']
    explanation: |
      선택지 1: 7: 최대 힙의 루트가 될 수 있는 전체 최댓값이 아니므로 정답이 아니다.
      선택지 2: 15: 전체 데이터의 최댓값이 아니므로 정답이 아니다.
      선택지 3: 40: 전체 데이터의 최댓값이 아니므로 정답이 아니다.
      선택지 4: 88: 오름차순 힙 정렬을 위한 초기 힙은 최대 힙이므로 전체 최댓값 88이 루트에 위치한다.

      핵심 개념:
      오름차순 힙 정렬은 보통 최대 힙을 만든 뒤 루트의 최댓값을 배열 끝으로 보낸다.
      최대 힙에서는 모든 부모 노드의 값이 자식 노드 값 이상이므로 루트가 전체 최댓값이다.
      따라서 초기 힙을 실제로 모두 그리지 않아도 전체 최댓값을 먼저 확인하면 루트 값을 알 수 있다.
    tags: [heap-sort]

  - id: e19-28
    type: multiple-choice
    prompt: '기수 정렬에 대한 설명으로 올바른 것은?'
    choices:
