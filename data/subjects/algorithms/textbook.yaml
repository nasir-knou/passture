    answers: ['4']
    explanation: |
      선택지 1: 문자 위치 목록은 KMP의 핵심 전처리 정보가 아니다.
      선택지 2: 단순 반복 횟수만으로 이동 폭을 결정하지 않는다.
      선택지 3: 모든 서브스트링을 구하지 않는다.
      선택지 4: KMP는 패턴의 접두부와 접미부가 얼마나 일치하는지에 대한 실패 함수 정보를 전처리한다.

      핵심 개념:
      KMP는 Knuth-Morris-Pratt 문자열 매칭 알고리즘이다.
      패턴 전처리로 실패 함수 또는 부분 일치 테이블을 만든다.
      불일치가 발생하면 이미 비교한 정보를 이용해 패턴을 효율적으로 이동한다.
      텍스트 인덱스를 되돌리지 않고 선형 시간에 매칭할 수 있다.
    tags: [string-matching, kmp]

  - id: t06-07
    type: multiple-choice
    prompt: 텍스트와 패턴의 길이가 각각 n과 m일 때, KMP 알고리즘의 수행시간은? 단, n >= m이다.
    choices:
      - { id: '1', text: '$O(n)$' }
      - { id: '2', text: '$O(m\\log n)$' }
      - { id: '3', text: '$O(n\\log m)$' }
      - { id: '4', text: '$O(mn)$' }
    answers: ['1']
    explanation: |
      선택지 1: KMP는 전처리 O(m)과 탐색 O(n)을 합쳐 n>=m일 때 O(n)으로 볼 수 있다.
      선택지 2: KMP에는 로그 구조가 없다.
      선택지 3: 탐색 범위를 로그로 줄이는 방식이 아니다.
      선택지 4: O(mn)은 브루트-포스의 최악 시간이다.

      핵심 개념:
      KMP는 패턴 전처리와 텍스트 스캔으로 구성된다.
      전처리 시간은 O(m), 매칭 시간은 O(n)이다.
      텍스트의 각 문자를 상수 번만 처리한다.
      따라서 전체 시간은 O(n+m), n>=m이면 O(n)이다.
    tags: [string-matching, kmp]

