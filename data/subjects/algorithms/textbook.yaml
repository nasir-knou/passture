subjectId: algorithms
sourceId: textbook
title: 알고리즘 교재 문제
kind: textbook

passages:
  - id: g01-recurrence-12
    type: text
    body: |
      $$
      T(n)=
      \begin{cases}
      \Theta(1), & n=1 \\
      T(n-1)+\Theta(n), & n \ge 2
      \end{cases}
      $$

questions:
  - id: t01-01
    type: multiple-choice
    prompt: 문제 해결이라는 이론적 관점에서 볼 때 알고리즘이 반드시 만족해야 할 조건과 거리가 먼 것은?
    choices:
      - { id: '1', text: '주어진 알고리즘은 효율적이어야 한다.' }
      - { id: '2', text: '적어도 하나 이상의 출력을 생성해야 한다.' }
      - { id: '3', text: '한정된 수의 단계를 거친 후에는 반드시 끝나야 한다.' }
      - { id: '4', text: '각 단계는 모호성이 없어야 한다.' }
    answers: ['1']
    explanation: |
      선택지 1: 효율성은 좋은 알고리즘의 중요한 평가 기준이지만, 알고리즘 성립을 위한 필수 조건과는 거리가 있다.
      선택지 2: 알고리즘은 입력에 대해 적어도 하나 이상의 출력을 생성해야 한다.
      선택지 3: 알고리즘은 유한한 단계 후 종료해야 한다.
      선택지 4: 알고리즘의 각 단계는 명확하고 모호하지 않아야 한다.

      핵심 개념:
      알고리즘의 기본 조건에는 입출력, 명확성, 유한성, 효과성 등이 포함된다.
      효율성은 알고리즘을 비교하고 평가할 때 중요한 기준이다.
      그러나 비효율적이어도 명확히 종료하고 결과를 내면 알고리즘일 수 있다.
      문제 해결 관점에서는 먼저 올바른 절차인지 확인한 뒤 효율을 평가한다.
    tags: [algorithm]

  - id: t01-02
    type: multiple-choice
    prompt: 대표적인 알고리즘 설계기법에 해당하는 것은?
    choices:
      - { id: '1', text: '선형 판별 분석' }
      - { id: '2', text: '분할정복 방법' }
      - { id: '3', text: '딥러닝' }
      - { id: '4', text: '선형회귀 방법' }
    answers: ['2']
    explanation: |
      선택지 1: 선형 판별 분석은 통계/기계학습의 분류 기법이다.
      선택지 2: 분할정복은 문제를 나누어 해결하고 결합하는 대표적인 알고리즘 설계기법이다.
      선택지 3: 딥러닝은 기계학습 모델 학습 방법의 범주이다.
      선택지 4: 선형회귀는 예측을 위한 통계/기계학습 방법이다.

      핵심 개념:
      알고리즘 설계기법은 문제를 푸는 일반적인 전략이다.
      대표 기법에는 분할정복, 동적 프로그래밍, 욕심쟁이 방법, 퇴각검색 등이 있다.
      분할정복은 작은 부분 문제로 나누고 결과를 합친다.
      기계학습 모델 자체는 일반적인 알고리즘 설계기법 분류와 구분된다.
    tags: [divide-and-conquer]

  - id: t01-03
    type: multiple-choice
    prompt: 욕심쟁이 방법에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: '분할, 정복, 합병 단계로 이루어진다.' }
      - { id: '2', text: '기본적으로 순환 호출 형태로 알고리즘이 구성된다.' }
      - { id: '3', text: '각 단계의 국부적인 최적해가 전체적인 최적해를 구성할 수 있다.' }
      - {
          id: '4',
          text: '작은 부분 문제의 해를 테이블에 저장하고 이를 이용하여 보다 큰 문제의 해를 만들어 간다.',
        }
    answers: ['3']
    explanation: |
      선택지 1: 분할, 정복, 합병은 분할정복 방법의 구조이다.
      선택지 2: 순환 호출은 분할정복 등에서 자주 쓰이지만 욕심쟁이 방법의 본질은 아니다.
      선택지 3: 욕심쟁이 방법은 각 단계에서 가장 좋아 보이는 선택을 하며, 문제가 조건을 만족하면 전체 최적해를 얻을 수 있다.
      선택지 4: 부분 문제의 해를 테이블에 저장하는 방식은 동적 프로그래밍의 설명이다.

      핵심 개념:
      욕심쟁이 방법은 매 단계에서 국부적으로 최적인 선택을 한다.
      탐욕적 선택 속성과 최적 부분 구조가 있을 때 전체 최적해를 얻을 수 있다.
      항상 최적해를 보장하는 것은 아니며 문제 조건 검증이 필요하다.
      대표 예로 최소 신장 트리, 허프만 코딩 등이 있다.
    tags: [greedy]

  - id: t01-04
    type: multiple-choice
    prompt: 쪼갤 수 있는 n개의 각 물체에는 무게와 해당 물체를 배낭에 넣었을 때 얻을 수 있는 이익이 연계되어 있다. 이런 물체들을 배낭에 집어넣어서 얻을 수 있는 최대 이익을 계산하는 문제에 가장 적합한 알고리즘 설계기법은?
    choices:
      - { id: '1', text: '분기한정 방법' }
      - { id: '2', text: '분할정복 방법' }
      - { id: '3', text: '동적 프로그래밍 방법' }
      - { id: '4', text: '욕심쟁이 방법' }
    answers: ['4']
    explanation: |
      선택지 1: 분기한정은 조합 최적화에서 탐색 공간을 줄이는 방식이다.
      선택지 2: 분할정복은 부분 문제를 독립적으로 나누어 합치는 방식이다.
      선택지 3: 0/1 배낭 문제에는 동적 프로그래밍이 적합하지만, 물체를 쪼갤 수 있는 경우와 다르다.
      선택지 4: 물체를 쪼갤 수 있는 분할 가능 배낭 문제는 단위 무게당 이익이 큰 순서로 선택하는 욕심쟁이 방법이 적합하다.

      핵심 개념:
      분할 가능 배낭 문제는 물체를 일부만 선택할 수 있다.
      이 경우 단위 무게당 이익이 가장 큰 물체부터 담으면 최적해를 얻는다.
      0/1 배낭 문제는 물체를 쪼갤 수 없어 동적 프로그래밍이 보통 사용된다.
      같은 배낭 문제라도 선택 가능 조건에 따라 적합한 설계기법이 달라진다.
    tags: [greedy, knapsack]

  - id: t01-05
    type: multiple-choice
    prompt: n개의 데이터에 대해 최솟값을 찾는 알고리즘에서 요구되는 최소의 비교 횟수는?
    choices:
      - { id: '1', text: '$n - 1$' }
      - { id: '2', text: '$n$' }
      - { id: '3', text: '$\\frac{n}{2} - 1$' }
      - { id: '4', text: '$\\frac{n}{2}$' }
    answers: ['1']
    explanation: |
      선택지 1: n개 중 최솟값을 확인하려면 나머지 n-1개가 후보보다 크다는 비교가 필요하다.
      선택지 2: 첫 번째 원소를 초기 후보로 두면 자기 자신과 비교할 필요가 없다.
      선택지 3: n/2번 비교만으로 모든 원소가 최솟값 후보에서 제외되었음을 보장할 수 없다.
      선택지 4: n/2 - 1번은 최솟값 판별에 필요한 비교 수보다 부족하다.

      핵심 개념:
      최솟값 탐색은 현재 최솟값 후보와 나머지 원소를 차례로 비교한다.
      첫 원소를 후보로 잡으면 비교 대상은 n-1개이다.
      각 비교는 한 원소가 최솟값이 아님을 확인하는 역할을 한다.
      따라서 단순 최솟값 찾기의 비교 횟수 하한은 n-1이다.
    tags: [comparison, minimum]

  - id: t01-06
    type: multiple-choice
    prompt: 다음 알고리즘 중에서 적용된 설계기법이 나머지 셋과 다른 하나는?
    choices:
      - { id: '1', text: '데이크스트라 알고리즘' }
      - { id: '2', text: '플로이드 알고리즘' }
      - { id: '3', text: '프림 알고리즘' }
      - { id: '4', text: '크루스칼 알고리즘' }
    answers: ['2']
    explanation: |
      선택지 1: 데이크스트라 알고리즘은 대표적인 욕심쟁이 방법이다.
      선택지 2: 플로이드 알고리즘은 모든 쌍 최단 경로를 구하는 동적 프로그래밍 알고리즘이다.
      선택지 3: 프림 알고리즘은 최소 신장 트리를 구하는 욕심쟁이 알고리즘이다.
      선택지 4: 크루스칼 알고리즘도 최소 신장 트리를 구하는 욕심쟁이 알고리즘이다.

      핵심 개념:
      데이크스트라, 프림, 크루스칼은 단계별 최선 선택을 하는 욕심쟁이 성격을 갖는다.
      플로이드 알고리즘은 중간 정점 집합을 확장하며 부분 문제 해를 이용한다.
      동적 프로그래밍은 이전 단계의 계산 결과를 저장해 다음 문제를 해결한다.
      알고리즘의 이름뿐 아니라 내부 의사결정 구조로 설계기법을 구분해야 한다.
    tags: [greedy, dynamic-programming]

  - id: t01-07
    type: multiple-choice
    prompt: 이진 탐색, 퀵 정렬, 합병 정렬에 적용된 알고리즘 설계기법은?
    choices:
      - { id: '1', text: '동적 프로그래밍 방법' }
      - { id: '2', text: '욕심쟁이 방법' }
      - { id: '3', text: '분할정복 방법' }
      - { id: '4', text: '그리디 알고리즘' }
    answers: ['3']
    explanation: |
      선택지 1: 동적 프로그래밍은 중복 부분 문제를 저장해 푸는 방식이다.
      선택지 2: 욕심쟁이 방법은 매 단계 최선 선택을 누적한다.
      선택지 3: 이진 탐색, 퀵 정렬, 합병 정렬은 문제를 더 작은 부분으로 나누어 해결하는 분할정복 방법을 사용한다.
      선택지 4: 그리디 알고리즘은 욕심쟁이 방법과 같은 뜻이다.

      핵심 개념:
      분할정복은 문제를 분할하고, 부분 문제를 정복한 뒤, 필요하면 결과를 결합한다.
      이진 탐색은 탐색 범위를 절반으로 나눈다.
      퀵 정렬과 합병 정렬은 배열을 분할해 정렬한다.
      부분 문제의 독립성과 결합 방식이 분할정복의 핵심이다.
    tags: [divide-and-conquer]

  - id: t01-08
    type: multiple-choice
    prompt: 알고리즘의 시간 복잡도에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: '일반적으로 프로그램의 길이의 함수로 표현한다.' }
      - { id: '2', text: '입력 데이터의 상태에 무관하다.' }
      - { id: '3', text: '컴퓨터에서의 실제 CPU 시간으로 정의한다.' }
      - { id: '4', text: '최악의 수행시간을 일반적인 성능 평가 척도로 사용한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 시간 복잡도는 보통 입력 크기의 함수로 표현한다.
      선택지 2: 입력 데이터 상태에 따라 최선, 평균, 최악 시간이 달라질 수 있다.
      선택지 3: 실제 CPU 시간은 하드웨어와 구현 환경의 영향을 받으므로 일반적 정의로 적절하지 않다.
      선택지 4: 알고리즘 성능 평가에서는 보장 가능한 상한인 최악의 수행시간을 자주 사용한다.

      핵심 개념:
      시간 복잡도는 입력 크기 n에 따른 연산 수 증가율을 나타낸다.
      실제 실행 시간보다 환경 독립적인 비교 기준을 제공한다.
      최선, 평균, 최악 시간으로 나누어 분석할 수 있다.
      최악 시간은 어떤 입력에서도 보장되는 성능 상한으로 중요하다.
    tags: [time-complexity]

  - id: t01-09
    type: multiple-choice
    prompt: '$f(n)=3n^3+3n-10$이고 $g(n)=n^3$인 경우 $n \\ge 1$에 대해서 $f(n) \\le 7 \\cdot g(n)$일 때 $f(n)$을 나타내는 점근적 표기법은?'
    choices:
      - { id: '1', text: '$f(n)=O(n^3)$' }
      - { id: '2', text: '$f(n)=\\Omega(n^3)$' }
      - { id: '3', text: '$f(n)=\\Theta(n^3)$' }
      - { id: '4', text: '$f(n)=\\Phi(n^3)$' }
    answers: ['1']
    explanation: |
      선택지 1: f(n)이 상수배 g(n) 이하로 제한되므로 점근적 상한인 O(n^3)로 표현할 수 있다.
      선택지 2: Ω는 점근적 하한을 나타낸다.
      선택지 3: Θ는 상한과 하한이 동시에 성립할 때의 정확한 차수를 나타낸다.
      선택지 4: Φ는 표준적인 시간 복잡도 점근 표기법이 아니다.

      핵심 개념:
      O 표기법은 함수 증가율의 점근적 상한을 나타낸다.
      f(n) <= c g(n)이 충분히 큰 n에서 성립하면 f(n)=O(g(n))이다.
      Ω는 하한, Θ는 상한과 하한이 모두 맞는 경우이다.
      다항식에서는 최고차항이 점근적 증가율을 지배한다.
    tags: [asymptotic-notation, big-o]

  - id: t01-10
    type: multiple-choice
    prompt: 점근성능의 표기법 중에서 점근적 상한을 나타내는 것은?
    choices:
      - { id: '1', text: '$f(n)=\\Omega(g(n))$' }
      - { id: '2', text: '$f(n)=O(g(n))$' }
      - { id: '3', text: '$f(n)=\\Phi(g(n))$' }
      - { id: '4', text: '$f(n)=\\Theta(g(n))$' }
    answers: ['2']
    explanation: |
      선택지 1: Ω 표기법은 점근적 하한을 나타낸다.
      선택지 2: O 표기법은 점근적 상한을 나타낸다.
      선택지 3: Φ는 표준 점근성능 표기법이 아니다.
      선택지 4: Θ 표기법은 점근적으로 같은 차수, 즉 상한과 하한이 함께 성립함을 나타낸다.

      핵심 개념:
      O, Ω, Θ는 알고리즘 증가율 비교에 쓰이는 대표 표기법이다.
      O는 최악 성능 상한을 설명할 때 자주 사용된다.
      Ω는 최소한 이 정도 이상 증가한다는 하한이다.
      Θ는 두 함수의 증가율이 같은 차수임을 뜻한다.
    tags: [asymptotic-notation, big-o]

  - id: t01-11
    type: multiple-choice
    prompt: 충분히 큰 입력 크기 n에 대해서 가장 빠른 성능을 나타내는 빅오 함수부터 올바르게 나열한 것은?
    choices:
      - { id: '1', text: '$O(n) \\to O(\\log n) \\to O(n\\log n) \\to O(n^2)$' }
      - { id: '2', text: '$O(n) \\to O(n\\log n) \\to O(\\log n) \\to O(n^2)$' }
      - { id: '3', text: '$O(\\log n) \\to O(n) \\to O(n\\log n) \\to O(n^2)$' }
      - { id: '4', text: '$O(\\log n) \\to O(n\\log n) \\to O(n) \\to O(n^2)$' }
    answers: ['3']
    explanation: |
      선택지 1: 로그 시간은 선형 시간보다 빠르므로 O(log n)이 O(n)보다 앞서야 한다.
      선택지 2: O(log n), O(n), O(n log n)의 순서가 맞지 않다.
      선택지 3: 충분히 큰 n에서 O(log n), O(n), O(n log n), O(n^2) 순으로 증가율이 커진다.
      선택지 4: O(n log n)은 O(n)보다 느리다.

      핵심 개념:
      점근 복잡도는 입력이 충분히 커질 때의 증가율을 비교한다.
      일반적으로 log n < n < n log n < n^2 순서로 증가한다.
      증가율이 낮을수록 큰 입력에서 더 빠른 알고리즘으로 평가된다.
      상수와 낮은 차수 항은 점근 비교에서 보통 무시한다.
    tags: [asymptotic-notation, complexity-order]

  - id: t01-12
    type: multiple-choice
    passageRefs: [g01-recurrence-12]
    prompt: 다음 점화식의 폐쇄형은?
    choices:
      - { id: '1', text: '$\\Theta(\\log n)$' }
      - { id: '2', text: '$\\Theta(n)$' }
      - { id: '3', text: '$\\Theta(n\\log n)$' }
      - { id: '4', text: '$\\Theta(n^2)$' }
    answers: ['4']
    explanation: |
      선택지 1: 매 단계 더해지는 비용이 선형이므로 로그보다 훨씬 크다.
      선택지 2: 1부터 n까지의 합은 선형이 아니라 이차식 차수이다.
      선택지 3: 선형 항들의 누적합은 n log n이 아니라 n^2 차수이다.
      선택지 4: T(n)=T(n-1)+Θ(n)이므로 Θ(1)+Θ(2)+...+Θ(n)=Θ(n^2)이다.

      핵심 개념:
      점화식은 재귀 알고리즘의 수행시간을 표현한다.
      T(n)=T(n-1)+Θ(n)은 선형 비용이 n번 누적되는 구조이다.
      1부터 n까지의 합은 n(n+1)/2로 Θ(n^2)이다.
      점화식 전개를 통해 폐쇄형 시간 복잡도를 구할 수 있다.
    tags: [recurrence, time-complexity]

  - id: t01-13
    type: multiple-choice
    prompt: 가장 효율적인 성능을 나타내는 점화식 표현은?
    choices:
      - { id: '1', text: '$T(n)=T(\\frac{n}{2})+\\Theta(1),\\ T(1)=\\Theta(1)$' }
      - { id: '2', text: '$T(n)=T(\\frac{n}{2})+\\Theta(n),\\ T(1)=\\Theta(1)$' }
      - { id: '3', text: '$T(n)=2T(\\frac{n}{2})+\\Theta(1),\\ T(1)=\\Theta(1)$' }
      - { id: '4', text: '$T(n)=2T(\\frac{n}{2})+\\Theta(n),\\ T(1)=\\Theta(1)$' }
    answers: ['1']
    explanation: |
      선택지 1: 매 단계 문제 크기가 절반이 되고 추가 비용이 상수이므로 Θ(log n)으로 가장 효율적이다.
      선택지 2: 각 단계의 추가 비용이 n, n/2, ...로 누적되어 Θ(n)이다.
      선택지 3: 두 개의 절반 크기 문제를 풀어 전체적으로 Θ(n)이 된다.
      선택지 4: 전형적인 합병 정렬 형태로 Θ(n log n)이다.

      핵심 개념:
      점화식의 가지 수와 각 단계 추가 비용이 전체 시간에 영향을 준다.
      T(n)=T(n/2)+Θ(1)은 이진 탐색처럼 로그 단계만 필요하다.
      부분 문제가 두 개로 늘어나면 같은 크기 축소라도 비용이 커진다.
      마스터 정리나 전개를 통해 점화식의 차수를 비교할 수 있다.
    tags: [recurrence, divide-and-conquer]

  - id: t02-01
    type: multiple-choice
    prompt: 정렬 알고리즘이 안정적이라는 표현에 대한 설명으로 적절한 것은?
    choices:
      - { id: '1', text: '데이터의 값이 주어진 범위 내에서 확률적으로 균등하게 분포한다.' }
      - {
          id: '2',
          text: '같은 값을 갖는 데이터에 대한 정렬 전후의 상대적인 위치가 그대로 유지된다.',
        }
      - { id: '3', text: '동일한 값을 갖는 데이터가 입력 배열에 존재하지 않는다.' }
      - { id: '4', text: '입력 배열 이외에 추가적인 저장 공간이 상수 개이다.' }
    answers: ['2']
    explanation: |
      선택지 1: 값이 균등하게 분포한다는 것은 버킷 정렬 같은 특정 알고리즘의 가정과 관련된다.
      선택지 2: 안정 정렬은 같은 키를 가진 원소들의 상대적 순서를 정렬 후에도 유지한다.
      선택지 3: 같은 값이 존재하지 않는다는 조건은 안정성의 정의가 아니다.
      선택지 4: 추가 공간이 상수 개인 것은 제자리 정렬의 성질이다.

      핵심 개념:
      안정성은 같은 값 또는 같은 키를 가진 원소들의 상대 순서 유지 여부이다.
      안정 정렬은 부가 정보가 있는 레코드 정렬에서 중요하다.
      제자리 정렬과 안정 정렬은 서로 다른 성질이다.
      알고리즘에 따라 안정성을 보장하거나 보장하지 않을 수 있다.
    tags: [sorting, stability]

  - id: t02-02
    type: multiple-choice
    prompt: 비교 기반의 정렬 알고리즘이 아닌 것은?
    choices:
      - { id: '1', text: '퀵 정렬' }
      - { id: '2', text: '버블 정렬' }
      - { id: '3', text: '계수 정렬' }
      - { id: '4', text: '셸 정렬' }
    answers: ['3']
    explanation: |
      선택지 1: 퀵 정렬은 원소 비교를 기반으로 분할한다.
      선택지 2: 버블 정렬은 인접 원소를 비교해 교환한다.
      선택지 3: 계수 정렬은 값의 발생 횟수를 세어 위치를 계산하므로 비교 기반 정렬이 아니다.
      선택지 4: 셸 정렬은 간격을 둔 삽입 정렬로 비교 기반 정렬이다.

      핵심 개념:
      비교 기반 정렬은 원소 간 대소 비교로 순서를 결정한다.
      계수 정렬, 기수 정렬, 버킷 정렬은 데이터 범위나 분포를 이용하는 비비교 정렬이다.
      비교 기반 정렬의 일반적인 하한은 Ω(n log n)이다.
      비비교 정렬은 조건이 맞으면 선형 시간에 가까운 성능을 낼 수 있다.
    tags: [sorting, counting-sort]

  - id: t02-03
    type: multiple-choice
    prompt: 가장 작은 값, 두 번째로 작은 값 등의 순서대로 데이터를 골라 나열하기 때문에 데이터의 입력 상태에 민감하지 않고 언제나 동일한 시간 복잡도를 갖는 정렬 알고리즘은?
    choices:
      - { id: '1', text: '합병 정렬' }
      - { id: '2', text: '버블 정렬' }
      - { id: '3', text: '삽입 정렬' }
      - { id: '4', text: '선택 정렬' }
    answers: ['4']
    explanation: |
      선택지 1: 합병 정렬은 분할정복 기반 정렬이다.
      선택지 2: 버블 정렬은 인접한 원소를 반복 비교하고 교환한다.
      선택지 3: 삽입 정렬은 입력이 이미 정렬되어 있으면 빠르다.
      선택지 4: 선택 정렬은 매 단계에서 남은 원소 중 최솟값을 선택해 놓으므로 입력 상태와 무관하게 비교 횟수가 일정하다.

      핵심 개념:
      선택 정렬은 정렬되지 않은 부분에서 최솟값을 찾아 앞쪽에 배치한다.
      입력 상태와 관계없이 대략 n(n-1)/2번 비교한다.
      교환 횟수는 적지만 비교 횟수가 많아 큰 입력에는 비효율적이다.
      시간 복잡도는 최선, 평균, 최악 모두 O(n^2)이다.
    tags: [sorting, selection-sort]

  - id: t02-04
    type: multiple-choice
    prompt: '데이터 25, 40, 20, 10, 30, 45, 15, 35를 버블 정렬로 오름차순 정렬할 때, 왼쪽에서 오른쪽으로 진행하는 한 번의 단계에서 자리바꿈이 발생하는 횟수는?'
    choices:
      - { id: '1', text: '5' }
      - { id: '2', text: '6' }
      - { id: '3', text: '3' }
      - { id: '4', text: '4' }
    answers: ['1']
    explanation: |
      선택지 1: 40과 20, 40과 10, 40과 30, 45와 15, 45와 35에서 총 5번 자리바꿈이 발생한다.
      선택지 2: 25와 40, 40과 45처럼 이미 순서가 맞는 비교는 교환하지 않는다.
      선택지 3: 실제 교환 횟수보다 적다.
      선택지 4: 마지막 45와 35 교환까지 포함해야 한다.

      핵심 개념:
      버블 정렬은 인접한 두 원소를 비교해 순서가 틀리면 교환한다.
      한 번의 왼쪽에서 오른쪽 진행 후 가장 큰 값이 오른쪽 끝으로 이동한다.
      각 단계의 교환 횟수는 데이터의 현재 배치에 따라 달라진다.
      비교는 인접 원소 단위로 순차적으로 수행한다.
    tags: [sorting, bubble-sort]

  - id: t02-05
    type: multiple-choice
    prompt: 이미 제 순서대로 정렬된 n개의 데이터에 대해서 삽입 정렬을 적용할 때의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(\\log n)$' }
      - { id: '2', text: '$O(n)$' }
      - { id: '3', text: '$O(n\\log n)$' }
      - { id: '4', text: '$O(n^2)$' }
    answers: ['2']
    explanation: |
      선택지 1: 각 원소를 한 번씩 확인해야 하므로 로그 시간은 아니다.
      선택지 2: 이미 정렬된 경우 삽입 정렬은 각 원소를 거의 한 번씩만 확인하므로 O(n)이다.
      선택지 3: 삽입 정렬의 최선 시간은 n log n보다 작다.
      선택지 4: 삽입 정렬의 최악 시간은 O(n^2)이지만 이미 정렬된 최선 경우에는 O(n)이다.

      핵심 개념:
      삽입 정렬은 앞쪽의 정렬된 부분에 새 원소를 삽입한다.
      이미 정렬되어 있으면 이동이 거의 발생하지 않는다.
      최선 시간 복잡도는 O(n), 최악 시간 복잡도는 O(n^2)이다.
      입력 상태에 민감한 정렬 알고리즘이다.
    tags: [sorting, insertion-sort]

  - id: t02-06
    type: multiple-choice
    prompt: 입력 배열을 부분배열로 나누어 정렬하는 과정을 한 번만 거치는 것이 아니라 부분배열의 크기와 개수를 변화시켜 가면서 삽입 정렬 과정을 여러 번 거치는 정렬 알고리즘은?
    choices:
      - { id: '1', text: '힙 정렬' }
      - { id: '2', text: '버킷 정렬' }
      - { id: '3', text: '셸 정렬' }
      - { id: '4', text: '합병 정렬' }
    answers: ['3']
    explanation: |
      선택지 1: 힙 정렬은 힙 자료구조를 이용한다.
      선택지 2: 버킷 정렬은 데이터를 여러 버킷에 분배해 정렬한다.
      선택지 3: 셸 정렬은 간격을 줄여 가며 부분배열에 삽입 정렬을 반복 적용한다.
      선택지 4: 합병 정렬은 분할한 배열을 정렬 후 병합한다.

      핵심 개념:
      셸 정렬은 삽입 정렬을 일반화한 알고리즘이다.
      큰 간격으로 먼저 대략 정렬한 뒤 간격을 줄여 최종 정렬한다.
      입력이 거의 정렬된 상태에서 삽입 정렬이 빠르다는 점을 활용한다.
      간격 수열 선택에 따라 성능이 달라진다.
    tags: [sorting, shell-sort]

  - id: t02-07
    type: multiple-choice
    prompt: 퀵 정렬과 동일한 알고리즘 설계기법이 적용된 것은?
    choices:
      - { id: '1', text: '버블 정렬' }
      - { id: '2', text: '셸 정렬' }
      - { id: '3', text: '힙 정렬' }
      - { id: '4', text: '합병 정렬' }
    answers: ['4']
    explanation: |
      선택지 1: 버블 정렬은 인접 교환을 반복하는 단순 비교 정렬이다.
      선택지 2: 셸 정렬은 간격 기반 삽입 정렬이다.
      선택지 3: 힙 정렬은 힙 자료구조를 이용한다.
      선택지 4: 퀵 정렬과 합병 정렬은 모두 문제를 나누어 해결하는 분할정복 기법을 사용한다.

      핵심 개념:
      퀵 정렬은 피벗 기준으로 배열을 분할하고 각 부분을 재귀적으로 정렬한다.
      합병 정렬은 배열을 절반으로 나누어 정렬한 뒤 병합한다.
      둘 다 분할정복을 사용하지만 분할과 결합 방식은 다르다.
      설계기법은 알고리즘의 문제 해결 구조를 기준으로 판단한다.
    tags: [sorting, quick-sort, merge-sort]

  - id: t02-08
    type: multiple-choice
    prompt: 퀵 정렬 알고리즘에 대한 올바른 설명은?
    choices:
      - {
          id: '1',
          text: '피벗 선택의 임의성이 보장된다면 평균 실행 시간 $O(n\\log n)$이 보장된다.',
        }
      - { id: '2', text: '최악의 경우에도 실행 시간 $O(n\\log n)$이 보장된다.' }
      - { id: '3', text: '안정적이면서 제자리 정렬 알고리즘이다.' }
      - {
          id: '4',
          text: '피벗을 중심으로 부분배열이 항상 같은 크기로 분할될 때의 실행 시간은 $O(\\log n)$이다.',
        }
    answers: ['1']
    explanation: |
      선택지 1: 피벗을 임의로 선택하면 평균적으로 균형 잡힌 분할을 기대할 수 있어 평균 O(n log n)을 기대할 수 있다.
      선택지 2: 피벗 선택이 나쁘면 퀵 정렬의 최악 시간은 O(n^2)이다.
      선택지 3: 일반적인 퀵 정렬은 제자리 정렬이지만 안정 정렬은 아니다.
      선택지 4: 균등 분할되어도 각 단계 분할 비용이 있어 전체 시간은 O(n log n)이다.

      핵심 개념:
      퀵 정렬은 피벗을 기준으로 작은 값과 큰 값을 분할한다.
      평균 시간 복잡도는 O(n log n)이다.
      최악의 경우 한쪽으로 치우친 분할이 반복되어 O(n^2)이 된다.
      피벗 선택 전략은 퀵 정렬 성능에 큰 영향을 준다.
    tags: [sorting, quick-sort]

  - id: t02-09
    type: multiple-choice
    prompt: 퀵 정렬에서 최악의 경우가 발생하는 피벗은?
    choices:
      - { id: '1', text: '피벗이 항상 배열의 중간값으로 선택되는 경우' }
      - { id: '2', text: '배열에서 항상 최솟값으로 피벗이 선택되는 경우' }
      - { id: '3', text: '주어진 배열을 항상 동일한 크기로 분할하도록 피벗이 선택되는 경우' }
      - { id: '4', text: '피벗을 랜덤하게 선택하는 경우' }
    answers: ['2']
    explanation: |
      선택지 1: 중간값 피벗은 균형 분할을 만들어 좋은 성능을 낸다.
      선택지 2: 최솟값이 피벗이면 한쪽 부분배열이 비어 치우친 분할이 반복되어 최악의 경우가 된다.
      선택지 3: 동일한 크기 분할은 퀵 정렬의 이상적인 경우이다.
      선택지 4: 랜덤 피벗은 최악 입력 패턴을 피하고 평균 성능을 개선하는 데 쓰인다.

      핵심 개념:
      퀵 정렬의 성능은 피벗이 배열을 얼마나 균형 있게 나누는지에 좌우된다.
      피벗이 항상 최솟값이나 최댓값이면 한쪽으로 치우친 분할이 된다.
      이 경우 재귀 깊이가 n에 가까워져 O(n^2)이 된다.
      중간값에 가까운 피벗은 O(n log n) 성능을 기대하게 한다.
