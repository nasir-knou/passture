      - { id: '3', text: '음의 간선이 있더라도 음의 사이클이 없는 경우에는 적용할 수 있다.' }
      - { id: '4', text: '단일 출발점 최단 경로를 구하는 알고리즘이다.' }
    answers: ['3']
    explanation: |
