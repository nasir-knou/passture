      데이크스트라 알고리즘은 현재까지 알려진 최단 거리 추정값을 관리한다.
      매 단계에서 미선택 정점 중 거리 값이 가장 작은 정점을 확정한다.
      확정된 정점의 인접 간선을 이용해 다른 정점의 거리를 완화한다.
      최소 간선 선택이 아니라 최소 거리 정점 선택이라는 점이 중요하다.
