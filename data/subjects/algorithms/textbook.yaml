  - id: t05-06
    type: multiple-choice
    prompt: n개 행렬의 연쇄적 곱셈 문제를 해결하는 동적 프로그래밍 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(n)$' }
      - { id: '2', text: '$O(n\\log n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['4']
    explanation: |
      선택지 1: 모든 부분 구간과 분할 위치를 고려해야 하므로 선형 시간이 아니다.
      선택지 2: 행렬 연쇄 곱셈 DP는 n log n보다 많은 계산을 수행한다.
      선택지 3: 부분 구간 수는 O(n^2)이지만 각 구간마다 분할 위치를 다시 확인한다.
      선택지 4: O(n^2)개의 부분 문제 각각에 O(n)개의 분할을 검사하므로 O(n^3)이다.

      핵심 개념:
      행렬 연쇄 곱셈은 모든 구간 [i, j]의 최소 비용을 계산한다.
      각 구간마다 가능한 분할점 k를 모두 시도한다.
      부분 문제 수는 O(n^2), 분할 시도는 O(n)이다.
      전체 시간 복잡도는 O(n^3)이다.
    tags: [dynamic-programming, matrix-chain-multiplication]

  - id: t05-07
    type: multiple-choice
    prompt: n개 행렬의 연쇄적 곱셈 문제를 해결하는 동적 프로그래밍 알고리즘의 수행 결과로 얻은 테이블 P[1..n][1..n]으로부터 행렬의 곱셈 순서를 직접 구하는 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(n)$' }
      - { id: '2', text: '$O(n\\log n)$' }
      - { id: '3', text: '$O(n^2)$' }
      - { id: '4', text: '$O(n^3)$' }
    answers: ['1']
    explanation: |
      선택지 1: 저장된 분할 테이블을 따라 괄호 구조를 출력하는 과정은 각 행렬을 상수 번 방문하므로 O(n)이다.
      선택지 2: 별도의 정렬이나 로그 단계 반복이 필요하지 않다.
      선택지 3: 전체 테이블을 다시 계산하거나 모두 훑을 필요가 없다.
      선택지 4: O(n^3)은 비용 테이블을 계산할 때의 시간이다.

      핵심 개념:
      P 테이블은 각 구간의 최적 분할 위치를 저장한다.
      최적 곱셈 순서 복원은 P 테이블을 재귀적으로 따라가면 된다.
      복원 과정은 괄호 구조의 노드 수에 비례한다.
      계산 단계와 결과 복원 단계의 시간 복잡도는 다르다.
    tags: [matrix-chain-multiplication]

  - id: t05-08
