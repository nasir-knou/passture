      - { id: '3', text: '정점의 방문 순서는 1, 2, 5, 3, 4, 6이다.' }
      - { id: '4', text: '인접 리스트로 구현하면 시간 복잡도는 $O(|V|^2)$이다.' }
    answers: ['1']
    explanation: |
