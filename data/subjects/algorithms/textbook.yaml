      선택지 2: 최근의 주변 정점을 우선 방문하는 것은 DFS의 성질이다.
      선택지 3: BFS 방문 순서는 1, 2, 3, 4, 5, 6 형태가 된다.
      선택지 4: 인접 리스트 BFS의 시간 복잡도는 O(|V|+|E|)이다.

      핵심 개념:
      BFS는 큐를 이용해 발견 순서대로 정점을 처리한다.
      시작 정점에서 가까운 정점부터 레벨 순서로 방문한다.
      DFS는 스택 또는 재귀를 사용해 최근 발견 정점으로 깊게 진행한다.
      그래프 표현 방식에 따라 순회 시간 복잡도 표현이 달라진다.
