      - { id: '4', text: '$(M_1M_2)(M_3M_4)$' }
    answers: ['4']
    explanation: |
      선택지 1: 분할 위치를 명시하지 않은 전체 곱 표현이다.
      선택지 2: P[1][4]=1일 때의 첫 분할에 가깝다.
      선택지 3: P[1][4]=3일 때의 첫 분할에 가깝다.
      선택지 4: P[1][4]=2는 M1..M4를 M1..M2와 M3..M4로 나누는 최적 분할을 의미한다.

      핵심 개념:
      행렬 연쇄 곱셈에서 P[i][j]는 최적 분할 위치를 저장한다.
      P[1][4]=2이면 1~4번 행렬을 2번 뒤에서 나눈다.
      실제 곱셈 순서는 저장된 분할 정보를 재귀적으로 따라가며 복원한다.
      비용 테이블과 분할 테이블을 함께 사용한다.
