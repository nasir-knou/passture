      - { id: '3', text: '선택된 정점들과 최소의 간선으로 연결된 미선택 정점을 선택' }
      - { id: '4', text: '바로 전에 선택된 정점에 최소의 간선으로 연결된 정점을 선택' }
    answers: ['2']
