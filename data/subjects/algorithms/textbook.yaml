      - { id: '2', text: '$V-S$ 내에서 가중치가 가장 작은 간선' }
      - { id: '3', text: '$S$와 $V-S$를 잇는 간선 중 가중치가 가장 큰 간선' }
      - { id: '4', text: '$S$와 $V-S$를 잇는 간선 중 가중치가 가장 작은 간선' }
    answers: ['4']
    explanation: |
      선택지 1: 아직 선택되지 않은 정점들끼리의 간선은 현재 트리를 확장하지 않는다.
      선택지 2: V-S 내부 간선은 선택된 집합 S와 연결되지 않는다.
      선택지 3: 프림 알고리즘은 가장 큰 간선이 아니라 가장 작은 가중치 간선을 선택한다.
      선택지 4: 프림 알고리즘은 S와 V-S를 잇는 간선 중 최소 가중치 간선을 선택해 트리를 확장한다.

      핵심 개념:
      프림 알고리즘은 하나의 정점 집합 S를 점차 확장한다.
      매 단계에서 현재 트리와 바깥 정점을 잇는 최소 가중치 간선을 선택한다.
      선택한 간선은 사이클을 만들지 않고 신장 트리를 확장한다.
