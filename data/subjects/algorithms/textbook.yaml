      선택지 2: LCS는 i=0 또는 j=0이면 0, xi=yj이면 LCS(i-1,j-1)+1, 다르면 max(LCS(i,j-1), LCS(i-1,j))이다.
      선택지 3: 빈 문자열과의 LCS 길이는 1이 아니라 0이다.
      선택지 4: 문자가 다를 때 대각선+1을 적용하지 않는다.

      핵심 개념:
