    type: multiple-choice
    prompt: '플로이드 알고리즘의 세 중첩 반복문에서 D[i][j] > D[i][k] + D[k][j]를 검사한다고 할 때, 바깥쪽부터 빈칸 ㄱ, ㄴ, ㄷ에 들어갈 변수 순서는?'
    choices:
      - { id: '1', text: 'i-j-k' }
      - { id: '2', text: 'j-k-i' }
      - { id: '3', text: 'k-i-j' }
      - { id: '4', text: 'i-k-j' }
    answers: ['3']
    explanation: |
      선택지 1: i와 j를 바깥에서 먼저 고정하면 중간 정점 k의 단계적 확장 의미가 깨진다.
      선택지 2: j-k-i 순서는 플로이드 알고리즘의 표준 반복 순서가 아니다.
      선택지 3: 플로이드 알고리즘은 중간 정점 k를 바깥 반복으로 두고 i, j 쌍을 갱신한다.
      선택지 4: k가 중간 반복이면 이전 k 단계의 결과를 올바르게 활용하기 어렵다.

      핵심 개념:
      플로이드 알고리즘은 허용하는 중간 정점 집합을 k 단계로 확장한다.
      바깥 반복 k는 1번부터 k번 정점까지를 중간 정점으로 허용한다는 의미이다.
      내부 반복 i, j는 모든 출발-도착 정점 쌍을 갱신한다.
      점화식은 D[i][j] = min(D[i][j], D[i][k] + D[k][j])이다.
