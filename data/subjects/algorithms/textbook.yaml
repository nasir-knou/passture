      - { id: '2', text: '$f(3)$' }
      - { id: '3', text: '$f(5)$' }
      - { id: '4', text: '$f(7)$' }
    answers: ['1']
    explanation: |
      선택지 1: 상향식 동적 프로그래밍에서는 기본값인 f(0)부터 차례로 계산한다.
      선택지 2: f(3)을 계산하려면 더 작은 f(0), f(1), f(2)가 필요하다.
      선택지 3: f(5)는 앞선 항들을 계산한 뒤 구한다.
      선택지 4: f(7)은 최종적으로 구하려는 값이다.

      핵심 개념:
      피보나치 수열은 f(n)=f(n-1)+f(n-2) 구조를 가진다.
      동적 프로그래밍은 기본 사례부터 값을 저장하며 계산한다.
      상향식 방식은 작은 n부터 큰 n으로 진행한다.
      중복 재귀 호출을 제거해 선형 시간에 계산할 수 있다.
