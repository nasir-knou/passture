      DFS 종료 시간의 역순을 이용해 위상 정렬을 만들 수 있다.
      진입 차수 기반 알고리즘도 위상 정렬을 구하는 방법이다.
      사이클이 있는 방향 그래프에서는 위상 정렬이 존재하지 않는다.
