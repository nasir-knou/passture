      - { id: '4', text: '기수 정렬' }
    answers: ['3']
    explanation: |
      선택지 1: 퀵 정렬의 최악 경우는 한쪽으로 치우친 분할로 O(n^2)이 된다.
      선택지 2: 셸 정렬은 간격 수열에 따라 복잡도가 달라진다.
      선택지 3: 합병 정렬은 두 절반을 정렬하고 Θ(n)에 병합하므로 T(n)=2T(n/2)+Θ(n)이다.
      선택지 4: 기수 정렬은 자릿수별 비비교 정렬 방식이다.

      핵심 개념:
      합병 정렬은 배열을 절반으로 나누고 각각 정렬한 뒤 병합한다.
      병합 단계는 전체 원소를 한 번 훑으므로 Θ(n)이다.
      마스터 정리에 의해 이 점화식의 해는 Θ(n log n)이다.
      합병 정렬은 최악의 경우에도 O(n log n)을 보장한다.
