      - id: '3'
        text: |
          $$
          LCS(i,j)=
          \begin{cases}
          1 & i=0 \text{ 또는 } j=0\text{인 경우} \\
          LCS(i-1,j-1)+1 & x_i \ne y_j\text{인 경우} \\
          \max\{LCS(i,j-1), LCS(i-1,j)\} & x_i=y_j\text{인 경우}
          \end{cases}
          $$
      - id: '4'
        text: |
          $$
          LCS(i,j)=
          \begin{cases}
