      핵심 개념:
      브루트-포스 매칭은 가능한 모든 시작 위치에서 패턴을 비교한다.
      텍스트 길이가 n이고 패턴 길이가 m이면 시작 위치는 O(n)개이다.
      각 위치에서 최악 m번 비교할 수 있다.
      따라서 최악 시간 복잡도는 O(mn)이다.
    tags: [string-matching, brute-force]

