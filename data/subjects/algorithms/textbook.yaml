      선택지 2: 데이크스트라는 매 단계 현재 가장 가까운 정점을 확정하는 욕심쟁이 알고리즘이다.
      선택지 3: 데이크스트라 알고리즘은 음의 가중치 간선이 있으면 올바른 결과를 보장하지 않는다.
      선택지 4: 데이크스트라는 한 출발점에서 다른 모든 정점까지의 최단 경로를 구한다.

      핵심 개념:
