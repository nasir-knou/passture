      선택지 2: 신장 트리는 모든 정점을 포함하는 트리이다.
      선택지 3: 강연결 성분은 방향 그래프에서 임의의 두 정점이 서로 도달 가능한 최대 부분 그래프이다.
      선택지 4: 연결 성분은 주로 무방향 그래프의 연결된 최대 부분 그래프를 의미한다.

