      마지막 문자가 같으면 그 문자를 포함하고 대각선 값에 1을 더한다.
      마지막 문자가 다르면 한쪽 문자를 제외한 두 경우 중 큰 값을 선택한다.
      동적 프로그래밍 테이블로 중복 계산을 피한다.
    tags: [dynamic-programming, lcs]

  - id: t05-09
    type: multiple-choice
    prompt: 길이가 각각 n과 m인 두 스트링의 LCS 길이를 구하는 동적 프로그래밍 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(\\min\\{n,m\\})$' }
      - { id: '2', text: '$O(\\max\\{n,m\\})$' }
      - { id: '3', text: '$O(n+m)$' }
      - { id: '4', text: '$O(nm)$' }
    answers: ['4']
    explanation: |
      선택지 1: 두 문자열의 모든 접두 조합을 고려해야 하므로 min 길이만으로 충분하지 않다.
      선택지 2: 더 긴 문자열 길이에만 비례하지 않는다.
      선택지 3: 선형 합보다 많은 부분 문제가 있다.
      선택지 4: n x m 크기의 DP 테이블을 채우므로 O(nm)이다.

      핵심 개념:
      LCS DP는 두 문자열의 접두사 쌍마다 값을 계산한다.
      테이블 크기는 (n+1)(m+1)이다.
      각 칸은 상수 시간에 계산된다.
      따라서 전체 시간 복잡도는 O(nm)이다.
    tags: [dynamic-programming, lcs]

  - id: t05-10
    type: multiple-choice
    prompt: 길이가 n과 m인 두 스트링의 LCS 길이를 구해 얻은 테이블 LCS[0..n][0..m]으로부터 LCS를 직접 구하는 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: '$O(\\min\\{n,m\\})$' }
      - { id: '2', text: '$O(\\max\\{n,m\\})$' }
      - { id: '3', text: '$O(n+m)$' }
      - { id: '4', text: '$O(nm)$' }
    answers: ['3']
    explanation: |
      선택지 1: 복원 과정은 두 문자열의 인덱스를 이동하므로 더 많은 이동이 필요할 수 있다.
      선택지 2: 한쪽 길이만으로 정확히 표현하기 어렵다.
      선택지 3: 테이블의 오른쪽 아래에서 시작해 i 또는 j를 줄여 가므로 최대 n+m번 정도 이동한다.
      선택지 4: 이미 계산된 테이블을 모두 다시 훑을 필요는 없다.

      핵심 개념:
      LCS 복원은 완성된 DP 테이블을 역추적한다.
      문자가 같으면 대각선으로 이동하며 해당 문자를 결과에 포함한다.
      문자가 다르면 더 큰 값을 가진 위쪽 또는 왼쪽으로 이동한다.
      각 단계에서 i나 j가 줄어들어 O(n+m)에 복원할 수 있다.
    tags: [dynamic-programming, lcs]

