      선택지 2: 데이크스트라는 미선택 정점 중 시작 정점으로부터의 현재 최소 거리 정점을 선택한다.
      선택지 3: 선택 집합과 연결된 최소 간선을 고르는 방식은 프림 알고리즘에 가깝다.
      선택지 4: 직전 정점과의 간선만 고려하면 최단 경로를 보장할 수 없다.

