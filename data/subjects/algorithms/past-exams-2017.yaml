      - { id: '3', text: '삽입 정렬의 최악 경우' }
      - { id: '4', text: '버블 정렬의 최악 경우' }
    answers: ['1']
    explanation: 합병 정렬은 분할과 병합을 반복하며 최악의 경우에도 O(n log n) 시간에 정렬한다.
    tags: [sorting, complexity]
