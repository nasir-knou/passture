    answers: ['1']
    explanation: |
      선택지 1 (정답): (a,b)는 더 가벼운 경로로 대체되어 최소 신장 트리에 포함되지 않는다.
      선택지 2 (오답): (c,e)는 가중치 1로 포함된다.
      선택지 3 (오답): (d,f)는 가중치 4로 포함된다.
