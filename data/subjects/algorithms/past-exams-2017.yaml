questions:
  - id: e17-01
    type: multiple-choice
    prompt: 선형 리스트의 한쪽 끝에서만 자료의 삽입과 삭제가 이루어지는 자료구조는?
    choices:
      - { id: '1', text: '배열' }
      - { id: '2', text: '스택' }
      - { id: '3', text: '트리' }
      - { id: '4', text: '큐' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 배열은 인덱스로 접근하는 순차 저장 구조다.
      선택지 2 (정답): 스택은 한쪽 끝에서 삽입과 삭제가 모두 일어나는 LIFO 구조다.
      선택지 3 (오답): 트리는 계층적 비선형 자료구조다.
      선택지 4 (오답): 큐는 한쪽 끝에서 삽입하고 다른 쪽 끝에서 삭제한다.

      핵심 개념:
      스택은 후입선출 구조다.
      삽입과 삭제는 top에서 이루어진다.
      큐는 선입선출 구조라 동작 위치가 다르다.
      자료구조는 삽입과 삭제 위치로 성격을 구분할 수 있다.
    tags: [data-structure, stack]

  - id: e17-02
    type: multiple-choice
    prompt: 길이가 k인 이진 트리가 가질 수 있는 노드의 최대 개수는? (k>=1)
    choices:
      - { id: '1', text: '2^(k-1)' }
      - { id: '2', text: '2^(k-1)-1' }
      - { id: '3', text: '2^k' }
      - { id: '4', text: '2^k-1' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 깊이 k의 마지막 레벨에 존재할 수 있는 최대 노드 수다.
      선택지 2 (오답): 마지막 레벨 직전까지의 전체 노드 수다.
      선택지 3 (오답): 포화 이진 트리 전체 노드 수보다 1 크다.
      선택지 4 (정답): 높이 또는 길이가 k인 포화 이진 트리의 전체 노드 수는 2^k-1이다.

      핵심 개념:
      이진 트리의 각 레벨은 최대 두 배씩 노드 수가 증가한다.
      레벨 1부터 k까지 모두 찬 트리가 포화 이진 트리다.
      전체 노드 수는 등비수열의 합으로 계산한다.
      1+2+...+2^(k-1)=2^k-1이다.
    tags: [tree, binary-tree]

  - id: e17-03
    type: multiple-choice
    prompt: 욕심쟁이 방법이 가장 효과적으로 적용될 수 있는 것은?
    choices:
      - { id: '1', text: '이진 탐색' }
      - { id: '2', text: '퀵 정렬' }
      - { id: '3', text: '거스름돈 문제' }
      - { id: '4', text: '0/1 배낭 문제' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 이진 탐색은 분할정복적 탐색이다.
      선택지 2 (오답): 퀵 정렬은 분할정복 기반 정렬이다.
      선택지 3 (정답): 표준 동전 체계의 거스름돈 문제는 매 단계 최선 선택이 효과적이다.
      선택지 4 (오답): 0/1 배낭 문제는 일반적으로 동적 프로그래밍이나 백트래킹이 필요하다.

      핵심 개념:
      욕심쟁이 방법은 매 단계의 국소 최적 선택을 누적한다.
      항상 전역 최적해를 보장하는 것은 아니다.
      거스름돈 문제는 조건이 맞을 때 대표적 적용 예다.
      0/1 배낭 문제는 단순 욕심 선택으로 최적해가 깨질 수 있다.
    tags: [greedy]

  - id: e17-04
    type: multiple-choice
    prompt: 배낭의 용량이 10이고 물체가 소시지(무게 3, 이익 15), 빵(무게 5, 이익 20), 꿀(무게 3, 이익 9), 생선(무게 4, 이익 14)일 때 0/1 배낭문제의 최적해에 들어가지 않는 물체는?
    choices:
      - { id: '1', text: '소시지' }
      - { id: '2', text: '빵' }
      - { id: '3', text: '꿀' }
      - { id: '4', text: '생선' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): origin/정답.txt의 2017년 정답표 기준으로 오답 선택지이다.
      선택지 2 (오답): origin/정답.txt의 2017년 정답표 기준으로 오답 선택지이다.
      선택지 3 (정답): origin/정답.txt의 2017년 정답표 기준으로 정답 선택지이다.
      선택지 4 (오답): origin/정답.txt의 2017년 정답표 기준으로 오답 선택지이다.

      핵심 개념:
      이 문항은 origin/정답.txt의 2017년 algorithms 정답표와 대조해 보정했다.
      선택지는 원본 기출 문제의 번호와 동일하게 대응된다.
      다중정답 표기는 문서화된 A~K 대조표에 따라 복수 선택지로 변환한다.
      세부 개념 해설은 원문 전사 고도화 단계에서 보강할 수 있다.
    tags: [knapsack, optimization]

  - id: e17-05
    type: multiple-choice
    prompt: 다음 중 f(n)=O(g(n))의 관계를 나타내는 그래프는?
    images:
      - path: images/subjects/algorithms/past-exams/2017/page-1.png
        alt: 2017년 알고리즘 기출 5번 그래프 보기
    choices:
      - { id: '1', text: '①' }
      - { id: '2', text: '②' }
      - { id: '3', text: '③' }
      - { id: '4', text: '④' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 충분히 큰 n 이후의 상한 관계가 안정적으로 표현되지 않는다.
      선택지 2 (오답): f(n)이 두 상수배 사이에 놓이는 Θ 관계에 가깝다.
      선택지 3 (오답): f(n)이 cg(n)보다 커지는 형태라 O(g(n)) 상한이 아니다.
      선택지 4 (정답): 어떤 n0 이후 f(n)이 c*g(n) 이하로 유지되는 형태다.

      핵심 개념:
      O 표기법은 점근적 상한을 나타낸다.
      충분히 큰 n에 대해 f(n)<=c*g(n)이면 f(n)=O(g(n))이다.
      초반의 교차나 작은 n의 값은 중요하지 않다.
      Θ 표기법은 상한과 하한을 동시에 만족할 때 사용한다.
    tags: [complexity, big-o]

  - id: e17-06
    type: multiple-choice
    prompt: 배열 A[0..n-1]을 while문으로 한 번 순회하며 합을 구하는 알고리즘의 시간 복잡도는?
    choices:
      - { id: '1', text: 'O(n)' }
      - { id: '2', text: 'O(n^2)' }
      - { id: '3', text: 'O(nlogn)' }
      - { id: '4', text: 'O(logn)' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 반복문이 n번 실행되므로 선형 시간이다.
      선택지 2 (오답): 중첩 반복문이 없어 제곱 시간이 아니다.
      선택지 3 (오답): 분할 후 병합하는 구조가 아니다.
      선택지 4 (오답): 입력을 절반씩 줄이는 과정이 없다.

      핵심 개념:
      단일 반복문이 입력 원소를 한 번씩 처리하면 O(n)이다.
      반복문 내부의 상수 시간 연산은 전체 차수를 바꾸지 않는다.
      nlogn은 보통 분할정복 정렬에서 자주 나타난다.
      logn은 탐색 범위를 반복적으로 절반으로 줄일 때 나타난다.
    tags: [complexity]

  - id: e17-07
    type: multiple-choice
    prompt: 데이터의 입력 상태에 무관하게 언제나 동일한 시간 복잡도를 갖는 비교 기반의 정렬 알고리즘은?
    choices:
      - { id: '1', text: '삽입 정렬' }
      - { id: '2', text: '선택 정렬' }
      - { id: '3', text: '버블 정렬' }
      - { id: '4', text: '버킷 정렬' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 삽입 정렬은 입력 상태에 따라 성능 차이가 크다.
      선택지 2 (정답): 선택 정렬은 매 단계 남은 원소 전체를 탐색하므로 입력 상태와 무관하게 O(n^2)이다.
      선택지 3 (오답): 버블 정렬은 개선 구현에서 이미 정렬된 경우 성능이 달라질 수 있다.
      선택지 4 (오답): 버킷 정렬은 비교 기반 정렬이 아니다.

      핵심 개념:
      선택 정렬은 최솟값을 찾기 위해 남은 구간을 매번 비교한다.
      비교 횟수는 입력 배열의 초기 순서와 거의 무관하다.
      삽입 정렬은 거의 정렬된 입력에서 빠르다.
      비비교 정렬은 비교 기반 정렬과 분석 기준이 다르다.
    tags: [sorting, selection-sort]

