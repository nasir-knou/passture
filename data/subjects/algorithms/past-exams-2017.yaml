      데이크스트라, 크루스칼, 프림은 대표적인 욕심쟁이 알고리즘이다.
      플로이드 알고리즘은 모든 쌍 최단 경로를 동적 프로그래밍으로 구한다.
      알고리즘의 문제 영역이 비슷해도 설계 기법은 다를 수 있다.
      설계 기법 분류는 해법의 구조를 이해하는 데 중요하다.
