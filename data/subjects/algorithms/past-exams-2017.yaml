      선택지는 원본 기출 문제의 번호와 동일하게 대응된다.
      다중정답 표기는 문서화된 A~K 대조표에 따라 복수 선택지로 변환한다.
      세부 개념 해설은 원문 전사 고도화 단계에서 보강할 수 있다.
    tags: [graph, dfs]

  - id: e17-25
    type: multiple-choice
    prompt: 다음 방향 그래프에서 강연결 성분은 모두 몇 개인가?
    images:
      - path: images/subjects/algorithms/past-exams/2017/page-3.png
        alt: 2017년 알고리즘 기출 25번 방향 그래프
    choices:
      - { id: '1', text: '1' }
      - { id: '2', text: '2' }
      - { id: '3', text: '3' }
      - { id: '4', text: '4' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 모든 정점이 서로 도달 가능한 것은 아니다.
      선택지 2 (오답): 정점 4와 6을 별도로 보아야 한다.
      선택지 3 (정답): {1,2,3,5}, {4}, {6}의 세 강연결 성분으로 나뉜다.
      선택지 4 (오답): 1,2,3,5는 하나의 강연결 성분이다.

      핵심 개념:
      강연결 성분은 방향 그래프에서 서로 왕복 도달 가능한 정점들의 최대 집합이다.
      단방향으로만 도달 가능한 정점은 같은 성분이 아니다.
      사이클로 묶인 정점들은 같은 강연결 성분이 될 수 있다.
      고립되거나 되돌아가는 경로가 없는 정점은 독립 성분이 된다.
    tags: [graph, strongly-connected-component]

