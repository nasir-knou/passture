      핵심 개념:
      이 문항은 origin/정답.txt의 2017년 algorithms 정답표와 대조해 보정했다.
      선택지는 원본 기출 문제의 번호와 동일하게 대응된다.
      다중정답 표기는 문서화된 A~K 대조표에 따라 복수 선택지로 변환한다.
      세부 개념 해설은 원문 전사 고도화 단계에서 보강할 수 있다.
    tags: [sorting, bubble-sort]

  - id: e17-09
    type: multiple-choice
    prompt: 1, 2, 4, 8, 16, ... / 1, 4, 13, 40, 121, ... / 1, 3, 7, 21, 48, ... 같은 순열을 기반으로 정렬을 수행하는 알고리즘은?
    choices:
      - { id: '1', text: '히프 정렬' }
      - { id: '2', text: '계수 정렬' }
      - { id: '3', text: '삽입 정렬' }
      - { id: '4', text: '셸 정렬' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 히프 정렬은 히프 자료구조를 이용한다.
      선택지 2 (오답): 계수 정렬은 키의 빈도를 세는 비비교 정렬이다.
      선택지 3 (오답): 삽입 정렬은 간격 수열을 사용하지 않는다.
      선택지 4 (정답): 셸 정렬은 간격 수열을 사용해 부분 삽입 정렬을 수행한다.

      핵심 개념:
      셸 정렬은 삽입 정렬을 일반화한 알고리즘이다.
      큰 간격으로 먼저 정렬하고 간격을 줄여 나간다.
      간격 수열 선택은 성능에 영향을 준다.
      마지막 간격은 1이 되어 일반 삽입 정렬처럼 마무리된다.
    tags: [sorting, shell-sort]

  - id: e17-10
    type: multiple-choice
    prompt: 입력 배열을 동일한 크기의 두 부분배열로 나눈 뒤 각 부분 배열을 순환적으로 정렬하고 정렬된 부분 배열을 합치는 방식의 정렬 알고리즘은?
    choices:
      - { id: '1', text: '합병 정렬' }
      - { id: '2', text: '히프 정렬' }
      - { id: '3', text: '퀵 정렬' }
      - { id: '4', text: '셸 정렬' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 합병 정렬은 반으로 나누어 정렬한 뒤 병합한다.
      선택지 2 (오답): 히프 정렬은 히프 구성과 최댓값 삭제를 반복한다.
      선택지 3 (오답): 퀵 정렬은 피벗 기준으로 분할한다.
      선택지 4 (오답): 셸 정렬은 간격 수열을 이용한다.

      핵심 개념:
      합병 정렬은 대표적인 분할정복 정렬이다.
      분할, 정복, 결합 단계로 이루어진다.
      정렬된 두 부분 배열을 병합하는 과정이 핵심이다.
      시간 복잡도는 일반적으로 O(nlogn)이다.
    tags: [sorting, merge-sort, divide-and-conquer]

  - id: e17-11
    type: multiple-choice
    prompt: 퀵 정렬과 동일한 알고리즘 설계 기법이 적용된 것은?
    choices:
      - { id: '1', text: '합병 정렬' }
      - { id: '2', text: '히프 정렬' }
      - { id: '3', text: '계수 정렬' }
      - { id: '4', text: '버블 정렬' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 합병 정렬과 퀵 정렬은 모두 분할정복 기법을 사용한다.
      선택지 2 (오답): 히프 정렬은 히프 자료구조를 이용한다.
      선택지 3 (오답): 계수 정렬은 키의 빈도 배열을 이용한다.
      선택지 4 (오답): 버블 정렬은 인접 교환 기반의 단순 정렬이다.

      핵심 개념:
      분할정복은 문제를 작은 부분 문제로 나누어 해결한다.
      퀵 정렬은 피벗을 기준으로 분할한다.
      합병 정렬은 반으로 나누어 정렬한 뒤 병합한다.
      설계 기법이 같아도 세부 처리 방식은 다를 수 있다.
    tags: [sorting, quick-sort, divide-and-conquer]

  - id: e17-12
    type: multiple-choice
    prompt: 데이터 15, 1, 7, 11, 22에 대해 퀵 정렬의 분할 함수를 적용했을 때 피벗의 자리에 위치하는 데이터는? (오름차순, 맨 왼쪽 데이터를 피벗으로 사용)
    choices:
      - { id: '1', text: '1' }
      - { id: '2', text: '7' }
      - { id: '3', text: '11' }
      - { id: '4', text: '22' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 1은 피벗 15보다 작지만 최종 피벗 위치의 값이 아니다.
      선택지 2 (오답): 7도 왼쪽 부분에 남는 값이다.
      선택지 3 (정답): 분할 과정에서 오른쪽에서 찾은 11이 처음 피벗 위치로 이동한다.
      선택지 4 (오답): 22는 피벗보다 커서 오른쪽 부분에 남는다.

      핵심 개념:
      퀵 정렬의 분할은 피벗보다 작은 값과 큰 값을 양쪽으로 나눈다.
      맨 왼쪽 피벗 방식에서는 오른쪽에서 작은 값을 찾아 왼쪽 빈칸으로 이동시킨다.
      피벗은 최종적으로 두 부분의 경계 위치에 놓인다.
      분할 방식의 세부 구현에 따라 중간 이동 값과 최종 피벗 위치를 구분해야 한다.
    tags: [sorting, quick-sort, partition]

  - id: e17-13
    type: multiple-choice
    prompt: 퀵 정렬에서 최악의 성능을 나타내는 피벗은?
    choices:
      - { id: '1', text: '부분 배열에서 임의의 값이 피벗이 되는 경우' }
      - { id: '2', text: '부분 배열의 최댓값이 항상 피벗이 되는 경우' }
      - { id: '3', text: '부분 배열에서 중간 크기의 값이 항상 피벗이 되는 경우' }
      - { id: '4', text: '부분 배열에서 최솟값과 최댓값을 제외한 값이 항상 피벗이 되는 경우' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 임의 피벗은 평균적으로 최악을 피하려는 전략이다.
      선택지 2 (정답): 최댓값이나 최솟값이 계속 피벗이면 한쪽 부분 배열이 비어 불균형 분할이 반복된다.
      선택지 3 (오답): 중간값 피벗은 균형 분할을 만들어 성능이 좋다.
      선택지 4 (오답): 극단값이 아닌 피벗은 최악 조건을 완화할 수 있다.

      핵심 개념:
