      - { id: '2', text: '(b)' }
      - { id: '3', text: '(c)' }
      - { id: '4', text: '(d)' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): (a)는 1에서 3을 거쳐 2로 가는 최단 거리 1이다.
      선택지 2 (오답): (b)는 1에서 3으로 가는 최단 거리 2다.
      선택지 3 (오답): (c)는 4에서 2로 가는 최단 거리 4다.
      선택지 4 (오답): (d)는 4에서 3으로 가는 최단 거리 5다.

      핵심 개념:
      플로이드 알고리즘은 중간 정점을 하나씩 허용하며 최단 거리 행렬을 갱신한다.
      D(k)[i][j]는 1..k 정점을 경유할 수 있을 때의 최단 거리다.
      음수 간선이 있어도 음수 사이클이 없으면 적용 가능하다.
      모든 쌍 최단 경로를 한 번에 구할 수 있다.
    tags: [graph, floyd-warshall, dynamic-programming]

  - id: e17-29
    type: multiple-choice
    prompt: 스트링 매칭 알고리즘이 아닌 것은?
    choices:
