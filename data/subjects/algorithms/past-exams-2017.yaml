    answers: ['1']
    explanation: |
      선택지 1 (정답): 프림 알고리즘은 최소 신장 트리 알고리즘이다.
      선택지 2 (오답): 라빈-카프는 해싱을 이용한 문자열 검색 알고리즘이다.
      선택지 3 (오답): KMP는 접두사 정보를 이용한 문자열 매칭 알고리즘이다.
      선택지 4 (오답): 보이어-무어는 패턴을 오른쪽에서 비교하는 문자열 매칭 알고리즘이다.

      핵심 개념:
      문자열 매칭은 텍스트 안에서 패턴의 위치를 찾는 문제다.
      KMP, 라빈-카프, 보이어-무어는 대표적인 문자열 매칭 알고리즘이다.
      프림 알고리즘은 그래프의 최소 신장 트리를 찾는다.
      알고리즘 이름과 적용 분야를 함께 구분해야 한다.
    tags: [string-matching, graph]

  - id: e17-30
    type: multiple-choice
    prompt: 문자열 "abracadabra"를 허프만 코딩으로 압축하였을 때 인코딩된 메시지의 길이는 몇 비트인가?
    choices:
      - { id: '1', text: '11' }
      - { id: '2', text: '17' }
      - { id: '3', text: '23' }
      - { id: '4', text: '29' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 원 문자 수일 뿐 압축 비트 길이가 아니다.
      선택지 2 (오답): 각 문자의 허프만 코드 길이를 빈도와 곱한 합보다 작다.
      선택지 3 (정답): a는 5회, b와 r은 각 2회, c와 d는 각 1회이며 허프만 코드 길이 합은 23비트가 된다.
      선택지 4 (오답): 가능한 허프만 최적 길이보다 크다.

      핵심 개념:
      허프만 코딩은 빈도가 높은 문자에 짧은 코드를 배정한다.
      전체 길이는 각 문자의 빈도와 코드 길이를 곱해 더한다.
      가장 낮은 빈도의 노드부터 결합해 이진 트리를 만든다.
      접두어 코드라 디코딩이 모호하지 않다.
    tags: [huffman, greedy]

  - id: e17-31
    type: multiple-choice
    prompt: JPEG 표준의 단계별 처리 과정이 올바른 것은?
    choices:
      - { id: '1', text: '양자화 → 블록화 → DCT → 엔트로피 코딩' }
      - { id: '2', text: 'DCT → 블록화 → 양자화 → 엔트로피 코딩' }
      - { id: '3', text: '블록화 → 양자화 → DCT → 엔트로피 코딩' }
      - { id: '4', text: '블록화 → DCT → 양자화 → 엔트로피 코딩' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 블록화와 DCT보다 양자화가 먼저 올 수 없다.
      선택지 2 (오답): DCT는 블록 단위 데이터에 적용한다.
      선택지 3 (오답): 양자화는 DCT 계수에 적용된다.
      선택지 4 (정답): JPEG는 블록화, DCT, 양자화, 엔트로피 코딩 순서로 처리한다.

      핵심 개념:
      JPEG는 이미지를 작은 블록으로 나누어 처리한다.
      DCT는 공간 영역 값을 주파수 영역 계수로 변환한다.
      양자화는 정보 손실을 통해 압축률을 높이는 핵심 단계다.
      엔트로피 코딩은 남은 계수를 무손실 방식으로 부호화한다.
    tags: [compression, jpeg]

  - id: e17-32
    type: multiple-choice
    prompt: 문자열 X를 문자열 Y로 변환하는 데 필요한 전체 편집 연산의 최소 비용을 계산하는 문제를 가장 효과적으로 해결할 수 있는 알고리즘 설계 기법은?
    choices:
      - { id: '1', text: '분할정복 방법' }
      - { id: '2', text: '상각 분석 방법' }
      - { id: '3', text: '동적 프로그래밍 방법' }
      - { id: '4', text: '욕심쟁이 방법' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 단순 분할정복은 중복 부분 문제가 많아 비효율적이다.
      선택지 2 (오답): 상각 분석은 자료구조 연산의 평균 비용 분석 기법이다.
      선택지 3 (정답): 편집 거리 문제는 부분 문자열 간 최적 비용을 표로 저장하는 동적 프로그래밍이 적합하다.
      선택지 4 (오답): 매 순간 가장 싼 편집을 고르는 방식은 전체 최적을 보장하지 않는다.

      핵심 개념:
      편집 거리 문제는 삽입, 삭제, 치환 비용의 최소합을 구한다.
      부분 문자열의 최적 비용이 더 큰 문제의 해를 구성한다.
      같은 부분 문제가 반복되므로 DP 테이블이 효과적이다.
      대표적인 문자열 동적 프로그래밍 문제다.
    tags: [dynamic-programming, edit-distance]

  - id: e17-33
    type: multiple-choice
    prompt: 어떤 문제에 동적 프로그래밍 방법을 적용하여 해결하려고 할 때 원칙적으로 가장 먼저 거쳐야 할 단계는?
    choices:
      - { id: '1', text: '가장 작은 부분 문제의 해를 구해서 저장한다.' }
      - { id: '2', text: '최적성의 원리가 성립되는지를 확인한다.' }
      - { id: '3', text: '주어진 문제의 점화 관계식을 도출한다.' }
      - { id: '4', text: '테이블의 값을 이용하여 입력 크기가 큰 문제의 해를 구한다.' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 작은 부분 문제 저장은 적용 가능성을 확인한 뒤 수행한다.
      선택지 2 (정답): 동적 프로그래밍을 적용하려면 먼저 최적 부분 구조, 즉 최적성의 원리가 성립하는지 확인해야 한다.
      선택지 3 (오답): 점화식 도출은 적용 가능성을 확인한 뒤의 단계다.
      선택지 4 (오답): 큰 문제의 해 계산은 테이블을 채운 뒤 수행한다.

      핵심 개념:
      동적 프로그래밍은 최적 부분 구조와 중복 부분 문제를 이용한다.
      최적성의 원리가 성립해야 부분 문제의 최적해로 전체 최적해를 만들 수 있다.
      이후 점화식을 세우고 초기값부터 테이블을 채운다.
      마지막에 테이블 값을 이용해 전체 해를 얻는다.
    tags: [dynamic-programming]

  - id: e17-34
    type: multiple-choice
    prompt: 정규곱형으로 주어진 논리식의 리터럴들에 참 또는 거짓 값을 적절히 지정하여 전체 논리식의 값을 참으로 만들 수 있는지 판단하는 NP-완전 문제는?
    choices:
      - { id: '1', text: 'TSP 문제' }
      - { id: '2', text: '클리크 판정 문제' }
      - { id: '3', text: 'CNF 만족성 문제' }
      - { id: '4', text: '해밀토니언 사이클 문제' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): TSP는 순회 경로 비용과 관련된 문제다.
      선택지 2 (오답): 클리크 판정은 그래프의 완전 부분 그래프 존재 여부를 묻는다.
      선택지 3 (정답): CNF 만족성 문제는 정규곱형 논리식이 참이 되도록 변수 값을 배정할 수 있는지 판단한다.
      선택지 4 (오답): 해밀토니언 사이클은 모든 정점을 한 번씩 지나는 사이클 존재 문제다.

      핵심 개념:
      CNF는 절들의 곱 형태로 표현된 논리식이다.
      만족성 문제는 변수 진리값 배정으로 식을 참으로 만들 수 있는지 판단한다.
      SAT와 CNF-SAT는 NP-완전성 논의의 대표 문제다.
      NP-완전 문제들은 서로 다항 시간 환원이 가능하다.
    tags: [np-complete, satisfiability]

  - id: e17-35
    type: multiple-choice
    prompt: 유전 알고리즘을 다른 최적화 방법과 구별 짓는 대표적인 연산으로, 부모의 형질을 부분적으로 결합하여 하나의 새로운 특징을 만드는 것은?
    choices:
      - { id: '1', text: '교차' }
      - { id: '2', text: '분열' }
      - { id: '3', text: '선택' }
      - { id: '4', text: '변이' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 교차는 부모 해의 일부를 결합해 새로운 자식 해를 만드는 연산이다.
      선택지 2 (오답): 분열은 유전 알고리즘의 대표 연산으로 쓰이지 않는다.
      선택지 3 (오답): 선택은 적합도가 높은 개체를 다음 세대에 남기는 과정이다.
      선택지 4 (오답): 변이는 해의 일부를 무작위로 바꾸는 연산이다.

      핵심 개념:
      유전 알고리즘은 진화 과정을 모방한 최적화 방법이다.
      선택, 교차, 변이가 대표 연산이다.
      교차는 부모의 정보를 재조합해 새로운 후보해를 만든다.
      변이는 다양성을 유지하고 지역 최적에 빠지는 것을 줄인다.
