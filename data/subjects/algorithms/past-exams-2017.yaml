      핵심 개념:
      최소 신장 트리는 모든 정점을 사이클 없이 최소 비용으로 연결한다.
      크루스칼 알고리즘은 가중치가 작은 간선부터 선택한다.
      사이클을 만드는 간선은 제외한다.
      이 그래프에서는 작은 간선들이 먼저 선택되어 (a,b)가 제외된다.
    tags: [graph, minimum-spanning-tree]

  - id: e17-28
    type: multiple-choice
    prompt: 플로이드 알고리즘을 적용한 최종 상태 D(4)의 (a)~(d)값 중 가장 작은 값을 갖는 것은?
    images:
      - path: images/subjects/algorithms/past-exams/2017/page-3.png
