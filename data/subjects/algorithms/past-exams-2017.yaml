      선택지 1 (오답): 데이크스트라 알고리즘은 욕심쟁이 방법을 사용한다.
      선택지 2 (오답): 크루스칼 알고리즘은 간선을 욕심쟁이 방식으로 선택한다.
      선택지 3 (오답): 프림 알고리즘도 최소 간선을 확장하는 욕심쟁이 방법이다.
      선택지 4 (정답): 플로이드 알고리즘은 동적 프로그래밍을 사용한다.

