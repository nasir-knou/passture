questions:
  - id: e18-01
    type: multiple-choice
    prompt: '다음 중 교재 및 강의에서 다루어지지 않은 부류의 알고리즘은?'
    choices:
      - { id: '1', text: '기하 알고리즘' }
      - { id: '2', text: '정렬 알고리즘' }
      - { id: '3', text: '유전 알고리즘' }
      - { id: '4', text: '욕심쟁이 알고리즘' }
    answers: ['1']
    explanation: |
      선택지 1: 기하 알고리즘: 알고리즘 분류의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.
      선택지 2: 정렬 알고리즘: 알고리즘 분류의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 3: 유전 알고리즘: 알고리즘 분류의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 4: 욕심쟁이 알고리즘: 알고리즘 분류의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.

      핵심 개념:
      알고리즘은 문제 영역이나 설계 기법에 따라 정렬, 탐색, 그래프, 욕심쟁이, 동적 프로그래밍 등으로 분류된다.
      분류형 문항은 교재에서 실제로 다룬 대표 부류인지 먼저 확인한다.
    tags: [algorithm-category]

  - id: e18-02
    type: multiple-choice
    prompt: '주어진 문제를 컴퓨터로 해결하려고 한다. 이를 위한 명령어들이 만족해야 할 조건과 거리가 먼 것은?'
    choices:
      - { id: '1', text: '모든 명령은 컴퓨터에서 수행 가능해야 한다.' }
      - { id: '2', text: '각 명령은 단순하고 명확해야 한다.' }
      - { id: '3', text: '한정된 수의 단계를 거친 후에는 반드시 종료해야 한다.' }
      - { id: '4', text: '외부 입력이 반드시 존재해서 하나 이상의 출력을 생성해야 한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 모든 명령은 컴퓨터에서 수행 가능해야 한다: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 2: 각 명령은 단순하고 명확해야 한다: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 3: 한정된 수의 단계를 거친 후에는 반드시 종료해야 한다: 알고리즘의 정의의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 4: 외부 입력이 반드시 존재해서 하나 이상의 출력을 생성해야 한다: 알고리즘의 정의의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.

      핵심 개념:
      알고리즘은 명확한 명령, 수행 가능성, 유한한 종료, 입력과 출력 조건을 갖춘 문제 해결 절차다.
      효율성은 좋은 알고리즘을 비교하는 평가 기준이지만 알고리즘 성립 자체의 필수 조건과는 구분한다.
    tags: [algorithm-definition]

  - id: e18-03
    type: multiple-choice
    prompt: '최대 개수의 노드를 갖는 높이 4인 이진 트리에서 단말 노드의 개수는?'
    choices:
      - { id: '1', text: '7' }
      - { id: '2', text: '8' }
      - { id: '3', text: '15' }
      - { id: '4', text: '16' }
    answers: ['2']
    explanation: |
      선택지 1: 7: 이진 트리 절차를 적용한 계산 결과와 다르므로 정답이 아니다.
      선택지 2: 8: 이진 트리 절차를 적용한 결과와 일치하므로 정답이다.
      선택지 3: 15: 이진 트리 절차를 적용한 계산 결과와 다르므로 정답이 아니다.
      선택지 4: 16: 이진 트리 절차를 적용한 계산 결과와 다르므로 정답이 아니다.

      핵심 개념:
      포화 이진 트리에서는 모든 내부 노드가 두 자식을 가지며 마지막 레벨이 모두 채워진다.
      높이 정의가 레벨 수인지 간선 수인지에 따라 노드 수 계산이 달라질 수 있다.
      계산형 문항은 최종 정답만 보지 말고 피벗, 테이블, 방문 순서, 교환 횟수처럼 중간 상태를 기준으로 검산한다.
    tags: [binary-tree]

  - id: e18-04
    type: multiple-choice
    prompt: '알고리즘의 시간 복잡도는 무엇의 함수로 표현하는가?'
    choices:
      - { id: '1', text: '입력 데이터의 값' }
      - { id: '2', text: '프로그램에 사용된 동적 변수의 개수' }
      - { id: '3', text: '프로그램 코드의 길이' }
      - { id: '4', text: '입력 데이터의 크기' }
    answers: ['4']
    explanation: |
      선택지 1: 입력 데이터의 값: 복잡도 분석의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 2: 프로그램에 사용된 동적 변수의 개수: 복잡도 분석의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 3: 프로그램 코드의 길이: 복잡도 분석의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 4: 입력 데이터의 크기: 복잡도 분석의 정의와 적용 조건에 맞으므로 정답이다.

      핵심 개념:
      시간 복잡도는 보통 입력 크기 n에 대한 기본 연산 횟수의 증가율로 표현한다.
      데이터의 실제 값, 코드 길이, 변수 개수는 일반적인 시간 복잡도의 기준 변수가 아니다.
    tags: [complexity]

  - id: e18-05
    type: multiple-choice
    prompt: '다음 O-표기 중에서 가장 효율적인 성능을 나타내는 것은?'
    choices:
      - { id: '1', text: 'O(logn)' }
      - { id: '2', text: 'O(nlogn)' }
      - { id: '3', text: 'O(n^2)' }
      - { id: '4', text: 'O(2^n)' }
    answers: ['1']
    explanation: |
      선택지 1: O(logn): 점근 성능의 정의와 적용 조건에 맞으므로 정답이다.
      선택지 2: O(nlogn): 점근 성능의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 3: O(n^2): 점근 성능의 정의나 적용 조건과 다르므로 정답이 아니다.
      선택지 4: O(2^n): 점근 성능의 정의나 적용 조건과 다르므로 정답이 아니다.

      핵심 개념:
      Big-O 표기에서는 입력 크기 n이 커질 때 지배적인 최고차항만 남긴다.
      상수 계수와 낮은 차수 항은 점근적 상한을 정할 때 제거한다.
    tags: [big-o]

  - id: e18-06
    type: multiple-choice
    prompt: '분할정복에 대한 설명으로 거리가 먼 것은?'
    choices:
