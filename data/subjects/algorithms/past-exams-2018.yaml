      - { id: '2', text: '하향식 접근 방법을 사용한다.' }
      - { id: '3', text: '분할, 정복, 결합의 처리 과정을 거친다.' }
      - { id: '4', text: '점화식을 이용해서 보다 큰 문제의 해를 구한다.' }
    answers: ['4']
    explanation: |
      선택지 1: 분할된 작은 문제는 서로 독립적이다: 분할정복의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 2: 하향식 접근 방법을 사용한다: 분할정복의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 3: 분할, 정복, 결합의 처리 과정을 거친다: 분할정복의 일반적인 성질 또는 올바른 설명에 해당하므로 문항이 찾는 예외가 아니다.
      선택지 4: 점화식을 이용해서 보다 큰 문제의 해를 구한다: 분할정복의 필수 성질이나 올바른 설명에서 벗어나므로 문항이 찾는 선택지다.

      핵심 개념:
      분할정복은 문제를 독립적인 작은 문제로 나누고, 각 소문제를 해결한 뒤 결과를 결합한다.
      대표 단계는 분할, 정복, 결합이며 정렬 자체는 모든 순환 호출의 공통 단계가 아니다.
    tags: [divide-and-conquer]

  - id: e18-07
    type: multiple-choice
    prompt: '데이터 30, 45, 20, 15, 40, 25, 35, 10에 대해 퀵 정렬의 분할 함수 Partition()을 한 번 적용한 후 왼쪽 부분배열의 첫 번째 원소는? (피벗은 맨 왼쪽 원소, 오름차순)'
    choices:
      - { id: '1', text: '10' }
      - { id: '2', text: '15' }
      - { id: '3', text: '20' }
      - { id: '4', text: '25' }
    answers: ['4']
    explanation: |
      선택지 1: 10: 퀵 정렬 절차를 적용한 계산 결과와 다르므로 정답이 아니다.
      선택지 2: 15: 퀵 정렬 절차를 적용한 계산 결과와 다르므로 정답이 아니다.
      선택지 3: 20: 퀵 정렬 절차를 적용한 계산 결과와 다르므로 정답이 아니다.
      선택지 4: 25: 퀵 정렬 절차를 적용한 결과와 일치하므로 정답이다.

      핵심 개념:
      퀵 정렬은 피벗을 기준으로 작은 값과 큰 값을 나누고 각 부분배열을 재귀적으로 정렬한다.
      균등 분할이면 평균적으로 O(n log n), 한쪽으로 치우치면 최악 O(n^2)이 된다.
