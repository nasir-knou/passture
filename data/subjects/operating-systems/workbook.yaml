      선택지 1 (오답): NUMA는 각 프로세서가 로컬 메모리를 가지며 접근 위치에 따라 메모리 접근 시간이 달라지는 구조이다.
      선택지 2 (오답): 분산 공유 메모리는 여러 프로세스가 데이터를 공유하기 쉽게 하는 추상화를 제공한다.
      선택지 3 (정답): 메시지 전달 방식은 복잡한 데이터를 문자열 등 전송 가능한 형태로 변환하고 다시 복원해야 하므로, 이 과정이 필요 없는 분산 공유 메모리가 유리할 수 있다.
      선택지 4 (오답): WAN은 여러 LAN을 넓은 지역에서 연결하는 네트워크로 볼 수 있다.

      핵심 개념:
      NUMA는 메모리 위치에 따라 접근 비용이 달라지는 다중프로세서 구조이다.
      분산 공유 메모리는 원격 데이터 공유를 메모리 접근처럼 추상화한다.
      메시지 전달은 직렬화와 역직렬화가 필요할 수 있다.
      WAN은 지리적으로 떨어진 네트워크들을 연결하는 광역 네트워크이다.
    tags: [chapter:13, distributed-system, distributed-shared-memory]

  - id: b14-01
    type: multiple-choice
    prompt: 운영체제 보안이 달성하려는 목표가 아닌 것은?
    choices:
      - { id: '1', text: '기밀성' }
      - { id: '2', text: '가용성' }
      - { id: '3', text: '무결성' }
      - { id: '4', text: '경제성' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 기밀성은 허가되지 않은 정보 접근을 막는 보안 목표이다.
      선택지 2 (오답): 가용성은 필요한 사용자가 서비스를 사용할 수 있게 하는 보안 목표이다.
      선택지 3 (오답): 무결성은 정보가 허가 없이 변경되지 않도록 하는 보안 목표이다.
      선택지 4 (정답): 경제성은 운영체제 보안의 핵심 목표인 기밀성, 가용성, 무결성에 포함되지 않는다.

      핵심 개념:
      운영체제 보안의 대표 목표는 기밀성, 무결성, 가용성이다.
      기밀성은 정보 노출을 막는 성질이다.
      무결성은 정보와 시스템 상태의 허가되지 않은 변경을 막는다.
      가용성은 정당한 사용자가 자원과 서비스를 사용할 수 있게 보장한다.
    tags: [chapter:14, security]

