subjectId: operating-systems
sourceId: workbook
title: 운영체제 워크북
kind: workbook

questions:
  - id: b04-01
    type: multiple-choice
    prompt: 병행 프로세스에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '하나의 프로세스가 끝나야 다른 프로세스가 시작한다.' }
      - { id: '2', text: '하나의 프로세스는 다른 프로세스와 상호작용을 할 수 없다.' }
      - { id: '3', text: '하나의 CPU에서는 하나의 프로세스만 동작할 수 있다.' }
      - { id: '4', text: '프로세스들 사이에 공유자원을 점유하기 위한 경쟁이 발생할 수 있다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 병행 프로세스는 동시에 실행되는 프로세스를 의미한다.
      선택지 2 (오답): 병행 프로세스는 서로 상호작용할 수 있다.
      선택지 3 (오답): 하나의 CPU에서도 인터리빙 방식으로 여러 프로세스가 병행 실행될 수 있다.
      선택지 4 (정답): 병행 프로세스는 공유자원을 두고 경쟁할 수 있다.

      핵심 개념:
      병행 프로세스는 시간적으로 겹쳐 실행되는 프로세스이다.
      단일 CPU에서도 문맥 교환을 통해 병행성이 제공된다.
      공유 자원을 함께 사용하면 경쟁 상태가 발생할 수 있다.
      운영체제는 상호배제와 동기화로 이러한 문제를 제어한다.
    tags: [chapter:04, concurrency]

  - id: b04-02
    type: multiple-choice
    prompt: 병행 프로세스가 독립 프로세스인 경우에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '수행 중인 다른 프로세스와 영향을 주고받으며 동작한다.' }
      - { id: '2', text: '프로세스의 데이터와 상태를 다른 프로세스와 공유한다.' }
      - { id: '3', text: '타 프로세스와 무관하게 중단되거나 재시작될 수 있다.' }
      - { id: '4', text: '프로세스의 실행이 비결정적이고 재생 불가능하다.' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 다른 프로세스와 영향을 주고받는 것은 협력 프로세스의 특성이다.
      선택지 2 (오답): 데이터와 상태를 공유하는 것도 협력 프로세스의 특성이다.
      선택지 3 (정답): 독립 프로세스는 다른 프로세스와 무관하게 중단되거나 재시작될 수 있다.
      선택지 4 (오답): 비결정성과 재생 불가능성은 공유와 상호작용이 있는 경우 문제가 된다.

      핵심 개념:
      독립 프로세스는 다른 프로세스의 실행에 영향을 주거나 받지 않는다.
      협력 프로세스는 데이터나 상태를 공유하며 상호작용한다.
      병행 실행에서 프로세스 간 관계를 구분하는 것은 동기화 설계의 출발점이다.
      독립 프로세스는 상대적으로 제어가 단순하다.
    tags: [chapter:04, process]

  - id: b04-03
    type: multiple-choice
    prompt: 2개 이상의 프로세스가 동시에 임계영역을 수행하지 못하도록 하는 것은?
    choices:
      - { id: '1', text: '상호배제' }
      - { id: '2', text: '쓰래싱' }
      - { id: '3', text: '인터럽트' }
      - { id: '4', text: '상위단계 스케줄링' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 상호배제는 여러 프로세스가 동시에 임계영역을 수행하지 못하게 한다.
      선택지 2 (오답): 쓰래싱은 과도한 페이지 교체로 성능이 저하되는 현상이다.
      선택지 3 (오답): 인터럽트는 CPU 실행 흐름을 중단시키는 사건이다.
      선택지 4 (오답): 상위단계 스케줄링은 시스템에 들어올 작업을 결정하는 스케줄링이다.

      핵심 개념:
      임계영역은 공유 자원을 접근하는 코드 영역이다.
      상호배제는 한 번에 하나의 프로세스만 임계영역에 들어가도록 보장한다.
      상호배제가 없으면 경쟁 상태가 발생할 수 있다.
      세마포어와 모니터는 상호배제 구현에 사용된다.
    tags: [chapter:04, mutual-exclusion, critical-section]

  - id: b04-04
    type: multiple-choice
    prompt: 프로세스 A가 어떤 작업을 처리한 후에 프로세스 B가 이어서 다른 작업을 처리할 수 있도록 프로세스의 처리순서를 결정하는 것은?
    choices:
      - { id: '1', text: '상호배제' }
      - { id: '2', text: '쓰래싱' }
      - { id: '3', text: '인터럽트' }
      - { id: '4', text: '동기화' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 상호배제는 같은 임계영역에 동시에 들어가지 못하게 하는 제어이다.
      선택지 2 (오답): 쓰래싱은 메모리 관리에서 발생하는 성능 저하 현상이다.
      선택지 3 (오답): 인터럽트는 처리 순서를 의도적으로 맞추는 동기화 기법이 아니다.
      선택지 4 (정답): 동기화는 둘 이상의 프로세스에 대한 처리 순서를 결정한다.

      핵심 개념:
      동기화는 여러 프로세스의 실행 순서를 조정하는 것이다.
      상호배제도 넓게는 동기화 문제에 포함될 수 있다.
      처리 순서 제약이 있을 때는 적절한 신호와 대기 조건이 필요하다.
      세마포어의 P/V 연산은 동기화에 활용된다.
    tags: [chapter:04, synchronization]

  - id: b04-05
    type: multiple-choice
    prompt: 세마포어에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '정수형 공유변수' }
      - { id: '2', text: '초기화가 필요 없다.' }
      - { id: '3', text: '두 기본연산 P와 V에 의해서만 사용 가능하다.' }
      - { id: '4', text: '연산 P와 연산 V는 인터럽트되지 않고 하나의 단위로 처리된다.' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 세마포어는 정수형 공유변수로 볼 수 있다.
      선택지 2 (정답): 세마포어는 상황에 맞게 0 이상의 정수로 초기화해야 한다.
      선택지 3 (오답): 세마포어는 기본적으로 P와 V 연산으로 조작된다.
      선택지 4 (오답): P와 V 연산은 원자적으로 수행되어야 한다.

      핵심 개념:
      세마포어는 동기화와 상호배제를 위한 정수형 동기화 도구이다.
      초기값은 사용 목적에 맞게 설정해야 한다.
      P 연산은 검사 또는 감소를 수행한다.
      V 연산은 증가 또는 대기 프로세스 깨우기를 수행한다.
    tags: [chapter:04, semaphore]

  - id: b04-06
    type: multiple-choice
    prompt: 세마포어의 두 연산 P와 V에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: 'P: 감소, V: 감소' }
      - { id: '2', text: 'P: 감소, V: 증가' }
      - { id: '3', text: 'P: 증가, V: 감소' }
      - { id: '4', text: 'P: 증가, V: 증가' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): V는 감소가 아니라 증가 연산이다.
      선택지 2 (정답): P는 검사 또는 감소, V는 증가를 나타낸다.
      선택지 3 (오답): P와 V의 의미가 반대로 되어 있다.
      선택지 4 (오답): P는 증가가 아니다.

      핵심 개념:
      P 연산은 자원을 사용하기 전에 세마포어 값을 감소시킨다.
      V 연산은 자원 사용 후 세마포어 값을 증가시킨다.
      P/V 연산은 원자적으로 수행되어야 한다.
      세마포어 값과 대기 큐를 통해 프로세스 실행 순서를 조정한다.
    tags: [chapter:04, semaphore]

  - id: b04-07
    type: multiple-choice
    prompt: 다음은 세마포어 s에 대한 연산 P(s)와 V(s)의 정의이다. 빈칸에 넣을 적절한 내용은?
    choices:
      - { id: '1', text: '(가) s--, (나) s--' }
      - { id: '2', text: '(가) s++, (나) s--' }
      - { id: '3', text: '(가) s++, (나) s++' }
      - { id: '4', text: '(가) s--, (나) s++' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): V 연산은 감소가 아니라 증가이다.
      선택지 2 (오답): P는 감소, V는 증가가 되어야 한다.
      선택지 3 (오답): P가 증가로 되어 있어 잘못되었다.
      선택지 4 (정답): P는 s를 감소시키고 V는 s를 증가시킨다.

      핵심 개념:
      P(s)는 자원을 획득하거나 대기하기 위한 연산이다.
      V(s)는 자원을 반납하거나 대기 프로세스를 깨우는 연산이다.
      세마포어 구현에서 P/V의 원자성은 중요하다.
      잘못된 증감 방향은 동기화 의미를 반대로 만든다.
    tags: [chapter:04, semaphore]

  - id: b04-08
    type: multiple-choice
    prompt: S1 부분을 의미하는 것은?
    choices:
      - { id: '1', text: '임계영역' }
      - { id: '2', text: '매크로' }
      - { id: '3', text: '세그먼트' }
      - { id: '4', text: '부프로그램' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): S1은 동시에 접근하면 안 되는 임계영역을 나타낸다.
      선택지 2 (오답): 매크로는 코드 치환과 관련된 개념이다.
      선택지 3 (오답): 세그먼트는 메모리 관리 단위와 관련된다.
      선택지 4 (오답): 부프로그램은 호출 가능한 코드 단위이다.

      핵심 개념:
      임계영역은 공유 자원을 접근하는 코드 부분이다.
      동시에 여러 프로세스가 임계영역에 들어가면 경쟁 상태가 생길 수 있다.
      세마포어는 임계영역 진입 전후에 P/V 연산을 두어 접근을 제어한다.
      임계영역 보호는 병행 프로세스 제어의 핵심이다.
    tags: [chapter:04, critical-section]

  - id: b04-09
    type: multiple-choice
    prompt: (가)와 (나)에 알맞은 세마포어 연산은?
    choices:
      - { id: '1', text: '(가) P, (나) P' }
      - { id: '2', text: '(가) V, (나) P' }
      - { id: '3', text: '(가) P, (나) V' }
      - { id: '4', text: '(가) V, (나) V' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 임계영역을 빠져나올 때도 P를 수행하면 자원이 반환되지 않는다.
      선택지 2 (오답): 진입 전에는 P 연산으로 세마포어를 획득해야 한다.
      선택지 3 (정답): 임계영역 진입 전 P, 해제 후 V를 둔다.
      선택지 4 (오답): 진입 전 V를 수행하면 상호배제를 보장할 수 없다.

      핵심 개념:
      임계영역 진입 전에는 P 연산으로 허가를 얻는다.
      임계영역을 빠져나온 뒤에는 V 연산으로 자원을 반환한다.
      P/V 위치가 바뀌면 상호배제 의미가 깨진다.
      세마포어 초기값 1은 한 번에 하나의 프로세스만 진입하게 한다.
    tags: [chapter:04, semaphore, critical-section]

  - id: b04-10
    type: multiple-choice
    prompt: 프로세스 A가 코드 S1을 수행한 후에 프로세스 B가 코드 S2를 수행하도록 동기화를 할 때, 연산 P와 연산 V의 위치로 올바른 것은?
    choices:
      - { id: '1', text: '연산 P: (가), 연산 V: (라)' }
      - { id: '2', text: '연산 P: (나), 연산 V: (다)' }
      - { id: '3', text: '연산 P: (다), 연산 V: (나)' }
      - { id: '4', text: '연산 P: (라), 연산 V: (가)' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): A가 S1을 수행하기 전에 P를 두면 B 수행 시작 조건을 보장하지 못한다.
      선택지 2 (오답): V가 B의 S2 이후에 있어 순서 제어가 되지 않는다.
      선택지 3 (정답): B의 S2 전에 P를 두고 A의 S1 이후에 V를 두면 A 완료 후 B가 진행된다.
      선택지 4 (오답): 위치가 반대로 되어 원하는 순서를 보장할 수 없다.

      핵심 개념:
      순서 동기화에서는 선행 작업 이후에 V를 두어 대기 중인 작업을 깨운다.
      후행 작업 앞에는 P를 두어 선행 작업 완료 전에는 대기하게 한다.
      초기 세마포어 값이 0이면 V가 수행되기 전 P에서 대기한다.
      세마포어는 상호배제뿐 아니라 실행 순서 제어에도 사용된다.
    tags: [chapter:04, semaphore, synchronization]

  - id: b05-01
    type: multiple-choice
    prompt: 생산자-소비자 문제에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '버퍼가 가득 차 있다면 생산자는 대기해야 하므로 동기화가 필요하다.' }
      - { id: '2', text: '버퍼가 비어 있다면 소비자는 대기해야 하므로 동기화가 필요하다.' }
      - { id: '3', text: '버퍼에 데이터를 채우면서 동시에 읽으면 안 되므로 상호배제가 필요하다.' }
      - { id: '4', text: '무한 버퍼 문제라고도 한다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 유한 버퍼가 가득 차면 생산자는 빈 공간이 생길 때까지 대기해야 한다.
      선택지 2 (오답): 버퍼가 비어 있으면 소비자는 데이터가 생길 때까지 대기해야 한다.
      선택지 3 (오답): 버퍼에 대한 동시 접근은 상호배제로 보호해야 한다.
      선택지 4 (정답): 생산자-소비자 문제는 유한 버퍼 문제라고도 한다.

      핵심 개념:
      생산자-소비자 문제는 공유 버퍼를 사이에 둔 대표적인 동기화 문제이다.
      버퍼가 가득 차면 생산자가 대기한다.
      버퍼가 비어 있으면 소비자가 대기한다.
      버퍼 조작 자체는 상호배제로 보호해야 한다.
    tags: [chapter:05, producer-consumer]

  - id: b05-02
    type: multiple-choice
    prompt: 크기 n인 버퍼를 사용하여 생산자-소비자 문제를 해결하는 코드에서 세마포어 mutex와 full의 초깃값으로 바른 것은?
    choices:
      - { id: '1', text: 'mutex=0, full=0' }
      - { id: '2', text: 'mutex=0, full=n' }
      - { id: '3', text: 'mutex=1, full=0' }
      - { id: '4', text: 'mutex=1, full=n' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): mutex가 0이면 처음부터 임계영역 진입이 막힌다.
      선택지 2 (오답): full은 버퍼에 찬 항목 수를 의미하므로 처음에는 0이어야 한다.
      선택지 3 (정답): 상호배제용 mutex는 1, 채워진 버퍼 수를 나타내는 full은 0으로 시작한다.
      선택지 4 (오답): full을 n으로 두면 처음부터 버퍼가 가득 찬 것으로 처리된다.

      핵심 개념:
      mutex는 버퍼 접근의 상호배제를 위해 사용된다.
      full은 채워진 버퍼 항목 수를 나타낸다.
      empty는 빈 버퍼 공간 수를 나타내며 보통 n으로 초기화한다.
      세마포어 초깃값은 동기화 조건의 의미를 반영해야 한다.
    tags: [chapter:05, semaphore, producer-consumer]

