      주소공간이 다르므로 포인터나 메모리 주소 전달에는 주의가 필요하다.
      일반적인 동기 RPC는 응답을 기다리는 동안 호출자가 대기한다.
      병렬 처리가 목적이면 비동기 호출이나 메시지 기반 설계를 고려할 수 있다.
