      - { id: '4', text: '웜' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 트랩도어는 정상 인증절차나 암호화를 피해 갈 수 있는 숨겨진 통로이다.
      선택지 2 (정답): 트로이 목마는 숨겨진 악성 기능이 있는 프로그램을 실행하게 해 사용자의 권한으로 침투한다.
      선택지 3 (오답): 비밀 채널은 정상적이지 않은 방법으로 정보를 알아내는 공격 경로이다.
      선택지 4 (오답): 웜은 자신을 복사해 다른 컴퓨터로 전파하는 악성 코드이다.

      핵심 개념:
      트로이 목마는 겉보기에는 정상 프로그램처럼 보이지만 숨은 악성 기능을 수행한다.
      사용자가 직접 실행하도록 유도해 사용자의 권한을 악용한다.
      권한 상승이나 정보 탈취에 사용될 수 있다.
      출처가 불분명한 프로그램 실행을 제한하는 것이 중요하다.
    tags: [chapter:14, security, trojan-horse]

  - id: b14-04
    type: multiple-choice
    prompt: 어떤 주체나 객체가 정말로 자신이 주장하는 그 주체나 객체인지 확인하는 과정은?
    choices:
