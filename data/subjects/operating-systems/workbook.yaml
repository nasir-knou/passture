      - { id: '3', text: '접근제어' }
      - { id: '4', text: '감사' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 인증은 주장한 신원이 실제로 맞는지 확인하는 과정이다.
      선택지 2 (오답): 식별은 어떤 주체나 객체가 무엇인지 신분을 알아내는 과정이다.
      선택지 3 (오답): 접근제어는 자원의 접근권한을 정하는 과정이다.
      선택지 4 (오답): 감사는 시스템 이벤트 정보를 기록하고 보존하는 과정이다.

      핵심 개념:
      식별은 사용자가 누구인지 밝히는 단계이다.
      인증은 주장된 신원을 검증하는 단계이다.
      접근제어는 인증된 주체가 어떤 자원을 사용할 수 있는지 결정한다.
      감사는 보안 사건 추적과 책임성 확보를 위해 기록을 남긴다.
    tags: [chapter:14, authentication]

  - id: b14-05
    type: multiple-choice
    prompt: 관리자 또는 자원 소유자가 주체에 자원의 접근권한을 부여하는 보안정책은?
    choices:
      - { id: '1', text: '임의적 접근제어' }
      - { id: '2', text: '강제적 접근제어' }
      - { id: '3', text: '역할 기반 접근제어' }
      - { id: '4', text: '최소권한' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 임의적 접근제어는 관리자나 자원 소유자가 주체에게 접근권한을 부여한다.
      선택지 2 (오답): 강제적 접근제어는 중앙에서 관리되는 보안정책을 사용자가 넘어설 수 없게 한다.
      선택지 3 (오답): 역할 기반 접근제어는 주체에게 역할을 부여하고 역할에 따라 권한을 사용하게 한다.
      선택지 4 (오답): 최소권한은 업무 수행에 필요한 최소 권한만 부여하는 원칙이다.

      핵심 개념:
      접근제어는 주체가 객체에 어떤 연산을 할 수 있는지 결정한다.
      임의적 접근제어는 소유자 중심으로 권한을 부여한다.
      강제적 접근제어는 시스템 정책과 보안 등급에 의해 권한이 정해진다.
      역할 기반 접근제어는 직무나 역할을 기준으로 권한을 관리한다.
    tags: [chapter:14, access-control, dac]

