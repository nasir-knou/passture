      선택지 4 (정답): 장치 드라이버는 응용 프로그램이나 운영체제의 입출력 요청을 장치가 처리할 수 있는 형태로 변환한다.

      핵심 개념:
      장치제어기는 하드웨어와 컴퓨터 시스템 사이의 제어를 담당한다.
      장치 드라이버는 특정 장치를 운영체제에서 사용할 수 있게 하는 소프트웨어이다.
      응용 프로그램은 장치별 세부 제어를 직접 알 필요 없이 드라이버를 통해 요청한다.
      입출력 계층은 하드웨어 차이를 추상화해 일관된 인터페이스를 제공한다.
    tags: [chapter:11, device-controller, device-driver]

  - id: b11-03
    type: multiple-choice
    prompt: 입출력 처리 유형에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '프로그램 방법은 폴링을 이용하여 CPU의 낭비가 심하다.' }
      - { id: '2', text: '인터럽트 방법은 인터럽트가 발생할 때까지 CPU는 다른 작업을 할 수 없다.' }
      - { id: '3', text: 'DMA 방법은 CPU의 낭비가 심하다.' }
      - { id: '4', text: '사이클 스틸링은 DMA 제어기보다 CPU에 우선권을 부여하여 충돌을 해결한다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 프로그램 방법은 장치 상태를 반복 확인하는 폴링을 사용해 CPU 낭비가 크다.
      선택지 2 (오답): 인터럽트 방법은 인터럽트가 발생할 때까지 CPU가 다른 작업을 수행할 수 있다.
      선택지 3 (오답): DMA는 CPU 개입을 줄이므로 CPU 낭비가 가장 적다.
      선택지 4 (오답): 사이클 스틸링은 CPU보다 DMA 제어기에 우선권을 주어 메모리 접근 충돌을 해결한다.

      핵심 개념:
      프로그램 입출력은 CPU가 장치를 계속 확인하므로 단순하지만 비효율적이다.
      인터럽트 입출력은 장치가 준비되었을 때 CPU에 알려준다.
      DMA는 대량 데이터 전송을 CPU 대신 DMA 제어기가 처리한다.
      사이클 스틸링은 DMA가 메모리 버스를 잠시 사용하도록 하는 방식이다.
    tags: [chapter:11, io, polling, dma]

  - id: b11-04
    type: multiple-choice
    prompt: 다음 중 입출력장치 등에서 어떠한 이벤트가 발생했음을 프로세서에 즉시 알리기 위한 용도로 사용하는 것은?
    choices:
      - { id: '1', text: '인터럽트' }
      - { id: '2', text: 'DMA' }
      - { id: '3', text: '채널' }
      - { id: '4', text: '기억장치 인터리빙' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 인터럽트는 장치가 자신의 상태나 이벤트 발생을 CPU에 알리는 기능이다.
      선택지 2 (오답): DMA는 CPU를 거치지 않고 메모리와 장치 사이에서 데이터를 전송하는 방식이다.
      선택지 3 (오답): 채널은 입출력 작업을 독립적으로 처리하는 전용 처리 장치이다.
      선택지 4 (오답): 기억장치 인터리빙은 메모리 접근 성능을 높이기 위한 구성 방식이다.

      핵심 개념:
      인터럽트는 비동기 이벤트를 CPU에 알리는 메커니즘이다.
      CPU는 현재 작업을 중단하고 인터럽트 처리 루틴을 실행한다.
      입출력 완료, 오류, 타이머 등 다양한 이벤트에 사용된다.
      인터럽트는 폴링보다 CPU 낭비를 줄일 수 있다.
    tags: [chapter:11, interrupt]

  - id: b11-05
    type: multiple-choice
    prompt: 인터럽트 처리에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '폴링이라고도 한다.' }
      - {
          id: '2',
          text: '프로그래머는 주기적으로 인터럽트 발생 여부를 검사하도록 프로그램을 작성해야 한다.',
        }
      - { id: '3', text: 'CPU를 거치지 않고 입출력장치와 메모리 사이에 데이터를 전송한다.' }
      - {
          id: '4',
          text: '인터럽트 처리 루틴은 현재 상태를 보관한 후 인터럽트 처리를 한 다음 보관된 원래 상태로 복귀한다.',
        }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 폴링은 프로그램 입출력 방식에서 장치 상태를 반복 확인하는 방법이다.
      선택지 2 (오답): 인터럽트 방식은 장치가 이벤트를 알려주므로 프로그래머가 계속 검사할 필요가 없다.
      선택지 3 (오답): CPU를 거치지 않는 데이터 전송은 DMA 방법에 대한 설명이다.
      선택지 4 (정답): 인터럽트 처리는 현재 상태를 저장하고 처리 루틴을 수행한 뒤 원래 실행 상태로 복귀한다.

      핵심 개념:
      인터럽트 처리 전에는 현재 프로세스의 실행 상태를 보존해야 한다.
      인터럽트 서비스 루틴은 발생한 이벤트에 맞는 처리를 수행한다.
      처리가 끝나면 저장된 문맥을 복원해 중단된 작업을 이어간다.
      이 구조 덕분에 CPU는 입출력 완료를 기다리며 낭비되지 않는다.
    tags: [chapter:11, interrupt, context-save]

  - id: b11-06
    type: multiple-choice
    prompt: '인터럽트 수행 절차 a~e는 다음과 같다. a: CPU는 현재 실행 중이던 명령만 마치고 즉시 인터럽트에 응답한다. b: CPU는 현재 상태를 보관하고 필요한 입출력 처리를 한 후 원래 프로세스 실행상태로 복귀한다. c: 입출력장치가 가용상태가 되었다고 인터럽트를 담당하는 인터럽트 제어기에 신호를 보낸다. d: 인터럽트 제어기는 CPU에 인터럽트 신호를 보낸다. e: 인터럽트 제어기는 이벤트 대상에 대한 정보를 CPU에 보낸다. 올바른 순서는?'
    choices:
      - { id: '1', text: 'd-e-c-a-b' }
      - { id: '2', text: 'c-d-a-e-b' }
      - { id: '3', text: 'c-d-e-a-b' }
      - { id: '4', text: 'c-e-d-a-b' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 입출력장치가 먼저 인터럽트 제어기에 신호를 보내야 한다.
      선택지 2 (정답): 장치가 제어기에 알리고, 제어기가 CPU에 인터럽트를 보낸 뒤, CPU가 응답하고 이벤트 정보를 받아 처리 후 복귀한다.
      선택지 3 (오답): CPU가 인터럽트에 응답하기 전에 이벤트 정보를 먼저 받는 순서가 아니다.
      선택지 4 (오답): 인터럽트 제어기의 CPU 신호와 이벤트 정보 전달 순서가 맞지 않다.

      핵심 개념:
      인터럽트는 장치에서 제어기, 제어기에서 CPU로 전달된다.
      CPU는 현재 명령 실행을 마친 뒤 인터럽트에 응답한다.
      인터럽트 원인과 대상 정보가 전달되어 적절한 처리 루틴이 실행된다.
      처리가 끝나면 저장된 상태를 복원해 원래 실행 흐름으로 돌아간다.
    tags: [chapter:11, interrupt]

  - id: b11-07
    type: multiple-choice
    prompt: CPU를 통하지 않고 메모리에 직접 접근하여 데이터를 전송하는 방법은?
    choices:
      - { id: '1', text: '기억장치 인터리빙' }
      - { id: '2', text: '버퍼링' }
      - { id: '3', text: 'DMA' }
      - { id: '4', text: '가상 기억장치' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 기억장치 인터리빙은 여러 메모리 모듈을 번갈아 접근해 성능을 높이는 방식이다.
      선택지 2 (오답): 버퍼링은 속도 차이를 완화하기 위해 임시 저장 공간을 사용하는 방식이다.
      선택지 3 (정답): DMA는 DMA 제어기를 이용해 CPU를 거치지 않고 메모리에 직접 접근하여 데이터를 전송한다.
      선택지 4 (오답): 가상 기억장치는 논리 주소 공간과 실제 메모리를 분리해 관리하는 기법이다.

      핵심 개념:
      DMA는 Direct Memory Access의 약자이다.
      대량 입출력 데이터 전송에서 CPU 개입을 줄인다.
      DMA 제어기가 메모리 주소와 전송량을 관리한다.
      CPU는 전송 시작과 완료 처리에 주로 관여한다.
    tags: [chapter:11, dma]

  - id: b11-08
    type: multiple-choice
    prompt: '프로세서의 데이터 처리속도와 데이터 전송속도의 차이로 인한 문제를 해결하는 방법으로, 단일, 이중, 순환 방식 등이 존재하는 용어는?'
    choices:
      - { id: '1', text: '사이클 스틸링' }
      - { id: '2', text: '버퍼링' }
      - { id: '3', text: '인터럽트' }
      - { id: '4', text: '인터리빙' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 사이클 스틸링은 DMA가 메모리 버스를 잠시 사용하는 방식이다.
      선택지 2 (정답): 버퍼링은 데이터 처리속도와 전송속도의 차이를 완화하기 위한 방법이며 단일, 이중, 순환 버퍼링 등이 있다.
      선택지 3 (오답): 인터럽트는 이벤트 발생을 CPU에 알리는 방식이다.
      선택지 4 (오답): 인터리빙은 메모리 모듈을 나누어 병렬성을 높이는 방식이다.

      핵심 개념:
      버퍼링은 생산자와 소비자의 속도 차이를 흡수한다.
      입출력 데이터가 임시 저장 공간을 거쳐 처리된다.
      이중 버퍼링은 한 버퍼를 처리하는 동안 다른 버퍼에 데이터를 저장할 수 있다.
      순환 버퍼링은 여러 버퍼를 순환적으로 사용해 연속 처리 효율을 높인다.
    tags: [chapter:11, buffering]

  - id: b11-09
    type: multiple-choice
    prompt: 단일 버퍼링 대신 순환 버퍼링을 함으로써 얻을 수 있는 효과는 무엇인가?
    choices:
      - { id: '1', text: '메모리가 절약된다.' }
      - {
          id: '2',
          text: '버퍼에 데이터를 저장하고 버퍼의 데이터를 처리하는 것이 동시에 일어날 수 있다.',
        }
      - { id: '3', text: '데이터 입력이 완료되었음을 CPU가 알 수 있다.' }
      - { id: '4', text: '데이터 입력의 오류 정정이 가능하다.' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 순환 버퍼링은 여러 버퍼를 사용하므로 단일 버퍼링보다 메모리를 더 사용할 수 있다.
      선택지 2 (정답): 순환 버퍼링은 저장과 처리를 병행할 수 있어 입출력 효율을 높인다.
      선택지 3 (오답): 입력 완료 통지는 인터럽트 같은 메커니즘과 관련된다.
      선택지 4 (오답): 버퍼링 자체가 오류 정정을 보장하지 않는다.

      핵심 개념:
      단일 버퍼링은 저장과 처리를 동시에 하기 어렵다.
      순환 버퍼링은 여러 버퍼를 번갈아 사용해 병행성을 높인다.
      한 버퍼가 처리되는 동안 다른 버퍼에는 새 데이터가 들어올 수 있다.
      연속적인 입출력 흐름에서 대기 시간을 줄일 수 있다.
    tags: [chapter:11, buffering, circular-buffer]

  - id: b11-10
    type: multiple-choice
    prompt: 입출력 프로그램과 저속장치 사이의 데이터 전송을 자기 디스크와 같은 고속장치를 통하도록 하여 입출력 작업이 빨리 끝나게 할 수 있는 것은?
    choices:
      - { id: '1', text: '바인딩' }
      - { id: '2', text: '스풀링' }
      - { id: '3', text: '사이클 스틸링' }
      - { id: '4', text: '커널' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 바인딩은 프로그램의 주소나 이름을 실제 대상에 연결하는 개념이다.
      선택지 2 (정답): 스풀링은 입출력 프로그램과 저속 입출력장치 사이의 데이터 전송을 디스크 같은 고속장치를 거쳐 처리한다.
      선택지 3 (오답): 사이클 스틸링은 DMA가 CPU 대신 메모리 버스를 잠시 사용하는 방식이다.
      선택지 4 (오답): 커널은 운영체제의 핵심 부분이다.

      핵심 개념:
      스풀링은 Simultaneous Peripheral Operation On-Line의 약어이다.
      저속 전용장치의 입출력을 디스크에 임시 저장해 작업을 빠르게 끝낸다.
      대표적으로 프린터 출력 대기열 처리에 사용된다.
      사용자는 장치를 독점하는 것처럼 보지만 운영체제가 순서를 관리한다.
    tags: [chapter:11, spooling]

  - id: b12-01
    type: multiple-choice
    prompt: 순차접근 저장장치에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '테이프 장치는 초기 접근시간이 굉장히 오래 걸린다.' }
      - { id: '2', text: '자기 디스크는 자성을 띤 표면에 데이터를 쓰거나 읽는다.' }
      - { id: '3', text: '광디스크는 읽기는 가능하나 쓰는 것은 불가능하다.' }
      - { id: '4', text: 'SSD는 자기 디스크보다 속도가 빠르나 전력 소모가 크다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 테이프 장치는 순차적으로 이동해야 하므로 초기 접근시간이 오래 걸린다.
      선택지 2 (오답): 자기 디스크는 직접접근 저장장치에 대한 설명이다.
      선택지 3 (오답): 광디스크는 직접접근 저장장치이며, 쓰기가 가능한 광디스크도 존재한다.
      선택지 4 (오답): SSD는 직접접근 저장장치이며, 자기 디스크보다 전력 소모도 적다.

      핵심 개념:
      순차접근 저장장치는 저장된 순서대로 데이터를 접근한다.
      원하는 위치까지 이동해야 하므로 임의 접근에는 시간이 많이 걸린다.
      자기 테이프가 대표적인 순차접근 저장장치이다.
      백업이나 대용량 보관처럼 순차 처리 중심 작업에 적합하다.
    tags: [chapter:12, storage, sequential-access]

  - id: b12-02
    type: multiple-choice
    prompt: 디스크 스케줄링에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '요구된 순서대로 처리하면 평균응답시간이 최소화된다.' }
      - { id: '2', text: '스케줄링에 의해 탐구시간을 줄일 수 있다.' }
      - { id: '3', text: '탐구시간 최소화에 가장 중점을 둔다.' }
      - { id: '4', text: '기계적 동작을 최소화해야 한다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 요구된 순서대로 처리하면 실행 예정순서는 고정되지만 응답시간이 길어질 수 있다.
      선택지 2 (오답): 디스크 스케줄링은 헤드 이동을 줄여 탐구시간을 줄일 수 있다.
      선택지 3 (오답): 디스크 스케줄링은 탐구시간 최소화를 중요한 목표로 둔다.
      선택지 4 (오답): 헤드 이동 같은 기계적 동작을 최소화하는 것이 성능에 중요하다.

      핵심 개념:
      디스크 스케줄링은 대기 중인 디스크 접근 요청의 처리 순서를 정한다.
      핵심 목표는 헤드 이동 거리와 탐구시간을 줄이는 것이다.
      요청 순서만 따르는 FCFS는 단순하지만 평균 응답시간이 커질 수 있다.
      SSTF, SCAN, LOOK 등은 헤드 이동 특성을 고려한다.
    tags: [chapter:12, disk-scheduling]

  - id: b12-03
    type: multiple-choice
    prompt: 자기 디스크에서 헤드를 원하는 트랙으로 위치시키는 데 소비되는 시간은 무엇인가?
    choices:
      - { id: '1', text: '회전지연시간' }
      - { id: '2', text: '전송시간' }
      - { id: '3', text: '탐구시간' }
      - { id: '4', text: '회전시간' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 회전지연시간은 원하는 자료가 헤드 밑에 올 때까지 디스크가 회전하는 데 걸리는 시간이다.
      선택지 2 (오답): 전송시간은 헤드 위치에서 자료를 읽거나 쓰는 데 걸리는 시간이다.
      선택지 3 (정답): 탐구시간은 기계적 동작으로 헤드를 원하는 트랙에 위치시키는 시간이다.
      선택지 4 (오답): 회전시간은 디스크의 회전 자체와 관련된 시간이다.

      핵심 개념:
      디스크 접근 시간은 탐구시간, 회전지연시간, 전송시간으로 나눌 수 있다.
      탐구시간은 헤드가 목표 트랙까지 이동하는 시간이다.
      기계적 움직임이 필요하므로 디스크 성능에 큰 영향을 준다.
      디스크 스케줄링은 주로 탐구시간을 줄이기 위해 사용된다.
    tags: [chapter:12, disk, seek-time]

  - id: b12-04
    type: multiple-choice
    prompt: 디스크 헤드가 현재 트랙 10에서 접근 요구를 처리 중이고 디스크 큐에 들어온 요청 트랙이 순서대로 20, 8, 25, 3일 때, FCFS 스케줄링 알고리즘에 의해 접근 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '20, 8, 25, 3' }
      - { id: '2', text: '8, 3, 20, 25' }
      - { id: '3', text: '8, 3, 25, 20' }
      - { id: '4', text: '20, 25, 8, 3' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): FCFS는 먼저 도착한 요청부터 처리하므로 20, 8, 25, 3 순서로 서비스한다.
      선택지 2 (오답): 현재 위치에서 가까운 순서로 재정렬한 결과이다.
      선택지 3 (오답): SCAN/C-SCAN 계열의 방향성을 고려한 순서에 가깝다.
      선택지 4 (오답): FCFS는 도착 순서를 바꾸지 않는다.

      핵심 개념:
      FCFS는 First-Come First-Served 방식이다.
      구현이 단순하고 공정하지만 헤드 이동 거리를 고려하지 않는다.
      요청 순서가 나쁘면 평균 응답시간이 길어질 수 있다.
      디스크 큐에 들어온 순서가 곧 서비스 순서가 된다.
    tags: [chapter:12, disk-scheduling, fcfs]

  - id: b12-05
    type: multiple-choice
    prompt: 디스크 헤드가 현재 트랙 10에서 접근 요구를 처리 중이고 디스크 큐 요청 트랙이 20, 8, 25, 3일 때, SSTF 스케줄링 알고리즘에 의해 접근 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '20, 8, 25, 3' }
      - { id: '2', text: '8, 3, 20, 25' }
      - { id: '3', text: '8, 3, 25, 20' }
      - { id: '4', text: '20, 25, 8, 3' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 요청 도착 순서를 그대로 따르는 FCFS 순서이다.
      선택지 2 (정답): 현재 트랙 10에서 가장 가까운 8을 먼저 처리하고, 다음으로 3, 20, 25 순서가 된다.
      선택지 3 (오답): 3 다음에는 25보다 20이 더 가깝다.
      선택지 4 (오답): 처음에 20보다 8이 더 가깝다.

      핵심 개념:
      SSTF는 Shortest Seek Time First 방식이다.
      현재 헤드 위치에서 탐구시간이 가장 짧은 요청을 먼저 처리한다.
      평균 탐구시간을 줄일 수 있지만 특정 요청이 오래 기다릴 수 있다.
      현재 위치가 바뀔 때마다 가장 가까운 요청을 다시 선택한다.
    tags: [chapter:12, disk-scheduling, sstf]

  - id: b12-06
    type: multiple-choice
    prompt: 디스크 헤드가 현재 트랙 10에서 접근 요구를 처리 중이고 진행방향은 트랙 0 쪽이며 디스크 큐 요청 트랙이 20, 8, 25, 3일 때, SCAN 스케줄링 알고리즘에 의해 접근 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '20, 8, 25, 3' }
      - { id: '2', text: '8, 3, 20, 25' }
      - { id: '3', text: '8, 3, 25, 20' }
      - { id: '4', text: '20, 25, 8, 3' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): FCFS 순서이다.
      선택지 2 (정답): 트랙 0 방향으로 8, 3을 처리한 뒤 방향을 바꾸어 20, 25를 처리한다.
      선택지 3 (오답): 방향 전환 후에는 20이 25보다 먼저이다.
      선택지 4 (오답): 현재 진행방향인 0 쪽 요청을 먼저 처리해야 한다.

      핵심 개념:
      SCAN은 디스크 헤드가 한 방향으로 이동하며 지나가는 요청을 처리한다.
      끝 트랙에 도달하면 방향을 바꿔 반대 방향 요청을 처리한다.
      엘리베이터 알고리즘이라고도 불린다.
      FCFS보다 헤드 이동을 줄이면서도 어느 정도 공정성을 제공한다.
    tags: [chapter:12, disk-scheduling, scan]

  - id: b12-07
    type: multiple-choice
    prompt: 디스크 헤드가 현재 트랙 10에서 접근 요구를 처리 중이고 진행방향은 트랙 0 쪽이며 디스크 큐 요청 트랙이 20, 8, 25, 3일 때, C-SCAN 스케줄링 알고리즘에 의해 접근 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '20, 8, 25, 3' }
      - { id: '2', text: '8, 3, 20, 25' }
      - { id: '3', text: '8, 3, 25, 20' }
      - { id: '4', text: '20, 25, 8, 3' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 요청 도착 순서를 그대로 따른 FCFS 순서이다.
      선택지 2 (오답): SCAN처럼 방향을 바꾼 뒤 가까운 요청부터 처리한 순서이다.
      선택지 3 (정답): 0 방향으로 8, 3을 처리한 뒤 가장 높은 트랙 방향 끝으로 이동해 25, 20 순서로 처리한다.
      선택지 4 (오답): 현재 진행방향의 요청인 8과 3을 먼저 처리해야 한다.

      핵심 개념:
      C-SCAN은 한쪽 방향으로만 요청을 처리하는 순환 SCAN 방식이다.
      한 끝에 도달하면 반대쪽 끝으로 이동한 뒤 같은 방향 처리를 계속한다.
      모든 요청에 더 균등한 대기시간을 제공하려는 목적이 있다.
      이동 방향에 따라 서비스 순서가 달라진다.
    tags: [chapter:12, disk-scheduling, c-scan]

  - id: b12-08
    type: multiple-choice
    prompt: 디스크 헤드가 현재 트랙 10에서 접근 요구를 처리 중이고 진행방향은 트랙 0 쪽이며 가장 큰 트랙 번호는 500, 디스크 큐 요청 트랙은 20, 8, 25, 3일 때, LOOK 스케줄링 알고리즘에 의해 접근 요구가 서비스되는 순서와 소요된 총탐구시간은?
    choices:
      - { id: '1', text: '8, 3, 20, 25 / 29' }
      - { id: '2', text: '8, 3, 20, 25 / 35' }
      - { id: '3', text: '8, 3, 25, 20 / 34' }
      - { id: '4', text: '8, 3, 25, 20 / 90' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 8, 3, 20, 25 순서이며 이동거리는 2 + 5 + 17 + 5 = 29이다.
      선택지 2 (오답): 서비스 순서는 맞지만 총탐구시간 계산이 틀렸다.
      선택지 3 (오답): 방향 전환 후에는 20이 25보다 먼저이다.
      선택지 4 (오답): LOOK은 끝 트랙까지 불필요하게 이동하지 않는다.

      핵심 개념:
      LOOK은 SCAN과 유사하지만 실제 요청이 있는 마지막 트랙까지만 이동한다.
      끝 트랙까지 무조건 가지 않고 방향을 전환한다.
      현재 진행방향에서 가장 가까운 요청들을 먼저 처리한다.
      총탐구시간은 연속 서비스 트랙 사이의 이동거리 합으로 구한다.
    tags: [chapter:12, disk-scheduling, look]

