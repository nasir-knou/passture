      선택지 2 (오답): 국부성은 참조가 시간적/공간적으로 몰리는 특성을 말한다.
      선택지 3 (오답): 문맥 교환은 CPU가 실행 프로세스를 바꾸는 작업이다.
      선택지 4 (오답): 스래싱은 페이지 교체가 과도해 실제 실행보다 페이징에 대부분의 시간을 쓰는 상태이다.

      핵심 개념:
      Belady의 이상현상은 일부 페이지 교체 알고리즘에서 나타난다.
      FIFO처럼 스택 알고리즘이 아닌 방식에서 발생할 수 있다.
      페이지 프레임 수가 많으면 항상 성능이 좋아진다는 직관의 예외이다.
      LRU 같은 스택 기반 알고리즘은 일반적으로 이 현상이 발생하지 않는다.
