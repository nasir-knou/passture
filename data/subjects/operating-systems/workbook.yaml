      - { id: '4', text: '교체 필요 없다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 시각 3까지 프레임에는 A와 B가 있고, FIFO는 먼저 들어온 A를 교체한다.
      선택지 2 (오답): B는 시각 3에 적재되어 A보다 늦게 들어왔다.
      선택지 3 (오답): C는 시각 4에 새로 참조되는 페이지이다.
      선택지 4 (오답): 프레임이 가득 찬 상태에서 C를 적재해야 하므로 교체가 필요하다.

      핵심 개념:
      FIFO는 메모리에 가장 오래 머문 페이지를 교체한다.
      페이지가 언제 마지막으로 사용되었는지는 고려하지 않는다.
      구현은 단순하지만 지역성을 충분히 반영하지 못한다.
      Belady의 이상현상이 발생할 수 있다.
