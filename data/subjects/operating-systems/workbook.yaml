      선택지 2 (오답): 파일 공유는 여러 사용자가 파일을 사용할 수 있게 하는 기능이다.
      선택지 3 (오답): 공간 할당은 파일 저장을 위해 보조기억장치 영역을 배정하는 기능이다.
