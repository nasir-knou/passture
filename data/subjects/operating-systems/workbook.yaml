      선택지 2 (정답): RPC는 호출 결과가 올 때까지 호출한 프로시저가 중단되므로 고성능 병렬처리에 적합하지 않다.
      선택지 3 (오답): 서로 다른 주소공간에서는 메모리 주소 값이 같은 의미를 갖지 않을 수 있다.
