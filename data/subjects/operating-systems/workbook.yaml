      선택지 2 (오답): wrt는 기록기 접근 제어용으로 1에서 시작해야 한다.
      선택지 3 (오답): mutex는 rcount 보호를 위해 1에서 시작해야 한다.
      선택지 4 (정답): 기록기 상호배제용 wrt와 rcount 보호용 mutex 모두 1로 초기화한다.

      핵심 개념:
      wrt는 공유 데이터에 대한 기록기 접근을 제어한다.
      mutex는 판독기 수를 나타내는 rcount 갱신을 보호한다.
      두 세마포어 모두 이진 세마포어로 1에서 시작한다.
      판독기 수 갱신도 임계영역으로 다루어야 한다.
