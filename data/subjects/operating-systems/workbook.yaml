    choices:
      - { id: '1', text: 'PFF' }
      - { id: '2', text: 'LRU' }
      - { id: '3', text: 'FIFO' }
      - { id: '4', text: 'LFU' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): PFF는 페이지 부재 빈도가 상한보다 높으면 프레임을 더 배정하고 하한보다 낮으면 회수한다.
      선택지 2 (오답): LRU는 가장 오래 사용되지 않은 페이지를 교체하는 알고리즘이다.
      선택지 3 (오답): FIFO는 가장 먼저 적재된 페이지를 교체하는 알고리즘이다.
      선택지 4 (오답): LFU는 참조 횟수가 가장 적은 페이지를 교체하는 알고리즘이다.

      핵심 개념:
      PFF(Page Fault Frequency)는 페이지 부재 빈도를 기준으로 프레임 수를 조정한다.
      부재율이 높으면 프로세스에 할당된 프레임이 부족하다고 본다.
      부재율이 낮으면 일부 프레임을 회수해 다른 프로세스에 활용할 수 있다.
      스래싱을 완화하고 메모리 자원 배분을 동적으로 조절하는 데 사용된다.
    tags: [chapter:10, pff, page-fault]

