    prompt: 다음 중 교착상태의 필요조건에 해당되는 것은?
    choices:
      - { id: '1', text: '여러 프로세스가 모든 자원을 동시에 함께 사용할 수 있다.' }
      - {
          id: '2',
          text: '자원을 배타적으로 점유하고 있으면서 다른 프로세스가 배타적으로 점유하고 있는 자원을 대기하고 있다.',
        }
      - { id: '3', text: '이미 할당된 자원을 선점할 수 있다.' }
      - { id: '4', text: '환형대기가 존재하지 않는다.' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 모든 자원을 동시에 공유할 수 있으면 상호배제 조건이 깨진다.
      선택지 2 (정답): 자원을 보유한 채 다른 자원을 기다리는 점유대기 조건이다.
      선택지 3 (오답): 교착상태 필요조건은 비선점이다.
      선택지 4 (오답): 환형대기가 존재하지 않으면 교착상태가 성립하기 어렵다.

      핵심 개념:
      점유대기는 자원을 가진 프로세스가 추가 자원을 기다리는 조건이다.
      교착상태는 여러 필요조건이 동시에 만족될 때 발생한다.
      비선점 조건에서는 이미 할당된 자원을 강제로 빼앗을 수 없다.
      환형대기는 자원 대기 관계가 순환 구조를 이루는 조건이다.
    tags: [chapter:06, deadlock, hold-and-wait]

  - id: b06-07
    type: multiple-choice
    prompt: 다음 중 교착상태의 처리기법으로 적절하지 않은 것은?
    choices:
      - { id: '1', text: '교착상태 방임' }
      - { id: '2', text: '교착상태 탐지' }
      - { id: '3', text: '교착상태 회피' }
      - { id: '4', text: '교착상태 복구' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 일반적인 교착상태 처리기법은 예방, 회피, 탐지 및 복구이다.
      선택지 2 (오답): 교착상태 탐지는 처리기법에 포함된다.
      선택지 3 (오답): 교착상태 회피는 처리기법에 포함된다.
      선택지 4 (오답): 교착상태 복구는 탐지 후 처리기법에 포함된다.

      핵심 개념:
      교착상태 처리는 예방, 회피, 탐지, 복구로 나눌 수 있다.
      예방은 필요조건 중 하나가 성립하지 않게 한다.
      회피는 안전상태를 유지하도록 자원을 할당한다.
      탐지와 복구는 발생한 교착상태를 찾아 해소한다.
    tags: [chapter:06, deadlock]

  - id: b06-08
    type: multiple-choice
    prompt: 자원 유형별로 부여된 일련번호를 이용한 교착상태 예방 기법에서 자원 r1을 점유하고 있는 프로세스가 자원 r2를 요청할 수 있기 위한 조건은? 단, 함수 f는 자원의 일련번호를 구해 준다.
    choices:
      - { id: '1', text: 'f(r1) < f(r2)' }
      - { id: '2', text: 'f(r1) = f(r2)' }
      - { id: '3', text: 'f(r1) ≠ f(r2)' }
      - { id: '4', text: 'f(r1) ≠ f(r2) + 1' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 자원 순서 부여 방식에서는 보유 자원보다 큰 번호의 자원만 요청하도록 제한한다.
      선택지 2 (오답): 같은 번호 조건은 순서 기반 예방 조건이 아니다.
      선택지 3 (오답): 단순히 다르기만 해서는 환형대기를 막지 못한다.
      선택지 4 (오답): 문제의 예방 조건을 표현하지 못한다.

      핵심 개념:
      자원 순서 부여 기법은 환형대기 조건을 깨는 교착상태 예방 방법이다.
      각 자원 유형에 일련번호를 부여한다.
      프로세스는 자신이 가진 자원보다 큰 순서의 자원만 요청하게 한다.
      순환 대기 관계가 만들어지지 않도록 자원 요청 순서를 제한한다.
    tags: [chapter:06, deadlock-prevention]

  - id: b07-01
    type: multiple-choice
    prompt: 교착상태 회피를 위해 필요한 사전 정보와 거리가 먼 것은?
    choices:
      - { id: '1', text: '현재 할당된 자원' }
      - { id: '2', text: '가용상태의 자원' }
      - { id: '3', text: '프로세스들의 최소 요구량' }
      - { id: '4', text: '프로세스들의 최대 요구량' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 현재 할당된 자원은 교착상태 회피에 필요한 정보이다.
      선택지 2 (오답): 현재 가용 자원도 안전성 판단에 필요하다.
      선택지 3 (정답): 교착상태 회피에는 최소 요구량이 아니라 최대 요구량 정보가 필요하다.
      선택지 4 (오답): 프로세스별 최대 요구량은 회피 알고리즘의 핵심 정보이다.

      핵심 개념:
      교착상태 회피는 자원 요청을 수락하기 전에 안전상태 유지 여부를 판단한다.
      이를 위해 현재 할당량, 가용 자원, 최대 요구량을 사용한다.
      은행원 알고리즘은 대표적인 교착상태 회피 알고리즘이다.
      최소 요구량은 안전성 검사에 필요한 핵심 정보가 아니다.
    tags: [chapter:07, deadlock-avoidance]

  - id: b07-02
    type: multiple-choice
    prompt: 안전순서열에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '순서 있는 프로세스의 집합이다.' }
      - {
          id: '2',
          text: '안전순서열의 한 프로세스가 추가로 요구할 수 있는 자원의 양은 현재 가용상태의 자원으로 충당 가능해야 한다.',
        }
      - {
          id: '3',
          text: '안전순서열의 한 프로세스가 추가로 요구할 수 있는 자원의 양은 그 프로세스보다 앞선 프로세스들에 할당된 자원으로 충당 가능해야 한다.',
        }
      - { id: '4', text: '안전순서열이 존재하지 않는 경우를 안전상태라고 한다.' }
    answers: ['1']
    explanation: |
      선택지 1 (정답): 안전순서열은 모든 프로세스가 완료될 수 있는 순서 있는 프로세스 집합이다.
      선택지 2 (오답): 현재 가용 자원뿐 아니라 앞선 프로세스가 반납할 자원까지 고려한다.
      선택지 3 (오답): 앞선 프로세스에 이미 할당된 자원만으로 표현하기에는 설명이 부족하다.
      선택지 4 (오답): 안전순서열이 없으면 불안전상태이다.

      핵심 개념:
      안전상태는 적어도 하나의 안전순서열이 존재하는 상태이다.
      안전순서열은 프로세스들이 차례로 자원을 얻고 완료될 수 있는 순서이다.
      완료된 프로세스가 반납하는 자원은 뒤 프로세스의 실행 가능성에 영향을 준다.
      교착상태 회피는 안전상태를 유지하는 방향으로 자원을 할당한다.
    tags: [chapter:07, safe-state]

  - id: b07-03
    type: multiple-choice
    prompt: 교착상태 회피기법에서 어떠한 요청이 들어왔을 때 요청받은 자원을 할당해 주는 경우는?
    choices:
      - { id: '1', text: '현재 상태가 안전상태일 때' }
      - { id: '2', text: '현재 상태가 불안전상태일 때' }
      - { id: '3', text: '자원을 할당해도 안전상태가 유지될 때' }
      - { id: '4', text: '자원을 할당하면 안전순서열이 존재하지 않을 때' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 현재 안전상태라도 할당 후 불안전상태가 될 수 있다.
      선택지 2 (오답): 불안전상태가 되지 않도록 유지해야 한다.
      선택지 3 (정답): 자원 할당 후에도 안전상태가 유지될 때 요청을 수락한다.
      선택지 4 (오답): 안전순서열이 없으면 불안전상태이므로 할당하면 안 된다.

      핵심 개념:
      교착상태 회피는 요청을 즉시 승인하지 않고 할당 후 상태를 검사한다.
      안전상태가 유지되면 자원을 할당할 수 있다.
      불안전상태는 교착상태 가능성이 있는 상태이다.
      은행원 알고리즘은 안전성 검사를 통해 요청 수락 여부를 결정한다.
    tags: [chapter:07, deadlock-avoidance]

  - id: b07-04
    type: multiple-choice
    prompt: 변형된 자원할당 그래프에서 운영체제가 수용할 경우 불안전상태가 되는 요청은?
    choices:
      - { id: '1', text: 'p1이 r1을 반납한다.' }
      - { id: '2', text: 'p1이 r2를 요구한다.' }
      - { id: '3', text: 'p2가 r1을 요구한다.' }
      - { id: '4', text: 'p2가 r2를 요구한다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 자원 반납은 불안전상태를 만드는 요청이 아니다.
      선택지 2 (오답): 해당 요청은 제시된 그래프에서 순환을 만들지 않는다.
      선택지 3 (오답): 해당 요청은 제시된 그래프에서 불안전상태를 만들지 않는다.
      선택지 4 (정답): p2가 r2를 요구하면 순환이 생겨 불안전상태가 된다.

      핵심 개념:
      변형된 자원할당 그래프는 교착상태 회피에서 요청 수락 여부를 판단하는 데 사용된다.
      요청 간선을 할당했을 때 사이클이 생기면 불안전상태가 될 수 있다.
      불안전상태가 되는 요청은 수용하지 않아야 한다.
      그래프의 할당 간선과 요청 간선을 구분해 사이클을 판단한다.
    tags: [chapter:07, resource-allocation-graph]

  - id: b07-05
    type: multiple-choice
    prompt: 변형된 자원할당 그래프에서 운영체제가 수용할 경우 불안전상태가 되는 요청은?
    choices:
      - { id: '1', text: 'p1이 r2를 요구한다.' }
      - { id: '2', text: 'p2가 r1을 요구한다.' }
      - { id: '3', text: 'p3이 r2를 요구한다.' }
      - { id: '4', text: 'p2가 r2를 요구한다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 제시된 그래프에서 해당 요청은 불안전 사이클을 만들지 않는다.
      선택지 2 (오답): 제시된 그래프에서 해당 요청은 불안전상태가 되는 요청이 아니다.
      선택지 3 (오답): 제시된 그래프에서 해당 요청은 정답 조건의 사이클을 만들지 않는다.
      선택지 4 (정답): p2가 r2를 요구하면 r2→p2→r3→p3→r2의 사이클이 발생한다.

      핵심 개념:
      자원할당 그래프에서 사이클은 교착상태 가능성을 나타낸다.
      변형된 그래프에서는 요청을 허용했을 때 생기는 사이클을 검사한다.
      사이클이 생겨 불안전상태가 되면 요청을 거절한다.
      교착상태 회피는 안전상태를 유지하는 것이 목적이다.
    tags: [chapter:07, resource-allocation-graph]

  - id: b07-06
    type: multiple-choice
    prompt: 은행원 알고리즘에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '교착상태 회피를 위한 알고리즘이다.' }
      - { id: '2', text: '각 자원의 단위자원이 여러 개인 경우 적용 가능하다.' }
      - { id: '3', text: '자원을 요구받으면 그 자원을 할당한 뒤 현재상태가 안전상태인지 확인한다.' }
      - { id: '4', text: '내부적으로 안전 알고리즘을 호출한다.' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 은행원 알고리즘은 교착상태 회피 알고리즘이다.
      선택지 2 (오답): 자원 유형별 단위자원이 여러 개인 경우에 적용된다.
      선택지 3 (정답): 실제 할당 전에 가상으로 할당해 안전상태인지 검사한다.
      선택지 4 (오답): 안전성 확인을 위해 안전 알고리즘을 사용한다.

      핵심 개념:
      은행원 알고리즘은 자원 요청을 수락해도 안전상태가 유지되는지 검사한다.
      실제 할당 전 가정 상태를 만들어 안전성 검사를 수행한다.
      안전상태이면 요청을 승인하고, 아니면 대기시킨다.
      각 프로세스의 최대 요구량 정보가 필요하다.
    tags: [chapter:07, bankers-algorithm]

  - id: b07-07
    type: multiple-choice
    prompt: 교착상태를 탐지하기 위해 탐지 알고리즘을 수행하는 시점으로 적절하지 않은 것은?
    choices:
      - { id: '1', text: '정해진 시간간격마다' }
      - { id: '2', text: '자원 요구가 생길 때마다' }
      - { id: '3', text: 'CPU 효율이 일정 수준 이하로 떨어질 때' }
      - { id: '4', text: '즉시 받아들일 수 없는 자원 요구가 있을 때' }
    answers: ['2']
    explanation: |
      선택지 1 (오답): 정해진 시간 간격마다 탐지할 수 있다.
      선택지 2 (정답): 자원 요구가 생길 때마다 탐지하는 것은 비용이 커서 적절하지 않다.
      선택지 3 (오답): 시스템 효율이 낮아질 때 탐지를 수행할 수 있다.
      선택지 4 (오답): 즉시 수용할 수 없는 자원 요구가 있을 때 탐지할 수 있다.

      핵심 개념:
      교착상태 탐지는 발생 가능성을 주기적으로 또는 특정 조건에서 검사한다.
      탐지 알고리즘은 프로세스 수와 자원 수에 따라 비용이 크다.
      너무 자주 수행하면 시스템 오버헤드가 커진다.
      탐지 시점은 비용과 반응성을 고려해 선택한다.
    tags: [chapter:07, deadlock-detection]

  - id: b07-08
    type: multiple-choice
    prompt: 탐지된 교착상태를 복구하는 방법으로 적절하지 않은 것은?
    choices:
