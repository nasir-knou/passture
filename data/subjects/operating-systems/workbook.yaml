    type: multiple-choice
    prompt: 무결성에 대한 공격으로, 공격자가 허락받지 않은 정보에 접근하여 기존에 있던 내용을 변경하는 것을 무엇이라고 하는가?
    choices:
      - { id: '1', text: '가로채기' }
      - { id: '2', text: '흐름 차단' }
      - { id: '3', text: '변조' }
      - { id: '4', text: '위조' }
    answers: ['3']
    explanation: |
      선택지 1 (오답): 가로채기는 허락받지 않은 컴퓨터 자원에 접근하는 경우이다.
      선택지 2 (오답): 흐름 차단은 시스템 일부가 파괴되거나 사용할 수 없게 된 상태이다.
      선택지 3 (정답): 변조는 허가되지 않은 정보에 접근해 기존 내용을 변경하는 공격이다.
      선택지 4 (오답): 위조는 이전에 없던 위조물을 새로 삽입하는 공격이다.

      핵심 개념:
      보안 공격은 기밀성, 무결성, 가용성 침해로 나눠 볼 수 있다.
      변조는 데이터나 시스템 상태를 허가 없이 바꾸는 무결성 공격이다.
      가로채기는 정보 노출과 관련된 기밀성 침해이다.
      흐름 차단은 서비스나 자원 사용을 방해하는 가용성 침해이다.
    tags: [chapter:14, security, integrity]

  - id: b14-03
    type: multiple-choice
