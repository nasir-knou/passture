          text: '쓰기 접근은 객체의 보안 수준이 주체의 보안허가 수준보다 높거나 같아야 가능하다.',
        }
      - {
          id: '3',
          text: '읽기 접근은 객체의 보안 수준이 주체의 보안허가 수준보다 낮거나 같아야 가능하다.',
        }
      - { id: '4', text: '벨-라파둘라 모델과 비바 모델은 기밀성과 무결성에 대해 동등하다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 벨-라파둘라 모델은 기밀성 유지에 초점을 둔다.
      선택지 2 (오답): 쓰기는 높은 등급으로만 가능하게 해 낮은 등급으로 정보가 흘러가지 않도록 한다.
      선택지 3 (오답): 읽기는 자신의 보안허가 수준 이하의 객체에 대해 가능하다.
      선택지 4 (정답): 벨-라파둘라는 기밀성, 비바 모델은 무결성에 중점을 둔 서로 반대 성격의 모델이다.

      핵심 개념:
      벨-라파둘라 모델은 군사 보안처럼 기밀성 보호가 중요한 환경을 대상으로 한다.
      단순 보안 속성은 낮은 등급으로만 읽기를 허용한다.
      스타 속성은 낮은 등급으로 쓰기를 금지해 정보 누출을 막는다.
      무결성 보호에는 비바 모델이 더 직접적으로 대응한다.
    tags: [chapter:14, security-model, bell-lapadula]

  - id: b14-09
    type: multiple-choice
    prompt: 다음 중 비바 모델에 대한 설명이 아닌 것은?
    choices:
      - { id: '1', text: '무결성을 보장하기 위한 모델이다.' }
      - { id: '2', text: '모든 주체는 자신보다 높은 등급 객체에 쓰기 연산을 할 수 없다.' }
      - { id: '3', text: '자신보다 높은 등급의 객체에 주체는 읽기 연산을 할 수 있다.' }
      - { id: '4', text: '이론적인 모델로 실제 운영체제에서 구현되지는 않는다.' }
    answers: ['4']
    explanation: |
      선택지 1 (오답): 비바 모델은 무결성 보장을 위한 모델이다.
      선택지 2 (오답): 낮은 무결성 주체가 높은 무결성 객체를 오염시키지 못하도록 높은 등급 객체에 쓰기를 제한한다.
      선택지 3 (오답): 비바 모델은 낮은 등급 객체에서 읽어 높은 등급 주체가 오염되는 것을 막는 방향으로 접근을 제한한다.
      선택지 4 (정답): FreeBSD, Linux 등 현대 운영체제에는 비바 모델의 개념이 내부적으로 구현되어 있다.

      핵심 개념:
      비바 모델은 Biba integrity model로 무결성 보호에 초점을 둔다.
      낮은 무결성 정보가 높은 무결성 객체를 오염시키는 것을 막는다.
      벨-라파둘라와 반대로 기밀성보다 데이터 신뢰도를 중시한다.
      운영체제 보안 정책과 무결성 제어 개념에 영향을 준다.
    tags: [chapter:14, security-model, biba]

  - id: b14-10
    type: multiple-choice
    prompt: 운영체제에서 보안 커널에 대한 설명으로 옳지 않은 것은?
    choices:
      - { id: '1', text: '기존 운영체제 커널에 보안기능을 통합한 것이다.' }
      - { id: '2', text: '보안기능을 커널로 옮기는 것만으로 운영체제의 안전성을 높일 수 있다.' }
      - {
          id: '3',
          text: '중요한 일을 커널로 옮기면 사용자 공간과 커널 공간 사이의 전환을 줄여 성능을 높일 수 있다.',
        }
      - { id: '4', text: '보안 커널을 사용한 운영체제는 보안기능 요소를 갖추어야 한다.' }
    answers: ['2']
