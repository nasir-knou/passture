      선택지 3 (오답): 일부 구성요소 장애에도 서비스를 계속할 수 있어 신뢰성을 높일 수 있다.
      선택지 4 (정답): 분산 시스템은 통신, 동기화, 장애 처리 때문에 구조가 복잡해진다.

