  - id: g18-pv-definition-01
    type: code
    language: text
    body: |
      P(s):
        if (s > 0) then
          (가)
        else
          현재의 프로세스 대기

      V(s):
        if (1개 이상의 프로세스 대기 중) then
          그 중 1개의 프로세스만 진행;
        else
          (나)

