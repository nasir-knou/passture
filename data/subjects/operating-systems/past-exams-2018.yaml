questions:
  - id: e18-01
    type: multiple-choice
    prompt: 프로세스 동기화에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '2개 이상의 프로세스에 대한 처리순서를 결정하는 것' }
      - { id: '2', text: '동시에 사용할 수 없는 공유자원이 있는 경우 동기화 필요' }
      - {
          id: '3',
          text: '한 프로세스의 처리 결과에 따라 다른 프로세스의 처리가 영향을 받는 경우 동기화 필요',
        }
      - { id: '4', text: '한 프로세스 내의 프로그램 문장 사이의 처리순서를 결정하는 것' }
    answers: ['4']
    explanation: |
      선택지 1: 둘 이상의 프로세스 실행 순서를 맞추는 것은 프로세스 동기화의 대표 목적이므로 옳다.
      선택지 2: 동시에 사용할 수 없는 공유자원이 있으면 상호배제를 보장해야 하므로 동기화가 필요하다.
      선택지 3: 한 프로세스의 결과가 다른 프로세스의 실행 조건이 되는 경우 선후 관계를 맞춰야 하므로 옳다.
      선택지 4: 한 프로세스 내부 문장 사이의 순서는 일반적인 순차 실행 흐름의 문제이지 프로세스 간 동기화가 아니므로 정답이다.

      핵심 개념:
      프로세스 동기화는 병행 실행 중인 프로세스 사이의 실행 순서와 공유자원 접근을 조정한다.
      공유 데이터가 동시에 변경되면 경쟁 조건이 발생할 수 있어 상호배제가 필요하다.
      결과 전달이나 선행 조건이 있는 작업은 실행 순서 동기화가 필요하다.
      단일 프로세스 내부 문장 순서는 동기화의 주된 대상이 아니다.
    tags: [process, synchronization]

  - id: e18-02
    type: multiple-choice
    prompt: Test-and-Set(lock) 명령에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '원자적으로 수행됨' }
      - { id: '2', text: 'lock이 참이었다면 Test-and-Set의 반환값은 거짓임' }
      - { id: '3', text: 'lock이 거짓이었다면 프로세스는 임계영역에 들어가게 됨' }
      - { id: '4', text: '많은 프로세스가 임계영역에 들어가기를 원할 때 기아가 발생할 수 있음' }
    answers: ['2']
    explanation: |
      선택지 1: Test-and-Set은 읽기와 쓰기가 분리되지 않고 원자적으로 수행되어야 하므로 옳다.
      선택지 2: Test-and-Set은 lock의 이전 값을 반환하므로 lock이 참이었다면 반환값도 참이다. 거짓이라고 한 설명은 틀렸다.
      선택지 3: lock이 거짓이었다면 이전 값이 거짓으로 반환되고 lock을 참으로 바꾸어 임계영역 진입권을 얻으므로 옳다.
      선택지 4: 단순 Test-and-Set 락은 대기 순서를 보장하지 않아 경쟁이 심하면 기아가 생길 수 있으므로 옳다.

      핵심 개념:
      Test-and-Set은 하드웨어가 제공할 수 있는 원자적 동기화 명령이다.
      명령은 기존 lock 값을 반환한 뒤 lock을 참으로 설정한다.
      반환값이 거짓이면 이전에 잠겨 있지 않았다는 뜻이므로 임계영역에 들어갈 수 있다.
      공정성 보장이 없는 스핀락 구현에서는 특정 프로세스가 계속 밀리는 기아 가능성이 있다.
    tags: [synchronization, mutual-exclusion]

  - id: e18-03
    type: multiple-choice
    passageRefs: [g18-pv-definition-01]
    prompt: 세마포어 s에 대한 연산 P(s)와 V(s)의 정의에서 (가)와 (나)에 들어갈 내용으로 바른 것은?
    choices:
      - { id: '1', text: '(가) s := s + 1; (나) s := s + 1;' }
      - { id: '2', text: '(가) s := s + 1; (나) s := s - 1;' }
      - { id: '3', text: '(가) s := s - 1; (나) s := s + 1;' }
      - { id: '4', text: '(가) s := s - 1; (나) s := s - 1;' }
    answers: ['3']
    explanation: |
      선택지 1: P 연산에서 s를 증가시키는 부분이 틀렸고, P는 자원 획득 시 s를 감소시킨다.
      선택지 2: P 연산의 증가와 V 연산의 감소가 모두 반대로 되어 있으므로 틀렸다.
      선택지 3: P는 사용 가능한 자원이 있으면 s를 1 감소시키고, V는 대기 프로세스가 없으면 s를 1 증가시키므로 정답이다.
      선택지 4: P의 감소는 맞지만 V에서 대기 프로세스가 없을 때 s를 감소시키는 것은 반납 의미와 맞지 않는다.

      핵심 개념:
      세마포어는 정수 값과 원자적 P/V 연산으로 공유자원 사용을 제어한다.
      P 연산은 자원을 획득하려는 연산으로, 가능하면 세마포어 값을 감소시킨다.
      사용할 수 없으면 프로세스는 대기 상태로 들어간다.
      V 연산은 자원 반납 또는 신호 전달 연산으로, 대기 프로세스가 없으면 값을 증가시킨다.
    tags: [semaphore]

  - id: e18-04
    type: multiple-choice
    prompt: 공유 기억장치를 통해 프로세스 사이의 통신을 하는 방법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '공유 변수가 통신에 사용됨' }
      - { id: '2', text: '속도가 느려 소량의 데이터 교환에 유용' }
      - { id: '3', text: '통신기능 제공의 책임은 운영체제에 있음' }
      - { id: '4', text: 'send/receive와 같은 메시지 전달 명령이 사용됨' }
    answers: ['1']
    explanation: |
      선택지 1: 공유 기억장치 방식은 공유 변수나 공유 메모리 영역을 통해 데이터를 교환하므로 정답이다.
      선택지 2: 공유 메모리는 일반적으로 복사와 커널 개입이 적어 대량 데이터 교환에도 빠른 편이므로 틀렸다.
      선택지 3: 공유 메모리 방식에서는 통신 절차와 동기화의 상당 부분을 사용자 프로세스가 책임지므로 메시지 전달 방식 설명에 가깝다.
      선택지 4: send/receive 명령은 메시지 전달 방식의 인터페이스이므로 공유 기억장치 방식과 다르다.

      핵심 개념:
      프로세스 간 통신은 크게 공유 기억장치 방식과 메시지 전달 방식으로 나눌 수 있다.
      공유 기억장치 방식은 여러 프로세스가 같은 메모리 영역을 보고 읽거나 쓴다.
      데이터 이동 오버헤드가 작지만 경쟁 조건을 막기 위한 동기화가 필요하다.
      메시지 전달 방식은 운영체제가 제공하는 send/receive 연산과 통신 링크를 이용한다.
    tags: [ipc, shared-memory]

  - id: e18-05
    type: multiple-choice
    prompt: 메시지 시스템 기법에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '직접 통신은 메시지 전달 연산에 수신자나 송신자의 이름을 명시' }
      - { id: '2', text: '간접 통신은 메시지 전달 연산에 우편함 이름을 명시' }
      - { id: '3', text: '메시지를 주고받기 위한 연결통로를 통신 링크라 함' }
      - { id: '4', text: '통신 링크의 최대용량이 0인 경우 동기화가 필요하지 않음' }
    answers: ['4']
    explanation: |
      선택지 1: 직접 통신은 송신자나 수신자 이름을 명시해 메시지를 보내므로 옳다.
      선택지 2: 간접 통신은 우편함 또는 포트 같은 중간 객체 이름을 명시하므로 옳다.
      선택지 3: 메시지가 오가는 논리적 연결을 통신 링크라고 하므로 옳다.
      선택지 4: 링크 용량이 0이면 메시지를 저장할 버퍼가 없어 송신자와 수신자가 동시에 맞물려야 하므로 동기화가 필요하다. 따라서 정답이다.

      핵심 개념:
      메시지 시스템은 공유 메모리 없이 send/receive 연산으로 프로세스가 통신하는 방식이다.
      직접 통신은 상대 프로세스를, 간접 통신은 우편함을 지정한다.
      링크 용량은 메시지를 임시로 저장할 수 있는 버퍼 크기를 뜻한다.
      용량이 0이면 송신과 수신이 동시에 일어나야 하므로 rendezvous 형태의 강한 동기화가 발생한다.
    tags: [ipc, message-passing]

  - id: e18-06
    type: multiple-choice
    prompt: 2개 이상의 프로세스가 서로 상대방의 작업이 끝나기만을 기다리고 있는 상태를 일컫는 용어는?
    choices:
      - { id: '1', text: '임계영역' }
      - { id: '2', text: '인터럽트' }
      - { id: '3', text: '교착상태' }
      - { id: '4', text: '기아상태' }
    answers: ['3']
    explanation: |
      선택지 1: 임계영역은 공유자원에 접근하는 코드 구간을 뜻하므로 서로 기다리는 상태가 아니다.
      선택지 2: 인터럽트는 장치나 사건이 CPU의 주의를 요구하는 메커니즘이므로 문항의 대기 상태와 다르다.
      선택지 3: 둘 이상의 프로세스가 서로의 작업 완료나 자원 반납을 기다려 진행하지 못하는 상태가 교착상태이므로 정답이다.
      선택지 4: 기아상태는 특정 프로세스가 계속 자원을 얻지 못하는 상태이며, 반드시 서로 순환 대기하는 것은 아니다.

      핵심 개념:
      교착상태는 여러 프로세스가 서로 상대방이 가진 자원을 기다리며 멈춘 상태이다.
      각 프로세스가 기다리는 사건이 같은 집합 안의 다른 프로세스에게 의존한다.
      기아상태는 장기간 자원을 얻지 못하는 현상이고 교착상태와 구분된다.
      교착상태 분석에서는 자원 점유와 요청 관계의 순환을 찾는 것이 중요하다.
    tags: [deadlock]

  - id: e18-07
    type: multiple-choice
    prompt: 교착상태의 필요조건에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '상호배제 - 프로세스들이 자원에 대한 배타적인 통제권을 요구' }
      - {
          id: '2',
          text: '점유 대기 - 프로세스 A가 자원 S를 할당받아 배타적으로 점유한 채 프로세스 B가 점유 중인 자원 T가 해제되기를 기다리는 상황',
        }
      - {
          id: '3',
          text: '선점 - 프로세스에 할당된 자원은 그 프로세스 스스로 반환하기 전이라도 제거 가능',
        }
      - {
          id: '4',
          text: '환형 대기 - 프로세스의 자원 점유 및 점유된 자원의 요구 관계가 환형을 이루며 대기',
        }
    answers: ['3']
    explanation: |
      선택지 1: 상호배제는 한 번에 하나의 프로세스만 사용할 수 있는 자원이 있을 때 성립하므로 교착상태 필요조건이다.
      선택지 2: 점유 대기는 이미 자원을 가진 프로세스가 다른 자원을 추가로 기다리는 조건이므로 옳다.
      선택지 3: 필요조건은 선점이 아니라 비선점이다. 자원을 강제로 빼앗을 수 있다면 대기 고리를 깰 수 있으므로 정답이다.
      선택지 4: 환형 대기는 프로세스와 자원이 원형의 대기 관계를 이루는 조건이므로 교착상태 필요조건이다.

      핵심 개념:
      교착상태의 네 필요조건은 상호배제, 점유와 대기, 비선점, 환형 대기이다.
      네 조건이 동시에 성립해야 교착상태가 발생할 수 있다.
      예방 기법은 이 조건 중 하나를 깨도록 자원 할당 정책을 설계한다.
      선점 가능성은 비선점 조건을 깨므로 교착상태 가능성을 낮춘다.
    tags: [deadlock]

  - id: e18-08
    type: multiple-choice
    passageRefs: [g18-rag-01]
    prompt: 자원할당 그래프에서 간선을 하나만 제거했을 때 여전히 교착상태가 되는 간선은?
    choices:
      - { id: '1', text: '(ㄱ)' }
      - { id: '2', text: '(ㄴ)' }
      - { id: '3', text: '(ㄷ)' }
      - { id: '4', text: '(ㄹ)' }
    answers: ['4']
    explanation: |
      선택지 1: (ㄱ)이 핵심 순환 대기에 포함되어 있다면 제거 시 순환이 끊길 수 있으므로 여전히 교착상태가 되는 간선으로 보기 어렵다.
      선택지 2: (ㄴ)도 $p_1$, $r_2$, $p_2$, $r_1$ 사이 순환을 구성하는 간선이라면 제거 효과가 있으므로 답이 아니다.
      선택지 3: (ㄷ)이 순환 고리의 일부라면 제거하면 교착상태가 해소될 수 있어 문항 조건과 맞지 않는다.
      선택지 4: (ㄹ)은 $p_2$의 $r_3$ 요청으로 핵심 순환 $p_1 \to r_2 \to p_2 \to r_1 \to p_1$과 무관하므로 제거해도 교착상태가 남아 정답이다.

      핵심 개념:
      자원할당 그래프에서 프로세스에서 자원으로 향하는 간선은 요청, 자원에서 프로세스로 향하는 간선은 할당을 뜻한다.
      교착상태는 자원 점유와 요청 관계가 순환을 이룰 때 나타난다.
      간선 제거 문제에서는 제거한 간선이 순환 고리에 포함되는지 확인해야 한다.
      순환과 무관한 간선을 제거해도 대기 고리는 그대로 남아 교착상태가 계속된다.
    tags: [deadlock, resource-allocation-graph]

  - id: e18-09
    type: multiple-choice
    prompt: 교착상태 회피 기법에서 어떠한 요청이 들어왔을 때 요청받은 자원을 할당해도 문제가 없는 경우는?
    choices:
      - { id: '1', text: '자원을 할당하면 안전순서열이 존재하지 않게 되는 경우' }
      - { id: '2', text: '자원을 할당해도 안전상태가 유지되는 경우' }
      - { id: '3', text: '현재 상태가 불안전상태인 경우' }
      - { id: '4', text: '현재 상태가 안전상태인 경우' }
    answers: ['2']
    explanation: |
      선택지 1: 자원을 할당했을 때 안전순서열이 존재하지 않으면 불안전상태가 되므로 할당하면 안 된다.
      선택지 2: 요청을 가정해 할당한 뒤에도 안전상태가 유지되면 문제가 없으므로 정답이다.
      선택지 3: 현재 상태가 불안전상태라면 교착상태 가능성이 있으므로 회피 기법에서 안전한 할당 조건이 아니다.
      선택지 4: 현재가 안전상태라는 사실만으로 새 요청을 할당해도 안전하다고 단정할 수 없다.

      핵심 개념:
      교착상태 회피는 요청을 즉시 승인하지 않고 승인 후 상태가 안전한지 검사한다.
      안전상태는 모든 프로세스를 끝낼 수 있는 안전순서열이 존재하는 상태이다.
      요청 승인 후 안전순서열이 사라지면 불안전상태가 되어 요청을 보류해야 한다.
      은행원 알고리즘은 이런 안전성 검사의 대표적인 예이다.
    tags: [deadlock, avoidance]

  - id: e18-10
    type: multiple-choice
    passageRefs: [g18-free-list-01, g18-free-list-image-01]
    prompt: 최초 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['1']
    explanation: |
      선택지 1: 최초 적합은 리스트를 앞에서부터 보다가 요청 크기 11MB를 수용할 수 있는 첫 공간인 공백 1을 선택하므로 정답이다.
      선택지 2: 공백 2가 11MB를 수용할 수 있더라도 공백 1이 먼저 조건을 만족하므로 선택하지 않는다.
      선택지 3: 공백 3은 더 뒤에 있는 후보이므로 최초 적합의 첫 번째 만족 공간이 아니다.
      선택지 4: 공백 4 역시 앞선 공백에서 이미 배치가 끝나므로 답이 아니다.

      핵심 개념:
      최초 적합(first fit)은 빈 공간 리스트를 순서대로 탐색해 처음으로 충분한 공간을 고른다.
      선택 기준은 남는 공간의 크기가 아니라 리스트에서 만나는 순서이다.
      구현이 단순하고 탐색 시간이 짧을 수 있지만 앞쪽에 작은 조각이 쌓일 수 있다.
      문제에서는 요청 크기를 만족하는 첫 번째 공백을 찾으면 된다.
    tags: [memory-management, allocation]

  - id: e18-11
    type: multiple-choice
    passageRefs: [g18-free-list-01, g18-free-list-image-01]
    prompt: 최적 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['2']
    explanation: |
      선택지 1: 공백 1도 11MB를 담을 수 있지만 남는 공간이 더 작은 후보가 있으므로 최적 적합에서는 선택하지 않는다.
      선택지 2: 11MB 요청을 수용할 수 있는 후보 중 가장 작은 공간이 15MB인 공백 2이므로 정답이다.
      선택지 3: 공백 3은 요청을 수용하지 못하거나 공백 2보다 적합하지 않은 후보이다.
      선택지 4: 공백 4는 더 큰 공간이므로 최적 적합의 최소 잔여 공간 후보가 아니다.

      핵심 개념:
      최적 적합(best fit)은 요청을 수용할 수 있는 빈 공간 중 가장 작은 공간을 선택한다.
      먼저 요청 크기보다 작은 공백은 후보에서 제외한다.
      남는 공간을 최소화하려는 전략이지만 매우 작은 외부 단편 조각을 만들 수 있다.
      최초 적합과 달리 리스트의 앞뒤 순서보다 후보 크기 비교가 핵심이다.
    tags: [memory-management, allocation]

  - id: e18-12
    type: multiple-choice
    prompt: 접근속도에 따라 기억장치를 계층적으로 바르게 구성한 것은? 단, 좌측이 가장 빠르고 우측이 가장 느린 순서이다.
    choices:
      - { id: '1', text: '레지스터, 캐시 기억장치, 메모리, 보조기억장치' }
      - { id: '2', text: '보조기억장치, 메모리, 캐시 기억장치, 레지스터' }
      - { id: '3', text: '레지스터, 보조기억장치, 메모리, 캐시 기억장치' }
      - { id: '4', text: '캐시 기억장치, 레지스터, 메모리, 보조기억장치' }
    answers: ['1']
    explanation: |
      선택지 1: 레지스터, 캐시 기억장치, 메모리, 보조기억장치 순은 빠른 접근속도에서 느린 접근속도로의 일반적 계층이므로 정답이다.
      선택지 2: 보조기억장치를 가장 빠른 위치에 둔 순서이므로 접근속도 기준과 반대이다.
      선택지 3: 보조기억장치가 메모리와 캐시보다 앞에 있어 속도 순서가 맞지 않는다.
      선택지 4: 캐시가 레지스터보다 앞에 있어 가장 빠른 계층의 순서가 틀렸다.

      핵심 개념:
      기억장치 계층은 CPU에 가까울수록 빠르고 작고 비싸다.
      접근속도는 보통 레지스터, 캐시, 주기억장치, 보조기억장치 순으로 빠르다.
      용량은 대체로 이와 반대로 보조기억장치가 가장 크고 레지스터가 가장 작다.
      속도 기준인지 용량 기준인지 문제 조건을 먼저 확인해야 한다.
    tags: [memory-hierarchy]

  - id: e18-13
    type: multiple-choice
    prompt: 가상 메모리에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '네트워크로 연결된 다른 컴퓨터의 메모리를 사용해야 함' }
      - { id: '2', text: '메모리 크기보다 더 큰 기억공간이 필요한 프로세스를 실행할 수는 없음' }
      - { id: '3', text: '프로세스가 참조하는 주소와 메모리에서 사용하는 주소가 동일' }
      - { id: '4', text: '사상이 필요함' }
    answers: ['4']
    explanation: |
      선택지 1: 가상 메모리는 네트워크상의 다른 컴퓨터 메모리를 필수로 사용하는 기술이 아니므로 틀렸다.
      선택지 2: 가상 메모리는 실제 메모리보다 큰 주소 공간의 프로세스도 실행할 수 있게 하므로 틀렸다.
      선택지 3: 프로세스가 참조하는 가상주소와 메모리의 실주소는 분리되므로 동일하다는 설명은 틀렸다.
      선택지 4: 가상주소를 실주소로 변환하는 주소 사상이 필요하므로 정답이다.

      핵심 개념:
      가상 메모리는 프로세스에 실제 메모리와 분리된 논리적 주소 공간을 제공한다.
      필요한 부분만 메모리에 올리고 나머지는 보조기억장치에 둘 수 있다.
      이 때문에 실제 메모리보다 큰 프로그램도 실행할 수 있다.
      주소 변환은 MMU와 페이지/세그먼트 사상표를 통해 수행된다.
    tags: [virtual-memory]

  - id: e18-14
    type: multiple-choice
    prompt: 가상 메모리 관리기법 중 페이징 기법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '페이지의 크기는 모두 동일' }
      - { id: '2', text: '외부 단편화가 발생할 수 있음' }
      - { id: '3', text: '페이지의 크기는 논리적 측면과 관련 있음' }
      - { id: '4', text: '사상표에 페이지의 길이를 저장함' }
    answers: ['1']
    explanation: |
      선택지 1: 페이징은 논리 주소 공간을 같은 크기의 페이지로 나누므로 정답이다.
      선택지 2: 페이징은 고정 크기 페이지와 프레임을 사용해 외부 단편화를 없애는 방식이므로 틀렸다.
      선택지 3: 페이지 크기는 논리적 프로그램 단위가 아니라 하드웨어와 시스템 설계의 고정 크기 단위에 가깝다.
      선택지 4: 페이지 사상표에는 페이지가 올라간 프레임 번호 등이 저장되며 페이지 길이를 저장하는 것은 세그먼테이션 설명에 가깝다.

      핵심 개념:
      페이징은 가상주소 공간을 페이지로, 물리 메모리를 같은 크기의 프레임으로 나눈다.
      페이지와 프레임 크기가 같기 때문에 임의의 빈 프레임에 페이지를 배치할 수 있다.
      외부 단편화는 발생하지 않지만 마지막 페이지 안쪽의 내부 단편화는 생길 수 있다.
      세그먼테이션은 가변 길이 논리 단위를 사용한다는 점에서 페이징과 다르다.
    tags: [virtual-memory, paging]

  - id: e18-15
    type: multiple-choice
    passageRefs: [g18-page-reference-01, g18-page-reference-timeline-01]
    prompt: FIFO 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['1']
    explanation: |
      선택지 1: 시간 4까지 프레임에 A, B, C가 있고 A가 가장 먼저 적재되었으므로 FIFO의 시간 5 교체 대상이다.
      선택지 2: B는 A보다 늦게 적재되었으므로 FIFO 기준에서 먼저 나가지 않는다.
      선택지 3: C도 A보다 늦게 들어온 페이지이므로 시간 5의 첫 교체 대상이 아니다.
      선택지 4: D는 시간 5에 새로 들어올 페이지이지 기존 프레임 안에서 교체될 페이지가 아니므로 답이 아니다.

      핵심 개념:
      FIFO 페이지 교체는 메모리에 가장 먼저 들어온 페이지를 가장 먼저 내보낸다.
      참조 횟수나 최근 사용 여부는 고려하지 않고 적재 시점만 비교한다.
      페이지 참조표에서는 각 시간까지 프레임에 들어온 순서를 추적해야 한다.
      시간 5에 새 페이지를 넣어야 하면 가장 오래 머문 A가 교체된다.
    tags: [virtual-memory, page-replacement]

  - id: e18-16
    type: multiple-choice
    passageRefs: [g18-page-reference-01, g18-page-reference-timeline-01]
    prompt: LRU 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['1']
    explanation: |
      선택지 1: 시간 4까지 최근 사용 시점이 A는 1, B는 4, C는 3이므로 가장 오래 사용되지 않은 A가 LRU 교체 대상이다.
      선택지 2: B는 시간 4에 가장 최근 사용된 페이지이므로 LRU에서 교체되지 않는다.
      선택지 3: C는 시간 3에 사용되어 A보다 최근에 참조되었으므로 답이 아니다.
      선택지 4: D는 시간 5에 필요한 새 페이지이지 기존 프레임 안의 교체 대상이 아니다.

      핵심 개념:
      LRU는 Least Recently Used의 약자로 가장 오래 참조되지 않은 페이지를 교체한다.
      FIFO와 달리 메모리에 들어온 시점이 아니라 마지막 참조 시점을 비교한다.
      시간 5 직전의 프레임별 최근 참조 시간을 추적하면 교체 대상을 찾을 수 있다.
      이 문항에서는 A가 가장 오래 사용되지 않았으므로 A가 선택된다.
    tags: [virtual-memory, page-replacement]

  - id: e18-17
    type: multiple-choice
    prompt: 워킹세트 알고리즘에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '프로세스가 실행되어도 워킹세트의 크기는 변함 없음' }
      - { id: '2', text: '실행 중인 프로그램의 워킹세트를 메모리에 절반만 유지' }
      - { id: '3', text: '페이지 부재 비율을 증가시키기 위한 방법' }
      - { id: '4', text: '데닝(Denning)이 제안' }
    answers: ['4']
    explanation: |
      선택지 1: 워킹세트는 실행 구간과 지역성 변화에 따라 크기가 달라질 수 있으므로 틀렸다.
      선택지 2: 워킹세트를 절반만 유지하는 것이 아니라 현재 작업 집합 전체를 메모리에 유지하려는 접근이므로 틀렸다.
      선택지 3: 워킹세트 알고리즘은 페이지 부재 비율을 줄이고 스래싱을 방지하려는 방법이므로 틀렸다.
      선택지 4: 워킹세트 모델은 Denning이 제안한 것으로 알려져 있으므로 정답이다.

      핵심 개념:
      워킹세트는 일정 시간 창 안에서 프로세스가 최근 참조한 페이지들의 집합이다.
      프로그램은 지역성을 가지므로 특정 시점에 주로 사용하는 페이지 묶음이 존재한다.
      워킹세트를 메모리에 유지하면 페이지 부재와 스래싱을 줄일 수 있다.
      실행 단계가 바뀌면 참조 페이지도 바뀌므로 워킹세트 크기는 고정되지 않는다.
    tags: [virtual-memory, working-set]

  - id: e18-18
    type: multiple-choice
    prompt: 인터럽트 방법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: 'CPU만을 이용하여 입출력을 처리' }
      - { id: '2', text: '폴링 방식이므로 비효율적임' }
      - { id: '3', text: '어떤 장치가 다른 장치의 작업을 잠시 중단시키고 자신의 상태를 알림' }
      - { id: '4', text: 'CPU를 거치지 않고 입출력장치와 메모리 사이에 데이터를 전송' }
    answers: ['3']
    explanation: |
      선택지 1: CPU만 이용해 장치 상태를 계속 확인하는 방식은 프로그램 입출력 또는 폴링에 가까우므로 인터럽트 설명이 아니다.
      선택지 2: 폴링 방식이므로 비효율적이라는 설명은 인터럽트가 아니라 CPU가 반복 확인하는 방식의 특징이다.
      선택지 3: 장치가 CPU의 현재 작업 흐름을 잠시 중단시키고 자신의 상태나 완료 사실을 알리는 것이 인터럽트이므로 정답이다.
      선택지 4: CPU를 거치지 않고 장치와 메모리 사이에 데이터를 전송하는 방식은 DMA이므로 틀렸다.

      핵심 개념:
      인터럽트는 장치나 사건이 CPU에게 처리가 필요함을 알리는 메커니즘이다.
      CPU는 현재 작업을 잠시 중단하고 인터럽트 처리 루틴을 실행한 뒤 복귀한다.
      폴링은 CPU가 장치 상태를 반복 검사하는 방식이라 CPU 시간을 낭비할 수 있다.
      DMA는 대량 데이터 전송에서 CPU 개입을 줄이는 별도의 입출력 방식이다.
    tags: [io, interrupt]

  - id: e18-19
    type: multiple-choice
    prompt: CPU와 DMA 제어기가 동시에 메모리 액세스를 시도한 경우 CPU보다 DMA 제어기에 우선권을 부여하는 것을 의미하는 용어는?
    choices:
      - { id: '1', text: '인터럽트 방법' }
      - { id: '2', text: 'DMA 방법' }
      - { id: '3', text: '사이클 스틸링' }
      - { id: '4', text: '버퍼링' }
    answers: ['3']
    explanation: |
      선택지 1: 인터럽트 방법은 장치가 CPU에 상태 변화를 알리는 방식이므로 메모리 접근 우선권 용어가 아니다.
      선택지 2: DMA 방법은 장치와 메모리 사이 직접 전송 방식의 큰 분류이지만, 문항이 묻는 구체적 우선권 부여 용어는 아니다.
      선택지 3: DMA 제어기가 CPU의 메모리 사이클을 잠시 빌려 사용하는 것을 사이클 스틸링이라 하므로 정답이다.
      선택지 4: 버퍼링은 속도 차이를 임시 저장 공간으로 완화하는 방법이므로 메모리 버스 우선권과 다르다.

      핵심 개념:
      DMA는 CPU 대신 DMA 제어기가 장치와 메모리 사이 데이터 전송을 관리하는 방식이다.
      CPU와 DMA가 동시에 메모리에 접근하려 하면 버스 사용 우선순위를 정해야 한다.
      사이클 스틸링은 DMA가 CPU의 메모리 사이클 일부를 가져와 전송하는 방식이다.
      CPU 입장에서는 잠깐 지연이 생기지만 대량 입출력의 전체 효율은 높아질 수 있다.
    tags: [io, dma]

  - id: e18-20
    type: multiple-choice
    prompt: 자기디스크의 접근시간 구성요소 중 헤드를 움직여 지정된 트랙에 위치시키는 데 걸리는 시간을 의미하는 것은?
    choices:
      - { id: '1', text: '회전지연시간' }
      - { id: '2', text: '탐구시간' }
      - { id: '3', text: '전송시간' }
      - { id: '4', text: '응답시간' }
    answers: ['2']
    explanation: |
      선택지 1: 회전지연시간은 원하는 섹터가 헤드 아래로 올 때까지 디스크가 회전하기를 기다리는 시간이다.
      선택지 2: 탐구시간은 디스크 헤드를 지정된 트랙으로 이동시키는 데 걸리는 시간이므로 정답이다.
      선택지 3: 전송시간은 헤드가 위치한 뒤 실제 데이터가 이동하는 시간이다.
      선택지 4: 응답시간은 더 넓은 의미의 전체 지연을 가리킬 수 있지만 트랙 위치 이동 시간의 명칭은 아니다.

      핵심 개념:
      자기디스크 접근시간은 탐구시간, 회전지연시간, 전송시간 등으로 구성된다.
      탐구시간은 헤드 암을 원하는 트랙까지 움직이는 시간이다.
      회전지연시간은 원하는 블록이 헤드 아래에 올 때까지 기다리는 시간이다.
      디스크 스케줄링은 주로 탐구시간을 줄이기 위해 요청 순서를 조정한다.
    tags: [storage, disk]

  - id: e18-21
    type: multiple-choice
    prompt: 현재 10번 트랙에 디스크의 헤드가 위치해 있다. 트랙 접근 요구가 $15 \to 16 \to 9 \to 1$의 순서로 큐에 들어와 있을 때, SSTF 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '$15 \to 16 \to 9 \to 1$' }
      - { id: '2', text: '$9 \to 1 \to 15 \to 16$' }
      - { id: '3', text: '$1 \to 9 \to 15 \to 16$' }
      - { id: '4', text: '$9 \to 15 \to 16 \to 1$' }
    answers: ['4']
    explanation: |
      선택지 1: 큐 도착 순서 그대로 처리하는 순서에 가까우며 SSTF는 현재 위치에서 가장 가까운 요청을 먼저 고른다.
      선택지 2: 10에서 9를 먼저 고르는 것은 맞지만, 다음 위치 9에서 가장 가까운 것은 1이 아니라 15이므로 $9 \to 1 \to 15 \to 16$은 틀렸다.
      선택지 3: 1은 현재 10에서 가장 가까운 요청이 아니므로 첫 서비스 요청이 될 수 없다.
      선택지 4: 10에서 9, 9에서 15, 15에서 16, 마지막 1 순으로 가장 가까운 요청을 고르므로 $9 \to 15 \to 16 \to 1$이 정답이다.

      핵심 개념:
      SSTF는 Shortest Seek Time First로 현재 헤드 위치에서 탐구 거리가 가장 짧은 요청을 선택한다.
      요청을 하나 처리할 때마다 헤드 위치가 바뀌므로 매 단계에서 거리를 다시 계산한다.
      현재 10에서는 9가 가장 가깝고, 이후 9에서는 15가 1보다 가깝다.
      SSTF는 평균 탐구시간을 줄일 수 있지만 먼 요청이 오래 밀릴 수 있다.
    tags: [storage, disk-scheduling]

  - id: e18-22
    type: multiple-choice
    prompt: 현재 10번 트랙에 위치한 디스크의 헤드가 0번 트랙을 향해 움직이고 있다. 트랙 접근 요구가 $15 \to 16 \to 9 \to 1$의 순서로 큐에 들어와 있을 때, LOOK 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '$15 \to 16 \to 9 \to 1$' }
      - { id: '2', text: '$9 \to 1 \to 15 \to 16$' }
      - { id: '3', text: '$1 \to 9 \to 15 \to 16$' }
      - { id: '4', text: '$9 \to 15 \to 16 \to 1$' }
    answers: ['2']
    explanation: |
      선택지 1: 큐 입력 순서에 가까우며 현재 이동 방향인 0번 트랙 쪽을 우선하는 LOOK 규칙과 맞지 않는다.
      선택지 2: 현재 10에서 0번 트랙 방향으로 움직이므로 먼저 9, 1을 처리하고 방향을 바꿔 15, 16을 처리하므로 $9 \to 1 \to 15 \to 16$이 정답이다.
      선택지 3: 같은 방향의 요청은 현재 위치에서 가까운 9가 1보다 먼저 처리되므로 $1 \to 9 \to 15 \to 16$은 틀렸다.
      선택지 4: 9 다음에 바로 15로 방향을 바꾸면 1번 트랙 요청을 남기므로 LOOK의 진행 방향 처리 규칙과 맞지 않는다.

      핵심 개념:
      LOOK은 현재 진행 방향에 있는 요청들을 처리하다가 더 이상 요청이 없으면 방향을 바꾼다.
      SCAN처럼 물리적 끝 트랙까지 반드시 이동하지 않고 마지막 요청 지점에서 되돌아간다.
      현재 10에서 0 방향이면 10보다 작은 요청 9와 1을 먼저 처리한다.
      그 뒤 방향을 바꿔 15와 16을 오름차순으로 처리한다.
    tags: [storage, disk-scheduling]

  - id: e18-23
    type: multiple-choice
    prompt: 한 컴퓨터에서 작동하고 있는 애플리케이션이 다른 컴퓨터에 있는 프로시저를 호출할 수 있도록 하는 클라이언트/서버 메커니즘은?
    choices:
      - { id: '1', text: 'NUMA' }
      - { id: '2', text: 'RPC' }
      - { id: '3', text: 'DFS' }
      - { id: '4', text: 'DAC' }
    answers: ['2']
    explanation: |
      선택지 1: NUMA는 Non-Uniform Memory Access의 약자로, 메모리 접근 시간이 위치에 따라 달라지는 구조이므로 원격 프로시저 호출이 아니다.
      선택지 2: RPC는 Remote Procedure Call의 약자로, 다른 컴퓨터의 프로시저를 로컬 프로시저처럼 호출하게 하는 클라이언트/서버 메커니즘이므로 정답이다.
      선택지 3: DFS는 Distributed File System의 약자로, 원격 파일 접근을 제공하는 기술이지 프로시저 호출 메커니즘이 아니다.
      선택지 4: DAC는 Discretionary Access Control의 약자로, 임의적 접근제어라는 보안 정책의 한 종류이므로 분산 호출 기법과 다르다.

      핵심 개념:
      RPC는 Remote Procedure Call의 약자로 원격 프로시저 호출을 뜻한다.
      클라이언트는 네트워크 통신 세부사항을 직접 다루지 않고 함수 호출 형태로 서버 기능을 사용한다.
      스텁과 런타임이 인자 변환, 메시지 송수신, 결과 반환을 처리한다.
      NUMA는 메모리 구조, DFS는 파일 시스템, DAC는 접근제어 정책이므로 RPC와 범주가 다르다.
    tags: [distributed-system, rpc]

  - id: e18-24
    type: multiple-choice
    prompt: 운영체제 보안의 기본 목표와 그 설명이 바르게 짝지어진 것은?
    choices:
      - { id: '1', text: '무결성 - 모든 주체는 합법적인 경우에는 항상 객체에 접근이 가능해야 함' }
      - {
          id: '2',
          text: '가용성 - 비인가 주체에 의한 자원의 생성, 변경, 삭제 등으로부터 자원을 보호',
        }
      - { id: '3', text: '기밀성 - 운영체제 자원의 부적절한 노출을 예방하고 감지' }
      - { id: '4', text: '접근제어 - 컴퓨터 시스템에 발생한 모든 중요한 사건을 영구적으로 기록' }
    answers: ['3']
    explanation: |
      선택지 1: 합법적인 주체가 항상 객체에 접근 가능해야 한다는 설명은 가용성에 해당하므로 무결성과 짝이 맞지 않는다.
      선택지 2: 비인가 변경, 생성, 삭제로부터 자원을 보호하는 것은 무결성에 해당하므로 가용성과 짝이 맞지 않는다.
      선택지 3: 기밀성은 운영체제 자원이 부적절하게 노출되는 것을 예방하고 감지하는 목표이므로 정답이다.
      선택지 4: 중요한 사건을 영구적으로 기록하는 것은 감사에 해당하며 접근제어의 정의가 아니다.

      핵심 개념:
      운영체제 보안의 기본 목표는 기밀성, 무결성, 가용성으로 요약된다.
      기밀성은 인가되지 않은 정보 노출을 막는 것이다.
      무결성은 허가 없는 생성, 변경, 삭제로부터 시스템과 데이터를 보호한다.
      가용성은 인가된 사용자가 필요할 때 자원과 서비스를 사용할 수 있게 하는 성질이다.
    tags: [security]

  - id: e18-25
    type: multiple-choice
    prompt: 권한은 역할과 관련이 있으며, 사용자들은 역할의 한 멤버가 됨으로써 권한을 배정받게 되는 보안 정책은?
    choices:
      - { id: '1', text: '임의적 접근제어' }
      - { id: '2', text: '강제적 접근제어' }
      - { id: '3', text: '역할 기반 접근제어' }
      - { id: '4', text: '최소권한' }
    answers: ['3']
    explanation: |
      선택지 1: 임의적 접근제어(DAC)는 객체 소유자나 주체의 재량에 따라 접근 권한을 부여하는 방식이므로 역할 중심 설명과 다르다.
      선택지 2: 강제적 접근제어(MAC)는 보안 등급과 정책에 따라 접근을 통제하므로 사용자 역할 멤버십 중심 방식이 아니다.
      선택지 3: 역할 기반 접근제어(RBAC)는 역할에 권한을 연결하고 사용자를 역할의 멤버로 배정하므로 정답이다.
      선택지 4: 최소권한은 필요한 최소 권한만 부여해야 한다는 원칙이지 역할을 통해 권한을 배정하는 정책명은 아니다.

      핵심 개념:
      RBAC는 사용자, 역할, 권한을 분리해 관리하는 접근제어 방식이다.
      권한은 개별 사용자에게 직접 붙이기보다 역할에 부여된다.
      사용자는 하나 이상의 역할에 배정됨으로써 해당 역할의 권한을 얻는다.
      조직의 직무나 책임 단위로 권한을 관리하기 쉬워 대규모 시스템에서 유용하다.
