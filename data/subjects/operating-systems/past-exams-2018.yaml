subjectId: operating-systems
sourceId: past-exams-2018
title: 운영체제 2018 기출
kind: exam
year: 2018

passages:
  - id: g18-pv-definition-01
    type: code
    language: text
    body: |
      P(s):
        if (s > 0) then
          (가)
        else
          현재의 프로세스 대기

      V(s):
        if (1개 이상의 프로세스 대기 중) then
          그 중 1개의 프로세스만 진행;
        else
          (나)

  - id: g18-rag-01
    type: image
    image:
      path: images/subjects/operating-systems/past-exams/2018/e18-rag.png
      alt: 2018년 운영체제 기출 43번 자원할당 그래프

  - id: g18-free-list-01
    type: image
    image:
      path: images/subjects/operating-systems/past-exams/2018/e18-free-list.png
      alt: 2018년 운영체제 기출 45~46번 빈 공간 리스트

  - id: g18-page-reference-01
    type: image
    image:
      path: images/subjects/operating-systems/past-exams/2018/e18-page-reference.png
      alt: 2018년 운영체제 기출 50~51번 페이지 참조 표

questions:
  - id: e18-01
    type: multiple-choice
    prompt: 프로세스 동기화에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '2개 이상의 프로세스에 대한 처리순서를 결정하는 것' }
      - { id: '2', text: '동시에 사용할 수 없는 공유자원이 있는 경우 동기화 필요' }
      - { id: '3', text: '한 프로세스의 처리 결과에 따라 다른 프로세스의 처리가 영향을 받는 경우 동기화 필요' }
      - { id: '4', text: '한 프로세스 내의 프로그램 문장 사이의 처리순서를 결정하는 것' }
    answers: ['4']
    explanation: 프로세스 동기화는 둘 이상의 프로세스 사이의 실행 순서와 공유자원 접근을 조정하는 개념이다.
    tags: [process, synchronization]

  - id: e18-02
    type: multiple-choice
    prompt: Test-and-Set(lock) 명령에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '원자적으로 수행됨' }
      - { id: '2', text: 'lock이 참이었다면 Test-and-Set의 반환값은 거짓임' }
      - { id: '3', text: 'lock이 거짓이었다면 프로세스는 임계영역에 들어가게 됨' }
      - { id: '4', text: '많은 프로세스가 임계영역에 들어가기를 원할 때 기아가 발생할 수 있음' }
    answers: ['2']
    explanation: Test-and-Set은 lock의 이전 값을 반환하고 lock을 참으로 설정하므로, lock이 참이었다면 반환값도 참이다.
    tags: [synchronization, mutual-exclusion]

  - id: e18-03
    type: multiple-choice
    passageRefs: [g18-pv-definition-01]
    prompt: 세마포어 s에 대한 연산 P(s)와 V(s)의 정의에서 (가)와 (나)에 들어갈 내용으로 바른 것은?
    choices:
      - { id: '1', text: '(가) s := s + 1; (나) s := s + 1;' }
      - { id: '2', text: '(가) s := s + 1; (나) s := s - 1;' }
      - { id: '3', text: '(가) s := s - 1; (나) s := s + 1;' }
      - { id: '4', text: '(가) s := s - 1; (나) s := s - 1;' }
    answers: ['3']
    explanation: P 연산은 사용 가능한 자원이 있으면 s를 감소시키고, V 연산은 대기 프로세스가 없으면 s를 증가시킨다.
    tags: [semaphore]

  - id: e18-04
    type: multiple-choice
    prompt: 공유 기억장치를 통해 프로세스 사이의 통신을 하는 방법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '공유 변수가 통신에 사용됨' }
      - { id: '2', text: '속도가 느려 소량의 데이터 교환에 유용' }
      - { id: '3', text: '통신기능 제공의 책임은 운영체제에 있음' }
      - { id: '4', text: 'send/receive와 같은 메시지 전달 명령이 사용됨' }
    answers: ['1']
    explanation: 공유 기억장치 방식에서는 여러 프로세스가 접근 가능한 공유 변수나 공유 메모리 영역을 통해 데이터를 교환한다.
    tags: [ipc, shared-memory]

  - id: e18-05
    type: multiple-choice
    prompt: 메시지 시스템 기법에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '직접 통신은 메시지 전달 연산에 수신자나 송신자의 이름을 명시' }
      - { id: '2', text: '간접 통신은 메시지 전달 연산에 우편함 이름을 명시' }
      - { id: '3', text: '메시지를 주고받기 위한 연결통로를 통신 링크라 함' }
      - { id: '4', text: '통신 링크의 최대용량이 0인 경우 동기화가 필요하지 않음' }
    answers: ['4']
    explanation: 링크 용량이 0이면 송신자와 수신자가 동시에 rendezvous해야 하므로 강한 동기화가 필요하다.
    tags: [ipc, message-passing]

  - id: e18-06
    type: multiple-choice
    prompt: 2개 이상의 프로세스가 서로 상대방의 작업이 끝나기만을 기다리고 있는 상태를 일컫는 용어는?
    choices:
      - { id: '1', text: '임계영역' }
      - { id: '2', text: '인터럽트' }
      - { id: '3', text: '교착상태' }
      - { id: '4', text: '기아상태' }
    answers: ['3']
    explanation: 둘 이상의 프로세스가 서로가 가진 자원이나 작업 완료를 기다려 더 이상 진행하지 못하는 상태가 교착상태이다.
    tags: [deadlock]

  - id: e18-07
    type: multiple-choice
    prompt: 교착상태의 필요조건에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '상호배제 - 프로세스들이 자원에 대한 배타적인 통제권을 요구' }
      - { id: '2', text: '점유 대기 - 프로세스 A가 자원 S를 할당받아 배타적으로 점유한 채 프로세스 B가 점유 중인 자원 T가 해제되기를 기다리는 상황' }
      - { id: '3', text: '선점 - 프로세스에 할당된 자원은 그 프로세스 스스로 반환하기 전이라도 제거 가능' }
      - { id: '4', text: '환형 대기 - 프로세스의 자원 점유 및 점유된 자원의 요구 관계가 환형을 이루며 대기' }
    answers: ['3']
    explanation: 교착상태의 필요조건은 비선점이다. 선점이 가능하면 교착상태를 깨뜨릴 수 있다.
    tags: [deadlock]

  - id: e18-08
    type: multiple-choice
    passageRefs: [g18-rag-01]
    prompt: 자원할당 그래프에서 간선을 하나만 제거했을 때 여전히 교착상태가 되는 간선은?
    choices:
      - { id: '1', text: '(ㄱ)' }
      - { id: '2', text: '(ㄴ)' }
      - { id: '3', text: '(ㄷ)' }
      - { id: '4', text: '(ㄹ)' }
    answers: ['4']
    explanation: p1-r2-p2-r1-p1로 이어지는 순환 대기는 (ㄹ) p2의 r3 요청과 무관하므로 해당 간선을 제거해도 교착상태가 남는다.
    tags: [deadlock, resource-allocation-graph]

  - id: e18-09
    type: multiple-choice
    prompt: 교착상태 회피 기법에서 어떠한 요청이 들어왔을 때 요청받은 자원을 할당해도 문제가 없는 경우는?
    choices:
      - { id: '1', text: '자원을 할당하면 안전순서열이 존재하지 않게 되는 경우' }
      - { id: '2', text: '자원을 할당해도 안전상태가 유지되는 경우' }
      - { id: '3', text: '현재 상태가 불안전상태인 경우' }
      - { id: '4', text: '현재 상태가 안전상태인 경우' }
    answers: ['2']
    explanation: 교착상태 회피에서는 요청을 가정해 할당한 후에도 안전상태가 유지될 때만 실제로 할당한다.
    tags: [deadlock, avoidance]

  - id: e18-10
    type: multiple-choice
    passageRefs: [g18-free-list-01]
    prompt: 최초 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['1']
    explanation: 최초 적합은 처음 만나는 충분한 공간을 선택하므로 11MB를 수용할 수 있는 공백 1에 할당한다.
    tags: [memory-management, allocation]

  - id: e18-11
    type: multiple-choice
    passageRefs: [g18-free-list-01]
    prompt: 최적 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['2']
    explanation: 11MB를 수용할 수 있는 공간 중 가장 작은 공간은 15MB인 공백 2이다.
    tags: [memory-management, allocation]

  - id: e18-12
    type: multiple-choice
    prompt: 접근속도에 따라 기억장치를 계층적으로 바르게 구성한 것은?
    choices:
      - { id: '1', text: '레지스터, 캐시 기억장치, 메모리, 보조기억장치' }
      - { id: '2', text: '보조기억장치, 메모리, 캐시 기억장치, 레지스터' }
      - { id: '3', text: '레지스터, 보조기억장치, 메모리, 캐시 기억장치' }
      - { id: '4', text: '캐시 기억장치, 레지스터, 메모리, 보조기억장치' }
    answers: ['1']
    explanation: 접근속도는 일반적으로 레지스터가 가장 빠르고 캐시, 메모리, 보조기억장치 순으로 느려진다.
    tags: [memory-hierarchy]

  - id: e18-13
    type: multiple-choice
    prompt: 가상 메모리에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '네트워크로 연결된 다른 컴퓨터의 메모리를 사용해야 함' }
      - { id: '2', text: '메모리 크기보다 더 큰 기억공간이 필요한 프로세스를 실행할 수는 없음' }
      - { id: '3', text: '프로세스가 참조하는 주소와 메모리에서 사용하는 주소가 동일' }
      - { id: '4', text: '사상이 필요함' }
    answers: ['4']
    explanation: 가상 주소를 실제 메모리 주소로 변환하는 주소 사상이 필요하다.
    tags: [virtual-memory]

  - id: e18-14
    type: multiple-choice
    prompt: 가상 메모리 관리기법 중 페이징 기법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '페이지의 크기는 모두 동일' }
      - { id: '2', text: '외부 단편화가 발생할 수 있음' }
      - { id: '3', text: '페이지의 크기는 논리적 측면과 관련 있음' }
      - { id: '4', text: '사상표에 페이지의 길이를 저장함' }
    answers: ['1']
    explanation: 페이징에서는 논리 주소 공간과 물리 메모리를 고정 크기 페이지/프레임으로 나누므로 페이지 크기가 동일하다.
    tags: [virtual-memory, paging]

  - id: e18-15
    type: multiple-choice
    passageRefs: [g18-page-reference-01]
    prompt: FIFO 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['1']
    explanation: 시간 4까지 A, B, C가 적재되어 있고 FIFO에서는 가장 먼저 적재된 A를 교체한다.
    tags: [virtual-memory, page-replacement]

  - id: e18-16
    type: multiple-choice
    passageRefs: [g18-page-reference-01]
    prompt: LRU 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['1']
    explanation: 시간 4까지의 최근 사용 시점은 A가 1, B가 4, C가 3이므로 가장 오래 사용되지 않은 A를 교체한다.
    tags: [virtual-memory, page-replacement]

  - id: e18-17
    type: multiple-choice
    prompt: 워킹세트 알고리즘에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '프로세스가 실행되어도 워킹세트의 크기는 변함 없음' }
      - { id: '2', text: '실행 중인 프로그램의 워킹세트를 메모리에 절반만 유지' }
      - { id: '3', text: '페이지 부재 비율을 증가시키기 위한 방법' }
      - { id: '4', text: '데닝(Denning)이 제안' }
    answers: ['4']
    explanation: 워킹세트 모델은 Denning이 제안한 기법으로, 프로세스가 최근 사용한 페이지 집합을 메모리에 유지하려는 방법이다.
    tags: [virtual-memory, working-set]

  - id: e18-18
    type: multiple-choice
    prompt: 인터럽트 방법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: 'CPU만을 이용하여 입출력을 처리' }
      - { id: '2', text: '폴링 방식이므로 비효율적임' }
      - { id: '3', text: '어떤 장치가 다른 장치의 작업을 잠시 중단시키고 자신의 상태를 알림' }
      - { id: '4', text: 'CPU를 거치지 않고 입출력장치와 메모리 사이에 데이터를 전송' }
    answers: ['3']
    explanation: 인터럽트 방식에서는 장치가 CPU에 자신의 상태나 입출력 완료를 알려 필요한 처리를 요청한다.
    tags: [io, interrupt]

  - id: e18-19
    type: multiple-choice
    prompt: CPU와 DMA 제어기가 동시에 메모리 액세스를 시도한 경우 CPU보다 DMA 제어기에 우선권을 부여하는 것을 의미하는 용어는?
    choices:
      - { id: '1', text: '인터럽트 방법' }
      - { id: '2', text: 'DMA 방법' }
      - { id: '3', text: '사이클 스틸링' }
      - { id: '4', text: '버퍼링' }
    answers: ['3']
    explanation: 사이클 스틸링은 DMA 제어기가 CPU의 메모리 사이클을 빌려 메모리에 접근하는 방식이다.
    tags: [io, dma]

  - id: e18-20
    type: multiple-choice
    prompt: 자기디스크의 접근시간 구성요소 중 헤드를 움직여 지정된 트랙에 위치시키는 데 걸리는 시간을 의미하는 것은?
    choices:
      - { id: '1', text: '회전지연시간' }
      - { id: '2', text: '탐구시간' }
      - { id: '3', text: '전송시간' }
      - { id: '4', text: '응답시간' }
    answers: ['2']
    explanation: 탐구시간(seek time)은 디스크 헤드를 원하는 트랙으로 이동시키는 데 걸리는 시간이다.
    tags: [storage, disk]

  - id: e18-21
    type: multiple-choice
    prompt: 현재 10번 트랙에 디스크의 헤드가 위치해 있다. 트랙 접근 요구가 15 -> 16 -> 9 -> 1의 순서로 큐에 들어와 있을 때, SSTF 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '15 -> 16 -> 9 -> 1' }
      - { id: '2', text: '9 -> 1 -> 15 -> 16' }
      - { id: '3', text: '1 -> 9 -> 15 -> 16' }
      - { id: '4', text: '9 -> 15 -> 16 -> 1' }
    answers: ['4']
    explanation: 현재 10에서 가장 가까운 9를 먼저 처리하고, 이후 15, 16, 1 순으로 가장 가까운 요청을 선택한다.
    tags: [storage, disk-scheduling]

  - id: e18-22
    type: multiple-choice
    prompt: 현재 10번 트랙에 위치한 디스크의 헤드가 0번 트랙을 향해 움직이고 있다. 트랙 접근 요구가 15 -> 16 -> 9 -> 1의 순서로 큐에 들어와 있을 때, LOOK 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - { id: '1', text: '15 -> 16 -> 9 -> 1' }
      - { id: '2', text: '9 -> 1 -> 15 -> 16' }
      - { id: '3', text: '1 -> 9 -> 15 -> 16' }
      - { id: '4', text: '9 -> 15 -> 16 -> 1' }
    answers: ['2']
    explanation: LOOK은 현재 진행 방향의 요청을 끝까지 처리한 뒤 방향을 바꾸므로 9, 1을 처리한 다음 15, 16을 처리한다.
    tags: [storage, disk-scheduling]

  - id: e18-23
    type: multiple-choice
    prompt: 한 컴퓨터에서 작동하고 있는 애플리케이션이 다른 컴퓨터에 있는 프로시저를 호출할 수 있도록 하는 클라이언트/서버 메커니즘은?
    choices:
      - { id: '1', text: 'NUMA' }
      - { id: '2', text: 'RPC' }
      - { id: '3', text: 'DFS' }
      - { id: '4', text: 'DAC' }
    answers: ['2']
    explanation: RPC(Remote Procedure Call)는 원격 시스템의 프로시저를 로컬 호출처럼 사용할 수 있게 하는 클라이언트/서버 메커니즘이다.
    tags: [distributed-system, rpc]

  - id: e18-24
    type: multiple-choice
    prompt: 운영체제 보안의 기본 목표와 그 설명이 바르게 짝지어진 것은?
    choices:
      - { id: '1', text: '무결성 - 모든 주체는 합법적인 경우에는 항상 객체에 접근이 가능해야 함' }
      - { id: '2', text: '가용성 - 비인가 주체에 의한 자원의 생성, 변경, 삭제 등으로부터 자원을 보호' }
      - { id: '3', text: '기밀성 - 운영체제 자원의 부적절한 노출을 예방하고 감지' }
      - { id: '4', text: '접근제어 - 컴퓨터 시스템에 발생한 모든 중요한 사건을 영구적으로 기록' }
    answers: ['3']
    explanation: 기밀성은 인가되지 않은 노출을 막는 보안 목표이다. 접근 가능성은 가용성, 무단 변경 방지는 무결성, 기록은 감사에 가깝다.
    tags: [security]

  - id: e18-25
    type: multiple-choice
    prompt: 권한은 역할과 관련이 있으며, 사용자들은 역할의 한 멤버가 됨으로써 권한을 배정받게 되는 보안 정책은?
    choices:
      - { id: '1', text: '임의적 접근제어' }
      - { id: '2', text: '강제적 접근제어' }
      - { id: '3', text: '역할 기반 접근제어' }
      - { id: '4', text: '최소권한' }
    answers: ['3']
    explanation: 역할 기반 접근제어(RBAC)는 사용자에게 직접 권한을 주기보다 역할에 권한을 부여하고 사용자를 역할에 배정한다.
    tags: [security, access-control]
