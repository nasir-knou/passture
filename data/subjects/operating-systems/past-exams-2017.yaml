    answers: ['4']
    explanation: |
      선택지 1: 접근속도는 레지스터에서 보조기억장치로 갈수록 느려지는 계층구조의 대표 특징이다.
      선택지 2: 비트당 기억장치 비용은 상위 계층일수록 높고 하위 계층일수록 낮아지는 특성이다.
      선택지 3: 용량은 보통 상위 계층에서 작고 하위 계층으로 갈수록 커지는 특성이다.
