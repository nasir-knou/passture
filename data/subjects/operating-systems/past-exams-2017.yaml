    passageRefs: [g17-page-reference-01, g17-page-reference-timeline-01]
    prompt: LRU 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['2']
    explanation: |
      선택지 1: A는 시간 3에 사용되어 B보다 최근에 사용되었으므로 LRU 교체 대상이 아니다.
      선택지 2: B는 시간 2 이후 가장 오래 사용되지 않은 페이지이므로 LRU 기준 교체 대상이 되어 정답이다.
      선택지 3: C는 시간 4에 가장 최근 사용된 페이지라 LRU로 교체하지 않는다.
      선택지 4: D는 새로 참조되는 페이지이며 기존 프레임 안에서 교체될 페이지가 아니다.

      핵심 개념:
