      선택지 2: B는 A보다 늦게 적재되었으므로 FIFO 기준의 첫 교체 대상이 아니다.
      선택지 3: C는 시간 4에 적재된 페이지라 FIFO에서 가장 오래된 페이지가 아니다.
      선택지 4: D는 시간 5에 참조되는 새 페이지로, 교체 대상인 기존 프레임 안의 페이지가 아니다.

      핵심 개념:
      FIFO 페이지 교체는 적재된 순서만 기준으로 한다.
      가장 오래 전에 들어온 페이지가 가장 먼저 나간다.
