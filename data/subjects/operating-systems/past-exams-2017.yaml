  - id: e17-17
    type: multiple-choice
    prompt: 다음 중 장치의 입출력 처리 유형과 거리가 먼 것은? (3점)
    choices:
      - { id: '1', text: '프로그램 방법' }
      - { id: '2', text: '인터럽트 방법' }
      - { id: '3', text: '$DMA$ 방법' }
      - { id: '4', text: '$RPC$ 방법' }
    answers: ['4']
    explanation: |
      선택지 1: 프로그램 방법은 CPU가 장치 상태를 확인하며 입출력을 처리하는 방식이므로 입출력 처리 유형이다.
      선택지 2: 인터럽트 방법은 장치가 완료 시점을 CPU에 알리는 방식이므로 입출력 처리 유형이다.
      선택지 3: $DMA$ 방법은 장치와 메모리 사이 전송을 전담 장치가 수행하는 방식이므로 입출력 처리 유형이다.
      선택지 4: $RPC$는 원격 프로시저 호출로 분산 시스템 통신 개념이며 장치 입출력 처리 유형이 아니므로 정답이다.

      핵심 개념:
      입출력 처리 방식에는 프로그램 입출력, 인터럽트 기반 입출력, DMA가 있다.
      프로그램 방법은 CPU 관여가 크고, 인터럽트는 대기 낭비를 줄인다.
      DMA는 대량 데이터 전송에서 CPU 부담을 줄인다.
      RPC는 네트워크상의 원격 호출을 지역 호출처럼 사용하는 기법이다.
    tags: [io]

  - id: e17-18
    type: multiple-choice
    prompt: 스풀링에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '프로세스와 저속 입출력장치 사이에 위치' }
      - { id: '2', text: '일종의 버퍼링' }
      - { id: '3', text: '입출력 작업이 빨리 끝나게 할 수 있음' }
      - { id: '4', text: '가상장치를 전용장치로 변화시켜 줌' }
    answers: ['4']
    explanation: |
      선택지 1: 스풀링은 프로세스와 저속 입출력장치 사이에서 작업을 임시 저장하므로 올바른 설명이다.
      선택지 2: 스풀링은 디스크 등을 이용해 입출력 데이터를 완충하는 버퍼링 성격을 가진다.
      선택지 3: 작업을 장치가 처리할 순서로 모아 두어 프로세스 입장에서는 입출력 대기 시간을 줄일 수 있다.
      선택지 4: 스풀링은 전용장치를 가상장치처럼 공유하게 하는 기법이지, 가상장치를 전용장치로 바꾸는 것이 아니므로 정답이다.

      핵심 개념:
      스풀링은 저속 입출력장치와 프로세스 사이에 보조기억장치를 두는 기법이다.
      대표 예는 프린터 출력 작업을 디스크 큐에 모아 두는 방식이다.
      여러 프로세스가 하나의 전용장치를 공유 가능한 것처럼 사용할 수 있다.
      방향은 전용장치의 가상화이지, 가상장치의 전용장치화가 아니다.
    tags: [io, spooling]

  - id: e17-19
    type: multiple-choice
    prompt: 다음 중 초기 접근시간이 굉장히 오래 걸리는 저장장치는?
    choices:
      - { id: '1', text: 'SSD' }
      - { id: '2', text: '테이프 장치' }
      - { id: '3', text: '광 디스크' }
      - { id: '4', text: '자기 디스크' }
    answers: ['2']
    explanation: |
      선택지 1: SSD는 전자식 저장장치로 임의 접근이 빠르며 초기 접근시간이 매우 긴 장치가 아니다.
      선택지 2: 테이프 장치는 순차 접근 방식이라 원하는 위치까지 감거나 이동해야 하므로 초기 접근시간이 길어 정답이다.
      선택지 3: 광 디스크는 회전 지연과 탐색이 있지만 테이프처럼 강한 순차 접근 장치는 아니다.
      선택지 4: 자기 디스크는 탐구시간과 회전지연이 있으나 테이프보다 임의 접근성이 높다.

      핵심 개념:
      저장장치는 접근 방식에 따라 임의 접근과 순차 접근으로 구분할 수 있다.
      테이프 장치는 순차 접근 특성이 강해 중간 위치로 바로 이동하기 어렵다.
      디스크와 SSD는 상대적으로 임의 접근에 적합하다.
      따라서 초기 접근시간이 특히 긴 장치는 테이프 장치이다.
    tags: [storage]

  - id: e17-20
    type: multiple-choice
    prompt: 디스크 접근시간이란?
    choices:
      - { id: '1', text: '탐구시간 + 전송시간' }
      - { id: '2', text: '회전지연시간 + 전송시간' }
      - { id: '3', text: '탐구시간 + 회전지연시간 + 전송시간' }
      - { id: '4', text: '탐구시간 + 회전지연시간' }
    answers: ['3']
    explanation: |
      선택지 1: 탐구시간과 전송시간만으로는 원하는 섹터가 헤드 아래 올 때까지 기다리는 회전지연시간이 빠져 있다.
      선택지 2: 회전지연시간과 전송시간만으로는 헤드를 해당 트랙으로 이동시키는 탐구시간이 빠져 있다.
      선택지 3: 탐구시간, 회전지연시간, 전송시간을 모두 포함하므로 디스크 접근시간의 올바른 구성이라 정답이다.
      선택지 4: 탐구시간과 회전지연시간만으로는 실제 데이터를 읽거나 쓰는 전송시간이 빠져 있다.

      핵심 개념:
      디스크 접근시간은 요청한 데이터에 도달하고 전송을 완료하는 데 걸리는 시간이다.
      탐구시간은 헤드를 원하는 트랙으로 이동하는 시간이다.
      회전지연시간은 원하는 섹터가 헤드 아래로 올 때까지 기다리는 시간이다.
      전송시간은 실제 데이터가 이동하는 시간이다.
    tags: [storage, disk]

  - id: e17-21
    type: multiple-choice
    prompt: 다음 중 최적화의 대상이 다른 하나는?
    choices:
      - { id: '1', text: 'SSTF' }
      - { id: '2', text: 'SCAN' }
      - { id: '3', text: 'LOOK' }
      - { id: '4', text: 'SLTF' }
    answers: ['4']
    explanation: |
      선택지 1: SSTF(Shortest Seek Time First)는 현재 헤드 위치에서 가장 가까운 트랙 요청을 먼저 처리해 탐구시간을 줄이는 방식이다.
      선택지 2: SCAN은 엘리베이터 스케줄링처럼 헤드가 한 방향으로 이동하며 요청을 처리하므로 탐구시간 최적화 계열이다.
      선택지 3: LOOK은 요청이 있는 범위까지만 이동하는 SCAN 변형으로 탐구시간 최적화 계열이다.
      선택지 4: SLTF(Shortest Latency Time First)는 회전 지연시간을 줄이는 관점의 스케줄링이므로 다른 세 선택지와 최적화 대상이 달라 정답이다.

      핵심 개념:
      디스크 스케줄링은 접근시간의 여러 요소 중 무엇을 줄일지에 따라 구분된다.
      SSTF, SCAN, LOOK은 헤드 이동 거리, 즉 탐구시간을 줄이는 데 초점을 둔다.
      SLTF는 Shortest Latency Time First로 회전 지연시간을 고려한다.
      따라서 SLTF는 최적화 대상이 다른 선택지이다.
    tags: [storage, disk-scheduling]

  - id: e17-22
    type: multiple-choice
    prompt: 분산 시스템의 목적으로 바른 것은?
    choices:
      - { id: '1', text: '자원 독점' }
      - { id: '2', text: '연산속도 향상' }
      - { id: '3', text: '신뢰성 저하' }
      - { id: '4', text: '통신의 복잡성' }
    answers: ['2']
    explanation: |
      선택지 1: 분산 시스템은 자원 독점이 아니라 여러 컴퓨터와 사용자가 자원을 공유하도록 하는 것이 목적이다.
      선택지 2: 여러 시스템에 작업을 나누어 처리하면 연산속도를 향상할 수 있으므로 정답이다.
      선택지 3: 분산 시스템은 중복성과 장애 대처를 통해 신뢰성 향상을 목표로 하므로 신뢰성 저하는 목적이 아니다.
      선택지 4: 통신의 복잡성은 분산 시스템의 비용이나 문제점이지 달성하려는 목적이 아니다.

      핵심 개념:
      분산 시스템은 네트워크로 연결된 여러 컴퓨터가 하나의 시스템처럼 협력하는 구조이다.
      주요 목적은 자원 공유, 성능 향상, 신뢰성 향상이다.
      작업을 분산하면 처리량과 응답 성능을 높일 수 있다.
      다만 통신 복잡성, 동기화, 장애 처리 같은 관리 문제가 생긴다.
    tags: [distributed-system]

  - id: e17-23
    type: multiple-choice
    prompt: 분산 시스템의 네트워크 구성 중 구축비용은 많이 들지만 통신비용과 가용성 측면에서 가장 좋은 것은?
    choices:
      - { id: '1', text: '완전 연결 네트워크' }
      - { id: '2', text: '트리 구조 네트워크' }
      - { id: '3', text: '스타형 네트워크' }
      - { id: '4', text: '링형 네트워크' }
    answers: ['1']
    explanation: |
      선택지 1: 완전 연결 네트워크는 모든 노드 쌍이 직접 연결되어 통신비용과 가용성 측면에서 가장 유리하므로 정답이다.
      선택지 2: 트리 구조는 구축비용은 상대적으로 낮지만 상위 링크 장애에 취약하고 경로가 제한된다.
      선택지 3: 스타형 네트워크는 중앙 노드 의존성이 커서 중앙 장애 시 전체 가용성이 떨어진다.
      선택지 4: 링형 네트워크는 인접 노드 중심으로 연결되어 완전 연결보다 통신 경로와 가용성이 제한된다.

      핵심 개념:
      네트워크 토폴로지는 구축비용, 통신비용, 가용성 사이의 절충을 갖는다.
      완전 연결은 링크 수가 많아 설치 비용이 크다.
      대신 두 노드 사이 직접 통신이 가능하고 대체 경로도 많다.
      따라서 비용을 제외하면 통신 성능과 장애 대처 측면에서 가장 좋다.
    tags: [distributed-system, network]

  - id: e17-24
    type: multiple-choice
    prompt: 컴퓨터 시스템에 중요한 사건이 발생하면 즉시 시스템의 안전한 곳에 자동적으로 기록하는 것을 의미하는 보안 정책은?
    choices:
      - { id: '1', text: '권한부여' }
      - { id: '2', text: '접근제어' }
      - { id: '3', text: '감사' }
      - { id: '4', text: '최소권한' }
    answers: ['3']
    explanation: |
      선택지 1: 권한부여는 사용자가 어떤 작업을 할 수 있는지 권한을 부여하는 정책이지 사건 기록 자체가 아니다.
      선택지 2: 접근제어는 주체가 객체에 접근할 수 있는지 제한하는 정책으로, 자동 기록을 의미하지 않는다.
      선택지 3: 감사는 중요한 사건을 안전한 곳에 기록해 추적과 검토가 가능하게 하므로 정답이다.
      선택지 4: 최소권한은 필요한 최소 권한만 부여하는 원칙이며 시스템 사건 기록과는 다른 개념이다.

      핵심 개념:
      감사는 보안상 중요한 이벤트를 기록하고 나중에 확인할 수 있게 하는 기능이다.
      기록은 침입 탐지, 사고 분석, 책임 추적에 활용된다.
      접근제어와 권한부여는 접근 가능 여부를 결정하는 정책이다.
      최소권한은 피해 범위를 줄이기 위한 권한 부여 원칙이다.
    tags: [security]

  - id: e17-25
    type: multiple-choice
    prompt: 다음 하드웨어 중 기준 레지스터와 한계 레지스터를 이용하여 주소의 범위를 지정하는 방법으로 보호하는 대상은?
    choices:
      - { id: '1', text: '메모리' }
      - { id: '2', text: '입력장치' }
      - { id: '3', text: 'CPU' }
      - { id: '4', text: '출력장치' }
    answers: ['1']
    explanation: |
      선택지 1: 기준 레지스터와 한계 레지스터는 프로세스가 접근 가능한 주소 범위를 제한해 메모리를 보호하므로 정답이다.
      선택지 2: 입력장치는 주소 범위 제한 레지스터로 보호하는 대표 대상이 아니다.
      선택지 3: CPU 보호는 특권 명령, 모드 비트, 타이머 등과 관련되며 기준/한계 레지스터의 직접 대상이 아니다.
      선택지 4: 출력장치도 메모리 주소 범위 검사로 보호하는 대상이 아니라 입출력 보호 기법과 관련된다.

      핵심 개념:
      기준 레지스터는 프로세스가 사용할 수 있는 메모리의 시작 주소를 나타낸다.
      한계 레지스터는 접근 가능한 주소 범위의 크기나 끝을 제한한다.
      CPU가 주소를 생성할 때 이 범위를 검사해 다른 프로세스 영역 침범을 막는다.
      이 방식은 메모리 보호를 위한 하드웨어 지원 기법이다.
    tags: [security, memory-protection]
