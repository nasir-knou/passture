      선택지 2: 공백 2도 충분할 수 있더라도 공백 1을 먼저 만나므로 최초 적합에서는 선택되지 않는다.
      선택지 3: 공백 3은 앞선 충분한 공백이 이미 있으므로 최초 적합의 선택 대상이 아니다.
