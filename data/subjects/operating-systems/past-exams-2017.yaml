      CPU에 가까운 장치는 빠르지만 용량이 작고 비싸다.
      보조기억장치에 가까울수록 느리지만 용량이 크고 비트당 비용이 낮다.
      연산종류는 기억장치 계층의 직접적인 비교 항목이 아니다.
