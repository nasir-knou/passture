      선택지 2: 가장 자주 사용한 페이지를 고르는 것은 빈도 기반 개념이며 최적 페이지 교체의 기준이 아니다.
      선택지 3: 앞으로 가장 오랫동안 사용되지 않을 페이지를 교체하는 것이 최적 페이지 교체 원칙이므로 정답이다.
      선택지 4: 최적 원칙은 이론적으로 기준이 명확하지만 미래 참조를 알아야 하므로 실제 구현이 어렵다.

      핵심 개념:
      최적 페이지 교체는 페이지 부재 수를 최소화하는 이론적 기준이다.
      앞으로 가장 늦게 다시 사용될 페이지를 교체 대상으로 삼는다.
      실제 시스템은 미래 참조열을 알 수 없어 그대로 구현하기 어렵다.
      FIFO, LRU 등은 최적 알고리즘을 현실적으로 근사하려는 정책이다.
