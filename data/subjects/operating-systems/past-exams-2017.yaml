      선택지 2: 공백 2는 19MB를 수용하더라도 공백 1보다 남는 공간이 커서 최적 적합이 아니다.
      선택지 3: 공백 3은 남는 공간이 더 크거나 조건에 맞지 않아 최적 적합 선택지가 아니다.
