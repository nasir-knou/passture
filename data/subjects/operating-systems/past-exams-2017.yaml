      선택지 2: 가상 메모리는 실제 메모리보다 큰 주소 공간의 프로세스도 실행 가능하게 하므로 이 설명이 틀려 정답이다.
      선택지 3: 논리주소와 물리주소를 분리하는 것은 가상 메모리의 핵심 특징이다.
