      선택지 2: 동적 분할은 프로세스 크기에 맞춰 가변 크기로 분할하므로 고정된 크기 영역으로 나누는 방식이 아니다.
      선택지 3: 동적 분할에서 생긴 외부 단편화는 흩어진 빈 공간을 모으는 집약으로 완화할 수 있으므로 정답이다.
      선택지 4: 통합은 인접한 빈 공간을 합치는 개념이며, 고정 분할의 단편화 해결 설명으로는 맞지 않는다.

