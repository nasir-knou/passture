      선택지 2: 세그먼테이션은 프로그램의 논리적 단위에 따라 나누므로 논리적 측면과 무관하다는 설명은 오답이다.
      선택지 3: 페이징은 고정 크기 블록을 사용해 외부 단편화를 제거하고 내부 단편화가 생길 수 있다.
      선택지 4: 세그먼트는 가변 크기 논리 단위이며 각 세그먼트는 연속 공간에 저장되어야 하므로 정답이다.

      핵심 개념:
