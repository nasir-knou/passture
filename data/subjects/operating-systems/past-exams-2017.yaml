questions:
  - id: e17-01
    type: multiple-choice
    prompt: 병행성 문제와 거리가 먼 것은?
    choices:
      - { id: '1', text: '공유자원 점유 문제' }
      - { id: '2', text: '동기화 문제' }
      - { id: '3', text: '통신 문제' }
      - { id: '4', text: '감사 문제' }
    answers: ['4']
    explanation: 병행성에서는 공유자원, 동기화, 통신 등이 주요 문제가 되며 감사는 병행성의 대표 문제로 보기 어렵다.
    tags: [concurrency]

  - id: e17-02
    type: multiple-choice
    passageRefs: [g17-mutex-code-01]
    prompt: 초기값이 1인 세마포어 mutex를 이용하여 상호배제를 구현하려고 한다. S1이 임계영역을 의미할 때, (ㄱ)과 (ㄴ)에 들어갈 연산과 그 의미로 바른 것은?
    choices:
      - { id: '1', text: '(ㄱ) P(mutex); - 감소, (ㄴ) V(mutex); - 증가' }
      - { id: '2', text: '(ㄱ) P(mutex); - 증가, (ㄴ) V(mutex); - 감소' }
      - { id: '3', text: '(ㄱ) V(mutex); - 감소, (ㄴ) P(mutex); - 증가' }
      - { id: '4', text: '(ㄱ) V(mutex); - 증가, (ㄴ) P(mutex); - 감소' }
    answers: ['1']
    explanation: 임계영역에 들어가기 전 P 연산으로 세마포어 값을 감소시키고, 나온 뒤 V 연산으로 값을 증가시킨다.
    tags: [semaphore, mutual-exclusion]

  - id: e17-03
    type: multiple-choice
    prompt: 생산자/소비자 문제를 세마포어를 이용하여 해결하려 한다. 가능한 적은 개수의 세마포어를 이용하려 할 때 필요한 세마포어의 개수를 다음 중에서 고른다면?
    choices:
      - { id: '1', text: '1' }
      - { id: '2', text: '3' }
      - { id: '3', text: '5' }
      - { id: '4', text: '7' }
    answers: ['2']
    explanation: 유한 버퍼 생산자/소비자 문제에는 상호배제용 mutex, 빈 버퍼 수 empty, 찬 버퍼 수 full의 3개 세마포어가 일반적으로 필요하다.
    tags: [semaphore, producer-consumer]

  - id: e17-04
    type: multiple-choice
    prompt: 다음 중 교착상태의 필요조건이 아닌 것은?
    choices:
      - { id: '1', text: '상호배제' }
      - { id: '2', text: '점유 대기' }
      - { id: '3', text: '비선점' }
      - { id: '4', text: '선형 대기' }
    answers: ['4']
    explanation: 교착상태의 필요조건은 상호배제, 점유와 대기, 비선점, 환형 대기이다. 선형 대기는 필요조건이 아니다.
    tags: [deadlock]

  - id: e17-05
    type: multiple-choice
    passageRefs: [g17-rag-01]
    prompt: 다음 자원할당 그래프에 대한 설명으로 바른 것은? 단, pi는 프로세스, rj는 자원을 나타낸다.
    choices:
      - { id: '1', text: '두 개의 요구간선과 두 개의 할당간선으로 구성' }
      - { id: '2', text: 'r2는 p2에 할당됨' }
      - { id: '3', text: 'p3은 r3을 요구함' }
      - { id: '4', text: '교착상태임' }
    answers: ['2']
    explanation: 자원에서 프로세스로 향하는 간선은 할당간선이며, r2에서 p2로 향하는 간선은 r2가 p2에 할당되었음을 의미한다.
    tags: [deadlock, resource-allocation-graph]

  - id: e17-06
    type: multiple-choice
    prompt: 교착상태를 회피하기 위해 필요한 사전 정보와 거리가 먼 것은?
    choices:
      - { id: '1', text: '현재 할당된 자원' }
      - { id: '2', text: '가용상태의 자원' }
      - { id: '3', text: '프로세스들의 최소 요구량' }
      - { id: '4', text: '프로세스들의 최대 요구량' }
    answers: ['3']
    explanation: 교착상태 회피에는 현재 할당량, 가용 자원, 최대 요구량 등이 필요하며 최소 요구량은 핵심 사전 정보가 아니다.
    tags: [deadlock, avoidance]

  - id: e17-07
    type: multiple-choice
    passageRefs: [g17-transformed-rag-01]
    prompt: 변형된 자원할당 그래프에서 운영체제가 수용할 경우 불안전상태가 되는 요청을 고르시오.
    choices:
      - { id: '1', text: 'p2가 r1을 요구' }
      - { id: '2', text: 'p2가 r3을 요구' }
      - { id: '3', text: 'p2가 r2를 요구' }
      - { id: '4', text: 'p3이 r2를 요구' }
    answers: ['3']
    explanation: p3의 r2 요청을 수용하면 현재 할당/요청 관계와 선언간선까지 고려할 때 순환 가능성이 생겨 불안전상태가 된다.
    tags: [deadlock, avoidance]

  - id: e17-08
    type: multiple-choice
    prompt: 기억장치 계층구조인 레지스터-캐시 기억장치-메모리-보조기억장치 순서의 특징과 거리가 먼 것은?
    choices:
      - { id: '1', text: '접근속도' }
      - { id: '2', text: '비트당 기억장치 비용' }
      - { id: '3', text: '용량' }
      - { id: '4', text: '연산종류' }
    answers: ['4']
    explanation: 기억장치 계층은 접근속도, 비용, 용량 등의 특성으로 구분되며 연산종류는 직접적인 계층 특성이 아니다.
    tags: [memory-hierarchy]

  - id: e17-09
    type: multiple-choice
    prompt: 여러 프로세스를 메모리에 적재하기 위하여 메모리 분할을 이용한다. 다음 중 분할 방식과 특징이 바르게 짝지어진 것은?
    choices:
      - { id: '1', text: '고정 분할 - 외부 단편화 발생 가능' }
      - { id: '2', text: '동적 분할 - 메모리를 고정된 크기의 영역으로 분할' }
      - { id: '3', text: '동적 분할 - 단편화 문제를 집약으로 해결' }
      - { id: '4', text: '고정 분할 - 단편화 문제를 통합으로 해결' }
    answers: ['3']
    explanation: 동적 분할에서는 외부 단편화가 발생할 수 있고, 이를 집약(compaction)으로 완화할 수 있다.
    tags: [memory-management, partitioning]

  - id: e17-10
    type: multiple-choice
    passageRefs: [g17-free-list-01]
    prompt: 최초 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['1']
    explanation: 최초 적합은 처음 만나는 충분한 공간을 선택하므로 19MB를 수용할 수 있는 공백 1에 할당한다.
    tags: [memory-management, allocation]

  - id: e17-11
    type: multiple-choice
    passageRefs: [g17-free-list-01]
    prompt: 최적 적합을 이용할 때 할당되는 위치는?
    choices:
      - { id: '1', text: '공백 1' }
      - { id: '2', text: '공백 2' }
      - { id: '3', text: '공백 3' }
      - { id: '4', text: '공백 4' }
    answers: ['1']
    explanation: 19MB를 수용할 수 있는 공간 중 남는 공간이 가장 작은 곳은 20MB인 공백 1이다.
    tags: [memory-management, allocation]

  - id: e17-12
    type: multiple-choice
    prompt: 가상 메모리에 대한 설명으로 틀린 것은?
    choices:
      - { id: '1', text: '현재 필요한 일부분만 메모리에 적재' }
      - { id: '2', text: '메모리 크기보다 더 큰 기억공간이 필요한 프로세스를 실행할 수 없음' }
      - { id: '3', text: '프로세스가 참조하는 주소와 메모리에서 사용하는 주소를 분리' }
      - { id: '4', text: '사상이 필요함' }
    answers: ['2']
    explanation: 가상 메모리는 필요한 부분만 적재하고 주소 사상을 사용하므로 실제 메모리보다 큰 주소 공간을 가진 프로세스도 실행할 수 있다.
    tags: [virtual-memory]

  - id: e17-13
    type: multiple-choice
    prompt: 가상 메모리 관리 기법에 대한 설명으로 바른 것은?
    choices:
      - { id: '1', text: '페이징 기법은 블록의 크기가 모두 다름' }
      - { id: '2', text: '세그먼테이션 기법은 블록의 크기가 논리적 측면과 무관함' }
      - { id: '3', text: '페이징 기법은 외부 단편화가 발생할 수 있음' }
      - { id: '4', text: '세그먼테이션 기법에서 하나의 세그먼트는 연속적인 공간에 저장되어야 함' }
    answers: ['4']
    explanation: 세그먼테이션에서 각 세그먼트는 논리 단위이며 하나의 세그먼트 자체는 연속 공간에 저장된다.
    tags: [virtual-memory, segmentation]

  - id: e17-14
    type: multiple-choice
    prompt: 가상 메모리에서 페이지 교체 대상을 선택하기 위한 최적화 원칙에 대해 바르게 설명한 것은?
    choices:
      - { id: '1', text: '가장 최근에 사용한 페이지를 선택' }
      - { id: '2', text: '가장 자주 사용한 페이지를 선택' }
      - { id: '3', text: '앞으로 가장 오랫동안 사용되지 않을 페이지를 선택' }
      - { id: '4', text: '실현 가능하나 이론적으로 증명은 불가능' }
    answers: ['3']
    explanation: 최적 페이지 교체는 앞으로 가장 오랫동안 참조되지 않을 페이지를 교체 대상으로 선택한다.
    tags: [virtual-memory, page-replacement]

  - id: e17-15
    type: multiple-choice
    passageRefs: [g17-page-reference-01]
    prompt: FIFO 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['1']
    explanation: 시간 4까지 A, B, C가 적재되어 있고 FIFO에서는 가장 먼저 들어온 A를 교체한다.
    tags: [virtual-memory, page-replacement]

  - id: e17-16
    type: multiple-choice
    passageRefs: [g17-page-reference-01]
    prompt: LRU 페이지 교체기법에서 시간 5에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - { id: '1', text: 'A' }
      - { id: '2', text: 'B' }
      - { id: '3', text: 'C' }
      - { id: '4', text: 'D' }
    answers: ['2']
    explanation: 시간 4까지의 최근 사용 시점은 A가 3, B가 2, C가 4이므로 가장 오래 사용되지 않은 B를 교체한다.
    tags: [virtual-memory, page-replacement]

  - id: e17-17
    type: multiple-choice
    prompt: 장치의 입출력 처리 유형과 거리가 먼 것은?
    choices:
      - { id: '1', text: '프로그램 방법' }
      - { id: '2', text: '인터럽트 방법' }
      - { id: '3', text: 'DMA 방법' }
      - { id: '4', text: 'RPC 방법' }
    answers: ['4']
    explanation: 프로그램 방법, 인터럽트 방법, DMA 방법은 입출력 처리 유형이며 RPC는 원격 프로시저 호출 기법이다.
    tags: [io]

  - id: e17-18
    type: multiple-choice
    prompt: 스풀링에 대한 설명으로 바르지 않은 것은?
    choices:
      - { id: '1', text: '프로세스와 저속 입출력장치 사이에 위치' }
      - { id: '2', text: '일종의 버퍼링' }
      - { id: '3', text: '입출력 작업이 빨리 끝나게 할 수 있음' }
      - { id: '4', text: '가상장치를 전용장치로 변화시켜 줌' }
    answers: ['4']
    explanation: 스풀링은 전용장치를 여러 작업이 공유 가능한 가상장치처럼 사용하게 해 주는 기법이다.
    tags: [io, spooling]

  - id: e17-19
    type: multiple-choice
    prompt: 다음 중 초기 접근시간이 굉장히 오래 걸리는 저장장치는?
    choices:
      - { id: '1', text: 'SSD' }
      - { id: '2', text: '테이프 장치' }
      - { id: '3', text: '광 디스크' }
      - { id: '4', text: '자기 디스크' }
    answers: ['2']
    explanation: 테이프 장치는 순차 접근 특성이 강해 원하는 위치까지 이동하는 초기 접근시간이 길다.
    tags: [storage]

  - id: e17-20
    type: multiple-choice
    prompt: 디스크 접근시간이란?
    choices:
      - { id: '1', text: '탐구시간 + 전송시간' }
      - { id: '2', text: '회전지연시간 + 전송시간' }
      - { id: '3', text: '탐구시간 + 회전지연시간 + 전송시간' }
      - { id: '4', text: '탐구시간 + 회전지연시간' }
    answers: ['3']
    explanation: 디스크 접근시간은 탐구시간, 회전지연시간, 전송시간을 합한 시간으로 본다.
    tags: [storage, disk]

  - id: e17-21
    type: multiple-choice
    prompt: 다음 중 최적화의 대상이 다른 하나는?
    choices:
      - { id: '1', text: 'SSTF' }
      - { id: '2', text: 'SCAN' }
      - { id: '3', text: 'LOOK' }
      - { id: '4', text: 'SLTF' }
    answers: ['4']
    explanation: SSTF, SCAN, LOOK은 주로 탐구시간을 줄이는 디스크 스케줄링이며 SLTF는 회전 지연시간 최적화와 관련된다.
    tags: [storage, disk-scheduling]

  - id: e17-22
    type: multiple-choice
    prompt: 분산 시스템의 목적으로 바른 것은?
    choices:
      - { id: '1', text: '자원 독점' }
      - { id: '2', text: '연산속도 향상' }
      - { id: '3', text: '신뢰성 저하' }
      - { id: '4', text: '통신의 복잡성' }
    answers: ['2']
    explanation: 분산 시스템은 자원 공유, 연산속도 향상, 신뢰성 향상 등을 목적으로 한다.
    tags: [distributed-system]

  - id: e17-23
    type: multiple-choice
    prompt: 분산 시스템의 네트워크 구성 중 구축비용은 많이 들지만 통신비용과 가용성 측면에서 가장 좋은 것은?
    choices:
      - { id: '1', text: '완전 연결 네트워크' }
      - { id: '2', text: '트리 구조 네트워크' }
      - { id: '3', text: '스타형 네트워크' }
