questions:
  - id: e17-01
    type: multiple-choice
    prompt: 병행성 문제와 거리가 먼 것은?
    choices:
      - { id: '1', text: '공유자원 점유 문제' }
      - { id: '2', text: '동기화 문제' }
      - { id: '3', text: '통신 문제' }
      - { id: '4', text: '감사 문제' }
    answers: ['4']
    explanation: |
      선택지 1: 공유자원 점유 문제는 여러 프로세스가 같은 자원을 동시에 사용하려 할 때 생기는 병행성 문제이다.
      선택지 2: 동기화 문제는 실행 순서와 임계영역 진입을 조정해야 하므로 병행성의 핵심 문제이다.
      선택지 3: 통신 문제는 병행 프로세스 사이의 메시지 전달이나 데이터 교환과 관련된 문제이다.
      선택지 4: 감사 문제는 보안 로그와 추적에 가까운 개념으로, 병행성 문제의 대표 항목이 아니므로 정답이다.

      핵심 개념:
      병행성은 여러 프로세스나 스레드가 동시에 실행될 때 발생하는 상호작용 문제를 다룬다.
      대표 문제는 공유자원 경쟁, 동기화, 프로세스 간 통신이다.
      임계영역을 보호하지 않으면 경쟁 상태가 발생할 수 있다.
      감사는 시스템 보안이나 관리 기능에 속하므로 병행성의 직접 주제가 아니다.
    tags: [concurrency]

  - id: e17-02
    type: multiple-choice
    passageRefs: [g17-mutex-code-01]
    prompt: 초기값이 1인 세마포어 mutex를 이용하여 상호배제를 구현하려고 한다. S1이 임계영역을 의미할 때, (ㄱ)과 (ㄴ)에 들어갈 연산과 그 의미로 바른 것은?
    choices:
      - { id: '1', text: '(ㄱ) P(mutex); - 감소, (ㄴ) V(mutex); - 증가' }
      - { id: '2', text: '(ㄱ) P(mutex); - 증가, (ㄴ) V(mutex); - 감소' }
      - { id: '3', text: '(ㄱ) V(mutex); - 감소, (ㄴ) P(mutex); - 증가' }
      - { id: '4', text: '(ㄱ) V(mutex); - 증가, (ㄴ) P(mutex); - 감소' }
    answers: ['1']
    explanation: |
      선택지 1: P(mutex)는 임계영역 진입 전에 세마포어를 감소시키고, V(mutex)는 나온 뒤 증가시키므로 정답이다.
      선택지 2: P 연산과 V 연산의 위치는 맞지만 증가/감소 의미가 반대로 설명되어 오답이다.
      선택지 3: V를 먼저 수행하면 임계영역 진입 통제가 되지 않고, P를 나중에 수행하는 구조도 상호배제와 맞지 않는다.
      선택지 4: V와 P의 위치가 반대이며, 임계영역 보호를 위한 세마포어 사용 순서가 아니다.

      핵심 개념:
      세마포어의 P 연산은 wait/down 연산으로 값을 감소시키며 자원 획득을 의미한다.
      V 연산은 signal/up 연산으로 값을 증가시키며 자원 반환을 의미한다.
      mutex의 초기값이 1이면 한 번에 하나의 프로세스만 임계영역에 들어갈 수 있다.
      임계영역 앞에는 P, 임계영역 뒤에는 V가 배치되어야 상호배제가 보장된다.
    tags: [semaphore, mutual-exclusion]

  - id: e17-03
    type: multiple-choice
    prompt: 생산자/소비자 문제를 세마포어를 이용하여 해결하려 한다. 가능한 적은 개수의 세마포어를 이용하려 할 때 필요한 세마포어의 개수를 다음 중에서 고른다면?
    choices:
      - { id: '1', text: '1' }
      - { id: '2', text: '3' }
      - { id: '3', text: '5' }
      - { id: '4', text: '7' }
    answers: ['2']
    explanation: |
      선택지 1: 세마포어 1개로는 버퍼 접근 상호배제와 빈 칸/찬 칸 개수 제어를 모두 표현하기 어렵다.
      선택지 2: mutex, empty, full 세마포어 3개로 생산자/소비자 문제를 해결하므로 정답이다.
      선택지 3: 5개는 필요한 기능보다 많은 수로, 최소 개수를 묻는 조건과 맞지 않는다.
      선택지 4: 7개 역시 불필요하게 많은 수이며 최소 세마포어 개수가 아니다.

      핵심 개념:
      생산자/소비자 문제는 공유 버퍼에 대한 동시 접근과 버퍼 상태를 함께 관리해야 한다.
      mutex는 버퍼 자체에 대한 상호배제를 담당한다.
      empty는 빈 버퍼 수, full은 채워진 버퍼 수를 나타낸다.
      이 세 가지 역할을 분리하면 생산자와 소비자의 대기 조건을 올바르게 표현할 수 있다.
    tags: [semaphore, producer-consumer]

  - id: e17-04
    type: multiple-choice
    prompt: 다음 중 교착상태의 필요조건이 아닌 것은?
    choices:
      - { id: '1', text: '상호배제' }
      - { id: '2', text: '점유 대기' }
      - { id: '3', text: '비선점' }
      - { id: '4', text: '선형 대기' }
    answers: ['4']
    explanation: |
      선택지 1: 상호배제는 한 자원을 동시에 여러 프로세스가 사용할 수 없다는 조건으로 교착상태의 필요조건이다.
      선택지 2: 점유 대기는 자원을 가진 프로세스가 다른 자원을 추가로 기다리는 조건이므로 필요조건이다.
      선택지 3: 비선점은 이미 할당된 자원을 강제로 빼앗을 수 없다는 조건으로 필요조건이다.
      선택지 4: 선형 대기는 교착상태 필요조건이 아니며, 올바른 조건은 환형 대기이므로 정답이다.

      핵심 개념:
      교착상태는 네 가지 필요조건이 동시에 성립할 때 발생 가능하다.
      네 조건은 상호배제, 점유와 대기, 비선점, 환형 대기이다.
      환형 대기는 프로세스들이 원형으로 서로의 자원을 기다리는 상태이다.
      선형 대기는 교착상태의 표준 필요조건에 포함되지 않는다.
    tags: [deadlock]

  - id: e17-05
    type: multiple-choice
    passageRefs: [g17-rag-01]
    prompt: 다음 자원할당 그래프에 대한 설명으로 바른 것은? 단, $p_i$는 프로세스, $r_j$는 자원을 나타낸다.
    choices:
      - { id: '1', text: '두 개의 요구간선과 두 개의 할당간선으로 구성' }
      - { id: '2', text: '$r_2$는 $p_2$에 할당됨' }
      - { id: '3', text: '$p_3$은 $r_3$을 요구함' }
      - { id: '4', text: '교착상태임' }
    answers: ['2']
    explanation: |
      선택지 1: 요구간선과 할당간선의 개수를 잘못 센 설명이므로 그래프의 간선 구성과 맞지 않는다.
      선택지 2: 자원 $r_2$에서 프로세스 $p_2$로 향하는 간선은 할당간선이므로 정답이다.
      선택지 3: 프로세스에서 자원으로 향하는 요구간선 방향을 확인해야 하며, 그림에서 $p_3$이 $r_3$을 요구한다고 보기 어렵다.
      선택지 4: 자원할당 그래프에 순환이 보인다고 항상 교착상태인 것은 아니며, 그림은 교착상태로 단정할 수 없다.

      핵심 개념:
      자원할당 그래프에서 프로세스에서 자원으로 가는 간선은 요구간선이다.
      자원에서 프로세스로 가는 간선은 할당간선이다.
      단일 인스턴스 자원에서 순환은 교착상태 판단에 중요하다.
      다중 인스턴스 자원이 있으면 순환이 있어도 교착상태를 추가로 분석해야 한다.
    tags: [deadlock, resource-allocation-graph]

  - id: e17-06
    type: multiple-choice
    prompt: 교착상태를 회피하기 위해 필요한 사전 정보와 거리가 먼 것은?
    choices:
      - { id: '1', text: '현재 할당된 자원' }
      - { id: '2', text: '가용상태의 자원' }
      - { id: '3', text: '프로세스들의 최소 요구량' }
      - { id: '4', text: '프로세스들의 최대 요구량' }
    answers: ['3']
    explanation: |
      선택지 1: 현재 할당된 자원 정보는 안전상태 판단에 필요하므로 교착상태 회피의 핵심 정보이다.
      선택지 2: 가용상태의 자원 수는 앞으로 요청을 수용할 수 있는지 계산하는 데 필요하다.
      선택지 3: 최소 요구량은 회피 알고리즘이 요구하는 대표 사전 정보가 아니므로 정답이다.
      선택지 4: 최대 요구량은 은행원 알고리즘 등에서 필요량을 계산하기 위한 필수 정보이다.

      핵심 개념:
      교착상태 회피는 요청을 즉시 허용했을 때 시스템이 안전상태를 유지하는지 판단한다.
      이를 위해 현재 할당량, 가용 자원, 각 프로세스의 최대 요구량이 필요하다.
      필요량은 최대 요구량에서 현재 할당량을 뺀 값으로 계산한다.
      최소 요구량은 안전성 검사에서 핵심 기준으로 쓰이지 않는다.
    tags: [deadlock, avoidance]

  - id: e17-07
    type: multiple-choice
    passageRefs: [g17-transformed-rag-01]
    prompt: 다음은 변형된 자원할당 그래프로 점선화살표는 선언간선을 나타낸다. 운영체제가 수용할 경우 불안전상태가 되는 요청을 다음 중 고르시오. (3점)
    choices:
      - { id: '1', text: '$p_2$가 $r_1$을 요구' }
      - { id: '2', text: '$p_2$가 $r_3$을 요구' }
      - { id: '3', text: '$p_2$가 $r_2$를 요구' }
      - { id: '4', text: '$p_3$이 $r_2$를 요구' }
    answers: ['3']
    explanation: |
      선택지 1: $p_2$가 $r_1$을 요구하는 경우에는 선언간선과 현재 관계를 고려해도 불안전 순환을 만드는 요청이 아니다.
      선택지 2: $p_2$가 $r_3$을 요구하는 요청은 문제의 그래프에서 불안전상태를 유발하는 선택지가 아니다.
      선택지 3: $p_2$가 $r_2$를 요구하면 선언간선이 실제 요청으로 바뀌며 순환 가능성이 생겨 불안전상태가 되므로 정답이다.
      선택지 4: $p_3$이 $r_2$를 요구하는 요청은 문제에서 묻는 불안전상태 유발 요청과 다르다.

      핵심 개념:
      변형된 자원할당 그래프의 선언간선은 프로세스가 앞으로 요청할 수 있음을 나타낸다.
      교착상태 회피에서는 요청을 수용했을 때 순환 가능성이 생기는지 확인한다.
      순환 가능성이 생기면 시스템은 안전한 실행 순서를 보장하지 못할 수 있다.
      따라서 요청을 허용하기 전 안전상태 여부를 검사해야 한다.
    tags: [deadlock, avoidance]

  - id: e17-08
    type: multiple-choice
    prompt: 기억장치 계층구조인 레지스터-캐시 기억장치-메모리-보조기억장치 순서의 특징과 거리가 먼 것은?
    choices:
