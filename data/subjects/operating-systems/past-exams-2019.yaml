questions:
  - id: e19-01
    type: multiple-choice
    prompt: 병행성에 대한 설명으로 바르지 않은 것은?
    choices:
      - id: '1'
        text: 여러 개의 프로세스 또는 쓰레드가 동시에 실행되는 시스템의 특성
      - id: '2'
        text: 동시에 실행되는 여러 개의 프로세스 또는 쓰레드를 병행 프로세스라 부름
      - id: '3'
        text: 하나의 CPU에서는 병행 프로세스가 인터리빙 형식으로 실행
      - id: '4'
        text: 분산 메모리 구조에서는 병행 프로세스 처리가 불가
    answers: ['4']
    explanation: |
      선택지 1: 병행성은 여러 프로세스나 스레드가 동시에 실행되는 성질이므로 옳다.
      선택지 2: 병행 실행되는 실행 단위를 병행 프로세스라고 부를 수 있으므로 옳다.
      선택지 3: 단일 CPU에서는 시간 분할로 실행 순서가 섞이는 인터리빙 방식이 사용되므로 옳다.
      선택지 4: 분산 메모리 구조에서도 메시지 전달로 병행 처리가 가능하므로 틀렸다.

      핵심 개념:
      병행성은 실제 병렬 실행뿐 아니라 실행 흐름이 겹쳐 보이는 경우까지 포함한다.
      단일 처리기에서는 문맥 교환과 인터리빙으로 여러 작업을 번갈아 수행한다.
      다중 처리기나 분산 시스템에서는 여러 실행 단위가 물리적으로 동시에 수행될 수 있다.
      분산 메모리 환경에서는 공유 메모리 대신 메시지 전달을 사용해 협력과 동기화를 구현한다.
    tags: [concurrency]

  - id: e19-02
    type: multiple-choice
    prompt: 2개 이상의 프로세스가 동시에 공유자원을 액세스하는 코드 영역에 진입하지 못하도록 하는 것은?
    choices:
      - id: '1'
        text: 임계영역
      - id: '2'
        text: 상호배제
      - id: '3'
        text: 교착상태
      - id: '4'
        text: 기아상태
    answers: ['2']
    explanation: |
      선택지 1: 임계영역은 공유자원에 접근하는 코드 영역 자체를 뜻하므로 배제 조건의 이름은 아니다.
      선택지 2: 상호배제는 둘 이상의 프로세스가 동시에 임계영역에 들어가지 못하게 하는 조건이므로 정답이다.
      선택지 3: 교착상태는 프로세스들이 서로 기다리며 진행하지 못하는 상태이므로 문항의 조건과 다르다.
      선택지 4: 기아상태는 특정 프로세스가 자원을 계속 얻지 못하는 상태이므로 동시 진입 방지 개념이 아니다.

      핵심 개념:
      공유자원을 다루는 코드 부분을 임계영역이라고 한다.
      임계영역 문제의 핵심 요구사항 중 하나가 상호배제이다.
      상호배제가 보장되어야 동시에 같은 데이터가 변경되어 발생하는 경쟁 조건을 막을 수 있다.
      세마포어, 모니터, 락 같은 동기화 도구는 상호배제를 구현하는 데 쓰인다.
    tags: [concurrency, mutual-exclusion]

  - id: e19-03
    type: multiple-choice
    prompt: 세마포어에 대한 설명으로 바르지 않은 것은?
    choices:
      - id: '1'
        text: Busy waiting을 이용하여 CPU 사이클을 낭비
      - id: '2'
        text: Dijkstra가 제안한 동기화 도구
      - id: '3'
        text: 세마포어는 정수형 공유변수
      - id: '4'
        text: 세마포어는 두 표준단위 연산 P와 V에 의해서만 접근됨
    answers: ['1']
    explanation: |
      선택지 1: 세마포어는 구현에 따라 block/wakeup으로 대기시킬 수 있으므로 항상 busy waiting으로 CPU를 낭비한다고 볼 수 없어 정답이다.
      선택지 2: 세마포어는 Dijkstra가 제안한 동기화 도구이므로 옳다.
      선택지 3: 세마포어는 정수형 공유변수로 모델링되므로 옳다.
      선택지 4: 세마포어 값은 P와 V라는 원자적 연산으로만 접근한다는 설명이 옳다.

      핵심 개념:
      세마포어는 공유자원 개수나 임계영역 진입 가능 여부를 표현하는 동기화 변수이다.
      P 연산은 자원 획득을, V 연산은 자원 반납이나 대기 프로세스 깨우기를 의미한다.
      단순 스핀 방식은 busy waiting을 만들 수 있지만, 운영체제 구현은 대기 큐로 CPU 낭비를 줄일 수 있다.
      따라서 세마포어의 본질은 원자적 P/V 연산을 통한 동기화에 있다.
    tags: [semaphore]

  - id: e19-04
    type: multiple-choice
    passageRefs: [g19-producer-code-01]
    prompt: 생산자/소비자 문제를 해결하기 위해서는 상호배제와 동기화가 모두 필요하다. 세마포어를 이용하여 생산자 프로세스를 다음과 같이 구현하였을 때, 상호배제를 위한 세마포어의 이름은?
    choices:
      - id: '1'
        text: empty
      - id: '2'
        text: mutex
      - id: '3'
        text: nextp
      - id: '4'
        text: full
    answers: ['2']
    explanation: |
      선택지 1: empty는 비어 있는 버퍼 수를 세는 동기화 세마포어이므로 상호배제용이 아니다.
      선택지 2: mutex는 버퍼에 넣는 임계영역 전후에 P/V로 사용되므로 상호배제 세마포어이다.
      선택지 3: nextp는 생산한 데이터 항목을 가리키는 변수이지 세마포어 이름이 아니다.
      선택지 4: full은 채워진 버퍼 수를 세는 동기화 세마포어이므로 상호배제용이 아니다.

      핵심 개념:
      생산자/소비자 문제는 버퍼 접근의 상호배제와 버퍼 상태에 따른 동기화가 모두 필요하다.
      mutex는 한 번에 하나의 프로세스만 버퍼 조작 코드에 들어가게 한다.
      empty는 생산자가 빈 칸이 있을 때만 진행하게 하고, full은 소비자가 찬 칸이 있을 때만 진행하게 한다.
      세마포어의 이름보다 어떤 조건을 제어하는지 구분하는 것이 중요하다.
    tags: [semaphore, producer-consumer]

  - id: e19-05
    type: multiple-choice
    prompt: 다음 중 판독기/기록기 문제가 발생하지 않는 것은?
    choices:
      - id: '1'
        text: 기록기가 다른 기록기와 동시에 공유 데이터 객체에 접근
      - id: '2'
        text: 기록기가 판독기와 동시에 공유 데이터 객체에 접근
      - id: '3'
        text: 판독기가 기록기와 동시에 공유 데이터 객체에 접근
      - id: '4'
        text: 판독기가 다른 판독기와 동시에 공유 데이터 객체에 접근
    answers: ['4']
    explanation: |
      선택지 1: 기록기와 기록기가 동시에 접근하면 같은 데이터를 동시에 변경할 수 있어 문제가 발생한다.
      선택지 2: 기록기와 판독기가 동시에 접근하면 판독기가 변경 중인 값을 볼 수 있어 문제가 발생한다.
      선택지 3: 판독기와 기록기가 동시에 접근하는 경우도 읽기/쓰기 충돌이므로 문제가 발생한다.
      선택지 4: 판독기끼리는 데이터를 변경하지 않고 읽기만 하므로 동시에 접근해도 문제가 발생하지 않는다.

      핵심 개념:
      판독기/기록기 문제는 공유 데이터에 대해 읽기와 쓰기의 허용 범위를 정하는 동기화 문제이다.
      여러 판독기는 동시에 접근해도 데이터 일관성을 해치지 않는다.
      기록기는 데이터를 변경하므로 다른 기록기나 판독기와 동시에 접근하면 안 된다.
      해결 방식은 판독기 우선, 기록기 우선, 공정성 보장 방식 등으로 나뉜다.
    tags: [readers-writers]

  - id: e19-06
    type: multiple-choice
    prompt: 교착상태의 필요조건에 포함되는 것은?
    choices:
      - id: '1'
        text: 상호호환
      - id: '2'
        text: 비점유 대기
      - id: '3'
        text: 선점
      - id: '4'
        text: 환형 대기
    answers: ['4']
    explanation: |
      선택지 1: 상호호환은 교착상태의 표준 필요조건이 아니며, 필요한 조건은 상호배제이다.
      선택지 2: 비점유 대기는 필요조건이 아니며, 자원을 점유한 채 다른 자원을 기다리는 점유와 대기가 필요조건이다.
      선택지 3: 선점 가능하면 교착상태를 깨뜨릴 수 있으므로 필요조건은 비선점이다.
      선택지 4: 프로세스들이 원형으로 서로의 자원을 기다리는 환형 대기는 교착상태의 필요조건이다.

      핵심 개념:
      교착상태는 여러 프로세스가 서로의 자원 반납을 기다려 더 이상 진행하지 못하는 상태이다.
      필요조건은 상호배제, 점유와 대기, 비선점, 환형 대기 네 가지이다.
      네 조건이 모두 성립해야 교착상태가 발생할 수 있다.
      예방 기법은 이 조건 중 하나가 성립하지 않도록 시스템 정책을 설계한다.
    tags: [deadlock]

  - id: e19-07
    type: multiple-choice
    passageRefs: [g19-rag-01]
    prompt: 위 자원할당 그래프에 대한 설명으로 바른 것은?
    choices:
      - id: '1'
        text: $p_2$는 자원을 나타냄
      - id: '2'
        text: $r_2$는 프로세스를 나타냄
      - id: '3'
        text: $r_3$ 위의 숫자는 할당되고 남은 단위자원을 나타냄
      - id: '4'
        text: $r_2$는 $p_2$에 할당됨
    answers: ['4']
    explanation: |
      선택지 1: 자원할당 그래프에서 프로세스는 원으로 표시되므로 $p_2$를 자원이라고 한 설명은 틀렸다.
      선택지 2: $r_2$는 이름과 도형상 자원 유형을 나타내므로 프로세스라는 설명은 틀렸다.
      선택지 3: 자원 유형 위 숫자는 보통 전체 단위자원 수를 나타내며, 할당 후 남은 수로 보지 않는다.
      선택지 4: $r_2$에서 $p_2$로 향하는 할당간선은 $r_2$의 단위자원이 $p_2$에 할당되었음을 뜻하므로 옳다.

      핵심 개념:
      자원할당 그래프는 프로세스, 자원, 요청간선, 할당간선으로 시스템 상태를 표현한다.
      프로세스에서 자원으로 향하면 요청, 자원에서 프로세스로 향하면 할당을 의미한다.
      자원 유형에 단위자원이 여러 개 있으면 그래프만으로 교착상태 여부를 단정하기 어려울 수 있다.
      간선 방향과 도형 의미를 정확히 읽는 것이 문제 풀이의 출발점이다.
    tags: [deadlock, resource-allocation-graph]

  - id: e19-08
    type: multiple-choice
    passageRefs: [g19-rag-01]
    prompt: 위 자원할당 그래프는 교착상태를 나타낸다. 간선을 하나만 제거했을 때 교착상태가 해소되는 간선은?
    choices:
      - id: '1'
        text: (ㄱ)
      - id: '2'
        text: (ㄴ)
      - id: '3'
        text: (ㄷ)
      - id: '4'
        text: (ㄹ)
    answers: ['1']
    explanation: |
      선택지 1: (ㄱ) 간선을 제거하면 p1, r2, p2, r1로 이어지는 순환 대기가 끊어지므로 교착상태가 해소된다.
      선택지 2: (ㄴ)은 순환 밖의 대기 관계이거나 순환을 유지하는 다른 간선을 남기므로 하나만 제거해도 교착상태가 해소되지 않는다.
      선택지 3: (ㄷ)은 p1과 p2가 서로 보유 자원을 기다리는 핵심 순환을 직접 끊는 간선이 아니므로 답이 아니다.
      선택지 4: (ㄹ)을 제거해도 p1과 p2 사이의 자원 대기 순환이 남는다.

      핵심 개념:
      자원할당 그래프에서 교착상태는 순환 대기 구조로 나타난다.
      단위자원이 하나인 자원 유형에서는 순환이 있으면 교착상태로 판단할 수 있다.
      교착상태를 해소하려면 순환을 구성하는 요청 또는 할당 관계 중 실제 대기 고리를 끊는 간선을 제거해야 한다.
      따라서 간선 하나를 지울 때마다 남는 경로가 다시 순환을 이루는지 확인한다.
    tags: [deadlock, resource-allocation-graph]

  - id: e19-09
    type: multiple-choice
    passageRefs: [g19-transformed-rag-01]
    prompt: 각 자원 유형의 단위자원이 하나밖에 없는 경우 변형된 자원할당 그래프를 활용하여 교착상태를 회피할 수 있다. 그래프가 아래와 같을 때 다음 중 운영체제가 수용할 경우 불안전상태가 되는 요청은? 단, 점선 화살표는 선언간선을 나타낸다.
    choices:
      - id: '1'
        text: $p_1$이 $r_1$을 요구
      - id: '2'
        text: $p_1$이 $r_2$를 요구
      - id: '3'
        text: $p_2$가 $r_3$을 요구
      - id: '4'
        text: $p_3$이 $r_2$를 요구
    answers: ['2']
    explanation: |
      선택지 1: $p_1$이 $r_1$을 요구하는 간선은 기존 할당 관계와 결합해 닫힌 순환을 만들지 않으므로 수용 가능한 요청이다.
      선택지 2: $p_1$이 $r_2$를 요구하면 선언간선이 요청간선으로 바뀌고 기존 할당 관계와 순환 가능성이 생기므로 불안전상태가 된다.
      선택지 3: $p_2$가 $r_3$을 요구해도 해당 요청에서 시작한 대기가 다시 $p_2$로 돌아오는 순환이 형성되지 않으므로 답이 아니다.
      선택지 4: $p_3$이 $r_2$를 요구하는 경우도 현재 그래프의 할당/선언 관계만으로 교착 가능 순환을 만들지 않으므로 불안전 요청이 아니다.

      핵심 개념:
      변형된 자원할당 그래프는 단위자원이 하나인 자원 유형에서 교착상태 회피에 사용한다.
      점선 선언간선은 앞으로 요청할 수 있는 최대 자원 요구를 미리 표시한다.
      요청을 수용했을 때 선언간선, 요청간선, 할당간선이 순환 가능성을 만들면 불안전상태로 보고 거절한다.
      각 후보 요청을 실제 요청간선으로 바꿔 본 뒤 자원에서 프로세스로 돌아오는 닫힌 경로가 있는지 추적한다.
    tags: [deadlock, avoidance]

  - id: e19-10
    type: multiple-choice
    prompt: 용량에 따라 기억장치를 계층적으로 바르게 구성한 것은? 단, 왼쪽이 용량이 가장 많고 오른쪽이 용량이 가장 적은 순서이다.
    choices:
      - id: '1'
        text: 레지스터, 캐시 기억장치, 메모리, 보조기억장치
      - id: '2'
        text: 보조기억장치, 레지스터, 메모리, 캐시 기억장치
      - id: '3'
        text: 보조기억장치, 메모리, 캐시 기억장치, 레지스터
      - id: '4'
        text: 캐시 기억장치, 레지스터, 메모리, 보조기억장치
    answers: ['3']
    explanation: |
      선택지 1: 레지스터는 용량이 가장 작고 빠른 계층이므로 가장 큰 쪽에 놓은 순서는 틀렸다.
      선택지 2: 보조기억장치가 가장 큰 것은 맞지만 레지스터가 메모리보다 앞에 오는 용량 순서는 틀렸다.
      선택지 3: 보조기억장치, 메모리, 캐시 기억장치, 레지스터 순은 큰 용량에서 작은 용량으로의 일반적 계층이므로 옳다.
      선택지 4: 캐시와 레지스터가 보조기억장치보다 큰 용량으로 배치되어 있어 틀렸다.

      핵심 개념:
      기억장치 계층은 속도, 용량, 비용의 상충 관계로 구성된다.
      CPU에 가까운 레지스터와 캐시는 빠르지만 용량이 작고 비싸다.
      메모리는 그보다 크고 느리며, 보조기억장치는 가장 크지만 접근 속도가 가장 느리다.
      용량 순서와 속도 순서는 대체로 반대 방향이라는 점을 기억하면 된다.
    tags: [memory-hierarchy]

  - id: e19-11
    type: multiple-choice
    prompt: 다중 프로그래밍 환경에서 여러 프로세스에 메모리를 적재하기 위한 메모리 분할 기법에 대한 설명으로 바르지 않은 것은?
    choices:
      - id: '1'
        text: 고정 분할은 메모리를 여러 개의 고정된 크기의 영역으로 분할함
      - id: '2'
        text: 동적 분할은 각 프로세스에게 필요한 만큼의 메모리만을 할당
      - id: '3'
        text: 동적 분할은 내부 단편화가 발생할 수 있음
      - id: '4'
        text: 고정 분할에서 분할마다 큐를 두는 방법은 메모리 효율성이 낮음
    answers: ['3']
    explanation: |
      선택지 1: 고정 분할은 메모리를 미리 정한 크기의 분할로 나누므로 옳다.
      선택지 2: 동적 분할은 프로세스가 필요한 만큼 가변 크기로 할당하므로 옳다.
      선택지 3: 동적 분할은 분할 내부의 남는 공간보다 외부 단편화가 핵심 문제이므로 내부 단편화 설명은 틀렸다.
      선택지 4: 고정 분할에서 분할별 큐를 두면 특정 큐가 비어도 다른 큐의 작업을 활용하기 어려워 메모리 효율이 낮을 수 있다.

      핵심 개념:
      고정 분할은 구현이 단순하지만 프로세스 크기와 분할 크기가 맞지 않으면 내부 단편화가 생긴다.
      동적 분할은 요청 크기에 맞춰 할당하므로 내부 낭비는 줄지만 빈 공간이 흩어지는 외부 단편화가 생긴다.
      외부 단편화는 집약 같은 기법으로 완화할 수 있지만 비용이 든다.
      분할 방식의 장단점은 단편화 종류와 큐 운영 방식으로 구분한다.
    tags: [memory-management, partitioning]

  - id: e19-12
    type: multiple-choice
    passageRefs: [g19-free-list-01, g19-free-list-image-01]
    prompt: 최적 적합을 이용할 때 할당되는 위치는?
    choices:
      - id: '1'
        text: 공백 1
      - id: '2'
        text: 공백 2
      - id: '3'
        text: 공백 3
      - id: '4'
        text: 공백 4
    answers: ['2']
    explanation: |
      선택지 1: 공백 1은 50MB라서 16MB를 수용할 수 있지만 34MB가 남아 최적 적합의 최소 잔여 공간 후보가 아니다.
      선택지 2: 공백 2는 25MB라서 16MB를 수용하면서 남는 공간이 9MB로 가장 작으므로 정답이다.
      선택지 3: 공백 3은 15MB라서 16MB 요청을 수용할 수 없으므로 후보에서 제외된다.
      선택지 4: 공백 4는 70MB라서 요청을 수용할 수 있지만 남는 공간이 가장 크므로 최적 적합 대상이 아니다.

      핵심 개념:
      최적 적합(best fit)은 요청 크기를 수용할 수 있는 빈 공간 중 가장 작은 공간을 선택한다.
      남는 조각을 최소화하려는 전략이지만 아주 작은 조각이 많이 생길 수 있다.
      문제에서는 먼저 16MB 이상인 공백 1, 2, 4만 후보로 고르고 그중 가장 작은 25MB를 선택한다.
      빈 공간 리스트를 읽을 때 수용 가능 여부와 선택 기준을 분리해서 판단한다.
    tags: [memory-management, allocation]

