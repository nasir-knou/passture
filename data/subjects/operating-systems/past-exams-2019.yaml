    prompt: 최악 적합을 이용할 때 할당되는 위치는?
    choices:
      - id: '1'
        text: 공백 1
      - id: '2'
        text: 공백 2
      - id: '3'
        text: 공백 3
      - id: '4'
        text: 공백 4
    answers: ['4']
    explanation: |
      선택지 1: 공백 1은 50MB로 16MB 요청을 수용할 수 있지만 70MB인 공백 4보다 작으므로 최악 적합의 선택이 아니다.
      선택지 2: 공백 2는 25MB로 최적 적합에서는 선택되지만 최악 적합이 고르는 최대 공백은 아니다.
      선택지 3: 공백 3은 15MB라서 16MB 요청을 수용할 수 없으므로 최악 적합의 후보도 아니다.
      선택지 4: 최악 적합은 요청을 수용할 수 있는 공간 중 가장 큰 70MB 공백 4를 선택하므로 정답이다.

      핵심 개념:
      최악 적합(worst fit)은 가장 큰 빈 공간에 새 프로세스를 배치하는 동적 할당 전략이다.
      큰 빈 공간을 쪼개 이후 요청을 처리할 여지를 남기려는 의도이다.
      하지만 큰 공간을 계속 분할해도 전체 단편화가 줄어든다는 보장은 없다.
      이 문항에서는 16MB 이상인 후보 중 최대 크기인 70MB 공백 4를 고른다.
