    prompt: 벨-라파듈라(BLP) 모델에 대한 설명으로 바르지 않은 것은?
    choices:
      - id: '1'
        text: 기밀성 유지에 초점을 둠
      - id: '2'
        text: 벨과 라파듈라가 개발한 수학적 모델
      - id: '3'
        text: 비바(Biba) 모델에 불법 수정 방지를 추가로 정의
