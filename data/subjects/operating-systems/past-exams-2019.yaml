    answers: ['1']
    explanation: |
      선택지 1: 효율성은 운영체제 성능 목표일 수 있지만 보안의 기본 목표 CIA에는 포함되지 않으므로 정답이다.
      선택지 2: 무결성은 데이터와 시스템이 허가 없이 변경되지 않도록 하는 보안 목표이다.
