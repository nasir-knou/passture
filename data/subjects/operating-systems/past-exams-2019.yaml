    explanation: |
      선택지 1: BLP는 기밀성 유지에 초점을 둔 모델이므로 옳다.
      선택지 2: Bell과 LaPadula가 개발한 수학적 보안 모델이라는 설명은 옳다.
      선택지 3: BLP가 Biba 모델에 불법 수정 방지를 추가한 모델이라는 설명은 틀렸고, Biba는 무결성 중심의 별도 모델이다.
      선택지 4: BLP는 보안 등급 사이에서 허용되는 정보 흐름을 설명하므로 옳다.

      핵심 개념:
      벨-라파듈라 모델은 군사 보안처럼 기밀성 보호가 중요한 환경을 설명하는 접근제어 모델이다.
      상위 등급 정보가 하위 등급으로 흘러가지 않도록 읽기와 쓰기 규칙을 둔다.
      Biba 모델은 반대로 무결성 보호를 중심으로 하는 별도 모델이다.
      따라서 BLP와 Biba를 계승 관계로 이해하면 안 된다.
