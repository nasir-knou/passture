passages:
  - id: g19-producer-code-01
    type: code
    language: text
    body: |
      repeat
        nextp에 데이터 항목을 생산
        P(empty);
        P(mutex);
        nextp를 버퍼에 넣음
        V(mutex);
        V(full);
      until false;

