      선택지 2: 세그먼트 크기는 프로그램의 논리 구조와 관련이 크며 하드웨어 고정 크기 단위라는 설명은 맞지 않는다.
      선택지 3: 세그먼테이션 사상표에는 세그먼트의 기준 주소와 길이 정보가 저장되므로 옳다.
      선택지 4: 세그먼트는 가변 크기 연속 공간에 배치되므로 외부 단편화가 발생할 수 있다.

      핵심 개념:
      세그먼테이션은 프로그램을 코드, 데이터, 스택 같은 논리적 단위로 나누는 가상 메모리 기법이다.
      각 세그먼트는 크기가 다를 수 있고 물리 메모리에서는 연속 공간에 배치된다.
      주소 변환에는 세그먼트 번호, 변위, 기준 주소, 길이 한계가 사용된다.
      가변 크기 할당이므로 외부 단편화와 보호 검사 문제가 중요하다.
