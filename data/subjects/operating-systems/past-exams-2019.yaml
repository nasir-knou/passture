      선택지 2: 장치제어기는 장치와 컴퓨터 사이 제어를 담당하며 데이터를 기계적 움직임으로 변환한다고 보기는 어렵다.
      선택지 3: 장치 드라이버는 장치를 제어하는 소프트웨어이므로 하드웨어라는 설명은 틀렸다.
      선택지 4: 장치 드라이버는 응용 프로그램의 입출력 요청을 장치에 맞는 명령으로 바꾸므로 옳다.

      핵심 개념:
      입출력 장치는 물리 장치, 장치제어기, 장치 드라이버가 함께 동작한다.
      장치제어기는 하드웨어로 장치와 시스템 버스 사이의 제어와 데이터 전달을 담당한다.
      장치 드라이버는 운영체제 안의 소프트웨어로 장치별 세부 명령을 감춘다.
      응용 프로그램은 표준 입출력 인터페이스를 통해 장치 차이를 덜 의식하고 사용할 수 있다.
