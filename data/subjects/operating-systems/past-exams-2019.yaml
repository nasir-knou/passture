  - id: e19-18
    type: multiple-choice
    passageRefs: [g19-page-reference-01, g19-page-reference-timeline-01]
    prompt: FIFO 페이지 교체기법에서 시간 4에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - id: '1'
        text: A
      - id: '2'
        text: B
      - id: '3'
        text: C
      - id: '4'
        text: 교체할 필요 없음
    answers: ['1']
    explanation: |
      선택지 1: 시간 1에 들어온 A가 가장 오래 메모리에 있었고 시간 4의 교체 대상이므로 정답이다.
      선택지 2: B는 A보다 늦게 적재되었으므로 FIFO 기준에서 먼저 교체되지 않는다.
      선택지 3: C는 시간 4에 참조되어 새로 적재될 페이지이므로 교체될 기존 프레임 안의 페이지가 아니다.
      선택지 4: 시간 4에는 페이지 부재가 발생해 교체가 필요하므로 틀렸다.

      핵심 개념:
      FIFO 페이지 교체는 메모리에 가장 먼저 들어온 페이지를 가장 먼저 내보낸다.
      참조 횟수나 최근 사용 여부는 고려하지 않고 적재 순서만 본다.
      페이지 참조표 문제에서는 각 시간의 프레임 상태와 적재 시점을 추적해야 한다.
      시간 1에 A, 시간 2에 B가 적재된 상태에서 시간 4에 C가 필요하므로 가장 먼저 들어온 A가 교체된다.
    tags: [virtual-memory, page-replacement, fifo]

  - id: e19-19
    type: multiple-choice
    passageRefs: [g19-page-reference-01, g19-page-reference-timeline-01]
    prompt: LFU 페이지 교체기법에서 시간 4에 교체 대상으로 선택하는 페이지 프레임 안의 페이지는?
    choices:
      - id: '1'
        text: A
      - id: '2'
        text: B
      - id: '3'
        text: C
      - id: '4'
        text: 교체할 필요 없음
    answers: ['2']
    explanation: |
      선택지 1: A는 시간 1과 시간 3에 두 번 참조되어 B보다 참조 횟수가 많으므로 LFU 기준의 교체 대상이 아니다.
      선택지 2: B는 참조 횟수가 가장 적으므로 LFU에서 교체 대상으로 선택된다.
      선택지 3: C는 시간 4에 새로 참조되어 적재될 페이지라서 교체 대상이 되는 기존 페이지가 아니다.
      선택지 4: 시간 4에 페이지 부재가 발생하므로 교체할 필요가 없다는 설명은 틀렸다.

      핵심 개념:
      LFU는 가장 적게 참조된 페이지를 교체하는 알고리즘이다.
      시간 순서보다 누적 참조 횟수를 기준으로 삼는다는 점이 FIFO와 다르다.
      참조 횟수가 같으면 보조 규칙이 필요하지만, 이 문항에서는 A가 2회이고 B가 1회라 동률이 아니다.
      따라서 시간 4 직전의 누적 참조 횟수만 비교하면 B가 선택된다.
    tags: [virtual-memory, page-replacement, lfu]

  - id: e19-20
    type: multiple-choice
    prompt: CPU의 데이터 처리 속도와 입출력장치의 데이터 전송 속도의 차이로 인한 문제를 임시 저장 장소를 이용하여 해결하는 입출력 관리 방법은?
    choices:
      - id: '1'
        text: 인터럽트
      - id: '2'
        text: DMA
      - id: '3'
        text: 버퍼링
      - id: '4'
        text: 폴링
    answers: ['3']
    explanation: |
      선택지 1: 인터럽트는 장치가 CPU에 입출력 완료나 상태 변화를 알리는 방식이지 속도 차이를 저장 공간으로 완화하는 방법은 아니다.
      선택지 2: DMA는 CPU 개입을 줄여 메모리와 장치 사이에 직접 전송하는 방식이므로 문항의 임시 저장 장소 개념과 다르다.
      선택지 3: 버퍼링은 임시 저장 공간을 두어 CPU와 입출력장치의 속도 차이를 완화하므로 정답이다.
      선택지 4: 폴링은 CPU가 장치 상태를 반복 확인하는 방식이므로 버퍼를 이용한 해결 방법이 아니다.

      핵심 개념:
      입출력장치는 CPU와 속도 차이가 커서 직접 맞물려 동작하면 대기 시간이 늘어난다.
      버퍼링은 중간 저장 공간에 데이터를 잠시 모아 전송 속도 차이를 흡수한다.
      이를 통해 생산자와 소비자의 작업 속도를 어느 정도 분리할 수 있다.
      스풀링, 캐싱, DMA와 목적과 작동 방식을 구분해야 한다.
    tags: [io, buffering]

  - id: e19-21
    type: multiple-choice
    prompt: 디스크 스케줄링에서 일반적으로 가장 중요하게 고려하는 시간은?
    choices:
      - id: '1'
        text: 대기시간
      - id: '2'
        text: 전송시간
      - id: '3'
        text: 탐구시간
      - id: '4'
        text: 회전지연시간
    answers: ['3']
    explanation: |
      선택지 1: 대기시간도 성능에 영향을 주지만 디스크 헤드 이동 최적화의 대표 기준은 아니다.
      선택지 2: 전송시간은 데이터가 실제로 이동하는 시간이지만 디스크 스케줄링에서 가장 큰 조정 대상은 아니다.
      선택지 3: 탐구시간은 헤드를 원하는 트랙으로 이동시키는 시간이며 디스크 스케줄링에서 일반적으로 가장 중요하게 고려한다.
      선택지 4: 회전지연시간도 존재하지만 기본 디스크 스케줄링 알고리즘은 주로 탐구시간 감소를 목표로 한다.

      핵심 개념:
      디스크 접근시간은 탐구시간, 회전지연시간, 전송시간 등으로 구성된다.
      기계식 디스크에서는 헤드를 이동시키는 탐구시간이 큰 비중을 차지한다.
      FCFS, SSTF, SCAN, LOOK 같은 스케줄링은 요청 처리 순서를 조정해 헤드 이동을 줄인다.
      따라서 문제에서 일반적 고려 시간을 물으면 탐구시간이 핵심이다.
    tags: [io, disk-scheduling]

  - id: e19-22
    type: multiple-choice
    prompt: 현재 5번 트랙에 디스크의 헤드가 위치해 있다. 트랙 접근 요구가 $9 \to 8 \to 7 \to 2$의 순서로 큐에 들어와 있을 때, FCFS 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - id: '1'
        text: $2 \to 7 \to 8 \to 9$
      - id: '2'
        text: $7 \to 2 \to 8 \to 9$
      - id: '3'
        text: $7 \to 8 \to 9 \to 2$
      - id: '4'
        text: $9 \to 8 \to 7 \to 2$
    answers: ['4']
    explanation: |
      선택지 1: $2 \to 7 \to 8 \to 9$는 트랙 번호 정렬에 가까우며 FCFS의 도착 순서가 아니다.
      선택지 2: $7 \to 2 \to 8 \to 9$는 큐에 들어온 순서를 따르지 않는다.
      선택지 3: $7 \to 8 \to 9 \to 2$도 현재 큐의 순서를 변경한 것이므로 FCFS가 아니다.
      선택지 4: FCFS는 큐에 들어온 순서 그대로 $9 \to 8 \to 7 \to 2$를 서비스하므로 정답이다.

      핵심 개념:
      FCFS 디스크 스케줄링은 First-Come, First-Served 방식이다.
      현재 헤드 위치나 이동 거리와 관계없이 요청 큐의 도착 순서대로 처리한다.
      구현은 단순하고 공정하지만 헤드 이동 거리가 커질 수 있다.
      문항에서는 큐에 주어진 순서를 그대로 읽으면 된다.
    tags: [io, disk-scheduling, fcfs]

  - id: e19-23
    type: multiple-choice
    prompt: 현재 5번 트랙에 디스크의 헤드가 위치해 있고 0번 트랙을 향해 요구를 서비스하며 움직이고 있다. 트랙 접근 요구가 $9 \to 8 \to 7 \to 2$의 순서로 큐에 들어와 있을 때, SCAN 스케줄링에 의해 요구가 서비스되는 순서는?
    choices:
      - id: '1'
        text: $2 \to 7 \to 8 \to 9$
      - id: '2'
        text: $7 \to 2 \to 8 \to 9$
      - id: '3'
        text: $7 \to 8 \to 9 \to 2$
      - id: '4'
        text: $9 \to 8 \to 7 \to 2$
    answers: ['1']
    explanation: |
      선택지 1: SCAN은 현재 0번 트랙 방향으로 이동 중이므로 먼저 2를 처리한 뒤 방향을 바꾸어 $7 \to 8 \to 9$를 처리하므로 정답이다.
      선택지 2: 7을 먼저 처리하는 $7 \to 2 \to 8 \to 9$는 현재 이동 방향인 0번 트랙 쪽을 따르지 않는다.
      선택지 3: $7 \to 8 \to 9 \to 2$는 반대 방향 요청부터 처리하므로 SCAN 조건과 맞지 않는다.
      선택지 4: $9 \to 8 \to 7 \to 2$는 FCFS 순서에 가깝고 현재 이동 방향을 반영하지 않는다.

      핵심 개념:
      SCAN은 엘리베이터처럼 한 방향으로 이동하며 해당 방향의 요청을 처리한 뒤 방향을 바꾼다.
      현재 헤드가 5번이고 0번 트랙을 향하고 있으므로 5보다 작은 요청 2가 먼저 처리된다.
      그 뒤 방향을 반대로 바꾸어 7, 8, 9 순서로 처리한다.
      현재 위치와 이동 방향이 서비스 순서 결정의 핵심 조건이다.
    tags: [io, disk-scheduling, scan]

