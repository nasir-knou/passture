  - id: e19-15
    type: multiple-choice
    prompt: 페이지 호출기법에 대한 설명으로 바르지 않은 것은?
    choices:
      - id: '1'
        text: 요구 페이지 호출기법은 실제 요구가 있을 때 메모리로 이동
      - id: '2'
        text: 요구 페이지 호출기법은 옮길 페이지 결정에 오버헤드가 큼
      - id: '3'
        text: 예상 페이지 호출기법은 프로세스 시작 시점에 적용하면 성능이 개선됨
      - id: '4'
        text: 예상 페이지 호출기법은 예상이 잘못된 경우 메모리 낭비
    answers: ['2']
    explanation: |
      선택지 1: 요구 페이지 호출은 실제 참조가 발생했을 때 해당 페이지를 메모리에 적재하므로 옳다.
      선택지 2: 요구 페이지 호출은 미리 옮길 페이지를 예측하는 방식이 아니므로 그 결정 오버헤드가 크다는 설명은 틀렸다.
      선택지 3: 예상 페이지 호출은 프로세스 시작 시 필요한 페이지를 잘 예측하면 초기 페이지 부재를 줄일 수 있어 옳다.
      선택지 4: 예상이 틀리면 쓰지 않을 페이지를 메모리에 올리게 되어 낭비가 생기므로 옳다.

      핵심 개념:
      페이지 호출기법은 페이지를 언제 메모리에 가져올지 정하는 정책이다.
      요구 페이지 호출은 필요할 때만 적재하므로 메모리 낭비를 줄이지만 페이지 부재가 발생할 수 있다.
      예상 페이지 호출은 앞으로 쓸 페이지를 미리 가져와 부재를 줄이려 하지만 예측 비용과 낭비 위험이 있다.
      두 방식의 차이는 적재 시점과 예측 필요성에 있다.
    tags: [virtual-memory, paging]

  - id: e19-16
    type: multiple-choice
    prompt: 앞으로 가장 오랫동안 사용되지 않을 페이지를 교체 대상으로 선택하면 최선이지만 미래를 예측할 수 없어 실현 불가능한 원칙은?
    choices:
      - id: '1'
        text: 최적화의 원칙
      - id: '2'
        text: 최대화의 원칙
      - id: '3'
        text: Belady의 원칙
      - id: '4'
        text: Moore의 원칙
    answers: ['1']
    explanation: |
      선택지 1: 앞으로 가장 오래 사용되지 않을 페이지를 고르는 원칙은 최적화의 원칙으로 부르며 정답이다.
      선택지 2: 최대화의 원칙은 페이지 교체 알고리즘의 표준 명칭이 아니다.
      선택지 3: Belady의 최적 알고리즘은 미래 참조열을 알고 가장 늦게 다시 참조될 페이지를 교체하는 이론적 알고리즘이지만, 문항이 묻는 원칙 명칭은 최적화의 원칙이다.
      선택지 4: Moore의 원칙은 반도체 집적회로의 트랜지스터 수가 일정 기간마다 증가한다는 경험 법칙으로, 페이지 교체 원칙이 아니다.

      핵심 개념:
      최적 페이지 교체는 앞으로 가장 오랫동안 참조되지 않을 페이지를 교체하면 페이지 부재가 최소가 된다는 생각이다.
      이 방식은 미래 참조열을 알아야 하므로 실제 운영체제에서는 직접 구현하기 어렵다.
      대신 FIFO, LRU, LFU 같은 실현 가능한 근사 알고리즘을 사용한다.
      Belady의 최적 알고리즘은 이 원칙을 알고리즘으로 표현한 이름이고, Moore의 원칙은 하드웨어 집적도에 관한 법칙이라 범주가 다르다.
    tags: [virtual-memory, page-replacement]

  - id: e19-17
