      핵심 개념:
      정보보안의 기본 목표는 기밀성, 무결성, 가용성으로 요약된다.
      기밀성은 노출 방지, 무결성은 변조 방지, 가용성은 사용 가능성 보장을 뜻한다.
      운영체제 보안 기능은 접근제어, 인증, 감사 등을 통해 이 목표를 지원한다.
