    prompt: 행렬 $M$의 고유값은?
    choices:
      - { id: '1', text: '$1,\ -1$' }
      - { id: '2', text: '$2,\ -2$' }
      - { id: '3', text: '$1,\ 2$' }
      - { id: '4', text: '$2,\ -1$' }
    answers: ['1']
    explanation: |
      선택지 1: $M$은 하삼각행렬이므로 고유값은 주대각 성분 $1$과 $-1$이다.
      선택지 2: 주대각 성분이나 특성방정식의 근과 맞지 않는다.
      선택지 3: 1은 맞지만 다른 고유값은 2가 아니라 -1이다.
      선택지 4: -1은 맞지만 다른 고유값은 2가 아니라 1이다.

      핵심 개념:
      삼각행렬의 고유값은 주대각 성분이다.
      행렬 $M$은 주대각 성분이 $1$, $-1$인 하삼각행렬이다.
      특성방정식으로 계산해도 $(1-\lambda)(-1-\lambda)=0$이 된다.
      따라서 고유값은 $1$과 $-1$이다.
    tags: [eigenvalue]

  - id: e17-24
    type: multiple-choice
    passageRefs: [g17-matrix-m-01]
    prompt: 행렬 $M$의 고유벡터로서 부적절한 것은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          0 \\
          1
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          0 \\
          5
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          2 \\
          1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          1 \\
          2
          \end{pmatrix}
          $$
    answers: ['4']
    explanation: |
      선택지 1: $M(0,1)^T=(0,-1)^T=-(0,1)^T$이므로 고유벡터이다.
      선택지 2: $M(0,5)^T=(0,-5)^T=-(0,5)^T$이므로 고유벡터이다.
      선택지 3: $M(2,1)^T=(2,1)^T$이므로 고유벡터이다.
      선택지 4: $M(1,2)^T=(1,-1)^T$로 $(1,2)^T$의 스칼라배가 아니므로 고유벡터가 아니다.

      핵심 개념:
      고유벡터는 행렬을 곱했을 때 자기 자신의 스칼라배가 되는 영이 아닌 벡터이다.
      이 행렬의 고유값은 $1$과 $-1$이다.
      선택지 1과 2는 고유값 $-1$에 대응하고, 선택지 3은 고유값 1에 대응한다.
      선택지 4는 스칼라배 관계가 성립하지 않는다.
    tags: [eigenvector]

  - id: e17-25
    type: multiple-choice
    prompt: |
      다음 벡터집합들 중 내적공간 $\{R^2,\bullet\}$에서 직교기저가 되는 것들을 모두 고르면?

      $$
      \begin{aligned}
      A&=\{(1,0),(1,1)\}\\
      B&=\{(1,2),(0,0)\}\\
      C&=\{(2,1),(-1,2)\}\\
      D&=\{(3,6),(4,-2)\}
      \end{aligned}
      $$
    choices:
      - { id: '1', text: '$A,\ B$' }
      - { id: '2', text: '$C,\ D$' }
      - { id: '3', text: '$B,\ D$' }
      - { id: '4', text: '$B,\ C,\ D$' }
    answers: ['2']
    explanation: |
      선택지 1: $A$의 두 벡터는 내적이 1이고, $B$는 영벡터를 포함하므로 둘 다 직교기저가 아니다.
      선택지 2: $C$는 $(2,1)\cdot(-1,2)=0$, $D$는 $(3,6)\cdot(4,-2)=0$이고 두 집합 모두 영벡터를 포함하지 않아 직교기저이다.
      선택지 3: $D$는 맞지만 $B$는 영벡터를 포함해 기저가 될 수 없다.
      선택지 4: $C,D$는 맞지만 $B$가 포함되어 있어 모두 직교기저라고 할 수 없다.

      핵심 개념:
      $R^2$의 직교기저는 서로 직교하는 영이 아닌 두 벡터로 이루어진 기저이다.
      영벡터는 기저에 포함될 수 없다.
      $C$와 $D$의 두 벡터는 각각 내적이 0이고 서로 영벡터가 아니다.
      따라서 직교기저가 되는 것은 $C,D$이다.
    tags: [orthogonal-basis, dot-product]
