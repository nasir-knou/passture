subjectId: linear-algebra
sourceId: past-exams-2018
title: 선형대수 2018 기말
kind: exam
year: 2018

passages:
  - id: g18-linear-system-01
    type: text
    body: |
      다음 일차연립방정식에 대해 물음에 답하라.

      $$
      \begin{cases}
      x + 2y + 3z = 7 \\
      2x + 5y + 6z = 15 \\
      x + 2y + 4z = 8
      \end{cases}
      $$

  - id: g18-matrices-a-b-01
    type: text
    body: |
      다음 행렬 $A$와 $B$에 관하여 물음에 답하라.

      $$
      A=
      \begin{pmatrix}
      1 & 1 & 1 \\
      0 & 1 & 1 \\
      0 & 0 & 1
      \end{pmatrix},
      \quad
      B=
      \begin{pmatrix}
      1 & 0 & 0 \\
      1 & 1 & 0 \\
      1 & 1 & 2
      \end{pmatrix}
      $$

  - id: g18-vectors-r3-01
    type: text
    body: |
      $R^3$ 벡터공간에서 벡터
      $A=(3,0,0)$, $B=(0,2,0)$, $C=(0,1,1)$, $D=(6,1,3)$라고 할 때 다음 물음에 답하시오.

  - id: g18-linear-transform-t-01
    type: text
    body: |
      다음 주어진 선형변환 $T$에 대하여 물음에 답하시오.

      $$
      T:R^2 \to R^3,\qquad T(x,y)=(x,2x,3x)
      $$

  - id: g18-matrix-m-01
    type: text
    body: |
      다음 행렬 $M$에 대해 물음에 답하시오.

      $$
      M=
      \begin{pmatrix}
      1 & 2 \\
      5 & 4
      \end{pmatrix}
      $$

questions:
  - id: e18-01
    type: multiple-choice
    passageRefs: [g18-linear-system-01]
    prompt: 주어진 일차연립방정식의 확대행렬 $A$를 구하면?
    choices:
      - id: '1'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 2 \\
          3 & 6 & 4
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 6 \\
          1 & 2 & 4
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 2 \\
          3 & 6 & 4 \\
          7 & 15 & 8
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 & 7 \\
          2 & 5 & 6 & 15 \\
          1 & 2 & 4 & 8
          \end{pmatrix}
          $$
    answers: ['4']
    explanation: |
      선택지 1: 계수행렬 형태이고 상수항 열이 없으며 일부 계수도 원문과 맞지 않는다.
      선택지 2: 계수행렬만 적은 형태라 확대행렬이 아니다.
      선택지 3: 우변 상수항을 열이 아니라 새 행으로 붙였으므로 확대행렬의 형태가 아니다.
      선택지 4: 계수열 오른쪽에 우변 $7,15,8$을 붙인 $3 \times 4$ 확대행렬이므로 정답이다.

      핵심 개념:
      확대행렬은 연립방정식의 계수행렬에 우변 상수항 열을 붙여 만든다.
      세 미지수와 세 방정식으로 이루어진 문제의 확대행렬은 $3 \times 4$ 행렬이다.
      각 행은 원문의 각 방정식에 대응한다.
      따라서 마지막 열은 순서대로 $7,15,8$이어야 한다.
    tags: [augmented-matrix, linear-system]

  - id: e18-02
    type: multiple-choice
    passageRefs: [g18-linear-system-01]
    prompt: 가우스 소거법을 이용하여 해를 구하려 할 때, 문제 1의 행렬 $A$에 적용시켜야 하는 기본행연산을 순서대로 열거한 것은?
    choices:
      - { id: '1', text: '$R_{1,2}(-1),\ R_{1,3}(-2)$' }
      - { id: '2', text: '$R_{2,3},\ R_{1,2}(1),\ R_{1,3}\left(\frac{1}{2}\right)$' }
      - { id: '3', text: '$R_{1,2}(-2),\ R_{1,3}(-1)$' }
      - { id: '4', text: '$R_{2,1}(-2),\ R_{3,1}(-1)$' }
    answers: ['3']
    explanation: |
      선택지 1: 1행의 배수를 더해 2행과 3행의 첫 번째 성분을 0으로 만드는 계수가 맞지 않는다.
      선택지 2: 먼저 행을 교환하거나 분수배를 적용할 필요 없이 1행으로 첫 열 아래 성분을 제거할 수 있다.
      선택지 3: $R_2 \leftarrow R_2-2R_1$, $R_3 \leftarrow R_3-R_1$을 적용하면 첫 열 아래 성분이 모두 0이 되므로 정답이다.
      선택지 4: 2행과 3행을 이용해 1행을 바꾸는 연산이라 가우스 소거의 첫 단계와 맞지 않는다.

      핵심 개념:
      가우스 소거법에서는 첫 번째 피벗 아래의 성분을 0으로 만드는 행연산을 먼저 적용한다.
      첫 번째 열의 2행 성분은 2이므로 1행의 2배를 빼야 한다.
      첫 번째 열의 3행 성분은 1이므로 1행을 빼야 한다.
      따라서 필요한 연산은 $R_{1,2}(-2)$, $R_{1,3}(-1)$이다.
    tags: [row-operation, gaussian-elimination]

  - id: e18-03
    type: multiple-choice
    passageRefs: [g18-linear-system-01]
    prompt: 문제 2에서 정답이 되는 기본행연산을 적용하여 구한 행렬을 $B$라고 하였을 때, 행렬 $B$는 다음 중 어떤 행렬인가?
    choices:
      - { id: '1', text: 단위행렬 }
      - { id: '2', text: 행제형 행렬 }
      - { id: '3', text: 상삼각행렬 }
      - { id: '4', text: 소거행제형 행렬 }
    answers: ['2']
    explanation: |
      선택지 1: 확대행렬이며 단위행렬의 형태가 아니다.
      선택지 2: 첫 열 아래 성분이 제거되고 아래 행으로 갈수록 선행 성분 위치가 오른쪽으로 이동하므로 행제형 행렬이다.
      선택지 3: 확대행렬은 정방행렬이 아니므로 상삼각행렬이라고 부르기 어렵다.
      선택지 4: 피벗 위쪽 성분까지 모두 제거된 소거행제형은 아니다.

      핵심 개념:
      행제형은 피벗 위치가 아래 행으로 갈수록 오른쪽으로 이동하는 계단형 행렬이다.
      문제 2의 연산을 적용하면 둘째 행은 $y$만, 셋째 행은 $z$만 남는 형태가 된다.
      하지만 첫 행에는 $y,z$ 계수가 여전히 남아 있다.
      따라서 소거행제형이 아니라 행제형 행렬이다.
    tags: [echelon-form, row-operation]

  - id: e18-04
    type: multiple-choice
    passageRefs: [g18-linear-system-01]
    prompt: 문제 3에서 구한 행렬 $B$를 이용하여 주어진 방정식의 해 $(x,y,z)$를 구하면?
    choices:
      - { id: '1', text: $(2,1,1)$ }
      - { id: '2', text: $(0,-1,1)$ }
      - { id: '3', text: $(1,1,2)$ }
      - { id: '4', text: $(-1,2,1)$ }
    answers: ['1']
    explanation: |
      선택지 1: 행연산 결과에서 $y=1$, $z=1$을 얻고 첫 식에 대입하면 $x=2$가 되어 정답이다.
      선택지 2: 두 번째 행에서 얻는 $y=1$과 다르다.
      선택지 3: 세 번째 행에서 얻는 $z=1$과 다르다.
      선택지 4: 첫 번째 식 $x+2y+3z=7$을 만족하지 않는다.

      핵심 개념:
      행제형 확대행렬에서는 아래 행부터 역대입해 해를 구한다.
      이 문제의 행연산 결과는 $y=1$, $z=1$을 바로 준다.
      이를 첫 번째 방정식 $x+2y+3z=7$에 대입하면 $x+2+3=7$이므로 $x=2$이다.
      따라서 해는 $(2,1,1)$이다.
    tags: [linear-system, back-substitution]

  - id: e18-05
    type: multiple-choice
    prompt: 다음 중 소거행제형 행렬은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 & 3 \\
          0 & 1 & 2 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          0 & 1 & 0 \\
          1 & 0 & 0 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          0 & 0 & 0 \\
          0 & 0 & 0 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          0 & 1 & 0 \\
          0 & 0 & 0 \\
          0 & 0 & 0
          \end{pmatrix}
          $$
    answers: ['4']
    explanation: |
      선택지 1: 행제형이지만 피벗 열의 위쪽 성분이 0이 아니므로 소거행제형은 아니다.
      선택지 2: 선행 1의 위치가 아래 행에서 왼쪽으로 이동하므로 행제형 조건을 만족하지 않는다.
      선택지 3: 영행이 0이 아닌 행보다 위에 있어 행제형 조건을 만족하지 않는다.
      선택지 4: 0이 아닌 행의 선행 성분이 1이고 그 열의 다른 성분이 모두 0이며 영행이 아래에 있으므로 소거행제형이다.

      핵심 개념:
      소거행제형은 행제형 조건에 더해 각 피벗이 1이고 피벗 열의 다른 성분이 모두 0이어야 한다.
      영행은 0이 아닌 행보다 아래에 있어야 한다.
      선행 1의 위치는 아래 행으로 갈수록 오른쪽으로 이동해야 한다.
      단 하나의 0이 아닌 행만 있어도 이 조건을 만족하면 소거행제형이 될 수 있다.
    tags: [reduced-row-echelon-form]

  - id: e18-06
    type: multiple-choice
    prompt: |
      다음 행렬 $A$에 관한 설명으로 부적절한 것은?

      $$
      A=
      \begin{pmatrix}
      0 & 0 & 0 \\
      0 & 0 & 0 \\
      0 & 0 & 0
      \end{pmatrix}
      $$
    choices:
      - { id: '1', text: 정칙행렬 }
      - { id: '2', text: 대각행렬 }
      - { id: '3', text: 스칼라행렬 }
      - { id: '4', text: 상삼각행렬 }
    answers: ['1']
    explanation: |
      선택지 1: 영행렬은 행렬식이 0이므로 역행렬이 없어 정칙행렬이 아니다.
      선택지 2: 주대각선 밖의 모든 성분이 0이므로 대각행렬로 볼 수 있다.
      선택지 3: $A=0I_3$이므로 스칼라행렬로 볼 수 있다.
      선택지 4: 주대각선 아래 성분이 모두 0이므로 상삼각행렬이다.

      핵심 개념:
      정칙행렬은 역행렬이 존재하는 정방행렬이다.
      영행렬은 모든 행과 열이 선형종속이고 행렬식도 0이다.
      대각행렬과 삼각행렬 조건은 대각선 밖 또는 한쪽 성분이 0인지로 판단한다.
      영행렬은 여러 형태의 특수행렬에 속하지만 정칙행렬은 아니다.
    tags: [zero-matrix, invertible-matrix]

  - id: e18-07
    type: multiple-choice
    prompt: $c$가 임의의 실수이고 $A$와 $B$가 행렬일 때 행렬 연산이 정의되는 경우 다음 중 옳은 것은?
    choices:
      - { id: '1', text: '$A^T=A$' }
      - { id: '2', text: '$(cA)^T=cA$' }
      - { id: '3', text: '$(A+B)^T=A^T+B^T$' }
      - { id: '4', text: '$(AB)^T=A^TB^T$' }
    answers: ['3']
    explanation: |
      선택지 1: 모든 행렬이 대칭행렬은 아니므로 일반적으로 $A^T=A$가 성립하지 않는다.
      선택지 2: 전치와 스칼라배는 호환되지만 일반식은 $(cA)^T=cA^T$이다.
      선택지 3: 전치행렬은 합에 대해 $(A+B)^T=A^T+B^T$를 만족하므로 정답이다.
      선택지 4: 곱의 전치는 순서가 바뀌어 $(AB)^T=B^TA^T$이다.

      핵심 개념:
      전치 연산은 행과 열을 바꾸는 연산이다.
      전치는 덧셈 및 스칼라배와 잘 호환된다.
      행렬 곱의 전치에서는 곱셈 순서가 반대로 바뀐다.
      따라서 항상 옳은 식은 전치의 덧셈 법칙이다.
    tags: [transpose, matrix-operation]

  - id: e18-08
    type: multiple-choice
    prompt: 행렬에 관한 설명으로 부적절한 것은?
    choices:
      - { id: '1', text: '$A=A^T$인 행렬 $A$를 대칭행렬이라 한다.' }
      - { id: '2', text: '행렬끼리의 곱 연산은 교환법칙과 결합법칙이 성립한다.' }
      - { id: '3', text: '행렬끼리의 합 연산은 교환법칙과 결합법칙이 성립한다.' }
      - { id: '4', text: '행렬 $A,B$가 $A \ne O,\ B \ne O$이어도 $AB=O$이 될 수 있다.' }
    answers: ['2']
    explanation: |
      선택지 1: 자기 자신의 전치와 같은 행렬은 대칭행렬이므로 옳다.
      선택지 2: 행렬 곱은 결합법칙은 성립하지만 일반적으로 교환법칙은 성립하지 않으므로 부적절하다.
      선택지 3: 같은 크기의 행렬 덧셈은 교환법칙과 결합법칙을 만족한다.
      선택지 4: 영행렬이 아닌 두 행렬의 곱이 영행렬이 되는 경우가 있을 수 있으므로 옳다.

      핵심 개념:
      행렬 덧셈은 성분별 연산이라 교환법칙과 결합법칙을 만족한다.
      행렬 곱셈은 정의될 때 결합법칙은 만족하지만 교환법칙은 일반적으로 만족하지 않는다.
      $AB$와 $BA$는 크기부터 다를 수 있고, 둘 다 정의되어도 값이 다를 수 있다.
      영인자가 존재할 수 있다는 점도 실수 곱셈과 다른 행렬 곱셈의 특징이다.
    tags: [matrix-operation]

  - id: e18-09
    type: multiple-choice
    prompt: $A$와 $B$가 $n$차 정칙행렬일 때 다음 중 부적절한 것은?
    choices:
      - { id: '1', text: '$A^{-1}$도 정칙행렬이며 $(A^{-1})^{-1}=A$이다.' }
      - { id: '2', text: '$A+B$도 정칙행렬이며 $(A+B)^{-1}=A^{-1}+B^{-1}$이다.' }
      - { id: '3', text: '$AB$도 정칙행렬이며 $(AB)^{-1}=B^{-1}A^{-1}$이다.' }
      - { id: '4', text: '$A^T$도 정칙행렬이며 $(A^T)^{-1}=(A^{-1})^T$이다.' }
    answers: ['2']
    explanation: |
      선택지 1: 정칙행렬의 역행렬은 다시 정칙행렬이고, 역행렬의 역행렬은 원래 행렬이다.
      선택지 2: 정칙행렬의 합이 항상 정칙행렬인 것은 아니며, 합의 역행렬이 역행렬의 합이 되는 것도 아니다.
      선택지 3: 정칙행렬의 곱은 정칙행렬이고, 곱의 역행렬은 순서가 바뀌어 $B^{-1}A^{-1}$이다.
      선택지 4: 정칙행렬의 전치도 정칙행렬이며 역행렬과 전치 연산은 제시된 관계를 만족한다.

      핵심 개념:
      정칙행렬은 역행렬이 존재하는 정방행렬이다.
      정칙행렬의 곱과 전치는 정칙성을 보존한다.
      하지만 정칙행렬의 합은 정칙성을 항상 보존하지 않는다.
      역행렬 연산은 덧셈에 대해 단순히 분배되지 않는다.
    tags: [invertible-matrix, inverse-matrix]

  - id: e18-10
    type: multiple-choice
    prompt: $R_{3,1}(2)$에 대응되는 3차 기본행렬 $E_{3,1}(2)$은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          3 & 0 & 0 \\
          0 & 1 & 0 \\
          0 & 0 & 2
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 & 0 \\
          0 & 1 & 2 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 & 2 \\
          0 & 1 & 0 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 & 0 \\
          0 & 1 & 0 \\
          2 & 0 & 1
          \end{pmatrix}
          $$
    answers: ['3']
    explanation: |
      선택지 1: 행의 상수배에 해당하는 대각행렬 형태이며 $R_{3,1}(2)$와 다르다.
      선택지 2: 3행의 2배를 2행에 더하는 형태에 대응한다.
      선택지 3: 3행의 2배를 1행에 더하는 기본행연산 $R_{3,1}(2)$에 대응하므로 정답이다.
      선택지 4: 1행의 2배를 3행에 더하는 형태에 대응한다.

      핵심 개념:
      기본행렬은 단위행렬에 해당 기본행연산을 적용해 얻는다.
      $R_{i,j}(k)$는 $i$행의 $k$배를 $j$행에 더하는 연산으로 사용된다.
      $R_{3,1}(2)$는 단위행렬의 1행 3열 위치에 2를 만든다.
      따라서 대응 기본행렬은 선택지 3이다.
    tags: [elementary-matrix, row-operation]

  - id: e18-11
    type: multiple-choice
    prompt: |
      다음 행렬 $A$의 역행렬을 구하면?

      $$
      A=
      \begin{pmatrix}
      2 & 7 \\
      1 & 3
      \end{pmatrix}
      $$
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          3 & -7 \\
          -1 & 2
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          -1 & 2 \\
          3 & -7
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          2 & -7 \\
          -1 & 3
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          -3 & 7 \\
          1 & -2
          \end{pmatrix}
          $$
    answers: ['4']
    explanation: |
      선택지 1: 수반행렬 형태이지만 행렬식으로 나누는 부호 처리가 빠져 있다.
      선택지 2: 2차 역행렬 공식의 위치 교환과 부호 변경이 맞지 않는다.
      선택지 3: 원래 대각 성분 교환이 제대로 이루어지지 않았다.
      선택지 4: $|A|=2\cdot3-7\cdot1=-1$이고, $\frac{1}{|A|}\begin{pmatrix}3&-7\\-1&2\end{pmatrix}$이므로 정답이다.

      핵심 개념:
      $2 \times 2$ 행렬 $\begin{pmatrix}a&b\\c&d\end{pmatrix}$의 역행렬은 $\frac{1}{ad-bc}\begin{pmatrix}d&-b\\-c&a\end{pmatrix}$이다.
      이 문제의 행렬식은 $-1$이다.
      따라서 수반행렬 전체에 $-1$을 곱해야 한다.
      결과는 $\begin{pmatrix}-3&7\\1&-2\end{pmatrix}$이다.
    tags: [inverse-matrix]

  - id: e18-12
    type: multiple-choice
    passageRefs: [g18-matrices-a-b-01]
    prompt: 행렬 $A$와 $B$의 행렬식을 각각 구하면?
    choices:
      - { id: '1', text: '$|A|=1,\ |B|=2$' }
      - { id: '2', text: '$|A|=1,\ |B|=-2$' }
      - { id: '3', text: '$|A|=6,\ |B|=7$' }
      - { id: '4', text: '$|A|=-3,\ |B|=-4$' }
    answers: ['1']
    explanation: |
      선택지 1: $A$는 상삼각행렬이고 $B$는 하삼각행렬이므로 행렬식은 각각 대각 성분의 곱 $1$과 $2$이다.
      선택지 2: $A$의 값은 맞지만 $B$의 행렬식 부호가 다르다.
      선택지 3: 삼각행렬의 행렬식은 모든 성분의 합이 아니라 주대각 성분의 곱이다.
      선택지 4: 두 행렬식 모두 원문의 삼각행렬 대각 성분 곱과 맞지 않는다.

      핵심 개념:
      삼각행렬의 행렬식은 주대각 성분의 곱이다.
      $A$의 대각 성분은 모두 1이므로 $|A|=1$이다.
      $B$의 대각 성분은 $1,1,2$이므로 $|B|=2$이다.
      위쪽 또는 아래쪽의 비대각 성분은 삼각행렬 행렬식 계산에 영향을 주지 않는다.
    tags: [determinant, triangular-matrix]

  - id: e18-13
    type: multiple-choice
    passageRefs: [g18-matrices-a-b-01]
    prompt: 행렬 $A$와 $B$의 곱 $AB$의 행렬식을 구하면?
    choices:
      - { id: '1', text: '$|AB|=1$' }
      - { id: '2', text: '$|AB|=2$' }
      - { id: '3', text: '$|AB|=12$' }
      - { id: '4', text: '$|AB|=-12$' }
    answers: ['2']
    explanation: |
      선택지 1: $|A|$만 반영한 값으로, $|B|=2$가 곱해져야 한다.
      선택지 2: $|AB|=|A||B|=1\cdot2=2$이므로 정답이다.
      선택지 3: 행렬 성분을 직접 곱하거나 더한 값이 아니라 행렬식 곱셈 법칙을 사용해야 한다.
      선택지 4: $|A|$와 $|B|$가 모두 양수이므로 음수가 될 수 없다.

      핵심 개념:
      같은 차수의 정방행렬에 대해 행렬식은 곱셈 법칙 $|AB|=|A||B|$를 만족한다.
      앞 문제에서 $|A|=1$, $|B|=2$이다.
      따라서 $|AB|=2$이다.
      행렬 $AB$를 직접 구하지 않아도 행렬식 곱셈 법칙으로 계산할 수 있다.
    tags: [determinant]

  - id: e18-14
    type: multiple-choice
    passageRefs: [g18-matrices-a-b-01]
    prompt: 행렬 $3A$의 행렬식을 구하면?
    choices:
      - { id: '1', text: '$|3A|=3$' }
      - { id: '2', text: '$|3A|=6$' }
      - { id: '3', text: '$|3A|=9$' }
      - { id: '4', text: '$|3A|=27$' }
    answers: ['4']
    explanation: |
      선택지 1: 한 행만 3배 한 경우와 혼동한 값이다.
      선택지 2: $3|B|$와 같은 계산이며 $3A$의 행렬식이 아니다.
      선택지 3: 3차 행렬에서 전체 행렬에 3을 곱하면 행렬식은 $3^3$배가 된다.
      선택지 4: $A$가 3차 행렬이고 $|A|=1$이므로 $|3A|=3^3|A|=27$이다.

      핵심 개념:
      $n$차 정방행렬 $A$에 대해 $|cA|=c^n|A|$이다.
      이는 모든 행이 각각 $c$배가 되기 때문이다.
      여기서 $A$는 3차 행렬이고 $|A|=1$이다.
      따라서 $|3A|=27$이다.
    tags: [determinant, scalar-multiplication]

  - id: e18-15
    type: multiple-choice
    passageRefs: [g18-vectors-r3-01]
    prompt: 다음 중 틀린 것은?
    choices:
      - { id: '1', text: '$|A|=3,\ |B|=2,\ |C|=\sqrt{2}$' }
      - { id: '2', text: '$A \times B=(0,0,6)$' }
      - { id: '3', text: '$B \cdot C=2$' }
      - { id: '4', text: '$3A+B=D$' }
    answers: ['4']
    explanation: |
      선택지 1: 각 벡터의 길이는 $3$, $2$, $\sqrt{1^2+1^2}=\sqrt2$이므로 옳다.
      선택지 2: $(3,0,0)\times(0,2,0)=(0,0,6)$이므로 옳다.
      선택지 3: $(0,2,0)\cdot(0,1,1)=2$이므로 옳다.
      선택지 4: $3A+B=(9,2,0)$이고 $D=(6,1,3)$이므로 틀렸다.

      핵심 개념:
      벡터의 길이는 성분 제곱합의 제곱근으로 계산한다.
      내적은 대응 성분의 곱을 더하고, 외적은 두 벡터에 수직인 벡터를 만든다.
      벡터 등식은 모든 성분이 같아야 성립한다.
      $3A+B$는 $D$와 성분이 다르므로 틀린 설명이다.
    tags: [vector-norm, dot-product, cross-product]

  - id: e18-16
    type: multiple-choice
    passageRefs: [g18-vectors-r3-01]
    prompt: $B$와 $C$의 사이각을 구한 것은?
    choices:
      - { id: '1', text: '$30^\circ$' }
      - { id: '2', text: '$45^\circ$' }
      - { id: '3', text: '$60^\circ$' }
      - { id: '4', text: '$90^\circ$' }
    answers: ['2']
    explanation: |
      선택지 1: $\cos\theta=\frac{1}{\sqrt2}$이므로 $30^\circ$가 아니다.
      선택지 2: $B\cdot C=2$, $|B|=2$, $|C|=\sqrt2$이므로 $\cos\theta=\frac{2}{2\sqrt2}=\frac{1}{\sqrt2}$이고 $\theta=45^\circ$이다.
      선택지 3: $60^\circ$이면 $\cos\theta=\frac12$이어야 하므로 맞지 않는다.
      선택지 4: $90^\circ$이면 내적이 0이어야 하지만 $B\cdot C=2$이다.

      핵심 개념:
      두 벡터의 사이각은 $u\cdot v=|u||v|\cos\theta$로 구한다.
      $B=(0,2,0)$, $C=(0,1,1)$이므로 내적은 2이다.
      길이는 각각 2와 $\sqrt2$이다.
      따라서 $\cos\theta=1/\sqrt2$이고 사이각은 $45^\circ$이다.
    tags: [dot-product, vector-angle]

  - id: e18-17
    type: multiple-choice
    passageRefs: [g18-vectors-r3-01]
    prompt: $D$를 $A,B,C$의 일차결합으로 나타낸 것은?
    choices:
      - { id: '1', text: '$D=6A+B+3C$' }
      - { id: '2', text: '$D=A-2B+C$' }
      - { id: '3', text: '$D=2A-B+3C$' }
      - { id: '4', text: '$D=-A+2B+C$' }
    answers: ['3']
    explanation: |
      선택지 1: $6A+B+3C=(18,5,3)$이므로 $D$와 다르다.
      선택지 2: $A-2B+C=(3,-3,1)$이므로 $D$와 다르다.
      선택지 3: $2A-B+3C=(6,1,3)$이므로 $D$와 일치한다.
      선택지 4: $-A+2B+C=(-3,5,1)$이므로 $D$와 다르다.

      핵심 개념:
      일차결합은 벡터에 스칼라를 곱해 더한 형태이다.
      $aA+bB+cC=(3a,2b+c,c)$로 쓸 수 있다.
      $D=(6,1,3)$이 되려면 $a=2$, $c=3$, $2b+3=1$이므로 $b=-1$이다.
      따라서 $D=2A-B+3C$이다.
    tags: [linear-combination, vector]

  - id: e18-18
    type: multiple-choice
    prompt: 다음 중 벡터공간 $R^3$의 부분공간이 아닌 것은?
    choices:
      - { id: '1', text: '$\{(x,y,1)\mid x,y\in R\}$' }
      - { id: '2', text: '$\{(x,y,0)\mid x,y\in R\}$' }
      - { id: '3', text: '$\{(x,y,z)\mid x,y,z\in R\}$' }
      - { id: '4', text: '$\{(x,y,x+y)\mid x,y\in R\}$' }
    answers: ['1']
    explanation: |
      선택지 1: 세 번째 성분이 항상 1이므로 영벡터 $(0,0,0)$를 포함하지 않아 부분공간이 아니다.
      선택지 2: $xy$평면으로 영벡터를 포함하고 덧셈과 스칼라배에 닫혀 있다.
      선택지 3: 전체 공간 $R^3$ 자체이므로 부분공간이다.
      선택지 4: $z=x+y$를 만족하는 평면으로 영벡터를 포함하고 선형조건으로 정의되어 부분공간이다.

      핵심 개념:
      부분공간은 영벡터를 포함해야 하고, 벡터 덧셈과 스칼라배에 대해 닫혀 있어야 한다.
      세 번째 성분이 1로 고정된 집합은 원점을 지나지 않는다.
      원점을 지나지 않는 평면은 벡터공간의 부분공간이 될 수 없다.
      따라서 $\{(x,y,1)\mid x,y\in R\}$이 부적절하다.
    tags: [subspace]

  - id: e18-19
    type: multiple-choice
    passageRefs: [g18-linear-transform-t-01]
    prompt: $R^2$와 $R^3$의 표준기저를 이용한 $T$의 행렬은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 \\
          2 & 0 \\
          3 & 0
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 \\
          3 & 0 \\
          0 & 0
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 & 3 \\
          1 & 2 & 3
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          1 & 3 & 0 \\
          2 & 0 & 0
          \end{pmatrix}
          $$
    answers: ['1']
    explanation: |
      선택지 1: $T(e_1)=(1,2,3)$, $T(e_2)=(0,0,0)$을 열로 둔 $3 \times 2$ 행렬이므로 정답이다.
      선택지 2: 두 번째 열과 성분 배치가 원문 변환과 맞지 않는다.
      선택지 3: $R^2$에서 $R^3$로 가는 변환의 표준행렬은 $3 \times 2$이어야 하는데 $2 \times 3$ 행렬이다.
      선택지 4: 행렬 크기와 성분 배치가 모두 원문 변환과 다르다.

      핵심 개념:
      $T:R^2\to R^3$의 표준행렬은 출력 차원 3을 행 수, 입력 차원 2를 열 수로 한다.
      첫 번째 열은 $T(1,0)=(1,2,3)$이다.
      두 번째 열은 $T(0,1)=(0,0,0)$이다.
      따라서 표준행렬은 $\begin{pmatrix}1&0\\2&0\\3&0\end{pmatrix}$이다.
    tags: [linear-transformation, matrix-representation]

  - id: e18-20
    type: multiple-choice
    passageRefs: [g18-linear-transform-t-01]
    prompt: $\operatorname{Ker}(T)$를 구하면?
    choices:
      - { id: '1', text: '$\{(0,0)\}$' }
      - { id: '2', text: '$\{(1,0),(0,1)\}$' }
      - { id: '3', text: '$\{(0,y)\mid y\in R\}$' }
      - { id: '4', text: '$\{(x,y)\mid x\in R,\ y\in R\}$' }
    answers: ['3']
    explanation: |
      선택지 1: $x=0$이면 $y$는 임의의 실수가 가능하므로 영벡터 하나만 있는 것이 아니다.
      선택지 2: 핵공간은 벡터 두 개의 나열이 아니라 $T(x,y)=0$을 만족하는 모든 벡터의 집합이다.
      선택지 3: $T(x,y)=(x,2x,3x)=(0,0,0)$이려면 $x=0$이고 $y$는 자유이므로 정답이다.
      선택지 4: 모든 $(x,y)$가 핵공간에 속하려면 $T$가 영변환이어야 하지만 $x\ne0$이면 출력이 0이 아니다.

      핵심 개념:
      핵공간은 선형변환이 영벡터로 보내는 정의역의 모든 벡터 집합이다.
      $T(x,y)=(x,2x,3x)$가 $(0,0,0)$이 되려면 $x=0$이어야 한다.
      변환식에 $y$가 나타나지 않으므로 $y$는 임의로 선택할 수 있다.
      따라서 핵공간은 $\{(0,y)\mid y\in R\}$이다.
    tags: [kernel, linear-transformation]

  - id: e18-21
    type: multiple-choice
    passageRefs: [g18-linear-transform-t-01]
    prompt: $\dim\operatorname{Ker}(T)$와 $\dim\operatorname{Im}(T)$를 순서대로 구한 것은?
    choices:
      - { id: '1', text: '$0,\ 3$' }
      - { id: '2', text: '$0,\ 2$' }
      - { id: '3', text: '$1,\ 1$' }
      - { id: '4', text: '$1,\ 3$' }
    answers: ['3']
    explanation: |
      선택지 1: 핵공간은 $\{(0,y)\mid y\in R\}$이므로 차원이 0이 아니다.
      선택지 2: 핵공간 차원이 0이 아니고, 치역도 2차원이 아니다.
      선택지 3: 핵공간은 $y$ 하나의 자유변수를 가지므로 차원 1이고, 치역은 $(1,2,3)$의 span이므로 차원 1이다.
      선택지 4: 치역은 $R^3$ 전체가 아니라 한 직선이므로 차원 3이 아니다.

      핵심 개념:
      $T(x,y)=(x,2x,3x)=x(1,2,3)$이므로 치역은 한 벡터가 생성하는 1차원 부분공간이다.
      핵공간은 $x=0$인 모든 $(0,y)$로 이루어진다.
      핵공간도 자유변수 하나를 가지므로 차원이 1이다.
      따라서 순서대로 $1,1$이다.
    tags: [rank-nullity, kernel, image]

  - id: e18-22
    type: multiple-choice
    passageRefs: [g18-matrix-m-01]
    prompt: 행렬 $M$의 고유값은?
    choices:
      - { id: '1', text: '$1,\ 4$' }
      - { id: '2', text: '$-1,\ 3$' }
      - { id: '3', text: '$2,\ 5$' }
      - { id: '4', text: '$-1,\ 6$' }
    answers: ['4']
    explanation: |
      선택지 1: 주대각 성분을 그대로 고유값으로 볼 수 있는 것은 삼각행렬의 경우이며, 이 행렬에는 적용되지 않는다.
      선택지 2: $-1$은 맞지만 다른 고유값은 6이다.
      선택지 3: 행렬의 비대각 성분을 포함한 특성방정식 계산과 맞지 않는다.
      선택지 4: 특성방정식이 $\lambda^2-5\lambda-6=0$이므로 고유값은 $-1$과 $6$이다.

      핵심 개념:
      고유값은 $\det(M-\lambda I)=0$의 해이다.
      이 행렬에서는 $(1-\lambda)(4-\lambda)-10=\lambda^2-5\lambda-6$이다.
      이를 인수분해하면 $(\lambda-6)(\lambda+1)=0$이다.
      따라서 고유값은 $-1$과 $6$이다.
    tags: [eigenvalue]

  - id: e18-23
    type: multiple-choice
    passageRefs: [g18-matrix-m-01]
    prompt: 행렬 $M$의 고유벡터가 아닌 것은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          1 \\
          5
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          2 \\
          5
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          1 \\
          -1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          -4 \\
          4
          \end{pmatrix}
          $$
    answers: ['1']
    explanation: |
      선택지 1: $M(1,5)^T=(11,25)^T$로 $(1,5)^T$의 스칼라배가 아니므로 고유벡터가 아니다.
      선택지 2: $M(2,5)^T=(12,30)^T=6(2,5)^T$이므로 고유벡터이다.
      선택지 3: $M(1,-1)^T=(-1,1)^T=-(1,-1)^T$이므로 고유벡터이다.
      선택지 4: $M(-4,4)^T=(4,-4)^T=-(-4,4)^T$이므로 고유벡터이다.

      핵심 개념:
      고유벡터는 영벡터가 아니며, 행렬을 곱했을 때 자기 자신의 스칼라배가 되는 벡터이다.
      이 행렬의 고유값은 $6$과 $-1$이다.
      선택지 2는 고유값 6에 대응하고, 선택지 3과 4는 고유값 $-1$에 대응한다.
      선택지 1은 어떤 스칼라배 관계도 만들지 못한다.
    tags: [eigenvector]

  - id: e18-24
    type: multiple-choice
    prompt: 다음 중 직교행렬 $M$에 대한 서술로서 부적절한 것은?
    choices:
      - { id: '1', text: '$M^{-1}=M^T$를 만족한다.' }
      - { id: '2', text: '$M$의 행렬식은 항상 $|M|=1$이다.' }
      - { id: '3', text: '$M$의 행벡터들은 단위직교벡터집합을 이룬다.' }
      - { id: '4', text: '$M$의 열벡터들은 단위직교벡터집합을 이룬다.' }
    answers: ['2']
    explanation: |
      선택지 1: 직교행렬은 역행렬이 전치행렬과 같으므로 옳다.
      선택지 2: 직교행렬의 행렬식은 $1$ 또는 $-1$이 될 수 있으므로 항상 $|M|=1$이라고 할 수 없다.
      선택지 3: 직교행렬의 행벡터들은 서로 직교하고 길이가 1이므로 옳다.
      선택지 4: 직교행렬의 열벡터들도 서로 직교하고 길이가 1이므로 옳다.

      핵심 개념:
      직교행렬은 $M^TM=I$를 만족하는 정방행렬이다.
      이 조건은 행벡터와 열벡터가 각각 단위직교집합을 이룬다는 뜻이다.
      행렬식에 대해서는 $(\det M)^2=1$이므로 $\det M=\pm1$이다.
      따라서 행렬식이 항상 1이라고 단정하는 설명은 부적절하다.
    tags: [orthogonal-matrix, determinant]

  - id: e18-25
    type: multiple-choice
    prompt: 내적공간 $\{R^3,\bullet\}$에서 $\{(1,1,0),(0,0,1),(a,b,c)\}$가 직교집합이 되기 위한 조건은?
    choices:
      - { id: '1', text: '$a=0,\ b=0,\ c=0$' }
      - { id: '2', text: '$a=1,\ b=1,\ c=1$' }
      - { id: '3', text: '$a=0,\ b=-c$' }
      - { id: '4', text: '$a=-b,\ c=0$' }
    answers: ['4']
    explanation: |
      선택지 1: 영벡터를 포함하면 보통 직교집합의 독립적인 벡터 조건을 만족하지 못하며 원문 조건의 일반해도 아니다.
      선택지 2: $(1,1,0)\cdot(1,1,1)=2$이므로 직교하지 않는다.
      선택지 3: $(0,0,1)$과 직교하려면 $c=0$이어야 하므로 조건이 부족하다.
      선택지 4: $(1,1,0)$과 직교하려면 $a+b=0$, $(0,0,1)$과 직교하려면 $c=0$이어야 하므로 정답이다.

      핵심 개념:
      직교집합에서는 서로 다른 두 벡터의 내적이 모두 0이어야 한다.
      $(a,b,c)$가 $(1,1,0)$과 직교하려면 $a+b=0$이다.
      $(a,b,c)$가 $(0,0,1)$과 직교하려면 $c=0$이다.
      따라서 조건은 $a=-b,\ c=0$이다.
    tags: [orthogonal-set, dot-product]
