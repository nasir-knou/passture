subjectId: linear-algebra
sourceId: past-exams-2019
title: 선형대수 2019 기말
kind: exam
year: 2019

passages:
  - id: g19-linear-system-01
    type: text
    body: |
      다음 일차연립방정식에 대해 물음에 답하시오.

      $$
      \begin{cases}
      x + 2y + 3z = 1 \\
      2x + 5y + 6z = 3 \\
      x + 2y + 4z = 0
      \end{cases}
      $$

  - id: g19-matrices-a-b-01
    type: text
    body: |
      다음 행렬 $A$와 $B$에 관련하여 물음에 답하시오.

      $$
      A=
      \begin{pmatrix}
      3 & 0 & 0 \\
      0 & 3 & 0 \\
      0 & 0 & 3
      \end{pmatrix},
      \quad
      B=
      \begin{pmatrix}
      1 & 0 & 0 \\
      2 & 1 & 4 \\
      0 & 1 & 3
      \end{pmatrix}
      $$

  - id: g19-vectors-r3-01
    type: text
    body: |
      $R^3$ 벡터공간에서 벡터
      $A=(1,0,0)$, $B=(1,1,0)$, $C=(1,1,1)$, $P=(3,1,2)$라고 할 때 다음 물음에 답하시오.

  - id: g19-linear-transform-t-01
    type: text
    body: |
      다음 주어진 선형변환 $T$에 대하여 물음에 답하시오.

      $$
      T:R^3 \to R^2,\qquad T(x,y,z)=(x+2y,z)
      $$

questions:
  - id: e19-01
    type: multiple-choice
    passageRefs: [g19-linear-system-01]
    prompt: 주어진 일차연립방정식의 확대행렬 $A$를 구하면?
    choices:
      - id: '1'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 2 \\
          3 & 6 & 4
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 6 \\
          1 & 2 & 4
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 \\
          2 & 5 & 2 \\
          3 & 6 & 4 \\
          1 & 3 & 0
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          A=
          \begin{pmatrix}
          1 & 2 & 3 & 1 \\
          2 & 5 & 6 & 3 \\
          1 & 2 & 4 & 0
          \end{pmatrix}
          $$
    answers: ['4']
    explanation: |
      선택지 1: 계수행렬 형태이고 상수항 열이 없으며 일부 계수도 원문과 맞지 않는다.
      선택지 2: 계수행렬만 적은 형태라 확대행렬이 아니다.
      선택지 3: 상수항을 새 행으로 붙인 형태라 확대행렬의 열 배치와 다르다.
      선택지 4: 각 방정식의 계수 $x,y,z$와 우변 상수항을 차례로 한 행에 적었으므로 주어진 연립방정식의 확대행렬이다.

      핵심 개념:
      연립일차방정식의 확대행렬은 계수행렬 오른쪽에 상수항 열을 붙여 만든다.
      미지수가 $x,y,z$ 세 개이고 방정식이 세 개이면 확대행렬은 $3 \times 4$ 행렬이다.
      각 행은 하나의 방정식에 대응하고, 마지막 열은 우변 값을 나타낸다.
      따라서 원문 식의 우변 $1,3,0$은 마지막 열에 들어가야 한다.
    tags: [augmented-matrix, linear-system]

  - id: e19-02
    type: multiple-choice
    passageRefs: [g19-linear-system-01]
    prompt: 문제 1에서 구한 행렬 $A$에 $R_{1,2}(-2)$와 $R_{1,3}(-1)$을 순서대로 적용시켜 얻는 행렬 $B$는 다음 중 어떤 행렬인가?
    choices:
      - { id: '1', text: 소거행제형 행렬 }
      - { id: '2', text: 행제형 행렬 }
      - { id: '3', text: 대각행렬 }
      - { id: '4', text: 단위행렬 }
    answers: ['2']
    explanation: |
      선택지 1: 적용 결과에는 위쪽 피벗 행의 다른 열 성분이 남아 있으므로 소거행제형 행렬이라고 보기 어렵다.
      선택지 2: $R_2 \leftarrow R_2-2R_1$, $R_3 \leftarrow R_3-R_1$을 적용하면 아래 행으로 갈수록 선행 성분 위치가 오른쪽으로 이동하는 행제형이 된다.
      선택지 3: 확대행렬이며 비대각 성분도 남아 있으므로 대각행렬이 아니다.
      선택지 4: 정사각 단위행렬의 형태가 아니며 마지막 상수항 열도 포함되어 있다.

      핵심 개념:
      $R_{i,j}(k)$는 보통 $i$행의 $k$배를 $j$행에 더하는 기본행연산을 뜻한다.
      확대행렬에 기본행연산을 적용하면 연립방정식의 해는 유지하면서 더 풀기 쉬운 형태로 바꿀 수 있다.
      행제형은 각 행의 선행 성분이 아래로 갈수록 오른쪽에 놓이는 계단 모양 행렬이다.
      소거행제형은 피벗 위아래의 성분까지 더 강하게 정리된 형태이다.
    tags: [row-operation, echelon-form]

  - id: e19-03
    type: multiple-choice
    passageRefs: [g19-linear-system-01]
    prompt: 문제 2에서 구한 행렬 $B$를 이용하여 주어진 방정식의 해 $(x,y,z)$를 구하면?
    choices:
      - { id: '1', text: $(4,-2,1)$ }
      - { id: '2', text: $(3,2,-2)$ }
      - { id: '3', text: $(2,1,-1)$ }
      - { id: '4', text: $(1,-3,2)$ }
    answers: ['3']
    explanation: |
      선택지 1: 행연산 결과에서 얻는 $y=1$, $z=-1$과 일치하지 않는다.
      선택지 2: 두 번째 행에서 얻는 $y=1$과 다르다.
      선택지 3: 행연산 후 $y=1$, $z=-1$이고 첫 번째 식 $x+2y+3z=1$에 대입하면 $x=2$가 되어 정답이다.
      선택지 4: 세 번째 행에서 얻는 $z=-1$과 다르다.

      핵심 개념:
      확대행렬을 행제형으로 만들면 아래 행부터 미지수를 차례로 구할 수 있다.
      이 문제에서는 행연산 뒤 두 번째 행이 $y=1$, 세 번째 행이 $z=-1$을 준다.
      이를 첫 번째 방정식에 대입하면 $x+2-3=1$이므로 $x=2$이다.
      따라서 해는 $(2,1,-1)$이다.
    tags: [linear-system, back-substitution]

  - id: e19-04
    type: multiple-choice
    prompt: |
      다음 행렬의 곱이 성립하도록 실수 $a$와 $b$를 구하면?

      $$
      \begin{pmatrix}
      1 & 2 \\
      3 & b
      \end{pmatrix}
      \begin{pmatrix}
      a \\
      1
      \end{pmatrix}
      =
      \begin{pmatrix}
      6 \\
      21
      \end{pmatrix}
      $$
    choices:
      - { id: '1', text: '$a=1,\ b=2$' }
      - { id: '2', text: '$a=4,\ b=3$' }
      - { id: '3', text: '$a=7,\ b=3$' }
      - { id: '4', text: '$a=4,\ b=9$' }
    answers: ['4']
    explanation: |
      선택지 1: 첫 번째 성분 조건 $a+2=6$을 만족하지 않는다.
      선택지 2: $a=4$는 맞지만 두 번째 성분 조건 $3a+b=21$을 만족하려면 $b=9$이어야 한다.
      선택지 3: 첫 번째 성분 조건에서 이미 $a=4$가 되어야 하므로 맞지 않는다.
      선택지 4: $a+2=6$에서 $a=4$이고, $3a+b=21$에서 $b=9$이므로 정답이다.

      핵심 개념:
      행렬과 열벡터의 곱은 각 행과 열벡터의 내적으로 계산한다.
      첫 번째 행은 $a+2=6$을 만들고, 두 번째 행은 $3a+b=21$을 만든다.
      첫 식에서 $a=4$를 얻고 이를 두 번째 식에 대입하면 $b=9$이다.
      미지수를 포함한 행렬 곱은 성분별 등식으로 바꾸어 풀 수 있다.
    tags: [matrix-multiplication]

  - id: e19-05
    type: multiple-choice
    passageRefs: [g19-matrices-a-b-01]
    prompt: 행렬 $A$에 대한 설명으로 부적절한 것은?
    choices:
      - { id: '1', text: 정방행렬이면서 행제형행렬이다. }
      - { id: '2', text: 대칭행렬이면서 상삼각행렬이다. }
      - { id: '3', text: 대각행렬이면서 하삼각행렬이다. }
      - { id: '4', text: 스칼라행렬이면서 $AB=3B$를 만족한다. }
    answers: ['1']
    explanation: |
      선택지 1: $A$는 정방행렬이지만, 선행 성분을 1로 두는 행제형 기준에서는 대각 성분이 모두 3이므로 부적절한 설명이다.
      선택지 2: 대각행렬은 주대각선을 기준으로 대칭이고, 주대각선 아래 성분이 모두 0이므로 상삼각행렬이기도 하다.
      선택지 3: 대각행렬은 주대각선 위 성분이 모두 0이므로 하삼각행렬이기도 하다.
      선택지 4: $A=3I_3$인 스칼라행렬이므로 임의의 $3 \times 3$ 행렬 $B$에 대해 $AB=3B$가 성립한다.

      핵심 개념:
      스칼라행렬은 단위행렬의 상수배인 대각행렬이다.
      대각행렬은 동시에 상삼각행렬과 하삼각행렬이며, 대각 성분 배치가 대칭이면 대칭행렬이 된다.
      $A=3I_3$이면 왼쪽에서 곱할 때 각 행을 3배 하므로 $AB=3B$이다.
      행제형 여부는 사용하는 정의에 따라 선행 성분 조건을 확인해야 한다.
    tags: [scalar-matrix, echelon-form]

  - id: e19-06
    type: multiple-choice
    passageRefs: [g19-matrices-a-b-01]
    prompt: 행렬 $A$의 역행렬을 구하면?
    choices:
      - { id: '1', text: '$A^{-1}=A$' }
      - { id: '2', text: '$A^{-1}=3A$' }
      - { id: '3', text: '$A^{-1}=3I_3$' }
      - { id: '4', text: '$A^{-1}=3^{-1}I_3$' }
    answers: ['4']
    explanation: |
      선택지 1: $A=3I_3$이므로 자기 자신과 곱하면 $9I_3$이 되어 단위행렬이 아니다.
      선택지 2: $3A=9I_3$이므로 $A$의 역행렬이 아니다.
      선택지 3: $3I_3$는 $A$ 자신이므로 역행렬이 아니다.
      선택지 4: $A=3I_3$이므로 $A^{-1}=\frac{1}{3}I_3=3^{-1}I_3$이다.

      핵심 개념:
      단위행렬의 상수배 $cI_n$은 $c \ne 0$일 때 역행렬을 갖는다.
      이때 $(cI_n)^{-1}=c^{-1}I_n$이다.
      $A=3I_3$이므로 역행렬은 각 대각 성분이 $\frac{1}{3}$인 대각행렬이다.
      역행렬은 원래 행렬과 곱했을 때 단위행렬을 만드는 행렬이다.
    tags: [inverse-matrix, scalar-matrix]

  - id: e19-07
    type: multiple-choice
    passageRefs: [g19-matrices-a-b-01]
    prompt: 행렬 $A$와 $B$의 행렬식을 순서대로 적은 것은?
    choices:
      - { id: '1', text: '$9,\ 14$' }
      - { id: '2', text: '$9,\ 1$' }
      - { id: '3', text: '$27,\ -1$' }
      - { id: '4', text: '$27,\ 1$' }
    answers: ['3']
    explanation: |
      선택지 1: $A$의 행렬식은 $3 \cdot 3 \cdot 3=27$이므로 9가 아니다.
      선택지 2: $A$의 행렬식과 $B$의 행렬식이 모두 맞지 않는다.
      선택지 3: $|A|=27$이고, $|B|=1(1\cdot3-4\cdot1)=-1$이므로 정답이다.
      선택지 4: $A$의 행렬식은 맞지만 $B$의 행렬식 부호가 다르다.

      핵심 개념:
      대각행렬의 행렬식은 주대각 성분의 곱이다.
      첫 행이 $(1,0,0)$인 행렬 $B$는 첫 번째 원소에 대한 여인수 전개로 쉽게 계산할 수 있다.
      $B$의 오른쪽 아래 $2 \times 2$ 부분 행렬의 행렬식은 $1\cdot3-4\cdot1=-1$이다.
      따라서 두 행렬식은 순서대로 $27,-1$이다.
    tags: [determinant]

  - id: e19-08
    type: multiple-choice
    passageRefs: [g19-matrices-a-b-01]
    prompt: 다음 중 행렬 $B$의 역행렬은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 & 0 \\
          0 & 1 & 1 \\
          0 & 4 & 3
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 & 0 \\
          6 & -3 & 4 \\
          -2 & 1 & -1
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          1 & 0 & 0 \\
          0 & 1 & 0 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          0 & 0 & 1 \\
          -3 & 4 & 6 \\
          1 & -1 & -2
          \end{pmatrix}
          $$
    answers: ['2']
    explanation: |
      선택지 1: 원래 행렬 $B$와 비슷한 성분 배치이며, $B$와 곱해도 단위행렬이 되지 않는다.
      선택지 2: $B$와 곱하면 각 열이 차례로 단위벡터가 되어 $BB^{-1}=I_3$를 만족한다.
      선택지 3: 단위행렬은 $B$ 자체가 단위행렬일 때만 $B$의 역행렬이 될 수 있다.
      선택지 4: 첫 행과 열의 배치가 맞지 않아 $B$와 곱했을 때 단위행렬이 되지 않는다.

      핵심 개념:
      역행렬 후보는 원래 행렬과 곱해서 단위행렬이 되는지 확인할 수 있다.
      $B$는 첫 행이 $(1,0,0)$이므로 역행렬의 첫 열 조건을 빠르게 확인할 수 있다.
      선택지 2를 곱하면 첫 행은 $(1,0,0)$이 되고, 나머지 행도 각각 $(0,1,0)$, $(0,0,1)$이 된다.
      따라서 선택지 2가 $B^{-1}$이다.
    tags: [inverse-matrix]

  - id: e19-09
    type: multiple-choice
    prompt: |
      다음 행렬 $A$가 대칭행렬이 되기 위한 조건은?

      $$
      A=
      \begin{pmatrix}
      x+y & y & 3x \\
      x+2 & 1 & -1 \\
      y & -1 & 0
      \end{pmatrix}
      $$
    choices:
      - { id: '1', text: '$x=1,\ y=3$' }
      - { id: '2', text: '$x=3,\ y=1$' }
      - { id: '3', text: '$x=0,\ y=2$' }
      - { id: '4', text: '$x=2,\ y=4$' }
    answers: ['1']
    explanation: |
      선택지 1: $y=x+2$와 $y=3x$를 모두 만족하므로 대칭행렬 조건에 맞다.
      선택지 2: $y=x+2$를 만족하지 않고 $y=3x$도 만족하지 않는다.
      선택지 3: $y=x+2$는 만족하지만 $y=3x$를 만족하지 않는다.
      선택지 4: $y=x+2$는 만족하지만 $y=3x$를 만족하지 않는다.

      핵심 개념:
      대칭행렬은 주대각선을 기준으로 마주 보는 성분이 서로 같아야 한다.
      이 행렬에서는 $(1,2)$ 성분과 $(2,1)$ 성분이 같아야 하므로 $y=x+2$이다.
      또한 $(1,3)$ 성분과 $(3,1)$ 성분이 같아야 하므로 $3x=y$이다.
      두 식을 동시에 풀면 $x=1$, $y=3$이다.
    tags: [symmetric-matrix]

  - id: e19-10
    type: multiple-choice
    prompt: 행렬 $A,B,C$에 관한 다음 서술 중 옳은 것은?
    choices:
      - { id: '1', text: '$AB=BA$가 항상 성립한다.' }
      - { id: '2', text: '$(A+B)^T=A^T+B^T$가 항상 성립한다.' }
      - { id: '3', text: '$A \ne O,\ B \ne O$이면 항상 $AB \ne O$이 성립한다.' }
      - { id: '4', text: '$A \ne O,\ B \ne C$이면 항상 $AB \ne AC$이 성립한다.' }
    answers: ['2']
    explanation: |
      선택지 1: 행렬의 곱셈은 일반적으로 교환법칙이 성립하지 않으므로 항상 참이 아니다.
      선택지 2: 전치행렬은 합에 대해 분배되어 $(A+B)^T=A^T+B^T$가 항상 성립한다.
      선택지 3: 영행렬이 아닌 두 행렬의 곱이 영행렬이 되는 경우가 있을 수 있다.
      선택지 4: $B \ne C$라도 왼쪽에서 곱한 $A$가 차이를 없애면 $AB=AC$가 될 수 있다.

      핵심 개념:
      행렬 연산에서는 실수 연산과 달리 항상 성립하지 않는 법칙이 많다.
      곱셈의 교환법칙과 소거법칙은 일반 행렬에서 보장되지 않는다.
      반면 전치 연산은 합에 대해 성분별로 작용하므로 덧셈과 잘 호환된다.
      따라서 주어진 보기 중 항상 성립하는 성질은 전치의 덧셈 법칙이다.
    tags: [transpose, matrix-operation]

  - id: e19-11
    type: multiple-choice
    prompt: $c$가 임의의 실수이고 $A$와 $B$가 $n$차 정칙행렬일 때 다음 중 부적절한 것은?
    choices:
      - { id: '1', text: '$A^{-1}$도 정칙행렬이며 $(A^{-1})^{-1}=A$이다.' }
      - { id: '2', text: '$cA$도 정칙행렬이며 $(cA)^{-1}=c^{-1}A^{-1}$이다. 단, $c \ne 0$' }
      - { id: '3', text: '$AB$도 정칙행렬이며 $(AB)^{-1}=A^{-1}B^{-1}$이다.' }
      - { id: '4', text: '$A^T$도 정칙행렬이며 $(A^T)^{-1}=(A^{-1})^T$이다.' }
    answers: ['3']
    explanation: |
      선택지 1: 정칙행렬의 역행렬은 다시 정칙행렬이고, 역행렬의 역행렬은 원래 행렬이다.
      선택지 2: $c \ne 0$이면 $cA$도 정칙행렬이며 역행렬은 $c^{-1}A^{-1}$이다.
      선택지 3: $AB$는 정칙행렬이지만 곱의 역행렬은 순서가 바뀌어 $(AB)^{-1}=B^{-1}A^{-1}$이므로 부적절하다.
      선택지 4: 전치행렬도 정칙행렬이고, 전치의 역행렬은 역행렬의 전치와 같다.

      핵심 개념:
      정칙행렬은 역행렬이 존재하는 정방행렬이다.
      정칙행렬의 곱과 전치는 다시 정칙행렬이 된다.
      행렬 곱의 역행렬에서는 곱셈 순서가 반대로 바뀐다.
      이는 행렬 곱셈이 일반적으로 교환법칙을 만족하지 않기 때문이다.
    tags: [invertible-matrix, inverse-matrix]

  - id: e19-12
    type: multiple-choice
    prompt: |
      행렬 $A$에 대한 설명으로 부적절한 것은?

      $$
      A=
      \begin{pmatrix}
      1 & 0 & 0 \\
      0 & 1 & 0 \\
      5 & 0 & 1
      \end{pmatrix}
      $$
    choices:
      - { id: '1', text: 정방행렬이면서 상삼각행렬이다. }
      - { id: '2', text: 정칙행렬이면서 하삼각행렬이다. }
      - { id: '3', text: '3차 단위행렬에 기본행연산 $R_{1,3}(5)$을 적용한 결과이다.' }
      - { id: '4', text: '3차 기본행렬 $E_{1,3}(5)$이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $A$는 정방행렬이지만 주대각선 아래의 $(3,1)$ 성분이 5이므로 상삼각행렬이 아니다.
      선택지 2: 주대각선 위 성분이 모두 0이고 대각 성분이 모두 1이므로 하삼각행렬이며 정칙행렬이다.
      선택지 3: 단위행렬의 1행을 5배하여 3행에 더하면 $(3,1)$ 성분이 5가 되어 주어진 행렬이 된다.
      선택지 4: 단위행렬에 하나의 기본행연산을 적용해 얻은 기본행렬로 볼 수 있다.

      핵심 개념:
      상삼각행렬은 주대각선 아래의 모든 성분이 0이어야 한다.
      하삼각행렬은 주대각선 위의 모든 성분이 0인 정방행렬이다.
      기본행렬은 단위행렬에 기본행연산 하나를 적용해 만든 행렬이다.
      이 행렬은 $R_{1,3}(5)$에 대응하는 기본행렬이다.
    tags: [triangular-matrix, elementary-matrix]

  - id: e19-13
    type: multiple-choice
    prompt: $A$가 $n$차 정칙행렬이라는 것과 동치가 아닌 것은?
    choices:
      - { id: '1', text: '$A$는 $I_n$과 행상등하다.' }
      - { id: '2', text: '$A$는 유한개의 $n$차 기본행렬들의 곱이다.' }
      - { id: '3', text: '동차방정식 $AX=O$는 영이 아닌 해를 갖는다.' }
      - { id: '4', text: '$n \times 1$ 행렬 $B$에 대해 $AX=B$는 유일한 해를 갖는다.' }
    answers: ['3']
    explanation: |
      선택지 1: 정칙행렬은 기본행연산으로 단위행렬과 행상등하게 만들 수 있으므로 동치이다.
      선택지 2: 정칙행렬은 유한개의 기본행렬의 곱으로 표현될 수 있으므로 동치이다.
      선택지 3: 정칙행렬이면 동차방정식 $AX=O$는 오직 영해만 가지므로 동치가 아니다.
      선택지 4: 정칙행렬이면 모든 우변 $B$에 대해 $AX=B$가 유일한 해를 가지므로 동치이다.

      핵심 개념:
      정칙행렬의 동치 조건에는 역행렬 존재, 단위행렬과의 행상등, 기본행렬 곱 표현이 포함된다.
      또한 모든 우변에 대한 선형방정식이 유일해를 갖는 것도 정칙성과 동치이다.
      동차방정식 $AX=O$는 정칙행렬일 때 영해만 가진다.
      영이 아닌 해가 존재한다면 $A$는 정칙행렬이 아니다.
    tags: [invertible-matrix, homogeneous-system]

  - id: e19-14
    type: multiple-choice
    prompt: $n$차 정방행렬 $A$와 $B$의 행렬식을 각각 $|A|=a$, $|B|=b$라고 할 때, 다음 중 옳은 것은?
    choices:
      - { id: '1', text: '$|A^{-1}|=a$ 단, $A$는 정칙행렬' }
      - { id: '2', text: '$|cA|=ca$ 단, $c$는 0이 아닌 상수' }
      - { id: '3', text: '$|A+B|=a+b$' }
      - { id: '4', text: '$|AB|=ab$' }
    answers: ['4']
    explanation: |
      선택지 1: 정칙행렬이면 $|A^{-1}|=\frac{1}{|A|}=\frac{1}{a}$이다.
      선택지 2: $n$차 행렬에서는 $|cA|=c^n|A|=c^n a$이다.
      선택지 3: 행렬식은 일반적으로 덧셈에 대해 $|A+B|=|A|+|B|$를 만족하지 않는다.
      선택지 4: 행렬식은 곱셈에 대해 $|AB|=|A||B|=ab$를 만족하므로 정답이다.

      핵심 개념:
      행렬식은 행렬 곱에 대해 곱셈 법칙을 만족한다.
      역행렬의 행렬식은 원래 행렬식의 역수이다.
      모든 행과 열이 상수배되면 $n$차 행렬의 행렬식은 $c^n$배가 된다.
      행렬식은 일반적인 행렬 덧셈에는 선형적으로 작용하지 않는다.
    tags: [determinant]

  - id: e19-15
    type: multiple-choice
    prompt: |
      크래머 공식을 이용하여 아래 일차연립방정식을 풀고자 한다. 방정식의 오른쪽은 미지수 $y$를 구하기 위한 식이다. 미지수 $y$의 값을 구하고자 할 때 다음 중 옳은 것은?

      $$
      \begin{cases}
      4x+3y+3z=8 \\
      x+y+z=2 \\
      x+z=1
      \end{cases}
      \qquad
      y=
      \frac{
      \begin{vmatrix}
      a & d & g \\
      b & e & h \\
      c & f & i
      \end{vmatrix}
      }{j}
      $$
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          a \\
          b \\
          c
          \end{pmatrix}
          =
          \begin{pmatrix}
          4 \\
          3 \\
          3
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          d \\
          e \\
          f
          \end{pmatrix}
          =
          \begin{pmatrix}
          8 \\
          2 \\
          1
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          g \\
          h \\
          i
          \end{pmatrix}
          =
          \begin{pmatrix}
          1 \\
          0 \\
          1
          \end{pmatrix}
          $$
      - { id: '4', text: '$j=2$' }
    answers: ['2']
    explanation: |
      선택지 1: 첫 번째 열은 $x$의 계수열이므로 $(4,1,1)^T$가 되어야 한다.
      선택지 2: $y$를 구하는 크래머 공식에서는 두 번째 열을 우변 상수항 열 $(8,2,1)^T$로 바꾸므로 정답이다.
      선택지 3: 세 번째 열은 $z$의 계수열 $(3,1,1)^T$가 되어야 하므로 제시된 열과 다르다.
      선택지 4: 분모 $j$는 계수행렬의 행렬식이며, 이 문제에서는 1이다.

      핵심 개념:
      크래머 공식에서 $y$의 분자는 계수행렬의 $y$ 계수열을 우변 상수항 열로 바꾼 행렬식이다.
      원래 계수행렬의 열은 차례로 $x$, $y$, $z$의 계수열이다.
      따라서 $y$를 구할 때 두 번째 열이 $(8,2,1)^T$로 바뀐다.
      분모는 원래 계수행렬의 행렬식이다.
    tags: [cramers-rule, determinant, linear-system]

  - id: e19-16
    type: multiple-choice
    passageRefs: [g19-vectors-r3-01]
    prompt: 두 점 $A$와 $P$를 지나는 직선의 방정식은?
    choices:
      - { id: '1', text: '$\frac{x-3}{2}=y-1=z-2$' }
      - { id: '2', text: '$\frac{x-1}{3}=y=\frac{z}{2}$' }
      - { id: '3', text: '$\frac{x-2}{3}=y-1=2z$' }
      - { id: '4', text: '$\frac{x-1}{2}=y=\frac{z}{2}$' }
    answers: ['4']
    explanation: |
      선택지 1: 점 $P$를 기준으로 한 형태처럼 보이지만 방향벡터가 $P-A=(2,1,2)$와 맞지 않는다.
      선택지 2: 기준점의 $x$좌표는 맞지만 방향벡터의 $x$성분을 3으로 둔 점이 원문 조건과 다르다.
      선택지 3: 기준점과 방향비가 모두 두 점 $A$, $P$로부터 얻는 값과 다르다.
      선택지 4: $A=(1,0,0)$를 지나고 방향벡터 $P-A=(2,1,2)$를 가지므로 정답이다.

      핵심 개념:
      두 점 $A$와 $P$를 지나는 직선의 방향벡터는 $P-A$이다.
      여기서는 $P-A=(3,1,2)-(1,0,0)=(2,1,2)$이다.
      점 $A$를 기준으로 쓰면 $\frac{x-1}{2}=\frac{y-0}{1}=\frac{z-0}{2}$가 된다.
      따라서 $\frac{x-1}{2}=y=\frac{z}{2}$이다.
    tags: [line-in-r3, vector]

  - id: e19-17
    type: multiple-choice
    passageRefs: [g19-vectors-r3-01]
    prompt: 다음 중 틀린 것은?
    choices:
      - { id: '1', text: '$|A|=1$' }
      - { id: '2', text: '$A \cdot B=2$' }
      - { id: '3', text: '$A \times C=(0,-1,1)$' }
      - { id: '4', text: '$|P|=\sqrt{14}$' }
    answers: ['2']
    explanation: |
      선택지 1: $A=(1,0,0)$이므로 $|A|=\sqrt{1^2}=1$이다.
      선택지 2: $A \cdot B=(1,0,0)\cdot(1,1,0)=1$이므로 2가 아니다.
      선택지 3: $(1,0,0)\times(1,1,1)=(0,-1,1)$이므로 옳다.
      선택지 4: $|P|=\sqrt{3^2+1^2+2^2}=\sqrt{14}$이므로 옳다.

      핵심 개념:
      벡터의 길이는 각 성분 제곱합의 제곱근으로 계산한다.
      내적은 대응 성분끼리 곱해 더한다.
      외적은 두 벡터에 모두 수직인 벡터를 만든다.
      계산 결과와 제시된 값이 다른 선택지는 $A \cdot B=2$이다.
    tags: [dot-product, cross-product, vector-norm]

  - id: e19-18
    type: multiple-choice
    passageRefs: [g19-vectors-r3-01]
    prompt: 다음 중 $A$와 서로 수직인 벡터는?
    choices:
      - { id: '1', text: '$B$' }
      - { id: '2', text: '$C$' }
      - { id: '3', text: '$A+B$' }
      - { id: '4', text: '$A \times C$' }
    answers: ['4']
    explanation: |
      선택지 1: $A \cdot B=1$이므로 서로 수직이 아니다.
      선택지 2: $A \cdot C=1$이므로 서로 수직이 아니다.
      선택지 3: $A \cdot (A+B)=A\cdot A+A\cdot B=2$이므로 수직이 아니다.
      선택지 4: 외적 $A \times C$는 정의상 $A$와 $C$에 모두 수직이므로 정답이다.

      핵심 개념:
      두 벡터가 수직이면 내적이 0이다.
      $A=(1,0,0)$이므로 어떤 벡터와의 내적은 그 벡터의 첫 번째 성분을 확인하면 된다.
      외적 $A \times C$는 두 입력 벡터에 모두 수직인 벡터이다.
      따라서 $A$와 수직인 벡터는 $A \times C$이다.
    tags: [orthogonal-vector, cross-product]

  - id: e19-19
    type: multiple-choice
    passageRefs: [g19-vectors-r3-01]
    prompt: $P$를 $A,B,C$의 일차결합으로 나타낸 것은?
    choices:
      - { id: '1', text: '$P=A+2B-C$' }
      - { id: '2', text: '$P=2A+B+C$' }
      - { id: '3', text: '$P=2A-B+2C$' }
      - { id: '4', text: '$P=A-2B+C$' }
    answers: ['3']
    explanation: |
      선택지 1: $A+2B-C=(2,1,-1)$이므로 $P$와 다르다.
      선택지 2: $2A+B+C=(4,2,1)$이므로 $P$와 다르다.
      선택지 3: $2A-B+2C=(3,1,2)$이므로 $P$와 일치한다.
      선택지 4: $A-2B+C=(0,-1,1)$이므로 $P$와 다르다.

      핵심 개념:
      일차결합은 주어진 벡터들에 스칼라를 곱해 더한 벡터이다.
      각 선택지의 계수를 실제 벡터 $A,B,C$에 적용해 성분별로 더하면 된다.
      $2A-B+2C$는 $(2,0,0)-(1,1,0)+(2,2,2)=(3,1,2)$이다.
      이는 주어진 $P$와 같으므로 정답이다.
    tags: [linear-combination, vector]

  - id: e19-20
    type: multiple-choice
    passageRefs: [g19-linear-transform-t-01]
    prompt: $R^3$와 $R^2$의 표준기저를 이용한 $T$의 행렬은?
    choices:
      - id: '1'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 & 0 \\
          0 & 0 & 1
          \end{pmatrix}
          $$
      - id: '2'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 & 3 \\
          3 & 0 & 1
          \end{pmatrix}
          $$
      - id: '3'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 \\
          0 & 0 \\
          0 & 1
          \end{pmatrix}
          $$
      - id: '4'
        text: |
          $$
          \begin{pmatrix}
          1 & 2 \\
          3 & 0 \\
          0 & 1
          \end{pmatrix}
          $$
    answers: ['1']
    explanation: |
      선택지 1: $T(x,y,z)=(x+2y,z)$를 행렬곱으로 나타내면 첫 행은 $(1,2,0)$, 둘째 행은 $(0,0,1)$이므로 정답이다.
      선택지 2: 첫 번째 성분에 $3z$가 포함되고 두 번째 성분도 원문과 다르게 표현된다.
      선택지 3: $R^3$에서 $R^2$로 가는 변환의 표준행렬은 $2 \times 3$이어야 하는데 $3 \times 2$ 행렬이다.
      선택지 4: 행렬 크기가 $3 \times 2$이고 성분 배치도 원문 변환과 맞지 않는다.

      핵심 개념:
      $T:R^3 \to R^2$의 표준행렬은 출력 차원 2를 행 수, 입력 차원 3을 열 수로 하는 $2 \times 3$ 행렬이다.
      첫 번째 출력 성분 $x+2y$는 입력 벡터와 $(1,2,0)$의 곱으로 나타난다.
      두 번째 출력 성분 $z$는 입력 벡터와 $(0,0,1)$의 곱으로 나타난다.
      따라서 표준행렬은 $\begin{pmatrix}1&2&0\\0&0&1\end{pmatrix}$이다.
    tags: [linear-transformation, matrix-representation]

  - id: e19-21
    type: multiple-choice
    passageRefs: [g19-linear-transform-t-01]
    prompt: $\operatorname{Ker}(T)$를 구하면?
    choices:
      - { id: '1', text: '$\{(k,2k,k)\mid k\in R\}$' }
      - { id: '2', text: '$\{(k,-2k,k)\mid k\in R\}$' }
      - { id: '3', text: '$\{(2k,-k,0)\mid k\in R\}$' }
      - { id: '4', text: '$\{(2k,-2k,0)\mid k\in R\}$' }
    answers: ['3']
    explanation: |
      선택지 1: $z=k$가 되어 $T$의 두 번째 성분이 0이 아닐 수 있다.
      선택지 2: $z=k$가 되어 핵공간 조건 $z=0$을 만족하지 않는다.
      선택지 3: $x=2k$, $y=-k$, $z=0$이면 $x+2y=2k-2k=0$이고 $z=0$이므로 정답이다.
      선택지 4: $x+2y=2k-4k=-2k$이므로 모든 $k$에 대해 0이 되지 않는다.

      핵심 개념:
      핵공간은 $T(x,y,z)=(0,0)$을 만족하는 모든 벡터의 집합이다.
      이 문제에서는 $x+2y=0$과 $z=0$을 동시에 만족해야 한다.
      $y=-k$로 두면 $x=2k$, $z=0$이 되어 $(2k,-k,0)$으로 나타낼 수 있다.
      따라서 $\operatorname{Ker}(T)=\{(2k,-k,0)\mid k\in R\}$이다.
    tags: [kernel, linear-transformation]

  - id: e19-22
    type: multiple-choice
    prompt: $R^2$ 공간에서 기저 $\tilde{A}=\{(1,0),(1,1)\}$에 대한 벡터 $(3,2)$의 좌표를 구한 것으로 옳은 것은?
    choices:
      - { id: '1', text: '$(3,2)=(3,2)_{\tilde{A}}$' }
      - { id: '2', text: '$(3,2)=(1,2)_{\tilde{A}}$' }
      - { id: '3', text: '$(3,2)=(2,1)_{\tilde{A}}$' }
      - { id: '4', text: '$(3,2)=(3,0)_{\tilde{A}}$' }
    answers: ['2']
    explanation: |
      선택지 1: $3(1,0)+2(1,1)=(5,2)$이므로 원래 벡터가 아니다.
      선택지 2: $1(1,0)+2(1,1)=(3,2)$이므로 기저 $\tilde{A}$에서의 좌표가 맞다.
      선택지 3: $2(1,0)+1(1,1)=(3,1)$이므로 원래 벡터와 다르다.
      선택지 4: $3(1,0)+0(1,1)=(3,0)$이므로 원래 벡터와 다르다.

      핵심 개념:
      주어진 기저에서의 좌표는 기저벡터들의 일차결합 계수이다.
      $c_1(1,0)+c_2(1,1)=(c_1+c_2,c_2)$가 $(3,2)$와 같아야 한다.
      따라서 $c_2=2$, $c_1=1$이다.
      좌표벡터는 $(1,2)_{\tilde{A}}$이다.
    tags: [basis, coordinate-vector]

  - id: e19-23
    type: multiple-choice
    prompt: |
      다음 행렬 $M$에 대한 설명으로 옳은 것은?

      $$
      M=
      \begin{pmatrix}
      1 & 2 \\
      0 & 3
      \end{pmatrix}
      $$
    choices:
      - { id: '1', text: '$M$의 고유값은 1과 3이다.' }
      - { id: '2', text: '$M$의 고유값은 0과 2이다.' }
      - { id: '3', text: '$(1\ 3)^T$는 $M$의 고유벡터이다.' }
      - { id: '4', text: '$(0\ 2)^T$는 $M$의 고유벡터이다.' }
    answers: ['1']
    explanation: |
      선택지 1: $M$은 상삼각행렬이므로 고유값은 주대각 성분 1과 3이다.
      선택지 2: 0과 2는 이 행렬의 주대각 성분도 아니고 특성방정식의 근도 아니다.
      선택지 3: $M(1,3)^T=(7,9)^T$로, $(1,3)^T$의 스칼라배가 아니므로 고유벡터가 아니다.
      선택지 4: $M(0,2)^T=(4,6)^T$로, $(0,2)^T$의 스칼라배가 아니므로 고유벡터가 아니다.

      핵심 개념:
      삼각행렬의 고유값은 주대각 성분이다.
      이 행렬은 상삼각행렬이므로 특성방정식은 $(1-\lambda)(3-\lambda)=0$으로 볼 수 있다.
      따라서 고유값은 1과 3이다.
      고유벡터 여부는 $Mv=\lambda v$ 형태가 되는지 확인한다.
    tags: [eigenvalue, eigenvector]

  - id: e19-24
    type: multiple-choice
    prompt: 다음 서술 중 부적절한 것은?
    choices:
      - { id: '1', text: '$M^{-1}=M^T$인 행렬을 직교행렬이라고 한다.' }
      - { id: '2', text: '직교행렬 $M$의 행벡터들은 단위직교집합을 이룬다.' }
      - { id: '3', text: '단위직교집합이란 길이가 1이면서 서로 직교인 벡터들의 집합이다.' }
      - { id: '4', text: '직교화 과정이란 주어진 벡터 $A$를 $A$의 길이로 나누어 방향은 변함없고 길이만 1이 되도록 하는 과정이다.' }
    answers: ['4']
    explanation: |
      선택지 1: 직교행렬은 역행렬이 전치행렬과 같은 정방행렬이므로 옳다.
      선택지 2: 직교행렬의 행벡터와 열벡터는 단위직교집합을 이루므로 옳다.
      선택지 3: 단위직교집합은 각 벡터의 길이가 1이고 서로 내적이 0인 벡터들의 집합이므로 옳다.
      선택지 4: 벡터를 자기 길이로 나누어 길이를 1로 만드는 과정은 정규화이며, 직교화 과정 자체의 설명으로는 부적절하다.

      핵심 개념:
      직교행렬은 $M^TM=I$를 만족하며, 이때 $M^{-1}=M^T$이다.
      직교행렬의 행벡터와 열벡터는 서로 직교하고 길이가 1이다.
      정규화는 한 벡터의 길이를 1로 만드는 과정이다.
      직교화는 여러 벡터를 서로 직교하도록 바꾸는 과정이며, 그램-슈미트 과정이 대표적이다.
    tags: [orthogonal-matrix, orthonormal-set, normalization]

  - id: e19-25
    type: multiple-choice
    prompt: 내적공간 $\{R^2,\bullet\}$의 두 벡터를 $A_1=(1,0)$, $A_2=(1,2)$이라 할 때 기저 $\tilde{A}=\{A_1,A_2\}$를 그램-슈미트의 직교화 과정을 이용하면 직교기저 $\tilde{B}=\{B_1,B_2\}$로 바꿀 수 있다. 이때 $B_1$, $B_2$를 차례로 나열한 것은?
    choices:
      - { id: '1', text: '$B_1=(1,0),\ B_2=(1,2)$' }
      - { id: '2', text: '$B_1=(1,0),\ B_2=(0,2)$' }
      - { id: '3', text: '$B_1=(1,2),\ B_2=(1,0)$' }
      - { id: '4', text: '$B_1=(1,2),\ B_2=(0,1)$' }
    answers: ['2']
    explanation: |
      선택지 1: $(1,0)$과 $(1,2)$의 내적은 1이므로 서로 직교하지 않는다.
      선택지 2: $B_1=A_1=(1,0)$이고, $B_2=A_2-\operatorname{proj}_{B_1}A_2=(1,2)-(1,0)=(0,2)$이므로 정답이다.
      선택지 3: 그램-슈미트 과정을 주어진 순서대로 적용하면 첫 벡터는 $A_1=(1,0)$에서 시작한다.
      선택지 4: 첫 벡터가 원문의 적용 순서와 다르며 제시된 두 벡터도 해당 과정의 결과가 아니다.

      핵심 개념:
      그램-슈미트 과정은 첫 벡터를 기준 벡터로 두고, 다음 벡터에서 기준 벡터 방향 성분을 제거한다.
      $A_1=(1,0)$이므로 $B_1=(1,0)$이다.
      $A_2=(1,2)$의 $B_1$ 방향 성분은 $(1,0)$이다.
      이를 빼면 $B_2=(0,2)$가 되어 $B_1$과 직교한다.
    tags: [gram-schmidt, orthogonal-basis]
