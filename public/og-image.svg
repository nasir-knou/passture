<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PASSture - 기말 대비 문제풀이 플랫폼</title>
  <desc id="desc">기출, 교재, 강의 문제를 모아 풀고 오답과 북마크를 복습하는 서비스 소개 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf7" />
      <stop offset="1" stop-color="#e4f0e7" />
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0" stop-color="#123f34" />
      <stop offset="0.58" stop-color="#234c6f" />
      <stop offset="1" stop-color="#b66b16" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#302716" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="#fffdf7" stroke="#d7ccba" stroke-width="2" filter="url(#shadow)" />
  <rect x="64" y="64" width="12" height="502" rx="6" fill="url(#bar)" />
  <text x="118" y="154" fill="#123f34" font-family="Pretendard, Noto Sans KR, Inter, Arial, sans-serif" font-size="34" font-weight="800">PASSture</text>
  <text x="118" y="246" fill="#1e252b" font-family="Pretendard, Noto Sans KR, Inter, Arial, sans-serif" font-size="64" font-weight="900">기말 대비 문제풀이 플랫폼</text>
  <text x="118" y="326" fill="#59636f" font-family="Pretendard, Noto Sans KR, Inter, Arial, sans-serif" font-size="30" font-weight="700">기출 · 교재 · 강의 문제를 한곳에서</text>
  <g font-family="Pretendard, Noto Sans KR, Inter, Arial, sans-serif" font-size="26" font-weight="800">
    <rect x="118" y="390" width="112" height="48" rx="24" fill="#e4f0e7" stroke="#9dbba7" />
    <text x="154" y="422" fill="#123f34">기출</text>
    <rect x="246" y="390" width="112" height="48" rx="24" fill="#eef5fb" stroke="#9db6cb" />
    <text x="282" y="422" fill="#234c6f">교재</text>
    <rect x="374" y="390" width="112" height="48" rx="24" fill="#fff3dd" stroke="#e2b26f" />
    <text x="410" y="422" fill="#8a4b0f">강의</text>
  </g>
  <g fill="#59636f" font-family="Pretendard, Noto Sans KR, Inter, Arial, sans-serif" font-size="24" font-weight="700">
    <text x="118" y="486">문제/선지 섞기 · 오답 복습 · 북마크 · 모의시험</text>
  </g>
  <g transform="translate(815 132)">
    <rect x="0" y="0" width="244" height="310" rx="22" fill="#f4f0e6" stroke="#d7ccba" />
    <rect x="28" y="34" width="188" height="20" rx="10" fill="#123f34" opacity="0.92" />
    <rect x="28" y="82" width="188" height="16" rx="8" fill="#9dbba7" />
    <rect x="28" y="118" width="144" height="16" rx="8" fill="#9dbba7" />
    <rect x="28" y="172" width="188" height="42" rx="10" fill="#fffdf7" stroke="#d7ccba" />
    <rect x="28" y="230" width="188" height="42" rx="10" fill="#e4f0e7" stroke="#9dbba7" />
  </g>
</svg>
